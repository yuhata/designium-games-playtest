<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>パーク帝王</title>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      overflow: hidden; 
      background: #0a0a0a; 
      font-family: Arial, sans-serif;
    }
    canvas { 
      display: block; 
    }
    #ui { 
      position: absolute; 
      top: 20px; 
      left: 20px; 
      color: #fff; 
      font-family: Arial;
      z-index: 10;
    }
    #instructions {
      font-size: 16px;
      color: #aaffaa;
      margin-bottom: 20px;
      text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
    }
    #control { 
      font-size: 40px; 
      color: #00ffff; 
      font-weight: bold; 
      margin: 10px 0;
      transition: transform 0.1s;
    }
    #money { 
      font-size: 28px; 
      color: #ffff00; 
      font-weight: bold;
    }
    #revenue { 
      font-size: 18px; 
      color: #90ff00; 
      margin-top: 10px;
    }
    #timer { 
      margin-top: 20px;
      font-size: 18px;
      color: #00aa00;
    }
  </style>
</head>
<body>
<!--GAME_SPEC
{
  "win_condition": "制圧数が10以上になる",
  "fail_condition": "資金が0未満になる",
  "input_types": ["mousedown", "mousemove", "mouseup", "click"],
  "state_vars": ["control", "money"],
  "core_loop": "グリッドをクリック→制圧数増加＆資金減少→毎フレーム収益加算→control>=10でwin",
  "clear_trigger": "control >= 10",
  "gameover_trigger": "money < 0"
}
-->
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div id="instructions">【操作】グリッドをクリック→土地制圧！ 制圧数10で帝王即位</div>
    <div id="control">支配地: 0/10</div>
    <div id="money">資金: 500円</div>
    <div id="revenue">収益: +0円/秒</div>
    <div id="timer">Time: 0s</div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let gameState = 'playing';
    let state = {
      control: 0,
      money: 500,
      maxControl: 10,
      gridSize: 5,
      cellSize: 80,
      startTime: Date.now()
    };

    let grid = Array(state.gridSize).fill(null).map(() => Array(state.gridSize).fill(0));
    let hoveredCell = null;
    let winAnimTime = 0;
    let overAnimTime = 0;
    let totalTime = 0;
    let cellScale = 1;
    let inputCount = 0;

    const buildCost = 50;

    function getGridPos(x, y) {
      const rect = canvas.getBoundingClientRect();
      const posX = x - rect.left;
      const posY = y - rect.top;
      const offsetX = (canvas.width - state.gridSize * state.cellSize) / 2;
      const offsetY = (canvas.height - state.gridSize * state.cellSize) / 2;
      
      const col = Math.floor((posX - offsetX) / state.cellSize);
      const row = Math.floor((posY - offsetY) / state.cellSize);
      
      if (col >= 0 && col < state.gridSize && row >= 0 && row < state.gridSize) {
        return { col, row };
      }
      return null;
    }

    function buildCell(col, row) {
      if (grid[row][col] === 0 && state.money >= buildCost) {
        grid[row][col] = 1;
        state.control++;
        state.money -= buildCost;
        inputCount++;
        cellScale = 1 + Math.min(0.4, state.control * 0.05);
        updateUI();
      }
    }

    function updateUI() {
      const revenue = Math.floor(state.control * 5);
      document.getElementById('control').textContent = `支配地: ${state.control}/${state.maxControl}`;
      document.getElementById('money').textContent = `資金: ${Math.floor(state.money)}円`;
      document.getElementById('revenue').textContent = `収益: +${revenue}円/秒`;
      
      const el = document.getElementById('control');
      el.style.transform = 'scale(1.15)';
      setTimeout(() => { el.style.transform = 'scale(1.0)'; }, 100);
    }

    function drawGame() {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const offsetX = (canvas.width - state.gridSize * state.cellSize) / 2;
      const offsetY = (canvas.height - state.gridSize * state.cellSize) / 2;

      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.scale(cellScale, cellScale);
      ctx.translate(-canvas.width / 2, -canvas.height / 2);

      for (let row = 0; row < state.gridSize; row++) {
        for (let col = 0; col < state.gridSize; col++) {
          const x = offsetX + col * state.cellSize;
          const y = offsetY + row * state.cellSize;
          const sz = state.cellSize - 4;

          if (grid[row][col] === 1) {
            ctx.fillStyle = '#00ff88';
          } else if (hoveredCell && hoveredCell.row === row && hoveredCell.col === col) {
            ctx.fillStyle = '#1144ff';
          } else {
            ctx.fillStyle = '#333333';
          }
          ctx.fillRect(x, y, sz, sz);

          if (state.control >= state.maxControl) {
            ctx.strokeStyle = Math.floor(Date.now() / 250) % 2 === 0 ? '#ffaa00' : '#ff8800';
            ctx.lineWidth = 3;
          } else {
            ctx.strokeStyle = '#666666';
            ctx.lineWidth = 2;
          }
          ctx.strokeRect(x, y, sz, sz);
        }
      }

      ctx.restore();

      ctx.fillStyle = '#ffffff';
      ctx.font = '18px Arial';
      ctx.fillText(`コスト: ${buildCost}円/マス`, 20, canvas.height - 20);
    }

    function drawWin() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const flash = Math.max(0, 1 - winAnimTime / 10);
      ctx.fillStyle = `rgba(255, 255, 255, ${flash * 0.8})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      const scale = Math.min(1, winAnimTime / 15);
      ctx.scale(scale, scale);
      ctx.translate(-canvas.width / 2, -canvas.height / 2);
      
      ctx.fillStyle = '#ffff00';
      ctx.font = 'bold 80px Arial';
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
      ctx.shadowBlur = 10;
      ctx.fillText('帝王即位！', canvas.width / 2, canvas.height / 2);
      
      ctx.restore();

      ctx.shadowColor = 'transparent';
      ctx.fillStyle = '#ffffff';
      ctx.font = '32px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(`最終制圧数: ${state.control}`, canvas.width / 2, canvas.height / 2 + 100);
      ctx.fillText(`獲得資金: ${Math.floor(state.money)}円`, canvas.width / 2, canvas.height / 2 + 150);
      ctx.font = '22px Arial';
      ctx.fillStyle = '#aaffaa';
      ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height / 2 + 210);

      winAnimTime++;
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const shrink = Math.max(0.3, 1 - overAnimTime / 50);
      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.scale(shrink, shrink);
      ctx.translate(-canvas.width / 2, -canvas.height / 2);

      const offsetX = (canvas.width - state.gridSize * state.cellSize) / 2;
      const offsetY = (canvas.height - state.gridSize * state.cellSize) / 2;

      for (let row = 0; row < state.gridSize; row++) {
        for (let col = 0; col < state.gridSize; col++) {
          if (grid[row][col] === 1) {
            const x = offsetX + col * state.cellSize;
            const y = offsetY + row * state.cellSize;
            ctx.fillStyle = `rgba(255, 80, 80, ${Math.max(0, 1 - overAnimTime / 50)})`;
            ctx.fillRect(x, y, state.cellSize - 4, state.cellSize - 4);
          }
        }
      }

      ctx.restore();

      ctx.fillStyle = '#ff3333';
      ctx.font = 'bold 80px Arial';
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
      ctx.shadowBlur = 10;
      ctx.fillText('経営破綻', canvas.width / 2, canvas.height / 2);

      ctx.shadowColor = 'transparent';
      ctx.fillStyle = '#ffffff';
      ctx.font = '32px Arial';
      ctx.fillText(`制圧数: ${state.control}/10`, canvas.width / 2, canvas.height / 2 + 100);
      ctx.fillText(`最終資金: ${Math.floor(state.money)}円`, canvas.width / 2, canvas.height / 2 + 150);
      ctx.font = '22px Arial';
      ctx.fillStyle = '#ffaaaa';
      ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height / 2 + 210);

      overAnimTime++;
    }

    function update() {
      totalTime = (Date.now() - state.startTime) / 1000;
      document.getElementById('timer').textContent = `Time: ${Math.floor(totalTime)}s`;

      if (gameState === 'playing') {
        const revenue = state.control * 5 / 60;
        state.money += revenue;

        if (state.control >= state.maxControl) {
          gameState = 'win';
          winAnimTime = 0;
        }

        if (state.money < 0) {
          gameState = 'over';
          overAnimTime = 0;
        }
      }

      updateUI();
    }

    function gameLoop() {
      update();

      if (gameState === 'playing') {
        drawGame();
      } else if (gameState === 'win') {
        drawGame();
        drawWin();
      } else if (gameState === 'over') {
        drawGame();
        drawGameOver();
      }

      requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('mousedown', (e) => {
      if (gameState === 'playing') {
        const pos = getGridPos(e.clientX, e.clientY);
        if (pos) buildCell(pos.col, pos.row);
      }
    });

    canvas.addEventListener('mousemove', (e) => {
      hoveredCell = getGridPos(e.clientX, e.clientY);
    });

    canvas.addEventListener('mouseup', () => {
    });

    canvas.addEventListener('click', (e) => {
      if (gameState === 'win' || gameState === 'over') {
        resetGame();
      }
    });

    function resetGame() {
      gameState = 'playing';
      state.control = 0;
      state.money = 500;
      state.startTime = Date.now();
      grid = Array(state.gridSize).fill(null).map(() => Array(state.gridSize).fill(0));
      winAnimTime = 0;
      overAnimTime = 0;
      cellScale = 1;
      inputCount = 0;
      updateUI();
    }

    gameLoop();
  </script>
</body>
</html>
