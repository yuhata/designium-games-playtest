<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パチンコライト</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #0a0a0a; font-family: Arial, sans-serif;
        }
        #gameContainer { position: relative; }
        canvas { display: block; }
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            color: #fff; gap: 14px; z-index: 100; text-align: center; padding: 20px;
        }
        .screen h1 { font-size: 42px; color: #f6e05e; }
        .screen p { font-size: 15px; line-height: 1.7; max-width: 300px; }
        .screen button {
            padding: 12px 36px; font-size: 16px; border: none;
            border-radius: 6px; cursor: pointer; background: #e53e3e; color: #fff;
        }
        .screen button:hover { background: #fc5c5c; }
    </style>
</head>
<body>
<div id="gameContainer">
    <div id="startScreen" class="screen" style="display:flex">
        <h1>🎰 パチンコライト</h1>
        <p>クリックで玉を発射！<br>
        入賞口に入ると得点。<br>
        特定口（★）で大当たりゲージが貯まる。<br><br>
        ゲージMAXで大当たり！<br>20球で勝負</p>
        <button onclick="startGame()">START</button>
    </div>
    <div id="clearScreen" class="screen">
        <h1 style="color:#f6e05e">大当たり！</h1>
        <p id="clearMsg">ゲージMAX達成！</p>
        <button onclick="retryGame()">もう一度</button>
    </div>
    <div id="gameOverScreen" class="screen">
        <h1 style="color:#e53e3e">GAME OVER</h1>
        <p id="overMsg">20球使い果たした</p>
        <button onclick="retryGame()">もう一度</button>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>
<script>
const W = 380, H = 600;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;
const gc = document.getElementById('gameContainer');
gc.style.width = W + 'px'; gc.style.height = H + 'px';

const GRAVITY = 0.28;
const BOUNCE = 0.42;
const BALL_R = 7;
const MAX_BALLS = 20;

// Pegs
function makePegs() {
    const pegs = [];
    const spacing = 44;
    for (let row = 0; row < 7; row++) {
        const cols = row % 2 === 0 ? 7 : 6;
        const offsetX = row % 2 === 0 ? 22 : 44;
        for (let c = 0; c < cols; c++) {
            pegs.push({ x: offsetX + c * spacing, y: 120 + row * spacing, r: 6 });
        }
    }
    return pegs;
}

// Score holes at bottom
const HOLES = [
    { x: 32,  w: 44, score: 3,  jackpot: false, color: '#3182ce' },
    { x: 80,  w: 44, score: 1,  jackpot: false, color: '#4a5568' },
    { x: 128, w: 44, score: 5,  jackpot: true,  color: '#d69e2e' },
    { x: 192, w: 60, score: 10, jackpot: true,  color: '#e53e3e', label: '★' },
    { x: 256, w: 44, score: 5,  jackpot: true,  color: '#d69e2e' },
    { x: 304, w: 44, score: 1,  jackpot: false, color: '#4a5568' },
    { x: 328+20, w: 40, score: 3, jackpot: false, color: '#3182ce' },
];
const pegs = makePegs();

const gameState = {
    running: false,
    balls: [],
    ballsUsed: 0,
    score: 0,
    jackpotGauge: 0,
    jackpotFlash: 0,
    launchCooldown: 0,
    flashTexts: [],
};
let gameLoop = null;

function startGame() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('clearScreen').style.display = 'none';
    document.getElementById('gameOverScreen').style.display = 'none';
    gameState.running = true;
    gameState.balls = [];
    gameState.ballsUsed = 0;
    gameState.score = 0;
    gameState.jackpotGauge = 0;
    gameState.jackpotFlash = 0;
    gameState.launchCooldown = 0;
    gameState.flashTexts = [];
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(update, 16);
}

function retryGame() {
    gameState.running = false;
    document.getElementById('clearScreen').style.display = 'none';
    document.getElementById('gameOverScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
}

function launchBall(clickX) {
    if (!gameState.running || gameState.launchCooldown > 0) return;
    if (gameState.ballsUsed >= MAX_BALLS) return;
    const cx = Math.max(20, Math.min(W - 20, clickX));
    gameState.balls.push({
        x: cx, y: 30,
        vx: (Math.random() - 0.5) * 1.5,
        vy: 2 + Math.random() * 1.5,
        active: true,
        trail: [],
    });
    gameState.ballsUsed++;
    gameState.launchCooldown = 20;
}

function update() {
    if (!gameState.running) return;
    if (gameState.launchCooldown > 0) gameState.launchCooldown--;
    if (gameState.jackpotFlash > 0) gameState.jackpotFlash--;

    for (let i = gameState.flashTexts.length - 1; i >= 0; i--) {
        const ft = gameState.flashTexts[i];
        ft.y -= 1.2;
        ft.life--;
        if (ft.life <= 0) gameState.flashTexts.splice(i, 1);
    }

    for (const ball of gameState.balls) {
        if (!ball.active) continue;
        ball.trail.push({ x: ball.x, y: ball.y });
        if (ball.trail.length > 6) ball.trail.shift();

        ball.vy += GRAVITY;
        ball.x += ball.vx;
        ball.y += ball.vy;

        // Wall bounce
        if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
        if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }

        // Peg collision
        for (const peg of pegs) {
            const dx = ball.x - peg.x, dy = ball.y - peg.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < BALL_R + peg.r) {
                const nx = dx / dist, ny = dy / dist;
                const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                ball.vx = nx * speed * BOUNCE + (Math.random() - 0.5) * 0.8;
                ball.vy = ny * speed * BOUNCE;
                ball.x = peg.x + nx * (BALL_R + peg.r + 1);
                ball.y = peg.y + ny * (BALL_R + peg.r + 1);
            }
        }

        // Hole detection
        const holeY = H - 60;
        if (ball.y + BALL_R > holeY) {
            for (const hole of HOLES) {
                if (ball.x >= hole.x && ball.x <= hole.x + hole.w) {
                    ball.active = false;
                    gameState.score += hole.score;
                    if (hole.jackpot) {
                        gameState.jackpotGauge = Math.min(100, gameState.jackpotGauge + (hole.label === '★' ? 30 : 15));
                    }
                    gameState.flashTexts.push({
                        x: ball.x, y: holeY - 20,
                        text: '+' + hole.score + (hole.jackpot ? ' 🎯' : ''),
                        color: hole.jackpot ? '#f6e05e' : '#90cdf4',
                        life: 50,
                    });
                    if (gameState.jackpotGauge >= 100) {
                        gameState.jackpotFlash = 60;
                        setTimeout(() => { jackpotWin(); }, 800);
                    }
                    break;
                }
            }
            if (ball.active && ball.y > H + 20) ball.active = false;
        }
    }

    gameState.balls = gameState.balls.filter(b => b.active || b.y < H + 40);

    // Check end: all balls used and no active balls
    if (gameState.ballsUsed >= MAX_BALLS && gameState.balls.every(b => !b.active)) {
        if (gameState.jackpotGauge < 100) {
            endGame();
        }
    }

    draw();
}

function jackpotWin() {
    if (!gameState.running) return;
    gameState.running = false;
    clearInterval(gameLoop);
    document.getElementById('clearMsg').innerText = 'スコア: ' + gameState.score + '点！大当たり！';
    document.getElementById('clearScreen').style.display = 'flex';
}

function endGame() {
    gameState.running = false;
    clearInterval(gameLoop);
    document.getElementById('overMsg').innerText = 'スコア: ' + gameState.score + '点 ゲージ: ' + Math.round(gameState.jackpotGauge) + '%';
    document.getElementById('gameOverScreen').style.display = 'flex';
}

function draw() {
    // BG
    ctx.fillStyle = '#1a0530';
    ctx.fillRect(0, 0, W, H);

    // Board border
    ctx.strokeStyle = '#6b46c1';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);

    // Pegs
    for (const peg of pegs) {
        ctx.fillStyle = '#a0aec0';
        ctx.strokeStyle = '#718096';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(peg.x, peg.y, peg.r, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(peg.x - 2, peg.y - 2, 2, 0, Math.PI * 2);
        ctx.fill();
    }

    // Holes
    const holeY = H - 60;
    for (const hole of HOLES) {
        ctx.fillStyle = hole.color;
        ctx.fillRect(hole.x, holeY, hole.w, 50);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.strokeRect(hole.x, holeY, hole.w, 50);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(hole.label || hole.score, hole.x + hole.w / 2, holeY + 20);
        if (hole.jackpot) {
            ctx.fillStyle = '#f6e05e';
            ctx.font = '9px Arial';
            ctx.fillText('大当', hole.x + hole.w / 2, holeY + 38);
        }
    }

    // Balls
    for (const ball of gameState.balls) {
        if (!ball.active && ball.y > H) continue;
        // Trail
        for (let t = 0; t < ball.trail.length; t++) {
            const tr = ball.trail[t];
            ctx.globalAlpha = t / ball.trail.length * 0.4;
            ctx.fillStyle = '#f6e05e';
            ctx.beginPath();
            ctx.arc(tr.x, tr.y, BALL_R * 0.6, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#f6e05e';
        ctx.strokeStyle = '#d69e2e';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
    }

    // Flash texts
    for (const ft of gameState.flashTexts) {
        ctx.globalAlpha = ft.life / 50;
        ctx.fillStyle = ft.color;
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(ft.text, ft.x, ft.y);
    }
    ctx.globalAlpha = 1;

    // Jackpot gauge
    const gaugeX = 10, gaugeY = 8, gaugeW = W - 20, gaugeH = 18;
    ctx.fillStyle = '#2d3748';
    ctx.fillRect(gaugeX, gaugeY, gaugeW, gaugeH);
    const flashOn = gameState.jackpotFlash % 6 < 3;
    ctx.fillStyle = gameState.jackpotFlash > 0 ? (flashOn ? '#f6e05e' : '#dd6b20') : '#e53e3e';
    ctx.fillRect(gaugeX, gaugeY, gaugeW * (gameState.jackpotGauge / 100), gaugeH);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(gaugeX, gaugeY, gaugeW, gaugeH);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('大当たりゲージ ' + Math.round(gameState.jackpotGauge) + '%', W / 2, gaugeY + gaugeH / 2);

    // HUD
    ctx.fillStyle = '#f6e05e';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('スコア: ' + gameState.score, 8, 32);
    ctx.fillStyle = '#90cdf4';
    ctx.textAlign = 'right';
    ctx.fillText('残り ' + (MAX_BALLS - gameState.ballsUsed) + '球', W - 8, 32);

    // Launch zone hint
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(0, 0, W, 60);
    ctx.fillStyle = '#a0aec0';
    ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('クリックで発射！位置で弾道が変わる', W / 2, 50);
}

canvas.addEventListener('click', function(e) {
    const rect = canvas.getBoundingClientRect();
    const py = e.clientY - rect.top;
    if (py < 70) launchBall(e.clientX - rect.left);
    else launchBall(e.clientX - rect.left);
});
</script>
</body>
</html>
