<!DOCTYPE html>
<html>
<head>
  <title>爆破清掃隊</title>
  <style>
    * { margin: 0; padding: 0; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #222; font-family: Arial, sans-serif; }
    canvas { display: block; border: 2px solid #fff; background: #f5f5f5; }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GAME_STATE = { START: 0, PLAYING: 1, WIN: 2, LOSE: 3 };

let gameState = GAME_STATE.START;
let score = 0;
let time = 45;
const totalTime = 45;
let rubblesArray = [];
let particles = [];
let swipePath = [];
let isMouseDown = false;

class Rubble {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.size = 20 + Math.random() * 20;
    this.vx = (Math.random() - 0.5) * 4;
    this.vy = (Math.random() - 0.5) * 4;
    this.color = ['#ff6b6b','#feca57','#48dbfb','#1dd1a1','#ee5a6f','#a29bfe'][Math.floor(Math.random()*6)];
    this.rotation = Math.random() * Math.PI * 2;
    this.rotationSpeed = (Math.random() - 0.5) * 0.1;
    this.alpha = 1;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.1;
    this.rotation += this.rotationSpeed;
    if (this.x < this.size) { this.x = this.size; this.vx = Math.abs(this.vx) * 0.8; }
    if (this.x > canvas.width - this.size) { this.x = canvas.width - this.size; this.vx = -Math.abs(this.vx) * 0.8; }
    if (this.y > canvas.height - this.size) { this.y = canvas.height - this.size; this.vy = -Math.abs(this.vy) * 0.8; }
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
    ctx.restore();
  }
}

class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 10;
    this.vy = (Math.random() - 0.5) * 10 - 3;
    this.life = 40;
    this.maxLife = 40;
    this.size = 4 + Math.random() * 6;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.2;
    this.life--;
  }

  draw() {
    ctx.globalAlpha = this.life / this.maxLife;
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function initGame() {
  rubblesArray = [];
  particles = [];
  swipePath = [];
  score = 0;
  time = totalTime;
  gameState = GAME_STATE.PLAYING;
  for (let i = 0; i < 8; i++) {
    rubblesArray.push(new Rubble(
      Math.random() * (canvas.width - 80) + 40,
      Math.random() * (canvas.height - 80) + 40
    ));
  }
}

function tapExplosion(x, y) {
  const explosionRadius = 120;
  const hitIndices = [];
  for (let i = rubblesArray.length - 1; i >= 0; i--) {
    const r = rubblesArray[i];
    const dist = Math.hypot(r.x - x, r.y - y);
    if (dist < explosionRadius) {
      hitIndices.push(i);
      for (let j = 0; j < 8; j++) {
        particles.push(new Particle(r.x, r.y));
      }
    }
  }
  for (let i = hitIndices.length - 1; i >= 0; i--) {
    rubblesArray.splice(hitIndices[i], 1);
  }
  score += hitIndices.length * 10;
  return hitIndices.length;
}

function swipeCollection() {
  const suckRadius = 30;
  for (let i = rubblesArray.length - 1; i >= 0; i--) {
    const r = rubblesArray[i];
    for (let p of swipePath) {
      const dist = Math.hypot(r.x - p.x, r.y - p.y);
      if (dist < suckRadius) {
        particles.push(new Particle(r.x, r.y));
        rubblesArray.splice(i, 1);
        score += 5;
        break;
      }
    }
  }
}

function draw() {
  ctx.fillStyle = '#f5f5f5';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (gameState === GAME_STATE.START) {
    ctx.fillStyle = '#333';
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('爆破清掃隊', canvas.width / 2, 120);
    ctx.font = '18px Arial';
    ctx.fillStyle = '#666';
    ctx.fillText('タップで爆破！ドラッグで吸い込み！瓦礫をすべて破壊しよう', canvas.width / 2, 180);
    ctx.fillText('時間内に全ての瓦礫を破壊してクリア', canvas.width / 2, 220);
    ctx.fillStyle = '#fff';
    ctx.fillRect(canvas.width / 2 - 120, 280, 240, 60);
    ctx.fillStyle = '#333';
    ctx.font = 'bold 28px Arial';
    ctx.fillText('ゲーム開始', canvas.width / 2, 320);
  } else if (gameState === GAME_STATE.PLAYING) {
    for (let r of rubblesArray) {
      r.update();
      r.draw();
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      particles[i].draw();
      if (particles[i].life <= 0) particles.splice(i, 1);
    }
    if (swipePath.length > 1) {
      ctx.strokeStyle = 'rgba(100, 200, 255, 0.6)';
      ctx.lineWidth = 18;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(swipePath[0].x, swipePath[0].y);
      for (let i = 1; i < swipePath.length; i++) {
        ctx.lineTo(swipePath[i].x, swipePath[i].y);
      }
      ctx.stroke();
    }
    ctx.fillStyle = '#333';
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('破壊数: ' + score, 20, 30);
    ctx.fillText('時間: ' + Math.ceil(Math.max(0, time)) + 's', 20, 60);
    ctx.fillText('瓦礫: ' + rubblesArray.length, 20, 90);
    
    const timePercent = time / totalTime;
    if (timePercent < 0.3) {
      ctx.fillStyle = 'rgba(255, 0, 0, 0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let r of rubblesArray) {
        ctx.strokeStyle = 'rgba(255, 100, 0, 0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.size / 2 + 8, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
    if (rubblesArray.length <= 2 && rubblesArray.length > 0) {
      const pulse = 0.5 + Math.sin(Date.now() / 100) * 0.5;
      for (let r of rubblesArray) r.alpha = pulse;
      ctx.fillStyle = 'rgba(255, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  } else if (gameState === GAME_STATE.WIN) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00cc00';
    ctx.font = 'bold 56px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🎉 CLEAR！', canvas.width / 2, 140);
    ctx.fillStyle = '#333';
    ctx.font = 'bold 32px Arial';
    ctx.fillText('破壊数: ' + score, canvas.width / 2, 240);
    ctx.font = '20px Arial';
    ctx.fillText('余った時間: ' + Math.ceil(Math.max(0, time)) + '秒', canvas.width / 2, 280);
    ctx.fillStyle = '#fff';
    ctx.fillRect(canvas.width / 2 - 100, 340, 200, 50);
    ctx.fillStyle = '#333';
    ctx.font = 'bold 24px Arial';
    ctx.fillText('もう一度', canvas.width / 2, 375);
  } else if (gameState === GAME_STATE.LOSE) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.95)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff3333';
    ctx.font = 'bold 56px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('時間切れ！', canvas.width / 2, 140);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px Arial';
    ctx.fillText('破壊数: ' + score, canvas.width / 2, 240);
    ctx.font = '20px Arial';
    ctx.fillText('残り瓦礫: ' + rubblesArray.length + '個', canvas.width / 2, 280);
    ctx.fillStyle = '#fff';
    ctx.fillRect(canvas.width / 2 - 100, 340, 200, 50);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 24px Arial';
    ctx.fillText('リトライ', canvas.width / 2, 375);
  }
}

let lastTime = Date.now();
function gameLoop() {
  const now = Date.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  if (gameState === GAME_STATE.PLAYING) {
    time -= dt;
    if (rubblesArray.length === 0) gameState = GAME_STATE.WIN;
    if (time <= 0) gameState = GAME_STATE.LOSE;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  if (gameState === GAME_STATE.START) {
    if (x > canvas.width / 2 - 120 && x < canvas.width / 2 + 120 && y > 280 && y < 340) initGame();
  } else if (gameState === GAME_STATE.PLAYING) {
    isMouseDown = true;
    swipePath = [{ x, y }];
    tapExplosion(x, y);
  } else if (gameState === GAME_STATE.WIN || gameState === GAME_STATE.LOSE) {
    if (x > canvas.width / 2 - 100 && x < canvas.width / 2 + 100 && y > 340 && y < 390) initGame();
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (gameState === GAME_STATE.PLAYING && isMouseDown) {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    swipePath.push({ x, y });
    if (swipePath.length % 4 === 0) swipeCollection();
  }
});

canvas.addEventListener('mouseup', () => {
  isMouseDown = false;
  swipePath = [];
});

canvas.addEventListener('click', (e) => {
  if (gameState === GAME_STATE.PLAYING) {
    const rect = canvas.getBoundingClientRect();
    tapExplosion(e.clientX - rect.left, e.clientY - rect.top);
  }
});

canvas.addEventListener('touchstart', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  const y = e.touches[0].clientY - rect.top;
  if (gameState === GAME_STATE.START) {
    if (x > canvas.width / 2 - 120 && x < canvas.width / 2 + 120 && y > 280 && y < 340) initGame();
  } else if (gameState === GAME_STATE.PLAYING) {
    isMouseDown = true;
    swipePath = [{ x, y }];
    tapExplosion(x, y);
  } else if (gameState === GAME_STATE.WIN || gameState === GAME_STATE.LOSE) {
    if (x > canvas.width / 2 - 100 && x < canvas.width / 2 + 100 && y > 340 && y < 390) initGame();
  }
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (gameState === GAME_STATE.PLAYING && isMouseDown) {
    const rect = canvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;
    swipePath.push({ x, y });
    if (swipePath.length % 4 === 0) swipeCollection();
  }
});

canvas.addEventListener('touchend', () => {
  isMouseDown = false;
  swipePath = [];
});

gameLoop();
</script>
</body>
</html>
