<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CATCH IT</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f172a;
      font-family: 'Arial', sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    #gameContainer {
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    #startScreen,
    #gameScreen,
    #clearScreen,
    #gameOverScreen {
      display: none;
    }

    #startScreen {
      padding: 40px 20px;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 10px;
    }

    #startScreen h1 {
      font-size: 48px;
      margin-bottom: 20px;
      color: #6366f1;
      text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
    }

    #startScreen p {
      font-size: 16px;
      color: #cbd5e1;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    #startScreen .btn {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 30px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    #startScreen .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
    }

    #startScreen .btn:active {
      transform: translateY(0);
    }

    #gameScreen {
      padding: 20px;
    }

    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding: 0 10px;
      font-size: 16px;
      color: #94a3b8;
    }

    #score,
    #misses {
      font-weight: bold;
    }

    #score span,
    #misses span {
      color: #22c55e;
    }

    #misses span {
      color: #ef4444;
      letter-spacing: 4px;
    }

    canvas {
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid #6366f1;
      display: block;
      margin: 0 auto 15px;
      cursor: pointer;
      border-radius: 5px;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
    }

    #controls {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 10px;
    }

    #clearScreen,
    #gameOverScreen {
      padding: 40px 20px;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 10px;
    }

    #clearScreen h2,
    #gameOverScreen h2 {
      font-size: 42px;
      margin-bottom: 20px;
      margin-top: 20px;
    }

    #clearScreen h2 {
      color: #22c55e;
      text-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
    }

    #gameOverScreen h2 {
      color: #ef4444;
      text-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
    }

    .result-score {
      font-size: 24px;
      color: #cbd5e1;
      margin: 15px 0 30px 0;
    }

    .result-score strong {
      color: #6366f1;
      font-size: 28px;
    }

    .btn-retry {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      border: none;
      padding: 12px 35px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="startScreen" style="display:none;">
      <h1>🎯 CATCH IT</h1>
      <p>良いものをキャッチして、</p>
      <p>悪いものは避けよう！</p>
      <p style="font-size: 14px; color: #94a3b8; margin-top: 20px;">
        緑は +1 | 赤は ミス<br>
        20個キャッチでクリア
      </p>
      <button class="btn">START</button>
    </div>

    <div id="gameScreen" style="display:none;">
      <div id="hud">
        <div id="score">Score: <span>0</span></div>
        <div id="misses">Misses: <span>❤ ❤ ❤</span></div>
      </div>
      <canvas id="gameCanvas" width="400" height="550"></canvas>
      <div id="controls">👈 左クリック / 右クリック 👉 で移動</div>
    </div>

    <div id="clearScreen" style="display:none;">
      <h2>🎉 CLEAR!</h2>
      <div class="result-score">
        Final Score: <strong id="clearScore">20</strong>
      </div>
      <p style="color: #94a3b8; margin-bottom: 30px;">見事なキャッチ！</p>
      <button class="btn-retry">もう一度プレイ</button>
    </div>

    <div id="gameOverScreen" style="display:none;">
      <h2>💔 GAME OVER</h2>
      <div class="result-score">
        Final Score: <strong id="overScore">0</strong>
      </div>
      <p style="color: #94a3b8; margin-bottom: 30px;">あと少しだった！</p>
      <button class="btn-retry">リトライ</button>
    </div>
  </div>

  <script>
    const config = {
      title: 'CATCH IT',
      bg_color: '#0f172a',
      basket_color: '#6366f1',
      good_color: '#22c55e',
      bad_color: '#ef4444',
      basket_width: 80,
      basket_height: 20,
      target_catch: 20,
      fall_speed_init: 2,
      spawn_interval: 60
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    var gameState = {
      running: false,
      score: 0,
      misses: 0,
      basketX: (canvas.width - config.basket_width) / 2,
      frameCount: 0,
      fallSpeed: config.fall_speed_init,
      spawnCounter: 0
    };

    var items = [];
    var particles = [];
    var bgStars = [];

    function initBackgroundStars() {
      bgStars = [];
      for (let i = 0; i < 25; i++) {
        bgStars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 1 + 0.3,
          vy: 0.15
        });
      }
    }

    function spawnItem() {
      const isGood = Math.random() > 0.35;
      items.push({
        x: Math.random() * (canvas.width - 20),
        y: -20,
        radius: 10,
        vy: gameState.fallSpeed,
        type: isGood ? 'good' : 'bad'
      });
    }

    function updateItems() {
      for (let i = items.length - 1; i >= 0; i--) {
        items[i].y += items[i].vy;
        if (items[i].y > canvas.height + 20) {
          items.splice(i, 1);
          gameState.misses++;
        }
      }
    }

    function checkCollisions() {
      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        const basketLeft = gameState.basketX;
        const basketRight = gameState.basketX + config.basket_width;
        const basketTop = canvas.height - config.basket_height - 10;

        if (
          item.y + item.radius >= basketTop &&
          item.x + item.radius >= basketLeft &&
          item.x - item.radius <= basketRight
        ) {
          if (item.type === 'good') {
            gameState.score++;
            createParticles(item.x, item.y, true);
          } else {
            gameState.misses++;
            createParticles(item.x, item.y, false);
          }
          items.splice(i, 1);
        }
      }
    }

    function createParticles(x, y, isGood) {
      const count = 6;
      const color = isGood ? config.good_color : config.bad_color;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i;
        const speed = 2 + Math.random() * 1.5;
        particles.push({
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 0.5,
          life: 25,
          maxLife: 25,
          color: color
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.life--;
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }

    function draw() {
      ctx.fillStyle = config.bg_color;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawBackgroundStars();
      drawItems();
      drawParticles();
      drawBasket();
    }

    function drawBackgroundStars() {
      bgStars.forEach(star => {
        star.y = (star.y + star.vy) % (canvas.height + 10);
        ctx.fillStyle = 'rgba(100, 116, 139, 0.25)';
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawItems() {
      items.forEach(item => {
        ctx.fillStyle = item.type === 'good' ? config.good_color : config.bad_color;
        ctx.beginPath();
        ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        const alpha = (p.life / p.maxLife) * 0.8;
        ctx.fillStyle = p.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawBasket() {
      ctx.fillStyle = config.basket_color;
      ctx.fillRect(gameState.basketX, canvas.height - config.basket_height - 10, config.basket_width, config.basket_height);

      ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(gameState.basketX, canvas.height - config.basket_height - 10, config.basket_width, config.basket_height);
    }

    function updateHUD() {
      document.querySelector('#score span').textContent = gameState.score;
      const missDisplay = ['❤ ❤ ❤', '❤ ❤ ', '❤ ', ''][Math.min(gameState.misses, 3)];
      document.querySelector('#misses span').textContent = missDisplay;
    }

    function gameLoop() {
      if (!gameState.running) return;

      gameState.frameCount++;
      gameState.fallSpeed = config.fall_speed_init + (gameState.score * 0.04);

      gameState.spawnCounter++;
      if (gameState.spawnCounter >= config.spawn_interval) {
        spawnItem();
        gameState.spawnCounter = 0;
      }

      updateItems();
      checkCollisions();
      updateParticles();
      updateHUD();
      draw();

      if (gameState.score >= config.target_catch) {
        clearGame();
      }
      if (gameState.misses >= 3) {
        gameOverFunc();
      }
    }

    function startGame() {
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('gameScreen').style.display = 'block';
      gameState.score = 0;
      gameState.misses = 0;
      gameState.frameCount = 0;
      gameState.spawnCounter = 0;
      gameState.fallSpeed = config.fall_speed_init;
      items = [];
      particles = [];
      initBackgroundStars();
      gameState.running = true;
      updateHUD();
    }

    function retryGame() {
      gameState.running = false;
      document.getElementById('clearScreen').style.display = 'none';
      document.getElementById('gameOverScreen').style.display = 'none';
      document.getElementById('gameScreen').style.display = 'block';
      gameState.score = 0;
      gameState.misses = 0;
      gameState.frameCount = 0;
      gameState.spawnCounter = 0;
      gameState.fallSpeed = config.fall_speed_init;
      items = [];
      particles = [];
      initBackgroundStars();
      updateHUD();
      gameState.running = true;
    }

    function clearGame() {
      gameState.running = false;
      document.getElementById('gameScreen').style.display = 'none';
      document.getElementById('clearScreen').style.display = 'block';
      document.getElementById('clearScore').textContent = gameState.score;
    }

    function gameOverFunc() {
      gameState.running = false;
      document.getElementById('gameScreen').style.display = 'none';
      document.getElementById('gameOverScreen').style.display = 'block';
      document.getElementById('overScore').textContent = gameState.score;
    }

    canvas.addEventListener('click', (e) => {
      if (!gameState.running) return;
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const moveAmount = 40;

      if (clickX < canvas.width / 2) {
        gameState.basketX = Math.max(0, gameState.basketX - moveAmount);
      } else {
        gameState.basketX = Math.min(canvas.width - config.basket_width, gameState.basketX + moveAmount);
      }
    });

    document.querySelector('#startScreen .btn').addEventListener('click', startGame);

    document.querySelectorAll('.btn-retry').forEach(btn => {
      btn.addEventListener('click', retryGame);
    });

    window.addEventListener('DOMContentLoaded', () => {
      initBackgroundStars();
      document.getElementById('startScreen').style.display = 'block';
      setInterval(gameLoop, 16);
    });
  </script>
</body>
</html>
