<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CATCH IT</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0e27;
      font-family: Arial, sans-serif;
      color: #fff;
    }
    
    #gameContainer {
      position: relative;
      width: 400px;
      height: 550px;
      background: #0f172a;
      border: 2px solid #4f46e5;
      overflow: hidden;
    }
    
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    
    #startScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.98);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    
    #startScreen h1 {
      font-size: 48px;
      margin-bottom: 20px;
      color: #6366f1;
      text-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
    }
    
    #startScreen p {
      font-size: 14px;
      color: #a5b4fc;
      margin-bottom: 30px;
      text-align: center;
      line-height: 1.6;
    }
    
    #startScreen .btn {
      padding: 12px 35px;
      font-size: 18px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    
    #startScreen .btn:hover {
      background: #4f46e5;
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.7);
    }
    
    #gameOverScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.98);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    
    #gameOverScreen h2 {
      font-size: 40px;
      margin-bottom: 20px;
      color: #ef4444;
    }
    
    #gameOverScreen p {
      font-size: 18px;
      margin-bottom: 30px;
      color: #fca5a5;
    }
    
    #gameOverScreen .btn {
      padding: 12px 35px;
      font-size: 18px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    
    #gameOverScreen .btn:hover {
      background: #dc2626;
    }
    
    #clearScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.98);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    
    #clearScreen h2 {
      font-size: 40px;
      margin-bottom: 20px;
      color: #22c55e;
      text-shadow: 0 0 15px rgba(34, 197, 94, 0.7);
    }
    
    #clearScreen p {
      font-size: 18px;
      margin-bottom: 30px;
      color: #86efac;
    }
    
    #clearScreen .btn {
      padding: 12px 35px;
      font-size: 18px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    
    #clearScreen .btn:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="canvas" width="400" height="550"></canvas>
    
    <div id="startScreen" style="display: none;">
      <h1>CATCH IT</h1>
      <p>落ちてくるアイテムをキャッチしよう！<br><br>
      🟢 緑 = Good +1点<br>
      🔴 赤 = Bad ミス+1<br><br>
      10個キャッチでクリア！</p>
      <button class="btn">START</button>
    </div>
    
    <div id="gameOverScreen">
      <h2>GAME OVER</h2>
      <p id="gameOverText">ミスが3回になりました</p>
      <button class="btn">RETRY</button>
    </div>
    
    <div id="clearScreen">
      <h2>CLEAR!</h2>
      <p id="clearText">10個キャッチしました！</p>
      <button class="btn">RETRY</button>
    </div>
  </div>

  <script>
    const config = {
      title: 'CATCH IT',
      bg_color: '#0f172a',
      basket_color: '#6366f1',
      good_color: '#22c55e',
      bad_color: '#ef4444',
      basket_width: 80,
      basket_height: 20,
      target_catch: 10,
      fall_speed_init: 3,
      spawn_interval: 40
    };

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let gameState = {
      running: false,
      score: 0,
      misses: 0,
      items: [],
      particles: [],
      basket: {
        x: (canvas.width - config.basket_width) / 2,
        y: canvas.height - 40
      },
      spawnCounter: 0,
      halfWayFrame: 0,
      ambientOffset: 0
    };

    function getDifficultySettings() {
      if (gameState.score < 4) {
        return {
          fall_speed: 3,
          spawn_interval: 40,
          max_concurrent: 2,
          bad_ratio: 0
        };
      } else if (gameState.score < 7) {
        return {
          fall_speed: 4.5,
          spawn_interval: 30,
          max_concurrent: 3,
          bad_ratio: 0.3
        };
      } else {
        return {
          fall_speed: 6,
          spawn_interval: 22,
          max_concurrent: 4,
          bad_ratio: 0.4
        };
      }
    }

    function spawnItem() {
      const difficulty = getDifficultySettings();
      const currentCount = gameState.items.length;
      
      if (currentCount >= difficulty.max_concurrent) {
        return;
      }

      const isBad = Math.random() < difficulty.bad_ratio;
      const item = {
        x: Math.random() * (canvas.width - 30) + 15,
        y: -20,
        radius: 15,
        is_bad: isBad,
        caught: false
      };
      gameState.items.push(item);
    }

    function updateBasket(mouseX) {
      if (mouseX < canvas.width / 2) {
        gameState.basket.x = Math.max(0, gameState.basket.x - 50);
      } else {
        gameState.basket.x = Math.min(canvas.width - config.basket_width, gameState.basket.x + 50);
      }
    }

    function spawnParticles(x, y) {
      for (let i = 0; i < 5; i++) {
        const angle = (Math.PI * 2 * i) / 5;
        const velocity = {
          x: Math.cos(angle) * 3,
          y: Math.sin(angle) * 3 - 2
        };
        gameState.particles.push({
          x: x,
          y: y,
          vx: velocity.x,
          vy: velocity.y,
          life: 30,
          max_life: 30
        });
      }
    }

    function checkCollision(item) {
      const basket_left = gameState.basket.x;
      const basket_right = gameState.basket.x + config.basket_width;
      const basket_top = gameState.basket.y;
      const basket_bottom = gameState.basket.y + config.basket_height;

      return item.x > basket_left &&
             item.x < basket_right &&
             item.y + item.radius > basket_top &&
             item.y - item.radius < basket_bottom;
    }

    function drawBackgroundStars() {
      gameState.ambientOffset += 0.3;
      ctx.fillStyle = 'rgba(165, 180, 252, 0.12)';
      for (let i = 0; i < 20; i++) {
        const x = ((gameState.ambientOffset + i * 35) % canvas.width);
        const y = 30 + (i % 5) * 110;
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawBasket() {
      ctx.fillStyle = config.basket_color;
      ctx.fillRect(gameState.basket.x, gameState.basket.y, config.basket_width, config.basket_height);
      ctx.strokeStyle = '#a5b4fc';
      ctx.lineWidth = 2;
      ctx.strokeRect(gameState.basket.x, gameState.basket.y, config.basket_width, config.basket_height);
    }

    function drawItem(item) {
      ctx.fillStyle = item.is_bad ? config.bad_color : config.good_color;
      ctx.beginPath();
      ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    function drawUI() {
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 16px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('SCORE: ' + gameState.score, 10, 25);
      
      ctx.font = 'bold 16px Arial';
      ctx.textAlign = 'right';
      let missText = '';
      for (let i = 0; i < 3; i++) {
        missText += i < (3 - gameState.misses) ? '❤ ' : '✕ ';
      }
      ctx.fillText(missText, canvas.width - 10, 25);

      ctx.fillStyle = 'rgba(165, 180, 252, 0.5)';
      ctx.font = '11px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('クリックで左右移動', canvas.width / 2, canvas.height - 8);
    }

    function drawParticles() {
      for (let i = gameState.particles.length - 1; i >= 0; i--) {
        const p = gameState.particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 1;
        p.vy += 0.15;

        const alpha = p.life / p.max_life;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = config.good_color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();

        if (p.life <= 0) {
          gameState.particles.splice(i, 1);
        }
      }
      ctx.globalAlpha = 1;
    }

    function drawHalfWayMessage() {
      const opacity = Math.max(0, (60 - gameState.halfWayFrame) / 60);
      ctx.globalAlpha = opacity;
      ctx.fillStyle = '#22c55e';
      ctx.font = 'bold 28px Arial';
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(34, 197, 94, 0.8)';
      ctx.shadowBlur = 10;
      ctx.fillText('HALF WAY!', canvas.width / 2, canvas.height / 2);
      ctx.shadowColor = 'transparent';
      ctx.globalAlpha = 1;
      ctx.textAlign = 'left';
    }

    function gameLoop() {
      ctx.fillStyle = config.bg_color;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawBackgroundStars();

      if (!gameState.running) {
        drawBasket();
        drawUI();
        return;
      }

      const difficulty = getDifficultySettings();

      gameState.spawnCounter++;
      if (gameState.spawnCounter >= difficulty.spawn_interval) {
        spawnItem();
        gameState.spawnCounter = 0;
      }

      for (let i = gameState.items.length - 1; i >= 0; i--) {
        const item = gameState.items[i];
        item.y += difficulty.fall_speed;

        if (checkCollision(item) && !item.caught) {
          item.caught = true;
          spawnParticles(item.x, item.y);
          
          if (!item.is_bad) {
            gameState.score++;
            if (gameState.score === 5) {
              gameState.halfWayFrame = 60;
            }
          } else {
            gameState.misses++;
          }

          gameState.items.splice(i, 1);
        } else if (item.y > canvas.height) {
          gameState.items.splice(i, 1);
        }
      }

      if (gameState.score >= config.target_catch) {
        gameState.running = false;
        document.getElementById('clearText').textContent = 'スコア: ' + gameState.score;
        document.getElementById('clearScreen').style.display = 'flex';
      }

      if (gameState.misses >= 3) {
        gameState.running = false;
        document.getElementById('gameOverText').textContent = 'スコア: ' + gameState.score;
        document.getElementById('gameOverScreen').style.display = 'flex';
      }

      drawBasket();
      for (let item of gameState.items) {
        drawItem(item);
      }
      drawParticles();
      drawUI();

      if (gameState.halfWayFrame > 0) {
        drawHalfWayMessage();
        gameState.halfWayFrame--;
      }
    }

    function retryGame() {
      gameState.running = false;
      gameState.score = 0;
      gameState.misses = 0;
      gameState.items = [];
      gameState.particles = [];
      gameState.basket.x = (canvas.width - config.basket_width) / 2;
      gameState.spawnCounter = 0;
      gameState.halfWayFrame = 0;
      document.getElementById('gameOverScreen').style.display = 'none';
      document.getElementById('clearScreen').style.display = 'none';
      document.getElementById('startScreen').style.display = 'flex';
    }

    function startGame() {
      document.getElementById('startScreen').style.display = 'none';
      gameState.running = true;
    }

    document.querySelector('#startScreen .btn').addEventListener('click', startGame);
    document.querySelector('#gameOverScreen .btn').addEventListener('click', retryGame);
    document.querySelector('#clearScreen .btn').addEventListener('click', retryGame);

    canvas.addEventListener('click', (e) => {
      if (gameState.running) {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        updateBasket(mouseX);
      }
    });

    document.getElementById('startScreen').style.display = 'flex';
    setInterval(gameLoop, 16);
  </script>
</body>
</html>
