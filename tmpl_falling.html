<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATCH IT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: 'Arial', sans-serif;
        }
        .container {
            position: relative;
            width: 400px;
            height: 550px;
            background-color: #0f172a;
            border: 2px solid #6366f1;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            background-color: rgba(15, 23, 42, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #startScreen h1 {
            color: #6366f1;
            font-size: 48px;
            margin-bottom: 20px;
        }
        #startScreen p {
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.4;
        }
        #startScreen .btn {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #6366f1;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #startScreen .btn:hover {
            background-color: #7c3aed;
        }
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            background-color: rgba(15, 23, 42, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #gameOverScreen h1 {
            color: #ef4444;
            font-size: 48px;
            margin-bottom: 20px;
        }
        #gameOverScreen p {
            color: #cbd5e1;
            font-size: 18px;
            margin-bottom: 30px;
        }
        #gameOverScreen .btn {
            padding: 12px 30px;
            font-size: 16px;
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #gameOverScreen .btn:hover {
            background-color: #dc2626;
        }
        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            background-color: rgba(15, 23, 42, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #clearScreen h1 {
            color: #22c55e;
            font-size: 48px;
            margin-bottom: 20px;
        }
        #clearScreen p {
            color: #cbd5e1;
            font-size: 18px;
            margin-bottom: 30px;
        }
        #clearScreen .btn {
            padding: 12px 30px;
            font-size: 16px;
            background-color: #22c55e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #clearScreen .btn:hover {
            background-color: #16a34a;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="gameCanvas" width="400" height="550"></canvas>
        <div id="startScreen">
            <h1>CATCH IT</h1>
            <p>左右をクリックしてバスケットを動かす<br>良いアイテムを20個キャッチしよう！</p>
            <button class="btn">START</button>
        </div>
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <p id="gameOverScore"></p>
            <button class="btn">RETRY</button>
        </div>
        <div id="clearScreen">
            <h1>CLEAR!</h1>
            <p id="clearScore"></p>
            <button class="btn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const config = {
            title: 'CATCH IT',
            bg_color: '#0f172a',
            basket_color: '#6366f1',
            good_color: '#22c55e',
            bad_color: '#ef4444',
            basket_width: 80,
            basket_height: 20,
            target_catch: 20,
            fall_speed_init: 2,
            spawn_interval: 60
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = {
            running: false,
            gameOver: false,
            cleared: false,
            score: 0,
            misses: 0,
            basketX: (canvas.width - config.basket_width) / 2,
            items: [],
            particles: [],
            spawnCounter: 0,
            ambientStars: [],
            frameCount: 0
        };

        function initAmbientStars() {
            gameState.ambientStars = [];
            for (let i = 0; i < 30; i++) {
                gameState.ambientStars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1 + 0.5,
                    opacity: Math.random() * 0.5 + 0.1,
                    speed: Math.random() * 0.3 + 0.1
                });
            }
        }

        function drawAmbientStars() {
            gameState.ambientStars.forEach(star => {
                ctx.fillStyle = `rgba(148, 163, 184, ${star.opacity})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();

                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = -star.radius;
                }
            });
        }

        function spawnItem() {
            const isGood = Math.random() > 0.4;
            gameState.items.push({
                x: Math.random() * (canvas.width - 30),
                y: -20,
                radius: 12,
                vx: 0,
                vy: config.fall_speed_init,
                isGood: isGood,
                type: isGood ? (Math.random() > 0.5 ? 'fruit' : 'star') : (Math.random() > 0.5 ? 'lightning' : 'x')
            });
        }

        function drawItem(item) {
            ctx.save();

            if (item.isGood) {
                ctx.fillStyle = config.good_color;
                if (item.type === 'star') {
                    drawStar(ctx, item.x, item.y, 5, item.radius, item.radius * 0.4);
                } else {
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else {
                ctx.fillStyle = config.bad_color;
                if (item.type === 'lightning') {
                    drawLightning(ctx, item.x, item.y, item.radius);
                } else {
                    ctx.font = `bold ${item.radius * 2}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('X', item.x, item.y);
                }
            }

            ctx.restore();
        }

        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
                rot += step;

                ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
        }

        function drawLightning(ctx, x, y, size) {
            ctx.strokeStyle = config.bad_color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y - size);
            ctx.lineTo(x - size * 0.3, y - size * 0.3);
            ctx.lineTo(x - size * 0.1, y);
            ctx.lineTo(x, y + size);
            ctx.stroke();
        }

        function drawBasket() {
            ctx.fillStyle = config.basket_color;
            ctx.fillRect(gameState.basketX, canvas.height - config.basket_height - 5, config.basket_width, config.basket_height);
        }

        function drawUI() {
            ctx.fillStyle = '#cbd5e1';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`Score: ${gameState.score}`, 10, 25);

            ctx.textAlign = 'right';
            let missText = '♥'.repeat(3 - gameState.misses);
            ctx.fillText(missText, canvas.width - 10, 25);

            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('クリックで左右移動', canvas.width / 2, canvas.height - 10);
        }

        function drawParticles() {
            for (let i = gameState.particles.length - 1; i >= 0; i--) {
                const p = gameState.particles[i];
                ctx.fillStyle = `rgba(34, 197, 86, ${p.life / p.maxLife})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();

                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life--;

                if (p.life <= 0) {
                    gameState.particles.splice(i, 1);
                }
            }
        }

        function createParticles(x, y) {
            for (let i = 0; i < 5; i++) {
                const angle = (Math.PI * 2 * i) / 5;
                gameState.particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * 2,
                    vy: Math.sin(angle) * 2,
                    radius: 3,
                    life: 20,
                    maxLife: 20
                });
            }
        }

        function checkCollision(item) {
            const basketLeft = gameState.basketX;
            const basketRight = gameState.basketX + config.basket_width;
            const basketTop = canvas.height - config.basket_height - 5;
            const basketBottom = canvas.height - 5;

            const itemLeft = item.x - item.radius;
            const itemRight = item.x + item.radius;
            const itemTop = item.y - item.radius;
            const itemBottom = item.y + item.radius;

            return !(itemRight < basketLeft || itemLeft > basketRight ||
                     itemBottom < basketTop || itemTop > basketBottom);
        }

        function gameLoop() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawAmbientStars();

            if (gameState.running) {
                gameState.spawnCounter++;
                if (gameState.spawnCounter >= config.spawn_interval) {
                    spawnItem();
                    gameState.spawnCounter = 0;
                }

                for (let i = gameState.items.length - 1; i >= 0; i--) {
                    const item = gameState.items[i];
                    item.y += item.vy;
                    item.vy += 0.1;

                    if (checkCollision(item)) {
                        if (item.isGood) {
                            gameState.score++;
                            createParticles(item.x, item.y);
                            if (gameState.score >= config.target_catch) {
                                gameState.running = false;
                                gameState.cleared = true;
                                showClearScreen();
                            }
                        } else {
                            gameState.misses++;
                            if (gameState.misses >= 3) {
                                gameState.running = false;
                                gameState.gameOver = true;
                                showGameOverScreen();
                            }
                        }
                        gameState.items.splice(i, 1);
                    } else if (item.y > canvas.height) {
                        gameState.items.splice(i, 1);
                    } else {
                        drawItem(item);
                    }
                }

                drawParticles();
            }

            drawBasket();
            drawUI();
            gameState.frameCount++;
        }

        function showStartScreen() {
            const startScreen = document.getElementById('startScreen');
            startScreen.style.display = 'flex';
        }

        function hideStartScreen() {
            const startScreen = document.getElementById('startScreen');
            startScreen.style.display = 'none';
        }

        function showGameOverScreen() {
            const gameOverScreen = document.getElementById('gameOverScreen');
            const scoreDisplay = document.getElementById('gameOverScore');
            scoreDisplay.textContent = `スコア: ${gameState.score}`;
            gameOverScreen.style.display = 'flex';
        }

        function hideGameOverScreen() {
            const gameOverScreen = document.getElementById('gameOverScreen');
            gameOverScreen.style.display = 'none';
        }

        function showClearScreen() {
            const clearScreen = document.getElementById('clearScreen');
            const scoreDisplay = document.getElementById('clearScore');
            scoreDisplay.textContent = `スコア: ${gameState.score}`;
            clearScreen.style.display = 'flex';
        }

        function hideClearScreen() {
            const clearScreen = document.getElementById('clearScreen');
            clearScreen.style.display = 'none';
        }

        function startGame() {
            gameState.running = true;
            gameState.gameOver = false;
            gameState.cleared = false;
            gameState.score = 0;
            gameState.misses = 0;
            gameState.items = [];
            gameState.particles = [];
            gameState.spawnCounter = 0;
            gameState.basketX = (canvas.width - config.basket_width) / 2;
            hideStartScreen();
            hideClearScreen();
            hideGameOverScreen();
        }

        function retryGame() {
            gameState.running = false;
            startGame();
        }

        canvas.addEventListener('click', (e) => {
            if (gameState.running) {
                const rect = canvas.getBoundingClientRect();
                const clickX = e.clientX - rect.left;

                if (clickX < canvas.width / 2) {
                    gameState.basketX = Math.max(0, gameState.basketX - 40);
                } else {
                    gameState.basketX = Math.min(canvas.width - config.basket_width, gameState.basketX + 40);
                }
            }
        });

        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('btn')) {
                const parentId = e.target.parentElement.id;
                if (parentId === 'startScreen') {
                    startGame();
                } else if (parentId === 'gameOverScreen') {
                    retryGame();
                } else if (parentId === 'clearScreen') {
                    retryGame();
                }
            }
        });

        initAmbientStars();
        showStartScreen();
        setInterval(gameLoop, 16);
    </script>
</body>
</html>
