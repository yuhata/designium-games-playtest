<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINBALL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #container {
            position: relative;
            width: 360px;
            height: 700px;
            background: #0a0a1a;
            border: 2px solid #4299e1;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 600px;
            background: #0a0a1a;
        }
        #hud {
            width: 100%;
            height: 100px;
            background: #0a0a1a;
            border-top: 1px solid #4299e1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: #c0c0c0;
            font-size: 18px;
            font-weight: bold;
        }
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .overlay-text {
            color: #f59e0b;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        .overlay-subtitle {
            color: #c0c0c0;
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }
        .btn {
            padding: 12px 30px;
            font-size: 18px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover {
            background: #3182ce;
        }
        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="gameCanvas" width="360" height="600"></canvas>
        <div id="hud">
            <div>SCORE: <span id="scoreDisplay">0</span></div>
            <div>LIVES: <span id="livesDisplay">3</span></div>
        </div>
        <div id="startScreen" style="display: none;">
            <div class="overlay-text">PINBALL</div>
            <div class="overlay-subtitle">Click left/right half of screen to control flippers</div>
            <button class="btn">START</button>
        </div>
        <div id="gameOverScreen" style="display: none;">
            <div class="overlay-text">GAME OVER</div>
            <div class="overlay-subtitle">Final Score: <span id="finalScore">0</span></div>
            <button class="btn">RETRY</button>
        </div>
        <div id="clearScreen" style="display: none;">
            <div class="overlay-text">CLEAR!</div>
            <div class="overlay-subtitle">HIGH SCORE: <span id="clearScore">0</span></div>
            <button class="btn">RETRY</button>
        </div>
    </div>

    <script>
        const config = {
            title: 'PINBALL',
            bg_color: '#0a0a1a',
            ball_color: '#c0c0c0',
            flipper_color: '#4299e1',
            bumper_color: '#f59e0b',
            win_score: 500,
            ball_lives: 3,
            bumper_score: 50,
            wall_score: 10
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        var gameState = {
            running: false,
            score: 0,
            lives: config.ball_lives,
            ball: {
                x: 180,
                y: 150,
                vx: 0,
                vy: 0,
                radius: 10
            },
            flippers: [
                {
                    x: 80,
                    y: 560,
                    length: 60,
                    width: 12,
                    angle: 0,
                    maxAngle: Math.PI / 3,
                    active: false,
                    isLeft: true
                },
                {
                    x: 280,
                    y: 560,
                    length: 60,
                    width: 12,
                    angle: 0,
                    maxAngle: Math.PI / 3,
                    active: false,
                    isLeft: false
                }
            ],
            bumpers: [],
            particles: [],
            lastBumperHit: -1,
            lastBumperHitFrame: -999
        };

        function initBumpers() {
            gameState.bumpers = [];
            const bumperPositions = [
                { x: 120, y: 140 },
                { x: 240, y: 140 },
                { x: 80, y: 280 },
                { x: 280, y: 280 },
                { x: 180, y: 360 },
                { x: 140, y: 450 }
            ];
            for (let pos of bumperPositions) {
                gameState.bumpers.push({
                    x: pos.x,
                    y: pos.y,
                    radius: 18,
                    lastHitFrame: -999
                });
            }
        }

        function resetBall() {
            gameState.ball.x = 180;
            gameState.ball.y = 150;
            gameState.ball.vx = 0;
            gameState.ball.vy = 0;
        }

        function startGame() {
            gameState.running = true;
            gameState.score = 0;
            gameState.lives = config.ball_lives;
            gameState.particles = [];
            gameState.lastBumperHit = -1;
            gameState.lastBumperHitFrame = -999;
            initBumpers();
            resetBall();
            updateHUD();
            hideAllOverlays();
        }

        function retryGame() {
            gameState.running = false;
            gameState.score = 0;
            gameState.lives = config.ball_lives;
            gameState.particles = [];
            gameState.lastBumperHit = -1;
            gameState.lastBumperHitFrame = -999;
            initBumpers();
            resetBall();
            updateHUD();
            showStartScreen();
        }

        function hideAllOverlays() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
        }

        function showStartScreen() {
            document.getElementById('startScreen').style.display = 'flex';
        }

        function showGameOverScreen() {
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('finalScore').textContent = gameState.score;
        }

        function showClearScreen() {
            document.getElementById('clearScreen').style.display = 'flex';
            document.getElementById('clearScore').textContent = gameState.score;
        }

        function updateHUD() {
            document.getElementById('scoreDisplay').textContent = gameState.score;
            document.getElementById('livesDisplay').textContent = gameState.lives;
        }

        function addScore(points) {
            gameState.score += points;
            updateHUD();
            if (gameState.score >= config.win_score) {
                gameState.running = false;
                showClearScreen();
            }
        }

        function addParticle(x, y, text, color) {
            gameState.particles.push({
                x: x,
                y: y,
                text: text,
                color: color,
                life: 60,
                maxLife: 60
            });
        }

        var frameCounter = 0;
        function updatePhysics() {
            if (!gameState.running) return;

            frameCounter++;
            const ball = gameState.ball;

            ball.vy += 0.3;

            const maxSpeed = 12;
            const currentSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            if (currentSpeed > maxSpeed) {
                const ratio = maxSpeed / currentSpeed;
                ball.vx *= ratio;
                ball.vy *= ratio;
            }

            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.vx *= -0.8;
            }
            if (ball.x + ball.radius > canvas.width) {
                ball.x = canvas.width - ball.radius;
                ball.vx *= -0.8;
            }
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy *= -0.8;
            }

            if (ball.y - ball.radius > canvas.height) {
                gameState.lives--;
                updateHUD();
                if (gameState.lives <= 0) {
                    gameState.running = false;
                    showGameOverScreen();
                } else {
                    resetBall();
                }
                return;
            }

            for (let i = 0; i < gameState.bumpers.length; i++) {
                const bumper = gameState.bumpers[i];
                const dx = ball.x - bumper.x;
                const dy = ball.y - bumper.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < ball.radius + bumper.radius) {
                    if (i === gameState.lastBumperHit && frameCounter - gameState.lastBumperHitFrame < 5) {
                        continue;
                    }

                    const angle = Math.atan2(dy, dx);
                    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy) + 2;
                    const cappedSpeed = Math.min(speed, 8);
                    ball.vx = Math.cos(angle) * cappedSpeed;
                    ball.vy = Math.sin(angle) * cappedSpeed;

                    ball.x = bumper.x + Math.cos(angle) * (ball.radius + bumper.radius);
                    ball.y = bumper.y + Math.sin(angle) * (ball.radius + bumper.radius);

                    gameState.lastBumperHit = i;
                    gameState.lastBumperHitFrame = frameCounter;

                    addScore(config.bumper_score);
                    addParticle(bumper.x, bumper.y, '+' + config.bumper_score, config.bumper_color);
                }
            }

            for (let flipper of gameState.flippers) {
                if (!flipper.active) continue;

                const fx = flipper.x + Math.cos(flipper.angle) * flipper.length;
                const fy = flipper.y + Math.sin(flipper.angle) * flipper.length;

                const closestX = Math.max(flipper.x, Math.min(ball.x, fx));
                const closestY = Math.max(flipper.y, Math.min(ball.y, fy));

                const dx = ball.x - closestX;
                const dy = ball.y - closestY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < ball.radius + flipper.width / 2) {
                    ball.vy = -12;
                    ball.x += Math.random() * 10 - 5;
                }
            }

            for (let flipper of gameState.flippers) {
                if (flipper.active) {
                    flipper.angle = Math.min(flipper.angle + 0.15, flipper.maxAngle);
                } else {
                    flipper.angle = Math.max(flipper.angle - 0.1, 0);
                }
            }
        }

        function updateParticles() {
            for (let i = gameState.particles.length - 1; i >= 0; i--) {
                const p = gameState.particles[i];
                p.life--;
                p.y -= 1;
                if (p.life <= 0) {
                    gameState.particles.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#4299e1';
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);

            ctx.fillStyle = config.ball_color;
            ctx.beginPath();
            ctx.arc(gameState.ball.x, gameState.ball.y, gameState.ball.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = config.bumper_color;
            for (let bumper of gameState.bumpers) {
                ctx.beginPath();
                ctx.arc(bumper.x, bumper.y, bumper.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fbbf24';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            ctx.fillStyle = config.flipper_color;
            for (let flipper of gameState.flippers) {
                const fx = flipper.x + Math.cos(flipper.angle) * flipper.length;
                const fy = flipper.y + Math.sin(flipper.angle) * flipper.length;

                ctx.lineWidth = flipper.width;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(flipper.x, flipper.y);
                ctx.lineTo(fx, fy);
                ctx.stroke();

                ctx.fillStyle = config.flipper_color;
                ctx.beginPath();
                ctx.arc(flipper.x, flipper.y, flipper.width / 2, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = config.bumper_color;
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            for (let p of gameState.particles) {
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillText(p.text, p.x, p.y);
                ctx.globalAlpha = 1;
            }
        }

        function gameLoop() {
            updatePhysics();
            updateParticles();
            draw();
        }

        canvas.addEventListener('pointerdown', (e) => {
            if (!gameState.running) return;
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            
            if (clickX < canvas.width / 2) {
                gameState.flippers[0].active = true;
            } else {
                gameState.flippers[1].active = true;
            }
        });

        canvas.addEventListener('pointerup', () => {
            gameState.flippers[0].active = false;
            gameState.flippers[1].active = false;
        });

        canvas.addEventListener('pointerleave', () => {
            gameState.flippers[0].active = false;
            gameState.flippers[1].active = false;
        });

        document.querySelector('#startScreen .btn').addEventListener('click', () => {
            startGame();
        });

        const gameOverBtn = document.querySelector('#gameOverScreen .btn');
        const clearBtn = document.querySelector('#clearScreen .btn');
        
        gameOverBtn.addEventListener('click', () => {
            retryGame();
        });
        
        clearBtn.addEventListener('click', () => {
            retryGame();
        });

        showStartScreen();
        setInterval(gameLoop, 16);
    </script>
</body>
</html>
