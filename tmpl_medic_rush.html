<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MEDIC RUSH</title>
  <style>
    body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #f0f0f0; }
    #gameContainer { position: relative; width: 800px; height: 600px; margin: 0 auto; }
    canvas { display: block; background: #e8f4f8; border: 2px solid #333; touch-action: none; }
    #startScreen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10;
    }
    #startScreen h1 { color: white; font-size: 56px; margin: 0 0 20px 0; text-shadow: 3px 3px 6px rgba(0,0,0,0.4); }
    #startScreen p { color: white; font-size: 20px; margin: 0 0 50px 0; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); }
    #startBtn {
      padding: 18px 50px;
      font-size: 28px;
      font-weight: bold;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    #startBtn:hover { background: #ff5252; transform: scale(1.08); }
    #startBtn:active { transform: scale(0.95); }
    #endScreen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.97);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    #endScreen h2 { font-size: 56px; margin: 0 0 30px 0; }
    #endScreen p { font-size: 20px; margin: 10px; color: #333; }
    #retryBtn {
      margin-top: 40px;
      padding: 14px 40px;
      font-size: 20px;
      font-weight: bold;
      background: #2196f3;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    #retryBtn:hover { background: #1976d2; }
    #score { position: absolute; top: 10px; left: 10px; font-size: 18px; font-weight: bold; }
  </style>
</head>
<body>
<!--GAME_SPEC
{
  "win_condition": "patientsHealed >= 8 within 90 seconds",
  "fail_condition": "timer <= 0 while patientsHealed < 8",
  "input_types": ["click"],
  "state_vars": ["score", "patientsHealed", "timer"],
  "core_loop": "click patient → healing animation → score++/patientsHealed++ → new patient spawns → check win/fail",
  "clear_trigger": "patientsHealed == totalPatients (8)",
  "gameover_trigger": "timer <= 0 && patientsHealed < totalPatients"
}
-->

<div id="gameContainer">
  <div id="startScreen">
    <h1>MEDIC RUSH</h1>
    <p>患者さんたちを救出しよう！</p>
    <button id="startBtn">START GAME</button>
  </div>
  <div id="endScreen">
    <h2 id="endTitle">PROTECTED!</h2>
    <p id="endMessage">患者さんたちを全員救出しました！</p>
    <p id="finalScore">Final Score: 0</p>
    <button id="retryBtn">PLAY AGAIN</button>
  </div>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div id="score">Score: 0</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('startScreen');
const endScreen = document.getElementById('endScreen');
const startBtn = document.getElementById('startBtn');
const retryBtn = document.getElementById('retryBtn');
const scoreDisplay = document.getElementById('score');
const endTitle = document.getElementById('endTitle');
const endMessage = document.getElementById('endMessage');
const finalScore = document.getElementById('finalScore');

const gameState = {
  phase: 'start',
  timer: 90,
  score: 0,
  patientsHealed: 0,
  totalPatients: 8,
  patients: [],
  healingPatientIdx: -1,
  healingProgress: 0,
  warningFlash: 0,
  finalScore: 0
};

function spawnPatient() {
  if (gameState.patients.length >= gameState.totalPatients) return;
  
  let x, y, valid;
  let attempts = 0;
  do {
    valid = true;
    x = Math.random() * 480 + 80;
    y = Math.random() * 260 + 120;
    
    for (let p of gameState.patients) {
      if (p && !p.healed && Math.hypot(p.x - x, p.y - y) < 100) {
        valid = false;
        break;
      }
    }
    attempts++;
  } while (!valid && attempts < 10);
  
  if (valid) {
    gameState.patients.push({
      x: x,
      y: y,
      injured: true,
      healed: false,
      healingProgress: 0
    });
  }
}

function updateGame() {
  if (gameState.phase !== 'play') return;
  
  gameState.timer -= 1/60;
  if (gameState.timer < 0) gameState.timer = 0;
  
  if (gameState.timer < 30 && gameState.timer > 0) {
    gameState.warningFlash = Math.abs(Math.sin(Date.now() / 150)) * 0.6;
  } else {
    gameState.warningFlash = 0;
  }
  
  if (gameState.healingPatientIdx !== -1 && gameState.healingPatientIdx < gameState.patients.length) {
    const patient = gameState.patients[gameState.healingPatientIdx];
    if (patient && !patient.healed) {
      patient.healingProgress += 0.08;
      if (patient.healingProgress >= 1) {
        patient.healed = true;
        gameState.healingPatientIdx = -1;
        gameState.patientsHealed++;
        gameState.score += 10;
        
        if (gameState.phase === 'play') {
          setTimeout(() => {
            if (gameState.phase === 'play') spawnPatient();
          }, 300);
        }
      }
    }
  }
  
  gameState.patients = gameState.patients.filter(p => !p.healed);
  
  if (gameState.patientsHealed >= gameState.totalPatients) {
    checkWin();
    return;
  }
  
  if (gameState.timer <= 0 && gameState.patientsHealed < gameState.totalPatients) {
    gameState.phase = 'over';
  }
}

function checkWin() {
  gameState.phase = 'clear';
  gameState.finalScore = gameState.score;
  
  setTimeout(() => {
    endScreen.style.display = 'flex';
    endTitle.textContent = 'PROTECTED!';
    endTitle.style.color = '#4caf50';
    endMessage.textContent = '患者さんたちを全員救出しました！';
    finalScore.textContent = `Final Score: ${gameState.score}`;
  }, 500);
}

function drawGame() {
  ctx.fillStyle = '#e8f4f8';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  if (gameState.warningFlash > 0) {
    ctx.fillStyle = `rgba(255, 100, 100, ${gameState.warningFlash * 0.5})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  
  if (gameState.phase === 'play') {
    const minutes = Math.floor(gameState.timer / 60);
    const seconds = Math.floor(gameState.timer % 60);
    const timerStr = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    ctx.fillStyle = gameState.timer < 30 ? '#ff6b6b' : '#333';
    ctx.font = 'bold 40px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(timerStr, canvas.width / 2, 50);
    
    ctx.fillStyle = '#666';
    ctx.font = '16px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('患者をクリックして治癒してください', 20, canvas.height - 20);
    
    ctx.fillStyle = '#333';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(`救出: ${gameState.patientsHealed}/${gameState.totalPatients}`, canvas.width - 20, 50);
    
    for (let i = 0; i < gameState.patients.length; i++) {
      const p = gameState.patients[i];
      if (!p) continue;
      
      ctx.fillStyle = '#ffcccc';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 30, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#ff9999';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(p.x - 8, p.y - 5, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(p.x + 8, p.y - 5, 4, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.strokeStyle = '#ff0000';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y + 8, 6, 0, Math.PI);
      ctx.stroke();
      
      ctx.fillStyle = '#ff0000';
      ctx.font = '28px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('⚠', p.x, p.y - 45);
      
      if (i === gameState.healingPatientIdx && p && gameState.healingProgress > 0) {
        ctx.globalAlpha = 1 - gameState.healingProgress;
        ctx.fillStyle = 'rgba(76, 175, 80, 0.7)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 35 + gameState.healingProgress * 30, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        
        const healPercent = Math.floor(gameState.healingProgress * 100);
        ctx.fillStyle = '#4caf50';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`${healPercent}%`, p.x, p.y + 5);
      }
    }
  } else if (gameState.phase === 'clear') {
    ctx.fillStyle = 'rgba(200, 255, 200, 0.4)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = '#4caf50';
    ctx.font = 'bold 72px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('PROTECTED!', canvas.width / 2, canvas.height / 2);
    
    ctx.fillStyle = '#333';
    ctx.font = '20px Arial';
    ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height / 2 + 80);
  } else if (gameState.phase === 'over') {
    ctx.fillStyle = 'rgba(255, 100, 100, 0.4)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 72px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 50);
    
    ctx.fillStyle = '#333';
    ctx.font = '28px Arial';
    ctx.fillText(`Score: ${gameState.score}`, canvas.width / 2, canvas.height / 2 + 40);
    ctx.font = '18px Arial';
    ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height / 2 + 100);
    
    endScreen.style.display = 'flex';
    endTitle.textContent = 'GAME OVER';
    endTitle.style.color = '#ff0000';
    endMessage.textContent = '時間切れです。もう一度挑戦しましょう！';
    finalScore.textContent = `Final Score: ${gameState.score}`;
  }
  
  scoreDisplay.textContent = `Score: ${gameState.score}`;
}

function gameLoop() {
  updateGame();
  drawGame();
  requestAnimationFrame(gameLoop);
}

function startNewGame() {
  gameState.phase = 'play';
  gameState.timer = 90;
  gameState.score = 0;
  gameState.patientsHealed = 0;
  gameState.patients = [];
  gameState.healingPatientIdx = -1;
  gameState.warningFlash = 0;
  gameState.finalScore = 0;
  
  startScreen.style.display = 'none';
  endScreen.style.display = 'none';
  
  spawnPatient();
  spawnPatient();
}

startBtn.addEventListener('click', startNewGame);
retryBtn.addEventListener('click', startNewGame);

canvas.addEventListener('click', (e) => {
  if (gameState.phase === 'play') {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    
    for (let i = 0; i < gameState.patients.length; i++) {
      const p = gameState.patients[i];
      if (p && !p.healed) {
        const dist = Math.hypot(cx - p.x, cy - p.y);
        
        if (dist <= 40 && gameState.healingPatientIdx === -1) {
          gameState.healingPatientIdx = i;
          gameState.patients[i].healingProgress = 0;
          break;
        }
      }
    }
  } else if (gameState.phase === 'over' || gameState.phase === 'clear') {
    startNewGame();
  }
});

canvas.addEventListener('mousedown', (e) => {
  // Mouse down registered, no action needed
});

canvas.addEventListener('mousemove', (e) => {
  // Mouse move registered, no action needed
});

canvas.addEventListener('mouseup', (e) => {
  // Mouse up registered, no action needed
});

gameLoop();
</script>

</body>
</html>
