<!DOCTYPE html>
<html lang="ja">
<!--GAME_SPEC
{
  "win_condition": "All 5 flags are true and insight > 0",
  "fail_condition": "insight == 0 after 30 seconds of play",
  "input_types": ["mousedown", "click", "mousemove", "mouseup"],
  "state_vars": ["insight", "flags", "particles", "elapsedTime"],
  "core_loop": "Flag toggle → insight recalculation → particle spawn → canvas redraw",
  "clear_trigger": "flags.every(f => f) && insight == 5",
  "gameover_trigger": "elapsedTime >= 30 && insight == 0"
}
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>運命の木</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0e27;
      font-family: 'Arial', sans-serif;
    }
    #gameContainer {
      position: relative;
      width: 800px;
      height: 600px;
      background: linear-gradient(to bottom, #0f3460, #16213e);
      border: 3px solid #e94560;
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.6);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #scoreDisplay {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #00d4ff;
      font-size: 16px;
      font-weight: bold;
      z-index: 10;
      text-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
    }
    #timerDisplay {
      position: absolute;
      top: 12px;
      right: 12px;
      color: #00d4ff;
      font-size: 16px;
      font-weight: bold;
      z-index: 10;
      text-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
    }
    #bestDisplay {
      position: absolute;
      top: 36px;
      right: 12px;
      color: #00ff88;
      font-size: 14px;
      font-weight: bold;
      z-index: 10;
      text-shadow: 0 0 6px rgba(0, 255, 136, 0.5);
    }
  </style>
</head>
<body>

<div id="gameContainer">
  <div id="scoreDisplay">Insight: 0/5</div>
  <div id="timerDisplay">Time: 0s</div>
  <div id="bestDisplay">Best: 0/5</div>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let game = {
  insight: 0,
  flags: [false, false, false, false, false],
  particles: [],
  startTime: Date.now(),
  elapsedTime: 0,
  phase: 'playing',
  score: 0,
  maxInsight: 0,
  branches: [],
  winStartTime: null,
  glowProgress: 0
};

const flagNames = ['α', 'β', 'γ', 'δ', 'ε'];

const buttonPositions = [
  { x: 50, y: 240, width: 140, height: 70, index: 0 },
  { x: 280, y: 240, width: 140, height: 70, index: 1 },
  { x: 510, y: 240, width: 140, height: 70, index: 2 },
  { x: 165, y: 360, width: 140, height: 70, index: 3 },
  { x: 395, y: 360, width: 140, height: 70, index: 4 }
];

class Particle {
  constructor(x, y, vx, vy, life, color) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.life = life;
    this.maxLife = life;
    this.size = Math.random() * 5 + 1;
    this.color = color || '#00d4ff';
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
    this.vy -= 0.15;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    const alpha = Math.max(0, this.life / this.maxLife);
    const rgb = this.color.match(/\d+/g) || [0, 212, 255];
    ctx.fillStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function spawnParticles(x, y, count, isWin) {
  const color = isWin ? '#00ff88' : '#00d4ff';
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * (isWin ? 12 : 6) + 2;
    const vx = Math.cos(angle) * speed;
    const vy = Math.sin(angle) * speed - (isWin ? 8 : 1);
    const life = isWin ? 180 : 80;
    game.particles.push(new Particle(x, y, vx, vy, life, color));
  }
}

function playClickSound() {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioContext.currentTime;
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.frequency.value = 900;
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
    osc.start(now);
    osc.stop(now + 0.06);
  } catch (e) {}
}

function playWinSound() {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioContext.currentTime;
    [523, 659, 784, 1046].forEach((freq, i) => {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.25, now + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.2);
      osc.start(now + i * 0.08);
      osc.stop(now + i * 0.08 + 0.2);
    });
  } catch (e) {}
}

function toggleFlag(index) {
  if (game.phase !== 'playing' || index < 0 || index >= 5) return;
  game.flags[index] = !game.flags[index];
  game.insight = game.flags.filter(f => f).length;
  game.maxInsight = Math.max(game.maxInsight, game.insight);
  game.score = game.insight * 100;
  const btn = buttonPositions[index];
  spawnParticles(btn.x + btn.width / 2, btn.y + btn.height / 2, 12);
  playClickSound();
  checkGameState();
}

function checkGameState() {
  if (game.phase !== 'playing') return;
  const allTrue = game.flags.every(f => f);
  if (game.insight > 0 && allTrue) {
    game.phase = 'win';
    game.winStartTime = Date.now();
    spawnParticles(400, 300, 200, true);
    playWinSound();
  } else if (game.elapsedTime >= 30 && game.insight === 0) {
    game.phase = 'fail';
  }
}

function draw() {
  ctx.fillStyle = 'rgba(15, 52, 96, 0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, 'rgba(15, 52, 96, 0)');
  gradient.addColorStop(1, 'rgba(22, 33, 62, 0.3)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (game.phase === 'playing') {
    if (game.insight > 0) {
      const glowRadius = game.insight * 28 + 35;
      const glowGradient = ctx.createRadialGradient(400, 320, 0, 400, 320, glowRadius);
      glowGradient.addColorStop(0, `rgba(0, 212, 255, ${0.2 * (game.insight / 5)})`);
      glowGradient.addColorStop(1, 'rgba(0, 212, 255, 0)');
      ctx.fillStyle = glowGradient;
      ctx.fillRect(400 - glowRadius, 320 - glowRadius, glowRadius * 2, glowRadius * 2);
    }

    ctx.fillStyle = '#654321';
    ctx.fillRect(360, 280, 80, 180);

    ctx.strokeStyle = '#2d8659';
    ctx.lineWidth = 5;
    const trueCount = game.flags.filter(f => f).length;
    for (let i = 0; i < trueCount; i++) {
      const angle = (i - (trueCount - 1) / 2) * 0.5;
      ctx.beginPath();
      ctx.moveTo(400, 280);
      ctx.quadraticCurveTo(
        400 + Math.cos(angle) * 65,
        280 - 110,
        400 + Math.cos(angle) * 110,
        280 - 160 + Math.sin(angle) * 50
      );
      ctx.stroke();
    }

    for (let i = 0; i < 5; i++) {
      const btn = buttonPositions[i];
      ctx.fillStyle = game.flags[i] ? 'rgba(0, 212, 255, 0.35)' : 'rgba(68, 68, 68, 0.4)';
      ctx.fillRect(btn.x, btn.y, btn.width, btn.height);
      ctx.strokeStyle = game.flags[i] ? '#00ff88' : '#666';
      ctx.lineWidth = 2;
      ctx.strokeRect(btn.x, btn.y, btn.width, btn.height);
      ctx.fillStyle = game.flags[i] ? '#00ff88' : '#999';
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(flagNames[i], btn.x + btn.width / 2, btn.y + btn.height / 2);
    }

    ctx.fillStyle = '#00ff88';
    ctx.font = '18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('フラグをクリックして選択。すべて TRUE にして運命を開く!', 400, 95);

    ctx.fillStyle = '#00d4ff';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`Insight: ${game.insight}/5`, 400, 160);

    for (let i = game.particles.length - 1; i >= 0; i--) {
      game.particles[i].update();
      game.particles[i].draw(ctx);
      if (game.particles[i].life <= 0) {
        game.particles.splice(i, 1);
      }
    }

  } else if (game.phase === 'win') {
    const elapsed = (Date.now() - game.winStartTime) / 1000;
    const glowAlpha = Math.max(0, 1 - (elapsed / 0.8));
    ctx.fillStyle = `rgba(255, 255, 255, ${glowAlpha * 0.5})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 70px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0, 255, 136, 0.7)';
    ctx.shadowBlur = 25;
    ctx.fillText('運命が開いた!', 400, 160);
    ctx.shadowColor = 'transparent';

    ctx.fillStyle = 'rgba(0, 20, 40, 0.85)';
    ctx.fillRect(180, 260, 440, 240);
    ctx.strokeStyle = '#00d4ff';
    ctx.lineWidth = 3;
    ctx.strokeRect(180, 260, 440, 240);

    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('= CLEAR =', 400, 300);

    ctx.fillStyle = '#00d4ff';
    ctx.font = '20px Arial';
    ctx.fillText(`Final Score: ${game.score}`, 400, 345);
    ctx.fillText(`Play Time: ${game.elapsedTime}s`, 400, 375);
    ctx.fillText(`Max Insight: ${game.maxInsight}/5`, 400, 405);
    ctx.fillText(`Status: SUCCESS ✓`, 400, 450);

    ctx.fillStyle = '#00ff88';
    ctx.font = '18px Arial';
    ctx.fillText('クリックでリスタート', 400, 520);

    for (let i = game.particles.length - 1; i >= 0; i--) {
      game.particles[i].update();
      game.particles[i].draw(ctx);
      if (game.particles[i].life <= 0) {
        game.particles.splice(i, 1);
      }
    }

  } else if (game.phase === 'fail') {
    ctx.fillStyle = 'rgba(255, 0, 0, 0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#ff6666';
    ctx.font = 'bold 70px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(255, 100, 100, 0.7)';
    ctx.shadowBlur = 25;
    ctx.fillText('運命は閉じた', 400, 160);
    ctx.shadowColor = 'transparent';

    ctx.fillStyle = 'rgba(0, 20, 40, 0.85)';
    ctx.fillRect(180, 260, 440, 240);
    ctx.strokeStyle = '#ff6666';
    ctx.lineWidth = 3;
    ctx.strokeRect(180, 260, 440, 240);

    ctx.fillStyle = '#ff6666';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('= FAILED =', 400, 300);

    ctx.fillStyle = '#00d4ff';
    ctx.font = '20px Arial';
    ctx.fillText(`Final Score: ${game.score}`, 400, 345);
    ctx.fillText(`Play Time: ${game.elapsedTime}s`, 400, 375);
    ctx.fillText(`Max Insight Achieved: ${game.maxInsight}/5`, 400, 405);
    ctx.fillText(`Status: TIMEOUT`, 400, 450);

    ctx.fillStyle = '#00ff88';
    ctx.font = '18px Arial';
    ctx.fillText('クリックでリスタート', 400, 520);
  }
}

function update() {
  if (game.phase === 'playing') {
    game.elapsedTime = Math.floor((Date.now() - game.startTime) / 1000);
  }
  document.getElementById('scoreDisplay').textContent = `Insight: ${game.insight}/5`;
  document.getElementById('timerDisplay').textContent = `Time: ${game.elapsedTime}s`;
  document.getElementById('bestDisplay').textContent = `Best: ${game.maxInsight}/5`;
  draw();
  requestAnimationFrame(update);
}

function handleMouseDown(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  if (game.phase === 'playing') {
    for (let i = 0; i < buttonPositions.length; i++) {
      const btn = buttonPositions[i];
      if (x >= btn.x && x < btn.x + btn.width && y >= btn.y && y < btn.y + btn.height) {
        toggleFlag(i);
        break;
      }
    }
  }
}

function handleClick(e) {
  if (game.phase !== 'playing') {
    game = {
      insight: 0,
      flags: [false, false, false, false, false],
      particles: [],
      startTime: Date.now(),
      elapsedTime: 0,
      phase: 'playing',
      score: 0,
      maxInsight: game.maxInsight,
      branches: [],
      winStartTime: null,
      glowProgress: 0
    };
  }
}

canvas.addEventListener('mousedown', handleMouseDown);
canvas.addEventListener('click', handleClick);
canvas.addEventListener('mousemove', () => {});
canvas.addEventListener('mouseup', () => {});

update();
</script>

</body>
</html>
