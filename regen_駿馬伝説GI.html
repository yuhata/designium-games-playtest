<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>駿馬伝説GI</title>
  <style>
    body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: Arial, sans-serif; }
    canvas { display: block; border: 2px solid #333; background: #fff; cursor: pointer; }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
// ========== デバッグコントラクト初期化 ==========
window.__gameDebug = {
  objects: [],
  metrics: { score: 0, progress: 0.0, remaining: 0, phase: "playing" },
  tapObject: function(id) {} // オーバーライド対象
};

// ========== ゲーム状態管理 ==========
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const gameState = {
  phase: 'playing',        // 'playing', 'win', 'fail'
  week: 1,                 // 現在の週（1-156）
  giWins: 0,               // GI勝利数
  speed: 10,               // スピード能力値
  power: 10,               // パワー能力値
  stamina: 10,             // スタミナ能力値
  lastResult: '',          // 直前のトレーニング/GI結果テキスト
  isGiWeek: false,         // 52週の倍数か
  showTraining: true,      // トレーニング画面表示
};

const TOTAL_WEEKS = 156;
const GI_WINS_GOAL = 8;
const GI_INTERVAL = 52;

// ========== ボタンレイアウト ==========
const buttons = {
  training_speed: { id: 'training_speed', x: 80, y: 350, width: 160, height: 60, label: 'スピード\nTRN', enabled: true },
  training_power: { id: 'training_power', x: 320, y: 350, width: 160, height: 60, label: 'パワー\nTRN', enabled: true },
  training_stamina: { id: 'training_stamina', x: 560, y: 350, width: 160, height: 60, label: 'スタミナ\nTRN', enabled: true },
  gi_race: { id: 'gi_race', x: 300, y: 350, width: 200, height: 60, label: 'GIレース出走', enabled: true },
  restart: { id: 'restart', x: 300, y: 450, width: 200, height: 60, label: 'リスタート', enabled: true },
};

// ========== 描画関数 ==========
function drawHorse() {
  const x = 120;
  const y = 100;
  const scale = 1.3;

  // 馬の体
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(x + 20 * scale, y + 40 * scale, 60 * scale, 40 * scale);

  // 馬の首
  ctx.fillStyle = '#654321';
  ctx.fillRect(x + 50 * scale, y + 10 * scale, 20 * scale, 30 * scale);

  // 馬の頭
  ctx.beginPath();
  ctx.ellipse(x + 60 * scale, y, 15 * scale, 20 * scale, 0, 0, Math.PI * 2);
  ctx.fill();

  // 馬の目
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x + 65 * scale, y - 5 * scale, 2 * scale, 0, Math.PI * 2);
  ctx.fill();

  // 馬の脚
  ctx.strokeStyle = '#654321';
  ctx.lineWidth = 4;
  [20, 40, 60, 80].forEach(offset => {
    ctx.beginPath();
    ctx.moveTo(x + offset * scale, y + 80 * scale);
    ctx.lineTo(x + offset * scale, y + 120 * scale);
    ctx.stroke();
  });

  // 馬の尻尾
  ctx.strokeStyle = '#654321';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x + 80 * scale, y + 50 * scale);
  ctx.quadraticCurveTo(x + 110 * scale, y + 40 * scale, x + 100 * scale, y + 80 * scale);
  ctx.stroke();
}

function drawButton(btn, hovered = false) {
  ctx.fillStyle = hovered ? '#FFD700' : '#4CAF50';
  ctx.fillRect(btn.x, btn.y, btn.width, btn.height);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.strokeRect(btn.x, btn.y, btn.width, btn.height);

  ctx.fillStyle = '#000';
  ctx.font = 'bold 16px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const lines = btn.label.split('\n');
  lines.forEach((line, i) => {
    ctx.fillText(line, btn.x + btn.width / 2, btn.y + btn.height / 2 - 10 + i * 20);
  });
}

function drawStats() {
  ctx.fillStyle = '#333';
  ctx.font = 'bold 20px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(`週: ${gameState.week} / ${TOTAL_WEEKS}`, 20, 40);
  ctx.fillText(`GI勝利: ${gameState.giWins} / ${GI_WINS_GOAL}`, 20, 80);

  // 能力値バー
  ctx.font = 'bold 14px Arial';
  ctx.fillText(`速度: ${gameState.speed}`, 500, 40);
  drawBar(600, 35, 80, 12, gameState.speed, 50);

  ctx.fillText(`力: ${gameState.power}`, 500, 70);
  drawBar(600, 65, 80, 12, gameState.power, 50);

  ctx.fillText(`耐久: ${gameState.stamina}`, 500, 100);
  drawBar(600, 95, 80, 12, gameState.stamina, 50);
}

function drawBar(x, y, width, height, current, max) {
  ctx.fillStyle = '#ddd';
  ctx.fillRect(x, y, width, height);
  ctx.fillStyle = '#4CAF50';
  ctx.fillRect(x, y, (current / max) * width, height);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, width, height);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = gameState.phase === 'win' ? '#FFD700' : '#FF6B6B';
  ctx.font = 'bold 60px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(gameState.phase === 'win' ? '優勝!' : 'Game Over', canvas.width / 2, canvas.height / 2 - 80);

  ctx.fillStyle = '#fff';
  ctx.font = '24px Arial';
  if (gameState.phase === 'win') {
    ctx.fillText(`GI${gameState.giWins}勝!`, canvas.width / 2, canvas.height / 2 - 10);
    ctx.fillText(`チャンピオンの称号を手にした!`, canvas.width / 2, canvas.height / 2 + 40);
  } else {
    ctx.fillText(`GI${gameState.giWins}勝で終幕`, canvas.width / 2, canvas.height / 2 - 10);
    ctx.fillText(`8勝届かず...`, canvas.width / 2, canvas.height / 2 + 40);
  }

  ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height / 2 + 120);
}

function draw() {
  ctx.fillStyle = '#E8F5E9';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (gameState.phase === 'playing') {
    drawHorse();
    drawStats();

    if (gameState.isGiWeek) {
      ctx.fillStyle = '#333';
      ctx.font = 'bold 22px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(`【第${Math.floor(gameState.week / GI_INTERVAL)}年目 GI開催】`, canvas.width / 2, 260);
      ctx.fillText(`出走準備完了!`, canvas.width / 2, 290);

      drawButton(buttons.gi_race);
    } else {
      ctx.fillStyle = '#333';
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('トレーニング選択:', canvas.width / 2, 300);

      drawButton(buttons.training_speed);
      drawButton(buttons.training_power);
      drawButton(buttons.training_stamina);
    }

    if (gameState.lastResult) {
      ctx.fillStyle = '#1565C0';
      ctx.font = 'bold 16px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(gameState.lastResult, canvas.width / 2, 520);
    }
  } else {
    drawGameOver();
  }
}

// ========== ゲームロジック ==========
function handleTraining(type) {
  const gains = { speed: 2, power: 2, stamina: 2 };
  const randomBonus = Math.floor(Math.random() * 3);

  if (type === 'speed') {
    gameState.speed += gains.speed + randomBonus;
    gameState.lastResult = `速度${gameState.speed - gains.speed - randomBonus}→${gameState.speed}!`;
  } else if (type === 'power') {
    gameState.power += gains.power + randomBonus;
    gameState.lastResult = `力${gameState.power - gains.power - randomBonus}→${gameState.power}!`;
  } else if (type === 'stamina') {
    gameState.stamina += gains.stamina + randomBonus;
    gameState.lastResult = `耐久${gameState.stamina - gains.stamina - randomBonus}→${gameState.stamina}!`;
  }

  gameState.week += 1;
  updateGameState();
}

function handleGiRace() {
  // GI出走: 能力値の平均でスコアを計算、ランダム要因を加えて勝敗を決定
  const abilityScore = (gameState.speed + gameState.power + gameState.stamina) / 3;
  const randomFactor = Math.random() * 30 - 10; // -10〜+20のランダムボーナス
  const totalScore = abilityScore + randomFactor;

  const winThreshold = 20; // 初期値平均10では難しく、育成が必須

  if (totalScore > winThreshold) {
    gameState.giWins += 1;
    gameState.lastResult = `🏆 GI勝利! 通算${gameState.giWins}勝!`;
  } else {
    gameState.lastResult = `惜敗... 能力値${Math.round(totalScore)}では届かず`;
  }

  gameState.week += 1;
  gameState.isGiWeek = false;
  updateGameState();
}

function updateGameState() {
  // 週数超過判定
  if (gameState.week > TOTAL_WEEKS) {
    gameState.phase = gameState.giWins >= GI_WINS_GOAL ? 'win' : 'fail';
  } else {
    // 次週が52の倍数か判定
    gameState.isGiWeek = gameState.week % GI_INTERVAL === 0;
  }
  updateDebug();
}

function resetGame() {
  gameState.phase = 'playing';
  gameState.week = 1;
  gameState.giWins = 0;
  gameState.speed = 10;
  gameState.power = 10;
  gameState.stamina = 10;
  gameState.lastResult = '';
  gameState.isGiWeek = false;
  gameState.showTraining = true;
  updateDebug();
}

// ========== デバッグ機構 ==========
function updateDebug() {
  const objects = [];

  if (gameState.phase === 'playing') {
    if (gameState.isGiWeek) {
      objects.push({
        id: 'gi_race',
        x: buttons.gi_race.x,
        y: buttons.gi_race.y,
        width: buttons.gi_race.width,
        height: buttons.gi_race.height,
        enabled: true,
        matchId: null
      });
    } else {
      objects.push({
        id: 'training_speed',
        x: buttons.training_speed.x,
        y: buttons.training_speed.y,
        width: buttons.training_speed.width,
        height: buttons.training_speed.height,
        enabled: true,
        matchId: null
      });
      objects.push({
        id: 'training_power',
        x: buttons.training_power.x,
        y: buttons.training_power.y,
        width: buttons.training_power.width,
        height: buttons.training_power.height,
        enabled: true,
        matchId: null
      });
      objects.push({
        id: 'training_stamina',
        x: buttons.training_stamina.x,
        y: buttons.training_stamina.y,
        width: buttons.training_stamina.width,
        height: buttons.training_stamina.height,
        enabled: true,
        matchId: null
      });
    }
  } else {
    objects.push({
      id: 'restart',
      x: buttons.restart.x,
      y: buttons.restart.y,
      width: buttons.restart.width,
      height: buttons.restart.height,
      enabled: true,
      matchId: null
    });
  }

  window.__gameDebug.objects = objects;
  window.__gameDebug.metrics = {
    score: gameState.giWins,
    progress: Math.min(gameState.week / TOTAL_WEEKS, 1),
    remaining: Math.max(TOTAL_WEEKS - gameState.week, 0),
    phase: gameState.phase
  };
}

// ========== イベントハンドラ ==========
function handleClick(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  let clicked = null;

  for (const [key, btn] of Object.entries(buttons)) {
    if (x >= btn.x && x < btn.x + btn.width && y >= btn.y && y < btn.y + btn.height) {
      clicked = btn.id;
      break;
    }
  }

  if (clicked) {
    processTap(clicked);
  }
}

function processTap(id) {
  if (gameState.phase === 'playing') {
    if (id === 'training_speed') {
      handleTraining('speed');
    } else if (id === 'training_power') {
      handleTraining('power');
    } else if (id === 'training_stamina') {
      handleTraining('stamina');
    } else if (id === 'gi_race') {
      handleGiRace();
    }
  } else {
    // win or fail フェーズ
    if (id === 'restart') {
      resetGame();
    }
  }
}

// tapObject の実装（テスト自動化用）
// 【必須】実際のイベントハンドラと同じゲーム処理を呼び出す
window.__gameDebug.tapObject = function(id) {
  processTap(id);
};

canvas.addEventListener('click', handleClick);

// ========== ゲームループ ==========
function gameLoop() {
  draw();
  requestAnimationFrame(gameLoop);
}

// 初期化：必ずphase='playing'で開始すること（ページロード後2秒以内）
setTimeout(() => {
  resetGame();
  gameLoop();
}, 100);
</script>
</body>
</html>
