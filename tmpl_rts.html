<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTS BATTLE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0d1117;
        }
        #container {
            position: relative;
            width: 1000px;
            height: 600px;
            border: 2px solid #888;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0d1117;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            text-align: left;
        }
        #hudEnemy {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            font-size: 14px;
            text-align: right;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #888;
            background: #1a1a1a;
            color: #fff;
            transition: opacity 0.2s;
        }
        button:hover:not(:disabled) {
            background: #333;
        }
        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #startScreen, #gameOverScreen, #clearScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 32px;
            z-index: 1000;
        }
        #gameOverScreen, #clearScreen {
            display: none;
        }
        .screen-button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background: #4299e1;
            border: none;
            color: #fff;
            cursor: pointer;
        }
        .screen-button:hover {
            background: #3182ce;
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <div>RTS BATTLE</div>
        <button class="screen-button" onclick="startGame()">START</button>
    </div>
    <div id="container">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <div id="hud">
            <div>Gold: <span id="goldDisplay">0</span></div>
            <div>Base HP: <span id="allyHPDisplay">0</span></div>
        </div>
        <div id="hudEnemy">
            <div>Enemy Base HP: <span id="enemyHPDisplay">0</span></div>
        </div>
        <div id="controls">
            <button id="infantryBtn" onclick="produceUnit('infantry')">Infantry<br>(50G)</button>
            <button id="knightBtn" onclick="produceUnit('knight')">Knight<br>(100G)</button>
            <button id="cannonBtn" onclick="produceUnit('cannon')">Cannon<br>(150G)</button>
        </div>
    </div>
    <div id="gameOverScreen">
        <div>GAME OVER</div>
        <button class="screen-button" onclick="retryGame()">RETRY</button>
    </div>
    <div id="clearScreen">
        <div>CLEAR</div>
        <button class="screen-button" onclick="retryGame()">RETRY</button>
    </div>

    <script>
        // Configuration Schema:
        // {
        //   title: string,
        //   bg_color: string,
        //   ally_color: string,
        //   enemy_color: string,
        //   base_hp: number,
        //   gold_rate: number,
        //   infantry_cost: number,
        //   knight_cost: number,
        //   cannon_cost: number
        // }

        const config = {
            title: 'RTS BATTLE',
            bg_color: '#0d1117',
            ally_color: '#4299e1',
            enemy_color: '#fc8181',
            base_hp: 100,
            gold_rate: 10,
            infantry_cost: 50,
            knight_cost: 100,
            cannon_cost: 150
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const gameState = {
            running: false,
            gold: 0,
            allyBase: { x: 50, y: 300, hp: config.base_hp, maxHp: config.base_hp },
            enemyBase: { x: 950, y: 300, hp: config.base_hp, maxHp: config.base_hp },
            allyUnits: [],
            enemyUnits: [],
            lastGoldTime: Date.now(),
            lastEnemySpawnTime: Date.now(),
            enemySpawnInterval: 3000,
            enemySpawnCounter: 0
        };

        class Unit {
            constructor(x, y, type, isAlly) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.isAlly = isAlly;
                this.width = 20;
                this.height = 20;
                this.vx = isAlly ? 2 : -2;

                if (type === 'infantry') {
                    this.hp = 10;
                    this.maxHp = 10;
                    this.atk = 3;
                    this.speed = 2;
                    this.range = 30;
                } else if (type === 'knight') {
                    this.hp = 20;
                    this.maxHp = 20;
                    this.atk = 6;
                    this.speed = 1.5;
                    this.range = 30;
                } else if (type === 'cannon') {
                    this.hp = 5;
                    this.maxHp = 5;
                    this.atk = 15;
                    this.speed = 0.8;
                    this.range = 200;
                }

                this.vx = isAlly ? this.speed : -this.speed;
                this.lastAttackTime = Date.now();
                this.attackCooldown = 500;
            }

            update() {
                this.x += this.vx;
            }

            draw(ctx) {
                const color = this.isAlly ? config.ally_color : config.enemy_color;
                ctx.fillStyle = color;
                ctx.fillRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);

                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);

                const hpBarWidth = this.width;
                const hpBarHeight = 3;
                ctx.fillStyle = '#666';
                ctx.fillRect(this.x - hpBarWidth / 2, this.y - this.height / 2 - 8, hpBarWidth, hpBarHeight);
                const hpPercent = this.hp / this.maxHp;
                ctx.fillStyle = '#0f0';
                ctx.fillRect(this.x - hpBarWidth / 2, this.y - this.height / 2 - 8, hpBarWidth * hpPercent, hpBarHeight);
            }

            canAttack() {
                return Date.now() - this.lastAttackTime >= this.attackCooldown;
            }

            attack(target) {
                if (this.canAttack()) {
                    target.hp -= this.atk;
                    this.lastAttackTime = Date.now();
                }
            }

            isInRange(target) {
                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                return dist <= this.range;
            }
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState.running = true;
            gameState.gold = 0;
            gameState.allyBase.hp = config.base_hp;
            gameState.enemyBase.hp = config.base_hp;
            gameState.allyUnits = [];
            gameState.enemyUnits = [];
            gameState.lastGoldTime = Date.now();
            gameState.lastEnemySpawnTime = Date.now();
            gameState.enemySpawnCounter = 0;
            gameLoop();
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
        }

        function produceUnit(type) {
            if (!gameState.running) return;

            let cost = 0;
            if (type === 'infantry') cost = config.infantry_cost;
            else if (type === 'knight') cost = config.knight_cost;
            else if (type === 'cannon') cost = config.cannon_cost;

            if (gameState.gold >= cost) {
                gameState.gold -= cost;
                const unit = new Unit(gameState.allyBase.x + 30, gameState.allyBase.y + (Math.random() - 0.5) * 50, type, true);
                gameState.allyUnits.push(unit);
            }
        }

        function updateGold() {
            const now = Date.now();
            const delta = (now - gameState.lastGoldTime) / 1000;
            gameState.gold += delta * config.gold_rate;
            gameState.lastGoldTime = now;

            document.getElementById('goldDisplay').textContent = Math.floor(gameState.gold);
            document.getElementById('allyHPDisplay').textContent = gameState.allyBase.hp;
            document.getElementById('enemyHPDisplay').textContent = gameState.enemyBase.hp;

            document.getElementById('infantryBtn').disabled = gameState.gold < config.infantry_cost;
            document.getElementById('knightBtn').disabled = gameState.gold < config.knight_cost;
            document.getElementById('cannonBtn').disabled = gameState.gold < config.cannon_cost;
        }

        function updateEnemySpawn() {
            const now = Date.now();
            const delta = now - gameState.lastEnemySpawnTime;

            gameState.enemySpawnCounter += 1;
            const spawnInterval = Math.max(1500, gameState.enemySpawnInterval - gameState.enemySpawnCounter * 50);

            if (delta > spawnInterval) {
                const types = ['infantry', 'knight', 'cannon'];
                const type = types[Math.floor(Math.random() * types.length)];
                const unit = new Unit(gameState.enemyBase.x - 30, gameState.enemyBase.y + (Math.random() - 0.5) * 50, type, false);
                gameState.enemyUnits.push(unit);
                gameState.lastEnemySpawnTime = now;
            }
        }

        function updateUnits() {
            gameState.allyUnits.forEach(unit => unit.update());
            gameState.enemyUnits.forEach(unit => unit.update());

            gameState.allyUnits = gameState.allyUnits.filter(u => u.hp > 0 && u.x < 1000);
            gameState.enemyUnits = gameState.enemyUnits.filter(u => u.hp > 0 && u.x > 0);

            gameState.allyUnits.forEach(allyUnit => {
                let target = null;
                let minDist = allyUnit.range;

                gameState.enemyUnits.forEach(enemyUnit => {
                    const dx = enemyUnit.x - allyUnit.x;
                    const dy = enemyUnit.y - allyUnit.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < minDist) {
                        minDist = dist;
                        target = enemyUnit;
                    }
                });

                if (!target) {
                    const dx = gameState.enemyBase.x - allyUnit.x;
                    const dy = gameState.enemyBase.y - allyUnit.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < allyUnit.range) {
                        target = gameState.enemyBase;
                    }
                }

                if (target) {
                    allyUnit.attack(target);
                }
            });

            gameState.enemyUnits.forEach(enemyUnit => {
                let target = null;
                let minDist = enemyUnit.range;

                gameState.allyUnits.forEach(allyUnit => {
                    const dx = allyUnit.x - enemyUnit.x;
                    const dy = allyUnit.y - enemyUnit.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < minDist) {
                        minDist = dist;
                        target = allyUnit;
                    }
                });

                if (!target) {
                    const dx = gameState.allyBase.x - enemyUnit.x;
                    const dy = gameState.allyBase.y - enemyUnit.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < enemyUnit.range) {
                        target = gameState.allyBase;
                    }
                }

                if (target) {
                    enemyUnit.attack(target);
                }
            });
        }

        function drawGame() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = config.ally_color;
            ctx.fillRect(gameState.allyBase.x - 20, gameState.allyBase.y - 20, 40, 40);
            ctx.fillStyle = '#fff';
            ctx.font = '12px Arial';
            ctx.fillText('A', gameState.allyBase.x - 5, gameState.allyBase.y + 5);

            ctx.fillStyle = config.enemy_color;
            ctx.fillRect(gameState.enemyBase.x - 20, gameState.enemyBase.y - 20, 40, 40);
            ctx.fillStyle = '#fff';
            ctx.fillText('E', gameState.enemyBase.x - 5, gameState.enemyBase.y + 5);

            gameState.allyUnits.forEach(unit => unit.draw(ctx));
            gameState.enemyUnits.forEach(unit => unit.draw(ctx));

            ctx.strokeStyle = '#888';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function checkGameEnd() {
            if (gameState.enemyBase.hp <= 0) {
                gameState.running = false;
                document.getElementById('clearScreen').style.display = 'flex';
                return;
            }
            if (gameState.allyBase.hp <= 0) {
                gameState.running = false;
                document.getElementById('gameOverScreen').style.display = 'flex';
                return;
            }
        }

        function gameLoop() {
            if (!gameState.running) return;

            updateGold();
            updateEnemySpawn();
            updateUnits();
            drawGame();
            checkGameEnd();

            if (gameState.running) requestAnimationFrame(gameLoop);
        }

        document.body.style.background = config.bg_color;
    </script>
</body>
</html>
