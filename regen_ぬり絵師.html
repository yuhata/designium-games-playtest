<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぬり絵師</title>
  <style>
    body {
      margin: 0;
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: Arial, sans-serif;
    }
    canvas {
      border: 5px solid #333;
      background: #fff;
      cursor: crosshair;
      display: block;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    window.__gameDebug = {
      dragTargets: [],
      objects: [],
      metrics: { rate: 0.0, strokes: 0, phase: "playing" },
      dragFill: function(id) {},
      tapObject: function(id) {}
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const gameState = {
      phase: 'playing',
      startTime: 0,
      timeLimit: 90000,
      mistakeLimit: 3,
      mistakesRemaining: 3,
      completedZones: 0,
      totalZones: 0,
      dragging: false,
      dragTrail: [],
      zones: []
    };

    const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181', '#AA96DA'];

    function initializeZones() {
      gameState.zones = [
        { id: 'zone_0', x: 50, y: 80, width: 150, height: 120, color: colors[0], completed: false },
        { id: 'zone_1', x: 250, y: 80, width: 150, height: 120, color: colors[1], completed: false },
        { id: 'zone_2', x: 450, y: 80, width: 150, height: 120, color: colors[2], completed: false },
        { id: 'zone_3', x: 50, y: 250, width: 150, height: 120, color: colors[3], completed: false },
        { id: 'zone_4', x: 250, y: 250, width: 150, height: 120, color: colors[4], completed: false },
        { id: 'zone_5', x: 450, y: 250, width: 150, height: 120, color: colors[5], completed: false }
      ];
      gameState.totalZones = gameState.zones.length;
      gameState.completedZones = 0;
      gameState.mistakesRemaining = gameState.mistakeLimit;
      gameState.phase = 'playing';
      gameState.startTime = Date.now();
      gameState.dragTrail = [];
    }

    function updateDebug() {
      window.__gameDebug.dragTargets = gameState.zones
        .filter(z => !z.completed)
        .map(z => ({
          id: z.id,
          x: z.x,
          y: z.y,
          width: z.width,
          height: z.height,
          type: 'fillZone',
          enabled: true
        }));

      window.__gameDebug.objects = gameState.zones
        .filter(z => !z.completed)
        .map(z => ({
          id: z.id,
          x: z.x + z.width / 2,
          y: z.y + z.height / 2,
          type: 'paintZone'
        }));

      window.__gameDebug.metrics = {
        rate: gameState.totalZones > 0 ? gameState.completedZones / gameState.totalZones : 0,
        strokes: gameState.zones.filter(z => z.completed).length,
        phase: gameState.phase
      };
    }

    function checkGameState() {
      if (gameState.phase === 'playing') {
        const elapsed = Date.now() - gameState.startTime;
        if (elapsed > gameState.timeLimit) {
          gameState.phase = 'gameover_lose';
        } else if (gameState.completedZones >= gameState.totalZones) {
          gameState.phase = 'gameover_win';
        } else if (gameState.mistakesRemaining <= 0) {
          gameState.phase = 'gameover_lose';
        }
      }
    }

    window.__gameDebug.dragFill = function(id) {
      if (gameState.phase !== 'playing') return;
      const zone = gameState.zones.find(z => z.id === id);
      if (zone && !zone.completed) {
        zone.completed = true;
        gameState.completedZones++;
        updateDebug();
        checkGameState();
      }
    };

    window.__gameDebug.tapObject = function(id) {
      window.__gameDebug.dragFill(id);
    };

    function draw() {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw drag trail
      if (gameState.dragTrail.length > 1) {
        ctx.strokeStyle = '#FF8C00';
        ctx.lineWidth = 20;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(gameState.dragTrail[0].x, gameState.dragTrail[0].y);
        for (let i = 1; i < gameState.dragTrail.length; i++) {
          ctx.lineTo(gameState.dragTrail[i].x, gameState.dragTrail[i].y);
        }
        ctx.stroke();
      }

      // Draw zones
      gameState.zones.forEach(zone => {
        ctx.fillStyle = zone.completed ? zone.color : '#f0f0f0';
        ctx.fillRect(zone.x, zone.y, zone.width, zone.height);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 3;
        ctx.strokeRect(zone.x, zone.y, zone.width, zone.height);

        if (!zone.completed) {
          ctx.fillStyle = '#999';
          ctx.font = 'bold 16px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('ドラッグ', zone.x + zone.width / 2, zone.y + zone.height / 2);
        } else {
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 28px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('✓', zone.x + zone.width / 2, zone.y + zone.height / 2);
        }
      });

      // Draw UI
      ctx.fillStyle = '#333';
      ctx.font = 'bold 22px Arial';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText('🎨 ぬり絵師', 20, 15);

      const completed = gameState.completedZones;
      const total = gameState.totalZones;
      const percentage = Math.round((completed / total) * 100);
      ctx.font = '16px Arial';
      ctx.fillStyle = '#333';
      ctx.fillText(`進捗: ${completed}/${total} (${percentage}%)`, 20, 420);
      ctx.fillText(`ミス残: ${gameState.mistakesRemaining}`, 20, 450);

      const elapsed = Math.max(0, gameState.timeLimit - (Date.now() - gameState.startTime));
      const seconds = Math.ceil(elapsed / 1000);
      ctx.fillText(`⏱️ 制限時間: ${seconds}秒`, 20, 480);

      // Instructions
      ctx.fillStyle = '#666';
      ctx.font = '13px Arial';
      ctx.fillText('📝 図形をドラッグして塗ろう！ 100%塗るとクリア', 20, 510);
      ctx.fillText('❌ ゾーン外でドラッグするとミス！', 20, 530);
      ctx.fillText('⚠️ ミスが3回でゲームオーバー', 20, 550);

      // Win screen
      if (gameState.phase === 'gameover_win') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 64px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🎉', canvas.width / 2, canvas.height / 2 - 100);
        ctx.fillText('クリア！', canvas.width / 2, canvas.height / 2 + 10);

        ctx.fillStyle = '#ffffff';
        ctx.font = '24px Arial';
        ctx.fillText('全ての図形を塗りました！', canvas.width / 2, canvas.height / 2 + 80);
        ctx.font = '18px Arial';
        ctx.fillText('👆 クリックでリスタート', canvas.width / 2, canvas.height / 2 + 140);
      }

      // Lose screen
      if (gameState.phase === 'gameover_lose') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#FF6B6B';
        ctx.font = 'bold 64px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('💥', canvas.width / 2, canvas.height / 2 - 100);
        ctx.fillText('ゲームオーバー', canvas.width / 2, canvas.height / 2 + 10);

        ctx.fillStyle = '#ffffff';
        ctx.font = '20px Arial';
        ctx.fillText(`塗った: ${gameState.completedZones}/${gameState.totalZones}`, canvas.width / 2, canvas.height / 2 + 80);
        ctx.font = '18px Arial';
        ctx.fillText('👆 クリックでリスタート', canvas.width / 2, canvas.height / 2 + 140);
      }
    }

    canvas.addEventListener('mousedown', (e) => {
      if (gameState.phase !== 'playing') return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      gameState.dragging = true;
      gameState.dragTrail = [{x, y}];
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!gameState.dragging || gameState.phase !== 'playing') return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      gameState.dragTrail.push({x, y});
      if (gameState.dragTrail.length > 150) {
        gameState.dragTrail.shift();
      }
    });

    canvas.addEventListener('mouseup', (e) => {
      if (!gameState.dragging || gameState.phase !== 'playing') return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      gameState.dragging = false;

      let hitZone = false;
      for (let zone of gameState.zones) {
        if (!zone.completed &&
            x >= zone.x && x <= zone.x + zone.width &&
            y >= zone.y && y <= zone.y + zone.height) {
          hitZone = true;
          window.__gameDebug.dragFill(zone.id);
          break;
        }
      }

      if (!hitZone) {
        gameState.mistakesRemaining--;
        updateDebug();
        checkGameState();
      }

      gameState.dragTrail = [];
    });

    canvas.addEventListener('click', (e) => {
      if (gameState.phase === 'gameover_win' || gameState.phase === 'gameover_lose') {
        initializeZones();
        updateDebug();
      }
    });

    function animate() {
      draw();
      checkGameState();
      requestAnimationFrame(animate);
    }

    initializeZones();
    updateDebug();
    animate();
  </script>
</body>
</html>
