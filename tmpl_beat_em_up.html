<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAT EM UP</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        #gameContainer {
            position: relative;
            border: 2px solid #666;
            background: #000;
        }
        canvas {
            display: block;
        }
        #startScreen, #gameOverScreen, #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #startScreen {
            display: flex;
        }
        #gameOverScreen, #clearScreen {
            display: none;
        }
        h1 {
            font-size: 48px;
            margin: 20px;
            color: #f6e05e;
            text-shadow: 0 0 10px #f6e05e;
        }
        h2 {
            font-size: 32px;
            margin: 20px;
            color: #f6e05e;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            max-width: 400px;
            text-align: center;
            margin: 10px 0;
        }
        .info {
            font-size: 14px;
            color: #aaa;
            max-width: 380px;
            text-align: center;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            margin: 20px;
            background: #f6e05e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: #0a0a0a;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            background: #ffd700;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="startScreen">
            <h1>BEAT EM UP</h1>
            <p>敵を全て倒して先へ進もう</p>
            <p class="info">全てのエリアをクリアしたらVICTORY</p>
            <p class="info">敵と接触するとHP減少。HP0でGAME OVER</p>
            <p class="info">移動: A/D または矢印キー左右</p>
            <p class="info">上下移動: W/S または矢印キー上下</p>
            <p class="info">攻撃: スペースキー</p>
            <button onclick="startGame()">START</button>
        </div>
        <div id="gameOverScreen">
            <h2>GAME OVER</h2>
            <p>敵に倒されてしまった...</p>
            <button onclick="retryGame()">RETRY</button>
        </div>
        <div id="clearScreen">
            <h2>VICTORY</h2>
            <p>全てのエリアをクリアした!</p>
            <button onclick="retryGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const config = {
            title: 'BEAT EM UP',
            bg_color: '#1a0a0a',
            ground_color: '#8b4513',
            player_color: '#f6e05e',
            enemy_color: '#e53e3e',
            player_hp: 5,
            player_speed: 4,
            punch_range: 60,
            enemies_per_screen: 4,
            win_screens: 3
        };

        const LANE_TOP = 150;
        const LANE_BOTTOM = 280;

        const gameState = {
            running: false,
            screen: 1,
            player: null,
            enemies: [],
            keys: {},
            invulnerable: 0,
            punchFrame: 0
        };

        function setupCanvas() {
            canvas.width = 500;
            canvas.height = 350;
            document.getElementById('gameContainer').style.width = canvas.width + 'px';
            document.getElementById('gameContainer').style.height = canvas.height + 'px';
        }

        function initGame() {
            gameState.running = true;
            gameState.screen = 1;
            gameState.player = {
                x: 80,
                y: 220,
                w: 30,
                h: 40,
                hp: config.player_hp
            };
            gameState.enemies = [];
            gameState.invulnerable = 0;
            gameState.punchFrame = 0;
            spawnEnemies(config.enemies_per_screen);
        }

        function spawnEnemies(count) {
            gameState.enemies = [];
            for (let i = 0; i < count; i++) {
                const x = 350 + Math.random() * 122;
                const y = LANE_TOP + 30 + Math.random() * (LANE_BOTTOM - LANE_TOP - 60);
                gameState.enemies.push({
                    x: x,
                    y: Math.max(LANE_TOP, Math.min(LANE_BOTTOM, y)),
                    w: 28,
                    h: 38,
                    hp: 3,
                    speed: 1.2
                });
            }
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            setupCanvas();
            initGame();
            gameLoop();
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }

        function handleInput() {
            const aKey = gameState.keys['a'];
            const dKey = gameState.keys['d'];
            const wKey = gameState.keys['w'];
            const sKey = gameState.keys['s'];
            const arrowLeft = gameState.keys['arrowleft'];
            const arrowRight = gameState.keys['arrowright'];
            const arrowUp = gameState.keys['arrowup'];
            const arrowDown = gameState.keys['arrowdown'];

            if (aKey || arrowLeft) {
                gameState.player.x -= config.player_speed;
            }
            if (dKey || arrowRight) {
                gameState.player.x += config.player_speed;
            }
            if (wKey || arrowUp) {
                gameState.player.y -= config.player_speed;
            }
            if (sKey || arrowDown) {
                gameState.player.y += config.player_speed;
            }

            gameState.player.x = Math.max(20, Math.min(480, gameState.player.x));
            gameState.player.y = Math.max(LANE_TOP, Math.min(LANE_BOTTOM, gameState.player.y));

            if (gameState.keys[' '] && gameState.punchFrame === 0) {
                gameState.punchFrame = 10;
                performPunch();
            }
        }

        function performPunch() {
            const baseX = gameState.player.x + 15;
            const baseY = gameState.player.y;

            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                const e = gameState.enemies[i];
                const dx = e.x - baseX;
                const dy = e.y - baseY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < config.punch_range) {
                    e.hp -= 1;
                    if (e.hp <= 0) {
                        gameState.enemies.splice(i, 1);
                    }
                }
            }
        }

        function updateEnemies() {
            for (let e of gameState.enemies) {
                const dx = gameState.player.x - e.x;
                const dy = gameState.player.y - e.y;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;

                e.x += (dx / dist) * e.speed;
                e.y += (dy / dist) * e.speed;

                e.y = Math.max(LANE_TOP, Math.min(LANE_BOTTOM, e.y));

                const collideDist = 25;
                if (dist < collideDist && gameState.invulnerable === 0) {
                    gameState.player.hp -= 1;
                    gameState.invulnerable = 60;

                    if (gameState.player.hp <= 0) {
                        gameState.running = false;
                        document.getElementById('gameOverScreen').style.display = 'flex';
                        return;
                    }
                }
            }
        }

        function updateGame() {
            if (gameState.invulnerable > 0) {
                gameState.invulnerable -= 1;
            }
            if (gameState.punchFrame > 0) {
                gameState.punchFrame -= 1;
            }

            handleInput();
            updateEnemies();

            if (gameState.enemies.length === 0) {
                if (gameState.screen >= config.win_screens) {
                    gameState.running = false;
                    document.getElementById('clearScreen').style.display = 'flex';
                    return;
                }
                gameState.screen += 1;
                spawnEnemies(config.enemies_per_screen);
            }
        }

        function drawGame() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = config.ground_color;
            ctx.fillRect(0, LANE_BOTTOM, canvas.width, canvas.height - LANE_BOTTOM);

            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, LANE_TOP);
            ctx.lineTo(canvas.width, LANE_TOP);
            ctx.stroke();

            for (let e of gameState.enemies) {
                ctx.fillStyle = config.enemy_color;
                ctx.fillRect(e.x - e.w / 2, e.y - e.h, e.w, e.h);
            }

            const playerAlpha = gameState.invulnerable > 0 && gameState.invulnerable % 6 < 3 ? 0.5 : 1;
            ctx.globalAlpha = playerAlpha;
            ctx.fillStyle = config.player_color;
            ctx.fillRect(gameState.player.x - gameState.player.w / 2, gameState.player.y - gameState.player.h, gameState.player.w, gameState.player.h);
            ctx.globalAlpha = 1;

            if (gameState.punchFrame > 0) {
                ctx.strokeStyle = config.player_color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(gameState.player.x + 20, gameState.player.y, config.punch_range, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.fillStyle = '#fff';
            ctx.font = '16px Arial';
            ctx.fillText('HP: ' + gameState.player.hp, 10, 30);
            ctx.fillText('AREA: ' + gameState.screen + '/' + config.win_screens, 10, 50);
            ctx.fillText('ENEMIES: ' + gameState.enemies.length, 10, 70);

            ctx.font = '14px Arial';
            ctx.fillStyle = '#aaa';
            ctx.textAlign = 'right';
            ctx.fillText('Move: A/D or Arrows | Attack: Space', canvas.width - 10, canvas.height - 10);
            ctx.textAlign = 'left';
        }

        function gameLoop() {
            if (gameState.running) {
                updateGame();
            }
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', function(event) {
            const key = event.key === ' ' ? ' ' : event.key.toLowerCase();
            gameState.keys[key] = true;
            if (event.key === ' ') event.preventDefault();
        });

        document.addEventListener('keyup', function(event) {
            const key = event.key === ' ' ? ' ' : event.key.toLowerCase();
            gameState.keys[key] = false;
        });

        setupCanvas();
    </script>
</body>
</html>
