<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAT EM UP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #000;
        }
        #gameContainer { position: relative; }
        canvas { display: block; border: 2px solid #fff; }
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: #fff; z-index: 100;
        }
        .screen.show { display: flex; }
        #startScreen { 
            background: linear-gradient(135deg, #1a0a0a 0%, #3d2817 100%);
        }
        .screen h1 { font-size: 48px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .screen p { font-size: 16px; margin: 10px 0; text-align: center; max-width: 400px; }
        .btn {
            padding: 12px 30px; margin-top: 20px; font-size: 18px;
            background: #f6e05e; color: #000; border: none; cursor: pointer;
            border-radius: 4px; font-weight: bold; transition: 0.2s;
        }
        .btn:hover { background: #e0b800; transform: scale(1.05); }
        #gameOverScreen { background: rgba(0,0,0,0.95); }
        #clearScreen { background: rgba(0,0,0,0.95); }
        .instructions {
            font-size: 14px; margin-top: 20px; line-height: 1.6;
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="startScreen" class="screen show">
            <h1>BEAT EM UP</h1>
            <p>横スクロールベルトアクション</p>
            <p>敵を全員倒してステージをクリアしよう！</p>
            <div class="instructions">
                <strong>操作方法</strong><br>
                A/D または ← → : 左右移動<br>
                W/S または ↑ ↓ : 奥行き変更（上下レーン移動）<br>
                SPACE : パンチ
            </div>
            <p style="margin-top: 15px; font-size: 13px;">HP 5 でスタート | 敵に接触するとHP-1<br>全敵撃破で次ステージ | 3ステージクリアでゲームクリア</p>
            <button class="btn" onclick="startGame()">START</button>
        </div>
        
        <div id="gameOverScreen" class="screen">
            <h1>GAME OVER</h1>
            <p>HP が 0 になってしまった...</p>
            <button class="btn" onclick="retryGame()">RETRY</button>
        </div>
        
        <div id="clearScreen" class="screen">
            <h1>CLEAR!</h1>
            <p>3ステージをクリアしました！</p>
            <button class="btn" onclick="retryGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // パラメータスキーマ（コメント）
        // theme:              string
        // title:              string
        // bg_color:           string
        // ground_color:       string
        // player_color:       string
        // enemy_color:        string
        // player_hp:          int
        // player_speed:       int
        // punch_range:        int
        // enemies_per_screen: int
        // win_screens:        int

        const config = {
            title: 'BEAT EM UP',
            bg_color: '#1a0a0a',
            ground_color: '#8b4513',
            player_color: '#f6e05e',
            enemy_color: '#e53e3e',
            player_hp: 5,
            player_speed: 4,
            punch_range: 60,
            enemies_per_screen: 4,
            win_screens: 3
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500;
        canvas.height = 400;
        document.getElementById('gameContainer').style.width = canvas.width + 'px';
        document.getElementById('gameContainer').style.height = canvas.height + 'px';

        const gameState = {
            running: false,
            screen: 0,
            player: { x: 50, y: 150, width: 30, height: 50, hp: config.player_hp, laneY: 150 },
            enemies: [],
            keys: {},
            isPunching: false,
            punchCooldown: 0
        };

        const gameConfig = {
            width: 500,
            height: 400,
            groundY: 350,
            lanes: [50, 150, 250],
            enemySize: 30,
            enemySpeed: 1.5
        };

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState.running = true;
            gameState.screen = 0;
            gameState.player.hp = config.player_hp;
            gameState.player.x = 50;
            gameState.player.y = 150;
            gameState.player.laneY = 150;
            gameState.enemies = [];
            gameState.isPunching = false;
            spawnEnemies();
            gameLoop();
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }

        function spawnEnemies() {
            gameState.enemies = [];
            const enemyCount = config.enemies_per_screen + Math.floor(gameState.screen * 0.5);
            const isBoss = gameState.screen === config.win_screens - 1;
            for (let i = 0; i < (isBoss ? 1 : enemyCount); i++) {
                gameState.enemies.push({
                    x: gameConfig.width - 50 - i * 60,
                    y: gameConfig.lanes[i % gameConfig.lanes.length],
                    width: gameConfig.enemySize,
                    height: gameConfig.enemySize,
                    hp: isBoss ? 5 : 1,
                    maxHp: isBoss ? 5 : 1
                });
            }
        }

        document.addEventListener('keydown', (e) => { gameState.keys[e.key.toLowerCase()] = true; });
        document.addEventListener('keyup', (e) => { gameState.keys[e.key.toLowerCase()] = false; });

        function handleInput() {
            const keys = gameState.keys;
            if (keys['a'] || keys['arrowleft']) gameState.player.x -= config.player_speed;
            if (keys['d'] || keys['arrowright']) gameState.player.x += config.player_speed;
            gameState.player.x = Math.max(0, Math.min(gameState.player.x, gameConfig.width - gameState.player.width));
            
            if (keys['w'] || keys['arrowup']) {
                const idx = gameConfig.lanes.indexOf(gameState.player.y);
                if (idx > 0) gameState.player.y = gameConfig.lanes[idx - 1];
            }
            if (keys['s'] || keys['arrowdown']) {
                const idx = gameConfig.lanes.indexOf(gameState.player.y);
                if (idx < gameConfig.lanes.length - 1) gameState.player.y = gameConfig.lanes[idx + 1];
            }

            if ((keys[' '] || keys['spacebar']) && gameState.punchCooldown <= 0) {
                gameState.isPunching = true;
                gameState.punchCooldown = 15;
            }
            if (gameState.punchCooldown > 0) gameState.punchCooldown--;
        }

        function update() {
            handleInput();

            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                const enemy = gameState.enemies[i];
                if (enemy.x > gameState.player.x) enemy.x -= gameConfig.enemySpeed;
                
                if (gameState.isPunching && 
                    gameState.player.x < enemy.x + enemy.width + config.punch_range &&
                    gameState.player.y === enemy.y) {
                    enemy.hp--;
                    if (enemy.hp <= 0) {
                        gameState.enemies.splice(i, 1);
                        continue;
                    }
                }

                if (gameState.player.x < enemy.x + enemy.width && 
                    gameState.player.x + gameState.player.width > enemy.x &&
                    gameState.player.y === enemy.y) {
                    gameState.player.hp--;
                    enemy.x -= 30;
                    if (gameState.player.hp <= 0) {
                        gameState.running = false;
                        document.getElementById('gameOverScreen').style.display = 'flex';
                        return;
                    }
                }
            }

            if (gameState.enemies.length === 0) {
                gameState.screen++;
                if (gameState.screen >= config.win_screens) {
                    gameState.running = false;
                    document.getElementById('clearScreen').style.display = 'flex';
                    return;
                }
                spawnEnemies();
            }

            gameState.isPunching = false;
        }

        function draw() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, gameConfig.width, gameConfig.height);

            for (const lane of gameConfig.lanes) {
                ctx.strokeStyle = 'rgba(139,69,19,0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, lane + 30);
                ctx.lineTo(gameConfig.width, lane + 30);
                ctx.stroke();
            }

            ctx.fillStyle = config.player_color;
            ctx.fillRect(gameState.player.x, gameState.player.y, gameState.player.width, gameState.player.height);

            if (gameState.isPunching) {
                ctx.strokeStyle = config.player_color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(gameState.player.x + gameState.player.width, gameState.player.y + 15);
                ctx.lineTo(gameState.player.x + gameState.player.width + config.punch_range, gameState.player.y + 15);
                ctx.stroke();
            }

            for (const enemy of gameState.enemies) {
                ctx.fillStyle = config.enemy_color;
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                if (enemy.maxHp > 1) {
                    ctx.fillStyle = '#fff';
                    ctx.font = '10px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(enemy.hp, enemy.x + enemy.width / 2, enemy.y + enemy.height / 2 + 3);
                }
            }

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('HP: ' + gameState.player.hp, 10, 25);
            ctx.fillText('STAGE: ' + (gameState.screen + 1) + '/' + config.win_screens, 10, 50);
            ctx.fillText('ENEMIES: ' + gameState.enemies.length, 10, 75);

            ctx.font = '12px Arial';
            ctx.fillText('[A/D] Left/Right  [W/S] Lane  [SPACE] Punch', 10, gameConfig.height - 10);
        }

        function gameLoop() {
            if (gameState.running) {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
