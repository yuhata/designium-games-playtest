<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コスモズーム</title>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #0a0e27;
    font-family: "Arial", sans-serif;
  }
  canvas {
    border: 2px solid #1a3a52;
    background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #16213e 100%);
    display: block;
  }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
// デバッグコントラクト初期化
window.__gameDebug = {
  objects: [],
  metrics: { score: 0, progress: 0.0, remaining: 0, phase: "playing" },
  tapObject: function(id) {}
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const game = {
  phase: "playing",
  score: 0,
  remaining: 5,
  timeLimit: 60,
  timeElapsed: 0,
  stars: [],
  clickedCount: 0,
  totalStars: 5,
  particles: [],
  startTime: null,
  gameLoopStarted: false
};

class Star {
  constructor(x, y, id) {
    this.id = id;
    this.x = x;
    this.y = y;
    this.baseRadius = 20;
    this.radius = this.baseRadius;
    this.enabled = true;
    this.clicked = false;
    this.clickTime = 0;
    this.glow = 0;
    this.rotation = Math.random() * Math.PI * 2;
  }

  isPointInside(px, py) {
    if (!this.enabled) return false;
    const dist = Math.hypot(px - this.x, py - this.y);
    return dist <= this.radius + 10;
  }

  draw() {
    if (!this.enabled) return;
    
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);

    if (this.clicked) {
      const elapsed = Date.now() - this.clickTime;
      const progress = Math.min(elapsed / 300, 1);
      this.glow = 1 - progress;
      this.radius = this.baseRadius + progress * 30;

      if (progress >= 1) {
        this.enabled = false;
      }

      ctx.globalAlpha = 1 - progress * 0.5;
    } else {
      this.glow = Math.sin(Date.now() * 0.003) * 0.3 + 0.7;
    }

    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
    gradient.addColorStop(0, `rgba(100, 200, 255, ${this.glow * 0.8})`);
    gradient.addColorStop(0.5, `rgba(50, 150, 255, ${this.glow * 0.4})`);
    gradient.addColorStop(1, `rgba(0, 100, 255, 0)`);
    ctx.fillStyle = gradient;
    ctx.fillRect(-this.radius, -this.radius, this.radius * 2, this.radius * 2);

    ctx.fillStyle = `rgba(100, 200, 255, ${0.9 - this.glow * 0.2})`;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
      const r = i % 2 === 0 ? this.radius : this.radius * 0.4;
      const px = Math.cos(angle) * r;
      const py = Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = `rgba(200, 255, 255, ${this.glow})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.restore();
  }

  tap() {
    if (!this.enabled || this.clicked) return;
    this.clicked = true;
    this.clickTime = Date.now();
    game.clickedCount++;
    game.score += 100;
    createParticles(this.x, this.y);
  }
}

class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 6;
    this.vy = (Math.random() - 0.5) * 6 - 2;
    this.life = 1;
    this.decay = 0.02;
    this.size = Math.random() * 4 + 2;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.2;
    this.life -= this.decay;
  }

  draw() {
    if (this.life <= 0) return;
    ctx.fillStyle = `rgba(100, 200, 255, ${this.life * 0.8})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function createParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    game.particles.push(new Particle(x, y));
  }
}

function initGame() {
  game.phase = "playing";
  game.score = 0;
  game.clickedCount = 0;
  game.timeElapsed = 0;
  game.stars = [];
  game.particles = [];
  game.remaining = game.totalStars;
  game.startTime = Date.now();

  for (let i = 0; i < game.totalStars; i++) {
    let x, y, valid;
    do {
      valid = true;
      x = Math.random() * (canvas.width - 100) + 50;
      y = Math.random() * (canvas.height - 150) + 100;
      for (const star of game.stars) {
        if (Math.hypot(x - star.x, y - star.y) < 120) {
          valid = false;
          break;
        }
      }
    } while (!valid);
    game.stars.push(new Star(x, y, `star_${i}`));
  }

  updateDebug();
}

function updateDebug() {
  window.__gameDebug.objects = game.stars
    .filter(star => star.enabled)
    .map((star) => ({
      id: star.id,
      enabled: !star.clicked,
      matchId: null,
      x: Math.round(star.x),
      y: Math.round(star.y),
      w: star.baseRadius * 2,
      h: star.baseRadius * 2
    }));

  window.__gameDebug.metrics = {
    score: game.score,
    progress: Math.min(game.clickedCount / game.totalStars, 1),
    remaining: game.remaining,
    phase: game.phase
  };
}

window.__gameDebug.tapObject = function(id) {
  const match = id.match(/_(\d+)$/);
  if (!match) return;
  const idx = parseInt(match[1], 10);
  if (game.stars[idx] && !game.stars[idx].clicked) {
    game.stars[idx].tap();
    updateDebug();
  }
};

function handleCanvasClick(e) {
  if (game.phase === "win" || game.phase === "fail") {
    initGame();
    return;
  }

  if (game.phase !== "playing") return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  for (const star of game.stars) {
    if (star.isPointInside(x, y) && !star.clicked) {
      star.tap();
      break;
    }
  }
  updateDebug();
}

function checkWinCondition() {
  if (game.clickedCount >= game.totalStars && game.phase === "playing") {
    game.phase = "win";
    updateDebug();
  }
}

function checkFailCondition() {
  if (game.timeElapsed >= game.timeLimit && game.phase === "playing") {
    game.phase = "fail";
    updateDebug();
  }
}

function update() {
  if (game.phase === "playing") {
    const now = Date.now();
    game.timeElapsed = (now - game.startTime) / 1000;
    game.remaining = Math.max(0, game.totalStars - game.clickedCount);

    for (let i = game.particles.length - 1; i >= 0; i--) {
      game.particles[i].update();
      if (game.particles[i].life <= 0) {
        game.particles.splice(i, 1);
      }
    }

    checkWinCondition();
    checkFailCondition();
  }
}

function draw() {
  ctx.fillStyle = "rgba(10, 14, 39, 0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (const star of game.stars) {
    star.draw();
  }

  for (const particle of game.particles) {
    particle.draw();
  }

  ctx.fillStyle = "#ffffff";
  ctx.font = "18px Arial";
  ctx.textAlign = "left";
  ctx.fillText(`Score: ${game.score}`, 20, 30);
  ctx.fillText(`Remaining: ${game.remaining}`, 20, 60);
  const timeDisplay = Math.max(0, game.timeLimit - Math.floor(game.timeElapsed));
  ctx.fillText(`Time: ${timeDisplay}s left`, 20, 90);

  if (game.clickedCount === 0 && game.timeElapsed < 3) {
    ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
    ctx.font = "bold 20px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Click the stars to collect cosmic points!", canvas.width / 2, canvas.height - 20);
  }

  if (game.phase === "win") {
    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ffff00";
    ctx.font = "bold 56px Arial";
    ctx.textAlign = "center";
    ctx.fillText("COSMIC VICTORY!", canvas.width / 2, canvas.height / 2 - 60);
    
    ctx.fillStyle = "#ffffff";
    ctx.font = "28px Arial";
    ctx.fillText(`Final Score: ${game.score}`, canvas.width / 2, canvas.height / 2 + 20);
    
    ctx.fillStyle = "#88ff88";
    ctx.font = "20px Arial";
    ctx.fillText("Click to continue", canvas.width / 2, canvas.height / 2 + 80);
  }

  if (game.phase === "fail") {
    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ff5555";
    ctx.font = "bold 56px Arial";
    ctx.textAlign = "center";
    ctx.fillText("TIME UP!", canvas.width / 2, canvas.height / 2 - 60);
    
    ctx.fillStyle = "#ffffff";
    ctx.font = "28px Arial";
    ctx.fillText(`Score: ${game.score}`, canvas.width / 2, canvas.height / 2 + 20);
    
    ctx.fillStyle = "#ff8888";
    ctx.font = "20px Arial";
    ctx.fillText("Click to retry", canvas.width / 2, canvas.height / 2 + 80);
  }

  ctx.textAlign = "left";
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

canvas.addEventListener('click', handleCanvasClick);

function startGame() {
  if (!game.gameLoopStarted) {
    game.gameLoopStarted = true;
    initGame();
    gameLoop();
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startGame);
} else {
  startGame();
}

</script>
</body>
</html>
