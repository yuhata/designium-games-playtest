<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP DOWN FPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        #container {
            position: relative;
            width: 800px;
            height: 600px;
        }
        
        canvas {
            display: block;
            border: 2px solid #666;
        }
        
        #startScreen, #gameOverScreen, #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 20px;
        }
        
        #gameOverScreen, #clearScreen {
            display: none;
        }
        
        #startScreen h1, #gameOverScreen h1, #clearScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        #startScreen button, #gameOverScreen button, #clearScreen button {
            padding: 12px 24px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            background: #68d391;
            color: #000;
            border-radius: 4px;
        }
        
        #startScreen button:hover, #gameOverScreen button:hover, #clearScreen button:hover {
            background: #48bb78;
        }
        
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            color: #68d391;
            font-size: 14px;
            font-family: monospace;
            z-index: 50;
            line-height: 1.6;
        }
        
        #hud div {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="startScreen">
            <h1>TOP DOWN FPS</h1>
            <div style="text-align: center; margin-bottom: 20px;">
                <p>WASD: Move</p>
                <p>Mouse: Aim</p>
                <p>Click: Shoot</p>
            </div>
            <button onclick="startGame()">START</button>
        </div>
        
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <button onclick="retryGame()">RETRY</button>
        </div>
        
        <div id="clearScreen">
            <h1>CLEAR!</h1>
            <button onclick="retryGame()">RETRY</button>
        </div>
        
        <div id="hud">
            <div>HP: <span id="hp"></span></div>
            <div>Ammo: <span id="ammo"></span></div>
            <div>Kills: <span id="kills"></span>/<span id="target"></span></div>
        </div>
    </div>

    <script>
        const config = {
            title: 'TOP DOWN FPS',
            bg_color: '#1a1a1a',
            wall_color: '#4a5568',
            player_color: '#68d391',
            enemy_color: '#e53e3e',
            bullet_color: '#f6e05e',
            player_hp: 3,
            bullet_max: 30,
            win_kills: 10,
            enemy_count: 5
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const clearScreen = document.getElementById('clearScreen');

        document.body.style.background = config.bg_color;
        document.getElementById('container').style.background = config.bg_color;
        document.getElementById('target').textContent = config.win_kills;

        const gameState = {
            running: false,
            player: {
                x: 400,
                y: 300,
                width: 20,
                height: 20,
                speed: 4,
                angle: 0,
                hp: config.player_hp,
                ammo: config.bullet_max,
                kills: 0
            },
            bullets: [],
            enemies: [],
            keys: {},
            mouse: { x: canvas.width / 2, y: canvas.height / 2 }
        };

        const walls = [
            { x: 50, y: 50, width: 700, height: 20 },
            { x: 50, y: 530, width: 700, height: 20 },
            { x: 50, y: 50, width: 20, height: 480 },
            { x: 730, y: 50, width: 20, height: 480 },
            { x: 200, y: 150, width: 400, height: 20 },
            { x: 350, y: 100, width: 20, height: 200 },
            { x: 150, y: 350, width: 500, height: 20 },
            { x: 300, y: 300, width: 20, height: 150 }
        ];

        const patrolRoutes = [
            [{ x: 150, y: 200 }, { x: 300, y: 200 }, { x: 300, y: 100 }],
            [{ x: 500, y: 150 }, { x: 650, y: 150 }, { x: 650, y: 300 }],
            [{ x: 400, y: 400 }, { x: 200, y: 400 }, { x: 200, y: 500 }],
            [{ x: 550, y: 450 }, { x: 650, y: 450 }, { x: 650, y: 350 }],
            [{ x: 100, y: 450 }, { x: 100, y: 250 }, { x: 200, y: 250 }]
        ];

        function initEnemies() {
            gameState.enemies = [];
            for (let i = 0; i < config.enemy_count; i++) {
                gameState.enemies.push({
                    x: patrolRoutes[i][0].x,
                    y: patrolRoutes[i][0].y,
                    width: 16,
                    height: 16,
                    speed: 2,
                    hp: 3,
                    alert: false,
                    alertTimer: 0,
                    route: patrolRoutes[i],
                    routeIndex: 0,
                    angle: 0,
                    damageTimer: 0
                });
            }
        }

        function getDistance(x1, y1, x2, y2) {
            return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        }

        function getAngle(x1, y1, x2, y2) {
            return Math.atan2(y2 - y1, x2 - x1);
        }

        function checkCollision(x, y, w, h, wall) {
            return x < wall.x + wall.width &&
                   x + w > wall.x &&
                   y < wall.y + wall.height &&
                   y + h > wall.y;
        }

        function canMoveTo(x, y, w, h) {
            for (let wall of walls) {
                if (checkCollision(x, y, w, h, wall)) return false;
            }
            return true;
        }

        document.addEventListener('keydown', (e) => {
            gameState.keys[e.key.toLowerCase()] = true;
        });

        document.addEventListener('keyup', (e) => {
            gameState.keys[e.key.toLowerCase()] = false;
        });

        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            gameState.mouse.x = e.clientX - rect.left;
            gameState.mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('click', (e) => {
            if (!gameState.running) return;
            
            if (gameState.player.ammo > 0) {
                const angle = getAngle(
                    gameState.player.x,
                    gameState.player.y,
                    gameState.mouse.x,
                    gameState.mouse.y
                );
                
                gameState.bullets.push({
                    x: gameState.player.x + Math.cos(gameState.player.angle) * 15,
                    y: gameState.player.y + Math.sin(gameState.player.angle) * 15,
                    vx: Math.cos(angle) * 6,
                    vy: Math.sin(angle) * 6,
                    width: 4,
                    height: 4
                });
                
                gameState.player.ammo--;
            }
        });

        function updatePlayer() {
            let nx = gameState.player.x;
            let ny = gameState.player.y;

            if (gameState.keys['w'] || gameState.keys['arrowup']) ny -= gameState.player.speed;
            if (gameState.keys['s'] || gameState.keys['arrowdown']) ny += gameState.player.speed;
            if (gameState.keys['a'] || gameState.keys['arrowleft']) nx -= gameState.player.speed;
            if (gameState.keys['d'] || gameState.keys['arrowright']) nx += gameState.player.speed;

            if (canMoveTo(nx - gameState.player.width / 2, ny - gameState.player.height / 2, gameState.player.width, gameState.player.height)) {
                gameState.player.x = nx;
                gameState.player.y = ny;
            }

            gameState.player.angle = getAngle(gameState.player.x, gameState.player.y, gameState.mouse.x, gameState.mouse.y);

            // Check enemy collision with player
            for (let enemy of gameState.enemies) {
                const dist = getDistance(gameState.player.x, gameState.player.y, enemy.x, enemy.y);
                if (dist < gameState.player.width / 2 + enemy.width / 2 && gameState.player.damageTimer <= 0) {
                    gameState.player.hp--;
                    gameState.player.damageTimer = 30;
                }
            }

            if (gameState.player.damageTimer > 0) gameState.player.damageTimer--;
        }

        function updateEnemies() {
            for (let enemy of gameState.enemies) {
                const distToPlayer = getDistance(enemy.x, enemy.y, gameState.player.x, gameState.player.y);
                
                if (distToPlayer < 200) {
                    enemy.alert = true;
                    enemy.alertTimer = 180;
                } else if (enemy.alertTimer > 0) {
                    enemy.alertTimer--;
                } else {
                    enemy.alert = false;
                }

                if (enemy.alert) {
                    enemy.angle = getAngle(enemy.x, enemy.y, gameState.player.x, gameState.player.y);
                    const nx = enemy.x + Math.cos(enemy.angle) * enemy.speed;
                    const ny = enemy.y + Math.sin(enemy.angle) * enemy.speed;
                    
                    if (canMoveTo(nx - enemy.width / 2, ny - enemy.height / 2, enemy.width, enemy.height)) {
                        enemy.x = nx;
                        enemy.y = ny;
                    }
                } else {
                    const target = enemy.route[enemy.routeIndex];
                    const dist = getDistance(enemy.x, enemy.y, target.x, target.y);
                    
                    if (dist < 10) {
                        enemy.routeIndex = (enemy.routeIndex + 1) % enemy.route.length;
                    } else {
                        enemy.angle = getAngle(enemy.x, enemy.y, target.x, target.y);
                        const nx = enemy.x + Math.cos(enemy.angle) * enemy.speed;
                        const ny = enemy.y + Math.sin(enemy.angle) * enemy.speed;
                        
                        if (canMoveTo(nx - enemy.width / 2, ny - enemy.height / 2, enemy.width, enemy.height)) {
                            enemy.x = nx;
                            enemy.y = ny;
                        }
                    }
                }
            }
        }

        function updateBullets() {
            for (let i = gameState.bullets.length - 1; i >= 0; i--) {
                const bullet = gameState.bullets[i];
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;

                let hitWall = false;
                for (let wall of walls) {
                    if (checkCollision(bullet.x - bullet.width / 2, bullet.y - bullet.height / 2, bullet.width, bullet.height, wall)) {
                        hitWall = true;
                        break;
                    }
                }

                if (hitWall) {
                    gameState.bullets.splice(i, 1);
                    continue;
                }

                for (let j = gameState.enemies.length - 1; j >= 0; j--) {
                    const enemy = gameState.enemies[j];
                    
                    const headY = enemy.y - enemy.height / 2;
                    const headBottom = headY + enemy.height / 4;
                    
                    const isHeadshot = bullet.x > enemy.x - enemy.width / 2 &&
                                      bullet.x < enemy.x + enemy.width / 2 &&
                                      bullet.y > headY &&
                                      bullet.y < headBottom;
                    
                    const isBodyshot = bullet.x > enemy.x - enemy.width / 2 &&
                                       bullet.x < enemy.x + enemy.width / 2 &&
                                       bullet.y > headBottom &&
                                       bullet.y < enemy.y + enemy.height / 2;
                    
                    if (isHeadshot) {
                        gameState.enemies.splice(j, 1);
                        gameState.player.kills++;
                        gameState.bullets.splice(i, 1);
                        break;
                    } else if (isBodyshot) {
                        enemy.hp--;
                        if (enemy.hp <= 0) {
                            gameState.enemies.splice(j, 1);
                            gameState.player.kills++;
                        }
                        gameState.bullets.splice(i, 1);
                        break;
                    }
                }

                if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                    gameState.bullets.splice(i, 1);
                }
            }
        }

        function checkGameState() {
            if (gameState.player.hp <= 0) {
                gameState.running = false;
                gameOverScreen.style.display = 'flex';
                return;
            }

            if (gameState.player.kills >= config.win_kills) {
                gameState.running = false;
                clearScreen.style.display = 'flex';
                return;
            }
        }

        function draw() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = config.wall_color;
            for (let wall of walls) {
                ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
            }

            ctx.fillStyle = config.enemy_color;
            for (let enemy of gameState.enemies) {
                ctx.save();
                ctx.translate(enemy.x, enemy.y);
                ctx.rotate(enemy.angle);
                
                ctx.fillRect(-enemy.width / 2, -enemy.height / 2, enemy.width, enemy.height);
                
                ctx.fillStyle = '#ff6b6b';
                ctx.fillRect(-enemy.width / 2, -enemy.height / 2, enemy.width, enemy.height / 4);
                ctx.fillStyle = config.enemy_color;
                
                ctx.restore();
            }

            ctx.fillStyle = config.player_color;
            ctx.save();
            ctx.translate(gameState.player.x, gameState.player.y);
            ctx.rotate(gameState.player.angle);
            ctx.fillRect(-gameState.player.width / 2, -gameState.player.height / 2, gameState.player.width, gameState.player.height);
            ctx.fillStyle = config.bullet_color;
            ctx.fillRect(gameState.player.width / 2, -2, 8, 4);
            ctx.restore();

            ctx.fillStyle = config.bullet_color;
            for (let bullet of gameState.bullets) {
                ctx.fillRect(bullet.x - bullet.width / 2, bullet.y - bullet.height / 2, bullet.width, bullet.height);
            }

            updateHUD();
        }

        function updateHUD() {
            document.getElementById('hp').textContent = '♥'.repeat(Math.max(0, gameState.player.hp));
            document.getElementById('ammo').textContent = gameState.player.ammo + '/' + config.bullet_max;
            document.getElementById('kills').textContent = gameState.player.kills;
        }

        function gameLoop() {
            if (gameState.running) {
                updatePlayer();
                updateEnemies();
                updateBullets();
                checkGameState();
            }

            draw();

            if (gameState.running) {
                requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            gameState.player.hp = config.player_hp;
            gameState.player.ammo = config.bullet_max;
            gameState.player.kills = 0;
            gameState.player.x = 400;
            gameState.player.y = 300;
            gameState.player.damageTimer = 0;
            gameState.bullets = [];
            
            initEnemies();
            
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            clearScreen.style.display = 'none';
            
            gameState.running = true;
            gameLoop();
        }

        function retryGame() {
            startScreen.style.display = 'flex';
            gameOverScreen.style.display = 'none';
            clearScreen.style.display = 'none';
        }

        updateHUD();
    </script>
</body>
</html>
