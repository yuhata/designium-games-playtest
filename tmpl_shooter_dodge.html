<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DODGE ONLY</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080810; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; }
canvas { display: block; border: 2px solid #222; }
.screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
  align-items: center; justify-content: center; color: #fff; z-index: 10;
}
.screen h1 { font-size: 44px; margin-bottom: 14px; }
.screen p { font-size: 15px; color: #999; margin-bottom: 6px; text-align: center; }
.screen button { margin-top: 22px; padding: 12px 36px; font-size: 18px; background: #cc3344; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
.screen button:hover { background: #ee4455; }
</style>
</head>
<body>

<div id="startScreen" class="screen" style="display:flex;">
  <h1>DODGE ONLY</h1>
  <p>弾を撃たずに避けるだけ！</p>
  <p>マウス移動 or ←→↑↓ キーで回避</p>
  <p style="color:#666;font-size:13px;">60秒生存でクリア（弾に当たるとライフ-1・ライフ3）</p>
  <button onclick="startGame()">START</button>
</div>

<div id="gameoverScreen" class="screen" style="display:none;">
  <h1>HIT!</h1>
  <p id="goTime"></p>
  <button onclick="retryGame()">RETRY</button>
</div>

<div id="clearScreen" class="screen" style="display:none;">
  <h1>SURVIVED!</h1>
  <p>60秒生き延びた！</p>
  <p id="clDodge"></p>
  <button onclick="retryGame()">もう一度</button>
</div>

<canvas id="gameCanvas" width="480" height="480"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let loopId = null;
let gameState = {
  running: false,
  life: 3,
  tick: 0,
  dodges: 0,
  invincible: 0,
  mouseX: W/2,
  mouseY: H/2
};

let player = {};
let bullets = [];
let enemies = [];
const keys = {};
const CLEAR_TICKS = 60 * 60; // 60 sec @ 60fps approx

document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup',   e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  gameState.mouseX = e.clientX - r.left;
  gameState.mouseY = e.clientY - r.top;
});

function initGame() {
  player = { x: W/2, y: H/2, r: 8, speed: 3 };
  bullets = [];
  enemies = [];
  gameState.life = 3;
  gameState.tick = 0;
  gameState.dodges = 0;
  gameState.invincible = 0;
  gameState.mouseX = W/2;
  gameState.mouseY = H/2;
  spawnEnemy();
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  initGame();
  gameState.running = true;
  if (loopId) clearInterval(loopId);
  loopId = setInterval(gameLoop, 16);
}

function retryGame() {
  gameState.running = false;
  document.getElementById('gameoverScreen').style.display = 'none';
  document.getElementById('clearScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
}

function spawnEnemy() {
  const side = Math.floor(Math.random() * 4);
  let ex, ey;
  if      (side === 0) { ex = Math.random() * W; ey = -20; }
  else if (side === 1) { ex = W + 20;             ey = Math.random() * H; }
  else if (side === 2) { ex = Math.random() * W; ey = H + 20; }
  else                 { ex = -20;                ey = Math.random() * H; }
  enemies.push({ x: ex, y: ey, r: 10, fireTimer: 60 + Math.floor(Math.random() * 60) });
}

function update() {
  gameState.tick++;

  // player move (keyboard)
  const SPEED = 3.2;
  if (keys['ArrowLeft']  || keys['a']) player.x -= SPEED;
  if (keys['ArrowRight'] || keys['d']) player.x += SPEED;
  if (keys['ArrowUp']    || keys['w']) player.y -= SPEED;
  if (keys['ArrowDown']  || keys['s']) player.y += SPEED;

  // mouse follow (smooth)
  const dx = gameState.mouseX - player.x;
  const dy = gameState.mouseY - player.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > 2) {
    const moveSpd = Math.min(dist, 4);
    player.x += (dx / dist) * moveSpd;
    player.y += (dy / dist) * moveSpd;
  }

  player.x = Math.max(player.r, Math.min(W - player.r, player.x));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y));

  // enemy spawn schedule
  const spawnInterval = Math.max(120, 200 - Math.floor(gameState.tick / 300) * 10);
  if (gameState.tick % spawnInterval === 0 && enemies.length < 6) spawnEnemy();

  // enemy update & shoot
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.fireTimer--;
    if (e.fireTimer <= 0) {
      // shoot at player
      const adx = player.x - e.x;
      const ady = player.y - e.y;
      const ad = Math.sqrt(adx*adx + ady*ady) || 1;
      const spd = 3 + gameState.tick / 3000;
      bullets.push({ x: e.x, y: e.y, vx: (adx/ad)*spd, vy: (ady/ad)*spd });
      e.fireTimer = 90 + Math.floor(Math.random() * 60);
    }
    // slow drift toward center
    const cdx = W/2 - e.x, cdy = H/2 - e.y;
    const cd = Math.sqrt(cdx*cdx + cdy*cdy) || 1;
    e.x += (cdx/cd) * 0.3;
    e.y += (cdy/cdy) * 0.3;
    if (e.x < -50 || e.x > W+50 || e.y < -50 || e.y > H+50) enemies.splice(i, 1);
  }

  // bullet update
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.x < -20 || b.x > W+20 || b.y < -20 || b.y > H+20) {
      bullets.splice(i, 1);
      gameState.dodges++;
      continue;
    }
    // hit player
    if (gameState.invincible <= 0) {
      const bx = b.x - player.x, by = b.y - player.y;
      if (Math.sqrt(bx*bx + by*by) < player.r + 4) {
        bullets.splice(i, 1);
        gameState.life--;
        gameState.invincible = 120;
        if (gameState.life <= 0) { endGame(false); return; }
        continue;
      }
    }
  }

  if (gameState.invincible > 0) gameState.invincible--;
  if (gameState.tick >= CLEAR_TICKS) { endGame(true); return; }
}

function endGame(won) {
  gameState.running = false;
  const sec = Math.floor(gameState.tick / 60);
  if (won) {
    document.getElementById('clDodge').textContent = `${gameState.dodges}発 回避成功！`;
    document.getElementById('clearScreen').style.display = 'flex';
  } else {
    document.getElementById('goTime').textContent = `生存: ${sec}秒 / 残機: ${gameState.life}`;
    document.getElementById('gameoverScreen').style.display = 'flex';
  }
}

function draw() {
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, W, H);

  // survive bar
  const sec = Math.min(gameState.tick / 60, 60);
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(8, 8, W - 16, 12);
  ctx.fillStyle = sec >= 50 ? '#ff4444' : '#44aaff';
  ctx.fillRect(8, 8, (sec / 60) * (W - 16), 12);
  ctx.fillStyle = '#fff';
  ctx.font = '11px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`生存 ${Math.floor(sec)}秒 / 60秒`, W/2, 19);

  // life & dodge HUD
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ccc';
  ctx.font = '13px Arial';
  ctx.fillText(`ライフ: ${'♥'.repeat(gameState.life)}`, 8, 36);
  ctx.fillText(`回避: ${gameState.dodges}`, 8, 52);

  // enemies
  ctx.fillStyle = '#cc3344';
  for (const e of enemies) {
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.fill();
    // fire timer bar
    const ft = e.fireTimer / 120;
    ctx.fillStyle = '#ff8844';
    ctx.fillRect(e.x - 10, e.y - e.r - 6, 20 * (1 - ft), 3);
    ctx.fillStyle = '#cc3344';
  }

  // bullets
  ctx.fillStyle = '#ffdd44';
  for (const b of bullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // player
  const flash = gameState.invincible > 0 && Math.floor(gameState.invincible / 8) % 2 === 0;
  if (!flash) {
    ctx.strokeStyle = '#44aaff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(68,170,255,0.3)';
    ctx.fill();
  }

  // instructions
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '12px Arial';
  ctx.textAlign = 'right';
  ctx.fillText('マウス移動 or ←→↑↓ で回避', W - 8, H - 10);
}

function gameLoop() {
  if (!gameState.running) return;
  update();
  draw();
}
</script>
</body>
</html>
