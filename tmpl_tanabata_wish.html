<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七夕のねがいごと</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #0a0a1e; font-family: 'Arial', sans-serif;
        }
        #gameContainer { position: relative; }
        canvas { display: block; }
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,5,0.92);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            color: #fff; gap: 16px; z-index: 100; text-align: center; padding: 20px;
        }
        .screen h1 { font-size: 36px; color: #f6e05e; }
        .screen p { font-size: 15px; line-height: 1.7; max-width: 300px; }
        .screen button {
            padding: 12px 36px; font-size: 16px; border: none;
            border-radius: 6px; cursor: pointer; background: #805ad5; color: #fff;
        }
        .screen button:hover { background: #9f7aea; }
        #inputPanel {
            position: absolute; bottom: 0; left: 0; width: 100%;
            display: none; flex-direction: column; align-items: center;
            gap: 8px; padding: 14px; background: rgba(10,10,30,0.85);
            z-index: 50;
        }
        #wishCountDisplay { color: #f6e05e; font-size: 14px; }
        #wishRow { display: flex; gap: 8px; width: 92%; max-width: 400px; }
        #wishInput {
            flex: 1; padding: 10px 14px; font-size: 15px;
            border-radius: 6px; border: 1px solid #805ad5;
            background: rgba(255,255,255,0.1); color: #fff; outline: none;
        }
        #wishInput::placeholder { color: #888; }
        #sendBtn {
            padding: 10px 18px; font-size: 15px; border: none;
            border-radius: 6px; cursor: pointer; background: #805ad5; color: #fff;
            white-space: nowrap;
        }
        #sendBtn:hover { background: #9f7aea; }
        #sendBtn:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body>
<div id="gameContainer">
    <div id="startScreen" class="screen" style="display:flex">
        <h1>🎋 七夕のねがいごと</h1>
        <p>短冊に願い事を入力して<br>星空へ飛ばそう！<br><br>5枚の短冊を送るとクリア✨</p>
        <button onclick="startGame()">START</button>
    </div>
    <div id="clearScreen" class="screen">
        <h1>🌟 CLEAR!</h1>
        <p>5つの願い事が星空へ届いた！<br>きっと叶うよ。</p>
        <button onclick="retryGame()">もう一度</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="inputPanel">
        <div id="wishCountDisplay">短冊 0 / 5</div>
        <div id="wishRow">
            <input type="text" id="wishInput" placeholder="願い事を入力…" maxlength="20">
            <button id="sendBtn" onclick="sendWish()">⭐ 飛ばす</button>
        </div>
    </div>
</div>
<script>
const W = 440, H = 560;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;
const gc = document.getElementById('gameContainer');
gc.style.width = W + 'px'; gc.style.height = H + 'px';

const gameState = {
    running: false,
    wishCount: 0,
    bgStars: [],
    cards: [],
    particles: [],
};
let gameLoop = null;

function randFloat(a, b) { return Math.random() * (b - a) + a; }

function initBgStars() {
    gameState.bgStars = [];
    for (let i = 0; i < 120; i++) {
        gameState.bgStars.push({
            x: Math.random() * W,
            y: Math.random() * (H - 120),
            r: Math.random() * 1.5 + 0.5,
            alpha: Math.random() * 0.5 + 0.5,
            twinkleSpeed: Math.random() * 0.03 + 0.01,
            twinklePhase: Math.random() * Math.PI * 2,
        });
    }
}

function startGame() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('clearScreen').style.display = 'none';
    document.getElementById('inputPanel').style.display = 'flex';
    gameState.running = true;
    gameState.wishCount = 0;
    gameState.cards = [];
    gameState.particles = [];
    document.getElementById('wishInput').value = '';
    document.getElementById('sendBtn').disabled = false;
    updateCountDisplay();
    initBgStars();
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(update, 16);
}

function sendWish() {
    if (!gameState.running) return;
    const text = document.getElementById('wishInput').value.trim();
    if (!text) { document.getElementById('wishInput').focus(); return; }
    document.getElementById('wishInput').value = '';
    document.getElementById('sendBtn').disabled = true;

    const card = {
        x: W / 2 + randFloat(-80, 80),
        y: H - 140,
        vx: randFloat(-0.8, 0.8),
        vy: -1.8 - Math.random() * 0.8,
        text: text,
        alpha: 1,
        scale: 1,
        life: 180,
        maxLife: 180,
        color: ['#fbd38d','#f687b3','#9ae6b4','#90cdf4','#d6bcfa'][gameState.wishCount % 5],
    };
    gameState.cards.push(card);

    // Burst particles
    for (let i = 0; i < 18; i++) {
        const angle = (Math.PI * 2 / 18) * i;
        gameState.particles.push({
            x: card.x, y: card.y,
            vx: Math.cos(angle) * randFloat(1.5, 3.5),
            vy: Math.sin(angle) * randFloat(1.5, 3.5),
            alpha: 1, r: randFloat(2, 5),
            color: card.color, life: 50,
        });
    }

    gameState.wishCount++;
    updateCountDisplay();

    setTimeout(() => {
        document.getElementById('sendBtn').disabled = false;
        if (gameState.wishCount >= 5) {
            triggerClear();
        }
    }, 800);
}

function updateCountDisplay() {
    document.getElementById('wishCountDisplay').innerText = '短冊 ' + gameState.wishCount + ' / 5';
}

function triggerClear() {
    gameState.running = false;
    clearInterval(gameLoop);
    document.getElementById('inputPanel').style.display = 'none';
    document.getElementById('clearScreen').style.display = 'flex';
}

function retryGame() {
    gameState.running = false;
    document.getElementById('clearScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
}

function update() {
    if (!gameState.running) return;

    for (const s of gameState.bgStars) {
        s.twinklePhase += s.twinkleSpeed;
    }

    for (let i = gameState.cards.length - 1; i >= 0; i--) {
        const c = gameState.cards[i];
        c.x += c.vx;
        c.y += c.vy;
        c.vy -= 0.02;
        c.life--;
        c.alpha = Math.max(0, c.life / c.maxLife);
        if (c.life <= 0) gameState.cards.splice(i, 1);
    }

    for (let i = gameState.particles.length - 1; i >= 0; i--) {
        const p = gameState.particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.life--;
        p.alpha = p.life / 50;
        if (p.life <= 0) gameState.particles.splice(i, 1);
    }

    draw();
}

function draw() {
    // Night sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#050520');
    grad.addColorStop(1, '#0d0d3a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Background stars
    for (const s of gameState.bgStars) {
        const a = s.alpha * (0.6 + 0.4 * Math.sin(s.twinklePhase));
        ctx.globalAlpha = a;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Milky Way hint
    ctx.globalAlpha = 0.07;
    const mw = ctx.createLinearGradient(0, 50, W, 200);
    mw.addColorStop(0, 'transparent');
    mw.addColorStop(0.5, '#fff');
    mw.addColorStop(1, 'transparent');
    ctx.fillStyle = mw;
    ctx.fillRect(0, 50, W, 150);
    ctx.globalAlpha = 1;

    // Particles
    for (const p of gameState.particles) {
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Wish cards
    for (const c of gameState.cards) {
        ctx.globalAlpha = c.alpha;
        const cw = 80, ch = 36;
        ctx.fillStyle = c.color;
        ctx.beginPath();
        ctx.roundRect(c.x - cw/2, c.y - ch/2, cw, ch, 4);
        ctx.fill();
        ctx.fillStyle = '#1a1a3e';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const disp = c.text.length > 8 ? c.text.slice(0, 8) + '…' : c.text;
        ctx.fillText(disp, c.x, c.y);
        ctx.globalAlpha = 1;
    }

    // Bamboo decoration
    ctx.globalAlpha = 1;
    drawBamboo(30, H - 120, 100);
    drawBamboo(W - 50, H - 120, 80);

    // Moon
    ctx.fillStyle = '#fefcbf';
    ctx.beginPath();
    ctx.arc(W - 60, 60, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f6e05e';
    ctx.beginPath();
    ctx.arc(W - 50, 54, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#050520';
    ctx.beginPath();
    ctx.arc(W - 40, 50, 28, 0, Math.PI * 2);
    ctx.fill();
}

function drawBamboo(x, y, h) {
    ctx.strokeStyle = '#276749';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x, y - h);
    ctx.stroke();
    const segs = Math.floor(h / 20);
    ctx.strokeStyle = '#2f855a';
    ctx.lineWidth = 2;
    for (let i = 1; i < segs; i++) {
        const sy = y - i * 20;
        ctx.beginPath();
        ctx.moveTo(x - 4, sy);
        ctx.lineTo(x + 4, sy);
        ctx.stroke();
        // Leaf
        ctx.fillStyle = '#38a169';
        ctx.beginPath();
        ctx.ellipse(x + 14, sy - 6, 12, 5, -0.4, 0, Math.PI * 2);
        ctx.fill();
    }
}

// Enter key sends wish
document.getElementById('wishInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendWish();
});
</script>
</body>
</html>
