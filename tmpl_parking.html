<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARKING MATCH</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif;
       display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

.screen { display: none; flex-direction: column; align-items: center;
          justify-content: center; width: 100%; min-height: 100vh; padding: 20px; text-align: center; }

/* ===== START ===== */
#startScreen { gap: 16px; }
#startScreen h1 { font-size: 36px; font-weight: 900; letter-spacing: 0.05em; color: #f8fafc; }
#startScreen .subtitle { font-size: 14px; color: #94a3b8; max-width: 320px; line-height: 1.6; }
.rule-box { background: #1e293b; border: 1px solid #334155; border-radius: 10px;
            padding: 14px 20px; text-align: left; max-width: 320px; }
.rule-box p { font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
.rule-row { display: flex; align-items: center; gap: 10px; margin: 4px 0; font-size: 13px; }
.rule-badge { display: inline-flex; align-items: center; justify-content: center;
              width: 28px; height: 28px; border-radius: 6px; font-weight: 900; font-size: 13px; }
.rule-s { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
.rule-m { background: #3b2a00; color: #fcd34d; border: 1px solid #f59e0b; }
.rule-l { background: #1a3320; color: #86efac; border: 1px solid #22c55e; }
.goal-text { font-size: 13px; color: #e2e8f0; margin-top: 8px; }
.btn-main { margin-top: 4px; padding: 14px 40px; font-size: 18px; font-weight: 900;
            background: #3b82f6; color: #fff; border: none; border-radius: 10px;
            cursor: pointer; letter-spacing: 0.05em; }
.btn-main:hover { background: #2563eb; }

/* ===== GAME ===== */
#gameScreen { display: none; flex-direction: column; align-items: center; padding: 16px; min-height: 100vh; }

#hud { display: flex; gap: 12px; margin-bottom: 16px; }
.hud-box { background: #1e293b; border: 1px solid #334155; border-radius: 8px;
           padding: 6px 14px; text-align: center; min-width: 70px; }
.hud-label { font-size: 9px; color: #64748b; letter-spacing: 0.1em; text-transform: uppercase; }
.hud-val { font-size: 22px; font-weight: 900; line-height: 1.2; }
#timerVal { color: #f8fafc; }
#timerVal.low { color: #ef4444; }
#parkedVal { color: #22c55e; }
#missVal { color: #f59e0b; }

#penalty { height: 24px; font-size: 14px; font-weight: 700; color: #ef4444;
           opacity: 0; text-align: center; margin-bottom: 6px; transition: opacity 0.2s; }

#gameArea { display: flex; gap: 20px; align-items: flex-start; }

/* queue */
#queuePanel { width: 90px; }
.q-title { font-size: 10px; color: #64748b; text-align: center; letter-spacing: 0.1em; margin-bottom: 8px; }
.q-car { width: 86px; height: 64px; border-radius: 8px; display: flex; flex-direction: column;
         align-items: center; justify-content: center; margin-bottom: 8px;
         border: 2px solid; font-weight: 900; transition: transform 0.15s; }
.q-car.head { transform: scale(1.06); }
.q-car .car-icon { font-size: 22px; line-height: 1; }
.q-car .car-size { font-size: 13px; margin-top: 2px; }
.q-car .car-label { font-size: 10px; color: #94a3b8; margin-top: 1px; }

/* spots */
#spotsGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.spot { width: 110px; height: 90px; border-radius: 10px; display: flex; flex-direction: column;
        align-items: center; justify-content: center; border: 2px solid #334155;
        background: #1e293b; cursor: pointer; user-select: none; transition: all 0.1s; }
.spot.compat { box-shadow: 0 0 12px rgba(34,197,94,0.5); border-color: #22c55e; background: #052e16; cursor: pointer; }
.spot.incompat { opacity: 0.4; cursor: not-allowed; }
.spot.occupied { cursor: default; opacity: 1; }
.spot.err { background: #450a0a !important; border-color: #ef4444 !important; }
.spot.ok-flash { background: #052e16 !important; border-color: #22c55e !important; }
.spot-type-badge { font-size: 18px; font-weight: 900; }
.spot-limit-text { font-size: 9px; color: #64748b; margin-top: 2px; }
.spot-parked-icon { font-size: 28px; }
.spot-leave-bar { width: 70px; height: 3px; background: #334155; border-radius: 2px; margin-top: 4px; overflow: hidden; }
.spot-leave-fill { height: 100%; background: #22c55e; width: 100%; }

/* car colors */
.car-S { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
.car-M { background: #3b2a00; border-color: #f59e0b; color: #fcd34d; }
.car-L { background: #1a3320; border-color: #22c55e; color: #86efac; }

/* ===== END SCREENS ===== */
#clearScreen, #gameOverScreen { gap: 12px; }
#clearScreen h2 { font-size: 32px; font-weight: 900; color: #22c55e; }
#gameOverScreen h2 { font-size: 32px; font-weight: 900; color: #ef4444; }
.end-stat { font-size: 16px; color: #94a3b8; }
.end-stat span { color: #f8fafc; font-weight: 700; }
.btn-retry { padding: 12px 32px; font-size: 16px; font-weight: 700;
             background: #334155; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
.btn-retry:hover { background: #475569; }
</style>
</head>
<body>

<!-- START -->
<div id="startScreen" class="screen">
  <h1>🚗 PARKING MATCH</h1>
  <p class="subtitle">正しいスポットに駐車せよ！<br>サイズが合わないと時間ペナルティ</p>
  <div class="rule-box">
    <p>▍ 車のサイズ × スポット制限</p>
    <div class="rule-row"><span class="rule-badge rule-s">S</span> 小型 → S専用のみ OK</div>
    <div class="rule-row"><span class="rule-badge rule-m">M</span> 中型 → S / M スポット OK</div>
    <div class="rule-row"><span class="rule-badge rule-l">L</span> 大型 → 全スポット OK</div>
    <p class="goal-text">🎯 12台駐車でクリア<br>⏱ 制限60秒 / ❌ 誤駐車で-3秒</p>
  </div>
  <button class="btn-main" onclick="startGame()">START</button>
</div>

<!-- GAME -->
<div id="gameScreen">
  <div id="hud">
    <div class="hud-box">
      <div class="hud-label">TIME</div>
      <div class="hud-val" id="timerVal">60</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">PARKED</div>
      <div class="hud-val" id="parkedVal">0 / 12</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">MISS</div>
      <div class="hud-val" id="missVal">0</div>
    </div>
  </div>
  <div id="penalty">-3秒！</div>
  <div id="gameArea">
    <div id="queuePanel">
      <div class="q-title">NEXT</div>
      <div id="queueList"></div>
    </div>
    <div id="spotsGrid"></div>
  </div>
</div>

<!-- CLEAR -->
<div id="clearScreen" class="screen">
  <h2>🎉 CLEAR!</h2>
  <p class="end-stat">駐車台数: <span id="clearParked">0</span></p>
  <p class="end-stat">残り時間: <span id="clearTime">0</span>秒</p>
  <p class="end-stat">ミス: <span id="clearMiss">0</span>回</p>
  <button class="btn-retry" onclick="retryGame()">もう一度</button>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" class="screen">
  <h2>TIME UP</h2>
  <p class="end-stat">駐車台数: <span id="overParked">0</span> / 12</p>
  <p class="end-stat">ミス: <span id="overMiss">0</span>回</p>
  <button class="btn-retry" onclick="retryGame()">もう一度</button>
</div>

<script>
// ===== constants =====
var SPOT_TYPES    = ['S', 'S', 'M', 'M', 'L', 'L'];
var SPOT_LIMIT    = { S: 'S専用', M: 'S/M', L: '全車種' };
var CAR_ICONS     = { S: '🚗', M: '🚙', L: '🚕' };
var CAR_NAMES     = { S: '小型', M: '中型', L: '大型' };
// which SPOTS fit each car
var CAR_FIT       = { S: ['S', 'M', 'L'], M: ['M', 'L'], L: ['L'] };
var QUEUE_SIZE    = 3;
var WIN_PARK      = 12;
var START_TIME    = 60;
var MISS_PENALTY  = 3;   // seconds
var CAR_LEAVE_MS  = 2800;
var CAR_ARRIVE_MS = 3000;

// ===== gameState =====
var gameState = {
  running: false,
  parked: 0,
  misses: 0,
  timer: START_TIME,
  queue: [],
  spots: [],
  nextCarMs: 0,
  lastTick: 0
};

var loopId = null;

// ===== helpers =====
function randCar() {
  var r = Math.random();
  if (r < 0.40) return 'S';
  if (r < 0.75) return 'M';
  return 'L';
}

function canFit(carType, spotType) {
  var fits = CAR_FIT[carType];
  for (var i = 0; i < fits.length; i++) { if (fits[i] === spotType) return true; }
  return false;
}

function showScreen(id) {
  var ids = ['startScreen', 'gameScreen', 'clearScreen', 'gameOverScreen'];
  for (var i = 0; i < ids.length; i++) {
    document.getElementById(ids[i]).style.display = ids[i] === id ? 'flex' : 'none';
  }
}

// ===== build DOM =====
function buildSpots() {
  var grid = document.getElementById('spotsGrid');
  grid.innerHTML = '';
  gameState.spots = [];
  for (var i = 0; i < SPOT_TYPES.length; i++) {
    var t = SPOT_TYPES[i];
    var div = document.createElement('div');
    div.className = 'spot';
    div.id = 'spot_' + i;
    div.setAttribute('data-idx', i);
    (function(idx) {
      div.addEventListener('click', function() { onSpotClick(idx); });
    })(i);
    grid.appendChild(div);
    gameState.spots.push({ type: t, occupied: false, carType: null, leaveTimer: 0, leaveMax: 0 });
  }
}

function fillQueue() {
  while (gameState.queue.length < QUEUE_SIZE) {
    gameState.queue.push(randCar());
  }
}

// ===== click handler =====
function onSpotClick(idx) {
  if (!gameState.running) return;
  if (gameState.queue.length === 0) return;
  var spot = gameState.spots[idx];
  if (spot.occupied) return;

  var headCar = gameState.queue[0];
  if (canFit(headCar, spot.type)) {
    // SUCCESS
    gameState.queue.shift();
    fillQueue();
    spot.occupied = true;
    spot.carType = headCar;
    spot.leaveTimer = CAR_LEAVE_MS;
    spot.leaveMax = CAR_LEAVE_MS;
    gameState.parked++;
    flashSpot(idx, 'ok-flash');
    if (gameState.parked >= WIN_PARK) {
      endGame(true);
      return;
    }
  } else {
    // MISS
    gameState.misses++;
    gameState.timer = Math.max(0, gameState.timer - MISS_PENALTY);
    flashSpot(idx, 'err');
    showPenalty();
  }
  renderAll();
}

function flashSpot(idx, cls) {
  var el = document.getElementById('spot_' + idx);
  if (!el) return;
  el.style.background = cls === 'err' ? '#450a0a' : '#052e16';
  el.style.borderColor = cls === 'err' ? '#ef4444' : '#22c55e';
  setTimeout(function() { renderSpot(idx); }, 300);
}

function showPenalty() {
  var el = document.getElementById('penalty');
  el.style.opacity = '1';
  setTimeout(function() { el.style.opacity = '0'; }, 800);
}

// ===== render =====
function renderAll() {
  renderQueue();
  for (var i = 0; i < gameState.spots.length; i++) { renderSpot(i); }
  renderHUD();
}

function renderQueue() {
  var list = document.getElementById('queueList');
  list.innerHTML = '';
  for (var i = 0; i < gameState.queue.length; i++) {
    var t = gameState.queue[i];
    var div = document.createElement('div');
    div.className = 'q-car car-' + t + (i === 0 ? ' head' : '');
    div.innerHTML = '<div class="car-icon">' + CAR_ICONS[t] + '</div>' +
                    '<div class="car-size">' + t + '</div>' +
                    '<div class="car-label">' + CAR_NAMES[t] + '</div>';
    list.appendChild(div);
  }
}

function renderSpot(idx) {
  var spot = gameState.spots[idx];
  var el = document.getElementById('spot_' + idx);
  if (!el) return;

  el.className = 'spot';
  el.innerHTML = '';

  if (spot.occupied) {
    el.className = 'spot occupied car-' + spot.carType;
    var pct = Math.round((spot.leaveTimer / spot.leaveMax) * 100);
    el.innerHTML = '<div class="spot-parked-icon">' + CAR_ICONS[spot.carType] + '</div>' +
                   '<div class="spot-leave-bar"><div class="spot-leave-fill" id="bar_' + idx + '" style="width:' + pct + '%"></div></div>';
  } else {
    // check compatibility with head car
    var headCar = gameState.queue.length > 0 ? gameState.queue[0] : null;
    var compat = headCar ? canFit(headCar, spot.type) : false;
    el.className = 'spot' + (compat ? ' compat' : ' incompat');
    el.innerHTML = '<div class="spot-type-badge ' + 'spot-type-' + spot.type + '">' + spot.type + '</div>' +
                   '<div class="spot-limit-text">' + SPOT_LIMIT[spot.type] + '</div>';
    // inline color
    if (spot.type === 'S') { el.style.borderColor = ''; el.querySelector('.spot-type-badge').style.color = '#93c5fd'; }
    if (spot.type === 'M') { el.querySelector('.spot-type-badge').style.color = '#fcd34d'; }
    if (spot.type === 'L') { el.querySelector('.spot-type-badge').style.color = '#86efac'; }
  }
}

function renderHUD() {
  document.getElementById('parkedVal').textContent = gameState.parked + ' / ' + WIN_PARK;
  document.getElementById('missVal').textContent = gameState.misses;
  var tv = document.getElementById('timerVal');
  tv.textContent = Math.ceil(gameState.timer);
  tv.style.color = gameState.timer <= 10 ? '#ef4444' : '#f8fafc';
}

// ===== game loop =====
function gameLoop() {
  if (!gameState.running) return;

  var now = Date.now();
  var dt = now - gameState.lastTick;
  gameState.lastTick = now;

  // timer countdown
  gameState.timer -= dt / 1000;
  if (gameState.timer <= 0) {
    gameState.timer = 0;
    endGame(false);
    return;
  }

  // update leave timers for occupied spots
  for (var i = 0; i < gameState.spots.length; i++) {
    var s = gameState.spots[i];
    if (s.occupied) {
      s.leaveTimer -= dt;
      if (s.leaveTimer <= 0) {
        s.occupied = false;
        s.carType = null;
        renderSpot(i);
      } else {
        // update leave bar
        var bar = document.getElementById('bar_' + i);
        if (bar) bar.style.width = Math.round((s.leaveTimer / s.leaveMax) * 100) + '%';
      }
    }
  }

  renderHUD();
}

// ===== start / end =====
function startGame() {
  gameState.running = false;
  gameState.parked = 0;
  gameState.misses = 0;
  gameState.timer = START_TIME;
  gameState.queue = [];
  gameState.spots = [];
  gameState.lastTick = Date.now();

  buildSpots();
  fillQueue();
  renderAll();

  showScreen('gameScreen');

  gameState.running = true;
  if (loopId) clearInterval(loopId);
  loopId = setInterval(gameLoop, 16);
}

function endGame(win) {
  gameState.running = false;
  if (loopId) { clearInterval(loopId); loopId = null; }

  if (win) {
    document.getElementById('clearParked').textContent = gameState.parked;
    document.getElementById('clearTime').textContent = Math.ceil(gameState.timer);
    document.getElementById('clearMiss').textContent = gameState.misses;
    showScreen('clearScreen');
  } else {
    document.getElementById('overParked').textContent = gameState.parked;
    document.getElementById('overMiss').textContent = gameState.misses;
    showScreen('gameOverScreen');
  }
}

function retryGame() {
  gameState.running = false;
  startGame();
}

// ===== init =====
showScreen('startScreen');
</script>
</body>
</html>
