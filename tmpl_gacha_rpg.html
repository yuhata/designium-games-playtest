<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GACHA RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #gameContainer {
            width: 480px;
            min-height: 640px;
            position: relative;
            background: #161b22;
            border: 2px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
        }

        /* ===== 共通スクリーン ===== */
        .screen {
            width: 100%;
            min-height: 640px;
            padding: 24px 20px;
            display: none;
        }

        /* ===== スタート画面 ===== */
        #startScreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #0d1117 0%, #1a1040 100%);
            min-height: 640px;
        }
        #startScreen h1 {
            font-size: 52px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #f0c040;
            text-shadow: 0 0 20px #f0a00080;
            margin-bottom: 12px;
        }
        #startScreen .subtitle {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 48px;
        }
        #startScreen .startBtn {
            padding: 16px 60px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #f0c040, #e07020);
            color: #1a0a00;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 2px;
        }
        #startScreen .startBtn:hover {
            filter: brightness(1.15);
        }

        /* ===== ガチャ画面 ===== */
        #gachaScreen {
            background: #161b22;
        }
        .screenTitle {
            font-size: 22px;
            font-weight: bold;
            color: #f0c040;
            text-align: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #30363d;
        }
        #goldDisplay {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 16px;
        }
        #gachaBtn {
            display: block;
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #c77dff, #7b2fff);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 16px;
        }
        #gachaBtn:hover:not(:disabled) {
            filter: brightness(1.15);
        }
        #gachaBtn:disabled {
            background: #30363d;
            color: #6e7681;
            cursor: not-allowed;
        }
        #gachaResult {
            text-align: center;
            font-size: 14px;
            min-height: 28px;
            margin-bottom: 12px;
            color: #79c0ff;
        }
        .heroListLabel {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 8px;
        }
        #heroList {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 280px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        #heroList::-webkit-scrollbar { width: 4px; }
        #heroList::-webkit-scrollbar-track { background: #21262d; }
        #heroList::-webkit-scrollbar-thumb { background: #444c56; border-radius: 2px; }
        .heroCard {
            display: flex;
            align-items: center;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 12px;
            gap: 10px;
            font-size: 13px;
        }
        .heroCard.rarity-N .heroRarity { color: #aaa; }
        .heroCard.rarity-R .heroRarity { color: #79c0ff; }
        .heroCard.rarity-SR .heroRarity { color: #f0c040; text-shadow: 0 0 6px #f0c04080; }
        .heroRarity { font-weight: bold; min-width: 36px; }
        .heroName { flex: 1; }
        .heroStats { color: #8b949e; font-size: 12px; }
        #toFormationBtn {
            display: block;
            width: 100%;
            padding: 13px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #3fb950, #1a7f37);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #toFormationBtn:hover:not(:disabled) {
            filter: brightness(1.15);
        }
        #toFormationBtn:disabled {
            background: #21262d;
            color: #6e7681;
            cursor: not-allowed;
        }

        /* ===== 編成画面 ===== */
        #formationScreen {
            background: #161b22;
        }
        #formationHeroList {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 340px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        #formationHeroList::-webkit-scrollbar { width: 4px; }
        #formationHeroList::-webkit-scrollbar-track { background: #21262d; }
        #formationHeroList::-webkit-scrollbar-thumb { background: #444c56; border-radius: 2px; }
        .formationHeroCard {
            display: flex;
            align-items: center;
            background: #21262d;
            border: 2px solid #30363d;
            border-radius: 6px;
            padding: 8px 12px;
            gap: 10px;
            font-size: 13px;
            cursor: pointer;
        }
        .formationHeroCard.selected {
            border-color: #3fb950;
            background: #1a2d1f;
        }
        .formationHeroCard .selectMark {
            width: 20px;
            height: 20px;
            border: 2px solid #444c56;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            color: #3fb950;
            flex-shrink: 0;
        }
        .formationHeroCard.selected .selectMark {
            border-color: #3fb950;
            background: #3fb950;
            color: white;
        }
        #partyStats {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        #partyStats .statsTitle {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 8px;
        }
        #partyStats .statsRow {
            display: flex;
            justify-content: space-between;
        }
        #partyStats .statsVal {
            font-weight: bold;
            color: #79c0ff;
        }
        .formationBtns {
            display: flex;
            gap: 10px;
        }
        #toBattleBtn {
            flex: 1;
            padding: 13px;
            font-size: 15px;
            font-weight: bold;
            background: linear-gradient(135deg, #f85149, #b91c1c);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #toBattleBtn:hover:not(:disabled) { filter: brightness(1.1); }
        #toBattleBtn:disabled {
            background: #21262d;
            color: #6e7681;
            cursor: not-allowed;
        }
        #backToGachaBtn {
            flex: 1;
            padding: 13px;
            font-size: 15px;
            font-weight: bold;
            background: #21262d;
            color: #8b949e;
            border: 1px solid #30363d;
            border-radius: 8px;
            cursor: pointer;
        }
        #backToGachaBtn:hover { background: #2d333b; }

        /* ===== バトル画面 ===== */
        #battleScreen {
            background: #0d1117;
            padding: 16px 16px;
        }
        #bossArea {
            background: linear-gradient(135deg, #3d0000, #1a0000);
            border: 2px solid #f85149;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 14px;
            text-align: center;
        }
        #bossArea .bossLabel {
            font-size: 12px;
            color: #f85149;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        #bossArea .bossName {
            font-size: 20px;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 8px;
        }
        #bossHpBar {
            width: 100%;
            height: 16px;
            background: #30363d;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 4px;
        }
        #bossHpFill {
            height: 100%;
            background: linear-gradient(90deg, #f85149, #ff6b6b);
            border-radius: 8px;
            transition: width 0.3s;
        }
        #bossHpText {
            font-size: 13px;
            color: #ff9090;
        }
        #partyArea {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        .battleHeroCard {
            flex: 1;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            font-size: 12px;
        }
        .battleHeroCard.defeated {
            background: #1a0a0a;
            border-color: #6e1010;
            opacity: 0.5;
        }
        .battleHeroCard .bHeroRarity { font-weight: bold; margin-bottom: 4px; }
        .battleHeroCard.rarity-N .bHeroRarity { color: #aaa; }
        .battleHeroCard.rarity-R .bHeroRarity { color: #79c0ff; }
        .battleHeroCard.rarity-SR .bHeroRarity { color: #f0c040; }
        .battleHeroCard .bHeroName { margin-bottom: 4px; color: #e6edf3; }
        .battleHeroHpBar {
            width: 100%;
            height: 8px;
            background: #30363d;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 3px;
        }
        .battleHeroHpFill {
            height: 100%;
            background: linear-gradient(90deg, #3fb950, #79c0ff);
            border-radius: 4px;
            transition: width 0.3s;
        }
        .battleHeroHpText { font-size: 11px; color: #8b949e; }
        #battleLog {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px 12px;
            height: 220px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.7;
        }
        #battleLog::-webkit-scrollbar { width: 4px; }
        #battleLog::-webkit-scrollbar-track { background: #0d1117; }
        #battleLog::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
        .logLine { color: #8b949e; }
        .logLine.attack { color: #79c0ff; }
        .logLine.bossAttack { color: #f85149; }
        .logLine.defeat { color: #ffa657; }
        .logLine.system { color: #3fb950; font-weight: bold; }

        /* ===== クリア・ゲームオーバー画面 ===== */
        #clearScreen, #gameOverScreen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0d1117;
            min-height: 640px;
            text-align: center;
            padding: 40px 20px;
        }
        #clearScreen h2 {
            font-size: 64px;
            font-weight: 900;
            color: #f0c040;
            text-shadow: 0 0 30px #f0c04090;
            letter-spacing: 6px;
            margin-bottom: 16px;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { text-shadow: 0 0 20px #f0c04060; }
            to   { text-shadow: 0 0 40px #f0c040cc, 0 0 80px #f0c04060; }
        }
        #clearScreen .clearSub {
            font-size: 16px;
            color: #8b949e;
            margin-bottom: 40px;
        }
        #gameOverScreen h2 {
            font-size: 42px;
            font-weight: 900;
            color: #f85149;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }
        #gameOverScreen .gameOverSub {
            font-size: 15px;
            color: #8b949e;
            margin-bottom: 40px;
        }
        .resultBtn {
            padding: 14px 52px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #f0c040, #e07020);
            color: #1a0a00;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .resultBtn:hover { filter: brightness(1.1); }
        .retryGachaBtn {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #c77dff, #7b2fff);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .retryGachaBtn:hover { filter: brightness(1.1); }

        /* ===== flash animation ===== */
        .hitFlash {
            animation: hitFlashAnim 0.2s;
        }
        @keyframes hitFlashAnim {
            0%   { filter: brightness(2); }
            100% { filter: brightness(1); }
        }
    </style>
</head>
<body>
<div id="gameContainer">

    <!-- スタート画面 -->
    <div id="startScreen">
        <h1>GACHA RPG</h1>
        <p class="subtitle">ガチャを引いてパーティを編成し、ボスを倒せ！</p>
        <button class="startBtn" onclick="startGame()">START</button>
    </div>

    <!-- ガチャ画面 -->
    <div id="gachaScreen" class="screen">
        <div class="screenTitle">ガチャ</div>
        <div id="goldDisplay">所持ゴールド: 100G</div>
        <button id="gachaBtn" onclick="doGacha()">ガチャを引く（10G）</button>
        <div id="gachaResult">ヒーローを集めてパーティを編成しよう！</div>
        <div class="heroListLabel" id="heroListLabel">所持ヒーロー: 0 / 10</div>
        <div id="heroList"></div>
        <button id="toFormationBtn" onclick="showFormation()" disabled>編成へ →</button>
    </div>

    <!-- 編成画面 -->
    <div id="formationScreen" class="screen">
        <div class="screenTitle">パーティ編成（最大3体）</div>
        <div id="formationHeroList"></div>
        <div id="partyStats">
            <div class="statsTitle">選択中パーティ（<span id="selectedCount">0</span>/3体）</div>
            <div class="statsRow">
                <span>HP合計</span>
                <span class="statsVal" id="partyTotalHp">0</span>
            </div>
            <div class="statsRow">
                <span>攻撃力合計</span>
                <span class="statsVal" id="partyTotalAtk">0</span>
            </div>
        </div>
        <div class="formationBtns">
            <button id="backToGachaBtn" onclick="showGacha()">← ガチャに戻る</button>
            <button id="toBattleBtn" onclick="startBattle()" disabled>バトルへ →</button>
        </div>
    </div>

    <!-- バトル画面 -->
    <div id="battleScreen" class="screen">
        <div id="bossArea">
            <div class="bossLabel">BOSS</div>
            <div class="bossName">ダークロード</div>
            <div id="bossHpBar"><div id="bossHpFill" style="width:100%"></div></div>
            <div id="bossHpText">HP: 100 / 100</div>
        </div>
        <div id="partyArea"></div>
        <div id="battleLog"></div>
    </div>

    <!-- クリア画面 -->
    <div id="clearScreen">
        <h2>CLEAR!</h2>
        <p class="clearSub">ボスを撃破した！</p>
        <button class="resultBtn" onclick="retryGame()">もう一度プレイ</button>
    </div>

    <!-- ゲームオーバー画面 -->
    <div id="gameOverScreen">
        <h2>BATTLE OVER</h2>
        <p class="gameOverSub">パーティが全滅した...</p>
        <button class="retryGachaBtn" onclick="retryGame()">ガチャからやり直す</button>
    </div>

</div>

<script>
// ===== グローバルゲーム状態 =====
var gameState = {
    gold: 100,
    heroes: [],
    party: [],
    battleParty: [],
    bossHp: 100,
    bossMaxHp: 100,
    running: false,
    heroIdCounter: 0,
    attackIntervalId: null,
    bossIntervalId: null,
    attackIndex: 0
};

// ヒーロー名プール
var heroNames = [
    'ソルジャー', 'ウィザード', 'ナイト', 'アーチャー', 'ヒーラー',
    'ドラゴン使い', '暗殺者', 'バーサーカー', 'パラディン', '賢者',
    'ランサー', 'モンク', 'サムライ', 'ガンナー', '魔剣士'
];

// ===== ユーティリティ =====
function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function showScreen(id) {
    var screens = ['startScreen', 'gachaScreen', 'formationScreen', 'battleScreen', 'clearScreen', 'gameOverScreen'];
    for (var i = 0; i < screens.length; i++) {
        var el = document.getElementById(screens[i]);
        if (el) {
            if (screens[i] === id) {
                if (id === 'clearScreen' || id === 'gameOverScreen') {
                    el.style.display = 'flex';
                } else {
                    el.style.display = 'block';
                }
            } else {
                el.style.display = 'none';
            }
        }
    }
}

// ===== ゲームループ =====
var gameLoopId = null;
function gameLoop() {}

// ===== スタート =====
function startGame() {
    if (gameLoopId !== null) { clearInterval(gameLoopId); }
    gameLoopId = setInterval(gameLoop, 16);
    showScreen('gachaScreen');
    renderGachaScreen();
}

// ===== ガチャ =====
function rollHero() {
    var r = Math.random();
    var rarity, stars, atkMin, atkMax, hpMin, hpMax;
    if (r < 0.60) {
        rarity = 'N'; stars = '☆1'; atkMin = 1; atkMax = 3; hpMin = 10; hpMax = 20;
    } else if (r < 0.90) {
        rarity = 'R'; stars = '☆2'; atkMin = 3; atkMax = 6; hpMin = 20; hpMax = 40;
    } else {
        rarity = 'SR'; stars = '☆3'; atkMin = 6; atkMax = 10; hpMin = 40; hpMax = 80;
    }
    var name = heroNames[rand(0, heroNames.length - 1)];
    var atk = rand(atkMin, atkMax);
    var hp = rand(hpMin, hpMax);
    gameState.heroIdCounter++;
    return { id: gameState.heroIdCounter, name: name, rarity: rarity, stars: stars, atk: atk, maxHp: hp, hp: hp };
}

function doGacha() {
    if (gameState.gold < 10) return;
    if (gameState.heroes.length >= 10) return;
    gameState.gold -= 10;
    var hero = rollHero();
    gameState.heroes.push(hero);
    var resultEl = document.getElementById('gachaResult');
    var rarityColor = hero.rarity === 'SR' ? '#f0c040' : hero.rarity === 'R' ? '#79c0ff' : '#aaa';
    resultEl.innerHTML = '<span style="color:' + rarityColor + ';">[' + hero.rarity + ' ' + hero.stars + '] ' + hero.name + '</span> を獲得！（ATK:' + hero.atk + ' HP:' + hero.maxHp + '）';
    renderGachaScreen();
}

function renderGachaScreen() {
    document.getElementById('goldDisplay').textContent = '所持ゴールド: ' + gameState.gold + 'G';
    var gachaBtn = document.getElementById('gachaBtn');
    gachaBtn.disabled = (gameState.gold < 10 || gameState.heroes.length >= 10);

    var heroListEl = document.getElementById('heroList');
    heroListEl.innerHTML = '';
    for (var i = 0; i < gameState.heroes.length; i++) {
        var h = gameState.heroes[i];
        var card = document.createElement('div');
        card.className = 'heroCard rarity-' + h.rarity;
        card.innerHTML = '<span class="heroRarity">' + h.rarity + ' ' + h.stars + '</span>'
            + '<span class="heroName">' + h.name + '</span>'
            + '<span class="heroStats">ATK:' + h.atk + ' HP:' + h.maxHp + '</span>';
        heroListEl.appendChild(card);
    }

    document.getElementById('heroListLabel').textContent = '所持ヒーロー: ' + gameState.heroes.length + ' / 10';
    document.getElementById('toFormationBtn').disabled = (gameState.heroes.length === 0);
}

// ===== 編成画面 =====
function showGacha() {
    showScreen('gachaScreen');
    renderGachaScreen();
}

function showFormation() {
    gameState.party = [];
    showScreen('formationScreen');
    renderFormationScreen();
}

function togglePartySelect(heroId) {
    var idx = gameState.party.indexOf(heroId);
    if (idx >= 0) {
        gameState.party.splice(idx, 1);
    } else {
        if (gameState.party.length >= 3) return;
        gameState.party.push(heroId);
    }
    renderFormationScreen();
}

function renderFormationScreen() {
    var listEl = document.getElementById('formationHeroList');
    listEl.innerHTML = '';
    for (var i = 0; i < gameState.heroes.length; i++) {
        var h = gameState.heroes[i];
        var selected = gameState.party.indexOf(h.id) >= 0;
        var card = document.createElement('div');
        card.className = 'formationHeroCard rarity-' + h.rarity + (selected ? ' selected' : '');
        card.setAttribute('data-id', h.id);
        card.innerHTML = '<div class="selectMark">' + (selected ? '✓' : '') + '</div>'
            + '<span class="heroRarity">' + h.rarity + ' ' + h.stars + '</span>'
            + '<span class="heroName">' + h.name + '</span>'
            + '<span class="heroStats">ATK:' + h.atk + ' HP:' + h.maxHp + '</span>';
        (function(id) {
            card.onclick = function() { togglePartySelect(id); };
        })(h.id);
        listEl.appendChild(card);
    }

    var totalHp = 0;
    var totalAtk = 0;
    for (var j = 0; j < gameState.party.length; j++) {
        var pid = gameState.party[j];
        for (var k = 0; k < gameState.heroes.length; k++) {
            if (gameState.heroes[k].id === pid) {
                totalHp += gameState.heroes[k].maxHp;
                totalAtk += gameState.heroes[k].atk;
                break;
            }
        }
    }
    document.getElementById('selectedCount').textContent = gameState.party.length;
    document.getElementById('partyTotalHp').textContent = totalHp;
    document.getElementById('partyTotalAtk').textContent = totalAtk;
    document.getElementById('toBattleBtn').disabled = (gameState.party.length === 0);
}

// ===== バトル =====
function getHeroById(id) {
    for (var i = 0; i < gameState.heroes.length; i++) {
        if (gameState.heroes[i].id === id) return gameState.heroes[i];
    }
    return null;
}

function startBattle() {
    // バトルパーティを初期化（ディープコピー）
    gameState.battleParty = [];
    for (var i = 0; i < gameState.party.length; i++) {
        var h = getHeroById(gameState.party[i]);
        if (h) {
            gameState.battleParty.push({ id: h.id, name: h.name, rarity: h.rarity, stars: h.stars, atk: h.atk, maxHp: h.maxHp, hp: h.maxHp, defeated: false });
        }
    }
    gameState.bossHp = gameState.bossMaxHp;
    gameState.attackIndex = 0;
    gameState.running = true;

    showScreen('battleScreen');
    renderBattleScreen();
    addBattleLog('バトル開始！', 'system');

    // パーティ攻撃: 1秒ごと、ヒーロー順番に攻撃
    gameState.attackIntervalId = setInterval(function() {
        if (!gameState.running) return;
        partyAttackTick();
    }, 1000);

    // ボス攻撃: 3秒ごとに全体攻撃
    gameState.bossIntervalId = setInterval(function() {
        if (!gameState.running) return;
        bossAttackTick();
    }, 3000);
}

function partyAttackTick() {
    var alive = getAliveParty();
    if (alive.length === 0) return;

    // 攻撃index を alive 内に丸める
    gameState.attackIndex = gameState.attackIndex % alive.length;
    var attacker = alive[gameState.attackIndex];
    gameState.attackIndex = (gameState.attackIndex + 1) % alive.length;

    var dmg = attacker.atk;
    gameState.bossHp -= dmg;
    if (gameState.bossHp < 0) gameState.bossHp = 0;

    addBattleLog(attacker.name + ' がボスに ' + dmg + ' ダメージ！（残HP: ' + gameState.bossHp + '）', 'attack');
    flashEl('bossHpBar');
    renderBattleHpBars();

    if (gameState.bossHp <= 0) {
        battleClear();
    }
}

function bossAttackTick() {
    var alive = getAliveParty();
    if (alive.length === 0) return;

    var bossAtk = 5;
    addBattleLog('ボスが全体攻撃！（' + bossAtk + 'ダメージ）', 'bossAttack');

    for (var i = 0; i < alive.length; i++) {
        alive[i].hp -= bossAtk;
        if (alive[i].hp <= 0) {
            alive[i].hp = 0;
            alive[i].defeated = true;
            addBattleLog(alive[i].name + ' が倒れた...', 'defeat');
        }
    }
    renderBattleHpBars();

    var remaining = getAliveParty();
    if (remaining.length === 0) {
        battleOver();
    }
}

function getAliveParty() {
    var alive = [];
    for (var i = 0; i < gameState.battleParty.length; i++) {
        if (!gameState.battleParty[i].defeated) alive.push(gameState.battleParty[i]);
    }
    return alive;
}

function flashEl(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var orig = el.style.filter;
    el.style.filter = 'brightness(2.5)';
    setTimeout(function() { el.style.filter = orig; }, 200);
}

function addBattleLog(msg, cls) {
    var logEl = document.getElementById('battleLog');
    var line = document.createElement('div');
    line.className = 'logLine' + (cls ? ' ' + cls : '');
    line.textContent = msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
}

function renderBattleScreen() {
    renderBattleHpBars();
    document.getElementById('battleLog').innerHTML = '';
}

function renderBattleHpBars() {
    // ボスHP
    var pct = (gameState.bossHp / gameState.bossMaxHp) * 100;
    document.getElementById('bossHpFill').style.width = pct + '%';
    document.getElementById('bossHpText').textContent = 'HP: ' + gameState.bossHp + ' / ' + gameState.bossMaxHp;

    // パーティHP
    var partyArea = document.getElementById('partyArea');
    partyArea.innerHTML = '';
    for (var i = 0; i < gameState.battleParty.length; i++) {
        var h = gameState.battleParty[i];
        var hpPct = Math.max(0, (h.hp / h.maxHp) * 100);
        var card = document.createElement('div');
        card.className = 'battleHeroCard rarity-' + h.rarity + (h.defeated ? ' defeated' : '');
        card.id = 'bHero' + h.id;
        card.innerHTML = '<div class="bHeroRarity">' + h.rarity + ' ' + h.stars + '</div>'
            + '<div class="bHeroName">' + h.name + '</div>'
            + '<div class="battleHeroHpBar"><div class="battleHeroHpFill" style="width:' + hpPct + '%"></div></div>'
            + '<div class="battleHeroHpText">' + h.hp + '/' + h.maxHp + '</div>';
        partyArea.appendChild(card);
    }
}

function stopBattleIntervals() {
    if (gameState.attackIntervalId !== null) {
        clearInterval(gameState.attackIntervalId);
        gameState.attackIntervalId = null;
    }
    if (gameState.bossIntervalId !== null) {
        clearInterval(gameState.bossIntervalId);
        gameState.bossIntervalId = null;
    }
}

function battleClear() {
    gameState.running = false;
    stopBattleIntervals();
    addBattleLog('ボスを撃破した！CLEAR！', 'system');
    setInterval(function() { showScreen('clearScreen'); }, 1200);
}

function battleOver() {
    gameState.running = false;
    stopBattleIntervals();
    addBattleLog('パーティが全滅した... BATTLE OVER', 'defeat');
    setInterval(function() { showScreen('gameOverScreen'); }, 1200);
}

// ===== リトライ（ガチャからやり直し）=====
function retryGame() {
    gameState.running = false;
    stopBattleIntervals();
    if (gameLoopId !== null) { clearInterval(gameLoopId); gameLoopId = null; }

    // gameState リセット
    gameState.gold = 100;
    gameState.heroes = [];
    gameState.party = [];
    gameState.battleParty = [];
    gameState.bossHp = 100;
    gameState.bossMaxHp = 100;
    gameState.heroIdCounter = 0;
    gameState.attackIndex = 0;

    // ガチャ画面UI リセット
    var resultEl = document.getElementById('gachaResult');
    if (resultEl) resultEl.textContent = 'ヒーローを集めてパーティを編成しよう！';

    showScreen('startScreen');
}
</script>
</body>
</html>
