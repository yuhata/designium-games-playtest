<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORD QUIZ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0f0f1e;
            font-family: 'Arial', sans-serif;
        }
        
        #container {
            position: relative;
            width: 480px;
            height: 600px;
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
        }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            background: #1a1a2e;
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
        }
        
        #startScreen.show {
            display: flex;
        }
        
        #startScreen h1 {
            color: #fff;
            font-size: 48px;
            text-align: center;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(34,197,94,0.5);
        }
        
        #startScreen p {
            color: #aaa;
            font-size: 16px;
            text-align: center;
            line-height: 1.6;
        }
        
        #startScreen .btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
        }
        
        #startScreen .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(34,197,94,0.6);
        }
        
        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            background: #1a1a2e;
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        
        #clearScreen.show {
            display: flex;
        }
        
        #clearScreen h1 {
            color: #22c55e;
            font-size: 48px;
            text-shadow: 0 0 20px rgba(34,197,94,0.8);
            letter-spacing: 2px;
        }
        
        #clearScreen .score {
            color: #fff;
            font-size: 36px;
            font-weight: bold;
        }
        
        #clearScreen .btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 12px 36px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            letter-spacing: 1px;
        }
        
        #clearScreen .btn:hover {
            transform: scale(1.05);
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            background: #1a1a2e;
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        
        #gameOverScreen.show {
            display: flex;
        }
        
        #gameOverScreen h1 {
            color: #ef4444;
            font-size: 48px;
            text-shadow: 0 0 20px rgba(239,68,68,0.8);
            letter-spacing: 2px;
        }
        
        #gameOverScreen .score {
            color: #fff;
            font-size: 36px;
            font-weight: bold;
        }
        
        #gameOverScreen .btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 12px 36px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            letter-spacing: 1px;
        }
        
        #gameOverScreen .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="gameCanvas" width="480" height="600"></canvas>
        
        <div id="startScreen" class="show">
            <h1>WORD QUIZ</h1>
            <p>10 questions<br>Answer 7+ to pass<br>15 seconds per question</p>
            <button class="btn">START</button>
        </div>
        
        <div id="clearScreen">
            <h1>CLEAR!</h1>
            <div class="score" id="clearScore"></div>
            <button class="btn">REPLAY</button>
        </div>
        
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <div class="score" id="gameOverScore"></div>
            <button class="btn">RETRY</button>
        </div>
    </div>

    <script>
        const config = {
            title: 'WORD QUIZ',
            bg_color: '#1a1a2e',
            correct_color: '#22c55e',
            wrong_color: '#ef4444',
            hint_color: '#f59e0b',
            total_questions: 10,
            pass_score: 7,
            time_per_q: 15
        };

        const questions = [
            { question: 'P E A R', hint: '4 letters, fruit', answer: 'PEAR', choices: ['PEAR', 'BEAR', 'FEAR', 'GEAR'] },
            { question: 'A P P L E', hint: 'Fruit, 5 letters', answer: 'APPLE', choices: ['APPLE', 'APPLY', 'ANKLE', 'AMPLE'] },
            { question: 'B A N A N A', hint: 'Yellow fruit', answer: 'BANANA', choices: ['BANANA', 'BANAL', 'BONANZA', 'BANNER'] },
            { question: 'O R A N G E', hint: 'Citrus fruit', answer: 'ORANGE', choices: ['ORANGE', 'ARRANGE', 'STRANGE', 'STORAGE'] },
            { question: 'L E M O N', hint: 'Sour citrus', answer: 'LEMON', choices: ['LEMON', 'DEMON', 'LEDGE', 'LEMUR'] },
            { question: 'M A N G O', hint: 'Tropical fruit', answer: 'MANGO', choices: ['MANGO', 'TANGO', 'BONGO', 'MANGA'] },
            { question: 'G R A P E', hint: 'Purple fruit', answer: 'GRAPE', choices: ['GRAPE', 'GRACE', 'GRATE', 'GRAND'] },
            { question: 'P E A C H', hint: 'Fuzzy fruit', answer: 'PEACH', choices: ['PEACH', 'BEACH', 'REACH', 'LEACH'] },
            { question: 'M E L O N', hint: 'Summer fruit', answer: 'MELON', choices: ['MELON', 'FELON', 'NYLON', 'COLON'] },
            { question: 'S T R A W B E R R Y', hint: '10 letters, red', answer: 'STRAWBERRY', choices: ['STRAWBERRY', 'BLUEBERRY', 'RASPBERRY', 'BLACKBERRY'] }
        ];

        var gameState = {
            running: false,
            screen: 'start',
            currentQuestion: 0,
            score: 0,
            timeLeft: config.time_per_q,
            answered: false,
            selectedAnswer: null,
            questions: [],
            flashTimer: 0,
            flashType: null
        };

        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');

        function initGame() {
            gameState.questions = questions.slice().sort(function() { return Math.random() - 0.5; });
            gameState.currentQuestion = 0;
            gameState.score = 0;
            gameState.running = true;
            gameState.screen = 'game';
            gameState.answered = false;
            gameState.selectedAnswer = null;
            gameState.timeLeft = config.time_per_q;
            gameState.flashTimer = 0;
            gameState.flashType = null;
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
        }

        function nextQuestion() {
            gameState.currentQuestion++;
            gameState.answered = false;
            gameState.selectedAnswer = null;
            gameState.timeLeft = config.time_per_q;
            gameState.flashTimer = 0;
            gameState.flashType = null;
            
            if (gameState.currentQuestion >= config.total_questions) {
                endGame();
            }
        }

        function endGame() {
            gameState.running = false;
            gameState.screen = gameState.score >= config.pass_score ? 'clear' : 'gameover';
            
            if (gameState.screen === 'clear') {
                document.getElementById('clearScore').innerText = gameState.score + ' / ' + config.total_questions;
                document.getElementById('clearScreen').style.display = 'flex';
            } else {
                document.getElementById('gameOverScore').innerText = gameState.score + ' / ' + config.total_questions;
                document.getElementById('gameOverScreen').style.display = 'flex';
            }
        }

        function handleAnswer(choiceIndex) {
            if (!gameState.running || gameState.answered) return;
            
            gameState.answered = true;
            gameState.selectedAnswer = choiceIndex;
            
            var current = gameState.questions[gameState.currentQuestion];
            var isCorrect = current.choices[choiceIndex] === current.answer;
            
            if (isCorrect) {
                gameState.score++;
                gameState.flashType = 'correct';
            } else {
                gameState.flashType = 'wrong';
            }
            
            gameState.flashTimer = 30;
        }

        function drawStartScreen() {
        }

        function drawGame() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            var current = gameState.questions[gameState.currentQuestion];
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Score: ' + gameState.score + ' / ' + config.total_questions, 20, 30);
            ctx.fillText('Question: ' + (gameState.currentQuestion + 1) + ' / ' + config.total_questions, 20, 55);
            
            var timerWidth = (gameState.timeLeft / config.time_per_q) * 200;
            var timerColor = gameState.timeLeft > 5 ? '#3b82f6' : '#ef4444';
            ctx.fillStyle = '#333';
            ctx.fillRect(240, 15, 220, 20);
            ctx.fillStyle = timerColor;
            ctx.fillRect(240, 15, timerWidth, 20);
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            ctx.strokeRect(240, 15, 220, 20);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(current.question, canvas.width / 2, 120);
            
            ctx.fillStyle = config.hint_color;
            ctx.font = 'bold 16px Arial';
            ctx.fillText('Hint: ' + current.hint, canvas.width / 2, 160);
            
            if (gameState.flashTimer > 0) {
                var flashAlpha = gameState.flashTimer / 30;
                ctx.fillStyle = gameState.flashType === 'correct' ? 
                    'rgba(34, 197, 94, ' + flashAlpha + ')' : 
                    'rgba(239, 68, 68, ' + flashAlpha + ')';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            var buttonY = 380;
            var buttonWidth = 100;
            var buttonHeight = 50;
            var buttonGap = 10;
            var startX = (canvas.width - (buttonWidth * 2 + buttonGap)) / 2;
            
            for (var i = 0; i < 4; i++) {
                var x = startX + (i % 2) * (buttonWidth + buttonGap);
                var y = buttonY + Math.floor(i / 2) * (buttonHeight + buttonGap);
                
                ctx.fillStyle = gameState.selectedAnswer === i ? '#666' : '#2d2d44';
                ctx.fillRect(x, y, buttonWidth, buttonHeight);
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, buttonWidth, buttonHeight);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                var letter = String.fromCharCode(65 + i);
                ctx.fillText(letter, x + 15, y + 25);
                ctx.font = '12px Arial';
                ctx.fillText(current.choices[i], x + 50, y + 25);
            }
        }

        function drawClearScreen() {
        }

        function drawGameOverScreen() {
        }

        function gameLoop() {
            if (gameState.running) {
                if (!gameState.answered) {
                    gameState.timeLeft -= 1 / 60;
                    if (gameState.timeLeft <= 0) {
                        gameState.timeLeft = 0;
                        gameState.answered = true;
                        gameState.flashType = 'wrong';
                        gameState.flashTimer = 30;
                    }
                } else {
                    if (gameState.flashTimer > 0) {
                        gameState.flashTimer--;
                    } else {
                        nextQuestion();
                    }
                }
            }
            
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (gameState.screen === 'game' && gameState.running) {
                drawGame();
            }
        }

        function retryGame() {
            gameState.running = false;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            initGame();
        }

        canvas.addEventListener('click', function(e) {
            if (!gameState.running || gameState.answered) return;
            
            var rect = canvas.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;
            
            var buttonY = 380;
            var buttonWidth = 100;
            var buttonHeight = 50;
            var buttonGap = 10;
            var startX = (canvas.width - (buttonWidth * 2 + buttonGap)) / 2;
            
            for (var i = 0; i < 4; i++) {
                var bx = startX + (i % 2) * (buttonWidth + buttonGap);
                var by = buttonY + Math.floor(i / 2) * (buttonHeight + buttonGap);
                
                if (x >= bx && x <= bx + buttonWidth && y >= by && y <= by + buttonHeight) {
                    handleAnswer(i);
                    break;
                }
            }
        });

        document.addEventListener('click', function(e) {
            var startBtn = document.querySelector('#startScreen .btn');
            var clearBtn = document.querySelector('#clearScreen .btn');
            var gameOverBtn = document.querySelector('#gameOverScreen .btn');
            
            if (e.target === startBtn) {
                initGame();
            } else if (e.target === clearBtn) {
                retryGame();
            } else if (e.target === gameOverBtn) {
                retryGame();
            }
        });

        setInterval(gameLoop, 16);
    </script>
</body>
</html>
