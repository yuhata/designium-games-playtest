<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORD QUIZ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            font-family: 'Arial', sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 480px;
            height: 480px;
            background: #1a1a2e;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        
        #startScreen h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 30px;
        }
        
        #startScreen p {
            color: #aaa;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        #startScreen .btn {
            padding: 15px 50px;
            font-size: 20px;
            background: #22c55e;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        #startScreen .btn:hover {
            background: #16a34a;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 11;
        }
        
        #gameOverScreen h2 {
            color: #ef4444;
            font-size: 40px;
            margin-bottom: 20px;
        }
        
        #gameOverScreen p {
            color: #fff;
            font-size: 22px;
            margin-bottom: 30px;
        }
        
        #gameOverScreen .btn {
            padding: 12px 40px;
            font-size: 16px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        
        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 11;
        }
        
        #clearScreen h2 {
            color: #22c55e;
            font-size: 40px;
            margin-bottom: 20px;
        }
        
        #clearScreen p {
            color: #fff;
            font-size: 22px;
            margin-bottom: 30px;
        }
        
        #clearScreen .btn {
            padding: 12px 40px;
            font-size: 16px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="480" height="480"></canvas>
        
        <div id="startScreen">
            <h1>WORD QUIZ</h1>
            <p>10問の穴埋めクイズに答えよう！<br>7問以上正解でCLEAR!</p>
            <button class="btn">START</button>
        </div>
        
        <div id="gameOverScreen">
            <h2>GAME OVER</h2>
            <p id="gameOverScore">Score: 0/10</p>
            <button class="btn">RETRY</button>
        </div>
        
        <div id="clearScreen">
            <h2>CLEAR!</h2>
            <p id="clearScore">Score: 7/10</p>
            <button class="btn">RETRY</button>
        </div>
    </div>

    <script>
        const config = {
            title: 'WORD QUIZ',
            bg_color: '#1a1a2e',
            correct_color: '#22c55e',
            wrong_color: '#ef4444',
            hint_color: '#f59e0b',
            total_questions: 10,
            pass_score: 7,
            time_per_q: 15
        };

        const quizDatabase = [
            { question: "A _ P _ E", hint: "赤い果物", answer: "APPLE", wrongAnswers: ["AMPLE", "MAPLE", "AMPLE"] },
            { question: "B A N A N _", hint: "黄い果物", answer: "BANANA", wrongAnswers: ["BONANA", "CABANA", "BANANA"] },
            { question: "C A R R O _", hint: "オレンジ色の野菜", answer: "CARROT", wrongAnswers: ["CARRON", "CARROL", "CARROM"] },
            { question: "M O N K E _", hint: "類人猿", answer: "MONKEY", wrongAnswers: ["MONKES", "MONKER", "DONKEY"] },
            { question: "B I _ _ C L E", hint: "2輪の乗り物", answer: "BICYCLE", wrongAnswers: ["BIYCLE", "BOTCLE", "BIDCLE"] },
            { question: "P I _ _ _", hint: "イタリア発祥の食べ物", answer: "PIZZA", wrongAnswers: ["PIOHA", "PITTA", "PIAZA"] },
            { question: "G U I T A _", hint: "弦楽器", answer: "GUITAR", wrongAnswers: ["GUITAU", "GULTAR", "QUITAR"] },
            { question: "S U M M E _", hint: "暑い季節", answer: "SUMMER", wrongAnswers: ["SUMMAR", "SUMBER", "SAMMER"] },
            { question: "W I N T E _", hint: "寒い季節", answer: "WINTER", wrongAnswers: ["WINTAR", "WINDER", "WENTER"] },
            { question: "T E _ E P H O N E", hint: "通信機器", answer: "TELEPHONE", wrongAnswers: ["TALEPHONE", "TELEFOHE", "TILIPHONE"] }
        ];

        let gameState = {
            running: false,
            currentQuestion: 0,
            score: 0,
            timeLeft: config.time_per_q,
            questions: [],
            currentChoices: [],
            answered: false,
            flashColor: null,
            flashTimer: 0,
            showingCorrectAnswer: false,
            answerTimeout: null
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const clearScreen = document.getElementById('clearScreen');

        function shuffleArray(arr) {
            const result = [...arr];
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

        function initializeGame() {
            gameState.running = true;
            gameState.currentQuestion = 0;
            gameState.score = 0;
            gameState.timeLeft = config.time_per_q;
            gameState.questions = shuffleArray([...quizDatabase]);
            gameState.answered = false;
            gameState.flashColor = null;
            gameState.flashTimer = 0;
            gameState.showingCorrectAnswer = false;
            
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            clearScreen.style.display = 'none';
            
            loadQuestion();
        }

        function loadQuestion() {
            if (gameState.currentQuestion >= config.total_questions) {
                endGame();
                return;
            }

            const q = gameState.questions[gameState.currentQuestion];
            const choices = [q.answer, ...q.wrongAnswers];
            gameState.currentChoices = shuffleArray(choices);
            gameState.answered = false;
            gameState.timeLeft = config.time_per_q;
            gameState.flashColor = null;
            gameState.flashTimer = 0;
            gameState.showingCorrectAnswer = false;
        }

        function checkAnswer(choiceIndex) {
            if (gameState.answered || !gameState.running) return;
            gameState.answered = true;

            const currentQ = gameState.questions[gameState.currentQuestion];
            const selectedAnswer = gameState.currentChoices[choiceIndex];
            const isCorrect = selectedAnswer === currentQ.answer;

            if (isCorrect) {
                gameState.score++;
                gameState.flashColor = config.correct_color;
                gameState.flashTimer = 0.3;
                gameState.answerTimeout = setTimeout(() => {
                    gameState.currentQuestion++;
                    loadQuestion();
                }, 500);
            } else {
                gameState.flashColor = config.wrong_color;
                gameState.flashTimer = 0.3;
                gameState.showingCorrectAnswer = true;
                gameState.answerTimeout = setTimeout(() => {
                    gameState.currentQuestion++;
                    loadQuestion();
                }, 1500);
            }
        }

        function endGame() {
            gameState.running = false;
            if (gameState.score >= config.pass_score) {
                document.getElementById('clearScore').textContent = 'Score: ' + gameState.score + '/10';
                clearScreen.style.display = 'flex';
            } else {
                document.getElementById('gameOverScore').textContent = 'Score: ' + gameState.score + '/10';
                gameOverScreen.style.display = 'flex';
            }
        }

        function retryGame() {
            gameState.running = false;
            if (gameState.answerTimeout) {
                clearTimeout(gameState.answerTimeout);
            }
            initializeGame();
        }

        function drawGame() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState.flashTimer > 0) {
                const alpha = (1 - gameState.flashTimer / 0.3) * 100;
                ctx.fillStyle = gameState.flashColor + Math.floor(alpha).toString(16).padStart(2, '0');
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Q' + (gameState.currentQuestion + 1) + '/' + config.total_questions, 20, 30);
            ctx.textAlign = 'right';
            ctx.fillText('Score: ' + gameState.score, 460, 30);

            const barWidth = 440;
            const barHeight = 8;
            const barX = 20;
            const barY = 45;
            const timePercent = Math.max(0, gameState.timeLeft / config.time_per_q);
            ctx.fillStyle = '#333';
            ctx.fillRect(barX, barY, barWidth, barHeight);
            ctx.fillStyle = timePercent > 0.3 ? config.correct_color : config.wrong_color;
            ctx.fillRect(barX, barY, barWidth * timePercent, barHeight);

            if (!gameState.running) return;

            const currentQ = gameState.questions[gameState.currentQuestion];

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(currentQ.question, 240, 140);

            ctx.fillStyle = config.hint_color;
            ctx.font = '16px Arial';
            ctx.fillText('ヒント: ' + currentQ.hint, 240, 200);

            const buttonWidth = 100;
            const buttonHeight = 50;
            const buttonGap = 10;
            const startX = (canvas.width - (buttonWidth * 2 + buttonGap)) / 2;
            const startY = 250;

            for (let i = 0; i < 4; i++) {
                const row = Math.floor(i / 2);
                const col = i % 2;
                const x = startX + col * (buttonWidth + buttonGap);
                const y = startY + row * (buttonHeight + buttonGap);

                ctx.fillStyle = '#333';
                ctx.fillRect(x, y, buttonWidth, buttonHeight);
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, buttonWidth, buttonHeight);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(gameState.currentChoices[i], x + buttonWidth / 2, y + buttonHeight / 2);
            }

            if (gameState.showingCorrectAnswer) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = config.correct_color;
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('正解: ' + currentQ.answer, 240, 240);
            }
        }

        function gameLoop() {
            if (gameState.running) {
                gameState.timeLeft -= 0.016;
                if (gameState.timeLeft <= 0) {
                    gameState.timeLeft = 0;
                    if (!gameState.answered) {
                        checkAnswer(-1);
                    }
                }
                gameState.flashTimer -= 0.016;
            }
            drawGame();
        }

        canvas.addEventListener('click', (e) => {
            if (!gameState.running) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const buttonWidth = 100;
            const buttonHeight = 50;
            const buttonGap = 10;
            const startX = (canvas.width - (buttonWidth * 2 + buttonGap)) / 2;
            const startY = 250;

            for (let i = 0; i < 4; i++) {
                const row = Math.floor(i / 2);
                const col = i % 2;
                const bx = startX + col * (buttonWidth + buttonGap);
                const by = startY + row * (buttonHeight + buttonGap);

                if (x >= bx && x <= bx + buttonWidth && y >= by && y <= by + buttonHeight) {
                    checkAnswer(i);
                }
            }
        });

        const startBtn = document.querySelector('#startScreen .btn');
        startBtn.addEventListener('click', initializeGame);

        const retryButtons = document.querySelectorAll('#gameOverScreen .btn, #clearScreen .btn');
        retryButtons.forEach(btn => {
            btn.addEventListener('click', retryGame);
        });

        startScreen.style.display = 'flex';
        setInterval(gameLoop, 16);
    </script>
</body>
</html>
