<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>折り紙パズル</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #0a1a2e; font-family: Arial, sans-serif;
        }
        #gameContainer { position: relative; }
        canvas { display: block; }
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            color: #fff; gap: 14px; z-index: 100; text-align: center; padding: 20px;
        }
        .screen h1 { font-size: 40px; color: #f6e05e; }
        .screen p { font-size: 15px; line-height: 1.7; max-width: 300px; }
        .screen button {
            padding: 12px 36px; font-size: 16px; border: none;
            border-radius: 6px; cursor: pointer; background: #38a169; color: #fff;
        }
        .screen button:hover { background: #48bb78; }
        #stepsPanel {
            position: absolute; bottom: 0; left: 0; width: 100%;
            display: none; padding: 10px; background: rgba(10,26,46,0.9);
            z-index: 50;
        }
        #stepsRow { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .stepBtn {
            padding: 8px 14px; font-size: 13px; border: 2px solid #2d4a6e;
            border-radius: 6px; cursor: pointer; background: #1a2e4a; color: #90cdf4;
        }
        .stepBtn.active { border-color: #f6e05e; color: #f6e05e; }
        .stepBtn.done { border-color: #38a169; background: #1a3e2a; color: #68d391; }
        .stepBtn.locked { opacity: 0.4; cursor: not-allowed; }
        #stepHint { color: #a0aec0; font-size: 12px; text-align: center; margin-top: 6px; }
        #retrySmall {
            position: absolute; top: 10px; right: 10px;
            padding: 6px 14px; font-size: 12px; border: 1px solid #4a6a8a;
            border-radius: 4px; cursor: pointer; background: transparent; color: #90cdf4;
            z-index: 60;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <div id="startScreen" class="screen" style="display:flex">
        <h1>🦢 折り紙パズル</h1>
        <p>順番通りに折り工程をクリックして<br>鶴を完成させよう！<br><br>
        ① → ⑤ の順でクリック<br>間違えたら最初からやり直し</p>
        <button onclick="startGame()">START</button>
    </div>
    <div id="clearScreen" class="screen">
        <h1>CLEAR!</h1>
        <p>折り紙の鶴が完成した！<br>全5工程をマスターした！</p>
        <button onclick="retryGame()">もう一度</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="stepsPanel">
        <div id="stepsRow">
            <button class="stepBtn active" id="stepBtn0" onclick="clickStep(0)">① 半分に折る</button>
            <button class="stepBtn locked" id="stepBtn1" onclick="clickStep(1)">② 三角に折る</button>
            <button class="stepBtn locked" id="stepBtn2" onclick="clickStep(2)">③ 開いて潰す</button>
            <button class="stepBtn locked" id="stepBtn3" onclick="clickStep(3)">④ 内側に折る</button>
            <button class="stepBtn locked" id="stepBtn4" onclick="clickStep(4)">⑤ 羽を広げる</button>
        </div>
        <div id="stepHint">まず「① 半分に折る」をクリック！</div>
    </div>
    <button id="retrySmall" onclick="retryGame()" style="display:none">やり直し</button>
</div>
<script>
const W = 480, H = 520;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;
const gc = document.getElementById('gameContainer');
gc.style.width = W + 'px'; gc.style.height = H + 'px';

const STEPS = [
    { label: '① 半分に折る',  hint: '長方形が正方形になる' },
    { label: '② 三角に折る',  hint: '対角線で折る' },
    { label: '③ 開いて潰す', hint: '四角い袋状に広げる' },
    { label: '④ 内側に折る', hint: '翼と首が見えてくる' },
    { label: '⑤ 羽を広げる', hint: '完成！鶴の形に' },
];

const gameState = {
    running: false,
    currentStep: 0,
    animProgress: 0,
    animating: false,
    completedSteps: 0,
    wrongFlash: 0,
};
let gameLoop = null;

function startGame() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('clearScreen').style.display = 'none';
    document.getElementById('stepsPanel').style.display = 'block';
    document.getElementById('retrySmall').style.display = 'block';
    resetStepButtons();
    gameState.running = true;
    gameState.currentStep = 0;
    gameState.animProgress = 0;
    gameState.animating = false;
    gameState.completedSteps = 0;
    gameState.wrongFlash = 0;
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(update, 16);
    setHint(STEPS[0].hint);
}

function resetStepButtons() {
    for (let i = 0; i < STEPS.length; i++) {
        const b = document.getElementById('stepBtn' + i);
        b.className = 'stepBtn' + (i === 0 ? ' active' : ' locked');
    }
}

function clickStep(idx) {
    if (!gameState.running || gameState.animating) return;
    if (idx !== gameState.currentStep) {
        gameState.wrongFlash = 30;
        setHint('順番通りに！次は「' + STEPS[gameState.currentStep].label + '」');
        return;
    }
    // Correct step
    gameState.animating = true;
    gameState.animProgress = 0;
    const btn = document.getElementById('stepBtn' + idx);
    btn.className = 'stepBtn done';
}

function setHint(msg) { document.getElementById('stepHint').innerText = msg; }

function advanceStep() {
    gameState.currentStep++;
    gameState.completedSteps++;
    gameState.animating = false;
    gameState.animProgress = 0;
    if (gameState.completedSteps >= STEPS.length) {
        setTimeout(() => clearGame(), 400);
        return;
    }
    const next = document.getElementById('stepBtn' + gameState.currentStep);
    next.className = 'stepBtn active';
    setHint(STEPS[gameState.currentStep].hint);
}

function clearGame() {
    gameState.running = false;
    clearInterval(gameLoop);
    document.getElementById('stepsPanel').style.display = 'none';
    document.getElementById('retrySmall').style.display = 'none';
    document.getElementById('clearScreen').style.display = 'flex';
}

function retryGame() {
    gameState.running = false;
    document.getElementById('clearScreen').style.display = 'none';
    document.getElementById('stepsPanel').style.display = 'none';
    document.getElementById('retrySmall').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
}

function update() {
    if (!gameState.running) return;
    if (gameState.animating) {
        gameState.animProgress += 0.03;
        if (gameState.animProgress >= 1) {
            gameState.animProgress = 1;
            advanceStep();
        }
    }
    if (gameState.wrongFlash > 0) gameState.wrongFlash--;
    draw();
}

// Draw origami shapes per step
function drawPaper(step, progress) {
    const cx = W / 2, cy = H / 2 - 40;
    const s = 160; // base size

    ctx.save();
    ctx.translate(cx, cy);

    if (step === 0) {
        // Flat square
        const interp = progress;
        const curH = s * (1 - interp * 0.5);
        ctx.fillStyle = '#e9d8fd';
        ctx.strokeStyle = '#6b46c1';
        ctx.lineWidth = 2;
        ctx.fillRect(-s/2, -curH/2, s, curH);
        ctx.strokeRect(-s/2, -curH/2, s, curH);
        // fold line
        if (interp > 0.2) {
            ctx.strokeStyle = 'rgba(107,70,193,0.5)';
            ctx.setLineDash([5,5]);
            ctx.beginPath();
            ctx.moveTo(-s/2, 0); ctx.lineTo(s/2, 0);
            ctx.stroke();
            ctx.setLineDash([]);
        }
    } else if (step === 1) {
        // Triangle form
        const a = progress * Math.PI / 4;
        ctx.fillStyle = '#e9d8fd';
        ctx.strokeStyle = '#6b46c1';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.5 * (1 - progress * 0.3));
        ctx.lineTo(-s/2, s * 0.2);
        ctx.lineTo(s/2, s * 0.2);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        // fold crease
        if (progress > 0.3) {
            ctx.strokeStyle = 'rgba(107,70,193,0.4)';
            ctx.setLineDash([4,4]);
            ctx.beginPath();
            ctx.moveTo(-s/4, -s*0.15); ctx.lineTo(s/4, -s*0.15);
            ctx.stroke();
            ctx.setLineDash([]);
        }
    } else if (step === 2) {
        // Square base (open)
        const open = progress;
        const hw = s * 0.35 + open * s * 0.15;
        ctx.fillStyle = '#d6bcfa';
        ctx.strokeStyle = '#553c9a';
        ctx.lineWidth = 2;
        ctx.fillRect(-hw, -hw, hw*2, hw*2);
        ctx.strokeRect(-hw, -hw, hw*2, hw*2);
        ctx.strokeStyle = 'rgba(85,60,154,0.4)';
        ctx.setLineDash([4,4]);
        ctx.beginPath(); ctx.moveTo(0,-hw); ctx.lineTo(0,hw); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-hw,0); ctx.lineTo(hw,0); ctx.stroke();
        ctx.setLineDash([]);
    } else if (step === 3) {
        // Crane body taking shape
        const t = progress;
        const bodyW = s * 0.28;
        const bodyH = s * 0.45;
        ctx.fillStyle = '#b794f4';
        ctx.strokeStyle = '#553c9a';
        ctx.lineWidth = 2;
        // Wings
        const wingSpan = s * 0.5 * (1 + t * 0.3);
        ctx.beginPath();
        ctx.moveTo(0, -bodyH/2);
        ctx.lineTo(-wingSpan, 0);
        ctx.lineTo(0, bodyH/3);
        ctx.lineTo(wingSpan, 0);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        // Neck/tail
        ctx.fillStyle = '#9f7aea';
        ctx.fillRect(-bodyW/2, -bodyH/2, bodyW, bodyH * 0.4);
        ctx.strokeRect(-bodyW/2, -bodyH/2, bodyW, bodyH * 0.4);
    } else if (step === 4) {
        // Full crane
        const t = progress;
        drawCrane(0, 0, s * (0.8 + t * 0.2), t);
    }

    ctx.restore();
}

function drawCrane(ox, oy, s, t) {
    // Body
    ctx.fillStyle = '#9f7aea';
    ctx.strokeStyle = '#553c9a';
    ctx.lineWidth = 2;
    const bh = s * 0.3;
    ctx.beginPath();
    ctx.moveTo(ox, oy - bh/2);
    ctx.lineTo(ox - s*0.25, oy + bh/2);
    ctx.lineTo(ox + s*0.25, oy + bh/2);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Wings
    const wingAngle = -0.3 - t * 0.4;
    ctx.save();
    ctx.translate(ox, oy);
    ctx.rotate(wingAngle);
    ctx.fillStyle = '#d6bcfa';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-s*0.55, -s*0.18);
    ctx.lineTo(-s*0.1, s*0.05);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.translate(ox, oy);
    ctx.rotate(-wingAngle);
    ctx.scale(-1, 1);
    ctx.fillStyle = '#d6bcfa';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-s*0.55, -s*0.18);
    ctx.lineTo(-s*0.1, s*0.05);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.restore();

    // Neck
    ctx.strokeStyle = '#553c9a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(ox, oy - bh/2);
    ctx.quadraticCurveTo(ox - s*0.15, oy - bh, ox - s*0.05, oy - bh - s*0.18);
    ctx.stroke();
    // Head
    ctx.fillStyle = '#e9d8fd';
    ctx.beginPath();
    ctx.arc(ox - s*0.05, oy - bh - s*0.22, 8, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    // Tail
    ctx.beginPath();
    ctx.moveTo(ox, oy + bh/2);
    ctx.quadraticCurveTo(ox + s*0.15, oy + bh, ox + s*0.05, oy + bh + s*0.18);
    ctx.stroke();
}

function draw() {
    ctx.fillStyle = '#0a1a2e';
    ctx.fillRect(0, 0, W, H);

    // Step progress dots
    const dotY = 30;
    for (let i = 0; i < STEPS.length; i++) {
        const dx = W/2 - (STEPS.length - 1) * 28 / 2 + i * 28;
        const done = i < gameState.currentStep;
        const active = i === gameState.currentStep;
        ctx.fillStyle = done ? '#38a169' : (active ? '#f6e05e' : '#2d4a6e');
        ctx.beginPath();
        ctx.arc(dx, dotY, 9, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = done || active ? '#fff' : '#4a6a8e';
        ctx.font = '10px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(i + 1, dx, dotY);
    }

    // Step label
    const stepIdx = Math.min(gameState.currentStep, STEPS.length - 1);
    ctx.fillStyle = '#f6e05e';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('工程 ' + (gameState.currentStep + 1) + ' / ' + STEPS.length +
        ' — ' + STEPS[stepIdx].label, W/2, 50);

    // Paper
    const step = gameState.completedSteps;
    drawPaper(step < STEPS.length ? step : STEPS.length - 1, gameState.animProgress);

    // Wrong flash
    if (gameState.wrongFlash > 0) {
        ctx.fillStyle = 'rgba(229,62,62,' + (gameState.wrongFlash / 30 * 0.3) + ')';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fc8181';
        ctx.font = 'bold 22px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('順番が違う！', W/2, H/2 + 100);
    }

    // Arrow if animating
    if (gameState.animating && gameState.animProgress < 1) {
        const a = (Date.now() / 200) % (Math.PI * 2);
        ctx.fillStyle = 'rgba(246,224,94,' + (0.5 + 0.5 * Math.sin(a)) + ')';
        ctx.font = '28px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('✂ 折り中…', W/2, H/2 + 110);
    }
}
</script>
</body>
</html>
