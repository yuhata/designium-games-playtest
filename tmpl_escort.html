<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESCORT MISSION</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0a0e27;
      font-family: Arial, sans-serif;
    }
    #gameContainer {
      position: relative;
      width: 800px;
      height: 600px;
    }
    canvas {
      display: block;
      background: #1a1a2e;
      border: 2px solid #00d4ff;
    }
    #startScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 26, 46, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #clearScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 200, 100, 0.2);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }
    #gameoverScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 60, 60, 0.2);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }
    .screen-content {
      text-align: center;
      color: white;
    }
    .screen-content h1 {
      font-size: 48px;
      margin: 20px 0;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
    }
    .screen-content p {
      font-size: 18px;
      margin: 10px 0;
    }
    #startBtn {
      margin-top: 40px;
      padding: 15px 40px;
      font-size: 24px;
      background: #00d4ff;
      color: #1a1a2e;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }
    #startBtn:hover {
      background: #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
    }
    #retryBtn, #retryBtn2 {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 18px;
      background: #00d4ff;
      color: #1a1a2e;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    #retryBtn:hover, #retryBtn2:hover {
      background: #00ffff;
    }
  </style>
</head>
<!--GAME_SPEC
{
  "win_condition": "score >= 50",
  "fail_condition": "vipHP <= 0",
  "input_types": ["click"],
  "state_vars": ["score", "vipHP", "wave", "phase"],
  "core_loop": "spawn enemies -> click shield -> collide projectile -> damage VIP or block -> accumulate score -> check win/fail",
  "clear_trigger": "gameState.score >= 50",
  "gameover_trigger": "gameState.vipHP <= 0"
}
-->
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="startScreen">
      <div class="screen-content">
        <h1>ESCORT MISSION</h1>
        <p>Protect the VIP from incoming projectiles!</p>
        <p>Click to place protective shields</p>
        <p>Block 50+ projectile hits to win</p>
        <button id="startBtn">START</button>
      </div>
    </div>

    <div id="clearScreen">
      <div class="screen-content">
        <h1>VICTORY!</h1>
        <p id="clearScore">Final Score: 50</p>
        <p id="clearWave">Wave Reached: 1</p>
        <p style="margin-top: 30px; font-size: 14px; opacity: 0.8;">Click to play again</p>
        <button id="retryBtn">RESTART</button>
      </div>
    </div>

    <div id="gameoverScreen">
      <div class="screen-content">
        <h1>MISSION FAILED</h1>
        <p id="gameoverScore">Final Score: 0</p>
        <p>VIP was eliminated...</p>
        <p style="margin-top: 30px; font-size: 14px; opacity: 0.8;">Click to try again</p>
        <button id="retryBtn2">RESTART</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startScreen = document.getElementById('startScreen');
    const clearScreen = document.getElementById('clearScreen');
    const gameoverScreen = document.getElementById('gameoverScreen');
    const startBtn = document.getElementById('startBtn');
    const retryBtn = document.getElementById('retryBtn');
    const retryBtn2 = document.getElementById('retryBtn2');

    const gameState = {
      phase: 'start',
      vipHP: 100,
      score: 0,
      wave: 1,
      enemies: [],
      shields: [],
      projectiles: [],
      lastShieldTime: 0,
      shieldCount: 0,
      enemySpawnInterval: null,
      lastWaveEnemyCount: 0
    };

    class Enemy {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.targetX = 400;
        this.targetY = 500;
        this.speed = 60 + (gameState.wave - 1) * 10;
        this.radius = 15;
        this.shotsFired = 0;
        this.maxShots = 2;
        this.lastShotTime = 0;
        this.firstShotDelay = 1000;
        this.shotDelay = 2000;
        this.hasReachedVIP = false;
      }

      update(dt) {
        const dx = this.targetX - this.x;
        const dy = this.targetY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > 1) {
          const ratio = Math.min(this.speed * dt / dist, 1);
          this.x += dx * ratio;
          this.y += dy * ratio;
        }

        if (dist < 30 && !this.hasReachedVIP) {
          this.hasReachedVIP = true;
          gameState.vipHP--;
          if (gameState.vipHP <= 0) {
            gameState.phase = 'over';
          }
        }

        if (Date.now() - this.lastShotTime > this.firstShotDelay && this.shotsFired < this.maxShots) {
          this.shoot();
          this.shotsFired++;
          this.lastShotTime = Date.now();
          this.firstShotDelay = this.shotDelay;
        }
      }

      shoot() {
        const baseAngle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
        const angles = [
          baseAngle - 15 * Math.PI / 180,
          baseAngle,
          baseAngle + 15 * Math.PI / 180
        ];

        angles.forEach(angle => {
          gameState.projectiles.push(new Projectile(this.x, this.y, angle));
        });
      }

      draw() {
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ff0000';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    class Projectile {
      constructor(x, y, angle) {
        this.x = x;
        this.y = y;
        this.vx = Math.cos(angle) * 100;
        this.vy = Math.sin(angle) * 100;
        this.radius = 6;
      }

      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
      }

      isOutOfBounds() {
        return this.x < -20 || this.x > 820 || this.y < -20 || this.y > 620;
      }

      draw() {
        ctx.fillStyle = '#ffff00';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowColor = '#ffff00';
        ctx.shadowBlur = 8;
        ctx.stroke();
        ctx.shadowColor = 'transparent';
      }
    }

    class Shield {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 20;
        this.lifetime = 4000;
        this.createdTime = Date.now();
        this.hitCount = 0;
      }

      isExpired() {
        return Date.now() - this.createdTime > this.lifetime;
      }

      draw() {
        const elapsed = Date.now() - this.createdTime;
        const progress = 1 - elapsed / this.lifetime;
        ctx.strokeStyle = `rgba(0, 255, 255, ${0.8 * progress})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function spawnEnemy() {
      if (gameState.phase !== 'play') return;
      const x = Math.random() * 700 + 50;
      const y = -30;
      gameState.enemies.push(new Enemy(x, y));
      gameState.lastWaveEnemyCount++;
    }

    function checkWin() {
      if (gameState.score >= 50 && gameState.phase === 'play') {
        gameState.phase = 'clear';
      }
    }

    function startGame() {
      gameState.phase = 'play';
      gameState.vipHP = 100;
      gameState.score = 0;
      gameState.wave = 1;
      gameState.enemies = [];
      gameState.shields = [];
      gameState.projectiles = [];
      gameState.lastWaveEnemyCount = 0;
      gameState.shieldCount = 0;
      startScreen.style.display = 'none';
      clearScreen.style.display = 'none';
      gameoverScreen.style.display = 'none';

      if (gameState.enemySpawnInterval) {
        clearInterval(gameState.enemySpawnInterval);
      }
      gameState.enemySpawnInterval = setInterval(spawnEnemy, 2000);
    }

    function restartGame() {
      startGame();
    }

    function handleCanvasClick(e) {
      if (gameState.phase === 'clear' || gameState.phase === 'over') {
        if (gameState.phase === 'clear') {
          restartGame();
        } else {
          restartGame();
        }
        return;
      }

      if (gameState.phase !== 'play') return;

      const now = Date.now();
      if (now - gameState.lastShieldTime < 100) return;

      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      if (gameState.shields.length < 3) {
        gameState.shields.push(new Shield(x, y));
        gameState.lastShieldTime = now;
        gameState.shieldCount++;
      }
    }

    function handleCanvasMouseDown(e) {
      if (gameState.phase !== 'play') return;
    }

    function handleCanvasMouseUp(e) {
      if (gameState.phase !== 'play') return;
    }

    function handleCanvasMouseMove(e) {
      if (gameState.phase !== 'play') return;
    }

    function updateGame(dt) {
      if (gameState.phase !== 'play') return;

      gameState.enemies.forEach(enemy => enemy.update(dt));
      gameState.projectiles.forEach(proj => proj.update(dt));

      // Collision detection
      for (let i = gameState.projectiles.length - 1; i >= 0; i--) {
        const proj = gameState.projectiles[i];
        let hit = false;

        for (let j = gameState.shields.length - 1; j >= 0; j--) {
          const shield = gameState.shields[j];
          const dx = proj.x - shield.x;
          const dy = proj.y - shield.y;
          const distSq = dx * dx + dy * dy;

          if (distSq < (proj.radius + shield.radius) ** 2) {
            gameState.projectiles.splice(i, 1);
            gameState.shields.splice(j, 1);
            gameState.score += 5;
            checkWin();
            hit = true;
            break;
          }
        }

        if (!hit) {
          const vipX = 400, vipY = 500;
          const dx = proj.x - vipX;
          const dy = proj.y - vipY;
          const distSq = dx * dx + dy * dy;

          if (distSq < (proj.radius + 20) ** 2) {
            gameState.projectiles.splice(i, 1);
            hit = true;
          }
        }

        if (!hit && proj.isOutOfBounds()) {
          gameState.projectiles.splice(i, 1);
        }
      }

      // Remove expired shields
      for (let i = gameState.shields.length - 1; i >= 0; i--) {
        if (gameState.shields[i].isExpired()) {
          gameState.shields.splice(i, 1);
        }
      }

      // Remove off-screen enemies
      for (let i = gameState.enemies.length - 1; i >= 0; i--) {
        if (gameState.enemies[i].y > 620) {
          gameState.enemies.splice(i, 1);
        }
      }

      // Wave completion check
      if (gameState.enemies.length === 0 && gameState.lastWaveEnemyCount > 0 && gameState.phase === 'play') {
        gameState.score += 10;
        gameState.wave++;
        gameState.lastWaveEnemyCount = 0;
        checkWin();
      }

      if (gameState.vipHP <= 0) {
        gameState.phase = 'over';
      }
    }

    function drawGame() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, 800, 600);

      if (gameState.phase === 'play') {
        // Draw VIP
        const vipWarning = gameState.vipHP < 30 ? Math.sin(Date.now() / 100) > 0 ? 0.3 : 1 : 1;
        ctx.fillStyle = `rgba(0, 255, 0, ${vipWarning})`;
        ctx.fillRect(380, 480, 40, 40);
        ctx.strokeStyle = '#00ff00';
        ctx.lineWidth = 3;
        ctx.strokeRect(380, 480, 40, 40);

        // VIP Shield
        if (gameState.enemies.length === 0 && gameState.lastWaveEnemyCount > 0 && gameState.wave > 1) {
          ctx.strokeStyle = 'rgba(255, 215, 0, 0.6)';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(400, 500, 80, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Draw enemies
        gameState.enemies.forEach(enemy => enemy.draw());

        // Draw projectiles
        gameState.projectiles.forEach(proj => proj.draw());

        // Draw shields
        gameState.shields.forEach(shield => shield.draw());

        // Draw UI
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 24px Arial';
        ctx.fillText(`Score: ${gameState.score}`, 20, 30);
        ctx.fillText(`VIP HP: ${gameState.vipHP}`, 20, 60);
        ctx.fillText(`Wave: ${gameState.wave}`, 20, 90);

        ctx.font = '16px Arial';
        ctx.fillText('Click canvas to place shields', 20, 120);
        ctx.fillText(`Shields deployed: ${gameState.shieldCount}`, 20, 145);

        // Progress indicator
        const progress = Math.min(gameState.score / 50, 1);
        ctx.fillStyle = '#333333';
        ctx.fillRect(20, 560, 300, 30);
        ctx.fillStyle = '#00d4ff';
        ctx.fillRect(20, 560, 300 * progress, 30);
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 2;
        ctx.strokeRect(20, 560, 300, 30);
        ctx.fillStyle = '#000000';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`${Math.floor(progress * 100)}%`, 170, 580);
        ctx.textAlign = 'left';
      } else if (gameState.phase === 'clear') {
        ctx.fillStyle = 'rgba(0, 255, 100, 0.1)';
        ctx.fillRect(0, 0, 800, 600);

        ctx.fillStyle = '#00ff88';
        ctx.font = 'bold 60px Arial';
        ctx.textAlign = 'center';
        ctx.shadowColor = 'rgba(0, 255, 136, 0.8)';
        ctx.shadowBlur = 20;
        ctx.fillText('VICTORY!', 400, 200);
        ctx.shadowColor = 'transparent';

        ctx.fillStyle = '#ffffff';
        ctx.font = '28px Arial';
        ctx.fillText(`Final Score: ${gameState.score}`, 400, 280);
        ctx.fillText(`Wave Reached: ${gameState.wave}`, 400, 320);
        ctx.font = '18px Arial';
        ctx.fillStyle = '#00ffff';
        ctx.fillText('Click to play again', 400, 420);
      } else if (gameState.phase === 'over') {
        ctx.fillStyle = 'rgba(255, 0, 0, 0.1)';
        ctx.fillRect(0, 0, 800, 600);

        ctx.fillStyle = '#ff4444';
        ctx.font = 'bold 60px Arial';
        ctx.textAlign = 'center';
        ctx.shadowColor = 'rgba(255, 68, 68, 0.8)';
        ctx.shadowBlur = 20;
        ctx.fillText('MISSION FAILED', 400, 200);
        ctx.shadowColor = 'transparent';

        ctx.fillStyle = '#ffffff';
        ctx.font = '28px Arial';
        ctx.fillText(`Final Score: ${gameState.score}`, 400, 280);
        ctx.font = '18px Arial';
        ctx.fillStyle = '#ff8888';
        ctx.fillText('Click to try again', 400, 420);
      }

      ctx.textAlign = 'left';
    }

    let lastFrameTime = Date.now();
    function gameLoop() {
      const now = Date.now();
      const dt = Math.min((now - lastFrameTime) / 1000, 0.016);
      lastFrameTime = now;

      updateGame(dt);
      drawGame();
      requestAnimationFrame(gameLoop);
    }

    startBtn.addEventListener('click', startGame);
    retryBtn.addEventListener('click', restartGame);
    retryBtn2.addEventListener('click', restartGame);

    canvas.addEventListener('click', handleCanvasClick);
    canvas.addEventListener('mousedown', handleCanvasMouseDown);
    canvas.addEventListener('mouseup', handleCanvasMouseUp);
    canvas.addEventListener('mousemove', handleCanvasMouseMove);

    gameLoop();
  </script>
</body>
</html>
