<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コトバ探偵</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', 'メイリオ', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        #gameContainer {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 5px;
            font-size: 2.5em;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .instructions {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            color: #333;
            font-size: 0.95em;
            line-height: 1.6;
            border-left: 4px solid #667eea;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            font-size: 0.8em;
            margin-top: 5px;
        }
        .game-area {
            margin-bottom: 30px;
        }
        .word-display {
            background: #f0f0f0;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            font-size: 3em;
            letter-spacing: 15px;
            margin-bottom: 25px;
            font-weight: bold;
            color: #333;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px dashed #ddd;
        }
        .hints {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .hint {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            background: #aaa;
            font-size: 1.1em;
            transition: all 0.2s;
        }
        .hint.correct {
            background: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
            animation: popCorrect 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .hint.partial {
            background: #FFC107;
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.5);
            animation: popPartial 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes popCorrect {
            0% { transform: scale(0.6) rotate(-10deg); }
            50% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        @keyframes popPartial {
            0% { transform: scale(0.6); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .keyboard {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .key {
            padding: 14px 8px;
            background: #e0e0e0;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            color: #333;
        }
        .key:hover:not(:disabled) {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .key:active:not(:disabled) {
            transform: translateY(0);
        }
        .key:disabled {
            background: #ccc;
            color: #999;
            cursor: not-allowed;
        }
        .input-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .input-display {
            font-size: 2.2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            min-height: 50px;
            letter-spacing: 12px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 13px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .submit-btn {
            background: #4CAF50;
            color: white;
        }
        .submit-btn:hover:not(:disabled) {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .reset-btn {
            background: #ff9800;
            color: white;
        }
        .reset-btn:hover:not(:disabled) {
            background: #e68900;
            transform: translateY(-2px);
        }
        .reset-btn:disabled {
            background: #ccc;
        }
        .message {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            margin: 20px 0;
            min-height: 35px;
            animation: fadeInMessage 0.5s ease-out;
        }
        .message.win {
            color: #4CAF50;
        }
        .message.fail {
            color: #f44336;
        }
        .message.warning {
            color: #ff9800;
        }
        @keyframes fadeInMessage {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result-screen {
            text-align: center;
            padding: 50px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            display: none;
        }
        .result-screen.show {
            display: block;
            animation: slideUpResult 0.6s ease-out;
        }
        @keyframes slideUpResult {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result-screen h2 {
            font-size: 2.8em;
            margin-bottom: 25px;
        }
        .final-score {
            font-size: 4em;
            font-weight: bold;
            margin: 30px 0;
        }
        .result-details {
            font-size: 1.15em;
            margin: 25px 0;
            line-height: 2;
        }
        .result-screen button {
            margin-top: 25px;
            width: 80%;
            max-width: 200px;
            margin-left: auto;
            margin-right: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1>🔍 コトバ探偵</h1>
        <div class="subtitle">隠された言葉を発見する推理ゲーム</div>
        
        <div class="instructions">
            <strong>📌 遊び方：</strong> 秘密の言葉を6試行以内に当てよう！文字をタップして入力し、「確認」ボタンを押します。色でヒントが変わります。<span style="color:#4CAF50;">■ 緑</span>＝その場所に正解、<span style="color:#FFC107;">■ 黄</span>＝その単語に含まれるが別の場所、<span style="color:#aaa;">■ 灰</span>＝含まれない。
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="scoreDisplay">0</div>
                <div class="stat-label">スコア</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="triesDisplay">6</div>
                <div class="stat-label">残試行</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="timerDisplay">0秒</div>
                <div class="stat-label">経過時間</div>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="word-display" id="wordDisplay">？？？？</div>
            
            <div class="hints" id="hints"></div>

            <div class="input-area">
                <div class="input-display" id="inputDisplay"></div>
            </div>

            <div class="keyboard" id="keyboard"></div>

            <div class="message" id="message"></div>

            <div class="button-group">
                <button class="submit-btn" id="submitBtn" disabled>確認</button>
                <button class="reset-btn" id="deleteBtn">取消</button>
            </div>
        </div>

        <div class="result-screen" id="resultScreen">
            <h2 id="resultTitle">ゲーム終了</h2>
            <div class="final-score" id="finalScore">0/5</div>
            <div class="result-details" id="resultDetails"></div>
            <button class="reset-btn" onclick="location.reload()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        const WORD_POOL = [
            'あいうえお', 'かきくけこ', 'さしすせそ', 'たちつてと', 'なにぬねの',
            'あかさたな', 'いきしちに', 'うくすつぬ', 'えけせてね', 'おこそとの'
        ];

        function pickWords() {
            const pool = WORD_POOL.slice();
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            return pool.slice(0, 5);
        }

        const game = {
            words: pickWords(),
            currentWordIndex: 0,
            secretWord: '',
            input: '',
            tries: 6,
            score: 0,
            startTime: 0,
            gameActive: true,
            totalTime: 0
        };

        const hiragana = ['あ', 'い', 'う', 'え', 'お',
                         'か', 'き', 'く', 'け', 'こ',
                         'さ', 'し', 'す', 'せ', 'そ',
                         'た', 'ち', 'つ', 'て', 'と',
                         'な', 'に', 'ぬ', 'ね', 'の'];

        function initGame() {
            game.words = pickWords();
            game.currentWordIndex = 0;
            game.score = 0;
            game.startTime = Date.now();
            loadNewWord();
        }

        function loadNewWord() {
            if (game.currentWordIndex >= game.words.length) {
                endGame();
                return;
            }
            game.secretWord = game.words[game.currentWordIndex];
            game.input = '';
            game.tries = 6;
            game.gameActive = true;
            game.currentWordIndex++;
            
            updateDisplay();
            createKeyboard();
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';
        }

        function createKeyboard() {
            const keyboard = document.getElementById('keyboard');
            keyboard.innerHTML = '';
            hiragana.forEach(char => {
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.textContent = char;
                btn.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    selectCharacter(char);
                });
                keyboard.appendChild(btn);
            });
        }

        function selectCharacter(char) {
            if (!game.gameActive) return;
            
            if (game.input.length < game.secretWord.length) {
                game.input += char;
                updateDisplay();
            }
        }

        function updateDisplay() {
            const inputDisplay = document.getElementById('inputDisplay');
            inputDisplay.textContent = game.input;

            const wordDisplay = document.getElementById('wordDisplay');
            let display = '';
            for (let i = 0; i < game.secretWord.length; i++) {
                display += (i < game.input.length ? game.input[i] : '？');
            }
            wordDisplay.textContent = display;

            updateHints();
            updateStats();
        }

        function updateHints() {
            const hintsContainer = document.getElementById('hints');
            hintsContainer.innerHTML = '';

            for (let i = 0; i < game.secretWord.length; i++) {
                const hintEl = document.createElement('div');
                hintEl.className = 'hint';

                if (i < game.input.length) {
                    const inputChar = game.input[i];
                    const secretChar = game.secretWord[i];

                    if (inputChar === secretChar) {
                        hintEl.classList.add('correct');
                        hintEl.textContent = inputChar;
                    } else if (game.secretWord.includes(inputChar)) {
                        hintEl.classList.add('partial');
                        hintEl.textContent = '?';
                    } else {
                        hintEl.textContent = '✗';
                    }
                } else {
                    hintEl.textContent = '？';
                }

                hintsContainer.appendChild(hintEl);
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = game.input.length < game.secretWord.length;
        }

        function submit() {
            if (!game.gameActive || game.input.length !== game.secretWord.length) return;

            const messageEl = document.getElementById('message');
            messageEl.className = 'message';

            if (game.input === game.secretWord) {
                messageEl.className = 'message win';
                messageEl.textContent = '🎉 正解！';
                game.score++;
                game.gameActive = false;
                setTimeout(() => {
                    game.input = '';
                    loadNewWord();
                }, 1500);
            } else {
                game.tries--;
                if (game.tries <= 0) {
                    messageEl.className = 'message fail';
                    messageEl.textContent = `💔 ゲームオーバー... 答えは「${game.secretWord}」でした`;
                    game.gameActive = false;
                    setTimeout(() => {
                        endGame();
                    }, 2500);
                } else {
                    messageEl.className = 'message warning';
                    messageEl.textContent = `❌ 外れました（残り${game.tries}試行）`;
                    game.input = '';
                    updateDisplay();
                }
            }
        }

        function deleteInput() {
            if (game.input.length > 0) {
                game.input = game.input.slice(0, -1);
                updateDisplay();
            }
        }

        function updateStats() {
            const now = Date.now();
            const elapsed = Math.floor((now - game.startTime) / 1000);
            document.getElementById('scoreDisplay').textContent = game.score;
            document.getElementById('triesDisplay').textContent = game.tries;
            document.getElementById('timerDisplay').textContent = elapsed + '秒';
        }

        function endGame() {
            const now = Date.now();
            game.totalTime = Math.floor((now - game.startTime) / 1000);
            
            document.getElementById('gameArea').style.display = 'none';
            const resultScreen = document.getElementById('resultScreen');
            resultScreen.classList.add('show');
            
            document.getElementById('finalScore').textContent = game.score + ' / ' + game.words.length;
            
            let resultMsg = `経過時間: ${game.totalTime}秒<br>正解数: ${game.score}問`;
            if (game.score === game.words.length) {
                document.getElementById('resultTitle').textContent = '🏆 完璧！全問正解！';
                resultMsg += '<br>評価: 名探偵！';
            } else if (game.score >= 3) {
                document.getElementById('resultTitle').textContent = '👏 良好！';
                resultMsg += '<br>評価: 優秀な探偵';
            } else {
                document.getElementById('resultTitle').textContent = '💪 チャレンジ完了！';
                resultMsg += '<br>評価: 修行中...';
            }
            document.getElementById('resultDetails').innerHTML = resultMsg;
        }

        document.getElementById('submitBtn').addEventListener('mousedown', (e) => {
            e.preventDefault();
            submit();
        });

        document.getElementById('deleteBtn').addEventListener('mousedown', (e) => {
            e.preventDefault();
            deleteInput();
        });

        initGame();
        setInterval(updateStats, 100);
    </script>
</body>
</html>
