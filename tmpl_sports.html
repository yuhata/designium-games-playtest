<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PENALTY KICK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #gameContainer {
            position: relative;
            background: #1a1a1a;
            border: 2px solid #333;
        }

        canvas {
            display: block;
            background: #1a3a1a;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
        }

        #startScreen h1 {
            font-size: 52px;
            margin-bottom: 30px;
            font-weight: bold;
        }

        #startScreen .rules {
            font-size: 18px;
            margin: 20px 0;
            line-height: 1.8;
            max-width: 320px;
        }

        #startScreen .rules p {
            margin: 12px 0;
        }

        #startScreen button {
            padding: 15px 50px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 40px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        #startScreen button:hover {
            background: #45a049;
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
        }

        #gameOverScreen h2 {
            font-size: 52px;
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        #gameOverScreen p {
            font-size: 24px;
            margin: 15px 0;
        }

        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
        }

        #clearScreen h2 {
            font-size: 52px;
            margin-bottom: 20px;
            color: #4CAF50;
        }

        #clearScreen p {
            font-size: 24px;
            margin: 15px 0;
        }

        .retry-button {
            padding: 15px 50px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 40px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .retry-button:hover {
            background: #45a049;
        }

        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            z-index: 50;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 5px;
        }

        #hud div {
            margin: 5px 0;
        }

        #instructions {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: #cccccc;
            font-size: 14px;
            z-index: 50;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="startScreen">
            <h1>PENALTY KICK</h1>
            <div class="rules">
                <p>5ゴール以上で CLEAR!</p>
                <p>10本のシュートが与えられます</p>
                <p style="margin-top: 30px; color: #ffeb3b;">クリックしたい方向に蹴る!</p>
                <p style="color: #ffeb3b;">GKのダイブを読め!</p>
            </div>
            <button onclick="startGame()">START</button>
        </div>

        <div id="gameOverScreen">
            <h2>GAME OVER</h2>
            <p id="gameOverText"></p>
            <button class="retry-button" onclick="retryGame()">RETRY</button>
        </div>

        <div id="clearScreen">
            <h2>CLEAR!</h2>
            <p id="clearText"></p>
            <button class="retry-button" onclick="retryGame()">RETRY</button>
        </div>

        <div id="hud">
            <div>ゴール: <span id="goals">0</span> / <span id="winGoals">5</span></div>
            <div>残りシュート: <span id="shotsRemaining">10</span></div>
        </div>

        <div id="instructions">
            クリックして蹴る! GKを避けろ!
        </div>
    </div>

    <script>
        const config = {
            title: 'PENALTY KICK',
            bg_color: '#1a3a1a',
            field_color: '#2d6a2d',
            goal_color: '#ffffff',
            ball_color: '#ffffff',
            gk_color: '#ff6b6b',
            win_goals: 5,
            total_shots: 10
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('gameContainer');

        canvas.width = 400;
        canvas.height = 600;
        gameContainer.style.width = canvas.width + 'px';

        const gameState = {
            running: false,
            goals: 0,
            shotsRemaining: config.total_shots,
            ballX: 200,
            ballY: 550,
            ballStartX: 200,
            ballStartY: 550,
            ballTargetX: 200,
            ballTargetY: 550,
            ballProgress: 0,
            ballTravelDuration: 0.7,
            ballMoving: false,
            gkStartX: 200,
            gkTargetX: 200,
            gkX: 200,
            gkProgress: 0,
            gkTravelDuration: 0.5,
            gkMoving: false,
            goalLeft: 80,
            goalRight: 320,
            goalTop: 40,
            goalBottom: 140,
            goalWidth: 240,
            goalHeight: 100,
            ballRadius: 8,
            gkWidth: 60,
            gkHeight: 60
        };

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState.running = true;
            gameState.goals = 0;
            gameState.shotsRemaining = config.total_shots;
            resetBallAndGK();
            updateHUD();
            requestAnimationFrame(gameLoop);
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
            gameState.ballMoving = false;
            gameState.gkMoving = false;
        }

        function updateHUD() {
            document.getElementById('goals').textContent = gameState.goals;
            document.getElementById('winGoals').textContent = config.win_goals;
            document.getElementById('shotsRemaining').textContent = gameState.shotsRemaining;
        }

        function resetBallAndGK() {
            gameState.ballX = 200;
            gameState.ballY = 550;
            gameState.ballStartX = 200;
            gameState.ballStartY = 550;
            gameState.ballProgress = 0;
            gameState.ballMoving = false;
            
            gameState.gkX = 200;
            gameState.gkStartX = 200;
            gameState.gkTargetX = 200;
            gameState.gkProgress = 0;
            gameState.gkMoving = false;
        }

        function initiateDive() {
            const gkCenterX = 200;
            const direction = Math.random() > 0.5 ? 1 : -1;
            gameState.gkStartX = gkCenterX;
            gameState.gkX = gkCenterX;
            
            const rawTarget = gkCenterX + direction * 80;
            const gkHalfWidth = gameState.gkWidth / 2;
            gameState.gkTargetX = Math.max(gameState.goalLeft + gkHalfWidth, Math.min(gameState.goalRight - gkHalfWidth, rawTarget));
            
            gameState.gkMoving = true;
            gameState.gkProgress = 0;
        }

        function judgeGoal() {
            const ballX = gameState.ballX;
            const ballY = gameState.ballY;

            const inGoalX = ballX >= gameState.goalLeft && ballX <= gameState.goalRight;
            const inGoalY = ballY >= gameState.goalTop && ballY <= gameState.goalBottom;

            if (inGoalX && inGoalY) {
                const gkLeft = gameState.gkX - gameState.gkWidth / 2;
                const gkRight = gameState.gkX + gameState.gkWidth / 2;
                const gkTop = gameState.goalTop;
                const gkBottom = gameState.goalBottom;

                const ballLeft = ballX - gameState.ballRadius;
                const ballRight = ballX + gameState.ballRadius;
                const ballT = ballY - gameState.ballRadius;
                const ballB = ballY + gameState.ballRadius;

                const collision = !(ballRight < gkLeft || ballLeft > gkRight || ballB < gkTop || ballT > gkBottom);

                if (!collision) {
                    gameState.goals++;
                    updateHUD();
                }
            }

            gameState.ballMoving = false;
            gameState.shotsRemaining--;
            updateHUD();

            if (gameState.shotsRemaining <= 0) {
                endGame();
            }
        }

        function endGame() {
            gameState.running = false;

            if (gameState.goals >= config.win_goals) {
                document.getElementById('clearText').textContent = 'ゴール数: ' + gameState.goals + ' / ' + config.win_goals;
                document.getElementById('clearScreen').style.display = 'flex';
            } else {
                document.getElementById('gameOverText').textContent = 'ゴール数: ' + gameState.goals + ' / ' + config.win_goals;
                document.getElementById('gameOverScreen').style.display = 'flex';
            }
        }

        function draw() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = config.goal_color;
            ctx.lineWidth = 3;
            ctx.strokeRect(gameState.goalLeft, gameState.goalTop, gameState.goalWidth, gameState.goalHeight);

            ctx.fillStyle = config.gk_color;
            ctx.fillRect(gameState.gkX - gameState.gkWidth / 2, gameState.goalTop, gameState.gkWidth, gameState.gkHeight);

            ctx.fillStyle = config.ball_color;
            ctx.beginPath();
            ctx.arc(gameState.ballX, gameState.ballY, gameState.ballRadius, 0, Math.PI * 2);
            ctx.fill();
        }

        function gameLoop() {
            if (gameState.running) {
                if (gameState.ballMoving) {
                    gameState.ballProgress += 1 / 60 / gameState.ballTravelDuration;

                    if (gameState.ballProgress >= 1) {
                        gameState.ballProgress = 1;
                    }

                    gameState.ballX = gameState.ballStartX + (gameState.ballTargetX - gameState.ballStartX) * gameState.ballProgress;
                    const arcHeight = 80;
                    gameState.ballY = gameState.ballStartY + (gameState.ballTargetY - gameState.ballStartY) * gameState.ballProgress - Math.sin(gameState.ballProgress * Math.PI) * arcHeight;

                    if (gameState.ballProgress >= 1) {
                        judgeGoal();
                    }
                }

                if (gameState.gkMoving) {
                    gameState.gkProgress += 1 / 60 / gameState.gkTravelDuration;

                    if (gameState.gkProgress >= 1) {
                        gameState.gkProgress = 1;
                        gameState.gkMoving = false;
                    }

                    gameState.gkX = gameState.gkStartX + (gameState.gkTargetX - gameState.gkStartX) * gameState.gkProgress;
                }

                draw();
                requestAnimationFrame(gameLoop);
            }
        }

        canvas.addEventListener('click', function(event) {
            if (!gameState.running || gameState.ballMoving) {
                return;
            }

            const rect = canvas.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const clickY = event.clientY - rect.top;

            gameState.ballStartX = 200;
            gameState.ballStartY = 550;
            gameState.ballTargetX = clickX;
            gameState.ballTargetY = clickY;
            gameState.ballProgress = 0;
            gameState.ballMoving = true;

            initiateDive();
        });
    </script>
</body>
</html>
