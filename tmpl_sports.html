<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PENALTY KICK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        #gameContainer {
            position: relative;
            background-color: #1a1a1a;
            border: 2px solid #444;
        }
        
        canvas {
            display: block;
            border: 1px solid #333;
            background-color: #0a0a0a;
        }
        
        #startScreen, #clearScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        
        #startScreen {
            display: flex;
        }
        
        #clearScreen, #gameOverScreen {
            display: none;
        }
        
        .screen-title {
            font-size: 48px;
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .screen-subtitle {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 40px;
            text-align: center;
            max-width: 350px;
            line-height: 1.5;
        }
        
        .screen-content {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
            font-size: 20px;
        }
        
        button {
            padding: 15px 40px;
            font-size: 18px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #ff5252;
        }
        
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            color: white;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            z-index: 5;
            font-weight: bold;
        }
        
        .hud-item {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 4px;
        }
        
        .instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            color: #aaa;
            font-size: 12px;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px;
            border-radius: 4px;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="startScreen">
            <div class="screen-title">PENALTY KICK</div>
            <div class="screen-subtitle">クリックしたい方向に蹴る！<br>GKのダイブを読め</div>
            <button onclick="startGame()">START</button>
        </div>
        
        <div id="clearScreen">
            <div class="screen-title">CLEAR!</div>
            <div class="screen-content" id="clearMessage"></div>
            <button onclick="retryGame()">RETRY</button>
        </div>
        
        <div id="gameOverScreen">
            <div class="screen-title">GAME OVER</div>
            <div class="screen-content" id="gameOverMessage"></div>
            <button onclick="retryGame()">RETRY</button>
        </div>
        
        <div class="hud">
            <div class="hud-item">Goals: <span id="goalsCount">0</span>/<span id="goalsTarget">5</span></div>
            <div class="hud-item">Shots: <span id="shotsCount">0</span>/<span id="totalShots">10</span></div>
        </div>
        
        <div class="instructions">Click where you want to shoot! Read the GK's dive!</div>
    </div>

    <script>
        const config = {
            title: 'PENALTY KICK',
            bg_color: '#1a3a1a',
            field_color: '#2d6a2d',
            goal_color: '#ffffff',
            ball_color: '#ffffff',
            gk_color: '#ff6b6b',
            win_goals: 5,
            total_shots: 10
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('gameContainer');

        canvas.width = 400;
        canvas.height = 600;
        gameContainer.style.width = canvas.width + 'px';

        const gameState = {
            running: false,
            goals: 0,
            shots: 0,
            ballX: 200,
            ballY: 550,
            ballStartX: 200,
            ballStartY: 550,
            ballTargetX: 200,
            ballTargetY: 550,
            ballProgress: 1,
            ballTravelDuration: 0.7,
            gkX: 170,
            gkY: 80,
            gkStartX: 170,
            gkStartY: 80,
            gkTargetX: 170,
            gkTargetY: 80,
            gkProgress: 1,
            gkTravelDuration: 0.5,
            gkWidth: 60,
            gkHeight: 60,
            goalLeft: 80,
            goalRight: 320,
            goalTop: 40,
            goalBottom: 140,
            goalWidth: 240,
            goalHeight: 100
        };

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState.running = true;
            gameState.goals = 0;
            gameState.shots = 0;
            updateHUD();
            gameLoop();
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }

        function updateHUD() {
            document.getElementById('goalsCount').textContent = gameState.goals;
            document.getElementById('goalsTarget').textContent = config.win_goals;
            document.getElementById('shotsCount').textContent = gameState.shots;
            document.getElementById('totalShots').textContent = config.total_shots;
        }

        function shootBall(targetX, targetY) {
            gameState.ballStartX = gameState.ballX;
            gameState.ballStartY = gameState.ballY;
            gameState.ballTargetX = targetX;
            gameState.ballTargetY = targetY;
            gameState.ballProgress = 0;

            const direction = Math.random() > 0.5 ? 1 : -1;
            gameState.gkStartX = gameState.gkX;
            gameState.gkStartY = gameState.gkY;
            gameState.gkTargetX = gameState.gkX + direction * 80;
            gameState.gkTargetY = gameState.gkY;
            gameState.gkProgress = 0;
        }

        function judgeGoal() {
            const ballX = gameState.ballX;
            const ballY = gameState.ballY;
            const ballRadius = 8;

            const isInGoalArea = (
                ballX - ballRadius >= gameState.goalLeft &&
                ballX + ballRadius <= gameState.goalRight &&
                ballY - ballRadius >= gameState.goalTop &&
                ballY + ballRadius <= gameState.goalBottom
            );

            const gkRect = {
                x: gameState.gkX,
                y: gameState.gkY,
                width: gameState.gkWidth,
                height: gameState.gkHeight
            };

            const isHitGK = (
                ballX - ballRadius < gkRect.x + gkRect.width &&
                ballX + ballRadius > gkRect.x &&
                ballY - ballRadius < gkRect.y + gkRect.height &&
                ballY + ballRadius > gkRect.y
            );

            if (isInGoalArea && !isHitGK) {
                gameState.goals++;
                updateHUD();
            }

            gameState.shots++;
            updateHUD();

            if (gameState.shots >= config.total_shots) {
                endGame();
            }
        }

        function endGame() {
            gameState.running = false;

            if (gameState.goals >= config.win_goals) {
                document.getElementById('clearMessage').textContent = 
                    'Goals: ' + gameState.goals + '/' + config.win_goals;
                document.getElementById('clearScreen').style.display = 'flex';
            } else {
                document.getElementById('gameOverMessage').textContent = 
                    'Goals: ' + gameState.goals + '/' + config.win_goals;
                document.getElementById('gameOverScreen').style.display = 'flex';
            }
        }

        function gameLoop() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = config.field_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = config.goal_color;
            ctx.lineWidth = 2;
            ctx.strokeRect(gameState.goalLeft, gameState.goalTop, gameState.goalWidth, gameState.goalHeight);

            if (gameState.ballProgress < 1) {
                gameState.ballProgress += 1 / 60 / gameState.ballTravelDuration;

                if (gameState.ballProgress > 1) {
                    gameState.ballProgress = 1;
                }

                const t = gameState.ballProgress;
                gameState.ballX = gameState.ballStartX + (gameState.ballTargetX - gameState.ballStartX) * t;
                gameState.ballY = gameState.ballStartY + (gameState.ballTargetY - gameState.ballStartY) * t 
                    - Math.sin(t * Math.PI) * 80;

                if (gameState.ballProgress === 1) {
                    judgeGoal();
                }
            } else {
                gameState.ballX = 200;
                gameState.ballY = 550;
            }

            if (gameState.gkProgress < 1) {
                gameState.gkProgress += 1 / 60 / gameState.gkTravelDuration;
                if (gameState.gkProgress > 1) {
                    gameState.gkProgress = 1;
                }

                const t = gameState.gkProgress;
                gameState.gkX = gameState.gkStartX + (gameState.gkTargetX - gameState.gkStartX) * t;
                gameState.gkY = gameState.gkStartY + (gameState.gkTargetY - gameState.gkStartY) * t;
            }

            ctx.fillStyle = config.gk_color;
            ctx.fillRect(gameState.gkX - gameState.gkWidth / 2, gameState.gkY, gameState.gkWidth, gameState.gkHeight);

            ctx.fillStyle = config.ball_color;
            ctx.beginPath();
            ctx.arc(gameState.ballX, gameState.ballY, 8, 0, Math.PI * 2);
            ctx.fill();

            if (gameState.running) {
                requestAnimationFrame(gameLoop);
            }
        }

        canvas.addEventListener('click', function(event) {
            if (!gameState.running) return;

            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            shootBall(x, y);
        });

        document.getElementById('goalsTarget').textContent = config.win_goals;
        document.getElementById('totalShots').textContent = config.total_shots;
    </script>
</body>
</html>
