<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>変異迷宮</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            border: 3px solid #0f0;
            background: #0a0a1a;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000;
        canvas.height = 700;
        
        const game = {
            floor: 1,
            hp: 100,
            relics: 0,
            score: 0,
            state: 'playing',
            enemies: [],
            particles: [],
            player: { x: 500, y: 620, r: 20 },
            flash: 0,
            evolve_flash: 0,
            time: 0,
            kills: 0
        };
        
        function spawn_enemies() {
            game.enemies = [];
            const count = 2 + Math.floor(game.floor / 2);
            for (let i = 0; i < count; i++) {
                game.enemies.push({
                    x: 100 + Math.random() * (canvas.width - 200),
                    y: 50 + Math.random() * 300,
                    r: 15 + game.floor * 1.5,
                    hp: 1 + game.floor,
                    max_hp: 1 + game.floor,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    atk_timer: 0
                });
            }
        }
        
        function get_evolution() {
            return Math.min(Math.floor(game.relics / 2), 8);
        }
        
        function draw_player() {
            const evo = get_evolution();
            const x = game.player.x, y = game.player.y;
            let r = 20 + evo * 4;
            
            const hue = 120 + evo * 12;
            const sat = 100 - evo * 5;
            const light = 45 + evo * 4;
            
            ctx.fillStyle = `hsl(${hue}, ${sat}%, ${light}%)`;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            
            if (evo >= 1) {
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(x - r * 0.35, y - r * 0.3, r * 0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + r * 0.35, y - r * 0.3, r * 0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(x - r * 0.35, y - r * 0.3, r * 0.1, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + r * 0.35, y - r * 0.3, r * 0.1, 0, Math.PI * 2);
                ctx.fill();
            }
            
            if (evo >= 2) {
                ctx.strokeStyle = `hsl(${hue}, ${sat}%, ${light + 15}%)`;
                ctx.lineWidth = 2;
                for (let i = 0; i < 8; i++) {
                    const a = i * Math.PI / 4;
                    const x1 = x + Math.cos(a) * r;
                    const y1 = y + Math.sin(a) * r;
                    const x2 = x + Math.cos(a) * (r + 12);
                    const y2 = y + Math.sin(a) * (r + 12);
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
            }
            
            if (evo >= 3) {
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(x, y + r * 0.35, r * 0.3, 0, Math.PI);
                ctx.stroke();
            }
            
            if (evo >= 4) {
                ctx.strokeStyle = `hsla(${hue}, ${sat}%, 60%, 0.5)`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(x, y, r + 10, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            if (evo >= 5) {
                ctx.fillStyle = `hsl(${hue}, ${sat}%, 60%)`;
                for (let i = -1; i <= 1; i += 2) {
                    ctx.beginPath();
                    ctx.arc(x + i * r * 0.5, y - r * 0.5, r * 0.15, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            if (evo >= 6) {
                ctx.fillStyle = `hsla(${hue}, ${sat}%, 70%, 0.3)`;
                ctx.beginPath();
                ctx.ellipse(x, y, r * 1.5, r * 0.8, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            
            if (evo >= 7) {
                for (let i = 0; i < 12; i++) {
                    const a = i * Math.PI / 6;
                    const off = 8 + Math.sin(game.time * 0.1 + i) * 2;
                    ctx.fillStyle = `hsla(${hue}, ${sat}%, 70%, 0.4)`;
                    ctx.beginPath();
                    ctx.arc(x + Math.cos(a) * (r + off), y + Math.sin(a) * (r + off), 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            if (evo >= 8) {
                ctx.strokeStyle = `hsla(${hue}, 100%, 50%, 0.6)`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(x, y, r + 15, 0, Math.PI * 2);
                ctx.stroke();
            }
        }
        
        function draw_enemy(e) {
            const h = e.hp / e.max_hp;
            ctx.fillStyle = `hsl(${game.floor * 25 % 360}, 80%, 50%)`;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = `hsl(${h * 120}, 100%, 50%)`;
            ctx.fillRect(e.x - e.r, e.y - e.r - 12, e.r * 2 * h, 5);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(e.x - e.r, e.y - e.r - 12, e.r * 2, 5);
        }
        
        function update() {
            if (game.state !== 'playing') return;
            
            game.time++;
            game.flash = Math.max(0, game.flash - 0.05);
            game.evolve_flash = Math.max(0, game.evolve_flash - 0.08);
            
            for (let e of game.enemies) {
                e.x += e.vx;
                e.y += e.vy;
                if (e.x - e.r < 0 || e.x + e.r > canvas.width) e.vx *= -1;
                if (e.y - e.r < 0 || e.y + e.r > canvas.height - 180) e.vy *= -1;
                e.x = Math.max(e.r, Math.min(canvas.width - e.r, e.x));
                e.y = Math.max(e.r, Math.min(canvas.height - 180, e.y));
                
                e.atk_timer++;
                if (e.atk_timer > 120 && Math.hypot(e.x - game.player.x, e.y - game.player.y) < e.r + game.player.r + 60) {
                    game.hp -= 8;
                    game.flash = 0.6;
                    e.atk_timer = 0;
                    for (let i = 0; i < 10; i++) {
                        const a = Math.random() * Math.PI * 2;
                        game.particles.push({
                            x: e.x, y: e.y,
                            vx: Math.cos(a) * 3, vy: Math.sin(a) * 3,
                            size: 4, life: 1, color: '#ff6666'
                        });
                    }
                }
            }
            
            game.particles = game.particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.02;
                return p.life > 0;
            });
            
            if (game.hp <= 0) game.state = 'lose';
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const bhue = game.floor * 22;
            ctx.fillStyle = `hsl(${bhue % 360}, 30%, 15%)`;
            ctx.fillRect(0, 0, canvas.width, canvas.height - 180);
            
            if (game.flash > 0) {
                ctx.fillStyle = `rgba(255, 100, 100, ${game.flash * 0.25})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            if (game.evolve_flash > 0) {
                ctx.fillStyle = `rgba(200, 255, 100, ${game.evolve_flash * 0.35})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            for (let e of game.enemies) draw_enemy(e);
            draw_player();
            
            for (let p of game.particles) {
                ctx.fillStyle = `rgba(255, 150, 100, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(0, canvas.height - 180, canvas.width, 180);
            
            ctx.fillStyle = '#0f0';
            ctx.font = 'bold 20px Arial';
            ctx.fillText(`Floor: ${game.floor}/10`, 20, canvas.height - 130);
            ctx.fillText(`HP: ${Math.max(0, game.hp)}/100`, 20, canvas.height - 90);
            ctx.fillText(`Relics: ${game.relics}`, 20, canvas.height - 50);
            ctx.fillText(`Score: ${game.score}`, 280, canvas.height - 130);
            ctx.fillText(`Evolution: Lv${get_evolution()}`, 280, canvas.height - 90);
            ctx.fillText(`Enemies: ${game.enemies.length}`, 550, canvas.height - 130);
            ctx.fillText(`Kills: ${game.kills}`, 550, canvas.height - 90);
            
            if (game.floor === 1 && game.kills === 0) {
                ctx.fillStyle = '#ffff00';
                ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('敵をクリック→倒す→進化! Floor10で迷宮クリア!', canvas.width / 2, canvas.height - 20);
                ctx.textAlign = 'left';
            }
        }
        
        function click_enemy(mx, my) {
            for (let i = game.enemies.length - 1; i >= 0; i--) {
                const e = game.enemies[i];
                if (Math.hypot(mx - e.x, my - e.y) < e.r) {
                    e.hp--;
                    game.score += 1;
                    if (e.hp <= 0) {
                        game.enemies.splice(i, 1);
                        game.relics++;
                        game.kills++;
                        game.score += 15;
                        game.evolve_flash = 1;
                        for (let j = 0; j < 25; j++) {
                            const a = Math.random() * Math.PI * 2;
                            game.particles.push({
                                x: e.x, y: e.y,
                                vx: Math.cos(a) * 4, vy: Math.sin(a) * 4,
                                size: Math.random() * 3 + 2, life: 1, color: '#ffff00'
                            });
                        }
                        if (game.enemies.length === 0) {
                            game.floor++;
                            if (game.floor > 10) {
                                game.state = 'win';
                            } else {
                                spawn_enemies();
                            }
                        }
                    }
                    return;
                }
            }
        }
        
        function draw_win() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < 150; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const s = Math.random() * 60 + 15;
                ctx.fillStyle = `hsla(${Math.random() * 60 + 40}, 100%, 50%, ${Math.random() * 0.6 + 0.2})`;
                ctx.beginPath();
                ctx.arc(x, y, s, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 80px Arial';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 40;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            ctx.fillText('迷宮 解放！', canvas.width / 2, canvas.height / 2 - 100);
            
            ctx.shadowColor = 'transparent';
            ctx.font = 'bold 36px Arial';
            ctx.fillStyle = '#00ff00';
            ctx.fillText(`最終進化: Lv${get_evolution()}`, canvas.width / 2, canvas.height / 2);
            ctx.fillText(`スコア: ${game.score}`, canvas.width / 2, canvas.height / 2 + 60);
            ctx.fillText(`倒した敵: ${game.kills}`, canvas.width / 2, canvas.height / 2 + 120);
            
            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = '#88ffff';
            ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height - 50);
            ctx.textAlign = 'left';
        }
        
        function draw_lose() {
            ctx.fillStyle = 'rgba(20, 0, 0, 0.9)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold 80px Arial';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 50;
            ctx.fillText('迷宮に呑まれた', canvas.width / 2, canvas.height / 2 - 100);
            
            ctx.shadowColor = 'transparent';
            ctx.font = 'bold 32px Arial';
            ctx.fillStyle = '#ffff00';
            ctx.fillText(`到達Floor: ${game.floor}`, canvas.width / 2, canvas.height / 2);
            ctx.fillText(`進化Lv: ${get_evolution()}`, canvas.width / 2, canvas.height / 2 + 60);
            ctx.fillText(`スコア: ${game.score}`, canvas.width / 2, canvas.height / 2 + 120);
            
            ctx.font = '20px Arial';
            ctx.fillStyle = '#88ffff';
            ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height - 50);
            ctx.textAlign = 'left';
        }
        
        canvas.addEventListener('click', (e) => {
            const r = canvas.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            if (game.state === 'playing') {
                click_enemy(mx, my);
            } else {
                game.floor = 1;
                game.hp = 100;
                game.relics = 0;
                game.score = 0;
                game.state = 'playing';
                game.enemies = [];
                game.particles = [];
                game.time = 0;
                game.kills = 0;
                spawn_enemies();
            }
        });
        
        canvas.addEventListener('mousedown', (e) => {
            const r = canvas.getBoundingClientRect();
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const r = canvas.getBoundingClientRect();
        });
        
        function loop() {
            update();
            draw();
            if (game.state === 'win') draw_win();
            if (game.state === 'lose') draw_lose();
            requestAnimationFrame(loop);
        }
        
        spawn_enemies();
        loop();
    </script>
</body>
</html>
