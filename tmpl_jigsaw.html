<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIGSAW</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a202c;
        }

        #gameContainer {
            position: relative;
            width: 640px;
            height: 480px;
            background-color: #2d3748;
            border: 3px solid #4a5568;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        #gameCanvas {
            display: block;
            background-color: #2d3748;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 101;
        }

        .screen-content {
            text-align: center;
            color: white;
        }

        .screen-content h1 {
            font-size: 4em;
            margin-bottom: 20px;
            color: #63b3ed;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .screen-content p {
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #cbd5e0;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            background-color: #63b3ed;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            background-color: #4299e1;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(99, 179, 237, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        #progress {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #63b3ed;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 0.9em;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="640" height="480"></canvas>
        <div id="progress">0/16</div>
        <div id="startScreen">
            <div class="screen-content">
                <h1>JIGSAW</h1>
                <p>Drag and drop puzzle pieces to their correct positions</p>
                <button onclick="startGame()">START</button>
            </div>
        </div>
        <div id="clearScreen">
            <div class="screen-content">
                <h1>CLEAR!</h1>
                <p>Congratulations! You completed the puzzle!</p>
                <button onclick="retryGame()">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        // {{GAME_CONFIG}}
        const config = {
            title: 'JIGSAW',
            bg_color: '#2d3748',
            piece_border: '#ffffff',
            snap_distance: 20,
            grid_cols: 4,
            grid_rows: 4
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const gameState = {
            running: false,
            pieces: [],
            selectedPiece: null,
            offsetX: 0,
            offsetY: 0,
            isSnapped: []
        };

        const pieceWidth = canvas.width / config.grid_cols;
        const pieceHeight = canvas.height / config.grid_rows;

        function generateGeometricPattern() {
            const offscreenCanvas = document.createElement('canvas');
            offscreenCanvas.width = canvas.width;
            offscreenCanvas.height = canvas.height;
            const offCtx = offscreenCanvas.getContext('2d');

            offCtx.fillStyle = '#e2e8f0';
            offCtx.fillRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);

            for (let i = 0; i < config.grid_rows; i++) {
                for (let j = 0; j < config.grid_cols; j++) {
                    const x = j * pieceWidth;
                    const y = i * pieceHeight;
                    const hue = (i * config.grid_cols + j) * 22.5;
                    
                    offCtx.fillStyle = `hsl(${hue}, 70%, 60%)`;
                    offCtx.fillRect(x, y, pieceWidth, pieceHeight);

                    offCtx.strokeStyle = '#2d3748';
                    offCtx.lineWidth = 2;
                    offCtx.strokeRect(x, y, pieceWidth, pieceHeight);

                    const cx = x + pieceWidth / 2;
                    const cy = y + pieceHeight / 2;
                    offCtx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    offCtx.beginPath();
                    offCtx.arc(cx, cy, pieceWidth / 3, 0, Math.PI * 2);
                    offCtx.fill();
                }
            }

            return offscreenCanvas;
        }

        function createPieces() {
            gameState.pieces = [];
            gameState.isSnapped = [];
            const patternCanvas = generateGeometricPattern();

            for (let row = 0; row < config.grid_rows; row++) {
                for (let col = 0; col < config.grid_cols; col++) {
                    const sourceX = col * pieceWidth;
                    const sourceY = row * pieceHeight;
                    const correctX = sourceX;
                    const correctY = sourceY;

                    let randomX, randomY;
                    do {
                        randomX = Math.random() * (canvas.width - pieceWidth);
                        randomY = Math.random() * (canvas.height - pieceHeight);
                    } while (Math.abs(randomX - correctX) < 100 && Math.abs(randomY - correctY) < 100);

                    const piece = {
                        id: row * config.grid_cols + col,
                        x: randomX,
                        y: randomY,
                        correctX: correctX,
                        correctY: correctY,
                        width: pieceWidth,
                        height: pieceHeight,
                        sourceX: sourceX,
                        sourceY: sourceY,
                        patternCanvas: patternCanvas,
                        snapped: false
                    };

                    gameState.pieces.push(piece);
                    gameState.isSnapped.push(false);
                }
            }
        }

        function drawPiece(piece) {
            ctx.save();
            ctx.strokeStyle = config.piece_border;
            ctx.lineWidth = 2;
            
            ctx.drawImage(
                piece.patternCanvas,
                piece.sourceX, piece.sourceY, piece.width, piece.height,
                piece.x, piece.y, piece.width, piece.height
            );

            ctx.strokeRect(piece.x, piece.y, piece.width, piece.height);
            
            if (piece.snapped) {
                ctx.fillStyle = 'rgba(76, 175, 80, 0.2)';
                ctx.fillRect(piece.x, piece.y, piece.width, piece.height);
            }

            ctx.restore();
        }

        function drawGame() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            gameState.pieces.forEach(piece => {
                drawPiece(piece);
            });
        }

        function getPieceAt(x, y) {
            for (let i = gameState.pieces.length - 1; i >= 0; i--) {
                const piece = gameState.pieces[i];
                if (x >= piece.x && x <= piece.x + piece.width &&
                    y >= piece.y && y <= piece.y + piece.height) {
                    return i;
                }
            }
            return null;
        }

        function checkSnap(piece) {
            const dx = Math.abs(piece.x - piece.correctX);
            const dy = Math.abs(piece.y - piece.correctY);

            if (dx < config.snap_distance && dy < config.snap_distance) {
                piece.x = piece.correctX;
                piece.y = piece.correctY;
                piece.snapped = true;
                gameState.isSnapped[piece.id] = true;
                return true;
            }
            return false;
        }

        function updateProgress() {
            const snappedCount = gameState.isSnapped.filter(s => s).length;
            document.getElementById('progress').textContent = snappedCount + '/' + (config.grid_cols * config.grid_rows);
        }

        function checkClear() {
            return gameState.isSnapped.every(s => s);
        }

        function showClearScreen() {
            gameState.running = false;
            document.getElementById('clearScreen').style.display = 'flex';
        }

        function startGame() {
            gameState.running = true;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('progress').style.display = 'block';
            
            createPieces();
            updateProgress();
            animate();
        }

        function retryGame() {
            document.getElementById('startScreen').style.display = 'flex';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('progress').style.display = 'none';
            gameState.running = false;
        }

        function animate() {
            drawGame();
            if (gameState.running) {
                requestAnimationFrame(animate);
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            if (!gameState.running) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const pieceIndex = getPieceAt(x, y);
            if (pieceIndex !== null) {
                gameState.selectedPiece = pieceIndex;
                const piece = gameState.pieces[pieceIndex];
                gameState.offsetX = x - piece.x;
                gameState.offsetY = y - piece.y;

                gameState.pieces.push(gameState.pieces.splice(pieceIndex, 1)[0]);
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!gameState.running || gameState.selectedPiece === null) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const piece = gameState.pieces[gameState.pieces.length - 1];
            piece.x = x - gameState.offsetX;
            piece.y = y - gameState.offsetY;

            piece.x = Math.max(0, Math.min(piece.x, canvas.width - piece.width));
            piece.y = Math.max(0, Math.min(piece.y, canvas.height - piece.height));
        });

        canvas.addEventListener('mouseup', () => {
            if (!gameState.running || gameState.selectedPiece === null) return;

            const piece = gameState.pieces[gameState.pieces.length - 1];
            checkSnap(piece);
            updateProgress();

            if (checkClear()) {
                showClearScreen();
            }

            gameState.selectedPiece = null;
        });

        document.getElementById('startScreen').style.display = 'flex';
    </script>
</body>
</html>
