<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIGSAW</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a202c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            position: relative;
            width: 840px;
            height: 480px;
            background-color: #2d3748;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        canvas {
            display: block;
            background-color: #2d3748;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .start-content {
            text-align: center;
            color: white;
        }

        .start-content h1 {
            font-size: 48px;
            margin-bottom: 30px;
            color: #4299e1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .instructions {
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.8;
            color: #cbd5e0;
        }

        .start-btn, .again-btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(66, 153, 225, 0.4);
        }

        .start-btn:hover, .again-btn:hover {
            background: linear-gradient(135deg, #3182ce, #2c5282);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(66, 153, 225, 0.6);
        }

        .start-btn:active, .again-btn:active {
            transform: translateY(0);
        }

        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .clear-content {
            text-align: center;
            color: white;
        }

        .clear-content h2 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #48bb78;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .clear-content p {
            font-size: 18px;
            margin-bottom: 40px;
            color: #cbd5e0;
        }

        #progressBar {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 14px;
            color: #4299e1;
            font-weight: bold;
            z-index: 50;
        }

        .progress-text {
            color: #a0aec0;
        }

        .preview-container {
            position: absolute;
            top: 10px;
            left: 650px;
            width: 180px;
            height: 180px;
            border: 2px solid #4299e1;
            border-radius: 4px;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 5px;
            z-index: 30;
        }

        .preview-title {
            color: #4299e1;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 3px;
            text-align: center;
        }

        #previewCanvas {
            border: 1px solid #2d3748;
            border-radius: 2px;
            background-color: #1a202c;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="gameCanvas" width="640" height="480"></canvas>
        <div id="progressBar">
            <span id="progress">0</span><span class="progress-text">/16</span>
        </div>
        <div class="preview-container">
            <div class="preview-title">正解位置</div>
            <canvas id="previewCanvas" width="170" height="160"></canvas>
        </div>

        <div id="startScreen">
            <div class="start-content">
                <h1>JIGSAW</h1>
                <div class="instructions">
                    <p>4×4 のピースをドラッグして</p>
                    <p>正しい位置に置いてください</p>
                    <br>
                    <p style="font-size: 14px;">右の枠が正解位置のヒントです</p>
                </div>
                <button class="start-btn">START</button>
            </div>
        </div>

        <div id="clearScreen">
            <div class="clear-content">
                <h2>🎉 CLEAR! 🎉</h2>
                <p>全てのピースを正しく配置しました！</p>
                <button class="again-btn">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        // {{GAME_CONFIG}}
        const config = {
            title: 'JIGSAW',
            bg_color: '#2d3748',
            piece_border: '#ffffff',
            snap_distance: 40,
            grid_cols: 4,
            grid_rows: 4
        };

        // Game State
        const gameState = {
            running: false,
            pieces: [],
            snappedPieces: new Set(),
            draggedPiece: null,
            dragOffsetX: 0,
            dragOffsetY: 0,
            image: null,
            pieceSize: 0
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const previewCanvas = document.getElementById('previewCanvas');
        const previewCtx = previewCanvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const clearScreen = document.getElementById('clearScreen');
        const progressDisplay = document.getElementById('progress');
        const startBtn = document.querySelector('.start-btn');
        const againBtn = document.querySelector('.again-btn');

        // Generate colorful geometric pattern image
        function generateImage() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = config.grid_cols * 100;
            tempCanvas.height = config.grid_rows * 100;
            const tempCtx = tempCanvas.getContext('2d');

            // Draw colorful grid pattern
            const colors = [
                '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A',
                '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2',
                '#F8B88B', '#AED6F1', '#F5B7B1', '#D5F4E6',
                '#FADBD8', '#D7BDE2', '#A9DFBF', '#FCF3CF'
            ];

            for (let row = 0; row < config.grid_rows; row++) {
                for (let col = 0; col < config.grid_cols; col++) {
                    const colorIdx = row * config.grid_cols + col;
                    tempCtx.fillStyle = colors[colorIdx];
                    tempCtx.fillRect(col * 100, row * 100, 100, 100);

                    // Add geometric patterns
                    tempCtx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
                    tempCtx.lineWidth = 2;
                    tempCtx.strokeRect(col * 100, row * 100, 100, 100);

                    // Add circles
                    tempCtx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                    tempCtx.beginPath();
                    tempCtx.arc(col * 100 + 50, row * 100 + 50, 25, 0, Math.PI * 2);
                    tempCtx.fill();
                }
            }

            const img = new Image();
            img.src = tempCanvas.toDataURL();
            return img;
        }

        // Initialize pieces
        function initializePieces() {
            gameState.pieces = [];
            gameState.snappedPieces.clear();
            gameState.draggedPiece = null;

            const pieceWidth = 640 / config.grid_cols;
            const pieceHeight = 480 / config.grid_rows;
            gameState.pieceSize = Math.min(pieceWidth, pieceHeight);

            for (let row = 0; row < config.grid_rows; row++) {
                for (let col = 0; col < config.grid_cols; col++) {
                    const piece = {
                        id: row * config.grid_cols + col,
                        correctCol: col,
                        correctRow: row,
                        x: Math.random() * 400 + 50,
                        y: Math.random() * 300 + 50,
                        width: 100,
                        height: 100,
                        srcX: col * 100,
                        srcY: row * 100,
                        snapped: false
                    };
                    gameState.pieces.push(piece);
                }
            }
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid guides for correct positions (left area)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let col = 0; col <= config.grid_cols; col++) {
                ctx.beginPath();
                ctx.moveTo(col * 100, 0);
                ctx.lineTo(col * 100, 480);
                ctx.stroke();
            }
            for (let row = 0; row <= config.grid_rows; row++) {
                ctx.beginPath();
                ctx.moveTo(0, row * 120);
                ctx.lineTo(640, row * 120);
                ctx.stroke();
            }

            // Draw pieces
            gameState.pieces.forEach(piece => {
                if (gameState.image) {
                    ctx.drawImage(
                        gameState.image,
                        piece.srcX,
                        piece.srcY,
                        piece.width,
                        piece.height,
                        piece.x,
                        piece.y,
                        piece.width,
                        piece.height
                    );
                }

                // Draw border
                ctx.strokeStyle = piece.snapped ? '#48bb78' : config.piece_border;
                ctx.lineWidth = piece.snapped ? 3 : 2;
                ctx.strokeRect(piece.x, piece.y, piece.width, piece.height);
            });
        }

        // Draw preview
        function drawPreview() {
            previewCtx.fillStyle = '#1a202c';
            previewCtx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);

            const cellWidth = previewCanvas.width / config.grid_cols;
            const cellHeight = previewCanvas.height / config.grid_rows;

            // Draw grid
            previewCtx.strokeStyle = 'rgba(66, 153, 225, 0.3)';
            previewCtx.lineWidth = 1;
            for (let col = 0; col <= config.grid_cols; col++) {
                previewCtx.beginPath();
                previewCtx.moveTo(col * cellWidth, 0);
                previewCtx.lineTo(col * cellWidth, previewCanvas.height);
                previewCtx.stroke();
            }
            for (let row = 0; row <= config.grid_rows; row++) {
                previewCtx.beginPath();
                previewCtx.moveTo(0, row * cellHeight);
                previewCtx.lineTo(previewCanvas.width, row * cellHeight);
                previewCtx.stroke();
            }

            // Highlight snapped pieces
            gameState.pieces.forEach(piece => {
                if (piece.snapped) {
                    previewCtx.fillStyle = 'rgba(72, 187, 120, 0.4)';
                    previewCtx.fillRect(
                        piece.correctCol * cellWidth,
                        piece.correctRow * cellHeight,
                        cellWidth,
                        cellHeight
                    );
                }
            });
        }

        // Check snap
        function checkSnap(piece) {
            const correctX = piece.correctCol * 100;
            const correctY = piece.correctRow * 100;

            const dx = Math.abs(piece.x - correctX);
            const dy = Math.abs(piece.y - correctY);

            if (dx < config.snap_distance && dy < config.snap_distance) {
                piece.x = correctX;
                piece.y = correctY;
                piece.snapped = true;
                gameState.snappedPieces.add(piece.id);

                // Update progress
                progressDisplay.textContent = gameState.snappedPieces.size;

                // Check clear
                if (gameState.snappedPieces.size === config.grid_cols * config.grid_rows) {
                    gameState.running = false;
                    setTimeout(() => {
                        clearScreen.style.display = 'flex';
                    }, 300);
                }

                return true;
            }
            return false;
        }

        // Mouse events
        canvas.addEventListener('mousedown', (e) => {
            if (!gameState.running) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Find piece at click position (reverse order for top-most)
            for (let i = gameState.pieces.length - 1; i >= 0; i--) {
                const piece = gameState.pieces[i];
                if (piece.snapped) continue;

                if (x >= piece.x && x <= piece.x + piece.width &&
                    y >= piece.y && y <= piece.y + piece.height) {
                    gameState.draggedPiece = piece;
                    gameState.dragOffsetX = x - piece.x;
                    gameState.dragOffsetY = y - piece.y;
                    break;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!gameState.running || !gameState.draggedPiece) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            gameState.draggedPiece.x = x - gameState.dragOffsetX;
            gameState.draggedPiece.y = y - gameState.dragOffsetY;

            // Keep within bounds
            gameState.draggedPiece.x = Math.max(0, Math.min(gameState.draggedPiece.x, canvas.width - gameState.draggedPiece.width));
            gameState.draggedPiece.y = Math.max(0, Math.min(gameState.draggedPiece.y, canvas.height - gameState.draggedPiece.height));
        });

        canvas.addEventListener('mouseup', (e) => {
            if (gameState.draggedPiece) {
                checkSnap(gameState.draggedPiece);
                gameState.draggedPiece = null;
            }
        });

        // Start button
        startBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            gameState.running = true;
            gameState.image = generateImage();
            initializePieces();
            progressDisplay.textContent = '0';
            gameLoop();
        });

        // Again button
        againBtn.addEventListener('click', () => {
            clearScreen.style.display = 'none';
            startScreen.style.display = 'flex';
        });

        // Game loop
        function gameLoop() {
            draw();
            drawPreview();

            if (gameState.running) {
                requestAnimationFrame(gameLoop);
            }
        }

        // Initial draw
        ctx.fillStyle = config.bg_color;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#cbd5e0';
        ctx.font = '16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('START をクリック', canvas.width / 2, canvas.height / 2);
    </script>
</body>
</html>
