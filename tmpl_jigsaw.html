<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIGSAW</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a202c;
            font-family: Arial, sans-serif;
        }
        
        #gameContainer {
            position: relative;
            background-color: #2d3748;
            border: 4px solid #4299e1;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        #gameCanvas {
            display: block;
            background-color: #2d3748;
            cursor: grab;
        }
        
        #gameCanvas:active {
            cursor: grabbing;
        }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            z-index: 100;
        }
        
        #startScreen.hidden {
            display: none;
        }
        
        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            z-index: 100;
        }
        
        #clearScreen.hidden {
            display: none;
        }
        
        .screen-content {
            text-align: center;
            color: white;
        }
        
        .screen-content h1 {
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .screen-content p {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        
        #startBtn {
            background-color: #4299e1;
            color: white;
        }
        
        #startBtn:hover {
            background-color: #3182ce;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }
        
        #playAgainBtn {
            background-color: #2d3748;
            color: white;
        }
        
        #playAgainBtn:hover {
            background-color: #1a202c;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }
        
        #progressBar {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 16px;
            color: #4299e1;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 4px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="progressBar">0 / 16</div>
        
        <div id="startScreen">
            <div class="screen-content">
                <h1>JIGSAW</h1>
                <p>ジグソーパズルゲーム</p>
                <p style="font-size: 14px; margin-bottom: 30px; color: #cbd5e0;">
                    ピースをドラッグして正しい位置に置いてください<br>
                    右側に完成図が表示されます
                </p>
                <button id="startBtn" class="button">START</button>
            </div>
        </div>
        
        <div id="clearScreen" class="hidden">
            <div class="screen-content">
                <h1>CLEAR!</h1>
                <p>パズルが完成しました!</p>
                <button id="playAgainBtn" class="button">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        // {{GAME_CONFIG}}
        const config = {
            title: 'JIGSAW',
            bg_color: '#2d3748',
            piece_border: '#ffffff',
            snap_distance: 60,
            grid_cols: 4,
            grid_rows: 4
        };

        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 840;
        canvas.height = 480;

        // Game state
        const gameState = {
            running: false,
            pieces: [],
            selectedPiece: null,
            dragOffsetX: 0,
            dragOffsetY: 0,
            snappedCount: 0,
            imageData: null,
            pieceSize: 0,
            gridStartX: 0,
            gridStartY: 0
        };

        // Generate colorful pattern image
        function generateImage() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 400;
            tempCanvas.height = 400;
            const tempCtx = tempCanvas.getContext('2d');

            // Draw colorful geometric pattern
            for (let row = 0; row < config.grid_rows; row++) {
                for (let col = 0; col < config.grid_cols; col++) {
                    const x = col * 100;
                    const y = row * 100;
                    
                    // Generate color based on position
                    const hue = ((row * config.grid_cols + col) * 360 / 16) % 360;
                    tempCtx.fillStyle = `hsl(${hue}, 70%, 60%)`;
                    tempCtx.fillRect(x, y, 100, 100);
                    
                    // Add border
                    tempCtx.strokeStyle = '#ffffff';
                    tempCtx.lineWidth = 2;
                    tempCtx.strokeRect(x, y, 100, 100);
                    
                    // Add pattern inside
                    tempCtx.fillStyle = `hsl(${hue}, 70%, 40%)`;
                    tempCtx.beginPath();
                    tempCtx.arc(x + 50, y + 50, 20, 0, Math.PI * 2);
                    tempCtx.fill();
                }
            }

            return tempCanvas;
        }

        // Initialize pieces
        function initializePieces() {
            gameState.pieces = [];
            gameState.snappedCount = 0;
            
            const sourceImage = generateImage();
            gameState.imageData = sourceImage;
            gameState.pieceSize = 100;
            gameState.gridStartX = 620;
            gameState.gridStartY = 40;

            for (let row = 0; row < config.grid_rows; row++) {
                for (let col = 0; col < config.grid_cols; col++) {
                    const piece = {
                        id: row * config.grid_cols + col,
                        gridCol: col,
                        gridRow: row,
                        x: Math.random() * 500 + 20,
                        y: Math.random() * 300 + 80,
                        snapped: false,
                        sourceX: col * 100,
                        sourceY: row * 100,
                        width: 100,
                        height: 100
                    };
                    gameState.pieces.push(piece);
                }
            }

            updateProgressBar();
        }

        // Draw image onto canvas
        function drawPuzzle() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw work area background
            ctx.fillStyle = '#1a202c';
            ctx.fillRect(0, 0, 620, canvas.height);
            
            // Draw preview area background
            ctx.fillStyle = '#2d3748';
            ctx.fillRect(620, 0, 220, canvas.height);

            // Draw solution grid (right side)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            for (let row = 0; row < config.grid_rows; row++) {
                for (let col = 0; col < config.grid_cols; col++) {
                    const x = gameState.gridStartX + col * 25;
                    const y = gameState.gridStartY + row * 25;
                    ctx.strokeRect(x, y, 25, 25);
                }
            }

            // Draw small solution preview
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.strokeRect(gameState.gridStartX - 2, gameState.gridStartY - 2, 
                          config.grid_cols * 25 + 4, config.grid_rows * 25 + 4);

            // Draw pieces
            gameState.pieces.forEach(piece => {
                if (gameState.imageData) {
                    ctx.drawImage(gameState.imageData, 
                                 piece.sourceX, piece.sourceY, 
                                 piece.width, piece.height, 
                                 piece.x, piece.y, 
                                 piece.width, piece.height);
                }

                // Draw border
                if (piece.snapped) {
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 3;
                } else {
                    ctx.strokeStyle = config.piece_border;
                    ctx.lineWidth = 2;
                }
                ctx.strokeRect(piece.x, piece.y, piece.width, piece.height);

                // Draw piece number for debugging
                if (!piece.snapped) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(piece.x, piece.y, 30, 30);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(piece.id, piece.x + 15, piece.y + 15);
                }
            });
        }

        // Check snap
        function checkSnap(piece) {
            if (piece.snapped) return;

            const targetX = gameState.gridStartX + piece.gridCol * 100;
            const targetY = gameState.gridStartY + piece.gridRow * 100;

            const dx = piece.x - targetX;
            const dy = piece.y - targetY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < config.snap_distance) {
                piece.x = targetX;
                piece.y = targetY;
                piece.snapped = true;
                gameState.snappedCount++;
                updateProgressBar();

                if (gameState.snappedCount === config.grid_cols * config.grid_rows) {
                    endGame();
                }
            }
        }

        // Update progress bar
        function updateProgressBar() {
            document.getElementById('progressBar').textContent = 
                gameState.snappedCount + ' / ' + (config.grid_cols * config.grid_rows);
        }

        // Mouse events
        canvas.addEventListener('mousedown', (e) => {
            if (!gameState.running) return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Check if clicking on a piece (reverse order for top-most)
            for (let i = gameState.pieces.length - 1; i >= 0; i--) {
                const piece = gameState.pieces[i];
                if (piece.snapped) continue;

                if (mouseX >= piece.x && mouseX <= piece.x + piece.width &&
                    mouseY >= piece.y && mouseY <= piece.y + piece.height) {
                    gameState.selectedPiece = piece;
                    gameState.dragOffsetX = mouseX - piece.x;
                    gameState.dragOffsetY = mouseY - piece.y;
                    break;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!gameState.running || !gameState.selectedPiece) return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            gameState.selectedPiece.x = mouseX - gameState.dragOffsetX;
            gameState.selectedPiece.y = mouseY - gameState.dragOffsetY;

            // Keep piece in bounds
            gameState.selectedPiece.x = Math.max(0, Math.min(gameState.selectedPiece.x, canvas.width - gameState.selectedPiece.width));
            gameState.selectedPiece.y = Math.max(0, Math.min(gameState.selectedPiece.y, canvas.height - gameState.selectedPiece.height));
        });

        canvas.addEventListener('mouseup', () => {
            if (gameState.selectedPiece) {
                checkSnap(gameState.selectedPiece);
                gameState.selectedPiece = null;
            }
        });

        // Game loop
        function gameLoop() {
            drawPuzzle();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('clearScreen').classList.add('hidden');
            gameState.running = true;
            initializePieces();
            gameLoop();
        }

        // End game
        function endGame() {
            gameState.running = false;
            document.getElementById('clearScreen').classList.remove('hidden');
        }

        // Reset game
        function resetGame() {
            startGame();
        }

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('playAgainBtn').addEventListener('click', resetGame);

        // Start with initial screen
        gameState.running = false;
    </script>
</body>
</html>
