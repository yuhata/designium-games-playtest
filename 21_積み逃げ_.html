<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>積み逃げ！</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 400px;
            height: 600px;
            background: #fff;
            border: 3px solid #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #000;
            font-weight: bold;
            z-index: 10;
            font-size: 13px;
            line-height: 1.6;
            background: rgba(255,255,255,0.85);
            padding: 8px;
            border-radius: 4px;
        }
        #instruction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            z-index: 100;
            font-size: 15px;
            line-height: 1.8;
            width: 320px;
        }
        #resultScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 200;
            text-align: center;
        }
        #resultText { font-size: 28px; margin-bottom: 20px; font-weight: bold; }
        .resultDetail { margin: 8px 0; font-size: 14px; }
        #whiteFlash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 150;
            pointer-events: none;
            opacity: 0;
        }
        #escapeIcon {
            position: absolute;
            z-index: 25;
            font-size: 40px;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="whiteFlash"></div>
        <div id="escapeIcon">🚀</div>
        <div id="ui">
            Height: <span id="heightDisplay">0</span><br>
            Lives: <span id="livesDisplay">∞</span><br>
            Score: <span id="scoreDisplay">0</span><br>
            Time: <span id="timeDisplay">0s</span>
        </div>
        <div id="instruction">
            <div style="font-size: 18px; margin-bottom: 15px;">積み逃げ！</div>
            <div>クリック/タップで</div>
            <div>ブロックを落とします</div>
            <div style="margin-top: 15px; font-size: 12px;">高さが50以上になったら</div>
            <div style="font-size: 12px; margin-bottom: 15px;">クリックで脱出！</div>
            <div style="margin-top: 15px; color: #4ade80; font-weight: bold;">クリックして開始</div>
        </div>
        <div id="resultScreen">
            <div id="resultText"></div>
            <div class="resultDetail">Height: <span id="resultHeight">0</span></div>
            <div class="resultDetail">Score: <span id="resultScore">0</span></div>
            <div class="resultDetail">High Score: <span id="resultHighScore">0</span></div>
            <div style="margin-top: 15px; font-size: 12px;">クリックでリプレイ</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const whiteFlash = document.getElementById('whiteFlash');
        const escapeIcon = document.getElementById('escapeIcon');

        canvas.width = 400;
        canvas.height = 600;

        let gameState = {
            height: 0,
            lives: Infinity,
            escaped: false,
            crushed: false,
            score: 0,
            startTime: 0,
            gameActive: false,
            blocks: [],
            mergeTracking: {},
            flashActive: false,
            escapeAnimStart: 0,
            timeLimit: 90
        };

        let tiltX = 0;
        const TILT_FACTOR = 2;
        const MERGE_TIME = 300;
        const GRAVITY = 0.25;

        function updateUI() {
            document.getElementById('heightDisplay').textContent = gameState.height;
            document.getElementById('livesDisplay').textContent = gameState.lives === Infinity ? '∞' : gameState.lives;
            document.getElementById('scoreDisplay').textContent = gameState.score;
            if (gameState.gameActive) {
                const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
                document.getElementById('timeDisplay').textContent = elapsed + 's';
                if (elapsed >= gameState.timeLimit) {
                    gameState.crushed = true;
                }
            }
        }

        function spawnBlock() {
            const size = Math.floor(Math.random() * 4) + 1;
            const x = Math.random() * Math.max(0, canvas.width - size * 2);
            const hue = Math.random() * 360;
            const block = {
                id: Math.random(),
                x: x,
                y: 0,
                vx: 0,
                vy: 0,
                size: size,
                color: `hsl(${hue}, 75%, 50%)`
            };
            gameState.blocks.push(block);
        }

        function checkMerges() {
            for (let i = 0; i < gameState.blocks.length; i++) {
                for (let j = i + 1; j < gameState.blocks.length; j++) {
                    const b1 = gameState.blocks[i];
                    const b2 = gameState.blocks[j];
                    if (b1.size !== b2.size) continue;
                    const dx = b1.x - b2.x;
                    const dy = b1.y - b2.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const threshold = b1.size * 40;
                    const key = [b1.id, b2.id].sort().join('-');
                    if (dist < threshold) {
                        if (!gameState.mergeTracking[key]) {
                            gameState.mergeTracking[key] = Date.now();
                        }
                        if (Date.now() - gameState.mergeTracking[key] >= MERGE_TIME) {
                            gameState.height++;
                            gameState.score += 10;
                            createParticles((b1.x + b2.x) / 2, (b1.y + b2.y) / 2);
                            gameState.blocks.splice(j, 1);
                            delete gameState.mergeTracking[key];
                            j--;
                            i = Math.max(0, i - 1);
                            break;
                        }
                    } else {
                        delete gameState.mergeTracking[key];
                    }
                }
            }
        }

        function checkCrushed() {
            let minY = Infinity;
            gameState.blocks.forEach(b => {
                if (b.y < minY) minY = b.y;
            });
            if (minY < -50) {
                gameState.crushed = true;
            }
        }

        let particles = [];
        function createParticles(x, y) {
            for (let i = 0; i < 6; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6 - 2,
                    life: 40,
                    maxLife: 40,
                    color: `hsl(${Math.random() * 60 + 45}, 100%, 60%)`
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15;
                p.life--;
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                const alpha = p.life / p.maxLife;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, alpha);
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }

        function startGame() {
            document.getElementById('instruction').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
            gameState = {
                height: 0,
                lives: Infinity,
                escaped: false,
                crushed: false,
                score: 0,
                startTime: Date.now(),
                gameActive: true,
                blocks: [],
                mergeTracking: {},
                flashActive: false,
                escapeAnimStart: 0,
                timeLimit: 90
            };
            particles = [];
            escapeIcon.style.opacity = '1';
            updateUI();
            gameLoop();
        }

        canvas.addEventListener('mousedown', (e) => {
            if (!gameState.gameActive) {
                startGame();
                return;
            }
            if (gameState.height < 50) {
                spawnBlock();
                createParticles(e.offsetX, e.offsetY);
            } else if (!gameState.escaped) {
                gameState.escaped = true;
                gameState.flashActive = true;
                gameState.escapeAnimStart = Date.now();
            }
        });

        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                const gamma = e.gamma || 0;
                tiltX = Math.max(-5, Math.min(5, gamma));
            });
        }

        function gameLoop() {
            if (!gameState.gameActive) return;

            gameState.blocks.forEach(block => {
                block.vy += GRAVITY;
                block.vx = tiltX * TILT_FACTOR;
                block.x += block.vx;
                block.y += block.vy;
                if (block.x < 0) block.x = 0;
                if (block.x + block.size * 20 > canvas.width) {
                    block.x = canvas.width - block.size * 20;
                }
                if (block.y + block.size * 20 >= canvas.height) {
                    block.y = canvas.height - block.size * 20;
                    block.vy = 0;
                }
                if (block.vy > 0) {
                    const bsize = block.size * 20;
                    for (let other of gameState.blocks) {
                        if (other === block || other.vy !== 0) continue;
                        const osize = other.size * 20;
                        if (block.x < other.x + osize && block.x + bsize > other.x) {
                            if (block.y + bsize >= other.y && block.y + bsize < other.y + osize * 1.5) {
                                block.y = other.y - bsize;
                                block.vy = 0;
                                break;
                            }
                        }
                    }
                }
            });

            updateParticles();
            checkMerges();
            checkCrushed();

            if (gameState.flashActive) {
                const elapsed = Date.now() - gameState.escapeAnimStart;
                if (elapsed < 100) {
                    whiteFlash.style.opacity = 1 - (elapsed / 100);
                } else {
                    whiteFlash.style.opacity = '0';
                    gameState.flashActive = false;
                }
                if (elapsed < 500) {
                    const progress = elapsed / 500;
                    const movement = progress * 300;
                    escapeIcon.style.display = 'block';
                    escapeIcon.style.left = (canvas.width / 2 - 20) + 'px';
                    escapeIcon.style.top = (canvas.height / 2 + 100 - movement) + 'px';
                    escapeIcon.style.opacity = 1 - progress;
                } else {
                    escapeIcon.style.display = 'none';
                }
            }

            if (gameState.height >= 50 && gameState.escaped) {
                if (Date.now() - gameState.escapeAnimStart > 500) {
                    endGame(true);
                    return;
                }
            }

            if (gameState.crushed) {
                endGame(false);
                return;
            }

            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const targetHeightY = canvas.height - (gameState.height * 5);
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, targetHeightY);
            ctx.lineTo(canvas.width, targetHeightY);
            ctx.stroke();

            if (gameState.height >= 50) {
                ctx.strokeStyle = '#4ade80';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, targetHeightY);
                ctx.lineTo(canvas.width, targetHeightY);
                ctx.stroke();
            }

            gameState.blocks.forEach(block => {
                ctx.fillStyle = block.color;
                ctx.fillRect(block.x, block.y, block.size * 20, block.size * 20);
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 1;
                ctx.strokeRect(block.x, block.y, block.size * 20, block.size * 20);
            });

            drawParticles();
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        function endGame(won) {
            gameState.gameActive = false;
            const highScore = parseInt(localStorage.getItem('tsuminige_highScore') || '0');
            const newHighScore = Math.max(gameState.score, highScore);
            localStorage.setItem('tsuminige_highScore', newHighScore);

            const resultScreen = document.getElementById('resultScreen');
            const resultText = document.getElementById('resultText');
            resultText.textContent = won ? '🎉 ESCAPED! 🎉' : '💥 CRUSHED 💥';
            resultText.style.color = won ? '#4ade80' : '#ef4444';
            document.getElementById('resultHeight').textContent = gameState.height;
            document.getElementById('resultScore').textContent = gameState.score;
            document.getElementById('resultHighScore').textContent = newHighScore;
            resultScreen.style.display = 'flex';
            escapeIcon.style.display = 'none';

            const handler = () => {
                resultScreen.removeEventListener('click', handler);
                startGame();
            };
            resultScreen.addEventListener('click', handler);
        }

        document.getElementById('instruction').addEventListener('click', startGame);
        updateUI();
    </script>
</body>
</html>
