<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FISHING</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #333;
      font-family: Arial, sans-serif;
    }
    .wrapper {
      position: relative;
      width: 400px;
      height: 600px;
      background: #fff;
      border: 2px solid #000;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    #startScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      color: #fff;
    }
    #startScreen h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    #startScreen p {
      font-size: 16px;
      margin-bottom: 30px;
      text-align: center;
    }
    #startBtn {
      padding: 12px 30px;
      font-size: 18px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
    }
    #startBtn:hover {
      background: #45a049;
    }
    #gameContainer {
      position: relative;
      display: block;
    }
    #canvas {
      display: block;
      background: #87ceeb;
    }
    .hud {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 14px;
      font-weight: bold;
      color: #333;
      z-index: 10;
    }
    .hud-caught {
      font-size: 18px;
      color: #f6ad55;
      margin-bottom: 5px;
    }
    .hud-status {
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
    }
    .hud-hint {
      font-size: 12px;
      color: #0066cc;
      font-style: italic;
    }
    #clearScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 101;
      color: #fff;
    }
    #clearScreen h1 {
      font-size: 52px;
      margin-bottom: 20px;
      color: #FFD700;
    }
    #clearScreen p {
      font-size: 18px;
      margin-bottom: 30px;
    }
    #retryBtn {
      padding: 12px 30px;
      font-size: 18px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
    }
    #retryBtn:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div id="startScreen">
      <h1>FISHING</h1>
      <p>5匹の魚を釣ってクリアだ！<br>スペースキーまたはクリックで投げて、<br>アタリが来たらすぐに連打だ！</p>
      <button id="startBtn">START</button>
    </div>
    <div id="gameContainer">
      <canvas id="canvas"></canvas>
      <div class="hud">
        <div class="hud-caught" id="hudCaught">0/5</div>
        <div class="hud-status" id="hudStatus">READY</div>
        <div class="hud-hint" id="hudHint">スペースキーで投げる</div>
      </div>
    </div>
    <div id="clearScreen">
      <h1>CLEAR!</h1>
      <p>5匹の魚を釣ることに成功した！</p>
      <button id="retryBtn">RETRY</button>
    </div>
  </div>

  <script>
    const config = {
      title: 'FISHING',
      bg_color: '#87ceeb',
      water_color: '#1a6a8a',
      fish_color: '#f6ad55',
      line_color: '#a0aec0',
      win_fish: 5,
      bite_min_wait: 2000,
      bite_max_wait: 5000,
      reel_power: 3
    };

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 400;
    canvas.height = 600;

    const gameState = {
      running: false,
      state: 'READY',
      caught: 0,
      castStartTime: 0,
      waitStartTime: 0,
      biteStartTime: 0,
      biteTime: 0,
      reelGauge: 30,
      lureY: 0,
      ukiY: 300,
      ukiBite: false,
      ukiShakeTimer: 0
    };

    let lastTime = Date.now();

    const hudCaught = document.getElementById('hudCaught');
    const hudStatus = document.getElementById('hudStatus');
    const hudHint = document.getElementById('hudHint');

    function updateHUD() {
      hudCaught.textContent = gameState.caught + '/' + config.win_fish;
      
      if (gameState.state === 'READY') {
        hudStatus.textContent = 'READY';
        hudHint.textContent = 'スペースキーで投げる';
      } else if (gameState.state === 'CAST') {
        hudStatus.textContent = 'CAST';
        hudHint.textContent = 'ルアーを投入中...';
      } else if (gameState.state === 'WAITING') {
        hudStatus.textContent = 'WAITING';
        hudHint.textContent = '魚が来るのを待つ...';
      } else if (gameState.state === 'BITE') {
        hudStatus.textContent = 'BITE!';
        hudHint.textContent = 'スペースキーで巻き取れ！';
      } else if (gameState.state === 'REEL') {
        hudStatus.textContent = 'REEL: ' + Math.round(gameState.reelGauge) + '%';
        hudHint.textContent = 'スペースキーを連打！';
      } else if (gameState.state === 'MISS') {
        hudStatus.textContent = 'MISS...';
        hudHint.textContent = 'もう一度チャレンジ';
      }
    }

    function gameLoop() {
      const now = Date.now();
      const deltaTime = now - lastTime;
      lastTime = now;

      ctx.fillStyle = config.bg_color;
      ctx.fillRect(0, 0, canvas.width, 300);
      ctx.fillStyle = config.water_color;
      ctx.fillRect(0, 300, canvas.width, 300);

      if (gameState.state === 'READY') {
        ctx.fillStyle = '#333';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('READY', canvas.width / 2, 100);

        ctx.font = '14px Arial';
        ctx.fillText('スペースキーで投げる', canvas.width / 2, 130);

        ctx.fillStyle = '#8B4513';
        ctx.fillRect(190, 500, 20, 80);
        ctx.fillStyle = config.line_color;
        ctx.beginPath();
        ctx.moveTo(200, 500);
        ctx.lineTo(200, 300);
        ctx.stroke();
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(190, 290, 20, 20);
      } else if (gameState.state === 'CAST') {
        const elapsed = now - gameState.castStartTime;
        const progress = Math.min(elapsed / 500, 1);
        gameState.lureY = 300 + progress * 150;

        ctx.fillStyle = '#8B4513';
        ctx.fillRect(190, 500, 20, 80);
        ctx.fillStyle = config.line_color;
        ctx.beginPath();
        ctx.moveTo(200, 500);
        ctx.lineTo(200, gameState.lureY);
        ctx.stroke();
        ctx.fillStyle = config.fish_color;
        ctx.fillRect(190, gameState.lureY - 10, 20, 20);

        if (elapsed >= 500) {
          gameState.state = 'WAITING';
          gameState.waitStartTime = now;
          gameState.biteTime = Math.random() * (config.bite_max_wait - config.bite_min_wait) + config.bite_min_wait;
        }
      } else if (gameState.state === 'WAITING') {
        const elapsed = now - gameState.waitStartTime;
        gameState.lureY = 450;

        ctx.fillStyle = '#8B4513';
        ctx.fillRect(190, 500, 20, 80);
        ctx.fillStyle = config.line_color;
        ctx.beginPath();
        ctx.moveTo(200, 500);
        ctx.lineTo(200, gameState.lureY);
        ctx.stroke();
        ctx.fillStyle = config.fish_color;
        ctx.fillRect(190, gameState.lureY - 10, 20, 20);

        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(200, 320, 12, 0, Math.PI * 2);
        ctx.fill();

        if (elapsed >= gameState.biteTime) {
          gameState.state = 'BITE';
          gameState.biteStartTime = now;
          gameState.ukiBite = true;
          gameState.ukiShakeTimer = 0;
        }
      } else if (gameState.state === 'BITE') {
        const elapsed = now - gameState.biteStartTime;

        gameState.lureY = 450;
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(190, 500, 20, 80);
        ctx.fillStyle = config.line_color;
        ctx.beginPath();
        ctx.moveTo(200, 500);
        ctx.lineTo(200, gameState.lureY);
        ctx.stroke();
        ctx.fillStyle = config.fish_color;
        ctx.fillRect(190, gameState.lureY - 10, 20, 20);

        gameState.ukiShakeTimer += deltaTime;
        const shake = Math.sin(gameState.ukiShakeTimer / 100) * 8;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(200 + shake, 320, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#FF3333';
        ctx.font = 'bold 28px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('アタリ！', canvas.width / 2, 150);

        if (elapsed >= 2000) {
          gameState.state = 'MISS';
          gameState.ukiBite = false;
        }
      } else if (gameState.state === 'REEL') {
        gameState.reelGauge -= config.reel_power * 0.5 * (deltaTime / 1000);
        gameState.reelGauge = Math.max(0, gameState.reelGauge);

        gameState.lureY = 450 - (gameState.reelGauge / 100) * 150;
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(190, 500, 20, 80);
        ctx.fillStyle = config.line_color;
        ctx.beginPath();
        ctx.moveTo(200, 500);
        ctx.lineTo(200, gameState.lureY);
        ctx.stroke();
        ctx.fillStyle = config.fish_color;
        ctx.fillRect(190, gameState.lureY - 10, 20, 20);

        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(200, 320, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#333';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('REEL: ' + Math.round(gameState.reelGauge) + '%', canvas.width / 2, 100);

        if (gameState.reelGauge >= 100) {
          gameState.state = 'CATCH';
          gameState.caught++;
          if (gameState.caught >= config.win_fish) {
            gameState.state = 'CLEAR';
            gameState.running = false;
          }
        } else if (gameState.reelGauge <= 0) {
          gameState.state = 'MISS';
        }
      } else if (gameState.state === 'MISS') {
        gameState.lureY = 450;
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(190, 500, 20, 80);
        ctx.fillStyle = config.line_color;
        ctx.beginPath();
        ctx.moveTo(200, 500);
        ctx.lineTo(200, gameState.lureY);
        ctx.stroke();
        ctx.fillStyle = config.fish_color;
        ctx.fillRect(190, gameState.lureY - 10, 20, 20);

        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(200, 320, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#FF6666';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('逃げられた...', canvas.width / 2, 150);

        setTimeout(() => {
          gameState.state = 'READY';
        }, 1500);
      } else if (gameState.state === 'CATCH') {
        gameState.lureY = 300 + (gameState.caught * 20);
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(190, 500, 20, 80);
        ctx.fillStyle = config.line_color;
        ctx.beginPath();
        ctx.moveTo(200, 500);
        ctx.lineTo(200, gameState.lureY);
        ctx.stroke();
        ctx.fillStyle = config.fish_color;
        ctx.beginPath();
        ctx.arc(200, gameState.lureY, 15, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(200, 320, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#33CC33';
        ctx.font = 'bold 28px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('CATCH!', canvas.width / 2, 150);

        setTimeout(() => {
          gameState.state = 'READY';
          gameState.reelGauge = 30;
        }, 1500);
      } else if (gameState.state === 'CLEAR') {
        document.getElementById('clearScreen').style.display = 'flex';
        return;
      }

      updateHUD();

      if (gameState.running) {
        requestAnimationFrame(gameLoop);
      }
    }

    function startGame() {
      document.getElementById('startScreen').style.display = 'none';
      gameState.running = true;
      gameState.state = 'READY';
      gameState.caught = 0;
      gameState.reelGauge = 30;
      lastTime = Date.now();
      requestAnimationFrame(gameLoop);
    }

    function retryGame() {
      document.getElementById('clearScreen').style.display = 'none';
      document.getElementById('startScreen').style.display = 'flex';
      gameState.running = false;
    }

    function handleAction() {
      if (!gameState.running) return;

      if (gameState.state === 'READY') {
        gameState.state = 'CAST';
        gameState.castStartTime = Date.now();
      } else if (gameState.state === 'BITE') {
        gameState.state = 'REEL';
      } else if (gameState.state === 'REEL') {
        gameState.reelGauge = Math.min(100, gameState.reelGauge + config.reel_power);
      }
    }

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('retryBtn').addEventListener('click', retryGame);

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && gameState.running) {
        e.preventDefault();
        handleAction();
      }
    });

    canvas.addEventListener('click', handleAction);
  </script>
</body>
</html>
