<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISHING</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        #gameContainer {
            position: relative;
            background-color: #87ceeb;
            border: 2px solid #333;
        }
        
        canvas {
            display: block;
        }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
            text-align: center;
        }
        
        #startScreen h1 {
            font-size: 2.5em;
            margin: 20px 0;
        }
        
        #startScreen p {
            font-size: 1.2em;
            margin: 10px 0;
        }
        
        #startScreen .rules {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            max-width: 350px;
        }
        
        #startScreen button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2em;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        #startScreen button:hover {
            background-color: #45a049;
        }
        
        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
            text-align: center;
        }
        
        #clearScreen h1 {
            font-size: 3em;
            margin: 20px 0;
            color: #FFD700;
        }
        
        #clearScreen p {
            font-size: 1.5em;
            margin: 10px 0;
        }
        
        #clearScreen button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2em;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        #clearScreen button:hover {
            background-color: #0b7dda;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="startScreen">
            <h1>FISHING</h1>
            <p>釣りゲーム</p>
            <div class="rules">
                <p><strong>目標</strong>: 5匹釣ろう！</p>
                <p><strong>操作</strong>: スペースキーまたはクリック</p>
                <p style="font-size: 0.9em; margin-top: 15px;">
                    スペース/クリックでルアーを投げて<br>
                    アタリ時に素早く引き上げよう！
                </p>
            </div>
            <button onclick="startGame()">ゲーム開始</button>
        </div>
        
        <div id="clearScreen">
            <h1>クリア！</h1>
            <p id="finalScore">5匹釣った！</p>
            <button onclick="retryGame()">もう一度遊ぶ</button>
        </div>
    </div>

    <script>
        const config = {
            title: 'FISHING',
            bg_color: '#87ceeb',
            water_color: '#1a6a8a',
            fish_color: '#f6ad55',
            line_color: '#a0aec0',
            win_fish: 5,
            bite_min_wait: 2000,
            bite_max_wait: 5000,
            reel_power: 3
        };

        const gameState = {
            running: false,
            state: 'READY',
            caught: 0,
            reelGauge: 0,
            lureY: 150,
            castStartTime: 0,
            biteStartTime: 0,
            biteWaitTime: 0,
            bobOffset: 0,
            catchStartTime: 0,
            missStartTime: 0
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 400;
        canvas.height = 600;

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState.running = true;
            gameState.state = 'READY';
            gameState.caught = 0;
            gameState.reelGauge = 0;
            gameState.lureY = 150;
            gameState.castStartTime = 0;
            gameState.biteStartTime = 0;
            gameState.catchStartTime = 0;
            gameState.missStartTime = 0;
            lastTime = Date.now();
            requestAnimationFrame(gameLoop);
        }

        function retryGame() {
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }

        function handleInput() {
            if (!gameState.running) return;

            if (gameState.state === 'READY') {
                gameState.state = 'CAST';
                gameState.castStartTime = Date.now();
                gameState.lureY = 150;
            } else if (gameState.state === 'BITE') {
                gameState.state = 'REEL';
                gameState.reelGauge = 30;
                gameState.biteStartTime = 0;
            } else if (gameState.state === 'REEL') {
                gameState.reelGauge = Math.min(100, gameState.reelGauge + config.reel_power);
                if (gameState.reelGauge >= 100) {
                    gameState.state = 'CATCH';
                    gameState.caught++;
                    if (gameState.caught >= config.win_fish) {
                        gameState.state = 'CLEAR';
                        gameState.running = false;
                        document.getElementById('finalScore').textContent = gameState.caught + '匹釣った！';
                        document.getElementById('clearScreen').style.display = 'flex';
                        return;
                    }
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleInput();
            }
        });

        canvas.addEventListener('click', handleInput);

        let lastTime = Date.now();

        function gameLoop(now) {
            if (!gameState.running) return;

            const deltaTime = now - lastTime;
            lastTime = now;

            switch (gameState.state) {
                case 'READY':
                    break;

                case 'CAST':
                    const castElapsed = Date.now() - gameState.castStartTime;
                    if (castElapsed < 500) {
                        gameState.lureY = 150 + (castElapsed / 500) * 150;
                    } else {
                        gameState.lureY = 300;
                        gameState.state = 'WAITING';
                        gameState.biteWaitTime = Math.random() * (config.bite_max_wait - config.bite_min_wait) + config.bite_min_wait;
                        gameState.biteStartTime = Date.now();
                    }
                    break;

                case 'WAITING':
                    const waitElapsed = Date.now() - gameState.biteStartTime;
                    if (waitElapsed >= gameState.biteWaitTime) {
                        gameState.state = 'BITE';
                        gameState.biteStartTime = Date.now();
                    }
                    break;

                case 'BITE':
                    gameState.bobOffset = Math.sin((Date.now() - gameState.biteStartTime) * 0.01) * 20;
                    const biteWindowElapsed = Date.now() - gameState.biteStartTime;
                    if (biteWindowElapsed >= 2000) {
                        gameState.state = 'MISS';
                    }
                    break;

                case 'REEL':
                    if (gameState.reelGauge >= 100) {
                        gameState.state = 'CATCH';
                        gameState.caught++;
                        if (gameState.caught >= config.win_fish) {
                            gameState.state = 'CLEAR';
                            gameState.running = false;
                            document.getElementById('finalScore').textContent = gameState.caught + '匹釣った！';
                            document.getElementById('clearScreen').style.display = 'flex';
                            break;
                        }
                    }
                    if (gameState.reelGauge <= 0) {
                        gameState.state = 'MISS';
                    }
                    gameState.reelGauge -= config.reel_power * 0.5 * (deltaTime / 1000);
                    gameState.reelGauge = Math.max(0, Math.min(100, gameState.reelGauge));
                    break;

                case 'CATCH':
                    if (!gameState.catchStartTime) {
                        gameState.catchStartTime = Date.now();
                    }
                    if (Date.now() - gameState.catchStartTime > 500) {
                        gameState.state = 'READY';
                        gameState.reelGauge = 0;
                        gameState.lureY = 150;
                        gameState.catchStartTime = 0;
                    }
                    break;

                case 'MISS':
                    if (!gameState.missStartTime) {
                        gameState.missStartTime = Date.now();
                    }
                    if (Date.now() - gameState.missStartTime > 500) {
                        gameState.state = 'READY';
                        gameState.reelGauge = 0;
                        gameState.lureY = 150;
                        gameState.missStartTime = 0;
                    }
                    break;
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, 300);

            ctx.fillStyle = config.water_color;
            ctx.fillRect(0, 300, canvas.width, 300);

            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 300);
            ctx.lineTo(canvas.width, 300);
            ctx.stroke();

            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(canvas.width - 50, 20);
            ctx.lineTo(canvas.width - 50, 120);
            ctx.lineTo(canvas.width - 80, 150);
            ctx.stroke();

            ctx.strokeStyle = config.line_color;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(canvas.width - 80, 150);
            ctx.lineTo(200, gameState.lureY);
            ctx.stroke();

            if (gameState.state === 'BITE') {
                ctx.fillStyle = '#FF6B6B';
            } else {
                ctx.fillStyle = '#FF0000';
            }
            ctx.beginPath();
            ctx.arc(200, 300 + gameState.bobOffset, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = config.fish_color;
            ctx.beginPath();
            ctx.arc(200, gameState.lureY, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#333333';
            ctx.font = 'bold 16px Arial';
            ctx.fillText('釣果: ' + gameState.caught + ' / ' + config.win_fish, 10, 30);
            ctx.font = '14px Arial';
            ctx.fillText('状態: ' + gameState.state, 10, 55);
            
            if (gameState.state === 'READY') {
                ctx.fillStyle = '#333333';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('スペース or クリックで投げる', canvas.width / 2, canvas.height - 20);
                ctx.textAlign = 'left';
            } else if (gameState.state === 'BITE') {
                ctx.fillStyle = '#FF0000';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('アタリ！', canvas.width / 2, canvas.height - 40);
                ctx.font = '14px Arial';
                ctx.fillText('スペース or クリックで引き上げろ！', canvas.width / 2, canvas.height - 20);
                ctx.textAlign = 'left';
            } else if (gameState.state === 'REEL') {
                ctx.fillStyle = '#333333';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('引き上げ中...', canvas.width / 2, canvas.height - 60);
                
                ctx.fillStyle = '#cccccc';
                ctx.fillRect(50, canvas.height - 40, 300, 20);
                
                ctx.fillStyle = gameState.reelGauge > 50 ? '#4CAF50' : gameState.reelGauge > 25 ? '#FFC107' : '#F44336';
                ctx.fillRect(50, canvas.height - 40, (gameState.reelGauge / 100) * 300, 20);
                
                ctx.strokeStyle = '#333333';
                ctx.lineWidth = 2;
                ctx.strokeRect(50, canvas.height - 40, 300, 20);
                
                ctx.fillStyle = '#333333';
                ctx.font = 'bold 14px Arial';
                ctx.fillText(Math.round(gameState.reelGauge) + '%', canvas.width / 2, canvas.height - 15);
                ctx.textAlign = 'left';
            } else if (gameState.state === 'CATCH') {
                ctx.fillStyle = '#00AA00';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('釣れた！', canvas.width / 2, canvas.height / 2);
                ctx.textAlign = 'left';
            } else if (gameState.state === 'MISS') {
                ctx.fillStyle = '#AA0000';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('逃げられた...', canvas.width / 2, canvas.height / 2);
                ctx.textAlign = 'left';
            }
        }
    </script>
</body>
</html>
