<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ヨーヨー技</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #0a0a1e; font-family: Arial, sans-serif;
        }
        #gameContainer { position: relative; }
        canvas { display: block; }
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.88);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            color: #fff; gap: 14px; z-index: 100; text-align: center; padding: 20px;
        }
        .screen h1 { font-size: 44px; color: #f6e05e; }
        .screen p { font-size: 15px; line-height: 1.7; max-width: 300px; }
        .screen button {
            padding: 12px 36px; font-size: 16px; border: none;
            border-radius: 6px; cursor: pointer; background: #9f7aea; color: #fff;
        }
        .screen button:hover { background: #b39ddb; }
    </style>
</head>
<body>
<div id="gameContainer">
    <div id="startScreen" class="screen" style="display:flex">
        <h1>ヨーヨー技</h1>
        <p>ヨーヨーが緑ゾーンに入ったら<br>スペースキーを押して技を決めろ！<br><br>7技成功でクリア<br>3回ミスでゲームオーバー</p>
        <button onclick="startGame()">START</button>
    </div>
    <div id="clearScreen" class="screen">
        <h1>CLEAR!</h1>
        <p id="clearMsg">7技全成功！プロの腕前！</p>
        <button onclick="retryGame()">もう一度</button>
    </div>
    <div id="gameOverScreen" class="screen">
        <h1 style="color:#e53e3e">GAME OVER</h1>
        <p id="overMsg">ミスが多すぎました</p>
        <button onclick="retryGame()">もう一度</button>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>
<script>
const W = 440, H = 540;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;
const gc = document.getElementById('gameContainer');
gc.style.width = W + 'px'; gc.style.height = H + 'px';

const TRICKS = [
    { name: 'ループ・ザ・ループ', window: 0.28 },
    { name: 'ブレイン・ツイスター', window: 0.22 },
    { name: 'ロック・ザ・クレイドル', window: 0.18 },
    { name: 'マン・オン・ザ・ムーン', window: 0.16 },
    { name: 'アラウンド・ザ・ワールド', window: 0.14 },
    { name: 'エリミネーター', window: 0.13 },
    { name: 'インビジブル・スロウ', window: 0.12 },
];

const gameState = {
    running: false,
    trickIdx: 0,
    successCount: 0,
    missCount: 0,
    phase: 'idle',
    yoyoAngle: 0,
    yoyoSpeed: 0,
    yoyoAmp: 110,
    feedback: '',
    feedbackTimer: 0,
    hitTimer: 0,
    hitSuccess: false,
    inZone: false,
};
let gameLoop = null;

function startGame() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('clearScreen').style.display = 'none';
    document.getElementById('gameOverScreen').style.display = 'none';
    gameState.running = true;
    gameState.trickIdx = 0;
    gameState.successCount = 0;
    gameState.missCount = 0;
    gameState.phase = 'swinging';
    gameState.yoyoAngle = Math.PI / 2;
    gameState.yoyoSpeed = 0.035 + TRICKS[0].window * 0.1;
    gameState.feedback = '';
    gameState.feedbackTimer = 0;
    gameState.hitTimer = 0;
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(update, 16);
}

function retryGame() {
    gameState.running = false;
    document.getElementById('clearScreen').style.display = 'none';
    document.getElementById('gameOverScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
}

const ZONE_MIN = Math.PI * 0.35;
const ZONE_MAX = Math.PI * 0.65;

function isInZone() {
    const a = gameState.yoyoAngle % (Math.PI * 2);
    return (a >= ZONE_MIN && a <= ZONE_MAX);
}

function attemptTrick() {
    if (!gameState.running || gameState.phase !== 'swinging') return;
    const inZ = isInZone();
    if (inZ) {
        gameState.successCount++;
        gameState.feedback = '✅ 成功！';
        gameState.feedbackTimer = 90;
        gameState.hitTimer = 15;
        gameState.hitSuccess = true;
        if (gameState.successCount >= TRICKS.length) {
            setTimeout(() => { clearGame(); }, 600);
            return;
        }
        gameState.trickIdx++;
        gameState.yoyoSpeed = 0.035 + TRICKS[gameState.trickIdx].window * 0.12;
    } else {
        gameState.missCount++;
        gameState.feedback = '❌ ミス';
        gameState.feedbackTimer = 80;
        gameState.hitTimer = 15;
        gameState.hitSuccess = false;
        if (gameState.missCount >= 3) {
            setTimeout(() => { gameOver(); }, 600);
        }
    }
}

function clearGame() {
    gameState.running = false;
    clearInterval(gameLoop);
    document.getElementById('clearScreen').style.display = 'flex';
}

function gameOver() {
    gameState.running = false;
    clearInterval(gameLoop);
    document.getElementById('overMsg').innerText = gameState.successCount + '技成功 / 3ミス';
    document.getElementById('gameOverScreen').style.display = 'flex';
}

function update() {
    if (!gameState.running) return;
    gameState.yoyoAngle += gameState.yoyoSpeed;
    if (gameState.feedbackTimer > 0) gameState.feedbackTimer--;
    if (gameState.hitTimer > 0) gameState.hitTimer--;
    gameState.inZone = isInZone();
    draw();
}

function draw() {
    ctx.fillStyle = '#0d1b3e';
    ctx.fillRect(0, 0, W, H);

    const cx = W / 2, cy = 160;
    const trick = TRICKS[Math.min(gameState.trickIdx, TRICKS.length - 1)];

    // Title
    ctx.fillStyle = '#f6e05e';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('技 ' + (gameState.successCount + 1) + ' / 7: ' + trick.name, cx, 14);

    // Status row
    ctx.font = '14px Arial';
    ctx.fillStyle = '#90cdf4';
    ctx.fillText('成功: ' + gameState.successCount + '  ミス: ' + gameState.missCount + ' / 3', cx, 40);

    // Zone arc (green zone indicator on pendulum arc)
    ctx.strokeStyle = 'rgba(56,161,105,0.3)';
    ctx.lineWidth = 22;
    ctx.beginPath();
    ctx.arc(cx, cy - 20, gameState.yoyoAmp, ZONE_MIN + Math.PI/2, ZONE_MAX + Math.PI/2);
    ctx.stroke();

    // String
    const angle = gameState.yoyoAngle;
    const yx = cx + Math.sin(angle) * gameState.yoyoAmp;
    const yy = cy - 20 + Math.cos(angle) * gameState.yoyoAmp * -1 + gameState.yoyoAmp;
    ctx.strokeStyle = '#a0aec0';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 20);
    ctx.lineTo(yx, yy);
    ctx.stroke();

    // Yoyo disc
    const inZone = gameState.inZone;
    const hitFlash = gameState.hitTimer > 0;
    let yoyoColor = inZone ? '#38a169' : '#9f7aea';
    if (hitFlash) yoyoColor = gameState.hitSuccess ? '#f6e05e' : '#e53e3e';
    ctx.fillStyle = yoyoColor;
    ctx.beginPath();
    ctx.arc(yx, yy, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = '18px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('○', yx, yy);

    // Hand / anchor
    ctx.fillStyle = '#f6ad55';
    ctx.beginPath();
    ctx.arc(cx, cy - 20, 14, 0, Math.PI * 2);
    ctx.fill();

    // Timing hint bar
    const barY = H - 150, barW = 300, barH = 28;
    const barX = cx - barW / 2;
    ctx.fillStyle = '#1a1a3e';
    ctx.fillRect(barX, barY, barW, barH);
    const zoneStart = barW * (ZONE_MIN / Math.PI) * 0.5;
    const zoneEnd = barW * (ZONE_MAX / Math.PI) * 0.5;
    ctx.fillStyle = 'rgba(56,161,105,0.5)';
    ctx.fillRect(barX + zoneStart, barY, zoneEnd - zoneStart, barH);
    const normAngle = (gameState.yoyoAngle % (Math.PI * 2)) / (Math.PI * 2);
    const markerX = barX + normAngle * barW;
    ctx.fillStyle = inZone ? '#68d391' : '#fc8181';
    ctx.fillRect(markerX - 3, barY - 4, 6, barH + 8);
    ctx.strokeStyle = '#4a5568';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);

    ctx.fillStyle = '#a0aec0';
    ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('緑ゾーンでSPACEを押せ！', cx, barY + barH + 16);

    // Feedback
    if (gameState.feedbackTimer > 0) {
        ctx.globalAlpha = Math.min(1, gameState.feedbackTimer / 30);
        ctx.fillStyle = gameState.feedback.startsWith('✅') ? '#68d391' : '#fc8181';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(gameState.feedback, cx, H - 80);
        ctx.globalAlpha = 1;
    }

    // SPACE hint
    ctx.fillStyle = '#4a5568';
    ctx.font = '13px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('SPACE または クリック', cx, H - 20);
}

document.addEventListener('keydown', function(e) {
    if (e.code === 'Space') { e.preventDefault(); attemptTrick(); }
});
canvas.addEventListener('click', function() { attemptTrick(); });
</script>
</body>
</html>
