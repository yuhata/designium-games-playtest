<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATCH3 META</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #gameContainer {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }
        #titleBar {
            text-align: center;
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #metaLayer {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 10px;
        }
        .building {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }
        .building:hover {
            transform: scale(1.05);
        }
        .building-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .building-level {
            font-size: 12px;
            margin-bottom: 6px;
        }
        .building-cost {
            font-size: 11px;
            margin-top: 4px;
            opacity: 0.9;
        }
        #starDisplay {
            text-align: center;
            color: #f6e05e;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #instructions {
            text-align: center;
            color: #ccc;
            font-size: 14px;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
        #boardContainer {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-gap: 2px;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        .tile {
            aspect-ratio: 1;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid transparent;
            transition: all 0.1s;
            font-weight: bold;
            user-select: none;
        }
        .tile:hover {
            transform: scale(0.95);
        }
        .tile.selected {
            border: 4px solid #fff;
            box-shadow: 0 0 12px rgba(255,255,255,0.6);
            transform: scale(1.1);
        }
        .tile.valid-swap {
            border: 4px solid #90ee90;
            box-shadow: 0 0 8px rgba(144,238,144,0.8);
        }
        #startScreen, #clearScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #clearScreen {
            display: none;
        }
        .screen-text {
            color: #fff;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .screen-button {
            padding: 15px 40px;
            font-size: 24px;
            background: #4299e1;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .screen-button:hover {
            background: #3182ce;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="titleBar">MATCH3 META</div>
        <div id="starDisplay">Star: 0</div>
        <div id="metaLayer"></div>
        <div id="instructions">クリックでタイルを選択 → 隣のタイルをクリックしてスワップ</div>
        <div id="boardContainer"></div>
    </div>

    <div id="startScreen">
        <div class="screen-text">MATCH3 META</div>
        <button class="screen-button" onclick="startGameClick()">START</button>
    </div>

    <div id="clearScreen">
        <div class="screen-text">CLEAR!</div>
        <button class="screen-button" onclick="retryGame()">RETRY</button>
    </div>

    <script>
        // SCHEMA:
        // config: { title, bg_color, tile_colors[], building_color, grid_cols, grid_rows, building_count }
        // gameState: { board[][], stars, buildings{A,B,C}{level,cost}, running }

        const config = {
            title: 'MATCH3 META',
            bg_color: '#1a1a2e',
            tile_colors: ['#e53e3e','#4299e1','#68d391','#f6e05e'],
            building_color: '#d69e2e',
            grid_cols: 6,
            grid_rows: 6,
            building_count: 3
        };

        const gameState = {
            board: [],
            stars: 0,
            buildings: {
                A: { level: 1, costs: [0, 5, 15] },
                B: { level: 1, costs: [0, 8, 20] },
                C: { level: 1, costs: [0, 10, 25] }
            },
            selectedTile: null,
            running: false
        };

        function initBoard() {
            let valid = false;
            while (!valid) {
                gameState.board = [];
                for (let r = 0; r < config.grid_rows; r++) {
                    gameState.board[r] = [];
                    for (let c = 0; c < config.grid_cols; c++) {
                        gameState.board[r][c] = Math.floor(Math.random() * config.tile_colors.length);
                    }
                }
                valid = hasValidMove();
            }
        }

        function hasValidMove() {
            for (let r = 0; r < config.grid_rows; r++) {
                for (let c = 0; c < config.grid_cols; c++) {
                    // Check right
                    if (c + 1 < config.grid_cols) {
                        [gameState.board[r][c], gameState.board[r][c + 1]] = 
                        [gameState.board[r][c + 1], gameState.board[r][c]];
                        if (findMatches().length > 0) {
                            [gameState.board[r][c], gameState.board[r][c + 1]] = 
                            [gameState.board[r][c + 1], gameState.board[r][c]];
                            return true;
                        }
                        [gameState.board[r][c], gameState.board[r][c + 1]] = 
                        [gameState.board[r][c + 1], gameState.board[r][c]];
                    }
                    // Check down
                    if (r + 1 < config.grid_rows) {
                        [gameState.board[r][c], gameState.board[r + 1][c]] = 
                        [gameState.board[r + 1][c], gameState.board[r][c]];
                        if (findMatches().length > 0) {
                            [gameState.board[r][c], gameState.board[r + 1][c]] = 
                            [gameState.board[r + 1][c], gameState.board[r][c]];
                            return true;
                        }
                        [gameState.board[r][c], gameState.board[r + 1][c]] = 
                        [gameState.board[r + 1][c], gameState.board[r][c]];
                    }
                }
            }
            return false;
        }

        function getValidSwapPositions(r, c) {
            const valid = [];
            const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
            for (const [dr, dc] of dirs) {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < config.grid_rows && nc >= 0 && nc < config.grid_cols) {
                    [gameState.board[r][c], gameState.board[nr][nc]] = 
                    [gameState.board[nr][nc], gameState.board[r][c]];
                    if (findMatches().length > 0) {
                        valid.push([nr, nc]);
                    }
                    [gameState.board[r][c], gameState.board[nr][nc]] = 
                    [gameState.board[nr][nc], gameState.board[r][c]];
                }
            }
            return valid;
        }

        function selectTile(r, c) {
            gameState.selectedTile = [r, c];
            renderBoard();
        }

        function swapTiles(r, c) {
            if (!gameState.selectedTile) return;
            const [sr, sc] = gameState.selectedTile;
            if (Math.abs(sr - r) + Math.abs(sc - c) !== 1) return;
            
            [gameState.board[sr][sc], gameState.board[r][c]] = 
            [gameState.board[r][c], gameState.board[sr][sc]];
            gameState.selectedTile = null;
            renderBoard();

            setTimeout(() => {
                const matches = findMatches();
                if (matches.length === 0) {
                    [gameState.board[sr][sc], gameState.board[r][c]] = 
                    [gameState.board[r][c], gameState.board[sr][sc]];
                    renderBoard();
                } else {
                    resolveMatches();
                }
            }, 300);
        }

        function findMatches() {
            const matched = new Set();
            for (let r = 0; r < config.grid_rows; r++) {
                for (let c = 0; c < config.grid_cols; c++) {
                    const color = gameState.board[r][c];
                    // Horizontal
                    if (c + 2 < config.grid_cols && 
                        gameState.board[r][c + 1] === color && 
                        gameState.board[r][c + 2] === color) {
                        matched.add(`${r},${c}`);
                        matched.add(`${r},${c + 1}`);
                        matched.add(`${r},${c + 2}`);
                    }
                    // Vertical
                    if (r + 2 < config.grid_rows && 
                        gameState.board[r + 1][c] === color && 
                        gameState.board[r + 2][c] === color) {
                        matched.add(`${r},${c}`);
                        matched.add(`${r + 1},${c}`);
                        matched.add(`${r + 2},${c}`);
                    }
                }
            }
            return Array.from(matched).map(s => s.split(',').map(Number));
        }

        function resolveMatches() {
            const matches = findMatches();
            if (matches.length > 0) {
                gameState.stars += 1;
                const matchSet = new Set(matches.map(m => `${m[0]},${m[1]}`));
                for (const [r, c] of matches) {
                    gameState.board[r][c] = null;
                }
                renderBoard();
                
                setTimeout(() => {
                    applyGravity();
                    fillBoard();
                    renderBoard();
                    setTimeout(() => resolveMatches(), 200);
                }, 200);
            } else {
                updateUI();
            }
        }

        function applyGravity() {
            for (let c = 0; c < config.grid_cols; c++) {
                const column = [];
                for (let r = 0; r < config.grid_rows; r++) {
                    if (gameState.board[r][c] !== null) {
                        column.push(gameState.board[r][c]);
                    }
                }
                for (let r = 0; r < config.grid_rows; r++) {
                    gameState.board[r][c] = column[r] ?? null;
                }
            }
        }

        function fillBoard() {
            for (let r = 0; r < config.grid_rows; r++) {
                for (let c = 0; c < config.grid_cols; c++) {
                    if (gameState.board[r][c] === null) {
                        gameState.board[r][c] = Math.floor(Math.random() * config.tile_colors.length);
                    }
                }
            }
        }

        function upgradeBuildingClick(key) {
            const nextLevel = gameState.buildings[key].level + 1;
            if (nextLevel > 3) return;
            const cost = gameState.buildings[key].costs[nextLevel];
            if (gameState.stars >= cost) {
                gameState.stars -= cost;
                gameState.buildings[key].level = nextLevel;
                updateUI();
                checkClear();
            }
        }

        function checkClear() {
            if (gameState.buildings.A.level === 3 && 
                gameState.buildings.B.level === 3 && 
                gameState.buildings.C.level === 3) {
                gameState.running = false;
                document.getElementById('clearScreen').style.display = 'flex';
            }
        }

        function updateUI() {
            document.getElementById('starDisplay').textContent = `Star: ${gameState.stars}`;
            const metaLayer = document.getElementById('metaLayer');
            metaLayer.innerHTML = '';
            for (const key of ['A', 'B', 'C']) {
                const building = gameState.buildings[key];
                const nextLevel = building.level + 1;
                const cost = nextLevel <= 3 ? building.costs[nextLevel] : '-';
                const div = document.createElement('div');
                div.className = 'building';
                div.style.backgroundColor = config.building_color;
                div.onclick = () => upgradeBuildingClick(key);
                div.innerHTML = `
                    <div class="building-title">Building ${key}</div>
                    <div class="building-level">Lv${building.level}</div>
                    <div class="building-cost">${cost}${typeof cost === 'number' ? ' star' : ''}</div>
                `;
                metaLayer.appendChild(div);
            }
        }

        function renderBoard() {
            const container = document.getElementById('boardContainer');
            container.innerHTML = '';
            const validSwaps = gameState.selectedTile ? 
                getValidSwapPositions(gameState.selectedTile[0], gameState.selectedTile[1]) : [];
            const validSet = new Set(validSwaps.map(v => `${v[0]},${v[1]}`));

            for (let r = 0; r < config.grid_rows; r++) {
                for (let c = 0; c < config.grid_cols; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.style.backgroundColor = config.tile_colors[gameState.board[r][c]];
                    
                    if (gameState.selectedTile && gameState.selectedTile[0] === r && gameState.selectedTile[1] === c) {
                        tile.classList.add('selected');
                    }
                    if (validSet.has(`${r},${c}`)) {
                        tile.classList.add('valid-swap');
                    }
                    
                    tile.onclick = () => {
                        if (gameState.selectedTile && gameState.selectedTile[0] === r && gameState.selectedTile[1] === c) {
                            gameState.selectedTile = null;
                            renderBoard();
                        } else if (gameState.selectedTile) {
                            swapTiles(r, c);
                        } else {
                            selectTile(r, c);
                        }
                    };
                    container.appendChild(tile);
                }
            }
        }

        function startGameClick() {
            document.getElementById('startScreen').style.display = 'none';
            startGame();
        }

        function startGame() {
            gameState.stars = 0;
            gameState.buildings = {
                A: { level: 1, costs: [0, 5, 15] },
                B: { level: 1, costs: [0, 8, 20] },
                C: { level: 1, costs: [0, 10, 25] }
            };
            gameState.selectedTile = null;
            gameState.running = true;
            document.body.style.background = config.bg_color;
            initBoard();
            updateUI();
            renderBoard();
            gameLoop();
        }

        function gameLoop() {
            if (gameState.running) {
                renderBoard();
                requestAnimationFrame(gameLoop);
            }
        }

        function retryGame() {
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
        }
    </script>
</body>
</html>
