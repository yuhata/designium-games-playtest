<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MATCH3 META</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Arial', sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #gameContainer {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #metaLayer {
      flex: 0.4;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      border-bottom: 2px solid #444;
    }
    #gameInfo {
      padding: 10px 20px;
      font-size: 18px;
      color: #fff;
      text-align: center;
      background: rgba(0,0,0,0.3);
    }
    #board {
      flex: 0.5;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #boardGrid {
      display: grid;
      grid-template-columns: repeat(6, 60px);
      grid-template-rows: repeat(6, 60px);
      gap: 4px;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 8px;
    }
    .tile {
      width: 60px;
      height: 60px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.1s ease;
    }
    .tile:hover {
      transform: scale(1.05);
    }
    .tile.selected {
      border: 3px solid #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
    }
    #instructions {
      flex: 0.1;
      padding: 10px 20px;
      color: #aaa;
      font-size: 14px;
      text-align: center;
      background: rgba(0,0,0,0.3);
    }
    #startScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
    }
    #startScreen button {
      padding: 20px 60px;
      font-size: 32px;
      background: #e53e3e;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    #startScreen button:hover {
      background: #c53030;
      transform: scale(1.1);
    }
    #gameOverScreen, #clearScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.95);
      z-index: 999;
      flex-direction: column;
      gap: 20px;
    }
    #gameOverScreen h1, #clearScreen h1 {
      color: #fff;
      font-size: 64px;
    }
    #gameOverScreen button, #clearScreen button {
      padding: 15px 40px;
      font-size: 20px;
      background: #4299e1;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #gameOverScreen button:hover, #clearScreen button:hover {
      background: #3182ce;
    }
    .building {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .building h3 {
      color: #fff;
      font-size: 16px;
    }
    .building button {
      width: 80px;
      height: 80px;
      border: 2px solid #d69e2e;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      color: #fff;
      transition: all 0.2s;
    }
    .building button:hover:not(:disabled) {
      transform: scale(1.1);
      box-shadow: 0 0 10px #d69e2e;
    }
    .building button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .building p {
      color: #aaa;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="metaLayer"></div>
    <div id="gameInfo"></div>
    <div id="board">
      <div id="boardGrid"></div>
    </div>
    <div id="instructions">
      タイルをクリックして選択 → 隣のタイルをクリックしてスワップ
    </div>
  </div>

  <div id="startScreen">
    <h1 style="color: #fff; font-size: 64px; margin-bottom: 40px;">MATCH3 META</h1>
    <button onclick="startGame()">START</button>
  </div>

  <div id="gameOverScreen">
    <h1>GAME OVER</h1>
    <button onclick="retryGame()">RETRY</button>
  </div>

  <div id="clearScreen">
    <h1>CLEAR!</h1>
    <button onclick="retryGame()">RETRY</button>
  </div>

  <script>
    const config = {
      title: 'MATCH3 META',
      bg_color: '#1a1a2e',
      tile_colors: ['#e53e3e', '#4299e1', '#68d391', '#f6e05e'],
      building_color: '#d69e2e',
      grid_cols: 6,
      grid_rows: 6,
      building_count: 3
    };

    let gameState = {
      running: false,
      board: [],
      selectedTile: null,
      stars: 0,
      buildingLevels: { A: 1, B: 1, C: 1 }
    };

    const buildingData = {
      A: { name: 'Building A', costs: { 2: 5, 3: 15 } },
      B: { name: 'Building B', costs: { 2: 8, 3: 20 } },
      C: { name: 'Building C', costs: { 2: 10, 3: 25 } }
    };

    function initGame() {
      gameState.board = [];
      gameState.selectedTile = null;
      gameState.stars = 0;
      gameState.buildingLevels = { A: 1, B: 1, C: 1 };
      
      for (let r = 0; r < config.grid_rows; r++) {
        gameState.board[r] = [];
        for (let c = 0; c < config.grid_cols; c++) {
          gameState.board[r][c] = Math.floor(Math.random() * config.tile_colors.length);
        }
      }
    }

    function startGame() {
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('gameOverScreen').style.display = 'none';
      document.getElementById('clearScreen').style.display = 'none';
      
      document.body.style.background = config.bg_color;
      
      initGame();
      gameState.running = true;
      renderBoard();
      renderMetaLayer();
      renderGameInfo();
      gameLoop();
    }

    function gameLoop() {
      if (!gameState.running) return;
      renderBoard();
      requestAnimationFrame(gameLoop);
    }

    function renderBoard() {
      const boardGrid = document.getElementById('boardGrid');
      boardGrid.innerHTML = '';
      
      for (let r = 0; r < config.grid_rows; r++) {
        for (let c = 0; c < config.grid_cols; c++) {
          const tile = document.createElement('div');
          tile.className = 'tile';
          tile.style.background = config.tile_colors[gameState.board[r][c]];
          tile.dataset.row = r;
          tile.dataset.col = c;
          
          if (gameState.selectedTile && gameState.selectedTile.row === r && gameState.selectedTile.col === c) {
            tile.classList.add('selected');
          }
          
          tile.addEventListener('click', function() {
            selectTile(r, c);
          });
          
          boardGrid.appendChild(tile);
        }
      }
    }

    function selectTile(row, col) {
      if (!gameState.running) return;
      
      if (gameState.selectedTile === null) {
        gameState.selectedTile = { row, col };
        renderBoard();
      } else {
        const dx = Math.abs(gameState.selectedTile.row - row);
        const dy = Math.abs(gameState.selectedTile.col - col);
        
        if ((dx === 1 && dy === 0) || (dx === 0 && dy === 1)) {
          swapTiles(gameState.selectedTile.row, gameState.selectedTile.col, row, col);
        } else if (gameState.selectedTile.row === row && gameState.selectedTile.col === col) {
          gameState.selectedTile = null;
          renderBoard();
        } else {
          gameState.selectedTile = { row, col };
          renderBoard();
        }
      }
    }

    function swapTiles(r1, c1, r2, c2) {
      [gameState.board[r1][c1], gameState.board[r2][c2]] = [gameState.board[r2][c2], gameState.board[r1][c1]];
      gameState.selectedTile = null;
      renderBoard();
      resolveMatches();
    }

    function findMatches() {
      const matched = new Set();
      
      for (let r = 0; r < config.grid_rows; r++) {
        for (let c = 0; c < config.grid_cols; c++) {
          const color = gameState.board[r][c];
          
          let horizontalCount = 1;
          while (c + horizontalCount < config.grid_cols && gameState.board[r][c + horizontalCount] === color) {
            horizontalCount++;
          }
          if (horizontalCount >= 3) {
            for (let i = 0; i < horizontalCount; i++) {
              matched.add(r * config.grid_cols + (c + i));
            }
          }
          
          let verticalCount = 1;
          while (r + verticalCount < config.grid_rows && gameState.board[r + verticalCount][c] === color) {
            verticalCount++;
          }
          if (verticalCount >= 3) {
            for (let i = 0; i < verticalCount; i++) {
              matched.add((r + i) * config.grid_cols + c);
            }
          }
        }
      }
      
      return matched;
    }

    function resolveMatches() {
      let matchFound = true;
      
      while (matchFound) {
        const matched = findMatches();
        
        if (matched.size === 0) {
          matchFound = false;
          break;
        }
        
        gameState.stars += 1;
        
        for (let idx of matched) {
          const r = Math.floor(idx / config.grid_cols);
          const c = idx % config.grid_cols;
          gameState.board[r][c] = null;
        }
        
        renderBoard();
        
        for (let c = 0; c < config.grid_cols; c++) {
          for (let r = config.grid_rows - 1; r >= 0; r--) {
            if (gameState.board[r][c] === null) {
              for (let r2 = r; r2 > 0; r2--) {
                gameState.board[r2][c] = gameState.board[r2 - 1][c];
              }
              gameState.board[0][c] = Math.floor(Math.random() * config.tile_colors.length);
            }
          }
        }
        
        renderBoard();
      }
      
      renderGameInfo();
      checkClear();
    }

    function upgradeBulding(key) {
      if (!gameState.running) return;
      
      const currentLevel = gameState.buildingLevels[key];
      if (currentLevel >= 3) return;
      
      const nextLevel = currentLevel + 1;
      const cost = buildingData[key].costs[nextLevel];
      
      if (gameState.stars >= cost) {
        gameState.stars -= cost;
        gameState.buildingLevels[key] = nextLevel;
        renderGameInfo();
        renderMetaLayer();
        checkClear();
      }
    }

    function checkClear() {
      if (gameState.buildingLevels.A === 3 && gameState.buildingLevels.B === 3 && gameState.buildingLevels.C === 3) {
        gameState.running = false;
        document.getElementById('clearScreen').style.display = 'flex';
      }
    }

    function renderGameInfo() {
      const info = document.getElementById('gameInfo');
      info.innerHTML = `STARS: ${gameState.stars}`;
    }

    function renderMetaLayer() {
      const metaLayer = document.getElementById('metaLayer');
      metaLayer.innerHTML = '';
      
      for (let key of ['A', 'B', 'C']) {
        const level = gameState.buildingLevels[key];
        const building = document.createElement('div');
        building.className = 'building';
        
        const name = document.createElement('h3');
        name.textContent = buildingData[key].name;
        building.appendChild(name);
        
        const button = document.createElement('button');
        button.style.background = config.building_color;
        button.textContent = `Lv${level}`;
        
        if (level >= 3) {
          button.disabled = true;
          button.textContent = 'MAX';
        } else {
          const nextLevel = level + 1;
          const cost = buildingData[key].costs[nextLevel];
          button.onclick = () => upgradeBulding(key);
          button.disabled = gameState.stars < cost;
        }
        
        building.appendChild(button);
        
        if (level < 3) {
          const nextLevel = level + 1;
          const cost = buildingData[key].costs[nextLevel];
          const costText = document.createElement('p');
          costText.textContent = `Lv${nextLevel}: ${cost}star`;
          building.appendChild(costText);
        }
        
        metaLayer.appendChild(building);
      }
    }

    function retryGame() {
      gameState.running = false;
      document.getElementById('startScreen').style.display = 'flex';
      document.getElementById('gameOverScreen').style.display = 'none';
      document.getElementById('clearScreen').style.display = 'none';
    }

    window.addEventListener('load', () => {
      document.body.style.background = config.bg_color;
    });
  </script>
</body>
</html>
