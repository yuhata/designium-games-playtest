<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATCH3 META</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            color: white;
        }
        #metaLayer {
            height: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #starDisplay {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: #f6e05e;
        }
        #buildings {
            display: flex;
            gap: 20px;
            justify-content: space-around;
        }
        .building {
            flex: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #d69e2e;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            white-space: pre-line;
        }
        .building:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        #board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }
        .tile {
            aspect-ratio: 1;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            transition: all 0.1s;
            user-select: none;
        }
        .tile:hover {
            opacity: 0.8;
        }
        .tile.selected {
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        #startScreen, #gameOverScreen, #clearScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #gameOverScreen, #clearScreen {
            display: none;
        }
        .screen-content {
            text-align: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
        }
        .screen-content button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 24px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .screen-content button:hover {
            background: #3182ce;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="metaLayer">
            <div id="starDisplay">Star: 0</div>
            <div id="buildings"></div>
        </div>
        <div id="board"></div>
    </div>
    <div id="startScreen">
        <div class="screen-content">
            <div>MATCH3 META</div>
            <button onclick="startGameFromScreen()">START</button>
        </div>
    </div>
    <div id="gameOverScreen">
        <div class="screen-content">
            GAME OVER
            <button onclick="retryGame()">RETRY</button>
        </div>
    </div>
    <div id="clearScreen">
        <div class="screen-content">
            CLEAR!
            <button onclick="retryGame()">RETRY</button>
        </div>
    </div>
    <script>
        const config = {
            title: 'MATCH3 META',
            bg_color: '#1a1a2e',
            tile_colors: ['#e53e3e','#4299e1','#68d391','#f6e05e'],
            building_color: '#d69e2e',
            grid_cols: 6,
            grid_rows: 6,
            building_count: 3
        };

        const buildingData = {
            A: { name: 'Building A', costs: [5, 15] },
            B: { name: 'Building B', costs: [8, 20] },
            C: { name: 'Building C', costs: [10, 25] }
        };

        let gameState = {
            running: false,
            board: [],
            selectedTile: null,
            stars: 0,
            buildings: {
                A: { level: 1 },
                B: { level: 1 },
                C: { level: 1 }
            }
        };

        function initializeBoard() {
            gameState.board = [];
            for (let i = 0; i < config.grid_rows; i++) {
                gameState.board[i] = [];
                for (let j = 0; j < config.grid_cols; j++) {
                    gameState.board[i][j] = Math.floor(Math.random() * config.tile_colors.length);
                }
            }
        }

        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            
            for (let i = 0; i < config.grid_rows; i++) {
                for (let j = 0; j < config.grid_cols; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.style.background = config.tile_colors[gameState.board[i][j]];
                    tile.dataset.row = i;
                    tile.dataset.col = j;
                    
                    if (gameState.selectedTile && 
                        gameState.selectedTile.row === i && 
                        gameState.selectedTile.col === j) {
                        tile.classList.add('selected');
                    }
                    
                    tile.addEventListener('click', () => selectTile(i, j));
                    boardDiv.appendChild(tile);
                }
            }
        }

        function selectTile(row, col) {
            if (!gameState.running) return;
            
            if (gameState.selectedTile === null) {
                gameState.selectedTile = { row, col };
                renderBoard();
            } else if (gameState.selectedTile.row === row && gameState.selectedTile.col === col) {
                gameState.selectedTile = null;
                renderBoard();
            } else if (isAdjacent(gameState.selectedTile.row, gameState.selectedTile.col, row, col)) {
                swapTiles(gameState.selectedTile.row, gameState.selectedTile.col, row, col);
            }
        }

        function isAdjacent(r1, c1, r2, c2) {
            const dr = Math.abs(r1 - r2);
            const dc = Math.abs(c1 - c2);
            return (dr === 1 && dc === 0) || (dr === 0 && dc === 1);
        }

        function swapTiles(r1, c1, r2, c2) {
            [gameState.board[r1][c1], gameState.board[r2][c2]] = 
            [gameState.board[r2][c2], gameState.board[r1][c1]];
            gameState.selectedTile = null;
            renderBoard();
            setTimeout(resolveMatches, 200);
        }

        function resolveMatches() {
            let matched = new Set();
            
            for (let i = 0; i < config.grid_rows; i++) {
                for (let j = 0; j < config.grid_cols; j++) {
                    const color = gameState.board[i][j];
                    
                    let hCount = 1;
                    while (j + hCount < config.grid_cols && gameState.board[i][j + hCount] === color) {
                        hCount++;
                    }
                    if (hCount >= 3) {
                        for (let k = 0; k < hCount; k++) {
                            matched.add(`${i},${j + k}`);
                        }
                    }
                    
                    let vCount = 1;
                    while (i + vCount < config.grid_rows && gameState.board[i + vCount][j] === color) {
                        vCount++;
                    }
                    if (vCount >= 3) {
                        for (let k = 0; k < vCount; k++) {
                            matched.add(`${i + k},${j}`);
                        }
                    }
                }
            }
            
            if (matched.size > 0) {
                gameState.stars += 1;
                matched.forEach(pos => {
                    const [r, c] = pos.split(',').map(Number);
                    gameState.board[r][c] = -1;
                });
                renderBoard();
                updateUI();
                setTimeout(() => {
                    applyGravity();
                    setTimeout(resolveMatches, 200);
                }, 300);
            }
        }

        function applyGravity() {
            for (let j = 0; j < config.grid_cols; j++) {
                for (let i = config.grid_rows - 1; i >= 0; i--) {
                    if (gameState.board[i][j] === -1) {
                        for (let k = i; k > 0; k--) {
                            gameState.board[k][j] = gameState.board[k - 1][j];
                        }
                        gameState.board[0][j] = Math.floor(Math.random() * config.tile_colors.length);
                    }
                }
            }
            renderBoard();
        }

        function updateUI() {
            document.getElementById('starDisplay').innerText = `Star: ${gameState.stars}`;
            
            const buildingsDiv = document.getElementById('buildings');
            buildingsDiv.innerHTML = '';
            
            for (const key of ['A', 'B', 'C']) {
                const building = gameState.buildings[key];
                const data = buildingData[key];
                const level = building.level;
                const nextCost = level < 3 ? data.costs[level - 1] : null;
                const canUpgrade = nextCost && gameState.stars >= nextCost;
                
                const buildingDiv = document.createElement('div');
                buildingDiv.className = 'building';
                buildingDiv.style.background = canUpgrade ? 'rgba(66, 153, 225, 0.3)' : 'rgba(255, 255, 255, 0.1)';
                
                let text = data.name + '\nLv' + level;
                if (nextCost) {
                    text += '\nCost: ' + nextCost + '★';
                } else {
                    text += '\nMAX';
                }
                buildingDiv.innerText = text;
                
                if (canUpgrade) {
                    buildingDiv.addEventListener('click', () => upgradeBuilding(key));
                }
                buildingsDiv.appendChild(buildingDiv);
            }
        }

        function upgradeBuilding(key) {
            const building = gameState.buildings[key];
            const data = buildingData[key];
            
            if (building.level >= 3) return;
            
            const nextCost = data.costs[building.level - 1];
            if (gameState.stars >= nextCost) {
                gameState.stars -= nextCost;
                building.level += 1;
                updateUI();
                
                if (gameState.buildings.A.level === 3 && 
                    gameState.buildings.B.level === 3 && 
                    gameState.buildings.C.level === 3) {
                    endGameWithClear();
                }
            }
        }

        function endGameWithClear() {
            gameState.running = false;
            document.getElementById('clearScreen').style.display = 'flex';
        }

        function startGameFromScreen() {
            document.getElementById('startScreen').style.display = 'none';
            startGame();
        }

        function startGame() {
            gameState = {
                running: true,
                board: [],
                selectedTile: null,
                stars: 0,
                buildings: {
                    A: { level: 1 },
                    B: { level: 1 },
                    C: { level: 1 }
                }
            };
            document.body.style.background = config.bg_color;
            initializeBoard();
            updateUI();
            renderBoard();
            gameLoop();
        }

        function gameLoop() {
            if (gameState.running) {
                renderBoard();
                requestAnimationFrame(gameLoop);
            }
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
        }

        document.body.style.background = config.bg_color;
    </script>
</body>
</html>
