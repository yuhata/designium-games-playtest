<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUZZLE JUMP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #333;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 640px;
            height: 400px;
        }
        canvas {
            display: block;
            border: 2px solid #000;
            background-color: #87ceeb;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 100;
            color: white;
        }
        .screen.active {
            display: flex;
        }
        .screen h1 {
            font-size: 3em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px #000;
        }
        .screen h2 {
            font-size: 2em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px #000;
        }
        .screen p {
            font-size: 1.2em;
            margin-bottom: 30px;
            text-align: center;
        }
        button {
            padding: 15px 40px;
            font-size: 1.3em;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #ff5252;
        }
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="640" height="400"></canvas>
        
        <div id="startScreen" class="screen active">
            <h1>PUZZLE JUMP</h1>
            <p>箱をスイッチに乗せて扉を開き、<br>ゴール旗を目指そう！</p>
            <p style="font-size: 1em; color: #aaa;">移動: AD or 矢印キー | ジャンプ: W or スペース</p>
            <button onclick="startGame()">START</button>
        </div>
        
        <div id="gameOverScreen" class="screen">
            <h2>GAME OVER</h2>
            <p>穴に落ちてしまいました...</p>
            <button onclick="retryGame()">RETRY</button>
        </div>
        
        <div id="clearScreen" class="screen">
            <h2>STAGE CLEAR!</h2>
            <p id="clearMessage"></p>
            <button id="nextButton" onclick="nextStage()">NEXT STAGE</button>
        </div>
    </div>

    <script>
    // {{GAME_CONFIG}}
    const config = {
        title: 'PUZZLE JUMP',
        bg_color: '#87ceeb',
        platform_color: '#8b4513',
        box_color: '#d2691e',
        switch_color: '#ff4500',
        door_color: '#8b0000',
        goal_color: '#ffd700',
        gravity: 0.5,
        jump_force: -12,
        stage_count: 3
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const gameState = {
        running: false,
        currentStage: 0,
        player: null,
        boxes: [],
        platforms: [],
        switches: [],
        doors: [],
        goal: null
    };

    const keys = {};

    window.addEventListener('keydown', e => {
        keys[e.key] = true;
        e.preventDefault();
    });

    window.addEventListener('keyup', e => {
        keys[e.key] = false;
    });

    const stageData = [
        {
            platforms: [
                { x: 0, y: 350, w: 640, h: 50 }, // 底面
                { x: 150, y: 280, w: 100, h: 20 },
                { x: 380, y: 220, w: 100, h: 20 },
                { x: 550, y: 300, w: 90, h: 20 }
            ],
            holes: [
                { x: 0, y: 400, w: 640, h: 200 }
            ],
            boxes: [
                { x: 170, y: 240, w: 30, h: 30, onSwitch: false }
            ],
            switches: [
                { x: 430, y: 185, r: 10, active: false }
            ],
            doors: [
                { x: 550, y: 240, w: 30, h: 60, open: false }
            ],
            goal: { x: 580, y: 250, w: 30, h: 50 }
        },
        {
            platforms: [
                { x: 0, y: 350, w: 640, h: 50 },
                { x: 80, y: 280, w: 80, h: 20 },
                { x: 220, y: 240, w: 80, h: 20 },
                { x: 360, y: 200, w: 80, h: 20 },
                { x: 500, y: 280, w: 100, h: 20 }
            ],
            holes: [
                { x: 0, y: 400, w: 640, h: 200 }
            ],
            boxes: [
                { x: 100, y: 240, w: 30, h: 30, onSwitch: false },
                { x: 240, y: 200, w: 30, h: 30, onSwitch: false }
            ],
            switches: [
                { x: 410, y: 155, r: 10, active: false },
                { x: 550, y: 245, r: 10, active: false }
            ],
            doors: [
                { x: 450, y: 160, w: 30, h: 40, open: false },
                { x: 580, y: 270, w: 30, h: 10, open: false }
            ],
            goal: { x: 600, y: 230, w: 30, h: 50 }
        },
        {
            platforms: [
                { x: 0, y: 350, w: 640, h: 50 },
                { x: 50, y: 300, w: 80, h: 20 },
                { x: 180, y: 240, w: 100, h: 20 },
                { x: 340, y: 180, w: 100, h: 20 },
                { x: 500, y: 240, w: 80, h: 20 }
            ],
            holes: [
                { x: 0, y: 400, w: 640, h: 200 }
            ],
            boxes: [
                { x: 70, y: 260, w: 30, h: 30, onSwitch: false },
                { x: 200, y: 200, w: 30, h: 30, onSwitch: false },
                { x: 360, y: 140, w: 30, h: 30, onSwitch: false }
            ],
            switches: [
                { x: 130, y: 265, r: 10, active: false },
                { x: 280, y: 205, r: 10, active: false },
                { x: 420, y: 145, r: 10, active: false }
            ],
            doors: [
                { x: 150, y: 260, w: 25, h: 40, open: false },
                { x: 310, y: 200, w: 25, h: 40, open: false },
                { x: 470, y: 140, w: 25, h: 40, open: false }
            ],
            goal: { x: 600, y: 190, w: 30, h: 50 }
        }
    ];

    function startGame() {
        gameState.currentStage = 0;
        loadStage();
    }

    function loadStage() {
        const data = stageData[gameState.currentStage];
        
        gameState.player = {
            x: 20,
            y: 300,
            w: 25,
            h: 35,
            vx: 0,
            vy: 0,
            onGround: false
        };

        gameState.platforms = [...data.platforms];
        gameState.holes = [...data.holes];
        gameState.boxes = data.boxes.map(b => ({...b}));
        gameState.switches = data.switches.map(s => ({...s}));
        gameState.doors = data.doors.map(d => ({...d}));
        gameState.goal = {...data.goal};

        document.getElementById('startScreen').classList.remove('active');
        document.getElementById('gameOverScreen').classList.remove('active');
        document.getElementById('clearScreen').classList.remove('active');

        gameState.running = true;
        requestAnimationFrame(gameLoop);
    }

    function handleInput() {
        const speed = 5;
        gameState.player.vx = 0;

        if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
            gameState.player.vx = -speed;
        }
        if (keys['ArrowRight'] || keys['d'] || keys['D']) {
            gameState.player.vx = speed;
        }

        if ((keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' ']) && gameState.player.onGround) {
            gameState.player.vy = config.jump_force;
            gameState.player.onGround = false;
        }
    }

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.w &&
               rect1.x + rect1.w > rect2.x &&
               rect1.y < rect2.y + rect2.h &&
               rect1.y + rect1.h > rect2.y;
    }

    function update() {
        const player = gameState.player;

        // 重力
        player.vy += config.gravity;

        // プレイヤー移動
        player.x += player.vx;
        player.y += player.vy;

        // プラットフォーム衝突
        player.onGround = false;
        for (let platform of gameState.platforms) {
            if (checkCollision(player, platform)) {
                if (player.vy > 0) {
                    player.y = platform.y - player.h;
                    player.vy = 0;
                    player.onGround = true;
                } else if (player.vy < 0) {
                    player.y = platform.y + platform.h;
                    player.vy = 0;
                }
            }
        }

        // 穴判定
        for (let hole of gameState.holes) {
            if (checkCollision(player, hole)) {
                gameOver();
                return;
            }
        }

        // 箱の移動と衝突
        for (let box of gameState.boxes) {
            box.vy = (box.vy || 0) + config.gravity;
            box.x += (box.vx || 0);
            box.y += box.vy;

            // プラットフォーム衝突
            for (let platform of gameState.platforms) {
                if (checkCollision(box, platform)) {
                    if (box.vy > 0) {
                        box.y = platform.y - box.h;
                        box.vy = 0;
                    } else if (box.vy < 0) {
                        box.y = platform.y + platform.h;
                        box.vy = 0;
                    }
                }
            }

            // プレイヤーが箱を押す
            if (checkCollision(player, box)) {
                if (player.vx > 0) {
                    box.vx = 5;
                    player.x = box.x - player.w;
                } else if (player.vx < 0) {
                    box.vx = -5;
                    player.x = box.x + box.w;
                }
            } else {
                box.vx = 0;
            }

            // 穴に落ちた箱
            for (let hole of gameState.holes) {
                if (checkCollision(box, hole)) {
                    box.y = -100;
                }
            }
        }

        // スイッチ判定
        for (let i = 0; i < gameState.switches.length; i++) {
            const sw = gameState.switches[i];
            sw.active = false;
            for (let box of gameState.boxes) {
                const dist = Math.sqrt(Math.pow(box.x + box.w/2 - sw.x, 2) + 
                                      Math.pow(box.y + box.h/2 - sw.y, 2));
                if (dist < sw.r + 15) {
                    sw.active = true;
                    break;
                }
            }
        }

        // 扉の開閉
        for (let i = 0; i < gameState.doors.length; i++) {
            gameState.doors[i].open = gameState.switches[i] && gameState.switches[i].active;
        }

        // 扉と衝突（開いていない場合）
        for (let door of gameState.doors) {
            if (!door.open && checkCollision(player, door)) {
                if (player.vx > 0) {
                    player.x = door.x - player.w;
                } else if (player.vx < 0) {
                    player.x = door.x + door.w;
                }
            }
        }

        // ゴール判定
        if (checkCollision(player, gameState.goal)) {
            stageComplete();
        }
    }

    function draw() {
        ctx.fillStyle = config.bg_color;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // プラットフォーム
        ctx.fillStyle = config.platform_color;
        for (let platform of gameState.platforms) {
            ctx.fillRect(platform.x, platform.y, platform.w, platform.h);
        }

        // 箱
        ctx.fillStyle = config.box_color;
        for (let box of gameState.boxes) {
            ctx.fillRect(box.x, box.y, box.w, box.h);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.strokeRect(box.x, box.y, box.w, box.h);
        }

        // スイッチ
        for (let sw of gameState.switches) {
            ctx.fillStyle = sw.active ? '#00ff00' : config.switch_color;
            ctx.beginPath();
            ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // 扉
        ctx.fillStyle = gameState.doors[0].open ? '#00aa00' : config.door_color;
        for (let door of gameState.doors) {
            if (door.open) {
                ctx.fillStyle = '#00aa00';
            } else {
                ctx.fillStyle = config.door_color;
            }
            ctx.fillRect(door.x, door.y, door.w, door.h);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.strokeRect(door.x, door.y, door.w, door.h);
        }

        // ゴール旗
        const goal = gameState.goal;
        ctx.fillStyle = config.goal_color;
        ctx.fillRect(goal.x + 10, goal.y + 25, 10, 25);
        ctx.fillRect(goal.x, goal.y, 30, 8);
        ctx.beginPath();
        ctx.moveTo(goal.x + 20, goal.y + 8);
        ctx.lineTo(goal.x + 30, goal.y + 8);
        ctx.lineTo(goal.x + 20, goal.y + 20);
        ctx.closePath();
        ctx.fill();

        // プレイヤー
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(gameState.player.x, gameState.player.y, gameState.player.w, gameState.player.h);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.strokeRect(gameState.player.x, gameState.player.y, gameState.player.w, gameState.player.h);
    }

    function gameLoop() {
        if (!gameState.running) return;
        handleInput();
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        gameState.running = false;
        document.getElementById('gameOverScreen').classList.add('active');
    }

    function stageComplete() {
        gameState.running = false;
        const isLastStage = gameState.currentStage === config.stage_count - 1;
        document.getElementById('clearMessage').textContent = 
            isLastStage ? 'すべてのステージをクリアしました！' : 'ステージ ' + (gameState.currentStage + 2) + ' へ進みます';
        document.getElementById('nextButton').textContent = 
            isLastStage ? 'RESTART' : 'NEXT STAGE';
        document.getElementById('clearScreen').classList.add('active');
    }

    function nextStage() {
        gameState.currentStage++;
        if (gameState.currentStage >= config.stage_count) {
            startGame();
        } else {
            loadStage();
        }
    }

    function retryGame() {
        document.getElementById('startScreen').classList.add('active');
        document.getElementById('gameOverScreen').classList.remove('active');
        document.getElementById('clearScreen').classList.remove('active');
        gameState.running = false;
    }
    </script>
</body>
</html>
