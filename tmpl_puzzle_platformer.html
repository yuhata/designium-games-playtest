<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUZZLE JUMP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 640px;
            height: 400px;
        }
        canvas {
            display: block;
            background: #87ceeb;
            border: 3px solid #333;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            z-index: 100;
        }
        .screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-align: center;
        }
        .screen p {
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
        }
        button {
            padding: 15px 40px;
            font-size: 20px;
            background: #ff6600;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #ff8833;
        }
        #stageInfo {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #333;
            font-size: 16px;
            font-weight: bold;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="640" height="400"></canvas>
        <div id="stageInfo"></div>
        
        <div id="startScreen" class="screen">
            <h1>PUZZLE JUMP</h1>
            <p>矢印キーまたはADキーで移動<br>Wキーまたはスペースでジャンプ<br>箱をスイッチに乗せて扉を開け、ゴール旗に到達しよう！</p>
            <button onclick="startGame()">START</button>
        </div>
        
        <div id="gameOverScreen" class="screen" style="display: none;">
            <h1>GAME OVER</h1>
            <p>穴に落ちてしまいました...</p>
            <button onclick="retryStage()">RETRY</button>
        </div>
        
        <div id="clearScreen" class="screen" style="display: none;">
            <h1>STAGE CLEAR!</h1>
            <p id="clearMessage"></p>
            <button onclick="nextStage()">NEXT</button>
        </div>
    </div>

    <script>
        // {{GAME_CONFIG}}
        const config = {
            title: 'PUZZLE JUMP',
            bg_color: '#87ceeb',
            platform_color: '#8b4513',
            box_color: '#d2691e',
            switch_color: '#ff4500',
            door_color: '#8b0000',
            goal_color: '#ffd700',
            gravity: 0.5,
            jump_force: -12,
            stage_count: 3
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const keys = {};

        const gameState = {
            running: false,
            currentStage: 1,
            playerSpawnX: 50,
            playerSpawnY: 250
        };

        const player = {
            x: gameState.playerSpawnX,
            y: gameState.playerSpawnY,
            w: 25,
            h: 35,
            vx: 0,
            vy: 0,
            onGround: false,
            speed: 4
        };

        let platforms = [];
        let boxes = [];
        let switches = [];
        let doors = [];
        let goal = {};

        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            e.preventDefault();
        });

        window.addEventListener('keyup', e => {
            keys[e.key] = false;
        });

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState.currentStage = 1;
            loadStage(1);
        }

        function retryStage() {
            document.getElementById('gameOverScreen').style.display = 'none';
            loadStage(gameState.currentStage);
        }

        function nextStage() {
            document.getElementById('clearScreen').style.display = 'none';
            gameState.currentStage++;
            if (gameState.currentStage > config.stage_count) {
                document.getElementById('startScreen').style.display = 'flex';
                const heading = document.querySelector('#startScreen h1');
                heading.textContent = 'GAME COMPLETE!';
                const para = document.querySelector('#startScreen p');
                para.textContent = 'すべてのステージをクリアしました！';
                document.querySelector('#startScreen button').textContent = 'もう一度プレイ';
            } else {
                loadStage(gameState.currentStage);
            }
        }

        function gameOver() {
            gameState.running = false;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function stageClear() {
            gameState.running = false;
            document.getElementById('clearMessage').textContent = 'ステージ ' + gameState.currentStage + ' をクリアしました！';
            document.getElementById('clearScreen').style.display = 'flex';
        }

        function loadStage(stageNum) {
            player.x = gameState.playerSpawnX;
            player.y = gameState.playerSpawnY;
            player.vx = 0;
            player.vy = 0;
            player.onGround = false;

            platforms = [];
            boxes = [];
            switches = [];
            doors = [];
            goal = { x: 560, y: 280, w: 30, h: 50 };

            if (stageNum === 1) {
                // Stage 1: Simple jump and push
                platforms = [
                    { x: 0, y: 380, w: 640, h: 20 }, // ground
                    { x: 150, y: 320, w: 120, h: 20 },
                    { x: 350, y: 280, w: 100, h: 20 },
                    { x: 550, y: 330, w: 90, h: 20 }
                ];
                boxes = [
                    { x: 200, y: 285, w: 30, h: 30, vx: 0, vy: 0, onGround: false }
                ];
                switches = [
                    { x: 360, y: 250, w: 40, h: 20, activated: false }
                ];
                doors = [
                    { x: 480, y: 300, w: 25, h: 80, open: false }
                ];
            } else if (stageNum === 2) {
                // Stage 2: Multiple boxes and switches
                platforms = [
                    { x: 0, y: 380, w: 640, h: 20 }, // ground
                    { x: 80, y: 300, w: 100, h: 20 },
                    { x: 250, y: 260, w: 100, h: 20 },
                    { x: 420, y: 300, w: 100, h: 20 },
                    { x: 550, y: 250, w: 90, h: 20 }
                ];
                boxes = [
                    { x: 120, y: 265, w: 30, h: 30, vx: 0, vy: 0, onGround: false },
                    { x: 310, y: 225, w: 30, h: 30, vx: 0, vy: 0, onGround: false }
                ];
                switches = [
                    { x: 270, y: 230, w: 40, h: 20, activated: false },
                    { x: 450, y: 265, w: 40, h: 20, activated: false }
                ];
                doors = [
                    { x: 200, y: 200, w: 25, h: 80, open: false },
                    { x: 380, y: 240, w: 25, h: 80, open: false }
                ];
            } else if (stageNum === 3) {
                // Stage 3: Complex puzzle
                platforms = [
                    { x: 0, y: 380, w: 640, h: 20 }, // ground
                    { x: 50, y: 320, w: 80, h: 20 },
                    { x: 200, y: 280, w: 80, h: 20 },
                    { x: 350, y: 300, w: 80, h: 20 },
                    { x: 500, y: 260, w: 80, h: 20 },
                    { x: 550, y: 200, w: 50, h: 20 }
                ];
                boxes = [
                    { x: 100, y: 285, w: 30, h: 30, vx: 0, vy: 0, onGround: false },
                    { x: 280, y: 245, w: 30, h: 30, vx: 0, vy: 0, onGround: false }
                ];
                switches = [
                    { x: 220, y: 250, w: 40, h: 20, activated: false },
                    { x: 430, y: 265, w: 40, h: 20, activated: false }
                ];
                doors = [
                    { x: 150, y: 240, w: 25, h: 80, open: false },
                    { x: 470, y: 220, w: 25, h: 80, open: false }
                ];
            }

            document.getElementById('stageInfo').textContent = 'STAGE ' + stageNum;
            gameState.running = true;
            requestAnimationFrame(gameLoop);
        }

        function handleInput() {
            player.vx = 0;
            if (keys['a'] || keys['A'] || keys['ArrowLeft']) {
                player.vx = -player.speed;
            }
            if (keys['d'] || keys['D'] || keys['ArrowRight']) {
                player.vx = player.speed;
            }
            if ((keys['w'] || keys['W'] || keys[' ']) && player.onGround) {
                player.vy = config.jump_force;
                player.onGround = false;
            }
        }

        function update() {
            if (!gameState.running) return;

            // Apply gravity
            player.vy += config.gravity;

            // Update player position
            player.x += player.vx;
            player.y += player.vy;

            // Boundary check - prevent leaving canvas
            player.x = Math.max(0, Math.min(player.x, canvas.width - player.w));

            // Check if fell into hole
            if (player.y > canvas.height) {
                gameOver();
                return;
            }

            player.onGround = false;

            // Platform collision
            for (let platform of platforms) {
                if (
                    player.x + player.w > platform.x &&
                    player.x < platform.x + platform.w &&
                    player.y + player.h >= platform.y &&
                    player.y + player.h <= platform.y + platform.h + 5 &&
                    player.vy >= 0
                ) {
                    player.y = platform.y - player.h;
                    player.vy = 0;
                    player.onGround = true;
                }
            }

            // Update boxes
            for (let box of boxes) {
                box.vy += config.gravity;
                box.x += box.vx;
                box.y += box.vy;

                box.vx *= 0.95; // Friction

                // Box boundary
                box.x = Math.max(0, Math.min(box.x, canvas.width - box.w));

                // Box falls into hole
                if (box.y > canvas.height) {
                    box.y = 380;
                    box.x = gameState.playerSpawnX + 50;
                    box.vx = 0;
                    box.vy = 0;
                }

                box.onGround = false;

                // Box platform collision
                for (let platform of platforms) {
                    if (
                        box.x + box.w > platform.x &&
                        box.x < platform.x + platform.w &&
                        box.y + box.h >= platform.y &&
                        box.y + box.h <= platform.y + platform.h + 5 &&
                        box.vy >= 0
                    ) {
                        box.y = platform.y - box.h;
                        box.vy = 0;
                        box.onGround = true;
                    }
                }

                // Player push box
                if (
                    player.x + player.w > box.x &&
                    player.x < box.x + box.w &&
                    player.y + player.h > box.y &&
                    player.y < box.y + box.h
                ) {
                    if (player.vx > 0) {
                        box.vx = player.speed * 1.5;
                        player.x = box.x - player.w;
                    } else if (player.vx < 0) {
                        box.vx = -player.speed * 1.5;
                        player.x = box.x + box.w;
                    }
                }
            }

            // Check switches
            for (let i = 0; i < switches.length; i++) {
                let sw = switches[i];
                let activated = false;
                for (let box of boxes) {
                    if (
                        box.x + box.w > sw.x &&
                        box.x < sw.x + sw.w &&
                        box.y + box.h >= sw.y &&
                        box.y + box.h <= sw.y + sw.h + 5 &&
                        box.onGround
                    ) {
                        activated = true;
                        break;
                    }
                }
                sw.activated = activated;
            }

            // Open doors based on switches
            for (let i = 0; i < doors.length; i++) {
                doors[i].open = switches[i] && switches[i].activated;
            }

            // Player door collision (block if closed)
            for (let door of doors) {
                if (!door.open) {
                    if (
                        player.x + player.w > door.x &&
                        player.x < door.x + door.w &&
                        player.y + player.h > door.y &&
                        player.y < door.y + door.h
                    ) {
                        if (player.vx > 0) {
                            player.x = door.x - player.w;
                        } else if (player.vx < 0) {
                            player.x = door.x + door.w;
                        }
                    }
                }
            }

            // Check goal collision
            if (
                player.x + player.w > goal.x &&
                player.x < goal.x + goal.w &&
                player.y + player.h > goal.y &&
                player.y < goal.y + goal.h
            ) {
                stageClear();
            }
        }

        function draw() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw platforms
            ctx.fillStyle = config.platform_color;
            for (let platform of platforms) {
                ctx.fillRect(platform.x, platform.y, platform.w, platform.h);
            }

            // Draw boxes
            ctx.fillStyle = config.box_color;
            for (let box of boxes) {
                ctx.fillRect(box.x, box.y, box.w, box.h);
            }

            // Draw switches
            ctx.fillStyle = config.switch_color;
            for (let sw of switches) {
                ctx.globalAlpha = sw.activated ? 0.5 : 1;
                ctx.fillRect(sw.x, sw.y, sw.w, sw.h);
                ctx.globalAlpha = 1;
            }

            // Draw doors
            ctx.fillStyle = config.door_color;
            for (let door of doors) {
                ctx.globalAlpha = door.open ? 0.3 : 1;
                ctx.fillRect(door.x, door.y, door.w, door.h);
                ctx.globalAlpha = 1;
            }

            // Draw goal
            ctx.fillStyle = config.goal_color;
            ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
            ctx.fillStyle = '#333';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('G', goal.x + goal.w / 2, goal.y + goal.h / 2);

            // Draw player
            ctx.fillStyle = '#0066cc';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(player.x + 7, player.y + 8, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(player.x + 18, player.y + 8, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function gameLoop() {
            if (!gameState.running) return;
            handleInput();
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
