<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUZZLE JUMP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #333;
            font-family: Arial, sans-serif;
        }
        
        #gameContainer {
            position: relative;
            width: 640px;
            height: 400px;
            background-color: #87ceeb;
            border: 3px solid #333;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 100;
        }
        
        .screen.active {
            display: flex;
        }
        
        .screen h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .screen p {
            color: white;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .screen button {
            padding: 15px 40px;
            font-size: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .screen button:hover {
            background-color: #45a049;
        }
        
        #stageInfo {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="640" height="400"></canvas>
        <div id="stageInfo">STAGE <span id="stageName">1</span></div>
        
        <div id="startScreen" class="screen active">
            <h1>PUZZLE JUMP</h1>
            <p>Move: A/D or Arrow Keys</p>
            <p>Jump: W or Space</p>
            <p>Push boxes onto switches to open doors!</p>
            <button onclick="startGame()">START</button>
        </div>
        
        <div id="gameOverScreen" class="screen">
            <h1>GAME OVER</h1>
            <p>You fell into a hole!</p>
            <button onclick="retryGame()">RETRY</button>
        </div>
        
        <div id="clearScreen" class="screen">
            <h1>STAGE CLEAR!</h1>
            <button onclick="nextStage()">NEXT</button>
        </div>
    </div>

    <script>
        // {{GAME_CONFIG}}
        const config = {
            title: 'PUZZLE JUMP',
            bg_color: '#87ceeb',
            platform_color: '#8b4513',
            box_color: '#d2691e',
            switch_color: '#ff4500',
            door_color: '#8b0000',
            goal_color: '#ffd700',
            gravity: 0.5,
            jump_force: -12,
            stage_count: 3
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game State
        const gameState = {
            running: false,
            currentStage: 0,
            player: null,
            boxes: [],
            platforms: [],
            switches: [],
            doors: [],
            goal: null,
            activatedSwitches: new Set()
        };

        // Player Object
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 20;
                this.height = 30;
                this.velocityX = 0;
                this.velocityY = 0;
                this.jumping = false;
                this.spawnX = x;
                this.spawnY = y;
            }

            update() {
                this.velocityY += config.gravity;
                this.x += this.velocityX;
                this.y += this.velocityY;

                // Check collision with platforms
                for (let platform of gameState.platforms) {
                    if (this.isColliding(platform)) {
                        if (this.velocityY > 0) {
                            this.y = platform.y - this.height;
                            this.velocityY = 0;
                            this.jumping = false;
                        } else if (this.velocityY < 0) {
                            this.y = platform.y + platform.height;
                            this.velocityY = 0;
                        }
                    }
                }

                // Check collision with boxes
                for (let box of gameState.boxes) {
                    if (this.isColliding(box)) {
                        if (this.velocityY > 0) {
                            this.y = box.y - this.height;
                            this.velocityY = 0;
                            this.jumping = false;
                        } else if (this.velocityY < 0) {
                            this.y = box.y + box.height;
                            this.velocityY = 0;
                        }
                    }
                }

                // Check collision with doors
                for (let door of gameState.doors) {
                    if (door.activated && this.isColliding(door)) {
                        // Can pass through activated doors
                    } else if (!door.activated && this.isColliding(door)) {
                        if (this.velocityY > 0) {
                            this.y = door.y - this.height;
                            this.velocityY = 0;
                            this.jumping = false;
                        }
                    }
                }

                // Check goal
                if (this.isColliding(gameState.goal)) {
                    gameState.running = false;
                    showScreen('clearScreen');
                }

                // Fall detection
                if (this.y > canvas.height) {
                    gameState.running = false;
                    showScreen('gameOverScreen');
                }

                // Friction
                this.velocityX *= 0.95;
            }

            isColliding(obj) {
                return this.x < obj.x + obj.width &&
                       this.x + this.width > obj.x &&
                       this.y < obj.y + obj.height &&
                       this.y + this.height > obj.y;
            }

            draw() {
                ctx.fillStyle = '#ff6b6b';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // Eyes
                ctx.fillStyle = 'white';
                ctx.fillRect(this.x + 5, this.y + 8, 4, 4);
                ctx.fillRect(this.x + 11, this.y + 8, 4, 4);
            }
        }

        // Box Object
        class Box {
            constructor(x, y, width, height) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.velocityX = 0;
                this.velocityY = 0;
            }

            update() {
                this.velocityY += config.gravity;
                this.x += this.velocityX;
                this.y += this.velocityY;

                // Collision with platforms
                for (let platform of gameState.platforms) {
                    if (this.isColliding(platform)) {
                        if (this.velocityY > 0) {
                            this.y = platform.y - this.height;
                            this.velocityY = 0;
                        }
                    }
                }

                // Collision with other boxes
                for (let box of gameState.boxes) {
                    if (box !== this && this.isColliding(box)) {
                        if (this.velocityY > 0) {
                            this.y = box.y - this.height;
                            this.velocityY = 0;
                        }
                    }
                }

                // Check switches
                for (let i = 0; i < gameState.switches.length; i++) {
                    let switchObj = gameState.switches[i];
                    if (this.isColliding(switchObj)) {
                        gameState.activatedSwitches.add(i);
                        if (gameState.doors[i]) {
                            gameState.doors[i].activated = true;
                        }
                    }
                }

                // Fall detection
                if (this.y > canvas.height) {
                    this.reset();
                }

                this.velocityX *= 0.95;
            }

            isColliding(obj) {
                return this.x < obj.x + obj.width &&
                       this.x + this.width > obj.x &&
                       this.y < obj.y + obj.height &&
                       this.y + this.height > obj.y;
            }

            reset() {
                this.y = -100;
                this.velocityX = 0;
                this.velocityY = 0;
            }

            draw() {
                ctx.fillStyle = config.box_color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = '#8b4513';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
            }
        }

        // Platform Object
        class Platform {
            constructor(x, y, width, height) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
            }

            draw() {
                ctx.fillStyle = config.platform_color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = '#654321';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
            }
        }

        // Switch Object
        class Switch {
            constructor(x, y, radius = 8) {
                this.x = x;
                this.y = y;
                this.radius = radius;
            }

            draw(activated) {
                ctx.fillStyle = activated ? '#00ff00' : config.switch_color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        // Door Object
        class Door {
            constructor(x, y, width, height) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.activated = false;
            }

            draw() {
                ctx.fillStyle = this.activated ? '#00aa00' : config.door_color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
            }
        }

        // Goal Object
        class Goal {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 40;
            }

            draw() {
                // Pole
                ctx.fillStyle = '#8b4513';
                ctx.fillRect(this.x + 12, this.y + 20, 6, 20);
                // Flag
                ctx.fillStyle = config.goal_color;
                ctx.beginPath();
                ctx.moveTo(this.x + 18, this.y + 20);
                ctx.lineTo(this.x + 28, this.y + 10);
                ctx.lineTo(this.x + 28, this.y + 30);
                ctx.closePath();
                ctx.fill();
            }
        }

        // Stage Data
        const stageData = [
            {
                platforms: [
                    { x: 0, y: 350, w: 640, h: 50 },
                    { x: 200, y: 300, w: 100, h: 20 },
                    { x: 450, y: 250, w: 150, h: 20 }
                ],
                boxes: [
                    { x: 250, y: 250, w: 40, h: 40 }
                ],
                switches: [
                    { x: 250, y: 275 }
                ],
                doors: [
                    { x: 490, y: 200, w: 40, h: 50 }
                ],
                goal: { x: 580, y: 280 },
                playerStart: { x: 50, y: 300 }
            },
            {
                platforms: [
                    { x: 0, y: 350, w: 640, h: 50 },
                    { x: 100, y: 280, w: 100, h: 20 },
                    { x: 250, y: 250, w: 100, h: 20 },
                    { x: 420, y: 220, w: 100, h: 20 }
                ],
                boxes: [
                    { x: 120, y: 240, w: 35, h: 35 },
                    { x: 280, y: 210, w: 35, h: 35 }
                ],
                switches: [
                    { x: 150, y: 275 },
                    { x: 300, y: 245 }
                ],
                doors: [
                    { x: 180, y: 230, w: 40, h: 50 },
                    { x: 380, y: 170, w: 40, h: 50 }
                ],
                goal: { x: 550, y: 250 },
                playerStart: { x: 30, y: 300 }
            },
            {
                platforms: [
                    { x: 0, y: 350, w: 640, h: 50 },
                    { x: 80, y: 280, w: 80, h: 20 },
                    { x: 200, y: 220, w: 80, h: 20 },
                    { x: 320, y: 260, w: 80, h: 20 },
                    { x: 450, y: 180, w: 100, h: 20 }
                ],
                boxes: [
                    { x: 120, y: 240, w: 35, h: 35 },
                    { x: 280, y: 180, w: 35, h: 35 }
                ],
                switches: [
                    { x: 240, y: 245 },
                    { x: 360, y: 290 }
                ],
                doors: [
                    { x: 260, y: 170, w: 40, h: 50 },
                    { x: 420, y: 130, w: 40, h: 50 }
                ],
                goal: { x: 560, y: 220 },
                playerStart: { x: 30, y: 300 }
            }
        ];

        function loadStage(stageIndex) {
            if (stageIndex >= config.stage_count) {
                stageIndex = 0;
                gameState.currentStage = 0;
            }

            const stage = stageData[stageIndex];
            document.getElementById('stageName').textContent = stageIndex + 1;

            gameState.platforms = stage.platforms.map(p => new Platform(p.x, p.y, p.w, p.h));
            gameState.boxes = stage.boxes.map(b => new Box(b.x, b.y, b.w, b.h));
            gameState.switches = stage.switches.map(s => new Switch(s.x, s.y));
            gameState.doors = stage.doors.map(d => new Door(d.x, d.y, d.w, d.h));
            gameState.goal = new Goal(stage.goal.x, stage.goal.y);
            gameState.player = new Player(stage.playerStart.x, stage.playerStart.y);
            gameState.activatedSwitches.clear();

            gameState.running = true;
        }

        function showScreen(screenId) {
            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('gameOverScreen').classList.remove('active');
            document.getElementById('clearScreen').classList.remove('active');
            document.getElementById(screenId).classList.add('active');
        }

        function startGame() {
            gameState.currentStage = 0;
            showScreen('gameOverScreen');
            document.getElementById('gameOverScreen').classList.remove('active');
            loadStage(0);
        }

        function retryGame() {
            showScreen('startScreen');
            gameState.running = false;
        }

        function nextStage() {
            gameState.currentStage++;
            if (gameState.currentStage >= config.stage_count) {
                showScreen('startScreen');
                gameState.currentStage = 0;
            } else {
                loadStage(gameState.currentStage);
            }
        }

        // Input Handling
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') e.preventDefault();
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function handleInput() {
            if (keys['a'] || keys['arrowleft']) {
                gameState.player.velocityX = -5;
            }
            if (keys['d'] || keys['arrowright']) {
                gameState.player.velocityX = 5;
            }
            if ((keys['w'] || keys[' ']) && !gameState.player.jumping) {
                gameState.player.velocityY = config.jump_force;
                gameState.player.jumping = true;
            }
        }

        function update() {
            if (!gameState.running) return;

            handleInput();
            gameState.player.update();
            gameState.boxes.forEach(box => box.update());
        }

        function draw() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            gameState.platforms.forEach(p => p.draw());
            gameState.boxes.forEach(b => b.draw());
            gameState.doors.forEach((d, i) => d.draw());
            gameState.switches.forEach((s, i) => s.draw(gameState.activatedSwitches.has(i)));
            gameState.goal.draw();
            gameState.player.draw();
        }

        function gameLoop() {
            update();
            draw();
            if (gameState.running) {
                requestAnimationFrame(gameLoop);
            }
        }

        // Start
        document.addEventListener('DOMContentLoaded', () => {
            showScreen('startScreen');
        });
    </script>
</body>
</html>
