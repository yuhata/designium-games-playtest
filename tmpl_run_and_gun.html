<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN & GUN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            background-color: #0a0a1a;
        }
        canvas {
            display: block;
            background-color: #0a0a1a;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            font-size: 28px;
            text-align: center;
            z-index: 10;
        }
        .overlay.active {
            display: flex;
        }
        .overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .overlay p {
            font-size: 16px;
            margin-bottom: 30px;
            color: #aaa;
        }
        .overlay button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 20px;
            cursor: pointer;
            background-color: #68d391;
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        .overlay button:hover {
            background-color: #56c987;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="startScreen" class="overlay active">
            <h1>RUN & GUN</h1>
            <p>Reach the target distance to win!</p>
            <p>SPACE: Jump | Z: Shoot</p>
            <button onclick="startGame()">START</button>
        </div>
        <div id="gameOverScreen" class="overlay">
            <h1>GAME OVER</h1>
            <p>You lost all your HP</p>
            <button onclick="retryGame()">RETRY</button>
        </div>
        <div id="clearScreen" class="overlay">
            <h1>CLEAR!</h1>
            <p>You reached the target!</p>
            <button onclick="retryGame()">RETRY</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const config = {
            title: 'RUN & GUN',
            bg_color: '#0a0a1a',
            ground_color: '#2d3748',
            player_color: '#68d391',
            enemy_color: '#fc8181',
            bullet_color: '#f6e05e',
            player_hp: 3,
            scroll_speed: 3,
            bullet_speed: 8,
            win_distance: 500
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 500;
        canvas.height = 350;
        document.getElementById('gameContainer').style.width = canvas.width + 'px';
        document.getElementById('gameContainer').style.height = canvas.height + 'px';

        const PLAYER_SCREEN_X = 100;
        const GROUND_Y = canvas.height - 80;
        const PLAYER_WIDTH = 20;
        const PLAYER_HEIGHT = 30;
        const ENEMY_WIDTH = 25;
        const ENEMY_HEIGHT = 30;

        const gameState = {
            running: false,
            cameraX: 0,
            playerY: GROUND_Y - PLAYER_HEIGHT,
            playerVelocityY: 0,
            playerHP: config.player_hp,
            playerInvincibleTimer: 0,
            enemies: [],
            bullets: [],
            enemySpawnTimer: 0
        };

        window.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                if (gameState.running && isPlayerOnGround()) {
                    gameState.playerVelocityY = -12;
                }
            }
            if (e.key === 'z' || e.key === 'Z') {
                if (gameState.running) {
                    const playerWorldX = gameState.cameraX + PLAYER_SCREEN_X;
                    gameState.bullets.push({
                        worldX: playerWorldX + PLAYER_WIDTH,
                        worldY: gameState.playerY + PLAYER_HEIGHT / 2 - 2,
                        width: 8,
                        height: 4
                    });
                }
            }
        });

        function isPlayerOnGround() {
            return gameState.playerY >= GROUND_Y - PLAYER_HEIGHT - 1;
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState.running = true;
            gameState.cameraX = 0;
            gameState.playerY = GROUND_Y - PLAYER_HEIGHT;
            gameState.playerVelocityY = 0;
            gameState.playerHP = config.player_hp;
            gameState.playerInvincibleTimer = 0;
            gameState.enemies = [];
            gameState.bullets = [];
            gameState.enemySpawnTimer = 0;
            gameLoop();
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function update() {
            if (!gameState.running) return;

            gameState.cameraX += config.scroll_speed;

            gameState.playerVelocityY += 0.5;
            gameState.playerY += gameState.playerVelocityY;

            if (gameState.playerY > GROUND_Y - PLAYER_HEIGHT) {
                gameState.playerY = GROUND_Y - PLAYER_HEIGHT;
                gameState.playerVelocityY = 0;
            }

            if (gameState.playerInvincibleTimer > 0) {
                gameState.playerInvincibleTimer--;
            }

            gameState.enemySpawnTimer++;
            if (gameState.enemySpawnTimer > 90) {
                gameState.enemySpawnTimer = 0;
                const spawnY = Math.random() > 0.5 ? GROUND_Y - ENEMY_HEIGHT - 10 : GROUND_Y - 120;
                gameState.enemies.push({
                    worldX: gameState.cameraX + canvas.width + 100,
                    worldY: spawnY,
                    width: ENEMY_WIDTH,
                    height: ENEMY_HEIGHT
                });
            }

            gameState.enemies = gameState.enemies.filter(enemy => {
                enemy.worldX -= 1.5;
                return enemy.worldX > -50;
            });

            gameState.bullets = gameState.bullets.filter(bullet => {
                bullet.worldX += config.bullet_speed;
                return bullet.worldX < gameState.cameraX + canvas.width + 100;
            });

            for (let i = gameState.bullets.length - 1; i >= 0; i--) {
                for (let j = gameState.enemies.length - 1; j >= 0; j--) {
                    const bullet = gameState.bullets[i];
                    const enemy = gameState.enemies[j];
                    if (checkCollision(
                        { x: bullet.worldX, y: bullet.worldY, width: bullet.width, height: bullet.height },
                        { x: enemy.worldX, y: enemy.worldY, width: enemy.width, height: enemy.height }
                    )) {
                        gameState.bullets.splice(i, 1);
                        gameState.enemies.splice(j, 1);
                        break;
                    }
                }
            }

            const playerWorldX = gameState.cameraX + PLAYER_SCREEN_X;
            for (let enemy of gameState.enemies) {
                if (checkCollision(
                    { x: playerWorldX, y: gameState.playerY, width: PLAYER_WIDTH, height: PLAYER_HEIGHT },
                    { x: enemy.worldX, y: enemy.worldY, width: enemy.width, height: enemy.height }
                )) {
                    if (gameState.playerInvincibleTimer === 0) {
                        gameState.playerHP--;
                        gameState.playerInvincibleTimer = 60;
                        if (gameState.playerHP <= 0) {
                            gameState.running = false;
                            document.getElementById('gameOverScreen').style.display = 'flex';
                            return;
                        }
                    }
                }
            }

            if (gameState.cameraX >= config.win_distance) {
                gameState.running = false;
                document.getElementById('clearScreen').style.display = 'flex';
                return;
            }
        }

        function draw() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = config.ground_color;
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);

            if (gameState.playerInvincibleTimer > 0 && Math.floor(gameState.playerInvincibleTimer / 10) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }
            ctx.fillStyle = config.player_color;
            ctx.fillRect(PLAYER_SCREEN_X, gameState.playerY, PLAYER_WIDTH, PLAYER_HEIGHT);
            ctx.globalAlpha = 1;

            ctx.fillStyle = config.enemy_color;
            for (let enemy of gameState.enemies) {
                const screenX = enemy.worldX - gameState.cameraX;
                if (screenX > -50 && screenX < canvas.width + 50) {
                    ctx.fillRect(screenX, enemy.worldY, enemy.width, enemy.height);
                }
            }

            ctx.fillStyle = config.bullet_color;
            for (let bullet of gameState.bullets) {
                const screenX = bullet.worldX - gameState.cameraX;
                if (screenX > -10 && screenX < canvas.width + 10) {
                    ctx.fillRect(screenX, bullet.worldY, bullet.width, bullet.height);
                }
            }

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 16px Arial';
            ctx.fillText('HP: ' + gameState.playerHP, 10, 25);
            ctx.fillText('Distance: ' + Math.floor(gameState.cameraX) + ' / ' + config.win_distance, 10, 50);
            ctx.font = '14px Arial';
            ctx.fillText('SPACE: Jump | Z: Shoot', 10, canvas.height - 10);
        }

        function gameLoop() {
            update();
            draw();
            if (gameState.running) {
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
