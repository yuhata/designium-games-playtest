<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN & GUN Template</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            border: 2px solid #333;
        }
        canvas {
            display: block;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
            background: rgba(10, 10, 26, 0.9);
            color: #fff;
            font-size: 24px;
            text-align: center;
        }
        .screen h1 {
            font-size: 48px;
            margin-bottom: 30px;
        }
        .screen p {
            margin: 15px 0;
            font-size: 16px;
            line-height: 1.5;
        }
        .screen button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background: #68d391;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .screen button:hover {
            background: #48bb78;
        }
        #startScreen {
            display: flex;
        }
        #gameOverScreen {
            display: none;
        }
        #clearScreen {
            display: none;
        }
        #gameOverScreen h1 {
            color: #fc8181;
        }
        #clearScreen h1 {
            color: #68d391;
        }
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            z-index: 5;
            pointer-events: none;
        }
        .controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #aaa;
            font-size: 12px;
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="startScreen" class="screen">
            <h1>RUN & GUN</h1>
            <p>走り続けながら敵を撃ち落とせ！</p>
            <p id="startClearCondition">クリア条件: 3000m走る</p>
            <p>ゲームオーバー: HPが0になる</p>
            <p style="font-size: 14px; margin-top: 20px;">
                Space キー: ジャンプ<br>
                Z キー: 射撃
            </p>
            <button onclick="startGame()">START</button>
        </div>
        
        <div id="gameOverScreen" class="screen">
            <h1>GAME OVER</h1>
            <p id="gameOverDistance"></p>
            <button onclick="retryGame()">RETRY</button>
        </div>
        
        <div id="clearScreen" class="screen">
            <h1>CLEAR!</h1>
            <p id="clearDistance"></p>
            <button onclick="retryGame()">PLAY AGAIN</button>
        </div>
        
        <div class="hud">
            <div>HP: <span id="hpDisplay">3</span></div>
            <div>Distance: <span id="distanceDisplay">0</span>/<span id="distanceGoal">3000</span>m</div>
        </div>
        
        <div class="controls">
            Space: Jump | Z: Shoot
        </div>
    </div>

    <script>
        // Parameters
        // theme:          string
        // title:          string
        // bg_color:       string
        // ground_color:   string
        // player_color:   string
        // enemy_color:    string
        // bullet_color:   string
        // player_hp:      int
        // scroll_speed:   int
        // bullet_speed:   int
        // win_distance:   int

        const config = {
            title: 'RUN & GUN',
            bg_color: '#0a0a1a',
            ground_color: '#2d3748',
            player_color: '#68d391',
            enemy_color: '#fc8181',
            bullet_color: '#f6e05e',
            player_hp: 3,
            scroll_speed: 3,
            bullet_speed: 8,
            win_distance: 3000
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500;
        canvas.height = 350;
        document.getElementById('gameContainer').style.width = canvas.width + 'px';
        document.getElementById('gameContainer').style.height = canvas.height + 'px';
        document.getElementById('distanceGoal').textContent = config.win_distance;
        document.getElementById('startClearCondition').textContent = 'クリア条件: ' + config.win_distance + 'm走る';

        const GROUND_Y = canvas.height - 80;
        const PLAYER_SCREEN_X = 100;
        const PLAYER_HEIGHT = 30;
        const PLAYER_WIDTH = 20;
        const GRAVITY = 0.5;
        const JUMP_POWER = -12;
        const ENEMY_SPAWN_INTERVAL = 1500;
        const ENEMY_WIDTH = 25;
        const ENEMY_HEIGHT = 30;
        const BULLET_WIDTH = 8;
        const BULLET_HEIGHT = 4;
        const INVINCIBLE_DURATION = 1000;

        let gameState = {
            running: false,
            cameraX: 0,
            playerWorldX: PLAYER_SCREEN_X,
            playerY: GROUND_Y - PLAYER_HEIGHT,
            playerVelocityY: 0,
            playerHP: config.player_hp,
            playerInvincibleUntil: 0,
            enemies: [],
            bullets: [],
            lastEnemySpawn: 0
        };

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') {
                e.preventDefault();
                if (gameState.running && isPlayerOnGround()) {
                    gameState.playerVelocityY = JUMP_POWER;
                }
            }
            if (e.key.toUpperCase() === 'Z') {
                if (gameState.running) {
                    shootBullet();
                }
            }
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function isPlayerOnGround() {
            return gameState.playerY >= GROUND_Y - PLAYER_HEIGHT;
        }

        function shootBullet() {
            gameState.bullets.push({
                worldX: gameState.cameraX + PLAYER_SCREEN_X + PLAYER_WIDTH,
                screenY: gameState.playerY + PLAYER_HEIGHT / 2,
                width: BULLET_WIDTH,
                height: BULLET_HEIGHT
            });
        }

        function spawnEnemy() {
            const spawnX = gameState.cameraX + canvas.width + 100;
            const isGround = Math.random() > 0.4;
            const enemyY = isGround ? GROUND_Y - ENEMY_HEIGHT : GROUND_Y - ENEMY_HEIGHT - 90;
            gameState.enemies.push({
                worldX: spawnX,
                screenY: enemyY,
                width: ENEMY_WIDTH,
                height: ENEMY_HEIGHT,
                velocityX: -1.5
            });
        }

        function updateGameState() {
            if (!gameState.running) return;

            gameState.cameraX += config.scroll_speed;
            gameState.playerWorldX = gameState.cameraX + PLAYER_SCREEN_X;

            gameState.playerVelocityY += GRAVITY;
            gameState.playerY += gameState.playerVelocityY;

            if (gameState.playerY >= GROUND_Y - PLAYER_HEIGHT) {
                gameState.playerY = GROUND_Y - PLAYER_HEIGHT;
                gameState.playerVelocityY = 0;
            }

            for (let i = gameState.bullets.length - 1; i >= 0; i--) {
                gameState.bullets[i].worldX += config.bullet_speed;
                if (gameState.bullets[i].worldX > gameState.cameraX + canvas.width + 50) {
                    gameState.bullets.splice(i, 1);
                }
            }

            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                gameState.enemies[i].worldX += gameState.enemies[i].velocityX;
                if (gameState.enemies[i].worldX < -50) {
                    gameState.enemies.splice(i, 1);
                }
            }

            const now = Date.now();
            if (now - gameState.lastEnemySpawn > ENEMY_SPAWN_INTERVAL) {
                spawnEnemy();
                gameState.lastEnemySpawn = now;
            }

            for (let i = gameState.bullets.length - 1; i >= 0; i--) {
                for (let j = gameState.enemies.length - 1; j >= 0; j--) {
                    const bullet = gameState.bullets[i];
                    const enemy = gameState.enemies[j];
                    if (checkCollision(bullet.worldX, bullet.screenY, bullet.width, bullet.height,
                                       enemy.worldX, enemy.screenY, enemy.width, enemy.height)) {
                        gameState.bullets.splice(i, 1);
                        gameState.enemies.splice(j, 1);
                        break;
                    }
                }
            }

            const now2 = Date.now();
            if (now2 > gameState.playerInvincibleUntil) {
                for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                    const enemy = gameState.enemies[i];
                    if (checkCollision(gameState.playerWorldX, gameState.playerY, PLAYER_WIDTH, PLAYER_HEIGHT,
                                       enemy.worldX, enemy.screenY, enemy.width, enemy.height)) {
                        gameState.playerHP--;
                        gameState.playerInvincibleUntil = now2 + INVINCIBLE_DURATION;
                        gameState.enemies.splice(i, 1);
                        break;
                    }
                }
            }

            document.getElementById('hpDisplay').textContent = Math.max(0, gameState.playerHP);
            document.getElementById('distanceDisplay').textContent = Math.floor(gameState.cameraX);

            if (gameState.cameraX >= config.win_distance) {
                gameState.running = false;
                document.getElementById('clearScreen').style.display = 'flex';
                document.getElementById('clearDistance').textContent = 'Distance: ' + Math.floor(gameState.cameraX) + 'm';
                return;
            }

            if (gameState.playerHP <= 0) {
                gameState.running = false;
                document.getElementById('gameOverScreen').style.display = 'flex';
                document.getElementById('gameOverDistance').textContent = 'Distance: ' + Math.floor(gameState.cameraX) + 'm';
                return;
            }
        }

        function checkCollision(x1, y1, w1, h1, x2, y2, w2, h2) {
            return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
        }

        function draw() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = config.ground_color;
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);

            const playerScreenX = PLAYER_SCREEN_X;
            ctx.fillStyle = config.player_color;
            ctx.fillRect(playerScreenX, gameState.playerY, PLAYER_WIDTH, PLAYER_HEIGHT);

            ctx.fillStyle = config.enemy_color;
            for (const enemy of gameState.enemies) {
                const screenX = enemy.worldX - gameState.cameraX;
                ctx.fillRect(screenX, enemy.screenY, enemy.width, enemy.height);
            }

            ctx.fillStyle = config.bullet_color;
            for (const bullet of gameState.bullets) {
                const screenX = bullet.worldX - gameState.cameraX;
                ctx.fillRect(screenX, bullet.screenY, bullet.width, bullet.height);
            }
        }

        function gameLoop() {
            updateGameState();
            draw();
            if (gameState.running) {
                requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState = {
                running: true,
                cameraX: 0,
                playerWorldX: PLAYER_SCREEN_X,
                playerY: GROUND_Y - PLAYER_HEIGHT,
                playerVelocityY: 0,
                playerHP: config.player_hp,
                playerInvincibleUntil: 0,
                enemies: [],
                bullets: [],
                lastEnemySpawn: Date.now()
            };
            requestAnimationFrame(gameLoop);
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }
    </script>
</body>
</html>
