<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelda-like Adventure Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            transition: background-color 0.3s;
        }
        #gameContainer {
            position: relative;
            border: 3px solid #444;
        }
        canvas {
            display: block;
            background-color: #2d3748;
        }
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 20px;
        }
        #startScreen h1 {
            color: #68d391;
            font-size: 48px;
            text-shadow: 2px 2px 4px #000;
        }
        #startScreen p {
            color: #ccc;
            font-size: 16px;
            text-align: center;
            max-width: 300px;
        }
        #startButton {
            padding: 12px 40px;
            font-size: 24px;
            background-color: #68d391;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: #000;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        #startButton:hover {
            background-color: #56d282;
        }
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 20px;
        }
        #gameOverScreen h1 {
            color: #fc8181;
            font-size: 48px;
            text-shadow: 2px 2px 4px #000;
        }
        #gameOverScreen p {
            color: #ccc;
            font-size: 18px;
        }
        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 20px;
        }
        #clearScreen h1 {
            color: #68d391;
            font-size: 48px;
            text-shadow: 2px 2px 4px #000;
        }
        #clearScreen p {
            color: #ccc;
            font-size: 18px;
        }
        .retryButton {
            padding: 12px 40px;
            font-size: 24px;
            background-color: #68d391;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: #000;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .retryButton:hover {
            background-color: #56d282;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" tabindex="0"></canvas>
        <div id="startScreen">
            <h1>ADVENTURE</h1>
            <p>敵を倒し、鍵を集めてボスを撃破せよ！</p>
            <button id="startButton">START</button>
        </div>
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <p>あなたは倒れた...</p>
            <button class="retryButton" onclick="retryGame()">RETRY</button>
        </div>
        <div id="clearScreen">
            <h1>CLEAR!</h1>
            <p>ボスを倒してゲームをクリアした！</p>
            <button class="retryButton" onclick="retryGame()">RETRY</button>
        </div>
    </div>

    <script>
        // パラメータスキーマ
        // theme:        string
        // title:        string
        // bg_color:     string
        // floor_color:  string
        // wall_color:   string
        // player_color: string
        // enemy_color:  string
        // boss_color:   string
        // player_hp:    int
        // player_atk:   int
        // boss_hp:      int

        const config = {
            title: 'ADVENTURE',
            bg_color: '#0d1117',
            floor_color: '#2d3748',
            wall_color: '#1a202c',
            player_color: '#68d391',
            enemy_color: '#fc8181',
            boss_color: '#f6ad55',
            player_hp: 10,
            player_atk: 3,
            boss_hp: 30
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400;
        canvas.height = 400;
        document.getElementById('gameContainer').style.width = canvas.width + 'px';
        document.getElementById('gameContainer').style.height = canvas.height + 'px';
        document.body.style.background = config.bg_color;

        const TILE_SIZE = 16;
        const PLAYER_SIZE = 16;
        const ENEMY_SIZE = 16;
        const BOSS_SIZE = 24;
        const DOOR_SIZE = 20;
        const KEY_SIZE = 12;

        const gameState = {
            running: false,
            player: { x: 50, y: 50, hp: config.player_hp, maxHp: config.player_hp, hasKey: false, direction: 0 },
            currentArea: 1,
            areas: {
                1: { enemies: [], door: null },
                2: { enemies: [], door: null, key: null },
                3: { boss: null, door: null }
            },
            keys: {
                up: false,
                down: false,
                left: false,
                right: false,
                space: false
            },
            attackCooldown: 0
        };

        function initAreas() {
            gameState.areas[1].enemies = [
                { x: 200, y: 100, hp: 5, maxHp: 5 },
                { x: 300, y: 300, hp: 5, maxHp: 5 }
            ];
            gameState.areas[1].door = { x: 180, y: 370, width: DOOR_SIZE, height: DOOR_SIZE };

            gameState.areas[2].enemies = [
                { x: 100, y: 150, hp: 5, maxHp: 5 },
                { x: 300, y: 150, hp: 5, maxHp: 5 },
                { x: 200, y: 300, hp: 5, maxHp: 5 }
            ];
            gameState.areas[2].key = { x: 200, y: 200, width: KEY_SIZE, height: KEY_SIZE };
            gameState.areas[2].door = { x: 180, y: 370, width: DOOR_SIZE, height: DOOR_SIZE };

            gameState.areas[3].boss = { x: 200, y: 150, hp: config.boss_hp, maxHp: config.boss_hp };
            gameState.areas[3].door = null;
        }

        function startGame() {
            gameState.running = true;
            gameState.player.hp = config.player_hp;
            gameState.player.hasKey = false;
            gameState.currentArea = 1;
            gameState.attackCooldown = 0;
            gameState.player.x = 50;
            gameState.player.y = 50;
            initAreas();
            document.getElementById('startScreen').style.display = 'none';
            canvas.focus();
            gameLoop();
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }

        document.getElementById('startButton').addEventListener('click', startGame);

        window.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') {
                e.preventDefault();
                gameState.keys.up = true;
            }
            if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') {
                e.preventDefault();
                gameState.keys.down = true;
            }
            if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') {
                e.preventDefault();
                gameState.keys.left = true;
            }
            if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') {
                e.preventDefault();
                gameState.keys.right = true;
            }
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState.running) {
                    gameState.keys.space = true;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') gameState.keys.up = false;
            if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') gameState.keys.down = false;
            if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') gameState.keys.left = false;
            if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') gameState.keys.right = false;
            if (e.code === 'Space') gameState.keys.space = false;
        });

        function updatePlayer() {
            const speed = 3;
            if (gameState.keys.up && gameState.player.y > 0) {
                gameState.player.y -= speed;
                gameState.player.direction = 0;
            }
            if (gameState.keys.down && gameState.player.y < canvas.height - PLAYER_SIZE) {
                gameState.player.y += speed;
                gameState.player.direction = 2;
            }
            if (gameState.keys.left && gameState.player.x > 0) {
                gameState.player.x -= speed;
                gameState.player.direction = 3;
            }
            if (gameState.keys.right && gameState.player.x < canvas.width - PLAYER_SIZE) {
                gameState.player.x += speed;
                gameState.player.direction = 1;
            }

            if (gameState.keys.space && gameState.attackCooldown <= 0) {
                performAttack();
                gameState.attackCooldown = 20;
            }

            gameState.attackCooldown--;
        }

        function performAttack() {
            const attackRange = 30;
            const directions = {
                0: { dx: 0, dy: -attackRange },
                1: { dx: attackRange, dy: 0 },
                2: { dx: 0, dy: attackRange },
                3: { dx: -attackRange, dy: 0 }
            };

            const dir = directions[gameState.player.direction];
            const attackX = gameState.player.x + PLAYER_SIZE / 2 + dir.dx / 2;
            const attackY = gameState.player.y + PLAYER_SIZE / 2 + dir.dy / 2;

            const enemies = gameState.areas[gameState.currentArea].enemies;
            for (let enemy of enemies) {
                if (Math.abs(enemy.x - attackX) < ENEMY_SIZE + 15 && Math.abs(enemy.y - attackY) < ENEMY_SIZE + 15) {
                    enemy.hp -= config.player_atk;
                }
            }

            if (gameState.currentArea === 3) {
                const boss = gameState.areas[3].boss;
                if (Math.abs(boss.x - attackX) < BOSS_SIZE + 15 && Math.abs(boss.y - attackY) < BOSS_SIZE + 15) {
                    boss.hp -= config.player_atk;
                }
            }
        }

        function updateEnemies() {
            const enemies = gameState.areas[gameState.currentArea].enemies;
            for (let enemy of enemies) {
                if (enemy.hp > 0) {
                    const dx = gameState.player.x - enemy.x;
                    const dy = gameState.player.y - enemy.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        enemy.x += (dx / dist) * 1.5;
                        enemy.y += (dy / dist) * 1.5;
                    } else {
                        enemy.x += (Math.random() - 0.5) * 2;
                        enemy.y += (Math.random() - 0.5) * 2;
                    }
                    enemy.x = Math.max(0, Math.min(canvas.width - ENEMY_SIZE, enemy.x));
                    enemy.y = Math.max(0, Math.min(canvas.height - ENEMY_SIZE, enemy.y));

                    if (Math.abs(enemy.x - gameState.player.x) < PLAYER_SIZE + ENEMY_SIZE &&
                        Math.abs(enemy.y - gameState.player.y) < PLAYER_SIZE + ENEMY_SIZE) {
                        gameState.player.hp -= 0.5;
                    }
                }
            }
        }

        function updateBoss() {
            const boss = gameState.areas[3].boss;
            if (boss && boss.hp > 0) {
                const dx = gameState.player.x - boss.x;
                const dy = gameState.player.y - boss.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    boss.x += (dx / dist) * 2;
                    boss.y += (dy / dist) * 2;
                } else {
                    boss.x += (Math.random() - 0.5) * 3;
                    boss.y += (Math.random() - 0.5) * 3;
                }
                boss.x = Math.max(0, Math.min(canvas.width - BOSS_SIZE, boss.x));
                boss.y = Math.max(0, Math.min(canvas.height - BOSS_SIZE, boss.y));

                if (Math.abs(boss.x - gameState.player.x) < PLAYER_SIZE + BOSS_SIZE &&
                    Math.abs(boss.y - gameState.player.y) < PLAYER_SIZE + BOSS_SIZE) {
                    gameState.player.hp -= 1;
                }
            }
        }

        function checkAreaTransition() {
            const area = gameState.areas[gameState.currentArea];
            if (area.enemies && area.enemies.length > 0) {
                const allDefeated = area.enemies.every(e => e.hp <= 0);
                if (allDefeated && area.door) {
                    area.doorOpen = true;
                }
            }

            if (area.doorOpen && area.door) {
                const px = gameState.player.x + PLAYER_SIZE / 2;
                const py = gameState.player.y + PLAYER_SIZE / 2;
                if (px > area.door.x && px < area.door.x + area.door.width &&
                    py > area.door.y && py < area.door.y + area.door.height) {
                    if (gameState.currentArea === 2 && !gameState.player.hasKey) return;
                    if (gameState.currentArea === 3) {
                        if (gameState.areas[3].boss.hp <= 0) {
                            gameState.running = false;
                            document.getElementById('clearScreen').style.display = 'flex';
                        }
                        return;
                    }
                    gameState.currentArea++;
                    gameState.player.x = 50;
                    gameState.player.y = 50;
                }
            }
        }

        function checkKeyCollection() {
            if (gameState.currentArea === 2 && gameState.areas[2].key) {
                const key = gameState.areas[2].key;
                const px = gameState.player.x + PLAYER_SIZE / 2;
                const py = gameState.player.y + PLAYER_SIZE / 2;
                if (px > key.x && px < key.x + key.width &&
                    py > key.y && py < key.y + key.height) {
                    gameState.player.hasKey = true;
                    gameState.areas[2].key = null;
                }
            }
        }

        function draw() {
            ctx.fillStyle = config.floor_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = config.player_color;
            ctx.fillRect(gameState.player.x, gameState.player.y, PLAYER_SIZE, PLAYER_SIZE);

            const enemies = gameState.areas[gameState.currentArea].enemies;
            ctx.fillStyle = config.enemy_color;
            for (let enemy of enemies) {
                if (enemy.hp > 0) {
                    ctx.fillRect(enemy.x, enemy.y, ENEMY_SIZE, ENEMY_SIZE);
                }
            }

            if (gameState.currentArea === 2 && gameState.areas[2].key) {
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(gameState.areas[2].key.x, gameState.areas[2].key.y, KEY_SIZE, KEY_SIZE);
            }

            if (gameState.currentArea === 3 && gameState.areas[3].boss && gameState.areas[3].boss.hp > 0) {
                ctx.fillStyle = config.boss_color;
                ctx.fillRect(gameState.areas[3].boss.x, gameState.areas[3].boss.y, BOSS_SIZE, BOSS_SIZE);
            }

            const area = gameState.areas[gameState.currentArea];
            if (area.door) {
                ctx.fillStyle = area.doorOpen ? '#ffff00' : '#666666';
                ctx.fillRect(area.door.x, area.door.y, area.door.width, area.door.height);
            }

            ctx.fillStyle = '#ffffff';
            ctx.font = '14px Arial';
            ctx.fillText('HP: ' + Math.ceil(gameState.player.hp) + '/' + gameState.player.maxHp, 10, 20);
            ctx.fillText('Area: ' + gameState.currentArea + '/3', 10, 40);
            ctx.fillText('Key: ' + (gameState.player.hasKey ? 'YES' : 'NO'), 10, 60);
            ctx.fillText('WASD/Arrow: Move  Space: Attack', 10, canvas.height - 10);
        }

        function gameLoop() {
            if (!gameState.running) return;

            updatePlayer();
            if (gameState.currentArea === 3) {
                updateBoss();
            } else {
                updateEnemies();
            }
            checkKeyCollection();
            checkAreaTransition();

            if (gameState.player.hp <= 0) {
                gameState.running = false;
                document.getElementById('gameOverScreen').style.display = 'flex';
                return;
            }

            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
