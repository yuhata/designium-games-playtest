<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADVENTURE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            border: 4px solid #444;
        }
        #gameCanvas {
            display: block;
        }
        #startScreen, #gameOverScreen, #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            color: white;
        }
        #gameOverScreen {
            display: none;
        }
        #clearScreen {
            display: none;
        }
        .screen-content {
            text-align: center;
        }
        .screen-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .screen-content p {
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .screen-content button {
            padding: 12px 30px;
            font-size: 18px;
            margin-top: 20px;
            cursor: pointer;
            background: #68d391;
            color: black;
            border: none;
            border-radius: 4px;
        }
        .screen-content button:hover {
            background: #48bb78;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" tabindex="0"></canvas>
        <div id="startScreen">
            <div class="screen-content">
                <h1>ADVENTURE</h1>
                <p>三つの部屋を探索し、ボスを倒しクリアを目指そう</p>
                <p style="font-size: 14px; margin-top: 30px;">
                    WASD/矢印キー: 移動<br>
                    スペースキー: 攻撃<br>
                    中間部屋で鍵を取得してからボス部屋へ
                </p>
                <button onclick="startGame()">START</button>
            </div>
        </div>
        <div id="gameOverScreen">
            <div class="screen-content">
                <h1>GAME OVER</h1>
                <p>HPがなくなってしまった...</p>
                <button onclick="retryGame()">もう一度</button>
            </div>
        </div>
        <div id="clearScreen">
            <div class="screen-content">
                <h1>CLEAR!</h1>
                <p>ボスを倒した！冒険が終わった</p>
                <button onclick="retryGame()">もう一度</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            title: 'ADVENTURE',
            bg_color: '#0d1117',
            floor_color: '#2d3748',
            wall_color: '#1a202c',
            player_color: '#68d391',
            enemy_color: '#fc8181',
            boss_color: '#f6ad55',
            player_hp: 10,
            player_atk: 3,
            boss_hp: 30
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 400;
        canvas.height = 400;
        document.getElementById('gameContainer').style.width = canvas.width + 'px';
        document.getElementById('gameContainer').style.height = canvas.height + 'px';
        document.body.style.background = config.bg_color;

        const gameState = {
            running: false,
            currentArea: 1,
            playerHp: config.player_hp,
            hasKey: false,
            frameCount: 0
        };

        const player = {
            x: 200,
            y: 320,
            width: 20,
            height: 20,
            vx: 0,
            vy: 0,
            speed: 3,
            invincibleFrames: 0,
            attackCooldown: 0,
            lastDirX: 0,
            lastDirY: -1
        };

        const keys = {};
        let enemies = [];
        let keyItem = null;
        let door = null;
        let boss = null;

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState.running = true;
            gameState.playerHp = config.player_hp;
            gameState.hasKey = false;
            gameState.currentArea = 1;
            player.x = 200;
            player.y = 320;
            player.invincibleFrames = 0;
            player.attackCooldown = 0;
            initializeArea(1);
            canvas.focus();
            gameLoop();
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }

        function initializeArea(area) {
            enemies = [];
            keyItem = null;
            door = null;
            boss = null;

            if (area === 1) {
                enemies.push({ x: 100, y: 100, width: 20, height: 20, hp: 3, vx: 0, vy: 0, speed: 1 });
                enemies.push({ x: 300, y: 100, width: 20, height: 20, hp: 3, vx: 0, vy: 0, speed: 1 });
                door = { x: 180, y: 20, width: 40, height: 30, open: false };
            } else if (area === 2) {
                enemies.push({ x: 80, y: 100, width: 20, height: 20, hp: 3, vx: 0, vy: 0, speed: 1 });
                enemies.push({ x: 200, y: 150, width: 20, height: 20, hp: 3, vx: 0, vy: 0, speed: 1 });
                enemies.push({ x: 320, y: 100, width: 20, height: 20, hp: 3, vx: 0, vy: 0, speed: 1 });
                keyItem = { x: 200, y: 80, width: 15, height: 15 };
                door = { x: 180, y: 20, width: 40, height: 30, open: false };
            } else if (area === 3) {
                boss = { x: 200, y: 100, width: 25, height: 25, hp: config.boss_hp, maxHp: config.boss_hp, vx: 0, vy: 0, speed: 1 };
            }
        }

        window.addEventListener('keydown', (e) => {
            if (['w', 'W', 'a', 'A', 's', 'S', 'd', 'D', 'ArrowUp', 'ArrowLeft', 'ArrowDown', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }
            keys[e.key.toLowerCase()] = true;

            if (e.key === ' ' && gameState.running) {
                handleAttack();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function handleAttack() {
            if (player.attackCooldown > 0) return;
            player.attackCooldown = 30;

            let attackX = player.x + player.width / 2;
            let attackY = player.y - player.height / 2 - 20;
            let attackWidth = 40;
            let attackHeight = 20;

            if (player.lastDirY < 0) {
                attackX = player.x + player.width / 2 - attackWidth / 2;
                attackY = player.y - 20;
            } else if (player.lastDirY > 0) {
                attackX = player.x + player.width / 2 - attackWidth / 2;
                attackY = player.y + player.height + 10;
            } else if (player.lastDirX > 0) {
                attackX = player.x + player.width + 10;
                attackY = player.y + player.height / 2 - attackHeight / 2;
                attackWidth = 20;
                attackHeight = 40;
            } else if (player.lastDirX < 0) {
                attackX = player.x - 30;
                attackY = player.y + player.height / 2 - attackHeight / 2;
                attackWidth = 20;
                attackHeight = 40;
            }

            if (boss) {
                if (isColliding({ x: attackX, y: attackY, width: attackWidth, height: attackHeight }, boss)) {
                    boss.hp -= config.player_atk;
                }
            } else {
                for (let enemy of enemies) {
                    if (isColliding({ x: attackX, y: attackY, width: attackWidth, height: attackHeight }, enemy)) {
                        enemy.hp -= config.player_atk;
                    }
                }
            }
        }

        function updatePlayer() {
            player.vx = 0;
            player.vy = 0;

            if (keys['w'] || keys['arrowup']) player.vy -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.vy += player.speed;
            if (keys['a'] || keys['arrowleft']) player.vx -= player.speed;
            if (keys['d'] || keys['arrowright']) player.vx += player.speed;

            if (player.vx !== 0) player.lastDirX = player.vx > 0 ? 1 : -1;
            if (player.vy !== 0) player.lastDirY = player.vy > 0 ? 1 : -1;

            player.x += player.vx;
            player.y += player.vy;

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;

            if (player.invincibleFrames > 0) player.invincibleFrames--;
            if (player.attackCooldown > 0) player.attackCooldown--;
        }

        function updateEnemies() {
            for (let enemy of enemies) {
                let dx = player.x - enemy.x;
                let dy = player.y - enemy.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0) {
                    enemy.vx = (dx / dist) * enemy.speed;
                    enemy.vy = (dy / dist) * enemy.speed;
                }
                enemy.x += enemy.vx;
                enemy.y += enemy.vy;

                if (enemy.x < 0) enemy.x = 0;
                if (enemy.x + enemy.width > canvas.width) enemy.x = canvas.width - enemy.width;
                if (enemy.y < 0) enemy.y = 0;
                if (enemy.y + enemy.height > canvas.height) enemy.y = canvas.height - enemy.height;
            }

            enemies = enemies.filter(e => e.hp > 0);

            if (enemies.length === 0 && door) {
                door.open = true;
            }
        }

        function updateBoss() {
            if (!boss) return;

            let dx = player.x - boss.x;
            let dy = player.y - boss.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 0) {
                boss.vx = (dx / dist) * boss.speed;
                boss.vy = (dy / dist) * boss.speed;
            }
            boss.x += boss.vx;
            boss.y += boss.vy;

            if (boss.x < 0) boss.x = 0;
            if (boss.x + boss.width > canvas.width) boss.x = canvas.width - boss.width;
            if (boss.y < 0) boss.y = 0;
            if (boss.y + boss.height > canvas.height) boss.y = canvas.height - boss.height;
        }

        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function updateCollisions() {
            for (let enemy of enemies) {
                if (isColliding(player, enemy) && player.invincibleFrames <= 0) {
                    gameState.playerHp -= 1;
                    player.invincibleFrames = 90;
                }
            }

            if (boss && isColliding(player, boss) && player.invincibleFrames <= 0) {
                gameState.playerHp -= 1;
                player.invincibleFrames = 90;
            }

            if (keyItem && isColliding(player, keyItem)) {
                gameState.hasKey = true;
                keyItem = null;
            }

            if (door && door.open && isColliding(player, door)) {
                if (gameState.currentArea < 3) {
                    if (gameState.currentArea === 2 && !gameState.hasKey) {
                        return;
                    }
                    gameState.currentArea++;
                    initializeArea(gameState.currentArea);
                    player.x = 200;
                    player.y = 350;
                }
            }
        }

        function drawGame() {
            ctx.fillStyle = config.floor_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = config.wall_color;
            ctx.fillRect(0, 0, canvas.width, 50);
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

            ctx.fillStyle = config.enemy_color;
            for (let enemy of enemies) {
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
            }

            if (boss) {
                ctx.fillStyle = config.boss_color;
                ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
            }

            if (keyItem) {
                ctx.fillStyle = '#ffeb3b';
                ctx.fillRect(keyItem.x, keyItem.y, keyItem.width, keyItem.height);
            }

            if (door) {
                ctx.fillStyle = door.open ? '#76b82a' : '#555555';
                ctx.fillRect(door.x, door.y, door.width, door.height);
            }

            if (player.invincibleFrames <= 0 || player.invincibleFrames % 10 >= 5) {
                ctx.fillStyle = config.player_color;
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }

            ctx.fillStyle = '#ffffff';
            ctx.font = '14px Arial';
            ctx.fillText(`HP: ${gameState.playerHp}`, 10, 20);
            ctx.fillText(`Area: ${gameState.currentArea}/3`, 10, 40);
            ctx.fillText(`Key: ${gameState.hasKey ? 'YES' : 'NO'}`, 10, 60);
            ctx.fillText('WASD/↑↓←→: Move | SPACE: Attack', 10, canvas.height - 10);
        }

        function gameLoop() {
            if (!gameState.running) return;

            updatePlayer();
            updateEnemies();
            updateBoss();
            updateCollisions();

            drawGame();

            if (gameState.playerHp <= 0) {
                gameState.running = false;
                document.getElementById('gameOverScreen').style.display = 'flex';
                return;
            }

            if (boss && boss.hp <= 0) {
                gameState.running = false;
                document.getElementById('clearScreen').style.display = 'flex';
                return;
            }

            gameState.frameCount++;
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
