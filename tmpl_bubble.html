<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CHAINER</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background-color: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }
    
    #gameContainer {
      text-align: center;
    }
    
    h1 {
      margin-bottom: 20px;
      font-size: 32px;
    }
    
    #scoreBoard {
      font-size: 20px;
      margin-bottom: 20px;
    }
    
    canvas {
      border: 3px solid white;
      display: block;
      background-color: #000;
      margin: 0 auto;
      cursor: pointer;
    }
    
    #gameOverScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    
    #gameOverContent {
      background-color: rgba(50, 50, 50, 0.98);
      padding: 40px;
      border-radius: 10px;
      text-align: center;
    }
    
    #gameOverContent h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    
    #gameOverContent p {
      font-size: 24px;
      margin-bottom: 30px;
    }
    
    #gameOverContent button {
      padding: 12px 30px;
      font-size: 18px;
      cursor: pointer;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
    }
    
    #gameOverContent button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <h1>CHAINER</h1>
    <div id="scoreBoard">
      Score: <span id="currentScore">0</span> / 1000
    </div>
    <canvas id="gameCanvas"></canvas>
  </div>
  
  <div id="gameOverScreen">
    <div id="gameOverContent">
      <h2 id="gameOverTitle">GAME OVER</h2>
      <p>Final Score: <span id="finalScore">0</span></p>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    /*
     * Puzzle Game Parameters
     * {
     *   "theme":            "string  // param生成への入力。HTMLには出ない",
     *   "title":            "CHAINER",
     *   "bg_color":         "#1a1a2e",
     *   "cell_colors":      "#e74c3c, #3498db, ...",
     *   "grid_w":           "6",
     *   "grid_h":           "12",
     *   "cell_size":        "50",
     *   "fall_interval_ms": "800",
     *   "min_chain":        "4",
     *   "win_score":        "1000"
     * }
     * 
     * Default Values:
     * title="CHAINER", bg_color="#1a1a2e",
     * cell_colors=["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6"],
     * grid_w=6, grid_h=12, cell_size=50,
     * fall_interval_ms=800, min_chain=4, win_score=1000
     */

    const CONFIG = {
      title: "CHAINER",
      bg_color: "#1a1a2e",
      colors: [
        "#e74c3c",
        "#3498db",
        "#2ecc71",
        "#f39c12",
        "#9b59b6"
      ],
      grid_w: 6,
      grid_h: 12,
      cell_size: 50,
      fall_interval_ms: 800,
      min_chain: 4,
      win_score: 1000
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = CONFIG.grid_w * CONFIG.cell_size;
    canvas.height = CONFIG.grid_h * CONFIG.cell_size;

    let grid = [];
    let fallingPiece = null;
    let score = 0;
    let gameActive = true;
    let lastFallTime = 0;

    function initGrid() {
      grid = [];
      for (let y = 0; y < CONFIG.grid_h; y++) {
        grid[y] = new Array(CONFIG.grid_w).fill(null);
      }
    }

    function randomColor() {
      return Math.floor(Math.random() * CONFIG.colors.length);
    }

    function createPiece() {
      const color = randomColor();
      const x = Math.floor(CONFIG.grid_w / 2) - 1;
      return {
        color: color,
        cells: [
          { x: x, y: -1 },
          { x: x + 1, y: -1 }
        ]
      };
    }

    function canMovePieceDown(piece) {
      for (let cell of piece.cells) {
        const ny = cell.y + 1;
        if (ny >= CONFIG.grid_h) return false;
        if (cell.x >= 0 && cell.x < CONFIG.grid_w && grid[ny][cell.x] !== null) return false;
      }
      return true;
    }

    function dropPiece() {
      for (let cell of fallingPiece.cells) {
        if (cell.x >= 0 && cell.x < CONFIG.grid_w && cell.y >= 0 && cell.y < CONFIG.grid_h) {
          grid[cell.y][cell.x] = fallingPiece.color;
        }
      }
      
      if (fallingPiece.cells.some(c => c.y === 0)) {
        endGame();
        return;
      }

      processMatches();
      fallingPiece = createPiece();
      
      if (!canMovePieceDown(fallingPiece)) {
        endGame();
      }
    }

    function processMatches() {
      let removed = new Set();

      for (let y = 0; y < CONFIG.grid_h; y++) {
        for (let x = 0; x < CONFIG.grid_w; x++) {
          if (grid[y][x] !== null && !removed.has(y * CONFIG.grid_w + x)) {
            const matched = bfsMatch(x, y, removed);
            if (matched.length >= CONFIG.min_chain) {
              for (let {x: mx, y: my} of matched) {
                removed.add(my * CONFIG.grid_w + mx);
              }
            }
          }
        }
      }

      if (removed.size > 0) {
        for (let idx of removed) {
          const y = Math.floor(idx / CONFIG.grid_w);
          const x = idx % CONFIG.grid_w;
          grid[y][x] = null;
        }
        score += removed.size * 10;
        applyGravity();
        processMatches();
      }
    }

    function bfsMatch(sx, sy, removed) {
      const color = grid[sy][sx];
      const visited = new Set();
      const queue = [{x: sx, y: sy}];
      const matched = [];

      while (queue.length > 0) {
        const {x, y} = queue.shift();
        const key = y * CONFIG.grid_w + x;

        if (visited.has(key) || removed.has(key)) continue;
        if (x < 0 || x >= CONFIG.grid_w || y < 0 || y >= CONFIG.grid_h) continue;
        if (grid[y][x] !== color) continue;

        visited.add(key);
        matched.push({x, y});

        queue.push({x: x + 1, y});
        queue.push({x: x - 1, y});
        queue.push({x, y: y + 1});
        queue.push({x, y: y - 1});
      }

      return matched;
    }

    function applyGravity() {
      for (let x = 0; x < CONFIG.grid_w; x++) {
        let writeIdx = CONFIG.grid_h - 1;
        for (let y = CONFIG.grid_h - 1; y >= 0; y--) {
          if (grid[y][x] !== null) {
            grid[writeIdx][x] = grid[y][x];
            if (writeIdx !== y) {
              grid[y][x] = null;
            }
            writeIdx--;
          }
        }
      }
    }

    function placePieceAtColumn(col) {
      if (!gameActive || !fallingPiece) return;

      let minY = CONFIG.grid_h;
      
      for (let cell of fallingPiece.cells) {
        cell.x = col + (cell.x % 2);
        
        for (let y = 0; y < CONFIG.grid_h; y++) {
          if (grid[y][cell.x] !== null) {
            minY = Math.min(minY, y - 1);
            break;
          }
        }
      }

      fallingPiece.cells[0].y = minY;
      fallingPiece.cells[1].y = minY;

      let valid = fallingPiece.cells.every(c => 
        c.x >= 0 && c.x < CONFIG.grid_w && 
        c.y >= 0 && c.y < CONFIG.grid_h && 
        grid[c.y][c.x] === null
      );

      if (valid) {
        dropPiece();
      }
    }

    function draw() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < CONFIG.grid_h; y++) {
        for (let x = 0; x < CONFIG.grid_w; x++) {
          const colorIdx = grid[y][x];
          
          if (colorIdx !== null) {
            ctx.fillStyle = CONFIG.colors[colorIdx];
            ctx.fillRect(x * CONFIG.cell_size, y * CONFIG.cell_size, CONFIG.cell_size, CONFIG.cell_size);
            
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.strokeRect(x * CONFIG.cell_size, y * CONFIG.cell_size, CONFIG.cell_size, CONFIG.cell_size);
          } else {
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 0.5;
            ctx.strokeRect(x * CONFIG.cell_size, y * CONFIG.cell_size, CONFIG.cell_size, CONFIG.cell_size);
          }
        }
      }

      if (fallingPiece && gameActive) {
        ctx.fillStyle = CONFIG.colors[fallingPiece.color];
        for (let cell of fallingPiece.cells) {
          if (cell.y >= 0) {
            ctx.fillRect(cell.x * CONFIG.cell_size, cell.y * CONFIG.cell_size, CONFIG.cell_size, CONFIG.cell_size);
            
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(cell.x * CONFIG.cell_size, cell.y * CONFIG.cell_size, CONFIG.cell_size, CONFIG.cell_size);
          }
        }
      }

      document.getElementById('currentScore').textContent = score;

      if (score >= CONFIG.win_score && gameActive) {
        gameActive = false;
        showGameOverScreen(true);
      }
    }

    function gameLoop(now) {
      if (gameActive && fallingPiece) {
        if (now - lastFallTime >= CONFIG.fall_interval_ms) {
          if (canMovePieceDown(fallingPiece)) {
            for (let cell of fallingPiece.cells) {
              cell.y++;
            }
          } else {
            dropPiece();
          }
          lastFallTime = now;
        }
      }

      draw();
      requestAnimationFrame(gameLoop);
    }

    function endGame() {
      gameActive = false;
      showGameOverScreen(false);
    }

    function showGameOverScreen(isWin) {
      document.getElementById('gameOverScreen').style.display = 'flex';
      document.getElementById('gameOverTitle').textContent = isWin ? 'YOU WIN!' : 'GAME OVER';
      document.getElementById('finalScore').textContent = score;
    }

    function onCanvasClick(e) {
      if (!gameActive || !fallingPiece) return;

      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const col = Math.max(0, Math.min(CONFIG.grid_w - 2, Math.floor(x / CONFIG.cell_size)));

      placePieceAtColumn(col);
    }

    initGrid();
    fallingPiece = createPiece();
    canvas.addEventListener('click', onCanvasClick);

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
