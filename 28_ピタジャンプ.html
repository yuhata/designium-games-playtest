<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ピタジャンプ</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Arial', sans-serif;
    }
    canvas {
      border: 3px solid #00ff00;
      background: #0f0f1e;
      display: block;
      cursor: pointer;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const game = {
  state: 'playing',
  lives: 3,
  obstacleCount: 0,
  gauge: 0,
  bestScore: parseInt(localStorage.getItem('pitajump_best')) || 0,
  showNewBest: false,
  newBestTime: 0,
  startTime: Date.now(),
  timeSinceStart: 0,
  redFlashTime: 0,
  mouseX: 400,
};

const player = {
  x: 400,
  y: 550,
  width: 50,
  height: 50,
  targetX: 400,
};

let currentObstacle = null;
const particles = [];

const rivals = [
  { name: 'PeakJ', score: 28 },
  { name: 'TapMaster', score: 25 },
  { name: 'Sky Runner', score: 22 },
];

function updateRivalScores() {
  rivals[0].score = Math.min(29, game.obstacleCount + 2);
  rivals[1].score = Math.max(20, game.obstacleCount - 3);
  rivals[2].score = Math.max(15, game.obstacleCount - 8);
}

function spawnObstacle() {
  const y = -50;
  const x = 150 + Math.random() * (canvas.width - 300);
  currentObstacle = {
    x: x,
    y: y,
    width: 80,
    height: 40,
    speed: 3,
    passed: false,
  };
  game.obstacleCount++;
  updateRivalScores();

  if (game.obstacleCount >= 30) {
    game.state = 'won';
    triggerWinAnimation();
  }
}

function update() {
  game.timeSinceStart = (Date.now() - game.startTime) / 1000;

  if (game.redFlashTime > 0) {
    game.redFlashTime--;
  }

  if (game.state === 'playing') {
    // Smooth player movement
    player.targetX = Math.max(player.width / 2, Math.min(canvas.width - player.width / 2, game.mouseX));
    player.x += (player.targetX - player.x) * 0.15;

    // Update obstacle
    if (currentObstacle) {
      currentObstacle.y += currentObstacle.speed;

      // Collision check
      if (
        currentObstacle.x < player.x + player.width / 2 &&
        currentObstacle.x + currentObstacle.width > player.x - player.width / 2 &&
        currentObstacle.y < player.y + player.height &&
        currentObstacle.y + currentObstacle.height > player.y
      ) {
        game.lives--;
        game.redFlashTime = 12;
        if (game.lives <= 0) {
          game.state = 'lost';
        }
        currentObstacle = null;
      } else if (currentObstacle.y > canvas.height && !currentObstacle.passed) {
        currentObstacle.passed = true;
      }
    }

    // Check for new best
    if (game.obstacleCount > game.bestScore) {
      game.bestScore = game.obstacleCount;
      localStorage.setItem('pitajump_best', game.bestScore);
      game.showNewBest = true;
      game.newBestTime = 60;
    }

    if (game.showNewBest) {
      game.newBestTime--;
      if (game.newBestTime <= 0) {
        game.showNewBest = false;
      }
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].x += particles[i].vx;
    particles[i].y += particles[i].vy;
    particles[i].vy += 0.15;
    particles[i].life--;
    if (particles[i].life <= 0) {
      particles.splice(i, 1);
    }
  }
}

function draw() {
  ctx.fillStyle = '#0f0f1e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (game.state === 'playing') {
    // Progress bar (top)
    const progressBarY = 10;
    const progressBarHeight = 20;
    const progressBarWidth = 600;
    const progressBarX = (canvas.width - progressBarWidth) / 2;

    ctx.fillStyle = '#333333';
    ctx.fillRect(progressBarX, progressBarY, progressBarWidth, progressBarHeight);

    let progressColor = '#0066ff';
    if (game.obstacleCount >= 21 && game.obstacleCount < 30) {
      progressColor = '#ff0000';
    } else if (game.obstacleCount >= 30) {
      progressColor = '#ffaa00';
    }

    const progressWidth = progressBarWidth * (game.obstacleCount / 30);
    ctx.fillStyle = progressColor;
    ctx.fillRect(progressBarX, progressBarY, progressWidth, progressBarHeight);

    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.strokeRect(progressBarX, progressBarY, progressBarWidth, progressBarHeight);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'right';
    ctx.fillText('残り ' + Math.max(0, 30 - game.obstacleCount) + ' 個', canvas.width - 20, 35);

    // Gauge bar (bottom)
    const gaugeHeight = 25;
    const gaugeY = canvas.height - gaugeHeight - 15;
    ctx.fillStyle = '#333333';
    ctx.fillRect(50, gaugeY, 700, gaugeHeight);

    const gaugeColor = game.gauge < 50 ? '#00ff00' : game.gauge < 80 ? '#ffaa00' : '#ff6600';
    ctx.fillStyle = gaugeColor;
    ctx.fillRect(50, gaugeY, 700 * Math.min(1, game.gauge / 100), gaugeHeight);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(Math.floor(Math.min(100, game.gauge)) + '%', 400, gaugeY + 18);

    // Player
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(player.x - player.width / 2, player.y, player.width, player.height);
    ctx.fillStyle = '#000000';
    ctx.fillRect(player.x - player.width / 2 + 8, player.y + 10, player.width - 16, 12);

    // Current obstacle
    if (currentObstacle) {
      ctx.fillStyle = '#ff3333';
      ctx.fillRect(currentObstacle.x, currentObstacle.y, currentObstacle.width, currentObstacle.height);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('⚠', currentObstacle.x + currentObstacle.width / 2, currentObstacle.y + 28);
    }

    // Lives (hearts)
    ctx.fillStyle = '#ff0000';
    for (let i = 0; i < game.lives; i++) {
      drawHeart(20 + i * 40, 55, 18);
    }

    // Score display
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('スコア: ' + game.obstacleCount, 20, 95);
    ctx.fillText('ベスト: ' + game.bestScore, 20, 115);

    // Instruction
    if (game.timeSinceStart < 5) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
      ctx.fillRect(0, 200, canvas.width, 120);
      ctx.fillStyle = '#00ff00';
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('マウス/タップでゲージを満タンに！', canvas.width / 2, 235);
      ctx.fillText('左右移動で障害物を避けよう！', canvas.width / 2, 270);
      ctx.fillText('30個スポーンで勝利！', canvas.width / 2, 305);
    }

    // NEW BEST
    if (game.showNewBest) {
      const pulse = Math.sin(Date.now() / 100) * 0.5 + 0.5;
      ctx.fillStyle = 'rgba(255, 215, 0, ' + (pulse * 0.7 + 0.3) + ')';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('🌟 NEW BEST! 🌟', canvas.width / 2, 150);
    }

    // Rival ranking
    ctx.fillStyle = '#ffaa00';
    ctx.font = '12px Arial';
    ctx.textAlign = 'right';
    rivals.sort((a, b) => b.score - a.score);
    ctx.fillText('--- ランキング ---', canvas.width - 15, 50);
    for (let i = 0; i < rivals.length; i++) {
      const rankColor = i === 0 ? '#ffff00' : '#cccccc';
      ctx.fillStyle = rankColor;
      ctx.fillText(`${i + 1}位: ${rivals[i].name}`, canvas.width - 15, 70 + i * 18);
      ctx.fillText(`${rivals[i].score}個`, canvas.width - 145, 70 + i * 18);
    }

    // Red flash
    if (game.redFlashTime > 0) {
      ctx.fillStyle = 'rgba(255, 0, 0, ' + (game.redFlashTime / 12) * 0.5 + ')';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

  } else if (game.state === 'won') {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#ffaa00';
    ctx.font = 'bold 70px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🎉 VICTORY! 🎉', canvas.width / 2, 120);

    ctx.fillStyle = '#ffffff';
    ctx.font = '50px Arial';
    ctx.fillText('SCORE: 30', canvas.width / 2, 220);

    ctx.font = '24px Arial';
    ctx.fillText('ベスト: ' + game.bestScore, canvas.width / 2, 270);
    ctx.fillText('クリックで再スタート', canvas.width / 2, 340);

    for (const particle of particles) {
      ctx.globalAlpha = Math.max(0, particle.life / 100);
      ctx.fillStyle = particle.color;
      ctx.beginPath();
      ctx.arc(particle.x, particle.y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

  } else if (game.state === 'lost') {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#ff3333';
    ctx.font = 'bold 70px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('💀 GAME OVER 💀', canvas.width / 2, 120);

    ctx.fillStyle = '#ffffff';
    ctx.font = '50px Arial';
    ctx.fillText('SCORE: ' + game.obstacleCount, canvas.width / 2, 220);

    ctx.font = '24px Arial';
    ctx.fillText('ベスト: ' + game.bestScore, canvas.width / 2, 270);
    ctx.fillText('クリックで再スタート', canvas.width / 2, 340);
  }
}

function drawHeart(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  ctx.moveTo(0, -size / 4);
  ctx.arc(-size / 4, -size / 4, size / 4, 0, Math.PI * 2);
  ctx.arc(size / 4, -size / 4, size / 4, 0, Math.PI * 2);
  ctx.lineTo(0, size / 2);
  ctx.fill();
  ctx.restore();
}

function triggerWinAnimation() {
  for (let i = 0; i < 100; i++) {
    const angle = (Math.PI * 2 * i) / 100;
    const speed = 2 + Math.random() * 3;
    particles.push({
      x: canvas.width / 2,
      y: canvas.height / 2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 100,
      color: '#ffaa00',
    });
  }
}

function handleClick() {
  if (game.state !== 'playing') {
    resetGame();
    return;
  }

  game.gauge += 20;

  // Visual feedback
  ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (game.gauge >= 100) {
    game.gauge = 0;
    spawnObstacle();
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Mouse events
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  game.mouseX = e.clientX - rect.left;
});

canvas.addEventListener('mousedown', handleClick);
canvas.addEventListener('mouseup', () => {});

// Touch events
canvas.addEventListener('touchmove', (e) => {
  const rect = canvas.getBoundingClientRect();
  game.mouseX = e.touches[0].clientX - rect.left;
  e.preventDefault();
});

canvas.addEventListener('touchstart', handleClick);
canvas.addEventListener('touchend', () => {});

function resetGame() {
  game.state = 'playing';
  game.lives = 3;
  game.obstacleCount = 0;
  game.gauge = 0;
  game.showNewBest = false;
  game.startTime = Date.now();
  game.redFlashTime = 0;
  particles.length = 0;
  currentObstacle = null;
  player.x = 400;
  player.targetX = 400;
  game.mouseX = 400;
  updateRivalScores();
}

gameLoop();
</script>
</body>
</html>
