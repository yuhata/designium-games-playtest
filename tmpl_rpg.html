<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERO QUEST</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        #gameContainer {
            position: relative;
            background: #1a1a2e;
            border: 3px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            overflow: hidden;
        }
        
        #startScreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            text-align: center;
            z-index: 100;
        }
        
        #startScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }
        
        #startScreen p {
            font-size: 14px;
            margin-bottom: 10px;
            color: #aaa;
            line-height: 1.6;
        }
        
        .btn {
            padding: 12px 30px;
            margin: 10px;
            font-size: 16px;
            border: 2px solid #00d4ff;
            background: transparent;
            color: #00d4ff;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .btn:hover:not(:disabled) {
            background: #00d4ff;
            color: #1a1a2e;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-start {
            font-size: 20px;
            padding: 15px 50px;
            margin-top: 40px;
        }
        
        #gameScreen {
            display: none;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            color: #fff;
            padding: 20px;
            flex-direction: column;
        }
        
        #gameScreen.active {
            display: flex;
        }
        
        .hud {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 12px;
        }
        
        .hud-item {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        
        .hud-item label {
            display: block;
            font-size: 11px;
            color: #00d4ff;
            margin-bottom: 4px;
        }
        
        .hud-item value {
            display: block;
            font-size: 16px;
            font-weight: bold;
        }
        
        .battle-info {
            background: rgba(0, 100, 150, 0.3);
            border: 1px solid #00d4ff;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            min-height: 90px;
        }
        
        .battle-info h3 {
            color: #00d4ff;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .enemy-status {
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        #logContainer {
            font-size: 11px;
            color: #aaa;
            margin-top: 8px;
            line-height: 1.3;
        }
        
        .log {
            margin: 3px 0;
        }
        
        .log.player {
            color: #00ff00;
        }
        
        .log.enemy {
            color: #ff6666;
        }
        
        .log.heal {
            color: #ffff00;
        }
        
        .commands {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            flex-grow: 1;
            align-content: flex-end;
        }
        
        .commands button {
            padding: 15px;
            font-size: 15px;
        }
        
        #gameOverScreen, #clearScreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: #fff;
        }
        
        #gameOverScreen.active, #clearScreen.active {
            display: flex;
        }
        
        #gameOverScreen h2 {
            font-size: 48px;
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.8);
            margin-bottom: 20px;
        }
        
        #clearScreen h2 {
            font-size: 48px;
            color: #00ff00;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            margin-bottom: 20px;
        }
        
        .end-screen p {
            font-size: 16px;
            margin-bottom: 30px;
            color: #aaa;
        }
        
        .retry-btn {
            font-size: 18px;
            padding: 12px 40px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="startScreen">
            <h1>HERO QUEST</h1>
            <p>敵3体を倒し、冒険を完成させよう</p>
            <p style="color: #00d4ff; margin-top: 20px;">クリア条件：全敵撃破</p>
            <p style="color: #ff6666;">ゲームオーバー条件：HPが0になる</p>
            <button class="btn btn-start" onclick="startGame()">START</button>
        </div>
        
        <div id="gameScreen">
            <div class="hud">
                <div class="hud-item">
                    <label>プレイヤーHP</label>
                    <value id="playerHpDisplay">50</value>
                </div>
                <div class="hud-item">
                    <label>プレイヤーMP</label>
                    <value id="playerMpDisplay">20</value>
                </div>
                <div class="hud-item">
                    <label>敵進捗</label>
                    <value id="enemyProgressDisplay">1/3</value>
                </div>
            </div>
            
            <div class="battle-info">
                <h3 id="enemyNameDisplay">敵: スライム</h3>
                <div class="enemy-status">敵HP: <span id="enemyHpDisplay">20</span></div>
                <div id="logContainer">
                    <div class="log">戦闘開始</div>
                </div>
            </div>
            
            <div class="commands">
                <button class="btn" id="cmdAttack" onclick="playerAction('attack')">攻撃</button>
                <button class="btn" id="cmdGuard" onclick="playerAction('guard')">ガード</button>
                <button class="btn" id="cmdMagic" onclick="playerAction('magic')">魔法</button>
                <button class="btn" id="cmdHeal" onclick="playerAction('heal')">回復</button>
            </div>
        </div>
        
        <div id="gameOverScreen">
            <h2>GAME OVER</h2>
            <p class="end-screen p">敵の前に倒れてしまった...</p>
            <button class="btn retry-btn" onclick="retryGame()">もう一度</button>
        </div>
        
        <div id="clearScreen">
            <h2>CLEAR!</h2>
            <p class="end-screen p">冒険を完成させた。おめでとう</p>
            <button class="btn retry-btn" onclick="retryGame()">もう一度</button>
        </div>
    </div>
    
    <script>
        const config = {
            title: 'HERO QUEST',
            bg_color: '#1a1a2e',
            player_hp: 50,
            player_atk: 8,
            player_mp: 20,
            magic_cost: 5,
            magic_power: 15,
            enemy1_hp: 20,
            enemy2_hp: 30,
            boss_hp: 60
        };
        
        const gameState = {
            running: false,
            playerHp: config.player_hp,
            playerMp: config.player_mp,
            playerMaxHp: config.player_hp,
            playerMaxMp: config.player_mp,
            guarding: false,
            currentEnemy: 0,
            enemies: [
                { hp: config.enemy1_hp, maxHp: config.enemy1_hp, name: 'スライム' },
                { hp: config.enemy2_hp, maxHp: config.enemy2_hp, name: 'ゴーレム' },
                { hp: config.boss_hp, maxHp: config.boss_hp, name: 'ボス' }
            ],
            logs: ['戦闘開始']
        };
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').classList.add('active');
            document.getElementById('gameContainer').style.width = '400px';
            document.getElementById('gameContainer').style.height = '600px';
            gameState.running = true;
            updateHUD();
        }
        
        function updateHUD() {
            document.getElementById('playerHpDisplay').textContent = gameState.playerHp;
            document.getElementById('playerMpDisplay').textContent = gameState.playerMp;
            document.getElementById('enemyProgressDisplay').textContent = (gameState.currentEnemy + 1) + '/3';
            document.getElementById('enemyHpDisplay').textContent = gameState.enemies[gameState.currentEnemy].hp;
            document.getElementById('enemyNameDisplay').textContent = '敵: ' + gameState.enemies[gameState.currentEnemy].name;
            updateLog();
        }
        
        function addLog(message) {
            gameState.logs.push(message);
            if (gameState.logs.length > 3) {
                gameState.logs.shift();
            }
            updateLog();
        }
        
        function updateLog() {
            const logContainer = document.getElementById('logContainer');
            logContainer.innerHTML = '';
            for (let i = 0; i < gameState.logs.length; i++) {
                const log = document.createElement('div');
                log.className = 'log';
                log.textContent = gameState.logs[i];
                logContainer.appendChild(log);
            }
        }
        
        function playerAction(action) {
            if (!gameState.running) return;
            
            disableCommands();
            
            let message = '';
            
            if (action === 'attack') {
                const damage = config.player_atk;
                message = 'プレイヤーが攻撃！ダメージ: ' + damage;
                gameState.enemies[gameState.currentEnemy].hp -= damage;
            } else if (action === 'guard') {
                gameState.guarding = true;
                message = 'ガード構える！';
            } else if (action === 'magic') {
                if (gameState.playerMp >= config.magic_cost) {
                    const damage = config.magic_power;
                    gameState.playerMp -= config.magic_cost;
                    message = '魔法を放った！ダメージ: ' + damage;
                    gameState.enemies[gameState.currentEnemy].hp -= damage;
                } else {
                    message = 'MPが足りない！';
                    enableCommands();
                    addLog(message);
                    return;
                }
            } else if (action === 'heal') {
                const healAmount = 10;
                gameState.playerHp = Math.min(gameState.playerHp + healAmount, gameState.playerMaxHp);
                message = '回復した！+' + healAmount;
            }
            
            addLog(message);
            updateHUD();
            
            if (gameState.enemies[gameState.currentEnemy].hp <= 0) {
                addLog(gameState.enemies[gameState.currentEnemy].name + 'を撃破！');
                gameState.currentEnemy++;
                
                if (gameState.currentEnemy >= 3) {
                    setTimeout(function() {
                        gameState.running = false;
                        document.getElementById('gameScreen').classList.remove('active');
                        document.getElementById('clearScreen').classList.add('active');
                    }, 1000);
                    return;
                }
            }
            
            setTimeout(function() {
                enemyTurn();
                enableCommands();
            }, 1500);
        }
        
        function enemyTurn() {
            const enemy = gameState.enemies[gameState.currentEnemy];
            const minDamage = 5;
            const maxDamage = 15;
            let damage = Math.floor(Math.random() * (maxDamage - minDamage + 1)) + minDamage;
            
            if (gameState.guarding) {
                damage = Math.floor(damage * 0.5);
                addLog(enemy.name + '攻撃！ガード発動 ダメージ半減: ' + damage);
                gameState.guarding = false;
            } else {
                addLog(enemy.name + '攻撃！ダメージ: ' + damage);
            }
            
            gameState.playerHp -= damage;
            updateHUD();
            
            if (gameState.playerHp <= 0) {
                gameState.running = false;
                setTimeout(function() {
                    document.getElementById('gameScreen').classList.remove('active');
                    document.getElementById('gameOverScreen').classList.add('active');
                }, 1000);
            }
        }
        
        function disableCommands() {
            document.getElementById('cmdAttack').disabled = true;
            document.getElementById('cmdGuard').disabled = true;
            document.getElementById('cmdMagic').disabled = true;
            document.getElementById('cmdHeal').disabled = true;
        }
        
        function enableCommands() {
            document.getElementById('cmdAttack').disabled = false;
            document.getElementById('cmdGuard').disabled = false;
            document.getElementById('cmdMagic').disabled = false;
            document.getElementById('cmdHeal').disabled = false;
        }
        
        function retryGame() {
            document.getElementById('gameOverScreen').classList.remove('active');
            document.getElementById('clearScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
            gameState.playerHp = config.player_hp;
            gameState.playerMp = config.player_mp;
            gameState.guarding = false;
            gameState.currentEnemy = 0;
            gameState.enemies = [
                { hp: config.enemy1_hp, maxHp: config.enemy1_hp, name: 'スライム' },
                { hp: config.enemy2_hp, maxHp: config.enemy2_hp, name: 'ゴーレム' },
                { hp: config.boss_hp, maxHp: config.boss_hp, name: 'ボス' }
            ];
            gameState.logs = ['戦闘開始'];
        }
    </script>
</body>
</html>
