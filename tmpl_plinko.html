<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLINKO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 20px;
        }

        #gameOverScreen, #clearScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 20px;
            background: rgba(0, 0, 0, 0.8);
        }

        .screen-title {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
        }

        .screen-text {
            font-size: 24px;
            color: #aaa;
            text-align: center;
            max-width: 500px;
        }

        .screen-score {
            font-size: 32px;
            color: #f6e05e;
            font-weight: bold;
        }

        .btn {
            padding: 12px 30px;
            font-size: 18px;
            background: #9f7aea;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #a78bca;
        }

        #gameContainer {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
        }

        #gameInfo {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 14px;
            color: #fff;
            font-weight: bold;
            z-index: 10;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 12px;
            color: #aaa;
            z-index: 10;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

<div id="startScreen">
    <div class="screen-title">PLINKO</div>
    <div class="screen-text">
        <p>ペグを避けながらボールを落とし、スロットに到達させよう！</p>
        <p style="margin-top: 20px; font-size: 18px;">
            <strong>ゲーム開始時:</strong> 10個のボールでプレイ<br>
            <strong>クリア条件:</strong> 合計スコア 30点以上<br>
            <strong>ゲームオーバー:</strong> ボール終了時にスコア30点未満
        </p>
    </div>
    <button class="btn" onclick="startGame()">START</button>
</div>

<div id="gameOverScreen">
    <div class="screen-title">GAME OVER</div>
    <div class="screen-text">スコア不足です</div>
    <div class="screen-score" id="gameOverScore">0点</div>
    <button class="btn" onclick="retryGame()">RETRY</button>
</div>

<div id="clearScreen">
    <div class="screen-title">CLEAR!</div>
    <div class="screen-text">目標スコアに到達しました！</div>
    <div class="screen-score" id="clearScore">0点</div>
    <button class="btn" onclick="retryGame()">RETRY</button>
</div>

<div id="gameContainer">
    <div id="gameInfo">
        <div>ボール: <span id="ballsLeft">10</span></div>
        <div>スコア: <span id="score">0</span> / 30点</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">
        ▼ クリック/タップでボールを落とします
    </div>
</div>

<script>
// theme:        string    // param生成への入力
// title:        string    // config.title = 'PLINKO'
// bg_color:     string    // config.bg_color = '#1a0a2e'
// peg_color:    string    // config.peg_color = '#9f7aea'
// ball_color:   string    // config.ball_color = '#f6e05e'
// slot_colors:  string[]  // config.slot_colors = ['#e53e3e','#dd6b20','#d69e2e','#38a169','#d69e2e','#dd6b20','#e53e3e']
// win_balls:    int       // default: 10
// win_score:    int       // default: 30
// gravity:      float     // default: 0.3
// bounce:       float     // default: 0.6

const config = {
    title: 'PLINKO',
    bg_color: '#1a0a2e',
    peg_color: '#9f7aea',
    ball_color: '#f6e05e',
    slot_colors: ['#e53e3e','#dd6b20','#d69e2e','#38a169','#d69e2e','#dd6b20','#e53e3e'],
    win_balls: 10,
    win_score: 30,
    gravity: 0.3,
    bounce: 0.6
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 400;
canvas.height = 600;
document.getElementById('gameContainer').style.width = canvas.width + 'px';
document.getElementById('gameContainer').style.height = canvas.height + 'px';

document.body.style.background = config.bg_color;

const gameState = {
    running: false,
    balls: [],
    droppedCount: 0,
    totalScore: 0,
    dropping: false,
    pegs: [],
    slots: []
};

const pegRadius = 8;
const ballRadius = 6;
const dropZoneHeight = 80;
const pegZoneStart = 80;
const pegZoneEnd = 480;
const slotZoneStart = 480;

function initializePegs() {
    gameState.pegs = [];
    const pegSpacingX = 35;
    const pegSpacingY = 45;
    const startX = 50;
    const startY = 110;
    
    for (let row = 0; row < 8; row++) {
        const rowY = startY + row * pegSpacingY;
        const rowOffset = (row % 2) * (pegSpacingX / 2);
        
        for (let col = 0; col < 8 - row; col++) {
            const x = startX + rowOffset + col * pegSpacingX;
            if (x > 20 && x < canvas.width - 20) {
                gameState.pegs.push({
                    x: x,
                    y: rowY,
                    radius: pegRadius
                });
            }
        }
    }
}

function initializeSlots() {
    gameState.slots = [];
    const slotWidth = canvas.width / 7;
    const slotCounts = [1, 2, 5, 10, 5, 2, 1];
    
    for (let i = 0; i < 7; i++) {
        gameState.slots.push({
            x: i * slotWidth,
            width: slotWidth,
            count: slotCounts[i]
        });
    }
}

function dropBall(x) {
    if (gameState.dropping || !gameState.running) return;
    if (gameState.droppedCount >= config.win_balls) return;
    
    gameState.dropping = true;
    gameState.balls.push({
        x: Math.max(ballRadius, Math.min(canvas.width - ballRadius, x)),
        y: ballRadius + 5,
        vx: 0,
        vy: 0,
        active: true
    });
    gameState.droppedCount++;
}

function updateBalls() {
    gameState.balls.forEach(ball => {
        if (!ball.active) return;
        
        ball.vy += config.gravity;
        ball.x += ball.vx;
        ball.y += ball.vy;
        
        if (ball.x - ballRadius < 0) {
            ball.x = ballRadius;
            ball.vx = -ball.vx * 0.8;
        }
        if (ball.x + ballRadius > canvas.width) {
            ball.x = canvas.width - ballRadius;
            ball.vx = -ball.vx * 0.8;
        }
        
        gameState.pegs.forEach(peg => {
            const dx = ball.x - peg.x;
            const dy = ball.y - peg.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < ballRadius + peg.radius) {
                const angle = Math.atan2(dy, dx);
                const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                const newSpeed = Math.max(2, speed * config.bounce);
                
                ball.vx = Math.cos(angle) * newSpeed + (Math.random() - 0.5) * 2;
                ball.vy = -Math.abs(Math.sin(angle) * newSpeed * config.bounce);
                
                ball.x = peg.x + Math.cos(angle) * (ballRadius + peg.radius + 1);
                ball.y = peg.y + Math.sin(angle) * (ballRadius + peg.radius + 1);
            }
        });
        
        if (ball.y > slotZoneStart + 100) {
            ball.active = false;
            const slotIndex = Math.floor((ball.x / canvas.width) * 7);
            const safeIndex = Math.max(0, Math.min(6, slotIndex));
            gameState.totalScore += gameState.slots[safeIndex].count;
            gameState.dropping = false;
        }
    });
}

function draw() {
    ctx.fillStyle = config.bg_color;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = config.peg_color;
    gameState.pegs.forEach(peg => {
        ctx.beginPath();
        ctx.arc(peg.x, peg.y, peg.radius, 0, Math.PI * 2);
        ctx.fill();
    });
    
    gameState.slots.forEach((slot, i) => {
        ctx.fillStyle = config.slot_colors[i];
        ctx.fillRect(slot.x, slotZoneStart, slot.width, 100);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(slot.count, slot.x + slot.width / 2, slotZoneStart + 50);
    });
    
    ctx.fillStyle = config.ball_color;
    gameState.balls.forEach(ball => {
        if (ball.active) {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2);
            ctx.fill();
        }
    });
}

function updateHUD() {
    document.getElementById('ballsLeft').textContent = config.win_balls - gameState.droppedCount;
    document.getElementById('score').textContent = gameState.totalScore;
}

function gameLoop() {
    if (gameState.running) {
        updateBalls();
        draw();
        updateHUD();
        
        if (gameState.droppedCount >= config.win_balls && gameState.balls.every(b => !b.active)) {
            gameState.running = false;
            
            if (gameState.totalScore >= config.win_score) {
                document.getElementById('clearScore').textContent = gameState.totalScore + '点';
                document.getElementById('clearScreen').style.display = 'flex';
            } else {
                document.getElementById('gameOverScore').textContent = gameState.totalScore + '点 (目標: ' + config.win_score + '点)';
                document.getElementById('gameOverScreen').style.display = 'flex';
            }
            return;
        }
        
        requestAnimationFrame(gameLoop);
    }
}

function startGame() {
    document.getElementById('startScreen').style.display = 'none';
    gameState.running = true;
    gameState.balls = [];
    gameState.droppedCount = 0;
    gameState.totalScore = 0;
    gameState.dropping = false;
    updateHUD();
    gameLoop();
}

function retryGame() {
    document.getElementById('gameOverScreen').style.display = 'none';
    document.getElementById('clearScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
    gameState.running = false;
}

canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    dropBall(x);
});

canvas.addEventListener('touchstart', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    dropBall(x);
});

initializePegs();
initializeSlots();
draw();
</script>

</body>
</html>
