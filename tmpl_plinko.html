<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLINKO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            font-family: Arial, sans-serif;
        }
        
        #gameContainer {
            position: relative;
            border: 2px solid #ccc;
            background: #1a0a2e;
            overflow: hidden;
        }
        
        canvas {
            display: block;
        }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 10, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            gap: 20px;
        }
        
        #startScreen h1 {
            color: #f6e05e;
            font-size: 48px;
            text-shadow: 0 0 10px rgba(246, 224, 94, 0.5);
        }
        
        #startScreen p {
            color: #fff;
            font-size: 16px;
            text-align: center;
            max-width: 300px;
            line-height: 1.5;
        }
        
        #startButton {
            background: #9f7aea;
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        #startButton:hover {
            background: #b39ddb;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 10, 46, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            gap: 20px;
        }
        
        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 10, 46, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            gap: 20px;
        }
        
        .screen-title {
            color: #f6e05e;
            font-size: 48px;
            text-shadow: 0 0 10px rgba(246, 224, 94, 0.5);
        }
        
        .screen-subtitle {
            color: #fff;
            font-size: 24px;
        }
        
        .screen-score {
            color: #9f7aea;
            font-size: 32px;
            font-weight: bold;
        }
        
        #retryButton {
            background: #9f7aea;
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        
        #retryButton:hover {
            background: #b39ddb;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="startScreen">
            <h1>PLINKO</h1>
            <p>ボールをドロップゾーンにクリックして落とそう！<br>
            目標スコア: 30点以上でクリア！<br>
            10球を使って高スコアを目指せ</p>
            <button id="startButton">START</button>
        </div>
        
        <div id="gameOverScreen">
            <h1 class="screen-title">GAME OVER</h1>
            <p class="screen-subtitle">目標に届きませんでした...</p>
            <p class="screen-score" id="finalScoreOver">スコア: 0 / 30</p>
            <button id="retryButton">もう一度プレイ</button>
        </div>
        
        <div id="clearScreen">
            <h1 class="screen-title">CLEAR!</h1>
            <p class="screen-subtitle">目標スコアを達成しました！</p>
            <p class="screen-score" id="finalScoreClear">スコア: 0 / 30</p>
            <button id="retryButton">もう一度プレイ</button>
        </div>
        
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const config = {
            title: 'PLINKO',
            bg_color: '#1a0a2e',
            peg_color: '#9f7aea',
            ball_color: '#f6e05e',
            slot_colors: ['#e53e3e','#dd6b20','#d69e2e','#38a169','#d69e2e','#dd6b20','#e53e3e'],
            win_balls: 10,
            win_score: 30,
            gravity: 0.4,
            bounce: 0.5
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 400;
        canvas.height = 600;

        const gameContainer = document.getElementById('gameContainer');
        gameContainer.style.width = canvas.width + 'px';
        gameContainer.style.height = canvas.height + 'px';

        const gameState = {
            running: false,
            dropping: false,
            balls: [],
            totalScore: 0,
            ballsDropped: 0,
            slots: [
                { x: 20, y: 520, width: 50, height: 60, count: 1 },
                { x: 77, y: 520, width: 50, height: 60, count: 2 },
                { x: 134, y: 520, width: 50, height: 60, count: 5 },
                { x: 191, y: 520, width: 50, height: 60, count: 10 },
                { x: 248, y: 520, width: 50, height: 60, count: 5 },
                { x: 305, y: 520, width: 50, height: 60, count: 2 },
                { x: 362, y: 520, width: 50, height: 60, count: 1 }
            ],
            pegs: []
        };

        function generatePegs() {
            gameState.pegs = [];
            const pegRadius = 6;
            const spacing = 40;
            const startY = 120;
            const startX = 200;
            
            for (let row = 0; row < 8; row++) {
                const pegCount = row + 3;
                const rowWidth = (pegCount - 1) * spacing;
                const rowStartX = startX - rowWidth / 2;
                for (let col = 0; col < pegCount; col++) {
                    gameState.pegs.push({
                        x: rowStartX + col * spacing,
                        y: startY + row * spacing,
                        radius: pegRadius
                    });
                }
            }
        }

        generatePegs();

        function dropBall(x) {
            if (gameState.dropping || gameState.ballsDropped >= config.win_balls) return;
            
            gameState.dropping = true;
            gameState.ballsDropped++;
            gameState.balls.push({
                x: x,
                y: 40,
                vx: 0,
                vy: 0,
                radius: 8,
                active: true,
                startTime: Date.now()
            });
        }

        function updateBalls() {
            for (let i = gameState.balls.length - 1; i >= 0; i--) {
                const ball = gameState.balls[i];
                
                if (!ball.active) {
                    gameState.balls.splice(i, 1);
                    gameState.dropping = false;
                    continue;
                }

                if (Date.now() - ball.startTime > 8000) {
                    ball.active = false;
                    const slotIndex = Math.max(0, Math.min(6, Math.floor((ball.x / canvas.width) * 7)));
                    gameState.totalScore += gameState.slots[slotIndex].count;
                    continue;
                }

                ball.vy += config.gravity;

                ball.x += ball.vx;
                ball.y += ball.vy;

                if (ball.x < ball.radius) {
                    ball.x = ball.radius;
                    ball.vx *= -0.5;
                }
                if (ball.x > canvas.width - ball.radius) {
                    ball.x = canvas.width - ball.radius;
                    ball.vx *= -0.5;
                }

                if (ball.y > 580) {
                    ball.active = false;
                    const slotIndex = Math.max(0, Math.min(6, Math.floor((ball.x / canvas.width) * 7)));
                    gameState.totalScore += gameState.slots[slotIndex].count;
                    continue;
                }

                for (const peg of gameState.pegs) {
                    const dx = ball.x - peg.x;
                    const dy = ball.y - peg.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < ball.radius + peg.radius) {
                        const angle = Math.atan2(dy, dx);
                        const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                        
                        ball.x = peg.x + Math.cos(angle) * (ball.radius + peg.radius);
                        ball.y = peg.y + Math.sin(angle) * (ball.radius + peg.radius);
                        
                        const newSpeed = speed * config.bounce || 2;
                        ball.vx = Math.cos(angle) * newSpeed;
                        ball.vy = Math.min(-1, -Math.abs(Math.sin(angle) * newSpeed * config.bounce));
                    }
                }
            }
        }

        function draw() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.fillRect(0, 0, canvas.width, 80);

            ctx.fillStyle = '#fff';
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('クリックしてボールをドロップ', canvas.width / 2, 40);

            ctx.fillStyle = config.peg_color;
            for (const peg of gameState.pegs) {
                ctx.beginPath();
                ctx.arc(peg.x, peg.y, peg.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let i = 0; i < gameState.slots.length; i++) {
                const slot = gameState.slots[i];
                ctx.fillStyle = config.slot_colors[i];
                ctx.fillRect(slot.x, slot.y, slot.width, slot.height);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(slot.x, slot.y, slot.width, slot.height);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(slot.count, slot.x + slot.width / 2, slot.y + slot.height / 2 + 6);
            }

            ctx.fillStyle = config.ball_color;
            for (const ball of gameState.balls) {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = '#fff';
            ctx.font = '14px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('残りボール: ' + (config.win_balls - gameState.ballsDropped), 10, 30);
            ctx.fillText('スコア: ' + gameState.totalScore + ' / ' + config.win_score, 10, 50);
        }

        function gameLoop() {
            if (gameState.running) {
                updateBalls();
                draw();

                if (gameState.ballsDropped >= config.win_balls && gameState.balls.length === 0) {
                    gameState.running = false;
                    if (gameState.totalScore >= config.win_score) {
                        document.getElementById('clearScreen').style.display = 'flex';
                        document.getElementById('finalScoreClear').textContent = 'スコア: ' + gameState.totalScore + ' / ' + config.win_score;
                    } else {
                        document.getElementById('gameOverScreen').style.display = 'flex';
                        document.getElementById('finalScoreOver').textContent = 'スコア: ' + gameState.totalScore + ' / ' + config.win_score;
                    }
                }

                requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            gameState.running = true;
            gameState.dropping = false;
            gameState.balls = [];
            gameState.totalScore = 0;
            gameState.ballsDropped = 0;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            gameLoop();
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }

        document.getElementById('startButton').addEventListener('click', startGame);
        
        const retryButtons = document.querySelectorAll('#retryButton');
        retryButtons.forEach(function(btn) {
            btn.addEventListener('click', retryGame);
        });

        canvas.addEventListener('click', function(e) {
            if (!gameState.running) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            dropBall(x);
        });

        draw();
    </script>
</body>
</html>
