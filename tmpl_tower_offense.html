<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Offense</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #startScreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .screen-overlay {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.9);
        }

        .screen-content {
            text-align: center;
            color: white;
        }

        .screen-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .screen-content p {
            font-size: 18px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 30px;
            font-size: 18px;
            margin-top: 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #58a6ff;
            color: #0d1117;
            font-weight: bold;
        }

        button:hover {
            background-color: #79c0ff;
        }

        #gameContainer {
            position: relative;
            border: 2px solid #58a6ff;
            background: #0d1117;
            margin-bottom: 20px;
        }

        canvas {
            display: block;
            background: #0d1117;
        }

        #unitButtons {
            display: none;
            gap: 10px;
            margin-top: 20px;
        }

        .unit-button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid #58a6ff;
            border-radius: 5px;
            background-color: transparent;
            color: #58a6ff;
            font-weight: bold;
            transition: all 0.2s;
        }

        .unit-button:hover {
            background-color: #58a6ff;
            color: #0d1117;
        }

        .unit-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #58a6ff;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
        }

        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #79c0ff;
            font-size: 12px;
            z-index: 10;
        }

        #goal {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #f78166;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <div class="screen-content">
            <h1>TOWER OFFENSE</h1>
            <p>Produce units and destroy the enemy base!</p>
            <p style="font-size: 14px; margin-top: 30px;">
                <span style="color: #58a6ff;">■ Destroy Enemy Base</span> | 
                <span style="color: #f78166;">■ Defend Your Base</span>
            </p>
            <button onclick="startGame()">START</button>
        </div>
    </div>

    <div id="gameOverScreen" class="screen-overlay">
        <div class="screen-content">
            <h1>GAME OVER</h1>
            <p>Your base was destroyed!</p>
            <button onclick="retryGame()">RETRY</button>
        </div>
    </div>

    <div id="clearScreen" class="screen-overlay">
        <div class="screen-content">
            <h1>VICTORY!</h1>
            <p>Enemy base destroyed!</p>
            <button onclick="retryGame()">PLAY AGAIN</button>
        </div>
    </div>

    <div id="gameContainer">
        <div id="hud">
            Gold: <span id="goldDisplay">0</span> | Ally Base: <span id="allyHPDisplay">0</span>
        </div>
        <div id="goal">
            Enemy Base: <span id="enemyHPDisplay">0</span>
        </div>
        <div id="instructions">
            Click unit buttons to produce units. They auto-attack enemies.
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="unitButtons">
        <button class="unit-button" id="soldierBtn" onclick="produceUnit('soldier')">Soldier (50g)</button>
        <button class="unit-button" id="tankBtn" onclick="produceUnit('tank')">Tank (150g)</button>
        <button class="unit-button" id="archerBtn" onclick="produceUnit('archer')">Archer (100g)</button>
    </div>

    <script>
        const config = {
            title: 'TOWER OFFENSE',
            bg_color: '#0d1117',
            ally_color: '#58a6ff',
            enemy_color: '#f78166',
            base_color: '#4a5568',
            base_hp: 50,
            gold_rate: 20,
            soldier_cost: 50,
            tank_cost: 150,
            archer_cost: 100
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 300;
        document.getElementById('gameContainer').style.width = canvas.width + 'px';
        document.getElementById('gameContainer').style.height = canvas.height + 'px';

        const gameState = {
            running: false,
            gold: 100,
            allyBase: { x: 30, y: 150, width: 30, height: 60, hp: config.base_hp, maxHp: config.base_hp },
            enemyBase: { x: 540, y: 150, width: 30, height: 60, hp: config.base_hp, maxHp: config.base_hp },
            allyUnits: [],
            enemyUnits: [],
            time: 0,
            lastEnemySpawn: 0,
            enemySpawnInterval: 1000,
            difficulty: 0
        };

        const unitTypes = {
            soldier: { hp: 10, atk: 3, spd: 3, cost: config.soldier_cost, range: 0, color: config.ally_color },
            tank: { hp: 30, atk: 5, spd: 1.5, cost: config.tank_cost, range: 0, color: config.ally_color },
            archer: { hp: 6, atk: 2, spd: 2, cost: config.archer_cost, range: 80, color: config.ally_color },
            e_soldier: { hp: 10, atk: 3, spd: 3, cost: 0, range: 0, color: config.enemy_color },
            e_tank: { hp: 30, atk: 5, spd: 1.5, cost: 0, range: 0, color: config.enemy_color },
            e_archer: { hp: 6, atk: 2, spd: 2, cost: 0, range: 80, color: config.enemy_color }
        };

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('unitButtons').style.display = 'flex';
            gameState.running = true;
            gameState.gold = 100;
            gameState.allyBase.hp = gameState.allyBase.maxHp;
            gameState.enemyBase.hp = gameState.enemyBase.maxHp;
            gameState.allyUnits = [];
            gameState.enemyUnits = [];
            gameState.time = 0;
            gameState.difficulty = 0;
            gameLoop();
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('unitButtons').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }

        function produceUnit(type) {
            if (!gameState.running) return;
            const cost = unitTypes[type].cost;
            if (gameState.gold >= cost) {
                gameState.gold -= cost;
                gameState.allyUnits.push({
                    x: gameState.allyBase.x + gameState.allyBase.width,
                    y: gameState.allyBase.y + gameState.allyBase.height / 2,
                    type: type,
                    hp: unitTypes[type].hp,
                    maxHp: unitTypes[type].hp,
                    lastAttackTime: 0
                });
            }
        }

        function spawnEnemyUnit() {
            const types = ['e_soldier', 'e_tank', 'e_archer'];
            const rand = Math.random();
            let type = 'e_soldier';
            if (gameState.difficulty > 5 && rand < 0.3) type = 'e_tank';
            if (gameState.difficulty > 8 && rand < 0.2) type = 'e_archer';
            
            gameState.enemyUnits.push({
                x: gameState.enemyBase.x - 50,
                y: gameState.enemyBase.y + gameState.enemyBase.height / 2,
                type: type,
                hp: unitTypes[type].hp,
                maxHp: unitTypes[type].hp,
                lastAttackTime: 0
            });
        }

        function updateUnits() {
            const attackCooldown = 500;

            gameState.allyUnits = gameState.allyUnits.filter(u => u.hp > 0);
            gameState.enemyUnits = gameState.enemyUnits.filter(u => u.hp > 0);

            for (let unit of gameState.allyUnits) {
                unit.x += unitTypes[unit.type].spd;

                if (unit.x >= gameState.enemyBase.x) {
                    gameState.enemyBase.hp -= unitTypes[unit.type].atk;
                    unit.hp = 0;
                    continue;
                }

                for (let enemy of gameState.enemyUnits) {
                    const dist = Math.hypot(unit.x - enemy.x, unit.y - enemy.y);
                    if (dist < unitTypes[unit.type].range + 20) {
                        if (gameState.time - unit.lastAttackTime > attackCooldown) {
                            enemy.hp -= unitTypes[unit.type].atk;
                            unit.lastAttackTime = gameState.time;
                        }
                    }
                }
            }

            for (let unit of gameState.enemyUnits) {
                unit.x -= unitTypes[unit.type].spd;

                if (unit.x <= gameState.allyBase.x + gameState.allyBase.width) {
                    gameState.allyBase.hp -= unitTypes[unit.type].atk;
                    unit.hp = 0;
                    continue;
                }

                for (let ally of gameState.allyUnits) {
                    const dist = Math.hypot(unit.x - ally.x, unit.y - ally.y);
                    if (dist < unitTypes[unit.type].range + 20) {
                        if (gameState.time - unit.lastAttackTime > attackCooldown) {
                            ally.hp -= unitTypes[unit.type].atk;
                            unit.lastAttackTime = gameState.time;
                        }
                    }
                }
            }
        }

        function updateGold() {
            gameState.gold += config.gold_rate / 60;
        }

        function draw() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = config.base_color;
            ctx.fillRect(gameState.allyBase.x, gameState.allyBase.y, gameState.allyBase.width, gameState.allyBase.height);
            ctx.fillRect(gameState.enemyBase.x, gameState.enemyBase.y, gameState.enemyBase.width, gameState.enemyBase.height);

            for (let unit of gameState.allyUnits) {
                ctx.fillStyle = unitTypes[unit.type].color;
                ctx.beginPath();
                ctx.arc(unit.x, unit.y, 8, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let unit of gameState.enemyUnits) {
                ctx.fillStyle = unitTypes[unit.type].color;
                ctx.beginPath();
                ctx.arc(unit.x, unit.y, 8, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function updateHUD() {
            document.getElementById('goldDisplay').textContent = Math.floor(gameState.gold);
            document.getElementById('allyHPDisplay').textContent = Math.max(0, gameState.allyBase.hp) + '/' + gameState.allyBase.maxHp;
            document.getElementById('enemyHPDisplay').textContent = Math.max(0, gameState.enemyBase.hp) + '/' + gameState.enemyBase.maxHp;

            document.getElementById('soldierBtn').disabled = gameState.gold < config.soldier_cost;
            document.getElementById('tankBtn').disabled = gameState.gold < config.tank_cost;
            document.getElementById('archerBtn').disabled = gameState.gold < config.archer_cost;
        }

        function gameLoop() {
            if (!gameState.running) return;

            gameState.time += 1000 / 60;

            updateGold();
            updateUnits();

            if (gameState.time - gameState.lastEnemySpawn > gameState.enemySpawnInterval) {
                spawnEnemyUnit();
                gameState.lastEnemySpawn = gameState.time;
                gameState.difficulty = Math.min(10, gameState.difficulty + 0.1);
                gameState.enemySpawnInterval = Math.max(500, 2000 - gameState.difficulty * 100);
            }

            draw();
            updateHUD();

            if (gameState.enemyBase.hp <= 0) {
                gameState.running = false;
                document.getElementById('clearScreen').style.display = 'flex';
                document.getElementById('unitButtons').style.display = 'none';
                return;
            }

            if (gameState.allyBase.hp <= 0) {
                gameState.running = false;
                document.getElementById('gameOverScreen').style.display = 'flex';
                document.getElementById('unitButtons').style.display = 'none';
                return;
            }

            if (gameState.running) requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
