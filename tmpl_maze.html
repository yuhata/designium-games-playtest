<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZE EXPLORER</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0a0e27;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        
        #gameContainer {
            text-align: center;
        }
        
        h1 {
            margin: 0 0 20px 0;
            color: #58a6ff;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
        }
        
        canvas {
            display: block;
            border: 2px solid #30363d;
            background-color: #0d1117;
            margin: 0 auto;
            cursor: pointer;
        }
        
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        
        #startScreen.hidden {
            display: none;
        }
        
        #startScreen h2 {
            font-size: 3em;
            color: #58a6ff;
            margin: 0 0 40px 0;
            text-shadow: 0 0 20px rgba(88, 166, 255, 0.7);
        }
        
        #startScreen p {
            font-size: 1.2em;
            color: #888;
            margin: 10px 0;
            max-width: 400px;
        }
        
        .btn {
            background: linear-gradient(135deg, #58a6ff, #3fb950);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.5em;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 40px;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.5);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        #gameOverScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        
        #gameOverScreen.show {
            display: flex;
        }
        
        #gameOverScreen h2 {
            font-size: 3em;
            color: #f85149;
            margin: 0 0 30px 0;
        }
        
        #clearScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        
        #clearScreen.show {
            display: flex;
        }
        
        #clearScreen h2 {
            font-size: 3em;
            color: #3fb950;
            margin: 0 0 20px 0;
            text-shadow: 0 0 30px rgba(63, 185, 80, 0.8);
        }
        
        .stats {
            font-size: 1.3em;
            color: #aaa;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1>MAZE EXPLORER</h1>
        <canvas id="gameCanvas" width="480" height="480"></canvas>
    </div>
    
    <div id="startScreen">
        <h2>MAZE EXPLORER</h2>
        <p>迷路の出口を見つけよう！</p>
        <p>制限時間: 180秒</p>
        <p>矢印ボタンで移動</p>
        <button class="btn" id="startBtn">START GAME</button>
    </div>
    
    <div id="gameOverScreen">
        <h2>GAME OVER</h2>
        <div class="stats">時間切れ！</div>
        <button class="btn" id="retryBtn1">RETRY</button>
    </div>
    
    <div id="clearScreen">
        <h2>FOUND IT!</h2>
        <div class="stats" id="clearStats"></div>
        <button class="btn" id="retryBtn2">PLAY AGAIN</button>
    </div>

    <script>
        const config = {
            title: 'MAZE EXPLORER',
            bg_color: '#0d1117',
            wall_color: '#30363d',
            path_color: '#1c2128',
            player_color: '#58a6ff',
            goal_color: '#3fb950',
            fog_color: 'rgba(0,0,0,0.7)',
            maze_cols: 15,
            maze_rows: 15,
            cell_size: 32
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameState = {
            running: false,
            maze: [],
            playerX: 1,
            playerY: 1,
            goalX: config.maze_cols - 2,
            goalY: config.maze_rows - 2,
            visited: new Set(),
            timeLeft: 180,
            stepCount: 0,
            gameOver: false,
            cleared: false,
            lastMoveBlocked: false,
            flashCounter: 0
        };

        function generateMaze() {
            const maze = Array(config.maze_rows).fill(null).map(() => Array(config.maze_cols).fill(1));
            
            function carvePath(x, y) {
                maze[y][x] = 0;
                const directions = [[0, -2], [2, 0], [0, 2], [-2, 0]].sort(() => Math.random() - 0.5);
                
                for (let [dx, dy] of directions) {
                    const nx = x + dx;
                    const ny = y + dy;
                    
                    if (nx > 0 && nx < config.maze_cols && ny > 0 && ny < config.maze_rows && maze[ny][nx] === 1) {
                        maze[y + dy / 2][x + dx / 2] = 0;
                        carvePath(nx, ny);
                    }
                }
            }
            
            carvePath(1, 1);
            maze[1][1] = 0;
            maze[config.maze_rows - 2][config.maze_cols - 2] = 0;
            
            return maze;
        }

        function initGame() {
            gameState.maze = generateMaze();
            gameState.playerX = 1;
            gameState.playerY = 1;
            gameState.visited.clear();
            gameState.visited.add('1,1');
            gameState.timeLeft = 180;
            gameState.stepCount = 0;
            gameState.gameOver = false;
            gameState.cleared = false;
            gameState.lastMoveBlocked = false;
            gameState.flashCounter = 0;
            gameState.running = true;
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
        }

        function movePlayer(dx, dy) {
            if (!gameState.running) return;
            
            const newX = gameState.playerX + dx;
            const newY = gameState.playerY + dy;
            
            if (newX >= 0 && newX < config.maze_cols && newY >= 0 && newY < config.maze_rows) {
                if (gameState.maze[newY][newX] === 0) {
                    gameState.playerX = newX;
                    gameState.playerY = newY;
                    gameState.stepCount++;
                    gameState.visited.add(`${newX},${newY}`);
                    gameState.lastMoveBlocked = false;
                    
                    if (newX === gameState.goalX && newY === gameState.goalY) {
                        gameState.cleared = true;
                        gameState.running = false;
                    }
                } else {
                    gameState.lastMoveBlocked = true;
                    gameState.flashCounter = 6;
                }
            }
        }

        function drawMaze() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = config.wall_color;
            for (let y = 0; y < config.maze_rows; y++) {
                for (let x = 0; x < config.maze_cols; x++) {
                    if (gameState.maze[y][x] === 1) {
                        ctx.fillRect(x * config.cell_size, y * config.cell_size, config.cell_size, config.cell_size);
                    }
                }
            }
        }

        function drawFog() {
            ctx.fillStyle = config.fog_color;
            
            for (let y = 0; y < config.maze_rows; y++) {
                for (let x = 0; x < config.maze_cols; x++) {
                    const dx = x - gameState.playerX;
                    const dy = y - gameState.playerY;
                    const dist = Math.max(Math.abs(dx), Math.abs(dy));
                    
                    if (dist > 3) {
                        ctx.fillRect(x * config.cell_size, y * config.cell_size, config.cell_size, config.cell_size);
                    }
                }
            }
        }

        function drawVisited() {
            ctx.fillStyle = 'rgba(58, 134, 255, 0.1)';
            gameState.visited.forEach(key => {
                const [x, y] = key.split(',').map(Number);
                ctx.fillRect(x * config.cell_size + 2, y * config.cell_size + 2, config.cell_size - 4, config.cell_size - 4);
            });
        }

        function drawPlayer() {
            ctx.fillStyle = gameState.lastMoveBlocked && gameState.flashCounter % 2 === 0 ? '#f85149' : config.player_color;
            ctx.beginPath();
            ctx.arc(
                gameState.playerX * config.cell_size + config.cell_size / 2,
                gameState.playerY * config.cell_size + config.cell_size / 2,
                config.cell_size / 2.5,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        function drawGoal() {
            const cx = gameState.goalX * config.cell_size + config.cell_size / 2;
            const cy = gameState.goalY * config.cell_size + config.cell_size / 2;
            
            ctx.fillStyle = config.goal_color;
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('★', cx, cy);
        }

        function drawDpad() {
            // UP
            ctx.fillStyle = '#444';
            ctx.fillRect(380, 300, 40, 40);
            ctx.fillStyle = '#58a6ff';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('▲', 400, 320);
            
            // LEFT
            ctx.fillStyle = '#444';
            ctx.fillRect(340, 340, 40, 40);
            ctx.fillStyle = '#58a6ff';
            ctx.fillText('◀', 360, 360);
            
            // RIGHT
            ctx.fillStyle = '#444';
            ctx.fillRect(420, 340, 40, 40);
            ctx.fillStyle = '#58a6ff';
            ctx.fillText('▶', 440, 360);
            
            // DOWN
            ctx.fillStyle = '#444';
            ctx.fillRect(380, 380, 40, 40);
            ctx.fillStyle = '#58a6ff';
            ctx.fillText('▼', 400, 400);
        }

        function drawUI() {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, 180, 60);
            
            ctx.fillStyle = '#aaa';
            ctx.font = '14px Arial';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(`TIME: ${Math.ceil(gameState.timeLeft)}s`, 10, 10);
            ctx.fillText(`STEPS: ${gameState.stepCount}`, 10, 30);
        }

        function drawClearEffect() {
            const cx = gameState.goalX * config.cell_size + config.cell_size / 2;
            const cy = gameState.goalY * config.cell_size + config.cell_size / 2;
            const radius = 60 + Math.sin(Date.now() / 200) * 20;
            
            ctx.strokeStyle = `rgba(63, 185, 80, ${0.5 - gameState.flashCounter * 0.08})`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.stroke();
        }

        function gameLoop() {
            if (!gameState.running && !gameState.cleared) return;
            
            drawMaze();
            drawVisited();
            drawFog();
            drawGoal();
            drawPlayer();
            drawDpad();
            drawUI();
            
            if (gameState.cleared && gameState.flashCounter >= 0) {
                drawClearEffect();
            }
            
            if (gameState.flashCounter > 0) {
                gameState.flashCounter--;
            }
            
            if (gameState.running) {
                gameState.timeLeft -= 1 / 60;
                if (gameState.timeLeft <= 0) {
                    gameState.timeLeft = 0;
                    gameState.running = false;
                    gameState.gameOver = true;
                    document.getElementById('gameOverScreen').style.display = 'flex';
                }
            }
            
            if (gameState.cleared) {
                const elapsedTime = Math.ceil(180 - gameState.timeLeft);
                document.getElementById('clearStats').innerText = `ステップ数: ${gameState.stepCount} | 時間: ${elapsedTime}秒`;
                document.getElementById('clearScreen').style.display = 'flex';
                gameState.cleared = false;
            }
        }

        function retryGame() {
            gameState.running = false;
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            initGame();
        }

        canvas.addEventListener('click', (e) => {
            if (!gameState.running) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (x >= 380 && x <= 420 && y >= 300 && y <= 340) {
                movePlayer(0, -1);
            }
            else if (x >= 380 && x <= 420 && y >= 380 && y <= 420) {
                movePlayer(0, 1);
            }
            else if (x >= 340 && x <= 380 && y >= 340 && y <= 380) {
                movePlayer(-1, 0);
            }
            else if (x >= 420 && x <= 460 && y >= 340 && y <= 380) {
                movePlayer(1, 0);
            }
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            initGame();
        });

        document.getElementById('retryBtn1').addEventListener('click', retryGame);
        document.getElementById('retryBtn2').addEventListener('click', retryGame);

        setInterval(gameLoop, 16);

        document.getElementById('startScreen').style.display = 'flex';
    </script>
</body>
</html>
