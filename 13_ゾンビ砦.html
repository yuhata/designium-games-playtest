<!DOCTYPE html>
<html>
<head>
  <title>ゾンビ砦</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #222;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    canvas {
      border: 3px solid #0f0;
      background: #0a0a0a;
      cursor: crosshair;
    }
    #ui {
      position: absolute;
      top: 15px;
      left: 15px;
      color: #0f0;
      font-size: 16px;
      font-weight: bold;
      z-index: 10;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border: 2px solid #0f0;
    }
    #instructions {
      position: absolute;
      top: 15px;
      right: 15px;
      color: #0f0;
      font-size: 13px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border: 1px solid #0f0;
      width: 250px;
    }
    #gameOverScreen {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.95);
      color: #0f0;
      padding: 50px;
      border: 4px solid #0f0;
      text-align: center;
      z-index: 100;
      border-radius: 10px;
    }
    #gameOverScreen h1 {
      margin: 0 0 30px 0;
      font-size: 40px;
      text-shadow: 0 0 10px #0f0;
    }
    #gameOverScreen p {
      margin: 15px 0;
      font-size: 18px;
    }
    #gameOverScreen button {
      margin-top: 30px;
      padding: 12px 40px;
      font-size: 16px;
      background: #0f0;
      color: #000;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
    }
    #gameOverScreen button:hover {
      background: #0ff;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div>🏰 Wave: <span id="waveNum">1</span>/10</div>
    <div>❤️ HP: <span id="hpNum">100</span></div>
    <div>💰 Coins: <span id="coinsNum">200</span></div>
  </div>
  <div id="instructions">
    📍 <strong>クリック</strong>でタワー設置<br>
    💰 コスト: 50<br>
    🎯 射程: 範囲内のゾンビ自動攻撃<br>
    🏆 Wave10まで基地を守れ！
  </div>
  <div id="gameOverScreen">
    <h1 id="endTitle"></h1>
    <p id="endScore"></p>
    <p id="endWave"></p>
    <p id="endRank"></p>
    <button onclick="location.reload()">もう一度プレイ</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = 900;
    canvas.height = 600;

    let gameState = {
      base_hp: 100,
      maxHp: 100,
      coins: 200,
      wave: 1,
      gameOver: false,
      won: false,
      damageFlash: 0,
      waveStartTime: Date.now(),
      spawnedZombiesThisWave: 0
    };

    let base = {
      x: canvas.width / 2,
      y: canvas.height - 60,
      width: 50,
      height: 50
    };

    let towers = [];
    let zombies = [];
    let projectiles = [];
    let particles = [];

    let mouseX = 0;
    let mouseY = 0;
    let previewTower = false;
    let waveState = 'idle';

    const TOWER_COST = 50;
    const TOWER_RANGE = 120;
    const TOWER_DAMAGE = 15;
    const TOWER_FIRE_RATE = 25;

    const ZOMBIE_SPEED = 0.8;
    const ZOMBIE_HP = 25;
    const ZOMBIE_REWARD = 20;

    class Zombie {
      constructor() {
        this.x = -30;
        this.y = Math.random() * (canvas.height - 200) + 80;
        this.width = 24;
        this.height = 24;
        this.hp = ZOMBIE_HP;
        this.speed = ZOMBIE_SPEED;
        this.hitFlash = 0;
      }

      update() {
        this.x += this.speed;
        if (this.hitFlash > 0) this.hitFlash--;
      }

      draw() {
        ctx.fillStyle = this.hitFlash > 0 ? '#ff8800' : '#008800';
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.strokeStyle = '#00ff00';
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x, this.y, this.width, this.height);
        
        const hpPercent = Math.max(0, this.hp / ZOMBIE_HP);
        ctx.fillStyle = hpPercent > 0.5 ? '#00ff00' : hpPercent > 0.25 ? '#ffff00' : '#ff0000';
        ctx.fillRect(this.x, this.y - 6, this.width * hpPercent, 3);
      }

      takeDamage(damage) {
        this.hp -= damage;
        this.hitFlash = 5;
      }

      isDead() {
        return this.hp <= 0;
      }

      reachedEnd() {
        return this.x > canvas.width;
      }
    }

    class Tower {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 30;
        this.height = 30;
        this.range = TOWER_RANGE;
        this.fireRate = TOWER_FIRE_RATE;
        this.fireCounter = 0;
        this.shootFlash = 0;
      }

      update() {
        this.fireCounter++;
        if (this.fireCounter >= this.fireRate) {
          let target = null;
          let minDist = this.range;
          for (let zombie of zombies) {
            const dist = Math.hypot(zombie.x + zombie.width/2 - this.x, zombie.y + zombie.height/2 - this.y);
            if (dist < minDist) {
              minDist = dist;
              target = zombie;
            }
          }
          if (target) {
            this.fire(target);
            this.fireCounter = 0;
            this.shootFlash = 8;
          }
        }
        if (this.shootFlash > 0) this.shootFlash--;
      }

      fire(target) {
        projectiles.push(new Projectile(this.x, this.y, target));
      }

      draw() {
        ctx.fillStyle = this.shootFlash > 0 ? '#ffff00' : '#ffaa00';
        ctx.fillRect(this.x - this.width/2, this.y - this.height/2, this.width, this.height);
        ctx.strokeStyle = '#ffff00';
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x - this.width/2, this.y - this.height/2, this.width, this.height);
      }
    }

    class Projectile {
      constructor(x, y, target) {
        this.x = x;
        this.y = y;
        this.target = target;
        this.speed = 6;
        this.size = 6;
      }

      update() {
        if (this.target && !this.target.isDead()) {
          const dx = this.target.x + this.target.width/2 - this.x;
          const dy = this.target.y + this.target.height/2 - this.y;
          const dist = Math.hypot(dx, dy);
          if (dist < this.speed) {
            this.target.takeDamage(TOWER_DAMAGE);
            createParticles(this.x, this.y, '#ffff00', 4);
            return true;
          }
          this.x += (dx / dist) * this.speed;
          this.y += (dy / dist) * this.speed;
        }
        return false;
      }

      draw() {
        ctx.fillStyle = '#ffff00';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ffaa00';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    class Particle {
      constructor(x, y, vx, vy, color) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.life = 40;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.3;
        this.life--;
      }

      draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life / 40;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      isDead() {
        return this.life <= 0;
      }
    }

    function spawnWave() {
      const count = 2 + gameState.wave * 1.5;
      gameState.spawnedZombiesThisWave = Math.floor(count);
      waveState = 'spawning';
      for (let i = 0; i < gameState.spawnedZombiesThisWave; i++) {
        setTimeout(() => {
          if (!gameState.gameOver) {
            zombies.push(new Zombie());
            waveState = 'active';
          }
        }, i * 400);
      }
    }

    function getHighScore() {
      let saved = localStorage.getItem('zombieFortHighScore');
      return saved ? parseInt(saved) : 0;
    }

    function saveScore(coins) {
      let high = getHighScore();
      if (coins > high) {
        localStorage.setItem('zombieFortHighScore', coins);
      }
    }

    function getRank(coins) {
      if (coins < 100) return 'D - 初心者';
      if (coins < 300) return 'C - 兵卒';
      if (coins < 600) return 'B - 騎士';
      if (coins < 1000) return 'A - 将軍';
      return 'S - 伝説の守護者';
    }

    function updateGame() {
      // ゾンビ更新
      for (let i = zombies.length - 1; i >= 0; i--) {
        zombies[i].update();
        
        if (zombies[i].reachedEnd()) {
          gameState.base_hp -= 15;
          gameState.damageFlash = 15;
          createParticles(base.x, base.y, '#ff0000', 8);
          zombies.splice(i, 1);
          document.getElementById('hpNum').textContent = gameState.base_hp;
        } else if (zombies[i].isDead()) {
          gameState.coins += ZOMBIE_REWARD;
          createParticles(zombies[i].x + zombies[i].width/2, zombies[i].y + zombies[i].height/2, '#00ff00', 5);
          document.getElementById('coinsNum').textContent = gameState.coins;
          zombies.splice(i, 1);
        }
      }

      // タワー更新
      for (let tower of towers) {
        tower.update();
      }

      // プロジェクタイル更新
      for (let i = projectiles.length - 1; i >= 0; i--) {
        if (projectiles[i].update()) {
          projectiles.splice(i, 1);
        }
      }

      // パーティクル更新
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].isDead()) {
          particles.splice(i, 1);
        }
      }

      // Wave進行チェック（waveActive時のみ: spawning中のrace conditionを防ぐ）
      if (waveState === 'active' && zombies.length === 0 && !gameState.gameOver) {
        waveState = 'idle';
        if (gameState.wave < 10) {
          gameState.wave++;
          document.getElementById('waveNum').textContent = gameState.wave;
          setTimeout(() => spawnWave(), 600);
        } else {
          gameState.gameOver = true;
          gameState.won = true;
          saveScore(gameState.coins);
          showEndScreen();
        }
      }

      // 敗北条件
      if (gameState.base_hp <= 0 && !gameState.gameOver) {
        gameState.gameOver = true;
        saveScore(gameState.coins);
        showEndScreen();
      }
    }

    function createParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count;
        const speed = 2 + Math.random() * 2;
        particles.push(new Particle(
          x, y,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed,
          color
        ));
      }
    }

    function drawGame() {
      // 背景
      if (gameState.damageFlash > 0) {
        ctx.fillStyle = `rgba(255, 0, 0, ${gameState.damageFlash / 20})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        gameState.damageFlash--;
      }

      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // グリッド
      ctx.strokeStyle = 'rgba(0, 255, 0, 0.08)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= canvas.width; i += 60) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
      }
      for (let i = 0; i <= canvas.height; i += 60) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
      }

      // Base描画 (protect欲求)
      const hpPercent = gameState.base_hp / gameState.maxHp;
      let baseColor = '#00aa00';
      if (hpPercent <= 0.3) baseColor = '#ff0000';
      else if (hpPercent <= 0.6) baseColor = '#ffaa00';

      ctx.fillStyle = baseColor;
      ctx.fillRect(base.x - base.width/2, base.y - base.height/2, base.width, base.height);
      ctx.strokeStyle = '#00ff00';
      ctx.lineWidth = 3;
      ctx.strokeRect(base.x - base.width/2, base.y - base.height/2, base.width, base.height);
      
      // HPバー (protect欲求: 危機感演出)
      ctx.fillStyle = hpPercent > 0.5 ? '#00ff00' : hpPercent > 0.2 ? '#ffaa00' : '#ff0000';
      ctx.fillRect(base.x - 50, base.y + 35, 100 * Math.max(0, hpPercent), 10);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.strokeRect(base.x - 50, base.y + 35, 100, 10);

      // Tower設置プレビュー
      if (previewTower && !gameState.gameOver) {
        ctx.fillStyle = gameState.coins >= TOWER_COST ? 'rgba(255, 170, 0, 0.25)' : 'rgba(255, 0, 0, 0.25)';
        ctx.fillRect(mouseX - 15, mouseY - 15, 30, 30);
        ctx.strokeStyle = gameState.coins >= TOWER_COST ? 'rgba(255, 255, 0, 0.5)' : 'rgba(255, 0, 0, 0.5)';
        ctx.lineWidth = 2;
        ctx.strokeRect(mouseX - 15, mouseY - 15, 30, 30);
      }

      // ゾンビ描画
      for (let zombie of zombies) {
        zombie.draw();
      }

      // タワー描画
      for (let tower of towers) {
        tower.draw();
      }

      // プロジェクタイル描画
      for (let projectile of projectiles) {
        projectile.draw();
      }

      // パーティクル描画
      for (let particle of particles) {
        particle.draw();
      }
    }

    function showEndScreen() {
      const screen = document.getElementById('gameOverScreen');
      const title = document.getElementById('endTitle');
      const score = document.getElementById('endScore');
      const wave = document.getElementById('endWave');
      const rank = document.getElementById('endRank');

      if (gameState.won) {
        title.textContent = '🎉 ゾンビ砦 防衛成功！🎉';
        title.style.color = '#0f0';
        score.textContent = `獲得Coins: ${gameState.coins}`;
        wave.textContent = `Wave: ${gameState.wave}/10 完全制覇`;
      } else {
        title.textContent = '💀 GAME OVER 💀';
        title.style.color = '#f00';
        score.textContent = `獲得Coins: ${gameState.coins}`;
        wave.textContent = `到達Wave: ${gameState.wave}/10`;
      }

      rank.textContent = `ランク: ${getRank(gameState.coins)} | HI: ${getHighScore()}`;
      screen.style.display = 'block';
    }

    function gameLoop() {
      if (!gameState.gameOver) {
        updateGame();
      }
      drawGame();
      requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
      previewTower = true;
    });

    canvas.addEventListener('mouseleave', () => {
      previewTower = false;
    });

    canvas.addEventListener('click', (e) => {
      if (!gameState.gameOver && gameState.coins >= TOWER_COST) {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const distToBase = Math.hypot(x - base.x, y - base.y);
        if (distToBase > 80) {
          towers.push(new Tower(x, y));
          gameState.coins -= TOWER_COST;
          document.getElementById('coinsNum').textContent = gameState.coins;
          createParticles(x, y, '#ffaa00', 5);
        }
      }
    });

    spawnWave();
    gameLoop();
  </script>
</body>
</html>
