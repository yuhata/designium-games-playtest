<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESCAPE ROOM</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #gameContainer {
            position: relative;
            background: #16213e;
            border: 2px solid #e94560;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }
        canvas {
            display: block;
            background: #16213e;
            cursor: crosshair;
        }
        #rightPanel {
            position: absolute;
            right: 0;
            top: 0;
            width: 160px;
            height: 400px;
            background: rgba(0, 0, 0, 0.6);
            border-left: 1px solid #e94560;
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            font-size: 12px;
            color: #ccc;
        }
        .itemDisplay {
            background: #333;
            margin: 5px 0;
            padding: 5px;
            border-radius: 4px;
            border-left: 3px solid #999;
        }
        .itemDisplay.found {
            background: rgba(34, 197, 94, 0.2);
            border-left-color: #22c55e;
            color: #22c55e;
        }
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        #startScreen h1 {
            color: #e94560;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #e94560;
        }
        #startScreen p {
            color: #ccc;
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 300px;
        }
        .btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #ff5a75;
            box-shadow: 0 0 15px #e94560;
        }
        #gameOverScreen, #clearScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999;
        }
        #gameOverScreen h2, #clearScreen h2 {
            color: #e94560;
            font-size: 40px;
            margin-bottom: 20px;
        }
        #clearScreen h2 {
            color: #22c55e;
            text-shadow: 0 0 20px #22c55e;
        }
        .screen-text {
            color: #ccc;
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>🔓 ESCAPE ROOM</h1>
        <p>Find all 5 hidden items to escape the room!<br>You have 120 seconds.</p>
        <button class="btn">START</button>
    </div>

    <div id="gameOverScreen">
        <h2>⏱️ TIME'S UP</h2>
        <p class="screen-text">You couldn't escape in time...</p>
        <button class="btn" id="retryBtn1">TRY AGAIN</button>
    </div>

    <div id="clearScreen">
        <h2>🎉 ESCAPED!</h2>
        <p class="screen-text" id="clearText">Great job!</p>
        <button class="btn" id="retryBtn2">PLAY AGAIN</button>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="500" height="400"></canvas>
        <div id="rightPanel">
            <div style="color: #e94560; font-weight: bold; margin-bottom: 10px;">Items Found:</div>
            <div id="itemList"></div>
            <div style="margin-top: 20px; padding-top: 10px; border-top: 1px solid #666;">
                <div style="color: #999; font-size: 10px; margin-bottom: 5px;">Time:</div>
                <div id="timeDisplay" style="color: #22c55e; font-size: 18px; font-weight: bold;">120</div>
            </div>
        </div>
    </div>

    <script>
        const config = {
            title: 'ESCAPE ROOM',
            bg_color: '#1a1a2e',
            room_color: '#16213e',
            item_color: '#e94560',
            found_color: '#22c55e',
            total_items: 5
        };

        var gameState = {
            running: false,
            time: 120,
            items: [],
            collectCount: 0,
            gameOver: false,
            cleared: false,
            messageTime: 0,
            lastFoundMessage: ''
        };

        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');

        function initItems() {
            gameState.items = [
                { name: 'Gold Key', x: 200, y: 80, radius: 10, found: false, emoji: '🔑' },
                { name: 'Flashlight', x: 350, y: 150, radius: 8, found: false, emoji: '🔦' },
                { name: 'Ancient Letter', x: 150, y: 250, radius: 12, found: false, emoji: '📜' },
                { name: 'Magnet', x: 420, y: 280, radius: 9, found: false, emoji: '🧲' },
                { name: 'Mystery Stone', x: 80, y: 320, radius: 11, found: false, emoji: '💎' }
            ];
        }

        function drawRoom() {
            ctx.fillStyle = config.room_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f1624';
            ctx.fillRect(0, 300, canvas.width, 100);
            ctx.strokeStyle = '#2a3f5f';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 300);
                ctx.lineTo(i, 400);
                ctx.stroke();
            }

            ctx.fillStyle = '#1a2a4a';
            ctx.fillRect(0, 0, 40, canvas.height);
            ctx.fillRect(460, 0, 40, canvas.height);

            ctx.fillStyle = '#0f1a3a';
            ctx.fillRect(0, 0, canvas.width, 30);

            ctx.fillStyle = '#8b4513';
            ctx.fillRect(420, 150, 50, 130);
            ctx.strokeStyle = gameState.cleared ? '#22c55e' : '#e94560';
            ctx.lineWidth = 2;
            ctx.strokeRect(420, 150, 50, 130);
            
            ctx.fillStyle = '#d4af37';
            ctx.beginPath();
            ctx.arc(460, 215, 5, 0, Math.PI * 2);
            ctx.fill();

            if (gameState.cleared) {
                ctx.fillStyle = '#22c55e';
                ctx.font = 'bold 14px Arial';
                ctx.fillText('OPEN', 425, 195);
            } else {
                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 12px Arial';
                ctx.fillText('LOCKED', 423, 195);
            }

            ctx.fillStyle = '#654321';
            ctx.fillRect(80, 150, 150, 100);
            ctx.strokeStyle = '#8b4513';
            ctx.lineWidth = 2;
            ctx.strokeRect(80, 150, 150, 100);

            ctx.fillStyle = '#4a2511';
            ctx.fillRect(85, 225, 140, 20);
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 1;
            ctx.strokeRect(85, 225, 140, 20);

            ctx.fillStyle = '#2d1810';
            ctx.fillRect(280, 80, 150, 180);
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 1;
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(280, 100 + i * 50);
                ctx.lineTo(430, 100 + i * 50);
                ctx.stroke();
            }

            ctx.fillStyle = '#4a7c9e';
            ctx.fillRect(50, 30, 100, 80);
            ctx.strokeStyle = '#2a5c7e';
            ctx.lineWidth = 2;
            ctx.strokeRect(50, 30, 100, 80);
            ctx.beginPath();
            ctx.moveTo(100, 30);
            ctx.lineTo(100, 110);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(50, 70);
            ctx.lineTo(150, 70);
            ctx.stroke();

            if (gameState.collectCount >= 3 && gameState.collectCount < 5) {
                ctx.fillStyle = 'rgba(233, 69, 96, 0.7)';
                ctx.font = '12px Arial';
                ctx.fillText('💡 The door awaits...', 300, 340);
            }
        }

        function drawItems() {
            for (let i = 0; i < gameState.items.length; i++) {
                var item = gameState.items[i];
                if (!item.found) {
                    ctx.fillStyle = config.item_color;
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.strokeStyle = 'rgba(233, 69, 96, 0.4)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, item.radius + 3, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }

        function drawUI() {
            ctx.fillStyle = gameState.time <= 30 ? '#e94560' : '#22c55e';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('Time: ' + gameState.time + 's', 20, 30);

            ctx.fillStyle = '#e94560';
            ctx.font = 'bold 16px Arial';
            ctx.fillText('Items: ' + gameState.collectCount + '/5', 20, 60);

            if (gameState.lastFoundMessage && gameState.messageTime > 0) {
                ctx.fillStyle = 'rgba(34, 197, 94, 0.9)';
                ctx.font = 'bold 18px Arial';
                ctx.fillText('✓ Found: ' + gameState.lastFoundMessage, 120, 350);
                gameState.messageTime--;
            }
        }

        function updateItemList() {
            var itemList = document.getElementById('itemList');
            itemList.innerHTML = '';
            for (let i = 0; i < gameState.items.length; i++) {
                var item = gameState.items[i];
                var div = document.createElement('div');
                div.className = 'itemDisplay' + (item.found ? ' found' : '');
                div.innerHTML = item.emoji + ' ' + item.name + (item.found ? ' ✓' : '');
                itemList.appendChild(div);
            }
        }

        function checkItemClick(x, y) {
            for (let i = gameState.items.length - 1; i >= 0; i--) {
                var item = gameState.items[i];
                if (!item.found) {
                    var dx = x - item.x;
                    var dy = y - item.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < item.radius + 10) {
                        item.found = true;
                        gameState.collectCount++;
                        gameState.lastFoundMessage = item.name;
                        gameState.messageTime = 60;
                        updateItemList();
                        if (gameState.collectCount >= 5) {
                            gameState.cleared = true;
                        }
                        break;
                    }
                }
            }
        }

        function gameLoop() {
            drawRoom();
            drawItems();
            drawUI();
            document.getElementById('timeDisplay').textContent = gameState.time;

            if (!gameState.running || gameState.gameOver || gameState.cleared) {
                return;
            }

            gameState.time--;

            if (gameState.time <= 0) {
                gameState.running = false;
                gameState.gameOver = true;
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('gameOverScreen').style.display = 'flex';
            }

            if (gameState.cleared) {
                gameState.running = false;
                var escapedTime = 120 - gameState.time;
                document.getElementById('clearText').textContent = 'Escaped in ' + escapedTime + ' seconds!';
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('clearScreen').style.display = 'flex';
            }
        }

        function startGame() {
            gameState.running = false;
            gameState.time = 120;
            gameState.collectCount = 0;
            gameState.gameOver = false;
            gameState.cleared = false;
            gameState.messageTime = 0;
            initItems();
            updateItemList();
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            gameState.running = true;
        }

        function retryGame() {
            gameState.running = false;
            startGame();
        }

        canvas.addEventListener('click', function(e) {
            if (!gameState.running) return;
            var rect = canvas.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;
            checkItemClick(x, y);
        });

        document.getElementById('startScreen').querySelector('.btn').addEventListener('click', function() {
            startGame();
        });

        document.getElementById('retryBtn1').addEventListener('click', function() {
            retryGame();
        });

        document.getElementById('retryBtn2').addEventListener('click', function() {
            retryGame();
        });

        initItems();
        updateItemList();
        setInterval(gameLoop, 16);
    </script>
</body>
</html>
