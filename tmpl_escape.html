<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESCAPE ROOM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e27;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        #container {
            position: relative;
            width: 660px;
            height: 400px;
            background: #1a1a2e;
        }
        canvas {
            display: block;
            border: 2px solid #e94560;
            float: left;
        }
        #rightPanel {
            float: left;
            width: 160px;
            height: 400px;
            background: #16213e;
            border-left: 2px solid #e94560;
            padding: 20px 10px;
            overflow-y: auto;
        }
        #itemsList {
            list-style: none;
        }
        .item-slot {
            margin: 10px 0;
            padding: 8px;
            background: #0f3460;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
        }
        .item-slot.found {
            background: #22c55e;
            color: #000;
            font-weight: bold;
        }
        #timerDisplay {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
            z-index: 10;
        }
        #hint {
            position: absolute;
            bottom: 10px;
            left: 20px;
            font-size: 14px;
            color: #fbbf24;
            font-weight: bold;
            max-width: 420px;
            z-index: 10;
        }
        #startScreen, #gameOverScreen, #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }
        #startScreen {
            display: flex;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #e94560;
        }
        .subtitle {
            font-size: 18px;
            margin: 20px 0;
            color: #aaa;
        }
        .btn {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 16px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #ff6b7a;
        }
        .game-over-msg, .clear-msg {
            font-size: 36px;
            margin-bottom: 20px;
            color: #e94560;
        }
        .clear-msg {
            color: #22c55e;
        }
        .score-text {
            font-size: 16px;
            margin: 15px 0;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="gameCanvas" width="500" height="400"></canvas>
        <div id="rightPanel">
            <div style="text-align: center; margin-bottom: 10px; font-weight: bold; color: #e94560;">Items</div>
            <ul id="itemsList"></ul>
        </div>
        <div id="timerDisplay">120s</div>
        <div id="hint"></div>

        <div id="startScreen">
            <h1>🚪 ESCAPE ROOM 🚪</h1>
            <p class="subtitle">5つのアイテムを探して部屋から脱出しよう！</p>
            <p class="subtitle" style="color: #fbbf24;">制限時間：120秒</p>
            <button class="btn">START</button>
        </div>

        <div id="gameOverScreen">
            <div class="game-over-msg">⏰ TIME UP!</div>
            <p class="score-text" id="gameOverScore"></p>
            <button class="btn">RETRY</button>
        </div>

        <div id="clearScreen">
            <div class="clear-msg">✨ ESCAPE SUCCESS! ✨</div>
            <p class="score-text" id="clearTime"></p>
            <button class="btn">RETRY</button>
        </div>
    </div>

    <script>
        const config = {
            title: 'ESCAPE ROOM',
            bg_color: '#1a1a2e',
            room_color: '#16213e',
            item_color: '#e94560',
            found_color: '#22c55e',
            total_items: 5
        };

        var gameState = {
            running: false,
            time: 120,
            lastTime: 0,
            foundCount: 0,
            items: [
                { name: '鍵', emoji: '🔑', x: 420, y: 100, radius: 12, found: false },
                { name: '懐中電灯', emoji: '🔦', x: 380, y: 200, radius: 12, found: false },
                { name: 'ノート', emoji: '📝', x: 150, y: 280, radius: 12, found: false },
                { name: 'ビン', emoji: '🧪', x: 250, y: 150, radius: 12, found: false },
                { name: 'チェーン', emoji: '⛓️', x: 120, y: 350, radius: 12, found: false }
            ],
            doorOpen: false
        };

        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        var startScreen = document.getElementById('startScreen');
        var gameOverScreen = document.getElementById('gameOverScreen');
        var clearScreen = document.getElementById('clearScreen');

        function drawRoom() {
            ctx.fillStyle = config.room_color;
            ctx.fillRect(0, 0, 500, 400);

            ctx.strokeStyle = '#444';
            ctx.lineWidth = 2;

            ctx.strokeRect(20, 20, 460, 360);

            ctx.fillStyle = '#2a4060';
            ctx.fillRect(420, 80, 50, 280);

            ctx.fillStyle = '#3a5070';
            ctx.fillRect(50, 120, 120, 250);

            ctx.fillStyle = '#2a4060';
            ctx.fillRect(80, 280, 200, 80);

            ctx.fillStyle = '#1a3050';
            ctx.fillRect(350, 30, 80, 60);

            ctx.strokeStyle = '#555';
            ctx.lineWidth = 3;
            ctx.strokeRect(420, 80, 50, 280);

            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            ctx.strokeRect(80, 280, 200, 80);
            ctx.strokeRect(50, 120, 120, 250);
            ctx.strokeRect(350, 30, 80, 60);
        }

        function drawItems() {
            gameState.items.forEach(function(item) {
                ctx.fillStyle = item.found ? config.found_color : config.item_color;
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(item.emoji, item.x, item.y);
            });
        }

        function drawDoor() {
            ctx.fillStyle = gameState.doorOpen ? '#22c55e' : '#e94560';
            ctx.fillRect(420, 80, 50, 280);
            
            if (gameState.doorOpen) {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('OPEN', 445, 220);
            } else {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('DOOR', 445, 220);
            }
        }

        function updateItemsList() {
            var itemsList = document.getElementById('itemsList');
            itemsList.innerHTML = '';
            gameState.items.forEach(function(item) {
                var li = document.createElement('li');
                li.className = 'item-slot' + (item.found ? ' found' : '');
                li.textContent = (item.found ? '✓ ' : '○ ') + item.name;
                itemsList.appendChild(li);
            });
        }

        function updateHint() {
            var hint = document.getElementById('hint');
            if (gameState.foundCount === 0) {
                hint.textContent = '';
            } else if (gameState.foundCount === 1) {
                hint.textContent = 'ヒント：まだまだ...';
            } else if (gameState.foundCount === 2) {
                hint.textContent = 'ヒント：あと3つ探しましょう...';
            } else if (gameState.foundCount === 3) {
                hint.textContent = 'ヒント：鍵を探してドアを開こう！';
            } else if (gameState.foundCount === 4) {
                hint.textContent = 'ヒント：あと1つだ！全てを集めれば脱出できる！';
            } else {
                hint.textContent = '';
            }
        }

        function gameLoop() {
            if (!gameState.running) return;

            var now = Date.now();
            gameState.time -= (now - gameState.lastTime) / 1000;
            gameState.lastTime = now;

            if (gameState.time <= 0) {
                gameState.time = 0;
                gameState.running = false;
                gameOverScreen.style.display = 'flex';
                document.getElementById('gameOverScore').textContent = 'アイテム発見数：' + gameState.foundCount + '/5';
                return;
            }

            ctx.clearRect(0, 0, 500, 400);
            drawRoom();
            drawItems();
            drawDoor();

            var timerDisplay = document.getElementById('timerDisplay');
            timerDisplay.textContent = Math.ceil(gameState.time) + 's';

            if (gameState.time < 10) {
                timerDisplay.style.color = '#ff6b7a';
            }
        }

        function handleCanvasClick(event) {
            if (!gameState.running) return;

            var rect = canvas.getBoundingClientRect();
            var x = event.clientX - rect.left;
            var y = event.clientY - rect.top;

            for (var i = 0; i < gameState.items.length; i++) {
                var item = gameState.items[i];
                if (!item.found) {
                    var dx = x - item.x;
                    var dy = y - item.y;
                    var distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < item.radius + 10) {
                        item.found = true;
                        gameState.foundCount++;
                        updateItemsList();
                        updateHint();

                        if (gameState.foundCount === config.total_items) {
                            gameState.doorOpen = true;
                            gameState.running = false;
                            var elapsedTime = (120 - gameState.time).toFixed(1);
                            clearScreen.style.display = 'flex';
                            document.getElementById('clearTime').textContent = 'クリアタイム：' + elapsedTime + '秒';
                        }
                        break;
                    }
                }
            }
        }

        function startGame() {
            gameState.running = true;
            gameState.time = 120;
            gameState.foundCount = 0;
            gameState.doorOpen = false;
            gameState.lastTime = Date.now();
            gameState.items.forEach(function(item) {
                item.found = false;
            });

            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            clearScreen.style.display = 'none';

            updateItemsList();
            updateHint();

            document.getElementById('timerDisplay').style.color = '#e94560';
        }

        function retryGame() {
            gameState.running = false;
            startGame();
        }

        var startBtn = startScreen.querySelector('.btn');
        startBtn.addEventListener('click', startGame);

        var gameOverBtn = gameOverScreen.querySelector('.btn');
        gameOverBtn.addEventListener('click', retryGame);

        var clearBtn = clearScreen.querySelector('.btn');
        clearBtn.addEventListener('click', retryGame);

        canvas.addEventListener('click', handleCanvasClick);

        updateItemsList();
        updateHint();

        setInterval(gameLoop, 16);
    </script>
</body>
</html>
