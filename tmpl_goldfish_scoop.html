<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金魚すくい</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #001a2e; font-family: Arial, sans-serif; }
        #gameContainer { position: relative; }
        canvas { display: block; cursor: none; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; gap: 14px; z-index: 100; text-align: center; padding: 20px; }
        .screen h1 { font-size: 40px; color: #f6e05e; }
        .screen p { font-size: 15px; line-height: 1.7; max-width: 300px; }
        .screen button { padding: 12px 36px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; background: #2b6cb0; color: #fff; }
        .screen button:hover { background: #4299e1; }
    </style>
</head>
<body>
<div id="gameContainer">
    <div id="startScreen" class="screen" style="display:flex">
        <h1>🐟 金魚すくい</h1>
        <p>ポイ（白い輪）をマウスで動かして<br>金魚の上でクリックしてすくおう！<br><br>
        ポイは水に入ると少しずつ弱くなる。<br>外れると大きくダメージ！<br><br>
        5匹すくえばクリア</p>
        <button onclick="startGame()">START</button>
    </div>
    <div id="clearScreen" class="screen">
        <h1>CLEAR!</h1>
        <p id="clearMsg">5匹ゲット！金魚すくい名人！</p>
        <button onclick="retryGame()">もう一度</button>
    </div>
    <div id="gameOverScreen" class="screen">
        <h1 style="color:#e53e3e">GAME OVER</h1>
        <p id="overMsg">ポイが破れた…</p>
        <button onclick="retryGame()">もう一度</button>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>
<script>
const W = 460, H = 540;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;
const gc = document.getElementById('gameContainer');
gc.style.width = W + 'px'; gc.style.height = H + 'px';

const POOL_X = 20, POOL_Y = 80, POOL_W = W - 40, POOL_H = 340;
const POI_R = 30;
const FISH_R = 14;
const DRAIN_RATE = 0.08;
const MISS_DAMAGE = 18;
const CLEAR_COUNT = 5;
const FISH_COUNT = 9;

function makeFish() {
    const fish = [];
    for (let i = 0; i < FISH_COUNT; i++) {
        fish.push({
            x: POOL_X + 40 + Math.random() * (POOL_W - 80),
            y: POOL_Y + 40 + Math.random() * (POOL_H - 80),
            vx: (Math.random() - 0.5) * 1.6,
            vy: (Math.random() - 0.5) * 1.6,
            phase: Math.random() * Math.PI * 2,
            hue: Math.random() < 0.3 ? 30 : (Math.random() < 0.5 ? 0 : 15),
            caught: false,
            catchAnim: 0,
        });
    }
    return fish;
}

const gs = {
    running: false,
    mx: W / 2, my: POOL_Y + POOL_H / 2,
    durability: 100,
    caught: 0,
    fish: [],
    tick: 0,
    flashTexts: [],
    scoopAnim: 0,
    scoopSuccess: false,
};
let gameLoop = null;

function startGame() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('clearScreen').style.display = 'none';
    document.getElementById('gameOverScreen').style.display = 'none';
    gs.running = true;
    gs.durability = 100;
    gs.caught = 0;
    gs.fish = makeFish();
    gs.tick = 0;
    gs.flashTexts = [];
    gs.scoopAnim = 0;
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(update, 16);
}

function retryGame() {
    gs.running = false;
    document.getElementById('clearScreen').style.display = 'none';
    document.getElementById('gameOverScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
}

function inPool(x, y) {
    return x >= POOL_X + POI_R && x <= POOL_X + POOL_W - POI_R &&
           y >= POOL_Y + POI_R && y <= POOL_Y + POOL_H - POI_R;
}

function scoop() {
    if (!gs.running || !inPool(gs.mx, gs.my)) return;
    let hit = false;
    for (const f of gs.fish) {
        if (f.caught) continue;
        const dx = gs.mx - f.x, dy = gs.my - f.y;
        if (Math.sqrt(dx * dx + dy * dy) < POI_R + FISH_R - 8) {
            f.caught = true; f.catchAnim = 50;
            gs.caught++;
            gs.scoopAnim = 25; gs.scoopSuccess = true;
            gs.flashTexts.push({ x: gs.mx, y: gs.my - 30, text: 'すくった！', color: '#68d391', life: 60 });
            hit = true;
            break;
        }
    }
    if (!hit) {
        gs.durability = Math.max(0, gs.durability - MISS_DAMAGE);
        gs.scoopAnim = 20; gs.scoopSuccess = false;
        gs.flashTexts.push({ x: gs.mx, y: gs.my - 25, text: 'はずれ…', color: '#fc8181', life: 50 });
    }
    checkEnd();
}

function checkEnd() {
    if (gs.caught >= CLEAR_COUNT) {
        gs.running = false; clearInterval(gameLoop);
        document.getElementById('clearMsg').innerText = '5匹すくった！見事な腕前！';
        document.getElementById('clearScreen').style.display = 'flex';
    } else if (gs.durability <= 0) {
        gs.running = false; clearInterval(gameLoop);
        document.getElementById('overMsg').innerText = gs.caught + '匹すくったところでポイが破れた…';
        document.getElementById('gameOverScreen').style.display = 'flex';
    }
}

function update() {
    if (!gs.running) return;
    gs.tick++;

    // Drain durability when poi is in pool
    if (inPool(gs.mx, gs.my)) {
        gs.durability = Math.max(0, gs.durability - DRAIN_RATE);
    }

    if (gs.scoopAnim > 0) gs.scoopAnim--;

    // Move fish
    for (const f of gs.fish) {
        if (f.caught) { if (f.catchAnim > 0) f.catchAnim--; continue; }
        f.phase += 0.06;
        f.x += f.vx + Math.sin(f.phase) * 0.3;
        f.y += f.vy + Math.cos(f.phase * 0.7) * 0.3;
        // Bounce off pool walls
        if (f.x < POOL_X + FISH_R) { f.x = POOL_X + FISH_R; f.vx = Math.abs(f.vx); }
        if (f.x > POOL_X + POOL_W - FISH_R) { f.x = POOL_X + POOL_W - FISH_R; f.vx = -Math.abs(f.vx); }
        if (f.y < POOL_Y + FISH_R) { f.y = POOL_Y + FISH_R; f.vy = Math.abs(f.vy); }
        if (f.y > POOL_Y + POOL_H - FISH_R) { f.y = POOL_Y + POOL_H - FISH_R; f.vy = -Math.abs(f.vy); }
        // Avoid poi slightly
        const pdx = f.x - gs.mx, pdy = f.y - gs.my;
        const pd = Math.sqrt(pdx * pdx + pdy * pdy);
        if (pd < POI_R + FISH_R + 20 && pd > 1) {
            f.vx += (pdx / pd) * 0.15;
            f.vy += (pdy / pd) * 0.15;
        }
        // Speed limit
        const sp = Math.sqrt(f.vx * f.vx + f.vy * f.vy);
        if (sp > 2) { f.vx = f.vx / sp * 2; f.vy = f.vy / sp * 2; }
    }

    for (let i = gs.flashTexts.length - 1; i >= 0; i--) {
        const ft = gs.flashTexts[i]; ft.y -= 0.7; ft.life--;
        if (ft.life <= 0) gs.flashTexts.splice(i, 1);
    }

    if (gs.durability <= 0) checkEnd();
    draw();
}

function draw() {
    ctx.fillStyle = '#001a2e';
    ctx.fillRect(0, 0, W, H);

    // Pool water
    const waterAlpha = 0.82;
    ctx.fillStyle = `rgba(30,100,180,${waterAlpha})`;
    ctx.fillRect(POOL_X, POOL_Y, POOL_W, POOL_H);

    // Water shimmer
    const shimmer = Math.sin(gs.tick * 0.04) * 0.05;
    ctx.fillStyle = `rgba(100,200,255,${0.06 + shimmer})`;
    ctx.fillRect(POOL_X, POOL_Y, POOL_W, POOL_H / 3);

    // Pool border
    ctx.strokeStyle = '#5588aa'; ctx.lineWidth = 3;
    ctx.strokeRect(POOL_X, POOL_Y, POOL_W, POOL_H);

    // Fish
    for (const f of gs.fish) {
        if (f.caught && f.catchAnim <= 0) continue;
        const alpha = f.caught ? f.catchAnim / 50 : 1;
        ctx.globalAlpha = alpha;

        const angle = Math.atan2(f.vy, f.vx);
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(angle);

        // Body
        ctx.fillStyle = `hsl(${f.hue}, 90%, 55%)`;
        ctx.beginPath();
        ctx.ellipse(0, 0, FISH_R, FISH_R * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();

        // Tail fin
        ctx.fillStyle = `hsl(${f.hue}, 80%, 45%)`;
        ctx.beginPath();
        ctx.moveTo(-FISH_R, 0);
        ctx.lineTo(-FISH_R - 10, -8);
        ctx.lineTo(-FISH_R - 10, 8);
        ctx.closePath(); ctx.fill();

        // Eye
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(FISH_R * 0.5, -FISH_R * 0.2, 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(FISH_R * 0.5 + 1, -FISH_R * 0.2 - 1, 1.2, 0, Math.PI * 2); ctx.fill();

        ctx.restore();
        ctx.globalAlpha = 1;

        if (f.caught) {
            ctx.fillStyle = '#f6e05e';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('✨', f.x, f.y - 20);
        }
    }

    // Poi (paper net) — follows mouse
    const poiInPool = inPool(gs.mx, gs.my);
    if (poiInPool) {
        const durFrac = gs.durability / 100;
        const poiColor = durFrac > 0.5 ? '#fff' : (durFrac > 0.25 ? '#f6e05e' : '#fc8181');
        const scoop = gs.scoopAnim > 0;
        const poiAlpha = scoop ? (gs.scoopSuccess ? 0.95 : 0.6) : 0.85;
        ctx.globalAlpha = poiAlpha;
        ctx.strokeStyle = poiColor;
        ctx.lineWidth = scoop ? 4 : 2.5;
        ctx.beginPath(); ctx.arc(gs.mx, gs.my, POI_R, 0, Math.PI * 2); ctx.stroke();
        // Inner net lines
        ctx.globalAlpha = poiAlpha * 0.35;
        ctx.strokeStyle = poiColor; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(gs.mx - POI_R, gs.my); ctx.lineTo(gs.mx + POI_R, gs.my); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(gs.mx, gs.my - POI_R); ctx.lineTo(gs.mx, gs.my + POI_R); ctx.stroke();
        ctx.globalAlpha = 1;
    }

    // Poi handle (always visible)
    ctx.strokeStyle = '#c8a060'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(gs.mx, gs.my + POI_R); ctx.lineTo(gs.mx + 10, gs.my + POI_R + 30); ctx.stroke();

    // Flash texts
    for (const ft of gs.flashTexts) {
        ctx.globalAlpha = ft.life / 60;
        ctx.fillStyle = ft.color;
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(ft.text, ft.x, ft.y);
    }
    ctx.globalAlpha = 1;

    // HUD: durability
    const durW = W - 20;
    const durFrac = gs.durability / 100;
    ctx.fillStyle = '#2d3748'; ctx.fillRect(10, 10, durW, 14);
    ctx.fillStyle = durFrac > 0.5 ? '#48bb78' : (durFrac > 0.25 ? '#f6e05e' : '#e53e3e');
    ctx.fillRect(10, 10, durW * durFrac, 14);
    ctx.strokeStyle = '#4a5568'; ctx.lineWidth = 1; ctx.strokeRect(10, 10, durW, 14);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('ポイ耐久 ' + Math.ceil(gs.durability) + '%', W / 2, 17);

    // HUD: caught fish
    ctx.fillStyle = '#f6e05e'; ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('🐟 すくった: ' + gs.caught + ' / ' + CLEAR_COUNT, 10, 30);

    // Instruction (when outside pool)
    if (!poiInPool) {
        ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '13px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.fillText('プールの上にカーソルを合わせてクリック！', W / 2, H - 8);
    }

    // Pool label
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '11px Arial';
    ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
    ctx.fillText('マウスで狙ってクリック', POOL_X + POOL_W - 4, POOL_Y + POOL_H - 4);
}

canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    gs.mx = e.clientX - r.left; gs.my = e.clientY - r.top;
    if (gs.running) draw();
});
canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    gs.mx = e.clientX - r.left; gs.my = e.clientY - r.top;
    scoop();
});
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    gs.mx = e.touches[0].clientX - r.left; gs.my = e.touches[0].clientY - r.top;
    if (gs.running) draw();
}, { passive: false });
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    gs.mx = e.touches[0].clientX - r.left; gs.my = e.touches[0].clientY - r.top;
    scoop();
}, { passive: false });
</script>
</body>
</html>
