<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
      title: HERO SHOOTER
      bg_color: #0d1117
      player_color: #4299e1
      bullet_color: #63b3ed
      enemy_color: #e53e3e
      ability_color: #9f7aea
      player_hp: 100
      bullet_speed: 8
      fire_rate: 15
      win_kills: 30
      ability_cooldown: 10
    -->
    <title>HERO SHOOTER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            border: 2px solid #444;
            display: inline-block;
        }
        canvas {
            display: block;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 480px;
            height: 480px;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            background: rgba(0, 0, 0, 0.9);
            gap: 20px;
        }
        #startScreen {
            display: flex;
        }
        .screen h1 {
            color: #4299e1;
            font-size: 48px;
            margin-bottom: 20px;
        }
        .screen h2 {
            color: #63b3ed;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .screen p {
            color: #ccc;
            font-size: 14px;
            text-align: center;
        }
        .screen button {
            padding: 12px 40px;
            font-size: 20px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        #startButton {
            background: #4299e1;
        }
        #startButton:hover {
            background: #3182ce;
            transform: scale(1.05);
        }
        #retryButton {
            background: #4299e1;
        }
        #retryButton:hover {
            background: #3182ce;
            transform: scale(1.05);
        }
        .objective {
            color: #63b3ed;
            font-size: 16px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="startScreen" class="screen">
        <h1>HERO SHOOTER</h1>
        <p style="font-size: 18px; color: #9f7aea;">TOP-DOWN ACTION</p>
        <div class="objective">
            <p>Goal: Defeat enemies and rack up kills</p>
            <p id="winKillsDisplay">Target: 30 kills</p>
        </div>
        <div style="border-top: 1px solid #444; width: 200px; padding-top: 15px;">
            <p style="color: #999; font-size: 12px; margin-bottom: 10px;">CONTROLS</p>
            <p style="color: #ccc;">WASD: Move</p>
            <p style="color: #ccc;">MOUSE: Aim & Auto Fire</p>
            <p style="color: #ccc;">SPACE / Q: Dash (Invincible)</p>
        </div>
        <button id="startButton">START</button>
    </div>
    <div id="gameOverScreen" class="screen">
        <h2>GAME OVER</h2>
        <p style="font-size: 18px; color: #e53e3e;">You were defeated!</p>
        <p id="gameOverStats" style="font-size: 14px; color: #ccc; margin: 10px 0;"></p>
        <button id="retryButton">RETRY</button>
    </div>
    <div id="clearScreen" class="screen">
        <h2>MISSION CLEAR!</h2>
        <p style="font-size: 18px; color: #63b3ed;">Victory!</p>
        <p id="clearStats" style="font-size: 14px; color: #ccc; margin: 10px 0;"></p>
        <button id="retryButton">RETRY</button>
    </div>
</div>

<script>
const config = {
    title: 'HERO SHOOTER',
    bg_color: '#0d1117',
    player_color: '#4299e1',
    bullet_color: '#63b3ed',
    enemy_color: '#e53e3e',
    ability_color: '#9f7aea',
    player_hp: 100,
    bullet_speed: 8,
    fire_rate: 15,
    win_kills: 30,
    ability_cooldown: 10
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 480;
canvas.height = 480;
document.getElementById('gameContainer').style.width = canvas.width + 'px';
document.getElementById('gameContainer').style.height = canvas.height + 'px';

document.body.style.background = config.bg_color;
document.title = config.title;
document.getElementById('winKillsDisplay').textContent = 'Target: ' + config.win_kills + ' kills';

const gameState = {
    player: {
        x: 240,
        y: 240,
        radius: 8,
        velocity: { x: 0, y: 0 },
        speed: 4,
        hp: config.player_hp,
        maxHp: config.player_hp,
        invincible: 0,
        invincible_dash: 0
    },
    bullets: [],
    enemies: [],
    enemy_bullets: [],
    mouse: { x: 240, y: 240 },
    keys: {},
    kills: 0,
    wave: 0,
    enemiesKilled: 0,
    fireCounter: 0,
    abilityCounter: 0,
    running: false,
    waveActive: false
};

document.getElementById('startButton').addEventListener('click', startGame);
document.getElementById('retryButton').addEventListener('click', retryGame);

document.addEventListener('keydown', e => {
    gameState.keys[e.key.toLowerCase()] = true;
    if ((e.key === ' ' || e.key.toLowerCase() === 'q') && gameState.abilityCounter === 0) {
        activateDash();
    }
});

document.addEventListener('keyup', e => {
    gameState.keys[e.key.toLowerCase()] = false;
});

document.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    gameState.mouse.x = e.clientX - rect.left;
    gameState.mouse.y = e.clientY - rect.top;
});

function startGame() {
    document.getElementById('startScreen').style.display = 'none';
    gameState.player.x = 240;
    gameState.player.y = 240;
    gameState.player.hp = config.player_hp;
    gameState.player.maxHp = config.player_hp;
    gameState.player.invincible = 0;
    gameState.player.invincible_dash = 0;
    gameState.bullets = [];
    gameState.enemies = [];
    gameState.enemy_bullets = [];
    gameState.kills = 0;
    gameState.wave = 0;
    gameState.enemiesKilled = 0;
    gameState.fireCounter = 0;
    gameState.abilityCounter = 0;
    gameState.running = true;
    gameState.waveActive = false;
    gameLoop();
}

function retryGame() {
    document.getElementById('gameOverScreen').style.display = 'none';
    document.getElementById('clearScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
    gameState.running = false;
}

function activateDash() {
    const angle = Math.atan2(gameState.mouse.y - gameState.player.y, gameState.mouse.x - gameState.player.x);
    gameState.player.x += Math.cos(angle) * 80;
    gameState.player.y += Math.sin(angle) * 80;
    gameState.player.x = Math.max(gameState.player.radius, Math.min(canvas.width - gameState.player.radius, gameState.player.x));
    gameState.player.y = Math.max(gameState.player.radius, Math.min(canvas.height - gameState.player.radius, gameState.player.y));
    gameState.player.invincible_dash = 30;
    gameState.abilityCounter = config.ability_cooldown * 60;
}

function spawnWave() {
    gameState.wave++;
    gameState.waveActive = true;
    gameState.enemiesKilled = 0;
    const waveEnemies = [];
    
    for (let i = 0; i < 6; i++) {
        let x, y, dist;
        do {
            x = Math.random() * canvas.width;
            y = Math.random() * canvas.height;
            dist = Math.hypot(x - gameState.player.x, y - gameState.player.y);
        } while (dist < 200);
        waveEnemies.push({
            x: x,
            y: y,
            radius: 4,
            speed: 2,
            hp: 8,
            type: 'fast'
        });
    }
    
    for (let i = 0; i < 4; i++) {
        let x, y, dist;
        do {
            x = Math.random() * canvas.width;
            y = Math.random() * canvas.height;
            dist = Math.hypot(x - gameState.player.x, y - gameState.player.y);
        } while (dist < 200);
        waveEnemies.push({
            x: x,
            y: y,
            radius: 8,
            speed: 1,
            hp: 20,
            type: 'strong'
        });
    }
    
    for (let i = 0; i < 4; i++) {
        let x, y, dist;
        do {
            x = Math.random() * canvas.width;
            y = Math.random() * canvas.height;
            dist = Math.hypot(x - gameState.player.x, y - gameState.player.y);
        } while (dist < 200);
        waveEnemies.push({
            x: x,
            y: y,
            radius: 6,
            speed: 1.5,
            hp: 12,
            type: 'ranged',
            fireCounter: 0
        });
    }
    
    gameState.enemies = gameState.enemies.concat(waveEnemies);
}

function updatePlayer() {
    gameState.player.velocity.x = 0;
    gameState.player.velocity.y = 0;
    
    if (gameState.keys['w']) gameState.player.velocity.y = -gameState.player.speed;
    if (gameState.keys['s']) gameState.player.velocity.y = gameState.player.speed;
    if (gameState.keys['a']) gameState.player.velocity.x = -gameState.player.speed;
    if (gameState.keys['d']) gameState.player.velocity.x = gameState.player.speed;
    
    gameState.player.x += gameState.player.velocity.x;
    gameState.player.y += gameState.player.velocity.y;
    
    gameState.player.x = Math.max(gameState.player.radius, Math.min(canvas.width - gameState.player.radius, gameState.player.x));
    gameState.player.y = Math.max(gameState.player.radius, Math.min(canvas.height - gameState.player.radius, gameState.player.y));
    
    if (gameState.player.invincible > 0) gameState.player.invincible--;
    if (gameState.player.invincible_dash > 0) gameState.player.invincible_dash--;
    if (gameState.abilityCounter > 0) gameState.abilityCounter--;
    
    gameState.fireCounter++;
    if (gameState.fireCounter >= config.fire_rate) {
        const angle = Math.atan2(gameState.mouse.y - gameState.player.y, gameState.mouse.x - gameState.player.x);
        gameState.bullets.push({
            x: gameState.player.x,
            y: gameState.player.y,
            vx: Math.cos(angle) * config.bullet_speed,
            vy: Math.sin(angle) * config.bullet_speed,
            radius: 3
        });
        gameState.fireCounter = 0;
    }
}

function updateBullets() {
    for (let i = gameState.bullets.length - 1; i >= 0; i--) {
        gameState.bullets[i].x += gameState.bullets[i].vx;
        gameState.bullets[i].y += gameState.bullets[i].vy;
        if (gameState.bullets[i].x < 0 || gameState.bullets[i].x > canvas.width ||
            gameState.bullets[i].y < 0 || gameState.bullets[i].y > canvas.height) {
            gameState.bullets.splice(i, 1);
        }
    }
}

function updateEnemies() {
    for (let i = 0; i < gameState.enemies.length; i++) {
        const enemy = gameState.enemies[i];
        const angle = Math.atan2(gameState.player.y - enemy.y, gameState.player.x - enemy.x);
        enemy.x += Math.cos(angle) * enemy.speed;
        enemy.y += Math.sin(angle) * enemy.speed;
        
        if (enemy.type === 'ranged') {
            enemy.fireCounter++;
            if (enemy.fireCounter >= 60) {
                const fireAngle = Math.atan2(gameState.player.y - enemy.y, gameState.player.x - enemy.x);
                gameState.enemy_bullets.push({
                    x: enemy.x,
                    y: enemy.y,
                    vx: Math.cos(fireAngle) * 3,
                    vy: Math.sin(fireAngle) * 3,
                    radius: 2
                });
                enemy.fireCounter = 0;
            }
        }
    }
}

function updateEnemyBullets() {
    for (let i = gameState.enemy_bullets.length - 1; i >= 0; i--) {
        gameState.enemy_bullets[i].x += gameState.enemy_bullets[i].vx;
        gameState.enemy_bullets[i].y += gameState.enemy_bullets[i].vy;
        if (gameState.enemy_bullets[i].x < 0 || gameState.enemy_bullets[i].x > canvas.width ||
            gameState.enemy_bullets[i].y < 0 || gameState.enemy_bullets[i].y > canvas.height) {
            gameState.enemy_bullets.splice(i, 1);
        }
    }
}

function checkCollisions() {
    for (let b = gameState.bullets.length - 1; b >= 0; b--) {
        let hit = false;
        for (let e = gameState.enemies.length - 1; e >= 0; e--) {
            if (Math.hypot(gameState.bullets[b].x - gameState.enemies[e].x,
                           gameState.bullets[b].y - gameState.enemies[e].y)
                < gameState.bullets[b].radius + gameState.enemies[e].radius) {
                gameState.enemies[e].hp--;
                if (gameState.enemies[e].hp <= 0) {
                    gameState.enemies.splice(e, 1);
                    gameState.kills++;
                    gameState.enemiesKilled++;
                }
                hit = true;
                break;
            }
        }
        if (hit) gameState.bullets.splice(b, 1);
    }
    
    if (gameState.player.invincible === 0 && gameState.player.invincible_dash === 0) {
        for (let b = gameState.enemy_bullets.length - 1; b >= 0; b--) {
            const hit = Math.hypot(gameState.player.x - gameState.enemy_bullets[b].x,
                                    gameState.player.y - gameState.enemy_bullets[b].y)
                        < gameState.player.radius + gameState.enemy_bullets[b].radius;
            if (hit) {
                gameState.player.hp--;
                gameState.enemy_bullets.splice(b, 1);
                gameState.player.invincible = 90;
                if (gameState.player.hp <= 0) {
                    gameState.running = false;
                    document.getElementById('gameOverScreen').style.display = 'flex';
                    document.getElementById('gameOverStats').textContent = 'Kills: ' + gameState.kills + ' / Wave: ' + gameState.wave;
                    return;
                }
            }
        }
        
        for (let e = gameState.enemies.length - 1; e >= 0; e--) {
            if (Math.hypot(gameState.player.x - gameState.enemies[e].x,
                           gameState.player.y - gameState.enemies[e].y)
                < gameState.player.radius + gameState.enemies[e].radius) {
                gameState.player.hp--;
                gameState.player.invincible = 90;
                if (gameState.player.hp <= 0) {
                    gameState.running = false;
                    document.getElementById('gameOverScreen').style.display = 'flex';
                    document.getElementById('gameOverStats').textContent = 'Kills: ' + gameState.kills + ' / Wave: ' + gameState.wave;
                    return;
                }
            }
        }
    }
}

function checkWaveCompletion() {
    if (gameState.waveActive && gameState.enemies.length === 0) {
        gameState.waveActive = false;
        if (gameState.wave < 3) {
            setTimeout(() => {
                if (gameState.running && gameState.kills < config.win_kills) {
                    spawnWave();
                }
            }, 1000);
        }
    }
}

function checkWinCondition() {
    if (gameState.kills >= config.win_kills) {
        gameState.running = false;
        document.getElementById('clearScreen').style.display = 'flex';
        document.getElementById('clearStats').textContent = 'Waves: ' + gameState.wave + ' / Kills: ' + gameState.kills;
    }
}

function drawGame() {
    ctx.fillStyle = config.bg_color;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = config.player_color;
    if (gameState.player.invincible > 0 || gameState.player.invincible_dash > 0) {
        ctx.globalAlpha = 0.5;
    }
    ctx.beginPath();
    ctx.arc(gameState.player.x, gameState.player.y, gameState.player.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    
    ctx.fillStyle = config.ability_color;
    const angle = Math.atan2(gameState.mouse.y - gameState.player.y, gameState.mouse.x - gameState.player.x);
    ctx.beginPath();
    ctx.moveTo(gameState.player.x, gameState.player.y);
    ctx.lineTo(gameState.player.x + Math.cos(angle) * 30, gameState.player.y + Math.sin(angle) * 30);
    ctx.stroke();
    
    ctx.fillStyle = config.bullet_color;
    for (let i = 0; i < gameState.bullets.length; i++) {
        ctx.beginPath();
        ctx.arc(gameState.bullets[i].x, gameState.bullets[i].y, gameState.bullets[i].radius, 0, Math.PI * 2);
        ctx.fill();
    }
    
    for (let i = 0; i < gameState.enemies.length; i++) {
        const enemy = gameState.enemies[i];
        ctx.fillStyle = config.enemy_color;
        ctx.beginPath();
        ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
        ctx.fill();
    }
    
    ctx.fillStyle = config.ability_color;
    for (let i = 0; i < gameState.enemy_bullets.length; i++) {
        ctx.beginPath();
        ctx.arc(gameState.enemy_bullets[i].x, gameState.enemy_bullets[i].y, gameState.enemy_bullets[i].radius, 0, Math.PI * 2);
        ctx.fill();
    }
    
    ctx.fillStyle = '#ccc';
    ctx.font = '12px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('Kills: ' + gameState.kills + '/' + config.win_kills, 10, 20);
    ctx.fillText('HP: ' + gameState.player.hp + '/' + gameState.player.maxHp, 10, 35);
    ctx.fillText('Wave: ' + gameState.wave, 10, 50);
    
    const cd = Math.ceil(gameState.abilityCounter / 60);
    ctx.fillText('Dash CD: ' + (cd > 0 ? cd + 's' : 'Ready'), 10, 65);
    
    ctx.font = '11px Arial';
    ctx.fillText('WASD: Move | Space/Q: Dash', 10, canvas.height - 10);
    
    ctx.fillStyle = config.player_color;
    ctx.fillRect(10, canvas.height - 30, 100, 8);
    ctx.fillStyle = config.ability_color;
    const hpWidth = (gameState.player.hp / gameState.player.maxHp) * 100;
    ctx.fillRect(10, canvas.height - 30, hpWidth, 8);
}

function gameLoop() {
    if (!gameState.running) return;
    
    if (!gameState.waveActive && gameState.kills < config.win_kills && gameState.wave < 3) {
        spawnWave();
    }
    
    updatePlayer();
    updateBullets();
    updateEnemies();
    updateEnemyBullets();
    checkCollisions();
    checkWaveCompletion();
    checkWinCondition();
    drawGame();
    
    if (gameState.running) requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
