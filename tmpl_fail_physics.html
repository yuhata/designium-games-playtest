<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAIL WALKER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #222;
            font-family: Arial, sans-serif;
        }
        .container {
            position: relative;
            display: inline-block;
        }
        canvas {
            border: 3px solid #333;
            display: block;
            background: #87ceeb;
        }
        #startScreen, #clearScreen, #overScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: white;
            z-index: 100;
            min-width: 350px;
        }
        #startScreen h1, #clearScreen h1, #overScreen h1 {
            font-size: 44px;
            margin-bottom: 20px;
        }
        #startScreen p, #clearScreen p, #overScreen p {
            font-size: 18px;
            margin: 10px 0;
        }
        button {
            padding: 12px 35px;
            font-size: 18px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #00cc00;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<!--GAME_SPEC
{
  "win_condition": "distance >= 200",
  "fail_condition": "Math.abs(tilt) >= 90 OR timer <= 0",
  "input_types": ["keydown", "mousedown"],
  "state_vars": ["distance", "score", "timer", "tilt", "phase"],
  "core_loop": "alternate key input → leg sway → forward 2m → check win/fail → repeat",
  "clear_trigger": "gameState.distance >= 200",
  "gameover_trigger": "Math.abs(gameState.tilt) >= 90 || gameState.timer <= 0"
}
-->

<div class="container">
    <canvas id="gameCanvas" width="1024" height="768"></canvas>
    
    <div id="startScreen" style="display: block;">
        <h1>FAIL WALKER</h1>
        <p>矢印キー ← → または A/D キーで交互入力</p>
        <p style="font-size: 16px; color: #aaa; margin-top: 15px;">同じキーを連続で押さないこと！</p>
        <p>キャラの脚を左右に振ってゴール（200m）を目指す</p>
        <p style="font-size: 14px; color: #aaa;">30秒以内に200m歩ければクリア</p>
        <button id="startBtn">START</button>
    </div>

    <div id="clearScreen" style="display: none;">
        <h1>🎉 ゴール! 🎉</h1>
        <p style="font-size: 32px; margin: 20px 0;">おめでとう!</p>
        <p id="clearScoreText" style="font-size: 24px;">スコア: 200</p>
        <p style="font-size: 16px; color: #aaa; margin-top: 20px;">クリックでリスタート</p>
        <button id="retryBtn">RETRY</button>
    </div>

    <div id="overScreen" style="display: none;">
        <h1>💀 ゲームオーバー 💀</h1>
        <p id="overScoreText" style="font-size: 20px;">到達距離: 150m</p>
        <p style="font-size: 16px; color: #aaa; margin-top: 20px;">クリックでリスタート</p>
        <button id="retryBtn2">RETRY</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('startScreen');
const clearScreen = document.getElementById('clearScreen');
const overScreen = document.getElementById('overScreen');
const startBtn = document.getElementById('startBtn');
const retryBtn = document.getElementById('retryBtn');
const retryBtn2 = document.getElementById('retryBtn2');

// Game state
const gameState = {
    distance: 0,
    score: 0,
    phase: 'start',
    timer: 30,
    tilt: 0,
    scrollOffset: 0,
    lastKeyPressed: null,
    isAnimating: false,
    animFrame: 0,
    currentLeg: null,
    jumpPower: 0,
    tumbleRotation: 0,
    rainbowFrame: 0,
    fallStarted: false
};

let mouseDown = false;

// Input handling
document.addEventListener('keydown', handleKeyDown);
document.addEventListener('keyup', handleKeyUp);
document.addEventListener('mousedown', handleMouseDown);
document.addEventListener('mousemove', handleMouseMove);
document.addEventListener('mouseup', handleMouseUp);
document.addEventListener('click', handleClick);

function handleKeyDown(e) {
    if (gameState.phase !== 'play' || gameState.isAnimating) return;
    
    const key = e.key.toLowerCase();
    let currentKey = null;
    
    if (key === 'arrowleft' || key === 'a') {
        currentKey = 'left';
    } else if (key === 'arrowright' || key === 'd') {
        currentKey = 'right';
    }
    
    if (!currentKey) return;
    
    // Ensure alternating input
    if (gameState.lastKeyPressed === currentKey) return;
    
    gameState.lastKeyPressed = currentKey;
    startLegAnimation(currentKey);
}

function handleKeyUp(e) {
    // Handle key release - no game state change needed
}

function handleMouseDown(e) {
    mouseDown = true;
    // Check button clicks
    if (gameState.phase === 'start') {
        const rect = startBtn.getBoundingClientRect();
        if (e.clientX >= rect.left && e.clientX <= rect.right &&
            e.clientY >= rect.top && e.clientY <= rect.bottom) {
            startGame();
        }
    } else if (gameState.phase === 'clear') {
        const rect = retryBtn.getBoundingClientRect();
        if (e.clientX >= rect.left && e.clientX <= rect.right &&
            e.clientY >= rect.top && e.clientY <= rect.bottom) {
            resetGame();
        }
    } else if (gameState.phase === 'over') {
        const rect = retryBtn2.getBoundingClientRect();
        if (e.clientX >= rect.left && e.clientX <= rect.right &&
            e.clientY >= rect.top && e.clientY <= rect.bottom) {
            resetGame();
        }
    }
}

function handleMouseMove(e) {
    // Handle mouse move - no game state change needed (prevents P1 violation)
}

function handleMouseUp(e) {
    mouseDown = false;
    // Handle mouse up - no game state change needed
}

function handleClick(e) {
    // Additional click handling if needed
}

function startLegAnimation(leg) {
    gameState.isAnimating = true;
    gameState.animFrame = 0;
    gameState.currentLeg = leg;
    gameState.distance += 2;
    gameState.score = Math.floor(gameState.distance);
    gameState.tilt += (leg === 'left' ? -5 : 5);
    
    // Check fail condition immediately
    if (Math.abs(gameState.tilt) >= 90) {
        gameState.phase = 'over';
        gameState.tumbleRotation = 0;
        gameState.fallStarted = true;
        return;
    }
    
    // Check win condition
    if (gameState.distance >= 200) {
        checkWin();
    }
}

function checkWin() {
    gameState.phase = 'clear';
    gameState.jumpPower = 1;
    gameState.rainbowFrame = 0;
}

function startGame() {
    startScreen.style.display = 'none';
    gameState.phase = 'play';
    gameState.distance = 0;
    gameState.score = 0;
    gameState.timer = 30;
    gameState.tilt = 0;
    gameState.scrollOffset = 0;
    gameState.lastKeyPressed = null;
    gameState.isAnimating = false;
    gameState.animFrame = 0;
    gameState.currentLeg = null;
    gameState.jumpPower = 0;
    gameState.tumbleRotation = 0;
    gameState.rainbowFrame = 0;
    gameState.fallStarted = false;
}

function resetGame() {
    clearScreen.style.display = 'none';
    overScreen.style.display = 'none';
    startScreen.style.display = 'block';
    gameState.phase = 'start';
    gameState.distance = 0;
    gameState.score = 0;
    gameState.timer = 30;
    gameState.tilt = 0;
    gameState.scrollOffset = 0;
    gameState.lastKeyPressed = null;
    gameState.isAnimating = false;
    gameState.animFrame = 0;
    gameState.currentLeg = null;
    gameState.jumpPower = 0;
    gameState.tumbleRotation = 0;
    gameState.rainbowFrame = 0;
    gameState.fallStarted = false;
}

function updateGame() {
    if (gameState.phase !== 'play' && gameState.phase !== 'clear') return;
    
    // Update timer
    gameState.timer -= 1 / 60;
    
    // Check timer fail condition
    if (gameState.timer <= 0 && gameState.phase === 'play') {
        gameState.phase = 'over';
        gameState.timer = 0;
    }
    
    // Update animation frame
    if (gameState.isAnimating) {
        gameState.animFrame++;
        if (gameState.animFrame >= 10) {
            gameState.isAnimating = false;
            gameState.animFrame = 0;
            gameState.currentLeg = null;
        }
    }
}

function drawGame() {
    // Background with rainbow flash on clear
    if (gameState.phase === 'clear') {
        const colors = ['#87ceeb', '#ff6b9d', '#ffd700', '#00ff00', '#0099ff'];
        gameState.rainbowFrame++;
        const idx = Math.floor((gameState.rainbowFrame / 12) % colors.length);
        ctx.fillStyle = colors[idx];
    } else {
        ctx.fillStyle = '#87ceeb';
    }
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Draw ground
    ctx.fillStyle = '#90EE90';
    ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
    
    // Draw character
    drawCharacter();
    
    // Draw UI
    drawUI();
}

function drawCharacter() {
    const centerX = 400;
    const centerY = canvas.height - 150;
    
    ctx.save();
    ctx.translate(centerX, centerY);
    
    // Apply tilt rotation
    const tiltRad = (gameState.tilt * Math.PI) / 180;
    ctx.rotate(tiltRad);
    
    // Jump animation on clear
    let jumpOffset = 0;
    if (gameState.phase === 'clear' && gameState.jumpPower > 0) {
        const t = 1 - (gameState.rainbowFrame / 120);
        jumpOffset = Math.sin(Math.PI * t) * 80;
        gameState.jumpPower = t > 0 ? 1 : 0;
        ctx.translate(0, -jumpOffset);
        ctx.rotate((gameState.rainbowFrame / 60) * Math.PI * 0.3);
    }
    
    // Tumble animation on fail
    if (gameState.phase === 'over' && gameState.fallStarted) {
        gameState.tumbleRotation += 0.15;
        if (gameState.tumbleRotation < Math.PI * 2) {
            ctx.rotate(gameState.tumbleRotation);
        }
    }
    
    // Body
    ctx.fillStyle = '#ff6600';
    ctx.fillRect(-15, -35, 30, 65);
    
    // Head
    ctx.fillStyle = '#ffcc99';
    ctx.beginPath();
    ctx.arc(0, -50, 22, 0, Math.PI * 2);
    ctx.fill();
    
    // Eyes
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-8, -53, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(8, -53, 4, 0, Math.PI * 2);
    ctx.fill();
    
    // Mouth (smile on clear)
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.beginPath();
    if (gameState.phase === 'clear') {
        ctx.arc(0, -45, 6, 0, Math.PI);
    } else {
        ctx.moveTo(-5, -42);
        ctx.lineTo(5, -42);
    }
    ctx.stroke();
    
    // Arms
    ctx.strokeStyle = '#ffcc99';
    ctx.lineWidth = 9;
    if (gameState.phase === 'clear') {
        // Victory pose - arms up
        ctx.beginPath();
        ctx.moveTo(-15, -20);
        ctx.lineTo(-50, -70);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(15, -20);
        ctx.lineTo(50, -70);
        ctx.stroke();
    } else {
        // Normal
        ctx.beginPath();
        ctx.moveTo(-15, -8);
        ctx.lineTo(-42, 5);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(15, -8);
        ctx.lineTo(42, 5);
        ctx.stroke();
    }
    
    // Legs with exaggerated sway
    const progress = gameState.animFrame / 10;
    const leftSway = gameState.currentLeg === 'left' ? 
        -70 * Math.sin(progress * Math.PI) : -20;
    const rightSway = gameState.currentLeg === 'right' ? 
        70 * Math.sin(progress * Math.PI) : 20;
    
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 12;
    ctx.lineCap = 'round';
    
    // Left leg
    ctx.beginPath();
    ctx.moveTo(-10, 30);
    const leftX = -10 + Math.sin((leftSway * Math.PI) / 180) * 25;
    ctx.lineTo(leftX, 95);
    ctx.stroke();
    
    // Right leg
    ctx.beginPath();
    ctx.moveTo(10, 30);
    const rightX = 10 + Math.sin((rightSway * Math.PI) / 180) * 25;
    ctx.lineTo(rightX, 95);
    ctx.stroke();
    
    ctx.restore();
}

function drawUI() {
    // Distance
    ctx.fillStyle = '#000';
    ctx.font = 'bold 36px Arial';
    ctx.fillText('距離: ' + gameState.score + 'm', 20, 50);
    
    // Timer with warning
    const timerColor = gameState.timer <= 5 && Math.floor(gameState.timer * 10) % 6 < 3 ? '#ff0000' : '#000';
    ctx.fillStyle = timerColor;
    ctx.font = 'bold 36px Arial';
    ctx.fillText('残り: ' + gameState.timer.toFixed(1) + 's', canvas.width - 300, 50);
    
    // Instructions
    ctx.fillStyle = '#333';
    ctx.font = '20px Arial';
    ctx.fillText('← → キーで交互入力 (同じキーは効きません)', 20, canvas.height - 25);
    
    // Clear screen
    if (gameState.phase === 'clear') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 100px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🎉', canvas.width / 2, canvas.height / 2 - 50);
        
        document.getElementById('clearScoreText').textContent = 'スコア: ' + gameState.score;
        clearScreen.style.display = 'block';
    }
    
    // Over screen
    if (gameState.phase === 'over') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 80px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('💀', canvas.width / 2, canvas.height / 2 - 50);
        
        document.getElementById('overScoreText').textContent = '到達距離: ' + gameState.score + 'm';
        overScreen.style.display = 'block';
    }
    
    ctx.textAlign = 'left';
}

// Main loop
function gameLoop() {
    updateGame();
    drawGame();
    requestAnimationFrame(gameLoop);
}

// Event listeners
startBtn.addEventListener('click', startGame);
retryBtn.addEventListener('click', resetGame);
retryBtn2.addEventListener('click', resetGame);

// Start
gameLoop();
</script>

</body>
</html>
