<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ニャン突破</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #333;
            cursor: pointer;
            display: block;
            background: #87CEEB;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const game = {
            state: 'playing',
            cats: 0,
            hp: 100,
            startTime: Date.now(),
            particles: [],
            catIcons: [],
            explosionParticles: [],
            winTriggered: false,
            showTutorial: true
        };

        function addCatIcon() {
            const targetCount = Math.min(Math.floor(game.cats / 2), 50);
            while (game.catIcons.length < targetCount) {
                game.catIcons.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: Math.random() * (canvas.height - 150) + 50,
                    opacity: 0,
                    targetOpacity: 0.8,
                    scale: 0.6 + Math.random() * 0.6,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5
                });
            }
            while (game.catIcons.length > targetCount) {
                game.catIcons.pop();
            }
            for (let icon of game.catIcons) {
                if (icon.opacity < icon.targetOpacity) {
                    icon.opacity += 0.03;
                }
            }
        }

        function createWinExplosion() {
            for (let i = 0; i < 50; i++) {
                const angle = (Math.PI * 2 * i) / 50;
                const speed = 4 + Math.random() * 3;
                game.explosionParticles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 40,
                    maxLife: 40
                });
            }
        }

        function drawGame() {
            const elapsed = Date.now() - game.startTime;
            const colorIntensity = Math.min(game.cats / 100, 1);
            const hue = 180 - colorIntensity * 60;
            const bgColor = `hsl(${hue}, 70%, ${70 - colorIntensity * 20}%)`;
            
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let icon of game.catIcons) {
                ctx.save();
                ctx.globalAlpha = icon.opacity;
                ctx.font = `${32 * icon.scale}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ff6b9d';
                ctx.fillText('🐱', icon.x, icon.y);
                ctx.restore();
            }

            for (let i = game.explosionParticles.length - 1; i >= 0; i--) {
                const p = game.explosionParticles[i];
                p.life -= 1;
                if (p.life <= 0) {
                    game.explosionParticles.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.font = '32px Arial';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#FFD700';
                ctx.fillText('🐱', p.x, p.y);
                ctx.restore();
                p.x += p.vx;
                p.y += p.vy;
            }

            for (let i = game.particles.length - 1; i >= 0; i--) {
                const p = game.particles[i];
                p.life -= 1;
                if (p.life <= 0) {
                    game.particles.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillStyle = p.color;
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(p.text, p.x, p.y);
                ctx.restore();
                p.y -= 2;
            }

            ctx.fillStyle = '#333';
            ctx.fillRect(10, canvas.height - 35, canvas.width - 20, 25);
            ctx.fillStyle = game.hp > 30 ? '#ff4444' : '#ff0000';
            ctx.fillRect(10, canvas.height - 35, Math.max(0, game.hp * 3), 25);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(10, canvas.height - 35, canvas.width - 20, 25);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 72px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(game.cats, canvas.width / 2, 100);

            if (game.showTutorial && elapsed < 4000) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(100, 200, canvas.width - 200, 120);
                ctx.fillStyle = '#fff';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('左側をタップ → 猫 +1', canvas.width / 2, 235);
                ctx.fillText('右側をタップ → 猫 +3', canvas.width / 2, 270);
                ctx.fillText('100匹で支配完了！', canvas.width / 2, 305);
            }

            if (game.state === 'win') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 60px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🎉 ニャン突破! 🎉', canvas.width / 2, canvas.height / 2 - 60);
                ctx.fillStyle = '#fff';
                ctx.font = '32px Arial';
                ctx.fillText(`${game.cats} 匹を支配した！`, canvas.width / 2, canvas.height / 2 + 40);
                ctx.font = '18px Arial';
                ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height / 2 + 110);
            }

            if (game.state === 'fail') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff4444';
                ctx.font = 'bold 60px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('💔 ゲームオーバー 💔', canvas.width / 2, canvas.height / 2 - 60);
                ctx.fillStyle = '#fff';
                ctx.font = '32px Arial';
                ctx.fillText(`${game.cats} 匹 集めた`, canvas.width / 2, canvas.height / 2 + 40);
                ctx.font = '18px Arial';
                ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height / 2 + 110);
            }
        }

        function gameLoop() {
            const elapsed = Date.now() - game.startTime;

            if (game.state === 'playing') {
                game.hp -= 0.02;
                
                if (elapsed > 30000 && game.hp <= 0) {
                    game.state = 'fail';
                }
                if (elapsed <= 30000 && game.hp <= 0) {
                    game.hp = 0;
                }

                if (game.cats >= 100 && !game.winTriggered) {
                    game.winTriggered = true;
                    game.state = 'win';
                    createWinExplosion();
                }

                addCatIcon();
            }

            drawGame();
            requestAnimationFrame(gameLoop);
        }

        function handleInput(e) {
            if (game.state !== 'playing') {
                game.state = 'playing';
                game.cats = 0;
                game.hp = 100;
                game.startTime = Date.now();
                game.particles = [];
                game.catIcons = [];
                game.explosionParticles = [];
                game.winTriggered = false;
                return;
            }

            const rect = canvas.getBoundingClientRect();
            let x = 0;

            if (e.type === 'touchend' && e.changedTouches && e.changedTouches.length > 0) {
                x = e.changedTouches[0].clientX - rect.left;
            } else if (e.type === 'touchend') {
                return;
            } else {
                x = e.clientX - rect.left;
            }

            if (x >= 0 && x <= canvas.width) {
                if (x < canvas.width / 2) {
                    game.cats += 1;
                    addParticle(canvas.width / 4, canvas.height / 2, '+1', '#ff9999');
                } else {
                    game.cats += 3;
                    addParticle(3 * canvas.width / 4, canvas.height / 2, '+3', '#99ff99');
                }
            }
        }

        function addParticle(x, y, text, color) {
            game.particles.push({
                x: x,
                y: y,
                text: text,
                color: color,
                life: 30,
                maxLife: 30
            });
        }

        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchend', handleInput);
        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('mouseup', () => {});
        canvas.addEventListener('mousemove', () => {});

        gameLoop();
    </script>
</body>
</html>
