<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>残光バトル</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            background-color: #0a0a1a;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const game = {
            state: 'playing',
            score: 0,
            bestScore: parseInt(localStorage.getItem('bestScore') || '0'),
            newBestFlash: 0,
            circleRadius: 600,
            circleRadiusMax: 600,
            centerX: canvas.width / 2,
            centerY: canvas.height / 2,
            gameTime: 0,
            shooting: false,
            shootFrame: 0,
            globalFlash: 0,
            slowmoFactor: 1,
            lastHitTime: 0
        };
        
        const player = {
            x: game.centerX,
            y: game.centerY + 250,
            radius: 14,
            hp: 100,
            glowCount: 100,
            vx: 0,
            vy: 0,
            speed: 200
        };
        
        const enemy = {
            x: game.centerX - 300,
            y: game.centerY - 250,
            radius: 24,
            glowCount: 100,
            vx: 0,
            vy: 0,
            speed: 120,
            shootFrame: 0,
            shootInterval: 18,
            evasionCooldown: 0,
            flashTimer: 0
        };
        
        let playerBullets = [];
        let enemyBullets = [];
        
        const input = {
            mouseX: game.centerX,
            mouseY: game.centerY,
            mouseDown: false
        };
        
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            input.mouseX = e.clientX - rect.left;
            input.mouseY = e.clientY - rect.top;
            input.mouseDown = true;
            game.shooting = true;
        });
        
        canvas.addEventListener('mouseup', (e) => {
            input.mouseDown = false;
            game.shooting = false;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            input.mouseX = e.clientX - rect.left;
            input.mouseY = e.clientY - rect.top;
        });
        
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            input.mouseX = e.clientX - rect.left;
            input.mouseY = e.clientY - rect.top;
            if (game.state !== 'playing') {
                resetGame();
            }
        });
        
        function dist(x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            return Math.sqrt(dx * dx + dy * dy);
        }
        
        function insideCircle(x, y, cx, cy, r) {
            return dist(x, y, cx, cy) <= r;
        }
        
        function update() {
            if (game.state !== 'playing') return;
            
            const dt = 1 / 60 / game.slowmoFactor;
            game.gameTime += dt;
            
            game.circleRadius = game.circleRadiusMax * Math.pow(0.95, game.gameTime);
            if (game.circleRadius < 80) game.circleRadius = 80;
            
            // Player movement
            if (input.mouseDown) {
                const dx = input.mouseX - player.x;
                const dy = input.mouseY - player.y;
                const d = Math.sqrt(dx * dx + dy * dy);
                if (d > 0) {
                    player.vx = (dx / d) * player.speed;
                    player.vy = (dy / d) * player.speed;
                }
            } else {
                player.vx *= 0.85;
                player.vy *= 0.85;
            }
            
            player.x += player.vx * dt;
            player.y += player.vy * dt;
            
            // Boundary check
            if (!insideCircle(player.x, player.y, game.centerX, game.centerY, game.circleRadius - player.radius)) {
                const dx = game.centerX - player.x;
                const dy = game.centerY - player.y;
                const d = dist(player.x, player.y, game.centerX, game.centerY);
                player.x = game.centerX + (dx / d) * (game.circleRadius - player.radius);
                player.y = game.centerY + (dy / d) * (game.circleRadius - player.radius);
            }
            
            // Player shooting
            if (game.shooting) {
                game.shootFrame++;
                if (game.shootFrame >= 10) {
                    const dx = enemy.x - player.x;
                    const dy = enemy.y - player.y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d > 0) {
                        playerBullets.push({
                            x: player.x,
                            y: player.y,
                            vx: (dx / d) * 350,
                            vy: (dy / d) * 350,
                            life: 5
                        });
                    }
                    game.shootFrame = 0;
                }
            }
            
            // Enemy AI
            const dx = player.x - enemy.x;
            const dy = player.y - enemy.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            
            if (d > 0) {
                let moveX = (dx / d) * enemy.speed * dt;
                let moveY = (dy / d) * enemy.speed * dt;
                
                enemy.evasionCooldown--;
                let shouldEvade = false;
                for (let bullet of playerBullets) {
                    if (dist(bullet.x, bullet.y, enemy.x, enemy.y) < 180) {
                        shouldEvade = true;
                        break;
                    }
                }
                
                if (shouldEvade && enemy.evasionCooldown <= 0) {
                    moveX += moveY * 1.8;
                    moveY -= moveX * 0.8;
                    enemy.evasionCooldown = 40;
                }
                
                enemy.x += moveX;
                enemy.y += moveY;
            }
            
            // Enemy boundary
            if (!insideCircle(enemy.x, enemy.y, game.centerX, game.centerY, game.circleRadius - enemy.radius)) {
                const dx = game.centerX - enemy.x;
                const dy = game.centerY - enemy.y;
                const d = dist(enemy.x, enemy.y, game.centerX, game.centerY);
                enemy.x = game.centerX + (dx / d) * (game.circleRadius - enemy.radius);
                enemy.y = game.centerY + (dy / d) * (game.circleRadius - enemy.radius);
            }
            
            // Enemy shooting
            enemy.shootFrame++;
            if (enemy.shootFrame >= enemy.shootInterval) {
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                enemyBullets.push({
                    x: enemy.x,
                    y: enemy.y,
                    vx: Math.cos(angle) * 240,
                    vy: Math.sin(angle) * 240,
                    life: 5
                });
                enemy.shootFrame = 0;
            }
            
            // Player bullets
            for (let i = playerBullets.length - 1; i >= 0; i--) {
                const b = playerBullets[i];
                b.x += b.vx * dt;
                b.y += b.vy * dt;
                b.life -= dt;
                
                if (dist(b.x, b.y, enemy.x, enemy.y) < enemy.radius + 8) {
                    enemy.glowCount--;
                    game.score += 20;
                    enemy.flashTimer = 0.2;
                    game.lastHitTime = game.gameTime;
                    playerBullets.splice(i, 1);
                } else if (b.life <= 0 || !insideCircle(b.x, b.y, game.centerX, game.centerY, game.circleRadius)) {
                    playerBullets.splice(i, 1);
                }
            }
            
            // Enemy bullets
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];
                b.x += b.vx * dt;
                b.y += b.vy * dt;
                b.life -= dt;
                
                if (dist(b.x, b.y, player.x, player.y) < player.radius + 6) {
                    player.hp -= 10;
                    enemyBullets.splice(i, 1);
                } else if (b.life <= 0 || !insideCircle(b.x, b.y, game.centerX, game.centerY, game.circleRadius)) {
                    enemyBullets.splice(i, 1);
                }
            }
            
            // Slowmo at final glow
            if (enemy.glowCount <= 1) {
                game.slowmoFactor = 0.35;
            }
            
            // Win/Lose
            if (enemy.glowCount <= 0) {
                game.state = 'win';
                game.globalFlash = 1.5;
                if (game.score > game.bestScore) {
                    game.bestScore = game.score;
                    localStorage.setItem('bestScore', game.bestScore);
                    game.newBestFlash = 5;
                }
            } else if (player.hp <= 0) {
                game.state = 'lose';
            }
            
            // Flash decay
            if (game.globalFlash > 0) game.globalFlash -= dt * 1.5;
            if (game.newBestFlash > 0) game.newBestFlash -= dt;
            if (enemy.flashTimer > 0) enemy.flashTimer -= dt;
        }
        
        function draw() {
            // Background
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Global flash
            if (game.globalFlash > 0) {
                ctx.fillStyle = `rgba(255, 255, 100, ${Math.min(game.globalFlash * 0.6, 0.6)})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            // Circle boundary
            ctx.strokeStyle = '#00ff99';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(game.centerX, game.centerY, game.circleRadius, 0, Math.PI * 2);
            ctx.stroke();
            
            // Instructions
            ctx.fillStyle = '#00ff99';
            ctx.font = 'bold 14px Arial';
            ctx.fillText('マウスをドラッグして移動 | 敵の残光を0に', 20, 25);
            
            // Score UI
            ctx.font = 'bold 18px Arial';
            ctx.fillStyle = '#ffff00';
            ctx.fillText(`Score: ${game.score}`, 20, 55);
            ctx.fillStyle = '#ffaa00';
            ctx.fillText(`Best: ${game.bestScore}`, 20, 80);
            
            // New best flash
            if (game.newBestFlash > 0) {
                ctx.font = 'bold 40px Arial';
                ctx.fillStyle = `rgba(255, 100, 100, ${(Math.sin(game.newBestFlash * 9) * 0.5 + 0.5) * 0.8 + 0.2})`;
                ctx.shadowColor = 'rgba(255, 100, 100, 0.8)';
                ctx.shadowBlur = 20;
                ctx.fillText('★ NEW BEST! ★', canvas.width / 2 - 140, 120);
                ctx.shadowColor = 'transparent';
            }
            
            // Ranking (right side)
            ctx.font = 'bold 12px Arial';
            ctx.fillStyle = '#00ff99';
            ctx.fillText('--- ランキング ---', canvas.width - 200, 25);
            ctx.font = '12px Arial';
            ctx.fillStyle = '#ff7777';
            ctx.fillText('1位: Enemy - 5000', canvas.width - 200, 50);
            ctx.fillStyle = game.score > 5000 ? '#ffff00' : '#7777ff';
            ctx.fillText(`2位: You - ${game.score}`, canvas.width - 200, 70);
            ctx.fillStyle = '#7777ff';
            ctx.fillText('3位: Phantom - 3000', canvas.width - 200, 90);
            
            // Glow counters (large, top-center)
            ctx.font = 'bold 50px Arial';
            ctx.fillStyle = `rgba(255, 100, 100, ${0.8 + Math.sin(game.gameTime * 3) * 0.2})`;
            ctx.fillText(`敵: ${Math.max(0, enemy.glowCount)}`, game.centerX - 280, game.centerY - game.circleRadius - 35);
            ctx.fillStyle = 'rgba(100, 150, 255, 0.95)';
            ctx.fillText(`自分: ${player.glowCount}`, game.centerX + 100, game.centerY - game.circleRadius - 35);
            
            // Player
            ctx.fillStyle = '#6699ff';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#aaccff';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Player HP bar
            const hpRatio = Math.max(0, player.hp / 100);
            const hpColor = hpRatio > 0.5 ? `rgb(100, ${255 * hpRatio}, 100)` : `rgb(255, ${150 * hpRatio}, 100)`;
            ctx.fillStyle = hpColor;
            ctx.fillRect(player.x - 28, player.y - 45, hpRatio * 56, 5);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.strokeRect(player.x - 28, player.y - 45, 56, 5);
            
            // Enemy
            if (enemy.flashTimer > 0) {
                ctx.fillStyle = `rgba(255, 100, 100, ${enemy.flashTimer * 1.5})`;
            } else {
                ctx.fillStyle = '#ff6699';
            }
            ctx.beginPath();
            ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#ffaacc';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Enemy glow bar
            const glowRatio = Math.max(0, enemy.glowCount / 100);
            ctx.fillStyle = `rgba(${255 * (1 - glowRatio)}, 100, ${255 * glowRatio})`;
            ctx.fillRect(enemy.x - 32, enemy.y - 48, glowRatio * 64, 5);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.strokeRect(enemy.x - 32, enemy.y - 48, 64, 5);
            
            // Player bullets
            ctx.fillStyle = '#0099ff';
            for (let b of playerBullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#00ccff';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            
            // Enemy bullets
            ctx.fillStyle = '#ff9900';
            for (let b of enemyBullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 3.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255, 150, 0, 0.4)';
                ctx.beginPath();
                ctx.arc(b.x - b.vx * 0.04, b.y - b.vy * 0.04, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ff9900';
            }
        }
        
        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.textAlign = 'center';
            ctx.font = 'bold 80px Arial';
            
            if (game.state === 'win') {
                ctx.fillStyle = '#00ff99';
                ctx.fillText('VICTORY', canvas.width / 2, canvas.height / 2 - 100);
                ctx.font = 'bold 32px Arial';
                ctx.fillStyle = '#ffff99';
                ctx.fillText(`Final Score: ${game.score}`, canvas.width / 2, canvas.height / 2 + 20);
            } else {
                ctx.fillStyle = '#ff6666';
                ctx.fillText('DEFEAT', canvas.width / 2, canvas.height / 2 - 100);
                ctx.font = 'bold 32px Arial';
                ctx.fillStyle = '#ff9999';
                ctx.fillText(`Score: ${game.score}`, canvas.width / 2, canvas.height / 2 + 20);
            }
            
            ctx.font = 'bold 20px Arial';
            ctx.fillStyle = '#cccccc';
            ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height / 2 + 120);
            ctx.textAlign = 'left';
        }
        
        function resetGame() {
            game.state = 'playing';
            game.score = 0;
            game.gameTime = 0;
            game.circleRadius = game.circleRadiusMax;
            game.shootFrame = 0;
            game.shooting = false;
            game.globalFlash = 0;
            game.slowmoFactor = 1;
            
            player.x = game.centerX;
            player.y = game.centerY + 250;
            player.hp = 100;
            player.glowCount = 100;
            player.vx = 0;
            player.vy = 0;
            
            enemy.x = game.centerX - 300;
            enemy.y = game.centerY - 250;
            enemy.glowCount = 100;
            enemy.shootFrame = 0;
            enemy.evasionCooldown = 0;
            enemy.flashTimer = 0;
            
            playerBullets = [];
            enemyBullets = [];
        }
        
        function gameLoop() {
            update();
            draw();
            if (game.state !== 'playing') {
                drawGameOver();
            }
            requestAnimationFrame(gameLoop);
        }
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            game.centerX = canvas.width / 2;
            game.centerY = canvas.height / 2;
        });
        
        gameLoop();
    </script>
</body>
</html>
