<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM RACING</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 600px;
            height: 450px;
            border: 2px solid #333;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 4px;
            line-height: 1.6;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.95);
            color: white;
            z-index: 20;
        }
        .screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .screen p {
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background: #e53e3e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #c53030;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">
            <div>Lap: <span id="lapCounter">0</span> / <span id="lapTarget">3</span></div>
            <div>Speed: <span id="speedDisplay">0</span> km/h</div>
            <div>Best: <span id="bestLapTime">--:--</span></div>
            <div style="margin-top: 8px; font-size: 12px; color: #aaa;">↑/SPACE: Accel | ←/A: Left | →/D: Right</div>
        </div>
        
        <div id="startScreen" class="screen">
            <h1>SIM RACING</h1>
            <p>Complete <span id="lapCountDisplay">3</span> laps!<br>Going off-track slows you down!</p>
            <button onclick="startGame()">START</button>
        </div>
        
        <div id="clearScreen" class="screen" style="display: none;">
            <h1>CLEAR!</h1>
            <p>Final Lap: <span id="finalLapTime">--:--</span></p>
            <button onclick="retryGame()">RETRY</button>
        </div>
    </div>

    <script>
        // title:      'SIM RACING'
        // bg_color:   '#1a3a1a'
        // track_color: '#4a5568'
        // car_color:  '#e53e3e'
        // line_color: '#ffffff'
        // car_speed:  4
        // turn_speed: 0.05
        // friction:   0.92
        // lap_count:  3

        const config = {
            title: 'SIM RACING',
            bg_color: '#1a3a1a',
            track_color: '#4a5568',
            car_color: '#e53e3e',
            line_color: '#ffffff',
            car_speed: 4,
            turn_speed: 0.05,
            friction: 0.92,
            lap_count: 3
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 450;

        document.body.style.background = config.bg_color;
        document.getElementById('lapCountDisplay').textContent = config.lap_count;
        document.getElementById('lapTarget').textContent = config.lap_count;

        const gameState = {
            running: false,
            lap: 0,
            lapStartTime: 0,
            bestLapTime: null
        };

        const player = {
            x: 300,
            y: 280,
            vx: 0,
            vy: 0,
            angle: 0,
            width: 15,
            height: 10,
            prevY: 280
        };

        const keys = {
            left: false,
            right: false,
            accel: false
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.right = true;
            if (e.key === 'ArrowUp' || e.key === ' ') {
                keys.accel = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.right = false;
            if (e.key === 'ArrowUp' || e.key === ' ') keys.accel = false;
        });

        function isOnTrack(x, y) {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const rx = 200;
            const ry = 140;
            const innerRx = rx * 0.5;
            const innerRy = ry * 0.5;

            const dx = x - cx;
            const dy = y - cy;
            const outerDist = (dx * dx) / (rx * rx) + (dy * dy) / (ry * ry);
            const innerDist = (dx * dx) / (innerRx * innerRx) + (dy * dy) / (innerRy * innerRy);

            return outerDist <= 1 && innerDist >= 1;
        }

        function formatTime(ms) {
            const totalSecs = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSecs / 60);
            const secs = totalSecs % 60;
            return `${minutes}:${String(secs).padStart(2, '0')}`;
        }

        function updateHUD() {
            document.getElementById('lapCounter').textContent = gameState.lap;
            const speed = Math.hypot(player.vx, player.vy) * 5;
            document.getElementById('speedDisplay').textContent = Math.floor(speed);
            if (gameState.bestLapTime !== null) {
                document.getElementById('bestLapTime').textContent = formatTime(gameState.bestLapTime);
            }
        }

        function checkLapCross() {
            const lineY = 80;
            const lineXMin = canvas.width / 2 - 30;
            const lineXMax = canvas.width / 2 + 30;

            const prevY = player.prevY;
            player.prevY = player.y;

            if (player.x >= lineXMin && player.x <= lineXMax) {
                if (prevY >= lineY && player.y < lineY) {
                    gameState.lap++;
                    const lapTime = Date.now() - gameState.lapStartTime;
                    
                    if (gameState.lap > 1) {
                        if (gameState.bestLapTime === null || lapTime < gameState.bestLapTime) {
                            gameState.bestLapTime = lapTime;
                        }
                    }
                    gameState.lapStartTime = Date.now();

                    if (gameState.lap >= config.lap_count) {
                        gameState.running = false;
                        document.getElementById('finalLapTime').textContent = formatTime(lapTime);
                        document.getElementById('clearScreen').style.display = 'flex';
                    }
                }
            }
        }

        function gameLoop() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const rx = 200;
            const ry = 140;
            const innerRx = rx * 0.5;
            const innerRy = ry * 0.5;

            ctx.fillStyle = config.track_color;
            ctx.beginPath();
            ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
            ctx.ellipse(cx, cy, innerRx, innerRy, 0, 0, Math.PI * 2);
            ctx.fill('evenodd');

            ctx.strokeStyle = config.line_color;
            ctx.lineWidth = 3;
            ctx.setLineDash([6, 6]);
            ctx.beginPath();
            ctx.moveTo(cx - 30, 80);
            ctx.lineTo(cx + 30, 80);
            ctx.stroke();
            ctx.setLineDash([]);

            if (keys.accel) {
                const rad = (player.angle - 90) * Math.PI / 180;
                player.vx += Math.cos(rad) * config.car_speed;
                player.vy += Math.sin(rad) * config.car_speed;
            }

            const speed = Math.hypot(player.vx, player.vy);
            if (keys.left) {
                player.angle -= config.turn_speed * Math.max(0.5, speed);
            }
            if (keys.right) {
                player.angle += config.turn_speed * Math.max(0.5, speed);
            }

            player.x += player.vx;
            player.y += player.vy;

            if (!isOnTrack(player.x, player.y)) {
                player.vx *= 0.5;
                player.vy *= 0.5;
            }

            player.vx *= config.friction;
            player.vy *= config.friction;

            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle * Math.PI / 180);
            ctx.fillStyle = config.car_color;
            ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
            ctx.restore();

            checkLapCross();
            updateHUD();

            if (gameState.running) {
                requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState.running = true;
            gameState.lap = 0;
            gameState.lapStartTime = Date.now();
            player.x = 300;
            player.y = 280;
            player.vx = 0;
            player.vy = 0;
            player.angle = 0;
            player.prevY = player.y;
            gameLoop();
        }

        function retryGame() {
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.lap = 0;
            gameState.bestLapTime = null;
            player.vx = 0;
            player.vy = 0;
            player.angle = 0;
        }
    </script>
</body>
</html>
