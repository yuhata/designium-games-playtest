<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHAIN MAX</title>
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #222;
  }
  canvas {
    display: block;
  }
  #startScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  #startScreen h1 {
    font-size: 64px;
    color: white;
    margin: 0 0 40px 0;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
  }
  #startScreen p {
    font-size: 20px;
    color: #eee;
    margin: 10px 0;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  }
  #startBtn {
    margin-top: 40px;
    padding: 15px 50px;
    font-size: 28px;
    font-weight: bold;
    background: #FF6B6B;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  #startBtn:hover {
    background: #FF5252;
    transform: scale(1.05);
  }
  #clearScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    cursor: pointer;
  }
  #clearScreen h1 {
    font-size: 72px;
    color: #FFD700;
    margin: 0 0 30px 0;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
    animation: pulse 0.6s ease-in-out;
  }
  #clearScreen p {
    font-size: 32px;
    color: white;
    margin: 20px 0;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  }
  #retryBtn {
    margin-top: 40px;
    padding: 12px 40px;
    font-size: 24px;
    background: #4ECDC4;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
  }
  #retryBtn:hover {
    background: #3DB8AE;
    transform: scale(1.05);
  }
  #gameContainer {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #1a1a1a;
  }
  canvas {
    background: linear-gradient(to bottom, #2a2a3a, #1a1a2a);
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
  }
  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 0; }
    50% { transform: scale(1.1); }
    100% { transform: scale(1.0); opacity: 1; }
  }
</style>
</head>
<body>

<!--GAME_SPEC
{
  "win_condition": "maxChain >= 15",
  "fail_condition": "none",
  "input_types": ["click", "mousedown", "mousemove", "mouseup"],
  "state_vars": ["score", "maxChain", "chainLength", "phase"],
  "core_loop": "click blocks → chain same-color adjacent → mouseup scores>=5 length → maxChain>=15 wins",
  "clear_trigger": "gameState.maxChain >= 15",
  "gameover_trigger": "none"
}
-->

<div id="startScreen">
  <h1>CHAIN MAX</h1>
  <p>Click same-colored adjacent blocks</p>
  <p>Make chains of 5+ to score</p>
  <p>Max chain of 15+ to DOMINATE!</p>
  <button id="startBtn">START</button>
</div>

<div id="clearScreen">
  <h1>DOMINATE!</h1>
  <p id="clearText">Max Chain: --</p>
  <p id="bonusText">Total Score: --</p>
  <p style="font-size: 20px; color: #aaa; margin-top: 30px;">Click to restart</p>
</div>

<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('startScreen');
const clearScreen = document.getElementById('clearScreen');
const startBtn = document.getElementById('startBtn');

const gameState = {
  phase: 'start',
  score: 0,
  maxChain: 0,
  chainLength: 0,
  grid: [],
  currentChain: [],
  currentChainPositions: [],
  particles: [],
  mouse: { x: -1000, y: -1000, down: false },
  dominateStartTime: 0
};

const GRID_COLS = 6;
const GRID_ROWS = 8;
const BLOCK_SIZE = 60;
const BLOCK_MARGIN = 8;
const COLORS = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA502', '#95E1D3'];
const GRID_OFFSET_X = 80;
const GRID_OFFSET_Y = 80;

function initGrid() {
  gameState.grid = [];
  for (let row = 0; row < GRID_ROWS; row++) {
    gameState.grid[row] = [];
    for (let col = 0; col < GRID_COLS; col++) {
      gameState.grid[row][col] = {
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        x: GRID_OFFSET_X + col * (BLOCK_SIZE + BLOCK_MARGIN),
        y: GRID_OFFSET_Y + row * (BLOCK_SIZE + BLOCK_MARGIN)
      };
    }
  }
}

function startGame() {
  gameState.phase = 'play';
  gameState.score = 0;
  gameState.maxChain = 0;
  gameState.currentChain = [];
  gameState.currentChainPositions = [];
  gameState.particles = [];
  gameState.dominateStartTime = 0;
  startScreen.style.display = 'none';
  clearScreen.style.display = 'none';
  initGrid();
}

function checkWin() {
  if (gameState.maxChain >= 15) {
    gameState.phase = 'clear';
    showClearScreen();
  }
}

function showClearScreen() {
  clearScreen.style.display = 'flex';
  document.getElementById('clearText').textContent = 'Max Chain: ' + gameState.maxChain;
  document.getElementById('bonusText').textContent = 'Total Score: ' + gameState.score;
}

function resetGame() {
  gameState.phase = 'start';
  gameState.score = 0;
  gameState.maxChain = 0;
  gameState.chainLength = 0;
  gameState.currentChain = [];
  gameState.currentChainPositions = [];
  gameState.particles = [];
  gameState.dominateStartTime = 0;
  startScreen.style.display = 'flex';
  clearScreen.style.display = 'none';
}

function getGridPos(x, y) {
  const col = Math.floor((x - GRID_OFFSET_X) / (BLOCK_SIZE + BLOCK_MARGIN));
  const row = Math.floor((y - GRID_OFFSET_Y) / (BLOCK_SIZE + BLOCK_MARGIN));
  
  if (col >= 0 && col < GRID_COLS && row >= 0 && row < GRID_ROWS) {
    return { col, row };
  }
  return null;
}

function isAdjacent(pos1, pos2) {
  const dx = Math.abs(pos1.col - pos2.col);
  const dy = Math.abs(pos1.row - pos2.row);
  return (dx === 1 && dy === 0) || (dx === 0 && dy === 1);
}

function sameColor(pos1, pos2) {
  return gameState.grid[pos1.row][pos1.col].color === gameState.grid[pos2.row][pos2.col].color;
}

function addToChain(col, row) {
  const pos = { col, row };
  
  if (gameState.currentChainPositions.length === 0) {
    gameState.currentChain.push(gameState.grid[row][col]);
    gameState.currentChainPositions.push(pos);
    gameState.chainLength = 1;
    return true;
  }
  
  const lastPos = gameState.currentChainPositions[gameState.currentChainPositions.length - 1];
  
  for (let p of gameState.currentChainPositions) {
    if (p.col === col && p.row === row) {
      return false;
    }
  }
  
  if (isAdjacent(lastPos, pos) && sameColor(lastPos, pos)) {
    gameState.currentChain.push(gameState.grid[row][col]);
    gameState.currentChainPositions.push(pos);
    gameState.chainLength++;
    return true;
  }
  
  return false;
}

function createParticles() {
  for (let i = 0; i < 400; i++) {
    const angle = (Math.random() * Math.PI * 2);
    const speed = 2 + Math.random() * 8;
    const x = canvas.width / 2 + (Math.random() - 0.5) * 200;
    const y = canvas.height / 2 + (Math.random() - 0.5) * 200;
    
    gameState.particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 2,
      maxLife: 2,
      color: COLORS[Math.floor(Math.random() * COLORS.length)]
    });
  }
}

function updateParticles() {
  for (let i = gameState.particles.length - 1; i >= 0; i--) {
    const p = gameState.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 1 / 60;
    
    if (p.life <= 0) {
      gameState.particles.splice(i, 1);
    }
  }
}

function drawParticles() {
  for (let p of gameState.particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    const rgb = parseInt(p.color.substring(1), 16);
    const r = (rgb >> 16) & 255;
    const g = (rgb >> 8) & 255;
    const b = rgb & 255;
    ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    ctx.fillRect(p.x - 4, p.y - 4, 8, 8);
  }
}

function drawGrid() {
  for (let row = 0; row < GRID_ROWS; row++) {
    for (let col = 0; col < GRID_COLS; col++) {
      const block = gameState.grid[row][col];
      
      let inChain = false;
      for (let pos of gameState.currentChainPositions) {
        if (pos.col === col && pos.row === row) {
          inChain = true;
          break;
        }
      }
      
      ctx.fillStyle = block.color;
      ctx.fillRect(block.x, block.y, BLOCK_SIZE, BLOCK_SIZE);
      
      if (inChain) {
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 4;
        ctx.strokeRect(block.x, block.y, BLOCK_SIZE, BLOCK_SIZE);
      }
      
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(block.x, block.y, BLOCK_SIZE, BLOCK_SIZE);
    }
  }
}

function drawUI() {
  ctx.fillStyle = 'white';
  ctx.font = 'bold 24px Arial';
  ctx.fillText('Score: ' + gameState.score, 20, 30);
  ctx.fillText('Max: ' + gameState.maxChain, 20, 60);
  ctx.fillText('Chain: ' + gameState.chainLength, canvas.width - 280, 30);
  
  ctx.font = '16px Arial';
  ctx.fillStyle = '#aaa';
  ctx.fillText('Click and drag same-color blocks to chain (5+ for points)', 20, canvas.height - 20);
}

function drawDominateEffect() {
  const now = Date.now() - gameState.dominateStartTime;
  const duration = 1500;
  const progress = Math.min(1, now / duration);
  
  if (progress < 1) {
    const scale = 1 + Math.sin(progress * Math.PI) * 0.2;
    
    ctx.fillStyle = 'rgba(255, 255, 255, ' + (1 - progress * 0.5) + ')';
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.scale(scale, scale);
    ctx.fillText('DOMINATE!', 0, 0);
    ctx.restore();
    ctx.textAlign = 'left';
  }
}

function gameLoop() {
  ctx.fillStyle = 'rgba(26, 26, 42, 0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  if (gameState.phase === 'play') {
    drawGrid();
    drawUI();
    updateParticles();
    drawParticles();
    
    if (gameState.dominateStartTime && Date.now() - gameState.dominateStartTime < 1500) {
      drawDominateEffect();
    }
  }
  
  requestAnimationFrame(gameLoop);
}

startBtn.addEventListener('click', function() {
  startGame();
});

clearScreen.addEventListener('click', function() {
  if (gameState.phase === 'clear') {
    resetGame();
  }
});

canvas.addEventListener('mousedown', function(e) {
  if (gameState.phase !== 'play') return;
  
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  gameState.mouse.down = true;
  gameState.mouse.x = x;
  gameState.mouse.y = y;
  
  const pos = getGridPos(x, y);
  if (pos) {
    gameState.currentChain = [];
    gameState.currentChainPositions = [];
    gameState.chainLength = 0;
    addToChain(pos.col, pos.row);
  }
});

document.addEventListener('mousemove', function(e) {
  if (gameState.phase !== 'play' || !gameState.mouse.down) return;
  
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  gameState.mouse.x = x;
  gameState.mouse.y = y;
  
  const pos = getGridPos(x, y);
  if (pos) {
    addToChain(pos.col, pos.row);
  }
});

document.addEventListener('mouseup', function(e) {
  if (gameState.phase !== 'play') return;
  
  gameState.mouse.down = false;
  
  if (gameState.chainLength >= 5) {
    const points = 100 + 50 * (gameState.chainLength - 5);
    gameState.score += points;
    
    if (gameState.chainLength > gameState.maxChain) {
      gameState.maxChain = gameState.chainLength;
      
      if (gameState.maxChain >= 15) {
        createParticles();
        gameState.dominateStartTime = Date.now();
        checkWin();
      }
    }
  }
  
  gameState.currentChain = [];
  gameState.currentChainPositions = [];
  gameState.chainLength = 0;
});

initGrid();
gameLoop();

startScreen.style.display = 'flex';
clearScreen.style.display = 'none';
</script>

</body>
</html>
