<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tile Match Puzzle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    #startScreen, #gameOverScreen, #clearScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
    .screen-content { background: white; padding: 40px; border-radius: 10px; text-align: center; }
    .screen-content h1 { font-size: 2.5em; margin-bottom: 20px; color: #1a1a2e; }
    .screen-content p { font-size: 1.1em; margin-bottom: 15px; color: #333; }
    button { padding: 12px 30px; font-size: 1.1em; cursor: pointer; background: #4299e1; color: white; border: none; border-radius: 5px; margin-top: 10px; }
    button:hover { background: #3182ce; }
    #gameContainer { display: block; cursor: pointer; }
  </style>
</head>
<body>
  <div id="startScreen" style="display: flex;">
    <div class="screen-content">
      <h1>タイルマッチパズル</h1>
      <p>同じ絵文字タイルを3枚取って消そう!</p>
      <p style="font-size: 1em; color: #666;">盤面をクリックしてタイルを手札に追加</p>
      <p style="font-size: 1em; color: #666;">目標: すべてのタイルを消す</p>
      <button onclick="startGame()">スタート</button>
    </div>
  </div>

  <div id="gameOverScreen" style="display: none;">
    <div class="screen-content">
      <h1>ゲームオーバー</h1>
      <p>手札がいっぱいになってしまいました...</p>
      <button onclick="retryGame()">リトライ</button>
    </div>
  </div>

  <div id="clearScreen" style="display: none;">
    <div class="screen-content">
      <h1>クリア!</h1>
      <p>すべてのタイルを消すことができました!</p>
      <button onclick="retryGame()">もう一度遊ぶ</button>
    </div>
  </div>

  <canvas id="gameContainer"></canvas>

  <script>
    // theme: default (param生成への入力のみ)
    // title: TILE MATCH
    // bg_color: #1a1a2e
    // tile_color: #2d3748
    // tile_highlight: #4299e1
    // tile_types: 12
    // hand_limit: 5

    const config = {
      title: 'TILE MATCH',
      bg_color: '#1a1a2e',
      tile_color: '#2d3748',
      tile_highlight: '#4299e1',
      tile_types: 12,
      hand_limit: 5
    };

    const canvas = document.getElementById('gameContainer');
    const ctx = canvas.getContext('2d');
    
    canvas.width = 400;
    canvas.height = 520;
    document.getElementById('gameContainer').style.width = canvas.width + 'px';
    document.getElementById('gameContainer').style.height = canvas.height + 'px';

    document.body.style.background = config.bg_color;

    const TILE_SIZE = 44;
    const EMOJIS = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍑', '🍒', '🥝', '🍍', '🥭', '🍈', '🍌'];

    class Tile {
      constructor(x, y, emoji, index) {
        this.x = x;
        this.y = y;
        this.emoji = emoji;
        this.index = index;
        this.width = TILE_SIZE;
        this.height = TILE_SIZE;
        this.zIndex = 0;
        this.locked = false;
      }

      draw() {
        ctx.fillStyle = this.locked ? '#1a1a2e' : config.tile_color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.strokeStyle = this.locked ? '#555' : config.tile_highlight;
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x, this.y, this.width, this.height);

        ctx.font = 'bold 32px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = this.locked ? '#666' : '#fff';
        ctx.fillText(this.emoji, this.x + this.width / 2, this.y + this.height / 2);
      }

      contains(px, py) {
        return px >= this.x && px <= this.x + this.width && py >= this.y && py <= this.y + this.height;
      }

      overlaps(other) {
        return !(this.x + this.width < other.x || this.x > other.x + other.width ||
                 this.y + this.height < other.y || this.y > other.y + other.height);
      }
    }

    const gameState = {
      running: false,
      tiles: [],
      hand: [],
      matched: 0
    };

    function initGame() {
      gameState.tiles = [];
      gameState.hand = [];
      gameState.matched = 0;
      gameState.running = true;

      const tileEmojis = [];
      for (let type = 0; type < config.tile_types; type++) {
        for (let count = 0; count < 4; count++) {
          tileEmojis.push(EMOJIS[type]);
        }
      }
      tileEmojis.sort(() => Math.random() - 0.5);

      let index = 0;
      for (let row = 0; row < 6; row++) {
        for (let col = 0; col < 8; col++) {
          const baseX = 5 + col * 49;
          const baseY = 10 + row * 58;
          const offsetX = Math.random() * 16 - 8;
          const offsetY = Math.random() * 16 - 8;
          const x = baseX + offsetX;
          const y = baseY + offsetY;
          const tile = new Tile(x, y, tileEmojis[index], index);
          gameState.tiles.push(tile);
          index++;
        }
      }

      gameState.tiles.sort((a, b) => (a.y + a.height) - (b.y + b.height));
      gameState.tiles.forEach((tile, i) => {
        tile.zIndex = i;
      });

      updateLocking();
    }

    function updateLocking() {
      gameState.tiles.forEach(tile => {
        tile.locked = false;
        gameState.tiles.forEach(other => {
          if (tile.index !== other.index && other.zIndex > tile.zIndex && tile.overlaps(other)) {
            tile.locked = true;
          }
        });
      });
    }

    function handleTileClick(px, py) {
      if (py >= 360) return;

      for (let i = gameState.tiles.length - 1; i >= 0; i--) {
        const tile = gameState.tiles[i];
        if (tile.contains(px, py) && !tile.locked) {
          if (gameState.hand.length >= config.hand_limit) {
            gameState.running = false;
            document.getElementById('gameOverScreen').style.display = 'flex';
            return;
          }

          gameState.hand.push(tile.emoji);
          gameState.tiles.splice(i, 1);

          checkMatch();

          if (gameState.tiles.length === 0 && gameState.hand.length === 0) {
            gameState.running = false;
            document.getElementById('clearScreen').style.display = 'flex';
            return;
          }

          updateLocking();
          break;
        }
      }
    }

    function checkMatch() {
      for (let emoji of EMOJIS) {
        const count = gameState.hand.filter(e => e === emoji).length;
        if (count >= 3) {
          gameState.hand = gameState.hand.filter(e => e !== emoji);
          gameState.matched++;
          checkMatch();
        }
      }
    }

    function draw() {
      ctx.fillStyle = config.bg_color;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      gameState.tiles.forEach(tile => {
        tile.draw();
      });

      ctx.strokeStyle = '#666';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, 360);
      ctx.lineTo(canvas.width, 360);
      ctx.stroke();

      ctx.fillStyle = '#0d0d1b';
      ctx.fillRect(0, 370, canvas.width, 100);

      gameState.hand.forEach((emoji, i) => {
        const x = 20 + i * 72;
        const y = 385;
        ctx.fillStyle = config.tile_color;
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        ctx.strokeStyle = config.tile_highlight;
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
        ctx.font = 'bold 32px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.fillText(emoji, x + TILE_SIZE / 2, y + TILE_SIZE / 2);
      });

      ctx.font = 'bold 13px Arial';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'left';
      ctx.fillText('残り: ' + gameState.tiles.length + '/48 | 手札: ' + gameState.hand.length + '/' + config.hand_limit + ' | 目標: 全消去 | クリックでタイル取得', 10, 495);
    }

    function gameLoop() {
      draw();
      if (gameState.running) {
        requestAnimationFrame(gameLoop);
      }
    }

    function startGame() {
      document.getElementById('startScreen').style.display = 'none';
      initGame();
      gameLoop();
    }

    function retryGame() {
      document.getElementById('gameOverScreen').style.display = 'none';
      document.getElementById('clearScreen').style.display = 'none';
      document.getElementById('startScreen').style.display = 'flex';
      gameState.running = false;
    }

    canvas.addEventListener('click', (e) => {
      if (!gameState.running) return;
      const rect = canvas.getBoundingClientRect();
      const px = e.clientX - rect.left;
      const py = e.clientY - rect.top;
      handleTileClick(px, py);
    });
  </script>
</body>
</html>
