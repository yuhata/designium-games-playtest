<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHYTHM MASTER</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== SCREENS ===== */
  .screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  #startScreen { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 100%); }
  #clearScreen  { background: linear-gradient(135deg, #0a1f0a 0%, #0a2e1a 100%); }
  #gameOverScreen { background: linear-gradient(135deg, #1f0a0a 0%, #2e0a0a 100%); }
  #gameScreen   { background: #0a0a0f; display: none; }

  .title {
    font-size: 48px;
    font-weight: bold;
    letter-spacing: 8px;
    text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
    color: #ff88ff;
  }
  .subtitle {
    font-size: 16px;
    color: #aaa;
    letter-spacing: 3px;
  }
  .key-hint {
    font-size: 18px;
    color: #88aaff;
    letter-spacing: 4px;
    background: rgba(100,150,255,0.1);
    padding: 10px 24px;
    border: 1px solid #446;
    border-radius: 6px;
  }
  .btn {
    padding: 14px 48px;
    font-size: 20px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    letter-spacing: 4px;
    background: transparent;
    border: 2px solid #ff00ff;
    color: #ff00ff;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.1s, color 0.1s;
  }
  .btn:hover {
    background: #ff00ff;
    color: #000;
  }
  .result-title {
    font-size: 56px;
    font-weight: bold;
    letter-spacing: 10px;
  }
  .result-title.clear { color: #00ff88; text-shadow: 0 0 30px #00ff88; }
  .result-title.gameover { color: #ff4444; text-shadow: 0 0 30px #ff4444; }
  .result-stats {
    font-size: 18px;
    color: #ccc;
    line-height: 2;
    text-align: center;
  }
  .result-stats span { color: #fff; font-weight: bold; }

  /* ===== GAME SCREEN ===== */
  #gameScreen {
    flex-direction: column;
  }

  /* Beat indicator */
  #beatArea {
    width: 100%;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: #111;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
  }
  #beatCircle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #333;
    border: 2px solid #555;
    transition: background 0.05s, box-shadow 0.05s;
  }
  #beatCircle.pulse {
    background: #ff00ff;
    box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff88;
  }
  #beatLabel {
    font-size: 13px;
    color: #666;
    letter-spacing: 2px;
    width: 80px;
  }

  /* HUD */
  #hud {
    width: 100%;
    padding: 6px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #111;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
  }
  #scoreDisplay { font-size: 22px; color: #ffee44; }
  #notesCounter { font-size: 14px; color: #888; }
  #judgmentFlash {
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 4px;
    min-width: 120px;
    text-align: center;
  }

  /* Lane area */
  #laneArea {
    flex: 1;
    display: flex;
    position: relative;
    overflow: hidden;
  }

  .lane {
    flex: 1;
    position: relative;
    border-right: 1px solid #222;
    background: #0e0e14;
  }
  .lane:last-child { border-right: none; }

  .laneLabel {
    position: absolute;
    bottom: 54px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    font-weight: bold;
    color: #444;
    letter-spacing: 0;
    pointer-events: none;
    z-index: 2;
  }

  /* Key flash */
  .lane.keyDown {
    background: #1a1a2a;
  }

  /* Judge line */
  #judgeLine {
    position: absolute;
    bottom: 80px;
    left: 0;
    right: 0;
    height: 4px;
    background: rgba(255,255,255,0.3);
    z-index: 5;
    pointer-events: none;
  }
  #judgeLine::before {
    content: '';
    position: absolute;
    top: -1px; left: 0; right: 0;
    height: 6px;
    background: rgba(255,255,255,0.1);
    filter: blur(4px);
  }

  /* Notes (div-based) */
  .note {
    position: absolute;
    left: 10%;
    width: 80%;
    height: 28px;
    border-radius: 6px;
    z-index: 10;
    pointer-events: none;
  }
  .note-0 { background: linear-gradient(90deg, #ff4488, #ff88bb); box-shadow: 0 0 8px #ff448888; }
  .note-1 { background: linear-gradient(90deg, #44aaff, #88ddff); box-shadow: 0 0 8px #44aaff88; }
  .note-2 { background: linear-gradient(90deg, #ffcc44, #ffee88); box-shadow: 0 0 8px #ffcc4488; }
  .note-3 { background: linear-gradient(90deg, #44ffaa, #88ffcc); box-shadow: 0 0 8px #44ffaa88; }
</style>
</head>
<body>

<!-- ===== START SCREEN ===== -->
<div id="startScreen" class="screen">
  <div class="title">RHYTHM MASTER</div>
  <div class="subtitle">BEAT GAME</div>
  <div class="key-hint">D &nbsp; F &nbsp; J &nbsp; K</div>
  <div style="font-size:14px; color:#666; letter-spacing:2px;">各レーンのキーで操作</div>
  <button class="btn" id="startBtn">START</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="gameScreen" class="screen">
  <div id="beatArea">
    <div id="beatCircle"></div>
    <div id="beatLabel">BPM 120</div>
    <div style="font-size:13px; color:#555; letter-spacing:1px;">視覚ビートに合わせて押下</div>
  </div>
  <div id="hud">
    <div id="scoreDisplay">SCORE: 0</div>
    <div id="judgmentFlash"></div>
    <div id="notesCounter">NOTES: 0 / 20</div>
  </div>
  <div id="laneArea">
    <div class="lane" id="lane0"><div class="laneLabel">D</div></div>
    <div class="lane" id="lane1"><div class="laneLabel">F</div></div>
    <div class="lane" id="lane2"><div class="laneLabel">J</div></div>
    <div class="lane" id="lane3"><div class="laneLabel">K</div></div>
    <div id="judgeLine"></div>
  </div>
</div>

<!-- ===== CLEAR SCREEN ===== -->
<div id="clearScreen" class="screen" style="display:none;">
  <div class="result-title clear">CLEAR!</div>
  <div class="result-stats" id="clearStats"></div>
  <button class="btn" id="retryClearBtn">RETRY</button>
</div>

<!-- ===== GAME OVER SCREEN ===== -->
<div id="gameOverScreen" class="screen" style="display:none;">
  <div class="result-title gameover">GAME OVER</div>
  <div class="result-stats" id="gameOverStats"></div>
  <button class="btn" id="retryOverBtn">RETRY</button>
</div>

<script>
// ===== GLOBAL STATE =====
var gameState = {
  running: false,
  notes: [],
  score: 0,
  notesSpawned: 0,
  perfect: 0,
  great: 0,
  miss: 0,
  beat: 0,
  judgeFlashTimer: 0
};

// Interval IDs
var gameLoopInterval = null;
var spawnInterval = null;
var beatInterval = null;
var flashInterval = null;

// Constants
var TOTAL_NOTES = 20;
var NOTE_SPEED = 5;           // px per frame
var JUDGE_LINE_BOTTOM = 80;   // px from bottom of laneArea
var PERFECT_WINDOW = 30;      // px
var GREAT_WINDOW = 60;        // px
var KEY_MAP = { 'd': 0, 'f': 1, 'j': 2, 'k': 3 };
var NOTE_COLORS = ['note-0', 'note-1', 'note-2', 'note-3'];
var laneEls = null;
var laneAreaEl = null;
var noteIdCounter = 0;

// ===== INIT =====
function initElements() {
  laneEls = [
    document.getElementById('lane0'),
    document.getElementById('lane1'),
    document.getElementById('lane2'),
    document.getElementById('lane3')
  ];
  laneAreaEl = document.getElementById('laneArea');
}

// ===== START GAME =====
function startGame() {
  initElements();

  gameState.running = true;
  gameState.notes = [];
  gameState.score = 0;
  gameState.notesSpawned = 0;
  gameState.perfect = 0;
  gameState.great = 0;
  gameState.miss = 0;
  gameState.beat = 0;
  gameState.judgeFlashTimer = 0;

  // Clear old note DOM elements
  var oldNotes = document.querySelectorAll('.note');
  for (var i = 0; i < oldNotes.length; i++) {
    oldNotes[i].parentNode.removeChild(oldNotes[i]);
  }

  updateHUD();

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('clearScreen').style.display = 'none';
  document.getElementById('gameOverScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';

  // Game loop: 16ms ≈ 60fps via setInterval
  gameLoopInterval = setInterval(gameLoop, 16);

  // Spawn notes: every 500ms (BPM120 = 1 beat / 500ms)
  spawnInterval = setInterval(spawnNote, 500);

  // Beat visual: every 500ms (sync with spawn)
  beatInterval = setInterval(tickBeat, 500);

  // Judgment flash clear: check every 16ms
  flashInterval = setInterval(clearFlash, 16);
}

// ===== BEAT VISUAL =====
function tickBeat() {
  gameState.beat++;
  var circle = document.getElementById('beatCircle');
  circle.style.background = '#ff00ff';
  circle.style.boxShadow = '0 0 20px #ff00ff, 0 0 40px #ff00ff88';
  setTimeout(function() {
    circle.style.background = '#333';
    circle.style.boxShadow = 'none';
  }, 120);
}

// ===== SPAWN NOTE =====
function spawnNote() {
  if (!gameState.running) return;
  if (gameState.notesSpawned >= TOTAL_NOTES) return;

  var lane = Math.floor(Math.random() * 4);
  var noteEl = document.createElement('div');
  noteEl.className = 'note ' + NOTE_COLORS[lane];

  // Position: top of lane area
  noteEl.style.top = '-28px';

  var noteId = noteIdCounter++;
  noteEl.id = 'note_' + noteId;

  laneEls[lane].appendChild(noteEl);

  gameState.notes.push({
    id: noteId,
    lane: lane,
    y: -28,
    el: noteEl,
    judged: false
  });

  gameState.notesSpawned++;
  updateHUD();
}

// ===== GAME LOOP =====
function gameLoop() {
  if (!gameState.running) return;

  var laneHeight = laneAreaEl.offsetHeight;
  var judgeY = laneHeight - JUDGE_LINE_BOTTOM; // y coordinate of judge line from top

  var notesToRemove = [];

  for (var i = 0; i < gameState.notes.length; i++) {
    var note = gameState.notes[i];
    if (note.judged) continue;

    // Move note down
    note.y += NOTE_SPEED;
    note.el.style.top = note.y + 'px';

    // Auto-MISS: note passed judge line + GREAT_WINDOW without input
    if (note.y > judgeY + GREAT_WINDOW + 28) {
      note.judged = true;
      gameState.miss++;
      showJudgment('MISS', '#ff4444');
      notesToRemove.push(i);
      removeNoteEl(note);
    }
  }

  // Remove judged notes from array (reverse to keep indices valid)
  for (var j = notesToRemove.length - 1; j >= 0; j--) {
    gameState.notes.splice(notesToRemove[j], 1);
  }

  updateHUD();
  checkGameEnd();
}

// ===== KEY INPUT =====
document.addEventListener('keydown', function(e) {
  if (!gameState.running) return;

  var key = e.key.toLowerCase();
  var laneIdx = KEY_MAP[key];
  if (laneIdx === undefined) return;

  // Visual feedback on lane
  laneEls[laneIdx].style.background = '#1a1a2a';
  setTimeout(function() {
    laneEls[laneIdx].style.background = '';
  }, 80);

  var laneHeight = laneAreaEl.offsetHeight;
  var judgeY = laneHeight - JUDGE_LINE_BOTTOM;

  // Find closest unJudged note in this lane
  var bestNote = null;
  var bestDist = 9999;

  for (var i = 0; i < gameState.notes.length; i++) {
    var note = gameState.notes[i];
    if (note.judged) continue;
    if (note.lane !== laneIdx) continue;

    var dist = Math.abs(note.y - judgeY);
    // Only consider notes within GREAT_WINDOW
    if (dist < GREAT_WINDOW + 28 && dist < bestDist) {
      bestDist = dist;
      bestNote = note;
    }
  }

  if (!bestNote) return; // no note to judge

  bestNote.judged = true;
  removeNoteEl(bestNote);

  // Remove from array
  var idx = gameState.notes.indexOf(bestNote);
  if (idx !== -1) gameState.notes.splice(idx, 1);

  if (bestDist <= PERFECT_WINDOW) {
    gameState.perfect++;
    gameState.score += 100;
    showJudgment('PERFECT', '#ffee00');
  } else if (bestDist <= GREAT_WINDOW) {
    gameState.great++;
    gameState.score += 60;
    showJudgment('GREAT', '#44ffaa');
  } else {
    gameState.miss++;
    showJudgment('MISS', '#ff4444');
  }

  updateHUD();
});

document.addEventListener('keyup', function(e) {
  var key = e.key.toLowerCase();
  var laneIdx = KEY_MAP[key];
  if (laneIdx !== undefined && laneEls) {
    laneEls[laneIdx].style.background = '';
  }
});

// ===== REMOVE NOTE ELEMENT =====
function removeNoteEl(note) {
  if (note.el && note.el.parentNode) {
    note.el.parentNode.removeChild(note.el);
  }
}

// ===== JUDGMENT FLASH =====
function showJudgment(text, color) {
  var el = document.getElementById('judgmentFlash');
  el.textContent = text;
  el.style.color = color;
  gameState.judgeFlashTimer = 30; // frames
}

function clearFlash() {
  if (gameState.judgeFlashTimer > 0) {
    gameState.judgeFlashTimer--;
    if (gameState.judgeFlashTimer <= 0) {
      document.getElementById('judgmentFlash').textContent = '';
    }
  }
}

// ===== HUD =====
function updateHUD() {
  document.getElementById('scoreDisplay').textContent = 'SCORE: ' + gameState.score;
  var judged = gameState.perfect + gameState.great + gameState.miss;
  document.getElementById('notesCounter').textContent =
    'NOTES: ' + judged + ' / ' + TOTAL_NOTES;
}

// ===== CHECK GAME END =====
function checkGameEnd() {
  var judged = gameState.perfect + gameState.great + gameState.miss;
  var remaining = gameState.notes.filter(function(n) { return !n.judged; }).length;
  var spawned = gameState.notesSpawned;

  // All TOTAL_NOTES have been spawned AND all are judged
  if (spawned >= TOTAL_NOTES && remaining === 0 && judged >= TOTAL_NOTES) {
    endGame();
  }
}

// ===== END GAME =====
function endGame() {
  if (!gameState.running) return;
  gameState.running = false;
  stopIntervals();

  var total = gameState.perfect + gameState.great + gameState.miss;
  var pgCount = gameState.perfect + gameState.great;
  var clearRate = total > 0 ? pgCount / total : 0;
  var isClear = clearRate >= 0.8;

  var statsHTML =
    'PERFECT: <span>' + gameState.perfect + '</span><br>' +
    'GREAT: <span>' + gameState.great + '</span><br>' +
    'MISS: <span>' + gameState.miss + '</span><br>' +
    'SCORE: <span>' + gameState.score + '</span><br>' +
    'ACCURACY: <span>' + Math.round(clearRate * 100) + '%</span>';

  document.getElementById('gameScreen').style.display = 'none';

  if (isClear) {
    document.getElementById('clearStats').innerHTML = statsHTML;
    document.getElementById('clearScreen').style.display = 'flex';
  } else {
    document.getElementById('gameOverStats').innerHTML = statsHTML;
    document.getElementById('gameOverScreen').style.display = 'flex';
  }
}

// ===== STOP INTERVALS =====
function stopIntervals() {
  if (gameLoopInterval !== null) { clearInterval(gameLoopInterval); gameLoopInterval = null; }
  if (spawnInterval !== null)    { clearInterval(spawnInterval);    spawnInterval = null; }
  if (beatInterval !== null)     { clearInterval(beatInterval);     beatInterval = null; }
  if (flashInterval !== null)    { clearInterval(flashInterval);    flashInterval = null; }
}

// ===== RETRY =====
function retryGame() {
  gameState.running = false;
  stopIntervals();

  // Reset state
  gameState.notes = [];
  gameState.score = 0;
  gameState.notesSpawned = 0;
  gameState.perfect = 0;
  gameState.great = 0;
  gameState.miss = 0;
  gameState.beat = 0;
  gameState.judgeFlashTimer = 0;

  // Hide result screens, show start
  document.getElementById('clearScreen').style.display = 'none';
  document.getElementById('gameOverScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
}

// ===== BUTTON BINDINGS =====
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryClearBtn').addEventListener('click', retryGame);
document.getElementById('retryOverBtn').addEventListener('click', retryGame);
</script>
</body>
</html>
