<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINI MOBA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 1024px;
            height: 768px;
            border: 2px solid #666;
        }
        canvas {
            display: block;
            background-color: #1a2a1a;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
        }
        #hudInfo {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .hudLine {
            display: flex;
            gap: 20px;
        }
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            flex-direction: column;
        }
        #startButton {
            padding: 20px 40px;
            font-size: 24px;
            background-color: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #startButton:hover {
            background-color: #3182ce;
        }
        #startTitle {
            color: #4299e1;
            font-size: 48px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            flex-direction: column;
        }
        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            flex-direction: column;
        }
        .endScreenTitle {
            color: #fff;
            font-size: 48px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .endScreenButton {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .endScreenButton:hover {
            background-color: #3182ce;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1024" height="768"></canvas>
        <div id="hud">
            <div id="hudInfo">
                <div class="hudLine">
                    <span id="heroHpDisplay">Hero HP: 200/200</span>
                    <span id="allyNexusDisplay">Ally Nexus: 500</span>
                    <span id="enemyNexusDisplay">Enemy Nexus: 500</span>
                </div>
                <div class="hudLine">
                    <span id="skillQDisplay">Q (AOE): Ready</span>
                    <span id="skillWDisplay">W (Heal): Ready</span>
                </div>
                <div class="hudLine">
                    <span style="color: #a0aec0; font-size: 12px;">Click to move | Q: AOE | W: Heal</span>
                </div>
            </div>
        </div>
        <div id="startScreen">
            <div id="startTitle">MINI MOBA</div>
            <button id="startButton">START</button>
        </div>
        <div id="gameOverScreen">
            <div class="endScreenTitle">GAME OVER</div>
            <button class="endScreenButton" id="retryButton">RETRY</button>
        </div>
        <div id="clearScreen">
            <div class="endScreenTitle">CLEAR!</div>
            <button class="endScreenButton" id="nextButton">NEXT</button>
        </div>
    </div>

    <script>
        // Configuration (default values)
        const config = {
            title: 'MINI MOBA',
            bg_color: '#1a2a1a',
            lane_color: '#2d4a2d',
            hero_color: '#4299e1',
            ally_color: '#68d391',
            enemy_color: '#e53e3e',
            hero_hp: 200,
            nexus_hp: 500,
            minion_spawn: 10,
            skill_q_cd: 8,
            skill_w_cd: 15
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const clearScreen = document.getElementById('clearScreen');

        let gameState = {
            running: false,
            time: 0,
            viewportX: 0,
            hero: null,
            allyMinions: [],
            enemyMinions: [],
            allyNexus: null,
            enemyNexus: null,
            lastMinionSpawn: 0,
            skillQCooldown: 0,
            skillWCooldown: 0
        };

        class Hero {
            constructor(x, y, isAlly) {
                this.x = x;
                this.y = y;
                this.isAlly = isAlly;
                this.hp = config.hero_hp;
                this.maxHp = config.hero_hp;
                this.radius = 15;
                this.speed = 5;
                this.targetX = x;
                this.targetY = y;
                this.attackRange = 80;
                this.attackDamage = 20;
                this.attackCooldown = 0;
            }
            update() {
                let dx = this.targetX - this.x;
                let dy = this.targetY - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > this.speed) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                } else {
                    this.x = this.targetX;
                    this.y = this.targetY;
                }
                if (this.attackCooldown > 0) this.attackCooldown--;
                
                let enemies = this.isAlly ? gameState.enemyMinions : gameState.allyMinions;
                for (let enemy of enemies) {
                    let edx = enemy.x - this.x;
                    let edy = enemy.y - this.y;
                    let edist = Math.sqrt(edx * edx + edy * edy);
                    if (edist < this.attackRange && this.attackCooldown <= 0) {
                        enemy.hp -= this.attackDamage;
                        this.attackCooldown = 30;
                        if (enemy.hp <= 0) {
                            let idx = (this.isAlly ? gameState.enemyMinions : gameState.allyMinions).indexOf(enemy);
                            if (idx !== -1) {
                                (this.isAlly ? gameState.enemyMinions : gameState.allyMinions).splice(idx, 1);
                            }
                        }
                        break;
                    }
                }
            }
            draw() {
                ctx.fillStyle = config.hero_color;
                ctx.beginPath();
                ctx.arc(this.x - gameState.viewportX, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                let hpBarWidth = 40;
                let hpPercent = this.hp / this.maxHp;
                ctx.fillStyle = '#e53e3e';
                ctx.fillRect(this.x - gameState.viewportX - hpBarWidth / 2, this.y - 25, hpBarWidth, 4);
                ctx.fillStyle = '#68d391';
                ctx.fillRect(this.x - gameState.viewportX - hpBarWidth / 2, this.y - 25, hpBarWidth * hpPercent, 4);
            }
        }

        class Minion {
            constructor(x, y, isAlly) {
                this.x = x;
                this.y = y;
                this.isAlly = isAlly;
                this.hp = 30;
                this.maxHp = 30;
                this.radius = 8;
                this.speed = 2;
                this.attackRange = 50;
                this.attackDamage = 10;
                this.attackCooldown = 0;
            }
            update() {
                let target = this.isAlly ? gameState.enemyNexus : gameState.allyNexus;
                let targetX = target.x;
                let targetY = target.y;
                
                let dx = targetX - this.x;
                let dy = targetY - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > this.speed) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }
                
                if (this.attackCooldown > 0) this.attackCooldown--;
                
                if (dist < this.attackRange) {
                    if (this.attackCooldown <= 0) {
                        target.hp -= this.attackDamage;
                        this.attackCooldown = 60;
                    }
                }
            }
            draw() {
                ctx.fillStyle = this.isAlly ? config.ally_color : config.enemy_color;
                ctx.beginPath();
                ctx.arc(this.x - gameState.viewportX, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                let hpBarWidth = 20;
                let hpPercent = this.hp / this.maxHp;
                ctx.fillStyle = '#e53e3e';
                ctx.fillRect(this.x - gameState.viewportX - hpBarWidth / 2, this.y - 15, hpBarWidth, 2);
                ctx.fillStyle = '#68d391';
                ctx.fillRect(this.x - gameState.viewportX - hpBarWidth / 2, this.y - 15, hpBarWidth * hpPercent, 2);
            }
        }

        class Nexus {
            constructor(x, y, isAlly) {
                this.x = x;
                this.y = y;
                this.isAlly = isAlly;
                this.hp = config.nexus_hp;
                this.maxHp = config.nexus_hp;
                this.width = 40;
                this.height = 40;
            }
            draw() {
                ctx.fillStyle = this.isAlly ? config.ally_color : config.enemy_color;
                ctx.fillRect(this.x - gameState.viewportX - this.width / 2, this.y - this.height / 2, this.width, this.height);
                
                let hpBarWidth = 50;
                let hpPercent = this.hp / this.maxHp;
                ctx.fillStyle = '#e53e3e';
                ctx.fillRect(this.x - gameState.viewportX - hpBarWidth / 2, this.y - 30, hpBarWidth, 4);
                ctx.fillStyle = '#68d391';
                ctx.fillRect(this.x - gameState.viewportX - hpBarWidth / 2, this.y - 30, hpBarWidth * hpPercent, 4);
            }
        }

        function initGame() {
            gameState = {
                running: true,
                time: 0,
                viewportX: 0,
                hero: new Hero(200, 400, true),
                allyMinions: [],
                enemyMinions: [],
                allyNexus: new Nexus(100, 400, true),
                enemyNexus: new Nexus(1900, 400, false),
                lastMinionSpawn: 0,
                skillQCooldown: 0,
                skillWCooldown: 0
            };
        }

        function gameLoop() {
            if (!gameState.running) return;
            
            gameState.time++;
            gameState.viewportX = gameState.hero.x - 300;
            if (gameState.viewportX < 0) gameState.viewportX = 0;
            
            if (gameState.skillQCooldown > 0) gameState.skillQCooldown--;
            if (gameState.skillWCooldown > 0) gameState.skillWCooldown--;
            
            if (gameState.time - gameState.lastMinionSpawn >= config.minion_spawn * 60) {
                for (let i = 0; i < 3; i++) {
                    gameState.allyMinions.push(new Minion(150 + i * 30, 350 + i * 20, true));
                    gameState.enemyMinions.push(new Minion(1850 - i * 30, 450 - i * 20, false));
                }
                gameState.lastMinionSpawn = gameState.time;
            }
            
            gameState.hero.update();
            
            for (let minion of gameState.allyMinions) {
                minion.update();
            }
            gameState.allyMinions = gameState.allyMinions.filter(m => m.hp > 0);
            
            for (let minion of gameState.enemyMinions) {
                minion.update();
            }
            gameState.enemyMinions = gameState.enemyMinions.filter(m => m.hp > 0);
            
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = config.lane_color;
            ctx.fillRect(0 - gameState.viewportX, 350, 2000, 100);
            
            gameState.allyNexus.draw();
            gameState.enemyNexus.draw();
            
            for (let minion of gameState.allyMinions) {
                minion.draw();
            }
            for (let minion of gameState.enemyMinions) {
                minion.draw();
            }
            
            gameState.hero.draw();
            
            updateHUD();
            
            if (gameState.enemyNexus.hp <= 0) {
                gameState.running = false;
                clearScreen.style.display = 'flex';
            } else if (gameState.allyNexus.hp <= 0) {
                gameState.running = false;
                gameOverScreen.style.display = 'flex';
            }
        }

        function updateHUD() {
            document.getElementById('heroHpDisplay').textContent = `Hero HP: ${Math.max(0, Math.floor(gameState.hero.hp))}/${gameState.hero.maxHp}`;
            document.getElementById('allyNexusDisplay').textContent = `Ally Nexus: ${Math.max(0, Math.floor(gameState.allyNexus.hp))}`;
            document.getElementById('enemyNexusDisplay').textContent = `Enemy Nexus: ${Math.max(0, Math.floor(gameState.enemyNexus.hp))}`;
            
            let qText = gameState.skillQCooldown > 0 ? `Q (AOE): ${(gameState.skillQCooldown / 60).toFixed(1)}s` : 'Q (AOE): Ready';
            let wText = gameState.skillWCooldown > 0 ? `W (Heal): ${(gameState.skillWCooldown / 60).toFixed(1)}s` : 'W (Heal): Ready';
            document.getElementById('skillQDisplay').textContent = qText;
            document.getElementById('skillWDisplay').textContent = wText;
        }

        function startGame() {
            startScreen.style.display = 'none';
            initGame();
            gameLoopInterval = setInterval(gameLoop, 16);
        }

        function retryGame() {
            gameOverScreen.style.display = 'none';
            clearScreen.style.display = 'none';
            startScreen.style.display = 'flex';
            clearInterval(gameLoopInterval);
        }

        let gameLoopInterval;

        document.getElementById('startButton').addEventListener('click', startGame);
        document.getElementById('retryButton').addEventListener('click', retryGame);
        document.getElementById('nextButton').addEventListener('click', retryGame);

        canvas.addEventListener('click', (e) => {
            if (!gameState.running) return;
            let rect = canvas.getBoundingClientRect();
            let clickX = e.clientX - rect.left + gameState.viewportX;
            let clickY = e.clientY - rect.top;
            gameState.hero.targetX = clickX;
            gameState.hero.targetY = clickY;
        });

        document.addEventListener('keydown', (e) => {
            if (!gameState.running) return;
            if (e.key.toLowerCase() === 'q') {
                if (gameState.skillQCooldown <= 0) {
                    let aoeRadius = 100;
                    for (let minion of gameState.enemyMinions) {
                        let dx = minion.x - gameState.hero.x;
                        let dy = minion.y - gameState.hero.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < aoeRadius) {
                            minion.hp -= 40;
                        }
                    }
                    gameState.skillQCooldown = config.skill_q_cd * 60;
                }
            } else if (e.key.toLowerCase() === 'w') {
                if (gameState.skillWCooldown <= 0) {
                    gameState.hero.hp = Math.min(gameState.hero.maxHp, gameState.hero.hp + gameState.hero.maxHp * 0.2);
                    gameState.skillWCooldown = config.skill_w_cd * 60;
                }
            }
        });
    </script>
</body>
</html>
