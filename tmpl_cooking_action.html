<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>料理アクションゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
        }

        #gameContainer {
            width: 400px;
            height: 600px;
            background: #2d1b00;
            border: 2px solid #666;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2d1b00;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 20px;
        }

        #startScreen h1 {
            color: #f6e05e;
            font-size: 48px;
            text-align: center;
        }

        #startScreen p {
            color: #ccc;
            font-size: 14px;
            text-align: center;
            max-width: 350px;
            line-height: 1.6;
        }

        #startBtn {
            padding: 15px 40px;
            font-size: 24px;
            background: #f6e05e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #2d1b00;
            transition: all 0.3s;
        }

        #startBtn:hover {
            background: #ffd700;
            transform: scale(1.05);
        }

        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 20px;
        }

        #clearScreen h2 {
            color: #f6e05e;
            font-size: 48px;
        }

        #clearScreen p {
            color: #ccc;
            font-size: 18px;
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 20px;
        }

        #gameOverScreen h2 {
            color: #ff6b6b;
            font-size: 48px;
        }

        #gameOverScreen p {
            color: #ccc;
            font-size: 18px;
        }

        .retryBtn {
            padding: 12px 30px;
            font-size: 18px;
            background: #f6e05e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #2d1b00;
            transition: all 0.3s;
        }

        .retryBtn:hover {
            background: #ffd700;
            transform: scale(1.05);
        }

        #gameScreen {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 10px;
            gap: 10px;
        }

        #hud {
            display: flex;
            justify-content: space-between;
            color: #f6e05e;
            font-size: 14px;
            font-weight: bold;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        #orderArea {
            display: flex;
            gap: 10px;
            max-height: 100px;
            overflow-y: auto;
        }

        .order-card {
            background: #8b4513;
            border: 2px solid #f6e05e;
            border-radius: 8px;
            padding: 10px;
            min-width: 150px;
            color: #fff;
            font-size: 12px;
            flex-shrink: 0;
        }

        .order-title {
            font-weight: bold;
            color: #f6e05e;
            margin-bottom: 5px;
        }

        .order-ingredients {
            font-size: 11px;
            color: #ddd;
            margin-bottom: 5px;
        }

        .timer-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 5px;
        }

        .timer-fill {
            height: 100%;
            background: #4ade80;
            width: 100%;
            transition: background 0.3s;
        }

        #gamePlayArea {
            display: flex;
            gap: 10px;
            flex: 1;
        }

        #ingredientPanel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 80px;
            flex-shrink: 0;
        }

        .ingredient-btn {
            padding: 10px;
            background: #f6e05e;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            color: #2d1b00;
            transition: all 0.2s;
        }

        .ingredient-btn:hover {
            background: #ffd700;
            transform: scale(1.05);
        }

        .ingredient-btn:active {
            transform: scale(0.95);
        }

        #cookingArea {
            flex: 1;
            background: #8b4513;
            border: 2px solid #d4af37;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #cookingArea h3 {
            color: #f6e05e;
            font-size: 14px;
            text-align: center;
        }

        #ingredientStack {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 4px;
            min-height: 150px;
            overflow-y: auto;
        }

        .stacked-ingredient {
            background: #4ade80;
            color: #000;
            padding: 6px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
        }

        #buttonArea {
            display: flex;
            gap: 8px;
        }

        #serveBtn {
            flex: 1;
            padding: 10px;
            background: #4ade80;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: #000;
            display: none;
            transition: all 0.2s;
        }

        #serveBtn:hover {
            background: #22c55e;
            transform: scale(1.05);
        }

        #serveBtn.show {
            display: block;
        }

        #clearStackBtn {
            flex: 1;
            padding: 10px;
            background: #ef4444;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            transition: all 0.2s;
        }

        #clearStackBtn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="startScreen">
            <h1>COOKING</h1>
            <p>
                料理を組み立てるアクションゲーム！<br>
                オーダーの食材を正しい順序で積み上げて提供しよう。<br>
                <br>
                目標: 10件完成<br>
                ミス上限: 3回<br>
                制限時間: 1注文あたり20秒
            </p>
            <button id="startBtn" onclick="startGame()">START</button>
        </div>

        <div id="gameScreen">
            <div id="hud">
                <span>完成: <span id="winCount">0</span>/<span id="winTarget">10</span></span>
                <span>ミス: <span id="missCount">0</span>/<span id="missLimit">3</span></span>
            </div>

            <div id="orderArea"></div>

            <div id="gamePlayArea">
                <div id="ingredientPanel"></div>

                <div id="cookingArea">
                    <h3>調理台</h3>
                    <div id="ingredientStack"></div>
                    <div id="buttonArea">
                        <button id="serveBtn" onclick="serveOrder()">提供</button>
                        <button id="clearStackBtn" onclick="clearStack()">クリア（やり直し）</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="clearScreen">
            <h2>CLEAR!</h2>
            <p>10件完成させました！</p>
            <button class="retryBtn" onclick="retryGame()">もう一度</button>
        </div>

        <div id="gameOverScreen">
            <h2>GAME OVER</h2>
            <p id="gameOverMessage">ミス3回でゲームオーバー</p>
            <button class="retryBtn" onclick="retryGame()">リトライ</button>
        </div>
    </div>

    <script>
        const config = {
            title: 'COOKING',
            bg_color: '#2d1b00',
            counter_color: '#8b4513',
            ingredient_color: '#f6e05e',
            win_orders: 10,
            miss_limit: 3,
            order_time: 20
        };

        const recipes = {
            0: ['パン', '肉', 'レタス'],
            1: ['レタス', 'チーズ'],
            2: ['パン', '肉']
        };

        const recipeNames = ['バーガー', 'サラダ', 'ホットドッグ'];
        const allIngredients = ['パン', '肉', 'レタス', 'チーズ', 'ソース'];

        let gameState = {
            running: false,
            wins: 0,
            misses: 0,
            currentStack: [],
            orders: [],
            orderTimers: []
        };

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            gameState.running = true;
            gameState.wins = 0;
            gameState.misses = 0;
            gameState.currentStack = [];
            gameState.orders = [];
            gameState.orderTimers = [];
            
            document.getElementById('winTarget').textContent = config.win_orders;
            document.getElementById('missLimit').textContent = config.miss_limit;
            
            updateHUD();
            initializeIngredientPanel();
            addOrder();
            gameLoop();
        }

        function initializeIngredientPanel() {
            const panel = document.getElementById('ingredientPanel');
            panel.innerHTML = '';
            allIngredients.forEach(ing => {
                const btn = document.createElement('button');
                btn.className = 'ingredient-btn';
                btn.textContent = ing;
                btn.onclick = () => addIngredient(ing);
                panel.appendChild(btn);
            });
        }

        function addIngredient(ingredient) {
            if (!gameState.running) return;
            gameState.currentStack.push(ingredient);
            renderStack();
            checkRecipe();
        }

        function renderStack() {
            const stackDiv = document.getElementById('ingredientStack');
            stackDiv.innerHTML = '';
            gameState.currentStack.forEach(ing => {
                const elem = document.createElement('div');
                elem.className = 'stacked-ingredient';
                elem.textContent = ing;
                stackDiv.appendChild(elem);
            });
        }

        function clearStack() {
            if (!gameState.running) return;
            gameState.currentStack = [];
            renderStack();
            checkRecipe();
        }

        function checkRecipe() {
            if (gameState.orders.length === 0) {
                document.getElementById('serveBtn').style.display = 'none';
                return;
            }
            const recipe = recipes[gameState.orders[0].recipe];
            const matches = gameState.currentStack.length === recipe.length &&
                            gameState.currentStack.every((ing, i) => ing === recipe[i]);
            document.getElementById('serveBtn').style.display = matches ? 'block' : 'none';
        }

        function serveOrder() {
            if (!gameState.running || gameState.orders.length === 0) return;
            
            gameState.wins++;
            gameState.currentStack = [];
            gameState.orders.shift();
            if (gameState.orderTimers.length > 0) {
                clearInterval(gameState.orderTimers.shift());
            }
            
            renderStack();
            checkRecipe();
            updateHUD();
            renderOrders();
            
            if (gameState.wins >= config.win_orders) {
                endGameClear();
            } else {
                addOrder();
            }
        }

        function addOrder() {
            if (gameState.orders.length >= 2) return;
            const recipeIdx = Math.floor(Math.random() * 3);
            gameState.orders.push({ recipe: recipeIdx, timeLeft: config.order_time });
            
            const timerId = setInterval(() => {
                if (!gameState.running) {
                    clearInterval(timerId);
                    return;
                }
                const order = gameState.orders[0];
                if (!order) {
                    clearInterval(timerId);
                    return;
                }
                order.timeLeft--;
                renderOrders();
                if (order.timeLeft <= 0) {
                    clearInterval(timerId);
                    gameState.orders.shift();
                    gameState.misses++;
                    updateHUD();
                    renderOrders();
                    gameState.currentStack = [];
                    renderStack();
                    checkRecipe();
                    if (gameState.misses >= config.miss_limit) {
                        endGameOver();
                    } else {
                        addOrder();
                    }
                }
            }, 1000);
            
            gameState.orderTimers.push(timerId);
            renderOrders();
        }

        function renderOrders() {
            const orderArea = document.getElementById('orderArea');
            orderArea.innerHTML = '';
            gameState.orders.forEach((order, idx) => {
                const card = document.createElement('div');
                card.className = 'order-card';
                const recipe = recipes[order.recipe];
                const recipeName = recipeNames[order.recipe];
                const timerPercent = (order.timeLeft / config.order_time) * 100;
                const timerColor = timerPercent > 50 ? '#4ade80' : timerPercent > 25 ? '#eab308' : '#ef4444';
                
                card.innerHTML = `
                    <div class="order-title">${recipeName}</div>
                    <div class="order-ingredients">${recipe.join(' + ')}</div>
                    <div class="timer-bar">
                        <div class="timer-fill" style="width: ${timerPercent}%; background: ${timerColor};"></div>
                    </div>
                `;
                orderArea.appendChild(card);
            });
        }

        function updateHUD() {
            document.getElementById('winCount').textContent = gameState.wins;
            document.getElementById('missCount').textContent = gameState.misses;
        }

        function endGameClear() {
            gameState.running = false;
            gameState.orderTimers.forEach(id => clearInterval(id));
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'flex';
        }

        function endGameOver() {
            gameState.running = false;
            gameState.orderTimers.forEach(id => clearInterval(id));
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }

        function gameLoop() {
            if (gameState.running) {
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
