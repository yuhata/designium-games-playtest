<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICROSS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        #container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            max-width: 900px;
            width: 100%;
        }
        #title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2d3748;
        }
        #startScreen {
            text-align: center;
            padding: 40px 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        #startScreen h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #2d3748;
        }
        .rule-text {
            font-size: 14px;
            line-height: 1.8;
            color: #4a5568;
            margin: 20px auto;
            max-width: 400px;
            text-align: left;
            background: white;
            padding: 15px;
            border-left: 4px solid #4299e1;
            border-radius: 4px;
        }
        .rule-text strong {
            color: #2d3748;
        }
        .btn {
            background: #4299e1;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #3182ce;
        }
        #gameContainer {
            display: none;
        }
        #canvas {
            display: block;
            margin: 0 auto;
            background: #f8f9fa;
            border: 2px solid #cbd5e0;
            border-radius: 4px;
        }
        #clearScreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #clearPopup {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        #clearPopup h2 {
            font-size: 28px;
            color: #22863a;
            margin-bottom: 20px;
        }
        #silhouetteDisplay {
            font-size: 80px;
            margin: 30px 0;
            font-weight: bold;
        }
        .retry-btn {
            background: #22863a;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
        }
        .retry-btn:hover {
            background: #1a5e27;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="title">PICROSS</div>

        <div id="startScreen">
            <h2>ノノグラムパズル</h2>
            <div class="rule-text">
                <strong>数字 = その行/列に連続して塗るマス数</strong><br>
                例: [3] → ■■■　<br>
                例: [1,2] → ■ ■■<br><br>
                <strong>操作方法:</strong><br>
                左クリック: マスを塗る<br>
                右クリック: ×（空き）
            </div>
            <button class="btn" id="startBtn">START</button>
        </div>

        <div id="gameContainer">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <div id="clearScreen">
        <div id="clearPopup">
            <h2>🎉 完成! 🎉</h2>
            <div id="silhouetteDisplay"></div>
            <button class="retry-btn" id="retryBtn">もう一度</button>
        </div>
    </div>

    <script>
        const config = {
            title: 'PICROSS',
            bg_color: '#f8f9fa',
            filled_color: '#2d3748',
            empty_color: '#ffffff',
            wrong_color: '#ef4444',
            hint_color: '#4299e1',
            grid_size: 7
        };

        const silhouettes = [
            { pattern: [[0,3],[1,2],[1,3],[1,4],[2,3],[3,1],[3,2],[3,3],[3,4],[3,5],[4,3],[5,3],[6,3]], emoji: '❤️' },
            { pattern: [[0,3],[1,2],[1,3],[1,4],[2,1],[2,2],[2,3],[2,4],[2,5],[3,0],[3,1],[3,2],[3,3],[3,4],[3,5],[3,6],[4,1],[4,2],[4,3],[4,4],[4,5],[5,2],[5,3],[5,4],[6,3]], emoji: '⭐' },
            { pattern: [[1,1],[1,2],[1,3],[1,4],[1,5],[2,1],[2,5],[3,1],[3,2],[3,3],[3,4],[3,5],[4,3],[5,2],[5,3],[5,4],[6,3]], emoji: '🐟' },
            { pattern: [[0,3],[1,2],[1,3],[1,4],[2,1],[2,3],[2,5],[3,0],[3,3],[3,6],[4,1],[4,3],[4,5],[5,2],[5,3],[5,4],[6,3]], emoji: '🎨' },
            { pattern: [[0,2],[0,3],[0,4],[1,1],[1,2],[1,3],[1,4],[1,5],[2,1],[2,5],[3,1],[3,2],[3,3],[3,4],[3,5],[4,1],[4,5],[5,1],[5,2],[5,3],[5,4],[5,5],[6,2],[6,3],[6,4]], emoji: '🔔' }
        ];

        let gameState = {
            running: false,
            grid: [],
            solution: [],
            currentSilhouette: null,
            gameLoopHandle: null
        };

        function initGame() {
            gameState.running = true;
            gameState.grid = [];
            for (let i = 0; i < config.grid_size; i++) {
                gameState.grid[i] = [];
                for (let j = 0; j < config.grid_size; j++) {
                    gameState.grid[i][j] = 0;
                }
            }

            const silhouetteIdx = Math.floor(Math.random() * silhouettes.length);
            gameState.currentSilhouette = silhouettes[silhouetteIdx];

            gameState.solution = [];
            for (let i = 0; i < config.grid_size; i++) {
                gameState.solution[i] = [];
                for (let j = 0; j < config.grid_size; j++) {
                    gameState.solution[i][j] = 0;
                }
            }

            gameState.currentSilhouette.pattern.forEach(function(coord) {
                gameState.solution[coord[0]][coord[1]] = 1;
            });
        }

        function getRunLengths(arr) {
            const lengths = [];
            let count = 0;
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] === 1) {
                    count++;
                } else if (count > 0) {
                    lengths.push(count);
                    count = 0;
                }
            }
            if (count > 0) lengths.push(count);
            return lengths.length === 0 ? [0] : lengths;
        }

        function isRowComplete(rowIdx) {
            const playerRow = gameState.grid[rowIdx];
            const solutionRow = gameState.solution[rowIdx];
            const playerLengths = getRunLengths(playerRow.map(function(c) { return c === 1 ? 1 : 0; }));
            const solutionLengths = getRunLengths(solutionRow);
            return JSON.stringify(playerLengths) === JSON.stringify(solutionLengths);
        }

        function isColComplete(colIdx) {
            const playerCol = [];
            const solutionCol = [];
            for (let i = 0; i < config.grid_size; i++) {
                playerCol.push(gameState.grid[i][colIdx]);
                solutionCol.push(gameState.solution[i][colIdx]);
            }
            const playerLengths = getRunLengths(playerCol.map(function(c) { return c === 1 ? 1 : 0; }));
            const solutionLengths = getRunLengths(solutionCol);
            return JSON.stringify(playerLengths) === JSON.stringify(solutionLengths);
        }

        function checkWin() {
            for (let i = 0; i < config.grid_size; i++) {
                if (!isRowComplete(i) || !isColComplete(i)) {
                    return false;
                }
            }
            return true;
        }

        function handleCanvasClick(e) {
            if (!gameState.running) return;

            const canvas = document.getElementById('canvas');
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const hintSize = 60;
            const cellSize = (canvas.width - hintSize) / config.grid_size;

            if (x < hintSize || y < hintSize) return;

            const col = Math.floor((x - hintSize) / cellSize);
            const row = Math.floor((y - hintSize) / cellSize);

            if (row >= 0 && row < config.grid_size && col >= 0 && col < config.grid_size) {
                if (e.button === 0) {
                    gameState.grid[row][col] = gameState.grid[row][col] === 1 ? 0 : 1;
                } else if (e.button === 2) {
                    gameState.grid[row][col] = gameState.grid[row][col] === 2 ? 0 : 2;
                }

                if (checkWin()) {
                    gameState.running = false;
                    const clearScreen = document.getElementById('clearScreen');
                    const silhouetteDisplay = document.getElementById('silhouetteDisplay');
                    silhouetteDisplay.textContent = gameState.currentSilhouette.emoji;
                    clearScreen.style.display = 'flex';
                }
            }
        }

        function drawGame() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = 700;
            canvas.height = 700;

            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const hintSize = 60;
            const cellSize = (canvas.width - hintSize) / config.grid_size;

            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= config.grid_size; i++) {
                const pos = hintSize + i * cellSize;
                ctx.beginPath();
                ctx.moveTo(pos, hintSize);
                ctx.lineTo(pos, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(hintSize, pos);
                ctx.lineTo(canvas.width, pos);
                ctx.stroke();
            }

            for (let i = 0; i < config.grid_size; i++) {
                for (let j = 0; j < config.grid_size; j++) {
                    const x = hintSize + j * cellSize;
                    const y = hintSize + i * cellSize;

                    if (gameState.grid[i][j] === 1) {
                        ctx.fillStyle = config.filled_color;
                        ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
                    } else if (gameState.grid[i][j] === 2) {
                        ctx.fillStyle = config.empty_color;
                        ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
                        ctx.strokeStyle = '#cbd5e0';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(x + 5, y + 5);
                        ctx.lineTo(x + cellSize - 5, y + cellSize - 5);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(x + cellSize - 5, y + 5);
                        ctx.lineTo(x + 5, y + cellSize - 5);
                        ctx.stroke();
                    }
                }
            }

            ctx.fillStyle = '#2d3748';
            ctx.font = '12px Arial';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            for (let i = 0; i < config.grid_size; i++) {
                const lengths = getRunLengths(gameState.solution[i]);
                const hint = lengths[0] === 0 ? '0' : lengths.join(' ');
                const color = isRowComplete(i) ? '#22863a' : '#2d3748';
                ctx.fillStyle = color;
                const y = hintSize + (i + 0.5) * cellSize;
                ctx.fillText(hint, hintSize - 10, y);
            }

            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            for (let j = 0; j < config.grid_size; j++) {
                const col = [];
                for (let i = 0; i < config.grid_size; i++) {
                    col.push(gameState.solution[i][j]);
                }
                const lengths = getRunLengths(col);
                const hint = lengths[0] === 0 ? '0' : lengths.join(' ');
                const color = isColComplete(j) ? '#22863a' : '#2d3748';
                ctx.fillStyle = color;
                const x = hintSize + (j + 0.5) * cellSize;
                ctx.font = '11px Arial';
                ctx.fillText(hint, x, hintSize - 10);
            }
        }

        function gameLoop() {
            drawGame();
        }

        function retryGame() {
            gameState.running = false;
            const clearScreen = document.getElementById('clearScreen');
            clearScreen.style.display = 'none';
            initGame();
        }

        document.getElementById('startBtn').addEventListener('click', function() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            initGame();
            if (!gameState.gameLoopHandle) {
                gameState.gameLoopHandle = setInterval(gameLoop, 16);
            }
        });

        document.getElementById('retryBtn').addEventListener('click', retryGame);

        const canvas = document.getElementById('canvas');
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const hintSize = 60;
            const cellSize = (canvas.width - hintSize) / config.grid_size;

            if (x < hintSize || y < hintSize) return;

            const col = Math.floor((x - hintSize) / cellSize);
            const row = Math.floor((y - hintSize) / cellSize);

            if (row >= 0 && row < config.grid_size && col >= 0 && col < config.grid_size) {
                gameState.grid[row][col] = gameState.grid[row][col] === 2 ? 0 : 2;

                if (checkWin()) {
                    gameState.running = false;
                    const clearScreen = document.getElementById('clearScreen');
                    const silhouetteDisplay = document.getElementById('silhouetteDisplay');
                    silhouetteDisplay.textContent = gameState.currentSilhouette.emoji;
                    clearScreen.style.display = 'flex';
                }
            }
        });
    </script>
</body>
</html>
