<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>モグラ烈打</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
    }
    canvas {
      border: 3px solid #333;
      cursor: crosshair;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: block;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const game = {
      score: 0,
      combo: 0,
      hp: 3,
      missed: 0,
      time: 60,
      gameState: 'ready',
      moles: [],
      particles: [],
      floatingTexts: [],
      lastMoleTime: 0,
      moleInterval: 1200,
      gameStartTime: null,
      lastSecondTime: 0
    };

    class Mole {
      constructor() {
        this.x = Math.random() * (canvas.width - 60);
        this.y = Math.random() * (canvas.height - 150) + 80;
        this.width = 60;
        this.height = 60;
        this.createdTime = Date.now();
        this.duration = 2500;
        this.wobblePhase = Math.random() * Math.PI * 2;
      }

      isAlive() {
        return Date.now() - this.createdTime < this.duration;
      }

      contains(x, y) {
        const dx = x - (this.x + 30);
        const dy = y - (this.y + 30);
        return Math.sqrt(dx * dx + dy * dy) < 35;
      }
    }

    class Particle {
      constructor(x, y, color = '#FF6B6B') {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 12;
        this.vy = (Math.random() - 0.5) * 12 - 3;
        this.life = 40;
        this.maxLife = 40;
        this.size = Math.random() * 6 + 3;
        this.color = color;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.3;
        this.life--;
      }

      draw(ctx) {
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    class FloatingText {
      constructor(x, y, text, color = '#FFD700') {
        this.x = x;
        this.y = y;
        this.text = text;
        this.color = color;
        this.life = 50;
        this.maxLife = 50;
      }

      update() {
        this.y -= 1;
        this.life--;
      }

      draw(ctx) {
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillStyle = this.color;
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(this.text, this.x, this.y);
        ctx.globalAlpha = 1;
      }
    }

    function spawnMole() {
      if (game.gameState === 'playing' && Date.now() - game.lastMoleTime > game.moleInterval) {
        game.moles.push(new Mole());
        game.lastMoleTime = Date.now();
      }
    }

    function update() {
      if (game.gameState === 'ready') {
        return;
      }

      if (game.gameState === 'playing') {
        if (!game.gameStartTime) game.gameStartTime = Date.now();

        const elapsed = Date.now() - game.gameStartTime;
        const newTime = Math.max(0, 60 - Math.floor(elapsed / 1000));

        if (newTime !== game.time) {
          game.time = newTime;
          if (game.time === 0) {
            if (game.score > 300) {
              game.gameState = 'win';
            } else {
              game.gameState = 'fail';
            }
          }
        }

        spawnMole();

        game.moles = game.moles.filter(mole => {
          if (!mole.isAlive()) {
            game.missed++;
            game.hp--;
            game.combo = 0;
            game.floatingTexts.push(new FloatingText(mole.x + 30, mole.y, 'MISS!', '#FF6B6B'));

            if (game.hp <= 0) {
              game.gameState = 'fail';
            }
            return false;
          }
          return true;
        });
      }

      game.particles.forEach(p => p.update());
      game.particles = game.particles.filter(p => p.life > 0);

      game.floatingTexts.forEach(t => t.update());
      game.floatingTexts = game.floatingTexts.filter(t => t.life > 0);
    }

    function drawMole(mole) {
      const wobble = Math.sin(Date.now() / 100 + mole.wobblePhase) * 2;
      const progress = (Date.now() - mole.createdTime) / mole.duration;
      const alpha = progress > 0.8 ? 1 - (progress - 0.8) / 0.2 : 1;

      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.arc(mole.x + 30 + wobble, mole.y + 30, 32, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#654321';
      ctx.beginPath();
      ctx.arc(mole.x + 30 + wobble, mole.y + 25, 15, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(mole.x + 22 + wobble, mole.y + 22, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(mole.x + 38 + wobble, mole.y + 22, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#FFB6C1';
      ctx.beginPath();
      ctx.arc(mole.x + 30 + wobble, mole.y + 35, 6, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 1;
    }

    function drawUI() {
      ctx.globalAlpha = 0.95;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      ctx.fillRect(0, 0, canvas.width, 70);
      ctx.globalAlpha = 1;

      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'left';
      ctx.fillText(`SCORE: ${game.score}`, 15, 25);
      ctx.fillText(`COMBO: ${game.combo}`, 15, 50);

      ctx.fillText(`HP: ${'❤ '.repeat(Math.max(0, game.hp))}`, 250, 25);
      ctx.fillText(`MISSED: ${game.missed}/5`, 250, 50);

      ctx.textAlign = 'right';
      ctx.fillStyle = game.time <= 10 ? '#FF6B6B' : '#FFD700';
      ctx.font = 'bold 24px Arial';
      ctx.fillText(`TIME: ${game.time}s`, canvas.width - 15, 35);
    }

    function drawReady() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('モグラ烈打', canvas.width / 2, canvas.height / 2 - 80);

      ctx.fillStyle = '#FFF';
      ctx.font = '20px Arial';
      ctx.fillText('マウスでモグラをクリックして叩く！', canvas.width / 2, canvas.height / 2);
      ctx.fillText('スコア 300以上でクリア', canvas.width / 2, canvas.height / 2 + 40);
      ctx.fillText('見逃し5回またはHP0でゲームオーバー', canvas.width / 2, canvas.height / 2 + 70);

      ctx.fillStyle = '#00FF00';
      ctx.font = 'bold 24px Arial';
      ctx.fillText('クリックしてスタート', canvas.width / 2, canvas.height / 2 + 130);
    }

    function drawWin() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < 20; i++) {
        const angle = (Date.now() / 20 + i * Math.PI / 10) % (Math.PI * 2);
        const x = canvas.width / 2 + Math.cos(angle) * 150;
        const y = canvas.height / 2 - 100 + Math.sin(angle) * 150;
        ctx.fillStyle = '#FFD700';
        ctx.font = '30px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('★', x, y);
      }

      ctx.fillStyle = '#00FF00';
      ctx.font = 'bold 64px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('YOU WIN!', canvas.width / 2, canvas.height / 2 - 30);

      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 32px Arial';
      ctx.fillText(`SCORE: ${game.score}`, canvas.width / 2, canvas.height / 2 + 60);
      ctx.fillText(`COMBO: ${game.combo}`, canvas.width / 2, canvas.height / 2 + 100);

      ctx.fillStyle = '#FFF';
      ctx.font = '18px Arial';
      ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height / 2 + 150);
    }

    function drawFail() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#FF6B6B';
      ctx.font = 'bold 64px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 30);

      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 32px Arial';
      ctx.fillText(`FINAL SCORE: ${game.score}`, canvas.width / 2, canvas.height / 2 + 60);
      ctx.fillText(`COMBO: ${game.combo}`, canvas.width / 2, canvas.height / 2 + 100);

      ctx.fillStyle = '#FFF';
      ctx.font = '18px Arial';
      ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height / 2 + 150);
    }

    function draw() {
      ctx.fillStyle = 'rgba(102, 126, 234, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (game.gameState === 'ready') {
        drawReady();
      } else if (game.gameState === 'playing') {
        game.moles.forEach(mole => drawMole(mole));
        game.particles.forEach(p => p.draw(ctx));
        game.floatingTexts.forEach(t => t.draw(ctx));
        drawUI();
      } else if (game.gameState === 'win') {
        drawWin();
      } else if (game.gameState === 'fail') {
        drawFail();
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('click', (e) => {
      if (game.gameState === 'ready') {
        game.gameState = 'playing';
        return;
      }

      if (game.gameState === 'win' || game.gameState === 'fail') {
        game.score = 0;
        game.combo = 0;
        game.hp = 3;
        game.missed = 0;
        game.time = 60;
        game.moles = [];
        game.particles = [];
        game.floatingTexts = [];
        game.gameStartTime = null;
        game.lastMoleTime = 0;
        game.gameState = 'playing';
        return;
      }

      if (game.gameState !== 'playing') return;

      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      for (let i = game.moles.length - 1; i >= 0; i--) {
        if (game.moles[i].contains(x, y)) {
          game.score += 10;
          game.combo++;

          for (let j = 0; j < 15; j++) {
            game.particles.push(new Particle(
              game.moles[i].x + 30,
              game.moles[i].y + 30,
              ['#FF6B6B', '#FFA500', '#FFD700'][Math.floor(Math.random() * 3)]
            ));
          }

          game.floatingTexts.push(new FloatingText(
            game.moles[i].x + 30,
            game.moles[i].y,
            `+10 (${game.combo}x)`,
            '#00FF00'
          ));

          game.moles.splice(i, 1);
          break;
        }
      }
    });

    canvas.addEventListener('mousemove', () => {});

    gameLoop();
  </script>
</body>
</html>
