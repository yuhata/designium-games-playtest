<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>まちスタ - デモ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
    }
    
    .phone-frame {
      width: 375px;
      height: 812px;
      border: 12px solid #333;
      border-radius: 40px;
      overflow: hidden;
      background: white;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 28px;
      background: #000;
      z-index: 100;
      border-radius: 0 0 20px 20px;
    }
    
    .demo-banner {
      position: absolute;
      top: 28px;
      left: 0;
      right: 0;
      background: #ff6b6b;
      color: white;
      padding: 6px;
      text-align: center;
      font-size: 12px;
      font-weight: bold;
      z-index: 99;
    }
    
    .screen-container {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding-top: 56px;
    }
    
    .screen {
      display: none;
      flex: 1;
      padding: 20px;
      padding-top: 15px;
    }
    
    .screen.active {
      display: flex;
      flex-direction: column;
    }
    
    /* Title Screen */
    .title-screen {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }
    
    .title-screen h1 {
      font-size: 48px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .title-screen p {
      font-size: 14px;
      margin-bottom: 30px;
      opacity: 0.9;
    }
    
    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background: white;
      color: #667eea;
    }
    
    .btn-primary:active {
      transform: scale(0.98);
      opacity: 0.9;
    }
    
    .btn-secondary {
      background: #667eea;
      color: white;
      border: 2px solid white;
    }
    
    .btn-secondary:active {
      transform: scale(0.98);
    }
    
    .btn-danger {
      background: #ff6b6b;
      color: white;
    }
    
    .btn-success {
      background: #51cf66;
      color: white;
    }
    
    .btn-small {
      padding: 8px 16px;
      font-size: 12px;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Game Screen */
    .status-bar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 8px;
      margin-bottom: 16px;
      font-weight: 600;
    }
    
    .status-left, .status-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .stamp-counter {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .timer {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .timer.warning {
      color: #ffd700;
    }
    
    .timer.danger {
      color: #ff6b6b;
    }
    
    /* POI List */
    .poi-list {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    
    .poi-item {
      background: white;
      border: 2px solid #e9e9e9;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .poi-item:active {
      background: #f0f0f0;
    }
    
    .poi-item.selected {
      border-color: #667eea;
      background: #f3f4ff;
    }
    
    .poi-item.collected {
      opacity: 0.6;
      border-color: #51cf66;
    }
    
    .poi-name {
      font-weight: 600;
      font-size: 14px;
    }
    
    .poi-icon {
      font-size: 24px;
      margin-right: 10px;
    }
    
    .poi-left {
      display: flex;
      align-items: center;
      flex: 1;
    }
    
    .poi-distance {
      font-size: 12px;
      color: #666;
      font-weight: 500;
    }
    
    .poi-distance.unlocked {
      color: #51cf66;
      font-weight: 700;
    }
    
    .poi-status {
      font-size: 20px;
      margin-left: 8px;
    }
    
    /* POI Detail */
    .poi-detail {
      background: white;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      border: 2px solid #667eea;
    }
    
    .poi-detail-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .poi-detail-desc {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    
    .distance-meter {
      background: #f5f5f5;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .distance-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }
    
    .distance-bar-container {
      background: #e9e9e9;
      border-radius: 4px;
      height: 20px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    
    .distance-bar-fill {
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      height: 100%;
      transition: width 0.3s ease;
    }
    
    .distance-text {
      font-size: 14px;
      font-weight: 600;
      text-align: center;
    }
    
    .distance-text.near {
      color: #51cf66;
    }
    
    /* Controls */
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .btn-control {
      flex: 1;
      min-width: 150px;
    }
    
    /* Collection Screen */
    .collection-screen {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }
    
    .stamp-animation {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 0.6s ease-out;
    }
    
    @keyframes bounce {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    
    .collection-text {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    
    .collection-desc {
      font-size: 13px;
      opacity: 0.9;
      margin-bottom: 24px;
    }
    
    /* Game Over Screen */
    .gameover-screen {
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    
    .gameover-screen.win {
      background: linear-gradient(135deg, #51cf66 0%, #40c057 100%);
      color: white;
    }
    
    .gameover-screen.lose {
      background: linear-gradient(135deg, #ff6b6b 0%, #fa5252 100%);
      color: white;
    }
    
    .gameover-title {
      font-size: 40px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    
    .gameover-desc {
      font-size: 14px;
      margin-bottom: 24px;
      opacity: 0.95;
    }
    
    .gameover-stats {
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }
    
    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 8px;
    }
    
    .stat-row:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="demo-banner">[デモモード]</div>
    <div class="screen-container">
      <!-- Title Screen -->
      <div class="screen active" id="titleScreen">
        <div class="title-screen">
          <h1>👟</h1>
          <h1>まちスタ</h1>
          <p>街を歩いてスタンプを集めよう</p>
          <button class="btn btn-primary" onclick="startGame()">はじめる</button>
        </div>
      </div>
      
      <!-- Game Screen -->
      <div class="screen" id="gameScreen">
        <div class="status-bar">
          <div class="status-left">
            <div class="stamp-counter">
              <span>★</span>
              <span id="stampCounter">0/12</span>
            </div>
          </div>
          <div class="status-right">
            <div class="timer" id="timerDisplay">
              <span>⏱</span>
              <span id="timerText">15:00</span>
            </div>
          </div>
        </div>
        
        <div class="poi-detail" id="poiDetail">
          <div class="poi-detail-name" id="detailName">選択してください</div>
          <div class="poi-detail-desc" id="detailDesc"></div>
          <div class="distance-meter">
            <div class="distance-label">現在地との距離</div>
            <div class="distance-bar-container">
              <div class="distance-bar-fill" id="distanceBar" style="width: 100%;"></div>
            </div>
            <div class="distance-text" id="distanceText">1000m</div>
          </div>
        </div>
        
        <div class="poi-list" id="poiList"></div>
        
        <div class="controls">
          <button class="btn btn-secondary btn-control" id="shuffleBtn" onclick="simulateApproach()">👟 靴をなでる</button>
          <button class="btn btn-success btn-control" id="collectBtn" onclick="collectStamp()" disabled>スタンプ取得</button>
        </div>
      </div>
      
      <!-- Collection Screen -->
      <div class="screen" id="collectionScreen">
        <div class="collection-screen">
          <div class="stamp-animation" id="stampEmoji">⭐</div>
          <div class="collection-text">スタンプをゲット！</div>
          <div class="collection-desc" id="collectionPoiName"></div>
          <button class="btn btn-primary" onclick="returnToGame()">つづける</button>
        </div>
      </div>
      
      <!-- Game Over Screen -->
      <div class="screen" id="gameoverScreen">
        <div class="gameover-screen win">
          <div class="gameover-title" id="gameoverTitle">完走！</div>
          <div class="gameover-desc" id="gameoverDesc"></div>
          <div class="gameover-stats" id="gameoverStats"></div>
          <button class="btn btn-primary" onclick="showTitle()">タイトルへ</button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    const gameState = {
      pois: [
        { name: '駅舎', desc: '列車の玄関口。人が集まる場所', icon: '🚉', distance: 1200 },
        { name: '図書館', desc: '本がいっぱい。知識の宝庫', icon: '📚', distance: 850 },
        { name: '市民公園', desc: '緑に囲まれた憩いの場', icon: '🌳', distance: 650 },
        { name: '老舗カフェ', desc: '地元の人に愛されるカフェ', icon: '☕', distance: 420 },
        { name: '神社', desc: '古い歴史を持つ神聖な場所', icon: '⛩️', distance: 950 },
        { name: '商店街', desc: '昔ながらの商店が並ぶ', icon: '🏪', distance: 680 },
        { name: '美術館', desc: '様々な芸術作品を展示', icon: '🎨', distance: 1100 },
        { name: '川べりの散歩道', desc: '風が気持ちいい場所', icon: '🌊', distance: 780 },
        { name: '小学校', desc: '子どもたちの元気な声が聞こえる', icon: '🏫', distance: 590 },
        { name: '駅前広場', desc: 'イベントが開催される広場', icon: '📍', distance: 400 },
        { name: '庭園', desc: '日本庭園の美しさを堪能', icon: '🏯', distance: 1050 },
        { name: '展望台', desc: '町全体を見下ろせる場所', icon: '🌉', distance: 1300 }
      ],
      currentPoiIndex: 0,
      collectedCount: 0,
      timeRemaining: 900,
      gameActive: false,
      timerInterval: null
    };
    
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }
    
    function startGame() {
      gameState.collectedCount = 0;
      gameState.timeRemaining = 900;
      gameState.gameActive = true;
      gameState.pois.forEach(poi => poi.collected = false);
      gameState.currentPoiIndex = 0;
      
      showScreen('gameScreen');
      renderPoiList();
      updateUI();
      startTimer();
    }
    
    function startTimer() {
      if (gameState.timerInterval) clearInterval(gameState.timerInterval);
      gameState.timerInterval = setInterval(() => {
        gameState.timeRemaining--;
        updateTimer();
        
        if (gameState.timeRemaining <= 0) {
          clearInterval(gameState.timerInterval);
          endGame(false);
        }
      }, 1000);
    }
    
    function updateTimer() {
      const minutes = Math.floor(gameState.timeRemaining / 60);
      const seconds = gameState.timeRemaining % 60;
      const timerDisplay = document.getElementById('timerDisplay');
      document.getElementById('timerText').textContent = 
        `${minutes}:${seconds.toString().padStart(2, '0')}`;
      
      if (gameState.timeRemaining <= 60) {
        timerDisplay.classList.add('danger');
      } else if (gameState.timeRemaining <= 180) {
        timerDisplay.classList.add('warning');
      }
    }
    
    function renderPoiList() {
      const list = document.getElementById('poiList');
      list.innerHTML = '';
      
      gameState.pois.forEach((poi, index) => {
        const item = document.createElement('div');
        item.className = 'poi-item';
        if (index === gameState.currentPoiIndex) item.classList.add('selected');
        if (poi.collected) item.classList.add('collected');
        
        const distance = poi.distance;
        const isUnlocked = distance < 50;
        
        item.innerHTML = `
          <div class="poi-left">
            <div class="poi-icon">${poi.icon}</div>
            <div>
              <div class="poi-name">${poi.name}</div>
              <div class="poi-distance ${isUnlocked ? 'unlocked' : ''}">
                ${distance}m
              </div>
            </div>
          </div>
          <div class="poi-status">
            ${poi.collected ? '✓' : ''}
          </div>
        `;
        
        item.onclick = () => selectPoi(index);
        list.appendChild(item);
      });
    }
    
    function selectPoi(index) {
      gameState.currentPoiIndex = index;
      updateUI();
    }
    
    function updateUI() {
      const poi = gameState.pois[gameState.currentPoiIndex];
      
      document.getElementById('stampCounter').textContent = 
        `${gameState.collectedCount}/12`;
      
      document.getElementById('detailName').textContent = poi.name;
      document.getElementById('detailDesc').textContent = poi.desc;
      
      const distance = poi.distance;
      const maxDistance = 1500;
      const percentage = Math.max(0, (maxDistance - distance) / maxDistance * 100);
      document.getElementById('distanceBar').style.width = percentage + '%';
      
      const distanceText = document.getElementById('distanceText');
      if (distance < 50) {
        distanceText.textContent = `${distance}m - 解放！`;
        distanceText.classList.add('near');
        document.getElementById('collectBtn').disabled = false;
      } else {
        distanceText.textContent = `${distance}m`;
        distanceText.classList.remove('near');
        document.getElementById('collectBtn').disabled = true;
      }
      
      renderPoiList();
    }
    
    function simulateApproach() {
      const poi = gameState.pois[gameState.currentPoiIndex];
      const reduction = Math.random() * 200 + 100;
      poi.distance = Math.max(0, poi.distance - reduction);
      updateUI();
    }
    
    function collectStamp() {
      const poi = gameState.pois[gameState.currentPoiIndex];
      if (poi.distance < 50 && !poi.collected) {
        poi.collected = true;
        gameState.collectedCount++;
        
        document.getElementById('collectionPoiName').textContent = poi.name;
        document.getElementById('stampEmoji').textContent = poi.icon;
        showScreen('collectionScreen');
        
        if (gameState.collectedCount === 12) {
          setTimeout(() => endGame(true), 1500);
        }
      }
    }
    
    function returnToGame() {
      showScreen('gameScreen');
      if (gameState.collectedCount < 12) {
        const nextIndex = gameState.pois.findIndex((p, i) => i > gameState.currentPoiIndex && !p.collected);
        if (nextIndex >= 0) {
          gameState.currentPoiIndex = nextIndex;
        }
        updateUI();
      }
    }
    
    function endGame(isWin) {
      gameState.gameActive = false;
      clearInterval(gameState.timerInterval);
      
      const screen = document.getElementById('gameoverScreen');
      const gameoverScreen = screen.querySelector('.gameover-screen');
      
      if (isWin) {
        gameoverScreen.classList.add('win');
        gameoverScreen.classList.remove('lose');
        document.getElementById('gameoverTitle').textContent = '完走！🎉';
        document.getElementById('gameoverDesc').textContent = '12個すべてのスタンプを集めました！';
      } else {
        gameoverScreen.classList.add('lose');
        gameoverScreen.classList.remove('win');
        document.getElementById('gameoverTitle').textContent = '時間切れ';
        document.getElementById('gameoverDesc').textContent = 
          gameState.collectedCount === 12 ? '完走できました！' : `${gameState.collectedCount}個のスタンプを集めました`;
      }
      
      const minutes = Math.floor(gameState.timeRemaining / 60);
      const seconds = gameState.timeRemaining % 60;
      document.getElementById('gameoverStats').innerHTML = `
        <div class="stat-row">
          <span>集めたスタンプ:</span>
          <strong>${gameState.collectedCount}/12</strong>
        </div>
        <div class="stat-row">
          <span>残り時間:</span>
          <strong>${minutes}:${seconds.toString().padStart(2, '0')}</strong>
        </div>
      `;
      
      showScreen('gameoverScreen');
    }
    
    function showTitle() {
      showScreen('titleScreen');
      document.getElementById('timerDisplay').classList.remove('warning', 'danger');
    }
  </script>
</body>
</html>
