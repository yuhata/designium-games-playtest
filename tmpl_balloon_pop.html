<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BALLOON POP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #e0f7ff 0%, #fff5e6 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(180deg, #f0fafb 0%, #fff9f0 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 250, 245, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(2px);
        }
        #startScreen h1 {
            font-size: 56px;
            margin-bottom: 20px;
            color: #ff6b9d;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.08);
            letter-spacing: 2px;
        }
        #startScreen p {
            font-size: 18px;
            margin-bottom: 40px;
            color: #777;
            line-height: 1.6;
        }
        #startBtn {
            padding: 16px 60px;
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.35);
            transition: all 0.3s ease;
        }
        #startBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 45px rgba(102, 126, 234, 0.45);
        }
        #startBtn:active {
            transform: scale(0.97);
        }
        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.97);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 11;
            backdrop-filter: blur(3px);
        }
        #clearScreen h2 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #00d084;
            text-shadow: 2px 2px 8px rgba(0,208,132,0.15);
            animation: pulse 0.8s ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        #clearScreen .finalScore {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #ff6b9d;
        }
        #clearScreen p {
            font-size: 16px;
            color: #888;
            margin-top: 15px;
        }
        #uiPanel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.92);
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            color: #333;
            z-index: 5;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            line-height: 1.8;
        }
        #uiPanel span {
            color: #667eea;
            font-weight: 700;
        }
        #instruction {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.88);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            color: #888;
            z-index: 5;
            text-align: center;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

<!--GAME_SPEC
{
  "win_condition": "popped >= 30 (totalBalloons)",
  "fail_condition": "none (relax mode)",
  "input_types": ["click", "mousedown", "mousemove", "mouseup"],
  "state_vars": ["score", "popped", "phase"],
  "core_loop": "spawn balloons → float upward → click to pop → score++ → check win",
  "clear_trigger": "popped >= totalBalloons",
  "gameover_trigger": "none"
}
-->

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="startScreen">
        <h1>🎈 BALLOON POP 🎈</h1>
        <p>Pop all the balloons as they float upward!</p>
        <p style="font-size: 14px; opacity: 0.7; margin-bottom: 30px;">Relax and enjoy the moment ✨</p>
        <button id="startBtn">START</button>
    </div>
    
    <div id="clearScreen">
        <h2>🎉 ALL BALLOONS POPPED! 🎉</h2>
        <div class="finalScore" id="finalScore">Score: 0</div>
        <p>Click anywhere to play again!</p>
    </div>
    
    <div id="uiPanel">
        <div>Score: <span id="scoreValue">0</span></div>
        <div>Balloons: <span id="balloonCount">0</span>/30</div>
    </div>
    
    <div id="instruction">
        👆 Click balloons to pop them! 🌸
    </div>
</div>

<script>
// Game state
const gameState = {
    phase: 'start',
    score: 0,
    popped: 0,
    totalBalloons: 30,
    balloons: [],
    particles: [],
    nextSpawnTime: 0,
    spawnInterval: 3000,
    gameStartTime: 0,
};

// Canvas setup
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('startScreen');
const clearScreen = document.getElementById('clearScreen');
const startBtn = document.getElementById('startBtn');
const scoreValue = document.getElementById('scoreValue');
const balloonCount = document.getElementById('balloonCount');
const finalScore = document.getElementById('finalScore');

// Balloon class
class Balloon {
    constructor() {
        this.x = Math.random() * (canvas.width - 100) + 50;
        this.y = canvas.height - Math.random() * 100 - 40;
        this.vy = -(Math.random() * 2 + 3);
        this.radius = Math.random() * 10 + 20;
        this.color = this.getRandomColor();
    }

    getRandomColor() {
        const colors = [
            { r: 255, g: 120, b: 150 },
            { r: 255, g: 200, b: 80 },
            { r: 100, g: 180, b: 255 },
            { r: 100, g: 220, b: 140 },
        ];
        return colors[Math.floor(Math.random() * colors.length)];
    }

    update() {
        this.y += this.vy;
    }

    draw() {
        ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.88)`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = `rgba(255, 255, 255, 0.35)`;
        ctx.beginPath();
        ctx.arc(this.x - this.radius * 0.35, this.y - this.radius * 0.35, this.radius * 0.28, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = `rgba(100, 100, 100, 0.25)`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + this.radius);
        ctx.lineTo(this.x, this.y + this.radius + 45);
        ctx.stroke();
    }

    isClicked(mx, my) {
        const dx = mx - this.x;
        const dy = my - this.y;
        return Math.sqrt(dx * dx + dy * dy) <= this.radius;
    }

    isOffscreen() {
        return this.y < -50;
    }
}

// Particle class
class Particle {
    constructor(x, y, color = null, isClear = false) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * (isClear ? 3 : 7);
        this.vy = (Math.random() - 0.5) * (isClear ? 2 : 7) - (isClear ? -1 : 2);
        this.lifetime = isClear ? 1200 : 500;
        this.maxLifetime = this.lifetime;

        if (isClear) {
            const rainbowColors = [
                { r: 255, g: 100, b: 120 },
                { r: 255, g: 150, b: 80 },
                { r: 100, g: 200, b: 255 },
                { r: 100, g: 220, b: 140 },
                { r: 220, g: 100, b: 255 },
                { r: 255, g: 220, b: 80 },
                { r: 100, g: 255, b: 200 },
            ];
            this.color = rainbowColors[Math.floor(Math.random() * rainbowColors.length)];
        } else {
            this.color = color || { r: 200, g: 200, b: 200 };
        }
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.12;
        this.lifetime -= 16;
    }

    draw() {
        const alpha = Math.max(0, this.lifetime / this.maxLifetime);
        ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.85})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
        ctx.fill();
    }

    isDead() {
        return this.lifetime <= 0;
    }
}

// Start game
function startGame() {
    gameState.phase = 'play';
    gameState.score = 0;
    gameState.popped = 0;
    gameState.balloons = [];
    gameState.particles = [];
    gameState.nextSpawnTime = Date.now();
    gameState.gameStartTime = Date.now();
    startScreen.style.display = 'none';
    clearScreen.style.display = 'none';
    updateUI();
}

// Pop balloon
function popBalloon(balloon) {
    gameState.score += 10;
    gameState.popped += 1;

    for (let i = 0; i < 14; i++) {
        gameState.particles.push(new Particle(balloon.x, balloon.y, balloon.color, false));
    }

    updateUI();
    checkWin();
}

// Check win condition
function checkWin() {
    if (gameState.phase === 'play' && gameState.popped >= gameState.totalBalloons) {
        gameState.phase = 'clear';
        createClearParticles();
    }
}

// Create clear particles
function createClearParticles() {
    for (let i = 0; i < 90; i++) {
        gameState.particles.push(
            new Particle(
                Math.random() * canvas.width,
                canvas.height + 20,
                null,
                true
            )
        );
    }
}

// Update UI
function updateUI() {
    scoreValue.textContent = gameState.score;
    balloonCount.textContent = gameState.popped;

    if (gameState.phase === 'clear') {
        finalScore.textContent = `Score: ${gameState.score}`;
        clearScreen.style.display = 'flex';
    }
}

// Game loop
function gameLoop() {
    ctx.fillStyle = '#f5fafb';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = 'rgba(200, 225, 240, 0.15)';
    ctx.beginPath();
    ctx.arc(80, 120, 100, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(720, 480, 120, 0, Math.PI * 2);
    ctx.fill();

    if (gameState.phase === 'play') {
        const now = Date.now();
        if (now >= gameState.nextSpawnTime && gameState.popped < gameState.totalBalloons) {
            gameState.balloons.push(new Balloon());
            gameState.nextSpawnTime = now + gameState.spawnInterval;
        }

        gameState.balloons = gameState.balloons.filter(b => !b.isOffscreen());
        gameState.balloons.forEach(balloon => {
            balloon.update();
            balloon.draw();
        });

        const elapsed = Math.floor((Date.now() - gameState.gameStartTime) / 1000);
        ctx.fillStyle = '#aaa';
        ctx.font = '13px sans-serif';
        ctx.fillText(`Time: ${elapsed}s`, 20, canvas.height - 20);
    } else if (gameState.phase === 'clear') {
        ctx.fillStyle = 'rgba(0, 208, 132, 0.08)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        gameState.balloons.forEach(balloon => {
            const originalAlpha = ctx.globalAlpha;
            ctx.globalAlpha = 0.2;
            balloon.draw();
            ctx.globalAlpha = originalAlpha;
        });
    }

    gameState.particles = gameState.particles.filter(p => !p.isDead());
    gameState.particles.forEach(particle => {
        particle.update();
        particle.draw();
    });

    requestAnimationFrame(gameLoop);
}

// Event handlers
startBtn.addEventListener('click', startGame);

canvas.addEventListener('click', (e) => {
    if (gameState.phase === 'play') {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        for (let i = gameState.balloons.length - 1; i >= 0; i--) {
            if (gameState.balloons[i].isClicked(x, y)) {
                const balloon = gameState.balloons.splice(i, 1)[0];
                popBalloon(balloon);
                break;
            }
        }
    } else if (gameState.phase === 'clear') {
        startGame();
    }
});

// Event registration (P9 compliance: no double-fire)
canvas.addEventListener('mousedown', () => {
    // Registered per spec, no action (click event handles popping)
});

canvas.addEventListener('mousemove', () => {
    // Registered per spec, no action
});

canvas.addEventListener('mouseup', () => {
    // Registered per spec, no action
});

// Start loop
gameLoop();
</script>

</body>
</html>
