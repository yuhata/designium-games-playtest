<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バカパーティ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        #gameContainer {
            width: 375px;
            height: 812px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Initial Screen */
        #initialScreen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            color: white;
        }

        .gameTitle {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .rulesContainer {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            text-align: left;
            font-size: 13px;
            line-height: 1.8;
        }

        .ruleTitle {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .startButton {
            background: linear-gradient(135deg, #ff6b6b, #ff0000);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(255,0,0,0.3);
            transition: transform 0.2s;
        }

        .startButton:active {
            transform: scale(0.95);
        }

        /* Game Screen */
        #gameScreen {
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 20px;
            justify-content: space-between;
            color: white;
            position: relative;
            overflow: hidden;
        }

        #playerScores {
            display: flex;
            justify-content: space-around;
            gap: 5px;
        }

        .playerCard {
            text-align: center;
            flex: 1;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .playerFace {
            font-size: 28px;
            margin: 5px 0;
        }

        .playerScore {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }

        #roundInfo {
            text-align: center;
            margin: 15px 0;
        }

        .roundTitle {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .gameType {
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
        }

        #timerContainer {
            text-align: center;
        }

        #timer {
            font-size: 54px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            transition: color 0.3s;
        }

        #timer.warning {
            color: #ffff00;
            text-shadow: 0 0 10px #ffff00;
        }

        #timer.danger {
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            animation: pulse 0.5s infinite;
        }

        #timer.critical {
            animation: blink 0.3s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        #inputArea {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .inputInstruction {
            font-size: 16px;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        #tapTarget {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #ff6b6b, #ff0000);
            border-radius: 50%;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 10px 30px rgba(255,0,0,0.5);
            transition: transform 0.1s;
        }

        #tapTarget:active {
            transform: scale(0.95);
        }

        #tapTarget.success {
            animation: tapSuccess 0.5s;
        }

        @keyframes tapSuccess {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); box-shadow: 0 10px 30px rgba(0,255,0,0.8); }
            100% { transform: scale(1); }
        }

        #swipeArea {
            width: 100%;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }

        .swipeArrow {
            font-size: 60px;
            animation: swipePulse 0.8s infinite;
        }

        @keyframes swipePulse {
            0%, 100% { transform: translateX(0); opacity: 0.7; }
            50% { transform: translateX(20px); opacity: 1; }
        }

        #tiltContainer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        #tiltBall {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #0088ff);
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,136,255,0.5);
            perspective: 1000px;
            transition: transform 0.1s;
        }

        #missCounter {
            text-align: center;
            font-size: 16px;
        }

        .missX {
            display: inline-block;
            width: 28px;
            height: 28px;
            background: #ff0000;
            color: white;
            border-radius: 50%;
            line-height: 28px;
            margin: 0 4px;
            font-weight: bold;
            font-size: 14px;
        }

        .missO {
            display: inline-block;
            width: 28px;
            height: 28px;
            background: #666;
            color: white;
            border-radius: 50%;
            line-height: 28px;
            margin: 0 4px;
            font-weight: bold;
            font-size: 14px;
        }

        .shake {
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .scorePopup {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            pointer-events: none;
            animation: popupFloat 0.8s ease-out forwards;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes popupFloat {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(0, -60px) scale(1.5);
                opacity: 0;
            }
        }

        /* Result Screen */
        #resultScreen {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            position: relative;
        }

        #resultScreen.victory {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #333;
        }

        #resultScreen.defeat {
            background: linear-gradient(135deg, #333333 0%, #555555 100%);
            color: #fff;
        }

        .resultTitle {
            font-size: 50px;
            margin: 20px 0;
        }

        .resultMessage {
            font-size: 22px;
            margin: 15px 0 30px 0;
            font-weight: bold;
        }

        .finalScores {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin: 30px 0;
            gap: 8px;
        }

        .finalScore {
            flex: 1;
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .finalScore > div:first-child {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .finalScore > div:last-child {
            font-size: 24px;
            font-weight: bold;
        }

        .resultButton {
            background: white;
            color: #333;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 30px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .resultButton:active {
            transform: scale(0.95);
        }

        @keyframes fadeFlash {
            0% { opacity: 0.3; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="initialScreen">
            <div class="gameTitle">🎉 バカパーティ 🎉</div>
            <div class="rulesContainer">
                <div class="ruleTitle">【ゴール】</div>
                <div>9ラウンド全て成功して、全員で優勝しよう！</div>
                <div class="ruleTitle" style="margin-top: 15px;">【ルール】</div>
                <div>🎯 タップ・スワイプ・傾けの3つのモード</div>
                <div>⏱️ 各ラウンド30秒以内にクリア</div>
                <div>❌ ミス3回でゲームオーバー</div>
                <div>⭐ 全ラウンド成功で勝利！</div>
            </div>
            <button class="startButton">ゲーム開始</button>
        </div>

        <div id="gameScreen">
            <div id="playerScores"></div>
            <div id="roundInfo">
                <div class="roundTitle" id="roundDisplay">ラウンド 1/9</div>
                <div class="gameType" id="gameTypeDisplay">タップモード</div>
            </div>
            <div id="timerContainer">
                <div id="timer">30</div>
            </div>
            <div id="inputArea"></div>
            <div id="missCounter"></div>
        </div>

        <div id="resultScreen">
            <div class="resultTitle" id="resultEmoji">🎉</div>
            <div class="resultMessage" id="resultText">全員で優勝！</div>
            <div class="finalScores" id="finalScores"></div>
            <button class="resultButton" onclick="location.reload()">もう一度遊ぶ</button>
        </div>
    </div>

    <script>
        const gameState = {
            players: [
                { name: 'P1', face: '😎', score: 0 },
                { name: 'P2', face: '🤩', score: 0 },
                { name: 'P3', face: '😄', score: 0 },
                { name: 'P4', face: '🥳', score: 0 }
            ],
            round: 1,
            gameType: 0,
            gameTypes: ['タップモード', 'スワイプモード', '傾けモード'],
            timer: 30,
            missCount: 0,
            isRoundActive: false,
            timerInterval: null
        };

        const elements = {
            initialScreen: document.getElementById('initialScreen'),
            gameScreen: document.getElementById('gameScreen'),
            resultScreen: document.getElementById('resultScreen'),
            playerScores: document.getElementById('playerScores'),
            roundDisplay: document.getElementById('roundDisplay'),
            gameTypeDisplay: document.getElementById('gameTypeDisplay'),
            timer: document.getElementById('timer'),
            inputArea: document.getElementById('inputArea'),
            missCounter: document.getElementById('missCounter')
        };

        function updateUI() {
            elements.playerScores.innerHTML = gameState.players.map(p => `
                <div class="playerCard">
                    <div class="playerFace">${p.face}</div>
                    <div style="font-size: 10px;">${p.name}</div>
                    <div class="playerScore">${p.score}</div>
                </div>
            `).join('');

            elements.roundDisplay.textContent = `ラウンド ${gameState.round}/9`;
            elements.gameTypeDisplay.textContent = gameState.gameTypes[gameState.gameType];

            let missHTML = '';
            for (let i = 0; i < 3; i++) {
                missHTML += i < gameState.missCount ? '<span class="missX">✕</span>' : '<span class="missO">◯</span>';
            }
            elements.missCounter.innerHTML = `ミス: ${missHTML}`;
        }

        document.querySelector('.startButton').addEventListener('click', () => {
            gameState.round = 1;
            gameState.missCount = 0;
            gameState.players.forEach(p => p.score = 0);
            
            elements.initialScreen.style.display = 'none';
            elements.gameScreen.style.display = 'flex';
            elements.resultScreen.style.display = 'none';
            
            updateUI();
            startRound();
        });

        function startRound() {
            gameState.isRoundActive = true;
            gameState.timer = 30;
            gameState.gameType = (gameState.round - 1) % 3;
            updateUI();
            setupGameMode();
            startTimer();
        }

        function setupGameMode() {
            elements.inputArea.innerHTML = '';

            if (gameState.gameType === 0) {
                elements.inputArea.innerHTML = '<div class="inputInstruction">タップしよう！</div><div id="tapTarget">👆</div>';
                document.getElementById('tapTarget').addEventListener('click', handleTap);
            } else if (gameState.gameType === 1) {
                elements.inputArea.innerHTML = '<div class="inputInstruction">スワイプしよう！</div><div id="swipeArea"><div class="swipeArrow">👈</div></div>';
                setupSwipeDetection();
            } else {
                elements.inputArea.innerHTML = '<div class="inputInstruction">傾けよう！</div><div id="tiltContainer"><div id="tiltBall"></div><div style="font-size: 12px; opacity: 0.8;">傾きを合わせる</div></div>';
                setupTiltDetection();
            }
        }

        function handleTap() {
            if (!gameState.isRoundActive) return;
            addScore();
            const target = document.getElementById('tapTarget');
            target.classList.add('success');
            setTimeout(() => target.classList.remove('success'), 500);
        }

        function setupSwipeDetection() {
            let startX = 0;
            const area = document.getElementById('swipeArea');
            area.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            area.addEventListener('touchend', e => {
                if (Math.abs(e.changedTouches[0].clientX - startX) > 50) {
                    addScore();
                    area.style.background = 'rgba(0, 255, 0, 0.4)';
                    setTimeout(() => area.style.background = 'rgba(255,255,255,0.1)', 300);
                }
            });
        }

        function setupTiltDetection() {
            if (typeof DeviceOrientationEvent !== 'undefined') {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(perm => {
                        if (perm === 'granted') window.addEventListener('deviceorientation', handleTilt);
                    }).catch(() => window.addEventListener('deviceorientation', handleTilt));
                } else {
                    window.addEventListener('deviceorientation', handleTilt);
                }
            }
            
            function handleTilt(event) {
                if (!gameState.isRoundActive) return;
                const ball = document.getElementById('tiltBall');
                if (ball) {
                    ball.style.transform = `rotateX(${event.gamma * 0.3}deg) rotateY(${event.beta * 0.3}deg)`;
                    if (Math.abs(event.beta) < 25 && Math.abs(event.gamma) < 25) {
                        addScore();
                    }
                }
            }
        }

        function addScore() {
            const player = gameState.players[Math.floor(Math.random() * 4)];
            player.score++;

            const popup = document.createElement('div');
            popup.className = 'scorePopup';
            popup.textContent = '+1';
            popup.style.left = (Math.random() * 200 + 75) + 'px';
            popup.style.top = '400px';
            elements.gameScreen.appendChild(popup);
            setTimeout(() => popup.remove(), 800);

            updateUI();
            
            const totalScore = gameState.players.reduce((s, p) => s + p.score, 0);
            if (totalScore >= 36 && gameState.round === 9) {
                endGame(true);
            }
        }

        function miss() {
            gameState.missCount++;
            updateUI();
            elements.gameScreen.classList.add('shake');
            setTimeout(() => elements.gameScreen.classList.remove('shake'), 400);
            if (gameState.missCount >= 3) endGame(false);
        }

        function startTimer() {
            gameState.timerInterval = setInterval(() => {
                gameState.timer--;
                elements.timer.textContent = gameState.timer;

                if (gameState.timer <= 0) {
                    clearInterval(gameState.timerInterval);
                    endGame(false);
                } else if (gameState.timer <= 3) {
                    elements.timer.classList.add('critical');
                } else if (gameState.timer <= 5) {
                    elements.timer.classList.add('danger');
                    elements.timer.classList.remove('warning');
                } else if (gameState.timer <= 10) {
                    elements.timer.classList.add('warning');
                    elements.timer.classList.remove('danger');
                } else {
                    elements.timer.classList.remove('warning', 'danger', 'critical');
                }
            }, 1000);
        }

        function endGame(victory) {
            gameState.isRoundActive = false;
            clearInterval(gameState.timerInterval);
            
            elements.gameScreen.style.display = 'none';
            elements.resultScreen.style.display = 'flex';

            const totalScore = gameState.players.reduce((s, p) => s + p.score, 0);

            if (victory) {
                elements.resultScreen.className = 'victory';
                document.getElementById('resultEmoji').textContent = '🎉';
                document.getElementById('resultText').textContent = '全員で優勝！';
            } else {
                elements.resultScreen.className = 'defeat';
                document.getElementById('resultEmoji').textContent = '😅';
                document.getElementById('resultText').textContent = gameState.missCount >= 3 ? 'ゲームオーバー (ミス3回)' : 'ゲームオーバー (タイムアップ)';
            }

            document.getElementById('finalScores').innerHTML = gameState.players.map(p => `
                <div class="finalScore">
                    <div>${p.face}</div>
                    <div>${p.name}</div>
                    <div>${p.score}点</div>
                </div>
            `).join('');
        }

        // Auto-advance rounds
        const originalEndGame = endGame;
        endGame = function(victory) {
            if (victory && gameState.round < 9) {
                gameState.round++;
                setTimeout(() => {
                    elements.resultScreen.style.display = 'none';
                    elements.gameScreen.style.display = 'flex';
                    updateUI();
                    startRound();
                }, 1500);
            } else {
                originalEndGame(victory);
            }
        };

        updateUI();
    </script>
</body>
</html>
