<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTS MINI GAMES</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
        }
        #gameContainer {
            background: white;
            border: 2px solid black;
            position: relative;
            overflow: hidden;
        }
        #gameCanvas {
            display: block;
            background: #87ceeb;
        }
        #startScreen, #gameOverScreen, #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            font-size: 24px;
            z-index: 100;
            cursor: pointer;
        }
        #startScreen {
            display: flex;
        }
        .screen-content {
            text-align: center;
        }
        .screen-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .screen-content p {
            margin: 10px 0;
            font-size: 18px;
            line-height: 1.6;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: black;
            font-weight: bold;
            font-size: 14px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            padding: 8px 12px;
            border-radius: 4px;
            line-height: 1.5;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: black;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.8);
            padding: 6px 10px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="hud"></div>
        <div id="instructions">SPACE KEY or CLICK to confirm</div>
        
        <div id="startScreen">
            <div class="screen-content">
                <h1>SPORTS MINI</h1>
                <p style="font-size: 20px; margin-bottom: 30px;">3 Events Challenge</p>
                <p style="font-size: 16px;">Goal: Score 200+ points</p>
                <p style="font-size: 16px;">Goal: Reach target across all 3 events</p>
                <p style="margin-top: 30px; font-size: 14px;">Click to Start</p>
            </div>
        </div>
        
        <div id="gameOverScreen">
            <div class="screen-content">
                <h1>GAME OVER</h1>
                <p style="margin-top: 20px; font-size: 20px;" id="finalScore"></p>
                <p id="finalRank" style="font-size: 18px;"></p>
                <p style="margin-top: 30px; font-size: 14px;">Click to Retry</p>
            </div>
        </div>
        
        <div id="clearScreen">
            <div class="screen-content">
                <h1>CLEAR!</h1>
                <p style="margin-top: 20px; font-size: 20px;" id="clearScore"></p>
                <p id="clearRank" style="font-size: 18px;"></p>
                <p style="margin-top: 30px; font-size: 14px;">Click to Retry</p>
            </div>
        </div>
    </div>

    <script>
        const config = {
            title: 'SPORTS MINI',
            bg_color: '#87ceeb',
            ground_color: '#8fbc8f',
            meter_color: '#f6e05e',
            win_score: 200,
            events: 3
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 400;
        canvas.height = 600;

        const gameState = {
            currentEvent: 0,
            totalScore: 0,
            running: false,
            waiting: false,
            meterValue: 0,
            meterSpeed: 1,
            meterDirection: 1,
            eventScores: [0, 0, 0],
            resultPhaseTime: 0,
            animationId: null
        };

        const events = [
            {
                name: '走り幅跳び',
                speed: 1,
                draw: drawLongJump,
                score: calculateLongJumpScore
            },
            {
                name: '円盤投げ',
                speed: 2.5,
                draw: drawDiscus,
                score: calculateDiscusScore
            },
            {
                name: 'ハンマー投げ',
                speed: 4,
                draw: drawHammer,
                score: calculateHammerScore
            }
        ];

        function getRank(score) {
            if (score >= 270) return 'S';
            if (score >= 220) return 'A';
            if (score >= 170) return 'B';
            return 'C';
        }

        function getEvaluation(score) {
            if (score >= 90) return 'PERFECT';
            if (score >= 70) return 'GREAT';
            if (score >= 50) return 'GOOD';
            return 'OK';
        }

        function calculateLongJumpScore() {
            const centerDistance = Math.abs(gameState.meterValue - 50);
            return Math.max(0, 100 - centerDistance * 2);
        }

        function calculateDiscusScore() {
            return Math.max(0, Math.round(100 - (Math.abs(gameState.meterValue - 50) * 2)));
        }

        function calculateHammerScore() {
            return Math.max(0, Math.round(100 - (Math.abs(gameState.meterValue - 50) * 2)));
        }

        function drawLongJump() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = config.ground_color;
            ctx.fillRect(0, 350, canvas.width, 250);
            
            ctx.fillStyle = '#d2b48c';
            ctx.fillRect(50, 300, 300, 50);
            
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.strokeRect(50, 300, 300, 50);
            
            const barX = 50;
            const barY = 150;
            const barWidth = 300;
            const barHeight = 40;
            
            ctx.fillStyle = '#e0e0e0';
            ctx.fillRect(barX, barY, barWidth, barHeight);
            ctx.strokeStyle = '#333';
            ctx.strokeRect(barX, barY, barWidth, barHeight);
            
            ctx.fillStyle = '#f0f0f0';
            const centerSegment = (barWidth / 2 - 15);
            ctx.fillRect(barX + centerSegment, barY, 30, barHeight);
            
            ctx.fillStyle = config.meter_color;
            const meterX = barX + (gameState.meterValue / 100) * barWidth;
            ctx.fillRect(meterX - 5, barY - 10, 10, barHeight + 20);
            
            ctx.fillStyle = '#333';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('走り幅跳び', canvas.width / 2, 50);
            
            ctx.font = 'bold 24px Arial';
            const distance = (gameState.eventScores[gameState.currentEvent] / 10).toFixed(1);
            ctx.fillText(distance + ' m', canvas.width / 2, 420);
        }

        function drawDiscus() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = config.ground_color;
            ctx.fillRect(0, 350, canvas.width, 250);
            
            const centerX = canvas.width / 2;
            const centerY = 220;
            
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.6;
            for (let r = 40; r <= 180; r += 40) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.globalAlpha = 1.0;
            
            const angle = (gameState.meterValue / 100) * Math.PI - Math.PI / 2;
            ctx.strokeStyle = '#ff4444';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(
                centerX + Math.cos(angle) * 160,
                centerY + Math.sin(angle) * 160
            );
            ctx.stroke();
            
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(centerX + Math.cos(angle) * 160, centerY + Math.sin(angle) * 160, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#333';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('円盤投げ', canvas.width / 2, 50);
            
            ctx.font = 'bold 24px Arial';
            ctx.fillText(gameState.eventScores[gameState.currentEvent] + ' m', canvas.width / 2, 420);
        }

        function drawHammer() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = config.ground_color;
            ctx.fillRect(0, 350, canvas.width, 250);
            
            const centerX = canvas.width / 2;
            const centerY = 200;
            const radius = 70;
            
            ctx.strokeStyle = '#cccccc';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            
            const rotation = (gameState.meterValue / 100) * Math.PI * 2;
            const hammerX = centerX + Math.cos(rotation) * radius;
            const hammerY = centerY + Math.sin(rotation) * radius;
            
            ctx.strokeStyle = config.meter_color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(hammerX, hammerY);
            ctx.stroke();
            
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.arc(hammerX, hammerY, 10, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#666';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#333';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('ハンマー投げ', canvas.width / 2, 50);
            
            ctx.font = 'bold 24px Arial';
            ctx.fillText(gameState.eventScores[gameState.currentEvent] + ' pt', canvas.width / 2, 420);
        }

        function updateHUD() {
            const hud = document.getElementById('hud');
            const eventNum = gameState.currentEvent + 1;
            hud.innerHTML = `Event: ${eventNum}/${config.events}<br>${events[gameState.currentEvent].name}<br>Total: ${gameState.totalScore}/${config.win_score}`;
        }

        function gameLoop() {
            if (!gameState.running) return;
            
            if (gameState.waiting && gameState.resultPhaseTime > 0) {
                gameState.resultPhaseTime -= 16;
                
                const event = events[gameState.currentEvent];
                event.draw();
                
                const score = gameState.eventScores[gameState.currentEvent];
                const evaluation = getEvaluation(score);
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(event.name, canvas.width / 2, canvas.height / 2 - 50);
                
                ctx.font = 'bold 56px Arial';
                ctx.fillText(score + ' 点', canvas.width / 2, canvas.height / 2 + 30);
                
                ctx.font = 'bold 28px Arial';
                ctx.fillText(evaluation, canvas.width / 2, canvas.height / 2 + 80);
                
                if (gameState.resultPhaseTime <= 0) {
                    gameState.waiting = false;
                    gameState.currentEvent++;
                    
                    if (gameState.currentEvent >= config.events) {
                        endGame();
                        return;
                    }
                    
                    gameState.meterSpeed = events[gameState.currentEvent].speed;
                    gameState.meterValue = 0;
                    gameState.meterDirection = 1;
                }
            } else if (!gameState.waiting) {
                gameState.meterValue += gameState.meterSpeed * gameState.meterDirection;
                
                if (gameState.meterValue >= 100) {
                    gameState.meterValue = 100;
                    gameState.meterDirection = -1;
                } else if (gameState.meterValue <= 0) {
                    gameState.meterValue = 0;
                    gameState.meterDirection = 1;
                }
                
                const event = events[gameState.currentEvent];
                event.draw();
            }
            
            updateHUD();
            gameState.animationId = requestAnimationFrame(gameLoop);
        }

        function confirmMeter() {
            if (gameState.waiting || !gameState.running) return;
            
            const event = events[gameState.currentEvent];
            const score = Math.round(event.score());
            gameState.eventScores[gameState.currentEvent] = score;
            gameState.totalScore += score;
            
            gameState.waiting = true;
            gameState.resultPhaseTime = 2000;
        }

        function endGame() {
            gameState.running = false;
            const totalScore = gameState.totalScore;
            const rank = getRank(totalScore);
            
            if (totalScore >= config.win_score) {
                document.getElementById('clearScore').textContent = `Score: ${totalScore} points`;
                document.getElementById('clearRank').textContent = `Rank: ${rank}`;
                document.getElementById('clearScreen').style.display = 'flex';
            } else {
                document.getElementById('finalScore').textContent = `Score: ${totalScore} points`;
                document.getElementById('finalRank').textContent = `Rank: ${rank}`;
                document.getElementById('gameOverScreen').style.display = 'flex';
            }
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            
            gameState.currentEvent = 0;
            gameState.totalScore = 0;
            gameState.running = true;
            gameState.waiting = false;
            gameState.meterValue = 0;
            gameState.meterDirection = 1;
            gameState.eventScores = [0, 0, 0];
            gameState.resultPhaseTime = 0;
            
            gameState.meterSpeed = events[gameState.currentEvent].speed;
            updateHUD();
            gameLoop();
        }

        function retryGame() {
            if (gameState.animationId) {
                cancelAnimationFrame(gameState.animationId);
            }
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }

        document.getElementById('startScreen').addEventListener('click', startGame);
        document.getElementById('gameOverScreen').addEventListener('click', retryGame);
        document.getElementById('clearScreen').addEventListener('click', retryGame);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState.running && !gameState.waiting) {
                    confirmMeter();
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (gameState.running && !gameState.waiting) {
                confirmMeter();
            }
        });
    </script>
</body>
</html>
