<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTS MINI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
        }
        #gameContainer { position: relative; }
        canvas { display: block; border: 2px solid #000; background: white; }
        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            color: white;
            text-align: center;
            font-size: 24px;
        }
        #startScreen { z-index: 10; }
        #clearScreen { display: none; z-index: 11; }
        #gameOverScreen { display: none; z-index: 11; }
        .screen h1 { font-size: 48px; margin-bottom: 30px; }
        .screen p { font-size: 18px; margin: 10px 0; }
        .screen button {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .screen button:hover { background: #45a049; }
        .rank { font-size: 36px; font-weight: bold; margin: 20px 0; }
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 14px;
            z-index: 5;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        .control-hint {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="startScreen" class="screen" style="display: flex;">
            <h1>SPORTS MINI</h1>
            <p>3つの競技でスコアを競おう</p>
            <div style="margin-top: 20px; font-size: 16px; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 8px;">
                <p>目標スコア: <span id="targetScore">200</span> 点以上</p>
                <p style="margin-top: 10px; font-size: 14px;">ランク: S(270+) A(220+) B(170+) C</p>
            </div>
            <button onclick="startGame()">スタート</button>
        </div>
        <div id="clearScreen" class="screen">
            <h1>CLEAR</h1>
            <div class="rank" id="rankDisplay">S</div>
            <p>スコア: <span id="clearScore">0</span></p>
            <button onclick="retryGame()">リトライ</button>
        </div>
        <div id="gameOverScreen" class="screen">
            <h1>GAME OVER</h1>
            <p>スコア: <span id="gameOverScore">0</span></p>
            <p>目標: <span id="gameOverTarget">200</span> 点</p>
            <button onclick="retryGame()">リトライ</button>
        </div>
        <div class="hud" id="hud"></div>
        <div class="control-hint">スペースキー または クリック で確定</div>
    </div>

    <script>
        const config = {
            title: 'SPORTS MINI',
            bg_color: '#87ceeb',
            ground_color: '#8fbc8f',
            meter_color: '#f6e05e',
            win_score: 200,
            events: 3
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400;
        canvas.height = 600;

        const gameState = {
            running: false,
            currentEvent: 0,
            totalScore: 0,
            eventScores: [0, 0, 0],
            meterValue: 0,
            meterSpeed: 1,
            meterDirection: 1,
            waiting: false
        };

        const events = [
            { name: '走り幅跳び', speed: 1 },
            { name: '円盤投げ', speed: 2.5 },
            { name: 'ハンマー投げ', speed: 4 }
        ];

        document.getElementById('targetScore').textContent = config.win_score;
        document.getElementById('gameOverTarget').textContent = config.win_score;

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState.running = true;
            gameState.currentEvent = 0;
            gameState.totalScore = 0;
            gameState.eventScores = [0, 0, 0];
            gameState.meterValue = 0;
            gameState.meterSpeed = events[0].speed;
            gameState.waiting = false;
            gameLoop();
        }

        function calculateScore(meterValue) {
            const centerDistance = Math.abs(meterValue - 50);
            return Math.max(0, Math.round(100 - (centerDistance * 2)));
        }

        function drawEvent_0() {
            const groundY = 450;
            ctx.fillStyle = config.ground_color;
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 2;
            for (let i = 0; i < 10; i++) {
                const y = groundY + (i * 15);
                ctx.beginPath();
                ctx.moveTo(50, y);
                ctx.lineTo(canvas.width - 50, y);
                ctx.stroke();
            }

            const barWidth = 300;
            const barX = (canvas.width - barWidth) / 2;
            const barY = 100;
            const barHeight = 40;

            ctx.fillStyle = '#e0e0e0';
            ctx.fillRect(barX, barY, barWidth, barHeight);

            const meterX = barX + (gameState.meterValue / 100) * barWidth;
            ctx.fillStyle = config.meter_color;
            ctx.fillRect(meterX - 5, barY - 10, 10, barHeight + 20);

            const distance = (gameState.meterValue / 100) * 15;
            ctx.fillStyle = '#000';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(distance.toFixed(1) + ' m', canvas.width / 2, barY - 20);

            ctx.font = 'bold 24px Arial';
            ctx.fillText('走り幅跳び', canvas.width / 2, 50);
        }

        function drawEvent_1() {
            const centerX = canvas.width / 2;
            const centerY = 250;
            const radius = 120;

            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = config.ground_color;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();

            const angle = (gameState.meterValue / 100) * Math.PI * 2;
            ctx.strokeStyle = config.meter_color;
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(
                centerX + Math.cos(angle - Math.PI / 2) * radius,
                centerY + Math.sin(angle - Math.PI / 2) * radius
            );
            ctx.stroke();

            ctx.fillStyle = '#333';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('円盤投げ', canvas.width / 2, 50);

            ctx.font = 'bold 18px Arial';
            ctx.fillText('角度: ' + Math.round(angle * 180 / Math.PI) + '°', canvas.width / 2, canvas.height - 30);
        }

        function drawEvent_2() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = 300;
            const baseRadius = 30;
            const orbitRadius = 80 + (gameState.meterValue / 100) * 40;

            ctx.strokeStyle = config.ground_color;
            ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2 + (gameState.meterValue / 100) * Math.PI * 2;
                const x = centerX + Math.cos(angle) * orbitRadius;
                const y = centerY + Math.sin(angle) * orbitRadius;
                const nextAngle = ((i + 1) / 8) * Math.PI * 2 + (gameState.meterValue / 100) * Math.PI * 2;
                const nextX = centerX + Math.cos(nextAngle) * orbitRadius;
                const nextY = centerY + Math.sin(nextAngle) * orbitRadius;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(nextX, nextY);
                ctx.stroke();
            }

            ctx.fillStyle = '#8b4513';
            ctx.beginPath();
            ctx.arc(centerX, centerY, baseRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#333';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('ハンマー投げ', canvas.width / 2, 50);

            ctx.font = 'bold 18px Arial';
            ctx.fillText('パワー: ' + gameState.meterValue.toFixed(0) + '%', canvas.width / 2, canvas.height - 30);
        }

        function drawMeter() {
            const meterY = 520;
            const meterWidth = 300;
            const meterX = (canvas.width - meterWidth) / 2;

            ctx.fillStyle = '#ddd';
            ctx.fillRect(meterX, meterY, meterWidth, 30);

            const needleX = meterX + (gameState.meterValue / 100) * meterWidth;
            ctx.fillStyle = config.meter_color;
            ctx.fillRect(needleX - 3, meterY - 5, 6, 40);

            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1;
            ctx.strokeRect(meterX, meterY, meterWidth, 30);

            ctx.fillStyle = '#000';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('0', meterX, meterY + 50);
            ctx.fillText('50', meterX + meterWidth / 2, meterY + 50);
            ctx.fillText('100', meterX + meterWidth, meterY + 50);
        }

        function updateMeter() {
            gameState.meterValue += gameState.meterSpeed * gameState.meterDirection;
            if (gameState.meterValue >= 100) {
                gameState.meterValue = 100;
                gameState.meterDirection = -1;
            } else if (gameState.meterValue <= 0) {
                gameState.meterValue = 0;
                gameState.meterDirection = 1;
            }
        }

        function confirmMeter() {
            if (gameState.waiting) return;
            gameState.waiting = true;

            const score = calculateScore(gameState.meterValue);
            gameState.eventScores[gameState.currentEvent] = score;
            gameState.totalScore += score;

            setTimeout(() => {
                gameState.currentEvent++;
                if (gameState.currentEvent >= config.events) {
                    endGame();
                } else {
                    gameState.meterValue = 0;
                    gameState.meterDirection = 1;
                    gameState.meterSpeed = events[gameState.currentEvent].speed;
                    gameState.waiting = false;
                }
            }, 500);
        }

        function endGame() {
            gameState.running = false;
            const score = gameState.totalScore;
            let rank = 'C';
            if (score >= 270) rank = 'S';
            else if (score >= 220) rank = 'A';
            else if (score >= 170) rank = 'B';

            if (score >= config.win_score) {
                document.getElementById('clearScore').textContent = score;
                document.getElementById('rankDisplay').textContent = rank;
                document.getElementById('clearScreen').style.display = 'flex';
            } else {
                document.getElementById('gameOverScore').textContent = score;
                document.getElementById('gameOverScreen').style.display = 'flex';
            }
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }

        function updateHUD() {
            const remaining = config.win_score - gameState.totalScore;
            const eventName = events[gameState.currentEvent].name;
            let hudText = `競技 ${gameState.currentEvent + 1}/3<br>`;
            hudText += `${eventName}<br>`;
            hudText += `合計: ${gameState.totalScore}/${config.win_score}`;
            document.getElementById('hud').innerHTML = hudText;
        }

        function gameLoop() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState.running) {
                updateMeter();

                if (gameState.currentEvent === 0) drawEvent_0();
                else if (gameState.currentEvent === 1) drawEvent_1();
                else if (gameState.currentEvent === 2) drawEvent_2();

                drawMeter();
                updateHUD();
                requestAnimationFrame(gameLoop);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameState.running) {
                e.preventDefault();
                confirmMeter();
            }
        });

        canvas.addEventListener('click', () => {
            if (gameState.running) {
                confirmMeter();
            }
        });
    </script>
</body>
</html>
