<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROW.IO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            border: 2px solid #444;
        }
        
        canvas {
            display: block;
        }
        
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
        }
        
        .screen h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .screen p {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .screen button {
            padding: 12px 40px;
            font-size: 20px;
            background-color: #58a6ff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .screen button:hover {
            background-color: #79c0ff;
        }
        
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #58a6ff;
            font-size: 14px;
            font-weight: bold;
            z-index: 5;
        }
        
        .controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #888;
            font-size: 12px;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="startScreen" class="screen">
            <h1 id="startTitle">GROW.IO</h1>
            <p id="startDescription">サイズ80まで成長せよ!<br>マウスで移動</p>
            <button onclick="startGame()">START</button>
        </div>
        
        <div id="clearScreen" class="screen" style="display: none;">
            <h1>CLEAR!</h1>
            <p>おめでとう!</p>
            <button onclick="restartGame()">RETRY</button>
        </div>
        
        <div id="gameOverScreen" class="screen" style="display: none;">
            <h1>GAME OVER</h1>
            <p>大きい敵に食べられた...</p>
            <button onclick="restartGame()">RETRY</button>
        </div>
        
        <div class="hud">
            <div id="sizeDisplay">サイズ: 15 / 80</div>
        </div>
        
        <div class="controls">
            マウスで移動
        </div>
    </div>
    
    <script>
        // Parameter Schema
        // theme:                string  // param generation input only
        // title:                string  // config.title
        // bg_color:             string  // config.bg_color
        // player_color:         string  // config.player_color
        // orb_color:            string  // config.orb_color
        // enemy_color:          string  // config.enemy_color
        // player_start_radius:  int     // default: 15
        // win_radius:           int     // default: 80
        // orb_count:            int     // default: 25
        // enemy_count:          int     // default: 4
        // player_speed:         int     // default: 3
        
        const config = {
            title: 'GROW.IO',
            bg_color: '#0d1117',
            player_color: '#58a6ff',
            orb_color: '#3fb950',
            enemy_color: '#f78166',
            player_start_radius: 15,
            win_radius: 80,
            orb_count: 25,
            enemy_count: 4,
            player_speed: 3,
            canvas_width: 800,
            canvas_height: 600
        };
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = config.canvas_width;
        canvas.height = config.canvas_height;
        document.getElementById('gameContainer').style.width = canvas.width + 'px';
        document.getElementById('gameContainer').style.height = canvas.height + 'px';
        
        document.body.style.background = config.bg_color;
        document.getElementById('startTitle').textContent = config.title;
        document.getElementById('startDescription').innerHTML = 'サイズ' + config.win_radius + 'まで成長せよ!<br>マウスで移動';
        
        const gameState = {
            running: false,
            player: {
                x: canvas.width / 2,
                y: canvas.height / 2,
                radius: config.player_start_radius,
                vx: 0,
                vy: 0
            },
            orbs: [],
            enemies: [],
            mouseX: canvas.width / 2,
            mouseY: canvas.height / 2
        };
        
        function createOrb() {
            const radius = Math.random() * 8 + 4;
            const margin = radius + 20;
            return {
                x: Math.random() * (canvas.width - margin * 2) + margin,
                y: Math.random() * (canvas.height - margin * 2) + margin,
                radius: radius
            };
        }
        
        function createEnemy() {
            const radius = Math.random() * 20 + 10;
            const margin = radius + 20;
            return {
                x: Math.random() * (canvas.width - margin * 2) + margin,
                y: Math.random() * (canvas.height - margin * 2) + margin,
                radius: radius,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                directionChangeTimer: 0
            };
        }
        
        function initializeGame() {
            gameState.player.x = canvas.width / 2;
            gameState.player.y = canvas.height / 2;
            gameState.player.radius = config.player_start_radius;
            gameState.player.vx = 0;
            gameState.player.vy = 0;
            gameState.orbs = [];
            gameState.enemies = [];
            
            for (let i = 0; i < config.orb_count; i++) {
                gameState.orbs.push(createOrb());
            }
            
            for (let i = 0; i < config.enemy_count; i++) {
                gameState.enemies.push(createEnemy());
            }
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            initializeGame();
            gameState.running = true;
            gameLoop();
        }
        
        function restartGame() {
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
        }
        
        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            gameState.mouseX = e.clientX - rect.left;
            gameState.mouseY = e.clientY - rect.top;
        });
        
        function updatePlayer() {
            const dx = gameState.mouseX - gameState.player.x;
            const dy = gameState.mouseY - gameState.player.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance > 0) {
                gameState.player.vx = (dx / distance) * config.player_speed;
                gameState.player.vy = (dy / distance) * config.player_speed;
            }
            
            gameState.player.x += gameState.player.vx;
            gameState.player.y += gameState.player.vy;
            
            // Keep player in bounds
            gameState.player.x = Math.max(gameState.player.radius, Math.min(canvas.width - gameState.player.radius, gameState.player.x));
            gameState.player.y = Math.max(gameState.player.radius, Math.min(canvas.height - gameState.player.radius, gameState.player.y));
        }
        
        function updateOrbs() {
            for (let i = gameState.orbs.length - 1; i >= 0; i--) {
                const orb = gameState.orbs[i];
                const dx = orb.x - gameState.player.x;
                const dy = orb.y - gameState.player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < gameState.player.radius + orb.radius) {
                    const orbArea = Math.PI * orb.radius * orb.radius;
                    const playerArea = Math.PI * gameState.player.radius * gameState.player.radius;
                    gameState.player.radius = Math.sqrt((playerArea + orbArea) / Math.PI);
                    gameState.orbs.splice(i, 1);
                    gameState.orbs.push(createOrb());
                }
            }
        }
        
        function updateEnemies() {
            for (let i = 0; i < gameState.enemies.length; i++) {
                const enemy = gameState.enemies[i];
                
                enemy.directionChangeTimer--;
                if (enemy.directionChangeTimer <= 0) {
                    enemy.vx += (Math.random() - 0.5) * 0.5;
                    enemy.vy += (Math.random() - 0.5) * 0.5;
                    enemy.directionChangeTimer = Math.random() * 60 + 30;
                }
                
                enemy.x += enemy.vx;
                enemy.y += enemy.vy;
                
                // Keep enemy in bounds
                if (enemy.x - enemy.radius < 0 || enemy.x + enemy.radius > canvas.width) {
                    enemy.vx *= -1;
                    enemy.x = Math.max(enemy.radius, Math.min(canvas.width - enemy.radius, enemy.x));
                }
                if (enemy.y - enemy.radius < 0 || enemy.y + enemy.radius > canvas.height) {
                    enemy.vy *= -1;
                    enemy.y = Math.max(enemy.radius, Math.min(canvas.height - enemy.radius, enemy.y));
                }
            }
        }
        
        function checkCollisions() {
            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                const enemy = gameState.enemies[i];
                const dx = enemy.x - gameState.player.x;
                const dy = enemy.y - gameState.player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < gameState.player.radius + enemy.radius) {
                    if (gameState.player.radius > enemy.radius) {
                        const enemyArea = Math.PI * enemy.radius * enemy.radius;
                        const playerArea = Math.PI * gameState.player.radius * gameState.player.radius;
                        gameState.player.radius = Math.sqrt((playerArea + enemyArea) / Math.PI);
                        gameState.enemies.splice(i, 1);
                        gameState.enemies.push(createEnemy());
                    } else {
                        gameState.running = false;
                        document.getElementById('gameOverScreen').style.display = 'flex';
                        return;
                    }
                }
            }
        }
        
        function updateHUD() {
            document.getElementById('sizeDisplay').textContent = 'サイズ: ' + Math.floor(gameState.player.radius) + ' / ' + config.win_radius;
        }
        
        function draw() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw orbs
            ctx.fillStyle = config.orb_color;
            for (let orb of gameState.orbs) {
                ctx.beginPath();
                ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw enemies
            ctx.fillStyle = config.enemy_color;
            for (let enemy of gameState.enemies) {
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw player
            ctx.fillStyle = config.player_color;
            ctx.beginPath();
            ctx.arc(gameState.player.x, gameState.player.y, gameState.player.radius, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function gameLoop() {
            if (!gameState.running) {
                return;
            }
            
            updatePlayer();
            updateOrbs();
            updateEnemies();
            checkCollisions();
            
            if (gameState.player.radius >= config.win_radius) {
                gameState.running = false;
                document.getElementById('clearScreen').style.display = 'flex';
                return;
            }
            
            updateHUD();
            draw();
            
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
