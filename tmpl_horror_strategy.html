<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror Base Defense</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #000;
        }
        
        #gameContainer {
            position: relative;
            border: 3px solid #888;
        }
        
        canvas {
            display: block;
        }
        
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            z-index: 100;
        }
        
        .screen.active {
            display: flex;
        }
        
        .screen h1 {
            font-size: 3.5em;
            margin: 0 0 20px 0;
            text-shadow: 0 0 20px #ff0000;
            color: #ff3333;
        }
        
        .screen p {
            font-size: 1.1em;
            margin: 8px 0;
            text-align: center;
            line-height: 1.6;
            max-width: 90%;
        }
        
        .screen button {
            padding: 12px 35px;
            font-size: 1.1em;
            background: #ff4444;
            color: #fff;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .screen button:hover {
            background: #ff6666;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="startScreen" class="screen active">
            <h1>HORROR BASE</h1>
            <p>ゾンビの侵攻から拠点を守り抜け！</p>
            <p id="startInstructions"></p>
            <button onclick="startGame()">START</button>
        </div>
        
        <div id="gameOverScreen" class="screen">
            <h1>GAME OVER</h1>
            <p>全ての生存者が倒れてしまった...</p>
            <button onclick="retryGame()">RETRY</button>
        </div>
        
        <div id="clearScreen" class="screen">
            <h1>VICTORY!</h1>
            <p id="clearMessage"></p>
            <button onclick="retryGame()">RETRY</button>
        </div>
    </div>

    <script>
        const config = {
            title: 'HORROR BASE',
            bg_color: '#0a0a0a',
            day_color: '#2d3748',
            night_color: '#1a0000',
            survivor_color: '#68d391',
            zombie_color: '#48bb78',
            fort_color: '#8b4513',
            survivor_count: 3,
            win_days: 7,
            zombie_per_night: 5
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 480;
        canvas.height = 520;
        document.getElementById('gameContainer').style.width = canvas.width + 'px';
        document.getElementById('gameContainer').style.height = canvas.height + 'px';

        const gameState = {
            running: false,
            phase: 'day',
            phaseTime: 15,
            maxPhaseTime: 15,
            day: 0,
            wood: 20,
            survivors: [],
            zombies: [],
            forts: [],
            resources: [],
            selectedSurvivor: null,
            buildingFort: false
        };

        class Survivor {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.hp = 30;
                this.maxHp = 30;
                this.atk = 3;
                this.radius = 8;
                this.selected = false;
            }

            update() {
                for (let zombie of gameState.zombies) {
                    const dx = this.x - zombie.x;
                    const dy = this.y - zombie.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < this.radius + zombie.radius) {
                        this.hp -= zombie.atk * 0.016;
                        zombie.hp -= this.atk * 0.016;
                    }
                }
                if (this.hp <= 0) this.hp = 0;
            }

            draw() {
                ctx.fillStyle = config.survivor_color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                if (this.selected) {
                    ctx.strokeStyle = '#ffff00';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 4, 0, Math.PI * 2);
                    ctx.stroke();
                }

                ctx.fillStyle = '#ff0000';
                ctx.fillRect(this.x - 10, this.y - 18, 20 * (this.hp / this.maxHp), 2);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(this.x - 10, this.y - 18, 20, 2);
            }
        }

        class Zombie {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.hp = 20;
                this.maxHp = 20;
                this.atk = 5;
                this.radius = 7;
                this.speed = 0.5;
            }

            update() {
                const targetX = 240;
                const targetY = 180;
                const dx = targetX - this.x;
                const dy = targetY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }

                for (let fort of gameState.forts) {
                    const fx = this.x - fort.x;
                    const fy = this.y - fort.y;
                    const fd = Math.sqrt(fx * fx + fy * fy);
                    if (fd < this.radius + fort.radius) {
                        fort.hp -= this.atk * 0.016;
                        this.hp -= 1 * 0.016;
                    }
                }
            }

            draw() {
                ctx.fillStyle = config.zombie_color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ff0000';
                ctx.fillRect(this.x - 10, this.y - 16, 20 * (this.hp / this.maxHp), 2);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(this.x - 10, this.y - 16, 20, 2);
            }
        }

        class Fort {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.hp = 30;
                this.maxHp = 30;
                this.radius = 12;
            }

            draw() {
                ctx.fillStyle = config.fort_color;
                ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);

                ctx.fillStyle = '#00aa00';
                ctx.fillRect(this.x - 12, this.y - 24, 24 * (this.hp / this.maxHp), 2);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(this.x - 12, this.y - 24, 24, 2);
            }
        }

        class Resource {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 6;
            }

            draw() {
                ctx.fillStyle = '#8b6f47';
                ctx.fillRect(this.x - 6, this.y - 6, 12, 12);
                ctx.strokeStyle = '#d4af37';
                ctx.lineWidth = 1;
                ctx.strokeRect(this.x - 6, this.y - 6, 12, 12);
            }
        }

        function initGame() {
            gameState.day = 0;
            gameState.wood = 20;
            gameState.phase = 'day';
            gameState.phaseTime = 15;
            gameState.survivors = [];
            gameState.zombies = [];
            gameState.forts = [];
            gameState.resources = [];
            gameState.selectedSurvivor = null;
            gameState.buildingFort = false;
            gameState.running = true;

            for (let i = 0; i < config.survivor_count; i++) {
                gameState.survivors.push(new Survivor(240 + (i - 1) * 35, 180));
            }

            gameState.resources = [
                new Resource(80, 80),
                new Resource(400, 80),
                new Resource(80, 280),
                new Resource(400, 280),
                new Resource(240, 180)
            ];
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            initGame();
            gameLoop();
        }

        function gameLoop() {
            if (!gameState.running) return;

            gameState.phaseTime -= 0.016;

            if (gameState.phaseTime <= 0) {
                if (gameState.phase === 'day') {
                    gameState.phase = 'night';
                    gameState.phaseTime = 15;
                    for (let i = 0; i < config.zombie_per_night; i++) {
                        const angle = (i / config.zombie_per_night) * Math.PI * 2;
                        const x = 240 + Math.cos(angle) * 200;
                        const y = 180 + Math.sin(angle) * 200;
                        gameState.zombies.push(new Zombie(x, y));
                    }
                } else {
                    gameState.phase = 'day';
                    gameState.phaseTime = 15;
                    gameState.day++;
                    gameState.zombies = [];
                }
            }

            gameState.survivors.forEach(s => s.update());
            gameState.zombies = gameState.zombies.filter(z => {
                z.update();
                return z.hp > 0;
            });
            gameState.forts = gameState.forts.filter(f => f.hp > 0);

            if (gameState.day > config.win_days && gameState.phase === 'day') {
                gameState.running = false;
                document.getElementById('clearMessage').textContent = 'Game Win - ' + gameState.day + ' days survived!';
                document.getElementById('clearScreen').style.display = 'flex';
                return;
            }

            const aliveCount = gameState.survivors.filter(s => s.hp > 0).length;
            if (aliveCount === 0) {
                gameState.running = false;
                document.getElementById('gameOverScreen').style.display = 'flex';
                return;
            }

            const bgColor = gameState.phase === 'day' ? config.day_color : config.night_color;
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, 480, 360);

            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 0.5;
            for (let x = 0; x < 480; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, 360);
                ctx.stroke();
            }
            for (let y = 0; y < 360; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(480, y);
                ctx.stroke();
            }

            gameState.resources.forEach(r => r.draw());
            gameState.forts.forEach(f => f.draw());
            gameState.survivors.forEach(s => s.draw());
            gameState.zombies.forEach(z => z.draw());

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 360, 480, 160);
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            ctx.strokeRect(0, 360, 480, 160);

            ctx.fillStyle = '#fff';
            ctx.font = '13px Arial';
            const timeStr = gameState.phaseTime.toFixed(1);
            ctx.fillText('Day: ' + gameState.day + ' / ' + config.win_days, 10, 378);
            ctx.fillText('Survivors: ' + aliveCount + ' / ' + config.survivor_count, 10, 396);
            ctx.fillText('Wood: ' + Math.floor(gameState.wood), 10, 414);
            ctx.fillText('Phase: ' + (gameState.phase === 'day' ? 'DAY' : 'NIGHT') + ' (' + timeStr + 's)', 10, 432);
            ctx.fillText('Zombies: ' + gameState.zombies.length, 10, 450);
            ctx.fillText('[Click survivor] [Click resource] [Press FORT to build] Cost:10 Wood', 10, 482);
            ctx.fillText('Defend ' + config.win_days + ' nights to win!', 10, 500);

            if (gameState.phase === 'day' && gameState.buildingFort) {
                ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
                ctx.font = 'bold 16px Arial';
                ctx.fillText('Click map to place FORT', 150, 200);
            }

            if (gameState.phase === 'day') {
                const canBuild = gameState.wood >= 10;
                ctx.fillStyle = canBuild ? '#00aa00' : '#666666';
                ctx.fillRect(340, 410, 130, 35);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('FORT (10)', 405, 432);
                ctx.textAlign = 'left';
            }

            requestAnimationFrame(gameLoop);
        }

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }

        canvas.addEventListener('click', (e) => {
            if (!gameState.running) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (y > 360) {
                if (gameState.phase === 'day' && x > 340 && x < 470 && y > 410 && y < 445) {
                    if (gameState.wood >= 10) {
                        gameState.buildingFort = !gameState.buildingFort;
                    }
                }
                return;
            }

            if (gameState.buildingFort) {
                gameState.wood -= 10;
                gameState.forts.push(new Fort(x, y));
                gameState.buildingFort = false;
                return;
            }

            let clicked = false;
            for (let survivor of gameState.survivors) {
                const dx = x - survivor.x;
                const dy = y - survivor.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < survivor.radius + 6) {
                    gameState.selectedSurvivor = gameState.selectedSurvivor === survivor ? null : survivor;
                    gameState.survivors.forEach(s => s.selected = (s === gameState.selectedSurvivor));
                    clicked = true;
                    break;
                }
            }

            if (!clicked && gameState.selectedSurvivor && gameState.phase === 'day') {
                for (let resource of gameState.resources) {
                    const dx = x - resource.x;
                    const dy = y - resource.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < resource.radius + 8) {
                        gameState.selectedSurvivor.x = resource.x;
                        gameState.selectedSurvivor.y = resource.y;
                        setTimeout(() => {
                            gameState.wood += 5;
                        }, 3000);
                        break;
                    }
                }
            }
        });

        document.getElementById('startInstructions').textContent = 'Select survivors, gather wood during DAY\nDefend against zombies at NIGHT\nSurvive ' + config.win_days + ' nights to win!';
    </script>
</body>
</html>
