<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HORROR BASE - Defense Strategy</title>
    <!--
        theme:              defense_horror
        title:              HORROR BASE
        bg_color:           #0a0a0a
        day_color:          #2d3748
        night_color:        #1a0000
        survivor_color:     #68d391
        zombie_color:       #48bb78
        fort_color:         #8b4513
        survivor_count:     3
        win_days:           7
        zombie_per_night:   5
        init_wood:          20
    -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        #gameContainer {
            border: 2px solid #666;
            position: relative;
        }
        
        canvas {
            display: block;
        }
        
        .screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            text-align: center;
        }
        
        #startScreen {
            display: flex;
        }
        
        .screen h1 {
            font-size: 4rem;
            margin-bottom: 30px;
            color: #ff4444;
            text-shadow: 0 0 20px #ff0000;
        }
        
        .screen h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #68d391;
        }
        
        .screen p {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #aaa;
            max-width: 600px;
        }
        
        .objectives {
            background: rgba(20, 20, 20, 0.8);
            padding: 20px;
            border: 2px solid #666;
            margin: 20px 0;
            border-radius: 8px;
            max-width: 500px;
        }
        
        .objectives h3 {
            color: #68d391;
            margin-bottom: 10px;
            font-size: 1.3rem;
        }
        
        .objectives li {
            text-align: left;
            margin: 8px 0;
            color: #ccc;
        }
        
        button {
            background: #ff4444;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #ff6666;
        }
    </style>
</head>
<body>
    <div id="startScreen" class="screen">
        <h1>HORROR BASE</h1>
        <h2>Survive the Night</h2>
        <div class="objectives">
            <h3>Objective</h3>
            <p id="winCondition"></p>
            <h3>Game Rules</h3>
            <ul>
                <li id="ruleWood"></li>
                <li id="ruleNight"></li>
                <li id="ruleFort"></li>
                <li id="ruleProtect"></li>
                <li id="startSurvivors"></li>
            </ul>
        </div>
        <button onclick="startGame()">START GAME</button>
    </div>
    
    <div id="gameOverScreen" class="screen" style="display: none;">
        <h1 style="color: #ff0000;">GAME OVER</h1>
        <h2>Your base has been overrun...</h2>
        <p id="gameOverStats"></p>
        <button onclick="retryGame()">TRY AGAIN</button>
    </div>
    
    <div id="clearScreen" class="screen" style="display: none;">
        <h1 style="color: #00ff00;">CLEAR!</h1>
        <h2>You survived!</h2>
        <p id="clearStats"></p>
        <button onclick="retryGame()">PLAY AGAIN</button>
    </div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const config = {
            title: 'HORROR BASE',
            bg_color: '#0a0a0a',
            day_color: '#2d3748',
            night_color: '#1a0000',
            survivor_color: '#68d391',
            zombie_color: '#48bb78',
            fort_color: '#8b4513',
            survivor_count: 3,
            win_days: 7,
            zombie_per_night: 5,
            init_wood: 20
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 480;
        canvas.height = 520;
        
        document.getElementById('gameContainer').style.width = canvas.width + 'px';
        document.getElementById('gameContainer').style.height = canvas.height + 'px';
        
        document.body.style.background = config.bg_color;

        const gameState = {
            running: false,
            phase: 'day',
            day: 1,
            wood: config.init_wood,
            survivors: [],
            zombies: [],
            forts: [],
            selectedSurvivor: -1,
            phaseTimer: 0,
            phaseTime: 15,
            resources: []
        };

        document.getElementById('winCondition').textContent = 'Survive ' + config.win_days + ' nights!';
        document.getElementById('ruleWood').textContent = 'Day Phase: Click survivors -> click resources to gather wood';
        document.getElementById('ruleNight').textContent = 'Night Phase: Defend against zombies!';
        document.getElementById('ruleFort').textContent = 'Build forts (10 wood) to block zombies';
        document.getElementById('ruleProtect').textContent = 'Keep all survivors alive';
        document.getElementById('startSurvivors').textContent = 'Starting survivors: ' + config.survivor_count;

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            initializeGame();
            gameState.running = true;
            gameLoop();
        }

        function initializeGame() {
            gameState.day = 1;
            gameState.wood = config.init_wood;
            gameState.phase = 'day';
            gameState.phaseTimer = 0;
            gameState.phaseTime = 15;
            gameState.selectedSurvivor = -1;
            gameState.survivors = [];
            gameState.zombies = [];
            gameState.forts = [];
            gameState.resources = [];

            for (let i = 0; i < config.survivor_count; i++) {
                gameState.survivors.push({
                    x: 240 + (i - 1) * 50,
                    y: 200,
                    hp: 20,
                    maxHp: 20,
                    gatheringResource: null,
                    gatherTimer: 0
                });
            }

            createResources();
        }

        function createResources() {
            const positions = [
                { x: 80, y: 100 },
                { x: 400, y: 100 },
                { x: 80, y: 280 },
                { x: 400, y: 280 },
                { x: 240, y: 180 }
            ];
            gameState.resources = positions.map(pos => ({
                x: pos.x,
                y: pos.y
            }));
        }

        function gameLoop() {
            ctx.fillStyle = gameState.phase === 'day' ? config.day_color : config.night_color;
            ctx.fillRect(0, 0, canvas.width, 360);

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 360, canvas.width, 160);

            gameState.phaseTimer += 1/60;

            if (gameState.phaseTimer >= gameState.phaseTime) {
                if (gameState.phase === 'day') {
                    gameState.phase = 'night';
                    gameState.phaseTimer = 0;
                    spawnZombies();
                } else {
                    gameState.phase = 'day';
                    gameState.phaseTimer = 0;
                    gameState.day++;
                    createResources();
                }
            }

            if (gameState.phase === 'night') {
                updateZombies();
                checkZombieSurvivorCollisions();
            }

            updateSurvivors();
            updateForts();

            drawResources();
            drawForts();
            drawSurvivors();
            drawZombies();
            drawHUD();

            if (gameState.survivors.length === 0) {
                gameState.running = false;
                document.getElementById('gameOverScreen').style.display = 'flex';
                document.getElementById('gameOverStats').textContent = 'Survived: ' + gameState.day + ' days. Better luck next time!';
                return;
            }

            if (gameState.day >= config.win_days) {
                gameState.running = false;
                document.getElementById('clearScreen').style.display = 'flex';
                document.getElementById('clearStats').textContent = 'Days survived: ' + gameState.day + ' days!';
                return;
            }

            if (gameState.running) requestAnimationFrame(gameLoop);
        }

        function updateSurvivors() {
            for (let i = gameState.survivors.length - 1; i >= 0; i--) {
                const survivor = gameState.survivors[i];
                if (survivor.hp <= 0) {
                    gameState.survivors.splice(i, 1);
                    if (gameState.selectedSurvivor === i) {
                        gameState.selectedSurvivor = -1;
                    }
                    continue;
                }

                if (survivor.gatheringResource !== null) {
                    survivor.gatherTimer++;
                    if (survivor.gatherTimer >= 180) {
                        gameState.wood += 5;
                        survivor.gatheringResource = null;
                        survivor.gatherTimer = 0;
                    }
                }
            }
        }

        function spawnZombies() {
            const spawnPoints = [
                { x: -20, y: 120 },
                { x: 500, y: 120 },
                { x: -20, y: 240 },
                { x: 500, y: 240 }
            ];
            
            for (let i = 0; i < config.zombie_per_night; i++) {
                const point = spawnPoints[i % spawnPoints.length];
                gameState.zombies.push({
                    x: point.x,
                    y: point.y,
                    hp: 10,
                    maxHp: 10,
                    speed: 0.5
                });
            }
        }

        function updateZombies() {
            for (let i = gameState.zombies.length - 1; i >= 0; i--) {
                const zombie = gameState.zombies[i];
                if (zombie.hp <= 0) {
                    gameState.zombies.splice(i, 1);
                    continue;
                }

                const dx = 240 - zombie.x;
                const dy = 180 - zombie.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 0) {
                    zombie.x += (dx / dist) * zombie.speed;
                    zombie.y += (dy / dist) * zombie.speed;
                }
            }
        }

        function checkZombieSurvivorCollisions() {
            gameState.survivors.forEach(survivor => {
                gameState.zombies.forEach(zombie => {
                    const dx = survivor.x - zombie.x;
                    const dy = survivor.y - zombie.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 25) {
                        survivor.hp -= 5 / 60;
                        zombie.hp -= 3 / 60;
                    }
                });
            });
        }

        function updateForts() {
            for (let i = gameState.forts.length - 1; i >= 0; i--) {
                const fort = gameState.forts[i];
                gameState.zombies.forEach(zombie => {
                    const dx = fort.x - zombie.x;
                    const dy = fort.y - zombie.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 30) {
                        fort.hp -= 2 / 60;
                        zombie.hp -= 1 / 60;
                    }
                });
                
                if (fort.hp <= 0) {
                    gameState.forts.splice(i, 1);
                }
            }
        }

        function drawResources() {
            gameState.resources.forEach(res => {
                ctx.fillStyle = '#DAA520';
                ctx.fillRect(res.x - 12, res.y - 12, 24, 24);
                ctx.fillStyle = '#FFD700';
                ctx.fillRect(res.x - 8, res.y - 8, 16, 16);
            });
        }

        function drawForts() {
            gameState.forts.forEach(fort => {
                ctx.fillStyle = config.fort_color;
                ctx.beginPath();
                ctx.moveTo(fort.x, fort.y - 20);
                ctx.lineTo(fort.x + 20, fort.y + 10);
                ctx.lineTo(fort.x - 20, fort.y + 10);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(fort.x - 15, fort.y - 30, 30, 4);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(fort.x - 15, fort.y - 30, 30 * (fort.hp / 30), 4);
            });
        }

        function drawSurvivors() {
            gameState.survivors.forEach((survivor, index) => {
                ctx.fillStyle = gameState.selectedSurvivor === index ? '#ffff00' : config.survivor_color;
                ctx.beginPath();
                ctx.arc(survivor.x, survivor.y, 12, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(survivor.x - 12, survivor.y - 20, 24, 3);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(survivor.x - 12, survivor.y - 20, 24 * (survivor.hp / survivor.maxHp), 3);
            });
        }

        function drawZombies() {
            gameState.zombies.forEach(zombie => {
                ctx.fillStyle = config.zombie_color;
                ctx.beginPath();
                ctx.arc(zombie.x, zombie.y, 10, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawHUD() {
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'left';
            
            const hudY = 375;
            ctx.fillText('Day: ' + gameState.day + ' / ' + config.win_days, 10, hudY);
            ctx.fillText('Survivors: ' + gameState.survivors.length, 10, hudY + 20);
            ctx.fillText('Wood: ' + Math.floor(gameState.wood), 10, hudY + 40);
            ctx.fillText('Phase: ' + gameState.phase.toUpperCase() + ' (' + Math.ceil(gameState.phaseTime - gameState.phaseTimer) + 's)', 200, hudY);
            
            ctx.font = '11px Arial';
            ctx.fillText('Click survivor -> Click resource to gather (3 sec)', 10, hudY + 65);
            
            ctx.fillStyle = gameState.wood >= 10 ? '#68d391' : '#ff4444';
            ctx.fillRect(200, hudY + 50, 120, 30);
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 13px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('BUILD FORT (10)', 260, hudY + 70);
        }

        canvas.addEventListener('click', (e) => {
            if (!gameState.running) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (y > 360) {
                if (x > 200 && x < 320 && y > 410 && y < 440) {
                    if (gameState.wood >= 10) {
                        gameState.wood -= 10;
                        gameState.forts.push({
                            x: 240,
                            y: 180,
                            hp: 30,
                            maxHp: 30
                        });
                    }
                }
                return;
            }
            
            for (let i = 0; i < gameState.survivors.length; i++) {
                const survivor = gameState.survivors[i];
                const dx = x - survivor.x;
                const dy = y - survivor.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 15) {
                    gameState.selectedSurvivor = gameState.selectedSurvivor === i ? -1 : i;
                    return;
                }
            }
            
            if (gameState.selectedSurvivor >= 0 && gameState.selectedSurvivor < gameState.survivors.length) {
                for (let res of gameState.resources) {
                    const dx = x - res.x;
                    const dy = y - res.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 15) {
                        const survivor = gameState.survivors[gameState.selectedSurvivor];
                        survivor.gatheringResource = res;
                        survivor.gatherTimer = 0;
                        return;
                    }
                }
            }
        });

        function retryGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            gameState.running = false;
        }
    </script>
</body>
</html>
