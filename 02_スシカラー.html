<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スシカラー</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 1000px;
            height: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000;
        canvas.height = 600;

        const COLUMNS = 6;
        const COLUMN_WIDTH = canvas.width / COLUMNS;
        const PIECE_SIZE = 50;
        const PIECE_GAP = 5;
        const COLORS = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F'];

        class Particle {
            constructor(x, y, color, targetX, targetY) {
                this.x = x;
                this.y = y;
                this.startX = x;
                this.startY = y;
                this.targetX = targetX;
                this.targetY = targetY;
                this.color = color;
                this.life = 1;
                this.size = Math.random() * 8 + 5;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 3 + 2;
            }
            update() {
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance > 5) {
                    this.x += (dx / distance) * this.speed;
                    this.y += (dy / distance) * this.speed;
                } else {
                    this.life -= 0.05;
                }
                this.life -= 0.015;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        const game = {
            columns: [],
            selectedColumn: null,
            isDragging: false,
            targetColumn: -1,
            dragX: 0,
            dragY: 0,
            time: 120,
            score: 0,
            gameState: 'playing',
            startTime: Date.now(),
            particles: [],
            flashAlpha: 0,
            warningLevel: 0,
            winFrame: 0,
            columnGlows: [0, 0, 0, 0, 0, 0]
        };

        function initGame() {
            game.columns = [];
            for (let i = 0; i < COLUMNS; i++) {
                const col = [];
                for (let j = 0; j < 4; j++) {
                    col.push(COLORS[Math.floor(Math.random() * COLORS.length)]);
                }
                game.columns.push(col);
            }
            game.selectedColumn = null;
            game.isDragging = false;
            game.targetColumn = -1;
            game.time = 120;
            game.score = 0;
            game.gameState = 'playing';
            game.startTime = Date.now();
            game.particles = [];
            game.flashAlpha = 0;
            game.warningLevel = 0;
            game.winFrame = 0;
            game.columnGlows = [0, 0, 0, 0, 0, 0];
        }

        function getTopColor(idx) {
            return game.columns[idx].length > 0 ? game.columns[idx][game.columns[idx].length - 1] : null;
        }

        function checkAllMono() {
            const colors = [];
            for (let i = 0; i < COLUMNS; i++) {
                const c = getTopColor(i);
                if (!c) return false;
                colors.push(c);
            }
            return colors.every(c => c === colors[0]);
        }

        function updateTime() {
            const elapsed = (Date.now() - game.startTime) / 1000;
            game.time = Math.max(0, 120 - elapsed);
            if (game.gameState === 'playing') {
                game.warningLevel = game.time <= 10 ? 2 : (game.time <= 30 ? 1 : 0);
                if (game.time <= 0) game.gameState = 'fail';
            }
        }

        function generateWinParticles() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            for (let i = 0; i < COLUMNS; i++) {
                const colCenterX = (i + 0.5) * COLUMN_WIDTH;
                const colTop = canvas.height - 150;
                const color = getTopColor(i);
                for (let j = 0; j < 12; j++) {
                    const p = new Particle(colCenterX, colTop, color, centerX, centerY);
                    game.particles.push(p);
                }
                game.columnGlows[i] = 1;
            }
            game.flashAlpha = 1;
        }

        canvas.addEventListener('mousedown', (e) => {
            if (game.gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const colIdx = Math.floor(x / COLUMN_WIDTH);
            if (colIdx < 0 || colIdx >= COLUMNS) return;
            game.columnGlows[colIdx] = 0.6;
            const col = game.columns[colIdx];
            if (col.length === 0) return;
            const pieceY = canvas.height - (col.length * (PIECE_SIZE + PIECE_GAP) + PIECE_GAP);
            if (y >= pieceY) {
                game.selectedColumn = colIdx;
                game.isDragging = true;
                game.dragX = x;
                game.dragY = y;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!game.isDragging) return;
            const rect = canvas.getBoundingClientRect();
            game.dragX = e.clientX - rect.left;
            game.dragY = e.clientY - rect.top;
            game.targetColumn = Math.max(0, Math.min(COLUMNS - 1, Math.floor(game.dragX / COLUMN_WIDTH)));
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!game.isDragging) return;
            const rect = canvas.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const targetCol = Math.floor(endX / COLUMN_WIDTH);
            if (targetCol >= 0 && targetCol < COLUMNS && targetCol !== game.selectedColumn) {
                const piece = game.columns[game.selectedColumn].pop();
                game.columns[targetCol].push(piece);
                game.score += 10;
            }
            game.isDragging = false;
            game.selectedColumn = null;
            game.targetColumn = -1;
        });

        canvas.addEventListener('click', (e) => {
            if (game.gameState === 'win' || game.gameState === 'fail') {
                initGame();
            }
        });

        function drawColumn(idx) {
            const col = game.columns[idx];
            const sx = idx * COLUMN_WIDTH;

            ctx.fillStyle = '#F0F0F0';
            ctx.fillRect(sx, 0, COLUMN_WIDTH, canvas.height);

            if (game.warningLevel === 1 && Math.floor(Date.now() / 150) % 2 === 0) {
                ctx.fillStyle = 'rgba(255, 180, 0, 0.2)';
                ctx.fillRect(sx, 0, COLUMN_WIDTH, canvas.height);
            }

            const topColor = getTopColor(idx);
            if (topColor && game.columnGlows[idx] > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${game.columnGlows[idx] * 0.6})`;
                ctx.fillRect(sx, 0, COLUMN_WIDTH, canvas.height);
                game.columnGlows[idx] -= 0.005;
            }

            ctx.strokeStyle = '#999';
            ctx.lineWidth = 2;
            ctx.strokeRect(sx, 0, COLUMN_WIDTH, canvas.height);

            for (let j = 0; j < col.length; j++) {
                const px = sx + (COLUMN_WIDTH - PIECE_SIZE) / 2;
                const py = canvas.height - ((j + 1) * (PIECE_SIZE + PIECE_GAP));
                ctx.fillStyle = col[j];
                ctx.fillRect(px, py, PIECE_SIZE, PIECE_SIZE);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.strokeRect(px, py, PIECE_SIZE, PIECE_SIZE);

                if (game.selectedColumn === idx && j === col.length - 1) {
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(px - 2, py - 2, PIECE_SIZE + 4, PIECE_SIZE + 4);
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#FFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (game.warningLevel === 2) {
                ctx.fillStyle = 'rgba(255, 50, 50, 0.15)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            for (let i = 0; i < COLUMNS; i++) drawColumn(i);

            if (game.isDragging && game.targetColumn !== game.selectedColumn) {
                ctx.fillStyle = 'rgba(150, 150, 255, 0.15)';
                ctx.fillRect(game.targetColumn * COLUMN_WIDTH, 0, COLUMN_WIDTH, canvas.height);
            }

            for (let p of game.particles) {
                p.update();
                p.draw(ctx);
            }
            game.particles = game.particles.filter(p => p.life > 0);

            if (game.flashAlpha > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${game.flashAlpha * 0.8})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                game.flashAlpha -= 0.03;
            }

            ctx.fillStyle = '#333';
            ctx.font = 'bold 20px Arial';
            ctx.fillText(`Score: ${game.score}`, 20, 35);
            ctx.fillText(`Time: ${Math.max(0, Math.ceil(game.time))}s`, canvas.width - 180, 35);
            ctx.font = '13px Arial';
            ctx.fillStyle = '#666';
            ctx.fillText('ドラッグでピースを移動 - 全ての列を同じ色に！', 20, canvas.height - 18);

            if (game.gameState === 'win') drawWin();
            if (game.gameState === 'fail') drawFail();
        }

        function drawWin() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const scale = 0.8 + Math.sin(Date.now() / 300) * 0.1;
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2 - 50);
            ctx.scale(scale, scale);

            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('✨ PERFECT! ✨', 0, 0);

            ctx.restore();

            ctx.fillStyle = '#FFF';
            ctx.font = '28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`Score: ${game.score}`, canvas.width / 2, canvas.height / 2 + 60);
            ctx.font = '18px Arial';
            ctx.fillText('クリックで再スタート', canvas.width / 2, canvas.height / 2 + 110);
            ctx.textAlign = 'left';
        }

        function drawFail() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#FF6B6B';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('TIME UP', canvas.width / 2, canvas.height / 2 - 40);

            ctx.fillStyle = '#FFF';
            ctx.font = '28px Arial';
            ctx.fillText(`Final Score: ${game.score}`, canvas.width / 2, canvas.height / 2 + 60);
            ctx.font = '18px Arial';
            ctx.fillText('クリックで再スタート', canvas.width / 2, canvas.height / 2 + 110);
            ctx.textAlign = 'left';
        }

        function gameLoop() {
            if (game.gameState === 'playing' && checkAllMono()) {
                game.gameState = 'win';
                generateWinParticles();
            }
            updateTime();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initGame();
        gameLoop();
    </script>
</body>
</html>
