<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Royale</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #1a2a1a;
        }

        .container {
            position: relative;
            width: 800px;
            height: 600px;
        }

        #gameCanvas {
            border: 2px solid #fff;
            display: block;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        #startScreen h1 {
            color: #f6e05e;
            font-size: 48px;
        }

        #startButton {
            padding: 15px 40px;
            font-size: 20px;
            background-color: #f6e05e;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        #startButton:hover {
            background-color: #e2d248;
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            z-index: 11;
        }

        #gameOverScreen h2 {
            color: #e53e3e;
            font-size: 48px;
        }

        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            z-index: 11;
        }

        #clearScreen h2 {
            color: #48bb78;
            font-size: 48px;
        }

        .retry-btn {
            padding: 15px 40px;
            font-size: 20px;
            background-color: #f6e05e;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .retry-btn:hover {
            background-color: #e2d248;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            z-index: 5;
            line-height: 1.8;
        }

        #controls {
            position: absolute;
            bottom: -30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="hud">
            <div>HP: <span id="playerHp">100</span>/100</div>
            <div>生存者: <span id="aliveCount">10</span></div>
            <div>次のゾーン: <span id="zoneTimer">30</span>s</div>
        </div>
        <div id="startScreen">
            <h1>BATTLE ROYALE</h1>
            <button id="startButton">START</button>
        </div>
        <div id="gameOverScreen">
            <h2>GAME OVER</h2>
            <button class="retry-btn" onclick="retryGame()">RETRY</button>
        </div>
        <div id="clearScreen">
            <h2>YOU WIN!</h2>
            <button class="retry-btn" onclick="retryGame()">RETRY</button>
        </div>
        <div id="controls">WASD: 移動 / Space: 攻撃</div>
    </div>

    <script>
        const config = {
            title: 'BATTLE ROYALE',
            bg_color: '#1a2a1a',
            safe_color: '#2d4a2d',
            danger_color: '#4a1a1a',
            player_color: '#f6e05e',
            enemy_color: '#e53e3e',
            player_hp: 100,
            total_players: 10,
            zone_shrink_interval: 30,
            zone_damage: 2
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = {
            running: false,
            time: 0,
            zoneShrinkTimer: config.zone_shrink_interval,
            zoneRadius: 250
        };

        let keys = {};
        let player;
        let enemies = [];
        let items = [];
        let particles = [];

        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = 30;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
            }

            draw(ctx) {
                ctx.globalAlpha = this.life / 30;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - 2, this.y - 2, 4, 4);
                ctx.globalAlpha = 1;
            }
        }

        class Item {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.collected = false;
            }

            draw(ctx) {
                if (this.type === 'weapon') {
                    ctx.fillStyle = '#f97316';
                } else {
                    ctx.fillStyle = '#22c55e';
                }
                ctx.fillRect(this.x - 5, this.y - 5, 10, 10);
            }
        }

        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 20;
                this.height = 20;
                this.hp = config.player_hp;
                this.maxHp = config.player_hp;
                this.speed = 2;
                this.attackCooldown = 0;
                this.attackRange = 40;
                this.attackDamage = 10;
                this.weaponBoost = 1;
            }

            update() {
                let newX = this.x;
                let newY = this.y;

                if (keys['w']) newY -= this.speed;
                if (keys['s']) newY += this.speed;
                if (keys['a']) newX -= this.speed;
                if (keys['d']) newX += this.speed;

                if (newX >= 0 && newX <= canvas.width - this.width) this.x = newX;
                if (newY >= 0 && newY <= canvas.height - this.height) this.y = newY;

                let distToCenter = Math.hypot(this.x - canvas.width / 2, this.y - canvas.height / 2);
                if (distToCenter > gameState.zoneRadius) {
                    this.hp -= config.zone_damage / 60;
                }

                this.attackCooldown--;

                for (let item of items) {
                    if (!item.collected && Math.hypot(this.x - item.x, this.y - item.y) < 20) {
                        item.collected = true;
                        if (item.type === 'weapon') {
                            this.weaponBoost = 1.5;
                            setTimeout(() => { this.weaponBoost = 1; }, 10000);
                        } else {
                            this.hp = Math.min(this.hp + 30, this.maxHp);
                        }
                    }
                }
            }

            attack() {
                if (this.attackCooldown > 0) return;
                this.attackCooldown = 30;

                let damage = this.attackDamage * this.weaponBoost;
                for (let enemy of enemies) {
                    let dist = Math.hypot(this.x - enemy.x, this.y - enemy.y);
                    if (dist < this.attackRange) {
                        enemy.hp -= damage;
                        for (let i = 0; i < 10; i++) {
                            particles.push(new Particle(enemy.x, enemy.y, (Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4, '#e53e3e'));
                        }
                    }
                }
            }

            draw(ctx) {
                ctx.fillStyle = config.player_color;
                ctx.fillRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
                
                ctx.fillStyle = '#00aa00';
                ctx.fillRect(this.x - 15, this.y - 25, 30 * (this.hp / this.maxHp), 3);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(this.x - 15, this.y - 25, 30, 3);
            }
        }

        class Enemy {
            constructor(x, y, id) {
                this.x = x;
                this.y = y;
                this.width = 18;
                this.height = 18;
                this.hp = 20;
                this.maxHp = 20;
                this.speed = 1;
                this.id = id;
                this.targetX = x;
                this.targetY = y;
                this.moveTimer = 0;
                this.attackCooldown = 0;
                this.attackRange = 35;
                this.attackDamage = 5;
            }

            update() {
                this.moveTimer--;
                if (this.moveTimer <= 0) {
                    this.decideTarget();
                    this.moveTimer = Math.random() * 60 + 30;
                }

                let dx = this.targetX - this.x;
                let dy = this.targetY - this.y;
                let dist = Math.hypot(dx, dy);

                if (dist > 5) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }

                this.x = Math.max(0, Math.min(canvas.width - this.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height - this.height, this.y));

                let distToCenter = Math.hypot(this.x - canvas.width / 2, this.y - canvas.height / 2);
                if (distToCenter > gameState.zoneRadius) {
                    this.hp -= config.zone_damage / 60;
                }

                this.attackCooldown--;

                let distToPlayer = Math.hypot(this.x - player.x, this.y - player.y);
                if (distToPlayer < this.attackRange && this.attackCooldown <= 0) {
                    player.hp -= this.attackDamage;
                    this.attackCooldown = 40;
                    for (let i = 0; i < 5; i++) {
                        particles.push(new Particle(player.x, player.y, (Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3, '#e53e3e'));
                    }
                }

                for (let other of enemies) {
                    if (other.id !== this.id && other.hp > 0) {
                        let distToOther = Math.hypot(this.x - other.x, this.y - other.y);
                        if (distToOther < this.attackRange && this.attackCooldown <= 0) {
                            other.hp -= this.attackDamage;
                            this.attackCooldown = 40;
                        }
                    }
                }
            }

            decideTarget() {
                let playerDist = Math.hypot(this.x - player.x, this.y - player.y);
                if (playerDist < 150) {
                    this.targetX = player.x;
                    this.targetY = player.y;
                } else {
                    this.targetX = Math.random() * (canvas.width - 100) + 50;
                    this.targetY = Math.random() * (canvas.height - 100) + 50;
                }
            }

            draw(ctx) {
                ctx.fillStyle = config.enemy_color;
                ctx.fillRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);

                ctx.fillStyle = '#00aa00';
                ctx.fillRect(this.x - 14, this.y - 25, 28 * (this.hp / this.maxHp), 3);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(this.x - 14, this.y - 25, 28, 3);
            }
        }

        function initGame() {
            gameState.zoneRadius = 250;
            gameState.zoneShrinkTimer = config.zone_shrink_interval;
            gameState.time = 0;

            player = new Player(canvas.width / 2, canvas.height / 2);

            enemies = [];
            for (let i = 0; i < config.total_players - 1; i++) {
                let x = Math.random() * (canvas.width - 100) + 50;
                let y = Math.random() * (canvas.height - 100) + 50;
                enemies.push(new Enemy(x, y, i));
            }

            items = [];
            for (let i = 0; i < 5; i++) {
                let x = Math.random() * (canvas.width - 50) + 25;
                let y = Math.random() * (canvas.height - 50) + 25;
                items.push(new Item(x, y, Math.random() > 0.5 ? 'weapon' : 'heal'));
            }

            particles = [];

            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
        }

        function startGame() {
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'none';
            initGame();
            gameState.running = true;
            gameLoop();
        }

        function gameLoop() {
            if (!gameState.running) return;

            player.update();

            if (keys[' ']) {
                player.attack();
            }

            for (let enemy of enemies) {
                if (enemy.hp > 0) {
                    enemy.update();
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            gameState.zoneShrinkTimer--;
            if (gameState.zoneShrinkTimer <= 0) {
                gameState.zoneRadius *= 0.7;
                gameState.zoneShrinkTimer = config.zone_shrink_interval;
            }

            let activeEnemies = enemies.filter(e => e.hp > 0).length;

            if (player.hp <= 0) {
                gameState.running = false;
                document.getElementById('gameOverScreen').style.display = 'flex';
                return;
            }

            if (activeEnemies === 0) {
                gameState.running = false;
                document.getElementById('clearScreen').style.display = 'flex';
                return;
            }

            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = config.safe_color;
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, gameState.zoneRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, gameState.zoneRadius, 0, Math.PI * 2);
            ctx.stroke();

            for (let item of items) {
                if (!item.collected) {
                    item.draw(ctx);
                }
            }

            for (let enemy of enemies) {
                if (enemy.hp > 0) {
                    enemy.draw(ctx);
                }
            }

            player.draw(ctx);

            for (let particle of particles) {
                particle.draw(ctx);
            }

            document.getElementById('playerHp').textContent = Math.max(0, Math.floor(player.hp));
            document.getElementById('aliveCount').textContent = activeEnemies + 1;
            document.getElementById('zoneTimer').textContent = Math.max(0, Math.ceil(gameState.zoneShrinkTimer));

            requestAnimationFrame(gameLoop);
        }

        function retryGame() {
            document.getElementById('startScreen').style.display = 'flex';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
        }

        document.getElementById('startButton').addEventListener('click', startGame);

        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ') e.preventDefault();
        });

        document.addEventListener('keyup', e => {
            keys[e.key] = false;
        });

        document.getElementById('startScreen').style.display = 'flex';
        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('clearScreen').style.display = 'none';
    </script>
</body>
</html>
