<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLE ROYALE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #1a2a1a;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #1a2a1a;
            border: 2px solid #4a7c4e;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #f6e05e;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        #hud div {
            margin-bottom: 5px;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(26, 42, 26, 0.95);
            z-index: 100;
        }

        #startScreen h1 {
            font-size: 48px;
            color: #f6e05e;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        #startButton {
            padding: 15px 40px;
            font-size: 20px;
            background-color: #f6e05e;
            color: #1a2a1a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        #startButton:hover {
            background-color: #ffd700;
            transform: scale(1.05);
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(26, 42, 26, 0.95);
            z-index: 100;
        }

        #gameOverScreen h1 {
            font-size: 48px;
            color: #e53e3e;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(26, 42, 26, 0.95);
            z-index: 100;
        }

        #clearScreen h1 {
            font-size: 48px;
            color: #4ade80;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .endGameButton {
            padding: 15px 40px;
            font-size: 20px;
            background-color: #f6e05e;
            color: #1a2a1a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .endGameButton:hover {
            background-color: #ffd700;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="hud">
            <div id="hpDisplay">HP: 100</div>
            <div id="survivorsDisplay">Survivors: 10</div>
            <div id="zoneDisplay">Zone in: 30s</div>
        </div>
        <div id="startScreen">
            <h1>BATTLE ROYALE</h1>
            <button id="startButton">START</button>
        </div>
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <button class="endGameButton" onclick="retryGame()">RETRY</button>
        </div>
        <div id="clearScreen">
            <h1>VICTORY!</h1>
            <button class="endGameButton" onclick="retryGame()">RETRY</button>
        </div>
    </div>

    <script>
        const config = {
            title: 'BATTLE ROYALE',
            bg_color: '#1a2a1a',
            safe_color: '#2d4a2d',
            danger_color: '#4a1a1a',
            player_color: '#f6e05e',
            enemy_color: '#e53e3e',
            player_hp: 100,
            total_players: 10,
            zone_shrink_interval: 30,
            zone_damage: 2
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = {
            running: false,
            time: 0,
            zoneRadius: 250,
            zoneCenterX: 400,
            zoneCenterY: 300,
            minZoneRadius: 50,
            zoneNextShrink: config.zone_shrink_interval,
            zonePhase: 0
        };

        let player;
        let enemies = [];
        let items = [];
        let keys = {};

        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 8;
                this.hp = config.player_hp;
                this.maxHp = config.player_hp;
                this.speed = 3;
                this.attackRange = 25;
                this.attackPower = 15;
                this.attackCooldown = 0;
                this.weaponLevel = 1;
                this.healingLevel = 1;
            }

            update() {
                let vx = 0, vy = 0;
                if (keys['w']) vy -= this.speed;
                if (keys['s']) vy += this.speed;
                if (keys['a']) vx -= this.speed;
                if (keys['d']) vx += this.speed;

                this.x += vx;
                this.y += vy;

                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                let dist = Math.hypot(this.x - gameState.zoneCenterX, this.y - gameState.zoneCenterY);
                if (dist > gameState.zoneRadius) {
                    this.hp -= config.zone_damage * 0.016;
                }

                if (this.attackCooldown > 0) this.attackCooldown -= 0.016;

                for (let i = items.length - 1; i >= 0; i--) {
                    if (Math.hypot(this.x - items[i].x, this.y - items[i].y) < this.radius + items[i].radius) {
                        if (items[i].type === 'weapon') {
                            this.weaponLevel += 1;
                            this.attackPower += 10;
                        } else if (items[i].type === 'heal') {
                            this.hp = Math.min(this.maxHp, this.hp + 30 * this.healingLevel);
                            this.healingLevel += 0.1;
                        }
                        items.splice(i, 1);
                    }
                }

                if (this.hp <= 0) {
                    gameState.running = false;
                    document.getElementById('gameOverScreen').style.display = 'flex';
                    return;
                }
            }

            attack() {
                if (this.attackCooldown <= 0) {
                    for (let enemy of enemies) {
                        let dist = Math.hypot(this.x - enemy.x, this.y - enemy.y);
                        if (dist < this.attackRange + enemy.radius) {
                            enemy.hp -= this.attackPower * this.weaponLevel;
                        }
                    }
                    this.attackCooldown = 0.5;
                }
            }

            draw(ctx) {
                ctx.fillStyle = config.player_color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 3, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        class Enemy {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 7;
                this.hp = 30;
                this.maxHp = 30;
                this.speed = 1.5;
                this.attackRange = 20;
                this.attackPower = 8;
                this.attackCooldown = 0;
                this.moveTimer = Math.random() * 120 + 60;
                this.targetX = x;
                this.targetY = y;
                this.chasePlayer = false;
                this.chaseTimer = 0;
            }

            update() {
                this.moveTimer--;
                if (this.moveTimer <= 0) {
                    this.targetX = Math.random() * canvas.width;
                    this.targetY = Math.random() * canvas.height;
                    this.moveTimer = Math.random() * 120 + 60;
                }

                let playerDist = Math.hypot(this.x - player.x, this.y - player.y);
                if (playerDist < 150) {
                    this.chasePlayer = true;
                    this.chaseTimer = 120;
                } else if (this.chaseTimer > 0) {
                    this.chaseTimer--;
                    this.chasePlayer = true;
                } else {
                    this.chasePlayer = false;
                }

                if (this.chasePlayer) {
                    this.targetX = player.x;
                    this.targetY = player.y;
                }

                let angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;

                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                let dist = Math.hypot(this.x - gameState.zoneCenterX, this.y - gameState.zoneCenterY);
                if (dist > gameState.zoneRadius) {
                    this.hp -= config.zone_damage * 0.016;
                }

                if (this.attackCooldown > 0) this.attackCooldown -= 0.016;

                if (playerDist < this.attackRange + player.radius) {
                    if (this.attackCooldown <= 0) {
                        player.hp -= this.attackPower;
                        this.attackCooldown = 1;
                    }
                }

                for (let other of enemies) {
                    if (other === this) continue;
                    let otherDist = Math.hypot(this.x - other.x, this.y - other.y);
                    if (otherDist < this.attackRange + other.radius && Math.random() < 0.01) {
                        if (this.attackCooldown <= 0) {
                            other.hp -= this.attackPower;
                            this.attackCooldown = 0.5;
                        }
                    }
                }
            }

            draw(ctx) {
                ctx.fillStyle = config.enemy_color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#ff6666';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 2, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        class Item {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.radius = 5;
                this.type = type;
            }

            draw(ctx) {
                if (this.type === 'weapon') {
                    ctx.fillStyle = '#ff9800';
                } else {
                    ctx.fillStyle = '#4ade80';
                }
                ctx.beginPath();
                ctx.rect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                ctx.fill();
            }
        }

        function initGame() {
            gameState.running = false;
            gameState.time = 0;
            gameState.zoneRadius = 250;
            gameState.zoneCenterX = 400;
            gameState.zoneCenterY = 300;
            gameState.zoneNextShrink = config.zone_shrink_interval;
            gameState.zonePhase = 0;

            player = new Player(400, 300);
            enemies = [];
            items = [];

            for (let i = 0; i < config.total_players - 1; i++) {
                let angle = (i / (config.total_players - 1)) * Math.PI * 2;
                let x = 400 + Math.cos(angle) * 150;
                let y = 300 + Math.sin(angle) * 150;
                enemies.push(new Enemy(x, y));
            }

            for (let i = 0; i < 5; i++) {
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                items.push(new Item(x, y, Math.random() < 0.5 ? 'weapon' : 'heal'));
            }

            gameState.running = true;
            gameLoop();
        }

        function gameLoop() {
            if (!gameState.running) {
                if (gameState.running === null) return;
            }

            gameState.time += 0.016;
            gameState.zoneNextShrink -= 0.016;

            if (gameState.zoneNextShrink <= 0) {
                gameState.zoneNextShrink = config.zone_shrink_interval;
                gameState.zonePhase++;
                let shrinkAmount = (250 - gameState.minZoneRadius) / 10;
                gameState.zoneRadius = Math.max(gameState.minZoneRadius, gameState.zoneRadius - shrinkAmount);

                if (gameState.zoneRadius === gameState.minZoneRadius && Math.random() < 0.5) {
                    gameState.zoneCenterX += (Math.random() - 0.5) * 100;
                    gameState.zoneCenterY += (Math.random() - 0.5) * 100;
                }
            }

            if (keys[' ']) {
                player.attack();
                keys[' '] = false;
            }

            player.update();

            for (let enemy of enemies) {
                enemy.update();
            }

            let activeEnemies = enemies.filter(e => e.hp > 0).length;

            if (activeEnemies === 0) {
                gameState.running = false;
                document.getElementById('clearScreen').style.display = 'flex';
                return;
            }

            if (player.hp <= 0) {
                gameState.running = false;
                document.getElementById('gameOverScreen').style.display = 'flex';
                return;
            }

            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = config.safe_color;
            ctx.beginPath();
            ctx.arc(gameState.zoneCenterX, gameState.zoneCenterY, gameState.zoneRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = config.danger_color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(gameState.zoneCenterX, gameState.zoneCenterY, gameState.zoneRadius, 0, Math.PI * 2);
            ctx.stroke();

            for (let item of items) {
                item.draw(ctx);
            }

            player.draw(ctx);

            for (let enemy of enemies) {
                if (enemy.hp > 0) {
                    enemy.draw(ctx);
                }
            }

            document.getElementById('hpDisplay').textContent = `HP: ${Math.ceil(player.hp)}`;
            document.getElementById('survivorsDisplay').textContent = `Survivors: ${activeEnemies + 1}`;
            document.getElementById('zoneDisplay').textContent = `Zone in: ${Math.ceil(gameState.zoneNextShrink)}s`;

            if (gameState.running) {
                requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'none';
            initGame();
        }

        function retryGame() {
            document.getElementById('startScreen').style.display = 'flex';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            gameState.running = false;
        }

        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
        });

        document.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });

        document.getElementById('startButton').addEventListener('click', startGame);
    </script>
</body>
</html>
