<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIDDEN OBJECTS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            display: flex;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .game-wrapper {
            position: relative;
        }

        canvas {
            display: block;
            border: 3px solid #333;
            background: #f0e6d2;
            cursor: crosshair;
        }

        .ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 5px;
        }

        .timer {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 28px;
            font-weight: bold;
            color: #d32f2f;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 5px;
        }

        .timer.warning {
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .right-panel {
            width: 160px;
            background: #f9f9f9;
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }

        .items-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }

        .item-entry {
            padding: 8px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            transition: all 0.3s;
        }

        .item-entry.found {
            background: #e8f5e9;
            border-color: #4caf50;
            color: #4caf50;
            text-decoration: line-through;
        }

        .item-entry.notfound {
            color: #999;
        }

        .checkmark {
            margin-right: 5px;
            display: none;
        }

        .item-entry.found .checkmark {
            display: inline;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            z-index: 1000;
        }

        .screen.active {
            display: flex;
        }

        .screen h1 {
            font-size: 48px;
            margin-bottom: 30px;
            text-align: center;
        }

        .screen p {
            font-size: 18px;
            margin-bottom: 40px;
            text-align: center;
        }

        .screen button {
            padding: 15px 40px;
            font-size: 20px;
            background: #ffd700;
            color: #333;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .screen button:hover {
            background: #ffed4e;
            transform: scale(1.05);
        }

        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.3);
            pointer-events: none;
            display: none;
        }

        .flash.active {
            display: block;
            animation: flashEffect 0.3s;
        }

        @keyframes flashEffect {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .found-animation {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            color: #4caf50;
            pointer-events: none;
            animation: foundFloat 1s ease-out forwards;
        }

        @keyframes foundFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(0.8);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-wrapper">
            <canvas id="gameCanvas" width="500" height="400"></canvas>
            <div class="ui-overlay" id="scoreDisplay">スコア: 0/6</div>
            <div class="timer" id="timerDisplay">60</div>
            <div class="flash" id="flashEffect"></div>

            <div class="screen" id="startScreen">
                <h1>HIDDEN OBJECTS</h1>
                <p>6つの隠れたアイテムを見つけよう！<br>60秒以内に全てを発見できるか？</p>
                <button onclick="startGame()">START</button>
            </div>

            <div class="screen" id="gameOverScreen">
                <h1>GAME OVER</h1>
                <p id="gameOverMessage">時間切れ！</p>
                <button onclick="resetGame()">RETRY</button>
            </div>

            <div class="screen" id="clearScreen">
                <h1>CLEAR!</h1>
                <p id="clearMessage">全てのアイテムを見つけました！</p>
                <button onclick="resetGame()">PLAY AGAIN</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="panel-title">探すもの</div>
            <div class="items-list" id="itemsList"></div>
        </div>
    </div>

    <script>
        // {{GAME_CONFIG}}
        const config = {
            title: 'HIDDEN OBJECTS',
            bg_color: '#f0e6d2',
            highlight_color: '#ffd700',
            time_limit: 60,
            target_count: 6,
            miss_penalty: 5
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const items = [
            { name: '🔑 鍵',   x: 120, y: 180, radius: 18, found: false },
            { name: '📕 本',   x: 280, y: 95,  radius: 20, found: false },
            { name: '🕐 時計', x: 400, y: 140, radius: 22, found: false },
            { name: '🔔 鈴',   x: 80,  y: 290, radius: 16, found: false },
            { name: '🎀 リボン',x: 360, y: 310, radius: 18, found: false },
            { name: '💎 宝石', x: 460, y: 220, radius: 15, found: false }
        ];

        const gameState = {
            running: false,
            timeLeft: config.time_limit,
            foundCount: 0,
            startTime: 0,
            gameActive: false
        };

        function drawComplexScene() {
            ctx.fillStyle = config.bg_color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 壁と床
            ctx.fillStyle = '#d4c5b0';
            ctx.fillRect(0, 0, canvas.width, 100);
            ctx.fillStyle = '#c9b89f';
            ctx.fillRect(0, 100, canvas.width, canvas.height);

            // 木製の棚パターン
            ctx.strokeStyle = '#8b7355';
            ctx.lineWidth = 3;
            for (let i = 0; i < 4; i++) {
                ctx.strokeRect(20 + i * 115, 50 + i * 20, 100, 40);
            }

            // テクスチャー: 斜線パターン
            ctx.strokeStyle = '#baa88f';
            ctx.lineWidth = 1;
            for (let i = 0; i < 50; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.stroke();
            }

            // 装飾的な円と矩形
            ctx.fillStyle = '#e0d5c7';
            for (let i = 0; i < 15; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 20 + 5;
                ctx.fillRect(x, y, size, size);
            }

            ctx.strokeStyle = '#a89a88';
            ctx.lineWidth = 1;
            for (let i = 0; i < 10; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const r = Math.random() * 15 + 5;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.stroke();
            }

            // 家具の影
            ctx.fillStyle = 'rgba(139, 115, 85, 0.15)';
            ctx.fillRect(30, 120, 440, 8);
            ctx.fillRect(10, 200, 480, 8);
            ctx.fillRect(50, 280, 400, 8);

            // 枠線
            ctx.strokeStyle = '#996633';
            ctx.lineWidth = 2;
            ctx.strokeRect(15, 60, 90, 70);
            ctx.strokeRect(140, 40, 100, 90);
            ctx.strokeRect(280, 70, 110, 80);
            ctx.strokeRect(420, 100, 60, 60);
            ctx.strokeRect(30, 220, 120, 100);
            ctx.strokeRect(200, 250, 150, 80);
            ctx.strokeRect(380, 260, 100, 90);

            // ノイズを追加（より複雑にする）
            ctx.fillStyle = 'rgba(100, 100, 100, 0.1)';
            for (let i = 0; i < 100; i++) {
                ctx.fillRect(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height,
                    Math.random() * 3,
                    Math.random() * 3
                );
            }
        }

        function drawItems(highlight = false) {
            items.forEach((item, index) => {
                if (!item.found) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);

                    if (highlight) {
                        ctx.fillStyle = config.highlight_color;
                        ctx.lineWidth = 3;
                        ctx.strokeStyle = '#ffb300';
                    } else {
                        ctx.fillStyle = '#f5deb3';
                        ctx.lineWidth = 2;
                        ctx.strokeStyle = '#d4a574';
                    }

                    ctx.fill();
                    ctx.stroke();

                    // アイテムのテキストを描画
                    ctx.fillStyle = '#333';
                    ctx.font = `bold ${item.radius}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(item.name.split(' ')[0], item.x, item.y);

                    ctx.restore();
                }
            });
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
            gameState.timeLeft = Math.max(0, config.time_limit - elapsed);

            const timerDisplay = document.getElementById('timerDisplay');
            timerDisplay.textContent = gameState.timeLeft;

            if (gameState.timeLeft <= 10) {
                timerDisplay.classList.add('warning');
            } else {
                timerDisplay.classList.remove('warning');
            }

            if (gameState.timeLeft <= 0) {
                endGame(false);
            }
        }

        function updateItemsList() {
            const list = document.getElementById('itemsList');
            list.innerHTML = '';
            items.forEach((item, index) => {
                const entry = document.createElement('div');
                entry.className = `item-entry ${item.found ? 'found' : 'notfound'}`;
                entry.innerHTML = `<span class="checkmark">✓</span>${item.name}`;
                list.appendChild(entry);
            });
        }

        function onCanvasClick(e) {
            if (!gameState.running || !gameState.gameActive) return;

            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            let found = false;

            for (let item of items) {
                if (!item.found) {
                    const distance = Math.sqrt((clickX - item.x) ** 2 + (clickY - item.y) ** 2);
                    if (distance <= item.radius) {
                        item.found = true;
                        gameState.foundCount++;
                        found = true;
                        updateItemsList();
                        document.getElementById('scoreDisplay').textContent = `スコア: ${gameState.foundCount}/${config.target_count}`;

                        // Found animation
                        const animation = document.createElement('div');
                        animation.className = 'found-animation';
                        animation.textContent = '✓ FOUND!';
                        animation.style.left = (clickX + rect.left) + 'px';
                        animation.style.top = (clickY + rect.top - 50) + 'px';
                        document.body.appendChild(animation);
                        setTimeout(() => animation.remove(), 1000);

                        if (gameState.foundCount === config.target_count) {
                            endGame(true);
                        }
                        break;
                    }
                }
            }

            if (!found) {
                // ペナルティ
                gameState.timeLeft = Math.max(0, gameState.timeLeft - config.miss_penalty);
                
                // フラッシュ
                const flash = document.getElementById('flashEffect');
                flash.classList.remove('active');
                void flash.offsetWidth; // reflow
                flash.classList.add('active');
            }
        }

        function gameLoop() {
            if (!gameState.running) {
                requestAnimationFrame(gameLoop);
                return;
            }

            updateTimer();
            drawComplexScene();
            drawItems();

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('startScreen').classList.remove('active');
            gameState.running = true;
            gameState.gameActive = true;
            gameState.timeLeft = config.time_limit;
            gameState.foundCount = 0;
            gameState.startTime = Date.now();

            // Reset items
            items.forEach(item => item.found = false);
            updateItemsList();
            document.getElementById('scoreDisplay').textContent = `スコア: 0/${config.target_count}`;
            document.getElementById('timerDisplay').textContent = config.time_limit;

            gameLoop();
        }

        function endGame(cleared) {
            gameState.running = false;
            gameState.gameActive = false;

            if (cleared) {
                document.getElementById('clearMessage').textContent = `${gameState.timeLeft}秒で全アイテムを発見！`;
                document.getElementById('clearScreen').classList.add('active');
            } else {
                document.getElementById('gameOverMessage').textContent = `${gameState.foundCount}/${config.target_count}個を発見`;
                document.getElementById('gameOverScreen').classList.add('active');
            }
        }

        function resetGame() {
            document.getElementById('clearScreen').classList.remove('active');
            document.getElementById('gameOverScreen').classList.remove('active');
            document.getElementById('startScreen').classList.add('active');
            document.getElementById('timerDisplay').classList.remove('warning');
        }

        canvas.addEventListener('click', onCanvasClick);

        // Initial screen
        document.getElementById('startScreen').classList.add('active');
        updateItemsList();
    </script>
</body>
</html>
