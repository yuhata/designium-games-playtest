<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD BATTLE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #startScreen, #gameOverScreen, #clearScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        #startScreen {
            background: rgba(0, 0, 0, 0.9);
        }

        #gameOverScreen {
            background: rgba(200, 0, 0, 0.8);
        }

        #clearScreen {
            background: rgba(0, 150, 0, 0.8);
        }

        .screen-title {
            font-size: 48px;
            color: white;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .screen-button {
            padding: 15px 40px;
            font-size: 24px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            transition: background 0.3s;
        }

        .screen-button:hover {
            background: #3182ce;
        }

        #hud {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 16px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .hud-item {
            text-align: center;
        }

        #battleArea {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px;
            flex: 0.3;
        }

        .character-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px;
            border-radius: 10px;
            min-width: 150px;
        }

        .player-area {
            border: 3px solid #4299e1;
        }

        .enemy-area {
            border: 3px solid #e53e3e;
        }

        .character-label {
            font-size: 18px;
            color: white;
            font-weight: bold;
        }

        #handContainer {
            flex: 0.4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #hand {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            width: 100%;
        }

        .card {
            padding: 15px;
            border-radius: 8px;
            width: 120px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            font-size: 12px;
            color: white;
            user-select: none;
            border: 2px solid;
        }

        .card:hover:not(.card-disabled) {
            transform: translateY(-10px);
            filter: brightness(1.2);
        }

        .card-disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .card-name {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.2;
        }

        .card-cost {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .card-effect {
            font-size: 11px;
            line-height: 1.3;
        }

        #controls {
            display: flex;
            justify-content: center;
            padding: 20px;
            flex: 0.15;
            align-items: center;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }

        button:hover:not(:disabled) {
            background: #3182ce;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <div class="screen-title">CARD BATTLE</div>
        <button class="screen-button" onclick="startGame()">START</button>
    </div>
    <div id="gameOverScreen" style="display: none;">
        <div class="screen-title">GAME OVER</div>
        <button class="screen-button" onclick="retryGame()">RETRY</button>
    </div>
    <div id="clearScreen" style="display: none;">
        <div class="screen-title">CLEAR!</div>
        <button class="screen-button" onclick="retryGame()">RETRY</button>
    </div>
    <div id="gameContainer">
        <div id="hud">
            <div class="hud-item">
                <div>Player HP</div>
                <div><span id="playerHp">30</span>/<span id="playerHpMax">30</span></div>
            </div>
            <div class="hud-item">
                <div>Player Shield</div>
                <div><span id="playerShield">0</span></div>
            </div>
            <div class="hud-item">
                <div>Mana</div>
                <div><span id="mana">3</span>/<span id="manaMax">10</span></div>
            </div>
            <div class="hud-item">
                <div>Enemy HP</div>
                <div><span id="enemyHp">30</span>/<span id="enemyHpMax">30</span></div>
            </div>
            <div class="hud-item">
                <div>Enemy Shield</div>
                <div><span id="enemyShield">0</span></div>
            </div>
        </div>
        <div id="battleArea">
            <div class="character-area player-area">
                <div class="character-label">PLAYER</div>
            </div>
            <div class="character-area enemy-area">
                <div class="character-label">ENEMY</div>
            </div>
        </div>
        <div id="handContainer">
            <div id="hand"></div>
        </div>
        <div id="controls">
            <button id="endTurnButton" onclick="endTurn()">END TURN</button>
        </div>
    </div>

    <script>
        const config = {
            title: 'CARD BATTLE',
            bg_color: '#1a0a2e',
            card_bg: '#2d1b4a',
            card_border: '#9f7aea',
            player_color: '#4299e1',
            enemy_color: '#e53e3e',
            player_hp: 30,
            enemy_hp: 30,
            hand_size: 4,
            mana_per_turn: 3,
            mana_max: 10
        };

        const cardDatabase = [
            { id: 0, name: 'Normal Attack', cost: 1, type: 'attack', damage: 3 },
            { id: 1, name: 'Strong Attack', cost: 3, type: 'attack', damage: 8 },
            { id: 2, name: 'Pierce Attack', cost: 2, type: 'attack', damage: 5, pierceShield: true },
            { id: 3, name: 'Shield Wall', cost: 2, type: 'defense', shield: 5 },
            { id: 4, name: 'Full Guard', cost: 3, type: 'defense', shield: 10 },
            { id: 5, name: 'Small Heal', cost: 1, type: 'heal', recovery: 4 },
            { id: 6, name: 'Large Heal', cost: 3, type: 'heal', recovery: 10 },
            { id: 7, name: 'Dual Attack', cost: 4, type: 'attack', damage: 5, count: 2 }
        ];

        const gameState = {
            running: false,
            playerHP: config.player_hp,
            enemyHP: config.enemy_hp,
            playerShield: 0,
            enemyShield: 0,
            mana: config.mana_per_turn,
            maxMana: config.mana_max,
            hand: [],
            playerDeck: [],
            enemyDeck: [],
            isPlayerTurn: true
        };

        function initializeDeck(deck) {
            deck.length = 0;
            for (let card of cardDatabase) {
                for (let i = 0; i < 3; i++) {
                    deck.push(JSON.parse(JSON.stringify(card)));
                }
            }
            shuffleDeck(deck);
        }

        function shuffleDeck(deck) {
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
        }

        function drawCards(count) {
            gameState.hand = [];
            for (let i = 0; i < count && gameState.playerDeck.length > 0; i++) {
                gameState.hand.push(gameState.playerDeck.pop());
            }
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState.running = true;
            gameState.playerHP = config.player_hp;
            gameState.enemyHP = config.enemy_hp;
            gameState.playerShield = 0;
            gameState.enemyShield = 0;
            gameState.mana = config.mana_per_turn;
            gameState.maxMana = config.mana_max;
            gameState.isPlayerTurn = true;

            initializeDeck(gameState.playerDeck);
            initializeDeck(gameState.enemyDeck);

            drawCards(config.hand_size);
            updateUI();
            renderHand();
        }

        function retryGame() {
            gameState.running = false;
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('clearScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
        }

        function useCard(cardIndex) {
            if (!gameState.isPlayerTurn || !gameState.running) return;

            const card = gameState.hand[cardIndex];
            if (!card || card.cost > gameState.mana) return;

            gameState.mana -= card.cost;

            if (card.type === 'attack') {
                let totalDamage = card.damage * (card.count || 1);
                if (card.pierceShield) {
                    gameState.enemyHP -= totalDamage;
                } else {
                    let remaining = totalDamage;
                    if (gameState.enemyShield > 0) {
                        gameState.enemyShield -= remaining;
                        if (gameState.enemyShield < 0) {
                            remaining = -gameState.enemyShield;
                            gameState.enemyShield = 0;
                            gameState.enemyHP -= remaining;
                        }
                    } else {
                        gameState.enemyHP -= remaining;
                    }
                }
            } else if (card.type === 'defense') {
                gameState.playerShield += card.shield;
            } else if (card.type === 'heal') {
                gameState.playerHP = Math.min(gameState.playerHP + card.recovery, config.player_hp);
            }

            gameState.hand.splice(cardIndex, 1);
            updateUI();
            renderHand();

            if (gameState.enemyHP <= 0) {
                gameState.running = false;
                document.getElementById('clearScreen').style.display = 'flex';
                return;
            }
        }

        function endTurn() {
            if (!gameState.isPlayerTurn || !gameState.running) return;

            gameState.isPlayerTurn = false;
            setTimeout(enemyTurn, 1000);
        }

        function enemyTurn() {
            if (!gameState.running) return;

            const drawCount = Math.floor(Math.random() * 2) + 3;
            const enemyHand = [];
            for (let i = 0; i < drawCount && gameState.enemyDeck.length > 0; i++) {
                enemyHand.push(gameState.enemyDeck.pop());
            }

            let enemyMana = config.mana_per_turn;
            for (let card of enemyHand) {
                if (card.cost > enemyMana) continue;

                enemyMana -= card.cost;

                if (card.type === 'attack') {
                    let totalDamage = card.damage * (card.count || 1);
                    if (card.pierceShield) {
                        gameState.playerHP -= totalDamage;
                    } else {
                        let remaining = totalDamage;
                        if (gameState.playerShield > 0) {
                            gameState.playerShield -= remaining;
                            if (gameState.playerShield < 0) {
                                remaining = -gameState.playerShield;
                                gameState.playerShield = 0;
                                gameState.playerHP -= remaining;
                            }
                        } else {
                            gameState.playerHP -= remaining;
                        }
                    }
                } else if (card.type === 'defense') {
                    gameState.enemyShield += card.shield;
                } else if (card.type === 'heal') {
                    gameState.enemyHP = Math.min(gameState.enemyHP + card.recovery, config.enemy_hp);
                }
            }

            if (gameState.playerHP <= 0) {
                gameState.running = false;
                document.getElementById('gameOverScreen').style.display = 'flex';
                return;
            }

            gameState.isPlayerTurn = true;
            gameState.mana = Math.min(gameState.mana + config.mana_per_turn, config.mana_max);
            drawCards(config.hand_size);
            updateUI();
            renderHand();
        }

        function updateUI() {
            document.getElementById('playerHp').textContent = Math.max(0, gameState.playerHP);
            document.getElementById('playerHpMax').textContent = config.player_hp;
            document.getElementById('playerShield').textContent = Math.max(0, gameState.playerShield);
            document.getElementById('enemyHp').textContent = Math.max(0, gameState.enemyHP);
            document.getElementById('enemyHpMax').textContent = config.enemy_hp;
            document.getElementById('enemyShield').textContent = Math.max(0, gameState.enemyShield);
            document.getElementById('mana').textContent = gameState.mana;
            document.getElementById('manaMax').textContent = gameState.maxMana;
            document.getElementById('endTurnButton').disabled = !gameState.isPlayerTurn;
        }

        function renderHand() {
            const handDiv = document.getElementById('hand');
            handDiv.innerHTML = '';

            for (let i = 0; i < gameState.hand.length; i++) {
                const card = gameState.hand[i];
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.style.backgroundColor = config.card_bg;
                cardDiv.style.borderColor = config.card_border;

                if (card.cost > gameState.mana) {
                    cardDiv.classList.add('card-disabled');
                }

                const costColor = card.cost >= 3 ? '#d8b4fe' : card.cost >= 2 ? '#c4b5fd' : '#e0d5ff';
                cardDiv.innerHTML = '<div class="card-name">' + card.name + '</div>' +
                    '<div class="card-cost" style="color: ' + costColor + ';">Cost: ' + card.cost + '</div>' +
                    '<div class="card-effect">' + getCardEffect(card) + '</div>';

                cardDiv.onclick = function() { useCard(i); };
                handDiv.appendChild(cardDiv);
            }
        }

        function getCardEffect(card) {
            if (card.type === 'attack') {
                if (card.pierceShield) {
                    return 'Pierce ' + card.damage + 'dmg';
                } else if (card.count && card.count > 1) {
                    return card.damage + 'dmg x' + card.count;
                }
                return 'Attack ' + card.damage + 'dmg';
            } else if (card.type === 'defense') {
                return 'Shield +' + card.shield;
            } else if (card.type === 'heal') {
                return 'Heal +' + card.recovery;
            }
            return '';
        }

        document.body.style.background = config.bg_color;
    </script>
</body>
</html>
