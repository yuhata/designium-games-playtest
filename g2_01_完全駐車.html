<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完全駐車</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }
        canvas {
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            cursor: crosshair;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        // ═══════════════════════════════════════════
        // Global Debug Contract (γ-2 dragObject)
        // ═══════════════════════════════════════════
        window.__gameDebug = {
            drags: [],
            objects: [],
            metrics: { score: 0, progress: 0.0, remaining: 3, phase: "playing" },
            tapObject: function(id) { },
            dragObject: function(id) { }
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ═══════════════════════════════════════════
        // Game State
        // ═══════════════════════════════════════════
        const gameState = {
            phase: 'playing',
            score: 0,
            remaining: 3,
            parked: 0,
            totalSpots: 3,
            selectedCarId: null
        };

        const cars = [];
        const parkingSpots = [];

        // ═══════════════════════════════════════════
        // Game Objects
        // ═══════════════════════════════════════════
        class Car {
            constructor(id, x, y) {
                this.id = id;
                this.x = x;
                this.y = y;
                this.width = 60;
                this.height = 40;
                this.parked = false;
            }

            draw(ctx) {
                if (ctx === null || ctx === undefined) return;
                ctx.fillStyle = this.parked ? '#4CAF50' : '#FF6B6B';
                ctx.fillRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
                ctx.fillStyle = '#87CEEB';
                ctx.fillRect(this.x - this.width / 2 + 8, this.y - this.height / 2 + 8, 15, 15);
            }

            contains(px, py) {
                return px >= this.x - this.width / 2 && px <= this.x + this.width / 2 &&
                       py >= this.y - this.height / 2 && py <= this.y + this.height / 2;
            }
        }

        class ParkingSpot {
            constructor(id, x, y) {
                this.id = id;
                this.x = x;
                this.y = y;
                this.width = 70;
                this.height = 50;
                this.occupied = false;
            }

            draw(ctx) {
                if (ctx === null || ctx === undefined) return;
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]);
                ctx.strokeRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
                ctx.setLineDash([]);
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(this.id, this.x, this.y - this.height / 2 - 15);
            }

            contains(px, py) {
                return px >= this.x - this.width / 2 && px <= this.x + this.width / 2 &&
                       py >= this.y - this.height / 2 && py <= this.y + this.height / 2;
            }
        }

        // ═══════════════════════════════════════════
        // Core Game Logic
        // ═══════════════════════════════════════════
        function initGame() {
            cars.length = 0;
            parkingSpots.length = 0;
            gameState.phase = 'playing';
            gameState.score = 0;
            gameState.remaining = 3;
            gameState.parked = 0;
            gameState.selectedCarId = null;

            // Create parking spots (randomized Y position)
            const spotPositions = [
                { x: 150, y: 120 + Math.random() * 40 },
                { x: 400, y: 120 + Math.random() * 40 },
                { x: 650, y: 120 + Math.random() * 40 }
            ];
            spotPositions.forEach((pos, i) => {
                parkingSpots.push(new ParkingSpot(`spot_${i}`, pos.x, pos.y));
            });

            // Create cars (randomized starting position)
            const carPositions = [
                { x: 150 + Math.random() * 60, y: 350 + Math.random() * 60 },
                { x: 400 + Math.random() * 60, y: 350 + Math.random() * 60 },
                { x: 650 + Math.random() * 60, y: 350 + Math.random() * 60 }
            ];
            carPositions.forEach((pos, i) => {
                cars.push(new Car(`car_${i}`, Math.max(50, Math.min(750, pos.x)), Math.max(50, Math.min(480, pos.y))));
            });

            updateDebug();
        }

        function parkCar(carId) {
            const car = cars.find(c => c.id === carId);
            if (!car || car.parked || gameState.phase !== 'playing') return;

            let closestSpot = null;
            let minDist = Infinity;

            parkingSpots.forEach(spot => {
                if (!spot.occupied) {
                    const dist = Math.hypot(car.x - spot.x, car.y - spot.y);
                    if (dist < minDist) {
                        minDist = dist;
                        closestSpot = spot;
                    }
                }
            });

            if (closestSpot && minDist < 50) {
                car.parked = true;
                closestSpot.occupied = true;
                gameState.parked += 1;
                gameState.score += 10;

                if (gameState.parked === gameState.totalSpots) {
                    gameState.score += 100;
                    gameState.phase = 'win';
                }
            } else {
                gameState.remaining -= 1;
                if (gameState.remaining <= 0) {
                    gameState.phase = 'fail';
                }
            }

            updateDebug();
        }

        function updateDebug() {
            window.__gameDebug.drags = gameState.phase === 'playing'
                ? cars.filter(car => !car.parked).map(car => ({
                    id: car.id,
                    type: 'car',
                    enabled: true,
                    x: car.x,
                    y: car.y
                }))
                : [];

            window.__gameDebug.objects = [
                ...cars.map(car => ({
                    id: car.id,
                    type: 'car',
                    x: Math.round(car.x),
                    y: Math.round(car.y),
                    enabled: !car.parked
                })),
                ...parkingSpots.map(spot => ({
                    id: spot.id,
                    type: 'spot',
                    x: Math.round(spot.x),
                    y: Math.round(spot.y),
                    enabled: !spot.occupied
                }))
            ];

            window.__gameDebug.metrics = {
                score: gameState.score,
                progress: gameState.parked / gameState.totalSpots,
                remaining: gameState.remaining,
                phase: gameState.phase
            };
        }

        // ═══════════════════════════════════════════
        // Debug API Implementation (必須コントラクト)
        // ═══════════════════════════════════════════
        window.__gameDebug.tapObject = function(id) {
            if (gameState.phase === 'playing') {
                parkCar(id);
            }
        };

        window.__gameDebug.dragObject = function(id) {
            const car = cars.find(c => c.id === id);
            if (!car || car.parked || gameState.phase !== 'playing') return;

            let closestSpot = null;
            let minDist = Infinity;
            parkingSpots.forEach(spot => {
                if (!spot.occupied) {
                    const dist = Math.hypot(car.x - spot.x, car.y - spot.y);
                    if (dist < minDist) {
                        minDist = dist;
                        closestSpot = spot;
                    }
                }
            });

            if (closestSpot) {
                car.x = closestSpot.x;
                car.y = closestSpot.y;
                parkCar(id);
            }

            updateDebug();
        };

        // ═══════════════════════════════════════════
        // Canvas Event Handlers (P2: getBoundingClientRect必須)
        // ═══════════════════════════════════════════
        canvas.addEventListener('mousedown', (e) => {
            if (gameState.phase !== 'playing') return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            cars.forEach(car => {
                if (car.contains(x, y) && !car.parked) {
                    gameState.selectedCarId = car.id;
                }
            });
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!gameState.selectedCarId || gameState.phase !== 'playing') return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const car = cars.find(c => c.id === gameState.selectedCarId);
            if (car && !car.parked) {
                car.x = Math.max(50, Math.min(canvas.width - 50, x));
                car.y = Math.max(50, Math.min(canvas.height - 120, y));
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (gameState.phase !== 'playing') {
                gameState.selectedCarId = null;
                return;
            }

            if (gameState.selectedCarId) {
                parkCar(gameState.selectedCarId);
                gameState.selectedCarId = null;
            }
        });

        canvas.addEventListener('click', (e) => {
            if (gameState.phase === 'win' || gameState.phase === 'fail') {
                initGame();
                return;
            }
        });

        // ═══════════════════════════════════════════
        // Draw Function (P5: canvas範囲内に配置)
        // ═══════════════════════════════════════════
        function draw() {
            if (ctx === null || ctx === undefined) return;

            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#333';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('完全駐車', canvas.width / 2, 35);

            ctx.font = '13px Arial';
            ctx.fillStyle = '#666';
            ctx.fillText('車をドラッグして駐車スペースに正確に配置してください', canvas.width / 2, 55);

            parkingSpots.forEach(spot => spot.draw(ctx));
            cars.forEach(car => car.draw(ctx));

            ctx.fillStyle = '#333';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'left';
            if (ctx !== null && ctx !== undefined) {
                ctx.fillText(`スコア: ${gameState.score}`, 20, canvas.height - 50);
                ctx.fillText(`駐車済み: ${gameState.parked}/${gameState.totalSpots}`, 20, canvas.height - 30);
                ctx.fillText(`ミス: ${3 - gameState.remaining}/${3}`, canvas.width - 200, canvas.height - 35);
            }

            // ═══════════════════════════════════════════
            // Win演出 (固有ビジュアル)
            // ═══════════════════════════════════════════
            if (gameState.phase === 'win') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 56px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🎉 完全駐車成功！', canvas.width / 2, canvas.height / 2 - 60);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 32px Arial';
                ctx.fillText(`最終スコア: ${gameState.score}`, canvas.width / 2, canvas.height / 2 + 20);

                ctx.font = '18px Arial';
                ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height / 2 + 80);
            }

            // ═══════════════════════════════════════════
            // Fail演出 (固有ビジュアル)
            // ═══════════════════════════════════════════
            if (gameState.phase === 'fail') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#FF6B6B';
                ctx.font = 'bold 56px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('❌ ゲームオーバー', canvas.width / 2, canvas.height / 2 - 60);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 32px Arial';
                ctx.fillText(`スコア: ${gameState.score}`, canvas.width / 2, canvas.height / 2 + 20);

                ctx.font = '18px Arial';
                ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height / 2 + 80);
            }
        }

        // ═══════════════════════════════════════════
        // Game Loop
        // ═══════════════════════════════════════════
        function gameLoop() {
            draw();
            updateDebug();
            requestAnimationFrame(gameLoop);
        }

        // ═══════════════════════════════════════════
        // Startup (P12: 2秒以内にplaying開始、P3: win判定タイミング)
        // ═══════════════════════════════════════════
        initGame();
        gameLoop();
    </script>
</body>
</html>
