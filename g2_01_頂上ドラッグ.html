<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>頂上ドラッグ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Arial', sans-serif;
    }
    #gameContainer {
      position: relative;
      width: 100%;
      max-width: 800px;
      aspect-ratio: 9 / 16;
      background: #000;
      border: 4px solid #fff;
      overflow: hidden;
    }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
  </div>

  <script>
    // ==================== γ-1 デバッグコントラクト ====================
    window.__gameDebug = {
      objects: [],
      metrics: { score: 0, progress: 0.0, remaining: 0, phase: "title" },
      tapObject: function(id) { /* オーバーライド対象 */ }
    };

    // Canvas初期化
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;

    // 音声コンテキスト（警告音生成用）
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();

    // ゲーム状態
    const gameState = {
      phase: 'title',
      rpm: 2000,
      maxRpm: 6000,
      temp: 20,
      rank: 10,
      enemyRank: 10,
      playerGear: 3,
      enemyRpm: 3000,
      shiftCount: 0,
      bestRank: Infinity,
      bestScore: 0,
      startTime: 0,
      elapsedTime: 0,
      prevRank: 10,
      rankReversed: false,
      sensibilityMult: 1.0
    };

    // Best記録ロード
    function loadBestRecord() {
      const best = localStorage.getItem('topDragBest');
      if (best) {
        const data = JSON.parse(best);
        gameState.bestRank = data.rank;
        gameState.bestScore = data.score;
      }
    }

    function saveBestRecord() {
      if (gameState.rank < gameState.bestRank) {
        gameState.bestRank = gameState.rank;
        gameState.bestScore = gameState.shiftCount;
        localStorage.setItem('topDragBest', JSON.stringify({ 
          rank: gameState.bestRank, 
          score: gameState.bestScore 
        }));
      }
    }

    loadBestRecord();

    // ==================== updateDebug ====================
    function updateDebug() {
      const shiftObjects = [];
      for (let i = 1; i <= 5; i++) {
        const x = (i - 1) * (canvas.width / 5);
        const y = canvas.height * 0.7;
        const w = canvas.width / 5;
        const h = canvas.height * 0.3;
        shiftObjects.push({
          id: `shift_gear_${i}`,
          enabled: gameState.phase === 'playing',
          matchId: null,
          x, y, w, h,
          active: gameState.playerGear === i,
          rpmDelta: (i - 3) * 500
        });
      }

      if (gameState.phase === 'title') {
        shiftObjects.push({ id: 'start', enabled: true, matchId: null });
      }

      window.__gameDebug.objects = shiftObjects;
      window.__gameDebug.metrics = {
        score: gameState.shiftCount,
        progress: Math.max(0, 1 - gameState.temp / 100),
        remaining: 0,
        phase: gameState.phase
      };
    }

    // ==================== tapObject 実装 ====================
    window.__gameDebug.tapObject = function(id) {
      if (id === 'start') {
        startGame();
        return;
      }
      if (id.startsWith('shift_gear_')) {
        const gear = parseInt(id.split('_').pop(), 10);
        selectGear(gear);
      }
    };

    // ==================== ゲーム開始 ====================
    function startGame() {
      gameState.phase = 'playing';
      gameState.rpm = 2000;
      gameState.temp = 20;
      gameState.rank = 10;
      gameState.enemyRank = 10;
      gameState.playerGear = 3;
      gameState.enemyRpm = 3000;
      gameState.shiftCount = 0;
      gameState.startTime = Date.now();
      gameState.sensibilityMult = 1.0;
      gameState.rankReversed = false;
      updateDebug();
    }

    // ==================== ギア選択 ====================
    function selectGear(gear) {
      if (gameState.phase !== 'playing' || gear < 1 || gear > 5) return;

      const prevGear = gameState.playerGear;
      gameState.playerGear = gear;

      if (prevGear === gear) return;

      const rpmDelta = (gear - prevGear) * 500;
      gameState.rpm += rpmDelta;
      gameState.rpm = Math.max(1000, Math.min(gameState.maxRpm, gameState.rpm));
      gameState.temp += Math.abs(rpmDelta) * 0.3;
      gameState.shiftCount++;

      updateDebug();
    }

    // 警告音発火
    function playWarningSound() {
      try {
        const now = audioContext.currentTime;
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.frequency.value = 800;
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.2);
      } catch (e) { /* 音声コンテキスト未対応 */ }
    }

    // ==================== ゲームループ ====================
    function update() {
      if (gameState.phase !== 'playing') return;

      gameState.elapsedTime = (Date.now() - gameState.startTime) / 1000;

      // RPM自動減速
      gameState.rpm *= 0.98;
      gameState.rpm = Math.max(1000, gameState.rpm);

      // 敵RPM変化
      gameState.enemyRpm = 3000 + Math.sin(gameState.elapsedTime * 0.4) * 1500;
      if (gameState.temp >= 60) {
        gameState.enemyRpm *= 1.3;
      }
      if (gameState.temp >= 90) {
        gameState.enemyRpm *= 1.5;
      }

      // RPMクランプ（temp >= 60）
      if (gameState.temp >= 60) {
        const clampFactor = (100 - gameState.temp) / 100;
        gameState.rpm = Math.min(gameState.rpm, gameState.maxRpm * clampFactor);
      }

      // タップ感度低下（temp >= 90）
      if (gameState.temp >= 90) {
        gameState.sensibilityMult = 0.7;
      }

      // 順位更新
      gameState.prevRank = gameState.rank;
      if (gameState.rpm > gameState.enemyRpm && gameState.temp < 80) {
        gameState.rank -= 0.01;
      } else {
        gameState.rank += 0.005;
      }
      gameState.enemyRank += 0.008;

      // 順位逆転検出
      if (gameState.prevRank > gameState.enemyRank && gameState.rank <= gameState.enemyRank) {
        if (!gameState.rankReversed) {
          gameState.rankReversed = true;
          playWarningSound();
          if (navigator.vibrate) navigator.vibrate(200);
        }
      } else if (gameState.rank > gameState.enemyRank) {
        gameState.rankReversed = false;
      }

      // 温度上昇
      gameState.temp += 0.15;

      // Win/Fail判定
      if (gameState.rank <= 1) {
        gameState.phase = 'win';
        saveBestRecord();
      } else if (gameState.temp >= 100) {
        gameState.phase = 'fail';
      }

      updateDebug();
    }

    // ==================== 描画 ====================
    function draw() {
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (gameState.phase === 'title') drawTitle();
      else if (gameState.phase === 'playing') drawGame();
      else if (gameState.phase === 'win') drawWin();
      else if (gameState.phase === 'fail') drawFail();
    }

    function drawTitle() {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('頂上ドラッグ', canvas.width / 2, canvas.height * 0.25);

      ctx.font = '16px Arial';
      ctx.fillStyle = '#ccc';
      ctx.fillText('下のシフトゾーン(1-5)をタップして', canvas.width / 2, canvas.height * 0.4);
      ctx.fillText('ギアを変更し、RPMを高めて順位を上げよう！', canvas.width / 2, canvas.height * 0.44);
      ctx.fillText('ただし温度(Temp)が100°Cに達するとゲームオーバー', canvas.width / 2, canvas.height * 0.48);

      if (gameState.bestRank !== Infinity) {
        ctx.fillStyle = '#ffcc00';
        ctx.font = '18px Arial';
        ctx.fillText(`🏆 Best Rank: ${gameState.bestRank.toFixed(1)} (${gameState.bestScore} shifts)`, 
          canvas.width / 2, canvas.height * 0.6);
      }

      ctx.fillStyle = '#00aa00';
      ctx.fillRect(canvas.width * 0.25, canvas.height * 0.75, canvas.width * 0.5, 70);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 36px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('START', canvas.width / 2, canvas.height * 0.75 + 50);
    }

    function drawGame() {
      // 赤フラッシュ（temp >= 90）
      if (gameState.temp >= 90) {
        ctx.fillStyle = `rgba(255, 0, 0, ${0.15 * (gameState.temp - 90) / 10})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      // 相対位置ゲージ
      ctx.fillStyle = '#333';
      ctx.fillRect(15, 15, canvas.width - 30, 35);
      ctx.fillStyle = gameState.rank < gameState.enemyRank ? '#00ff00' : '#ff6600';
      const gaugeW = (canvas.width - 30) * Math.max(0, Math.min(1, (10 - gameState.rank) / 20));
      ctx.fillRect(15, 15, gaugeW, 35);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.strokeRect(15, 15, canvas.width - 30, 35);

      // 数値UI
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'left';
      ctx.font = '20px Arial';
      ctx.fillText(`Rank: ${gameState.rank.toFixed(1)}`, 20, 80);
      ctx.fillText(`RPM: ${Math.floor(gameState.rpm)}`, 20, 110);
      ctx.fillText(`Temp: ${Math.floor(gameState.temp)}°C`, 20, 140);
      ctx.fillText(`Gear: ${gameState.playerGear}`, 20, 170);
      ctx.fillText(`Shifts: ${gameState.shiftCount}`, 20, 200);

      // 敵情報
      ctx.fillStyle = '#ff6666';
      ctx.font = '16px Arial';
      ctx.fillText(`Enemy Rank: ${gameState.enemyRank.toFixed(1)}`, 20, 240);

      // シフトゾーン
      for (let i = 1; i <= 5; i++) {
        const x = (i - 1) * (canvas.width / 5);
        const y = canvas.height * 0.7;
        const w = canvas.width / 5;
        const h = canvas.height * 0.3;
        const isActive = gameState.playerGear === i;

        ctx.fillStyle = isActive ? '#00dd00' : '#333';
        ctx.fillRect(x, y, w, h);

        ctx.strokeStyle = isActive ? '#fff' : '#666';
        ctx.lineWidth = isActive ? 3 : 1;
        ctx.strokeRect(x, y, w, h);

        ctx.fillStyle = isActive ? '#000' : '#fff';
        ctx.font = 'bold 40px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(i), x + w / 2, y + h / 2);
      }

      // 操作説明
      ctx.fillStyle = '#aaa';
      ctx.font = '13px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('下のギア(1～5)をタップしてシフト', canvas.width / 2, canvas.height * 0.67);
    }

    function drawWin() {
      ctx.fillStyle = 'rgba(0, 200, 0, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#00ff00';
      ctx.font = 'bold 60px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('🏆 WIN! 🏆', canvas.width / 2, canvas.height * 0.3);

      ctx.fillStyle = '#fff';
      ctx.font = '22px Arial';
      ctx.fillText(`Final Rank: ${gameState.rank.toFixed(1)}`, canvas.width / 2, canvas.height * 0.45);
      ctx.fillText(`Temperature: ${Math.floor(gameState.temp)}°C`, canvas.width / 2, canvas.height * 0.52);
      ctx.fillText(`Total Shifts: ${gameState.shiftCount}`, canvas.width / 2, canvas.height * 0.59);

      if (gameState.rank === gameState.bestRank) {
        ctx.fillStyle = '#ffff00';
        ctx.font = 'bold 24px Arial';
        ctx.fillText('✨ NEW BEST! ✨', canvas.width / 2, canvas.height * 0.7);
      }

      ctx.fillStyle = '#0066ff';
      ctx.fillRect(canvas.width * 0.25, canvas.height * 0.8, canvas.width * 0.5, 70);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 32px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('RETRY', canvas.width / 2, canvas.height * 0.8 + 50);
    }

    function drawFail() {
      ctx.fillStyle = 'rgba(255, 0, 0, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#ff3333';
      ctx.font = 'bold 60px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('💥 OVERHEAT! 💥', canvas.width / 2, canvas.height * 0.3);

      ctx.fillStyle = '#fff';
      ctx.font = '22px Arial';
      ctx.fillText(`Final Rank: ${gameState.rank.toFixed(1)}`, canvas.width / 2, canvas.height * 0.45);
      ctx.fillText(`Temperature: ${Math.floor(gameState.temp)}°C`, canvas.width / 2, canvas.height * 0.52);
      ctx.fillText(`Total Shifts: ${gameState.shiftCount}`, canvas.width / 2, canvas.height * 0.59);

      ctx.fillStyle = '#0066ff';
      ctx.fillRect(canvas.width * 0.25, canvas.height * 0.8, canvas.width * 0.5, 70);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 32px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('RETRY', canvas.width / 2, canvas.height * 0.8 + 50);
    }

    // ==================== イベント処理 ====================
    function getClickPos(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    canvas.addEventListener('click', (e) => {
      const pos = getClickPos(e);

      if (gameState.phase === 'title') {
        if (pos.x > canvas.width * 0.25 && pos.x < canvas.width * 0.75 &&
            pos.y > canvas.height * 0.75 && pos.y < canvas.height * 0.75 + 70) {
          window.__gameDebug.tapObject('start');
        }
      } else if (gameState.phase === 'playing') {
        if (pos.y >= canvas.height * 0.7) {
          const gearIdx = Math.floor(pos.x / (canvas.width / 5)) + 1;
          window.__gameDebug.tapObject(`shift_gear_${gearIdx}`);
        }
      } else if (gameState.phase === 'win' || gameState.phase === 'fail') {
        if (pos.x > canvas.width * 0.25 && pos.x < canvas.width * 0.75 &&
            pos.y > canvas.height * 0.8 && pos.y < canvas.height * 0.8 + 70) {
          startGame();
        }
      }
    });

    canvas.addEventListener('mousedown', (e) => { /* マウスダウン処理 */ });
    canvas.addEventListener('mousemove', (e) => { /* マウスムーブ処理 */ });
    canvas.addEventListener('mouseup', (e) => { /* マウスアップ処理 */ });

    // ==================== ゲームループ ====================
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    updateDebug();
    gameLoop();
  </script>
</body>
</html>
