<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スクラッチ運命</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 100vw; 
      height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      font-family: Arial, sans-serif; 
    }
    canvas { 
      display: block; 
      cursor: crosshair; 
      background: #fff; 
      border-radius: 10px; 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); 
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ゲーム状態
    let gameState = {
      phase: 'loading',
      scratchZones: [],
      score: 0,
      winPattern: null,
      zoneEmojis: [null, null, null],
      zoneMasks: [null, null, null],
    };

    // デバッグインターフェース
    window.__gameDebug = {
      dragTargets: [],
      dragFill: function(id) {
        const parts = id.split('-');
        if (parts[0] === 'cell') {
          const zoneIdx = parseInt(parts[1]);
          const cellIdx = parseInt(parts[2]);
          if (zoneIdx >= 0 && zoneIdx < 3 && cellIdx >= 0 && cellIdx < 16) {
            if (gameState.zoneMasks[zoneIdx] && !gameState.zoneMasks[zoneIdx][cellIdx]) {
              gameState.zoneMasks[zoneIdx][cellIdx] = true;
              window.__gameDebug.metrics.strokes++;
              updateDebug();
            }
          }
        }
      },
      objects: [],
      metrics: {
        rate: 0.0,
        strokes: 0,
        phase: 'playing'
      }
    };

    // ゲーム初期化
    function initGame() {
      gameState.phase = 'playing';
      gameState.score = 0;
      gameState.winPattern = ['🍎', '🍋', '🍒', '⭐'][Math.floor(Math.random() * 4)];
      window.__gameDebug.metrics.strokes = 0;

      // 当選パターン決定（40%の確率で3つ揃い可能）
      const isWinPossible = Math.random() < 0.4;

      if (isWinPossible) {
        // 3つ揃い確定
        gameState.zoneEmojis[0] = gameState.winPattern;
        gameState.zoneEmojis[1] = gameState.winPattern;
        gameState.zoneEmojis[2] = gameState.winPattern;
      } else {
        // バラバラ
        const emojis = ['🍎', '🍋', '🍒', '⭐'];
        for (let i = 0; i < 3; i++) {
          gameState.zoneEmojis[i] = emojis[Math.floor(Math.random() * 4)];
        }
      }

      // マスク初期化
      for (let z = 0; z < 3; z++) {
        gameState.zoneMasks[z] = new Array(16).fill(false);
      }

      gameState.scratchZones = [];

      // ゾーン配置
      for (let z = 0; z < 3; z++) {
        const zoneX = 80 + z * 240;
        const zoneY = 200;
        const zoneWidth = 200;
        const zoneHeight = 200;

        gameState.scratchZones.push({
          index: z,
          x: zoneX,
          y: zoneY,
          width: zoneWidth,
          height: zoneHeight,
          emoji: gameState.zoneEmojis[z],
          cells: []
        });

        // セル生成（4x4グリッド）
        const cellWidth = zoneWidth / 4;
        const cellHeight = zoneHeight / 4;
        for (let row = 0; row < 4; row++) {
          for (let col = 0; col < 4; col++) {
            const cellIdx = row * 4 + col;
            gameState.scratchZones[z].cells.push({
              id: `cell-${z}-${cellIdx}`,
              x: zoneX + col * cellWidth,
              y: zoneY + row * cellHeight,
              width: cellWidth,
              height: cellHeight,
              zoneIdx: z,
              cellIdx: cellIdx
            });
          }
        }
      }

      updateDebug();
    }

    function updateDebug() {
      // dragTargets: 削り可能な未削却セルのみ
      const allCells = [];
      for (let z = 0; z < 3; z++) {
        if (!gameState.zoneMasks[z]) continue;
        for (let cellIdx = 0; cellIdx < 16; cellIdx++) {
          if (!gameState.zoneMasks[z][cellIdx]) {
            const zone = gameState.scratchZones[z];
            const cell = zone.cells[cellIdx];
            allCells.push({
              id: `cell-${z}-${cellIdx}`,
              x: cell.x,
              y: cell.y,
              width: cell.width,
              height: cell.height,
              enabled: true
            });
          }
        }
      }
      window.__gameDebug.dragTargets = allCells;

      // rate計算（削却度）
      let totalCells = 3 * 16;
      let revealedCells = 0;
      for (let z = 0; z < 3; z++) {
        if (gameState.zoneMasks[z]) {
          revealedCells += gameState.zoneMasks[z].filter(m => m).length;
        }
      }
      window.__gameDebug.metrics.rate = revealedCells / totalCells;
      window.__gameDebug.metrics.phase = gameState.phase;

      // 全削却完了判定
      if (revealedCells === totalCells && gameState.phase === 'playing') {
        checkWinCondition();
      }
    }

    function checkWinCondition() {
      if (gameState.phase !== 'playing') return;

      // 3つの絵柄が当選絵柄と一致するか
      const matchCount = gameState.zoneEmojis.filter(e => e === gameState.winPattern).length;

      if (matchCount === 3) {
        // 当選！
        gameState.score += 500;
        gameState.phase = 'win';
      } else {
        // 外れ
        gameState.phase = 'gameover';
      }

      window.__gameDebug.metrics.phase = gameState.phase;
    }

    // マウスイベント処理
    function handleInput(e) {
      if (gameState.phase !== 'playing') return;

      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      for (let z = 0; z < gameState.scratchZones.length; z++) {
        const zone = gameState.scratchZones[z];
        for (let cell of zone.cells) {
          if (x >= cell.x && x < cell.x + cell.width &&
              y >= cell.y && y < cell.y + cell.height &&
              gameState.zoneMasks[z] && !gameState.zoneMasks[z][cell.cellIdx]) {
            gameState.zoneMasks[z][cell.cellIdx] = true;
            window.__gameDebug.metrics.strokes++;
            updateDebug();
          }
        }
      }
    }

    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('mousemove', handleInput);
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const mouseEvent = new MouseEvent('mousedown', {
        clientX: touch.clientX,
        clientY: touch.clientY
      });
      handleInput(mouseEvent);
    });
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const mouseEvent = new MouseEvent('mousemove', {
        clientX: touch.clientX,
        clientY: touch.clientY
      });
      handleInput(mouseEvent);
    });

    // tapObject デバッグメソッド
    window.__gameDebug.tapObject = function(id) {
      if (gameState.phase === 'win' || gameState.phase === 'gameover') {
        initGame();
        return;
      }
      
      if (gameState.phase === 'playing') {
        const parts = id.split('-');
        if (parts[0] === 'cell') {
          const zoneIdx = parseInt(parts[1]);
          const cellIdx = parseInt(parts[2]);
          if (zoneIdx >= 0 && zoneIdx < 3 && cellIdx >= 0 && cellIdx < 16) {
            if (gameState.zoneMasks[zoneIdx] && !gameState.zoneMasks[zoneIdx][cellIdx]) {
              gameState.zoneMasks[zoneIdx][cellIdx] = true;
              window.__gameDebug.metrics.strokes++;
              updateDebug();
            }
          }
        }
      }
    };

    // 描画関数
    function draw() {
      // 背景
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // タイトル
      ctx.fillStyle = '#333333';
      ctx.font = 'bold 36px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('スクラッチ運命', canvas.width / 2, 60);

      // 操作説明
      ctx.font = '14px Arial';
      ctx.fillStyle = '#666666';
      ctx.textAlign = 'left';
      ctx.fillText('スクラッチエリアをドラッグして削ってください', 20, 110);
      ctx.fillText(`スコア: ${gameState.score}点`, 20, 140);

      if (gameState.phase === 'playing') {
        ctx.font = '12px Arial';
        ctx.fillStyle = '#999999';
        ctx.fillText(`当選絵柄: ${gameState.winPattern}`, 20, 165);
      }

      // ゾーン描画
      for (let z = 0; z < gameState.scratchZones.length; z++) {
        const zone = gameState.scratchZones[z];

        // ゾーン背景
        ctx.fillStyle = '#f5f5f5';
        ctx.fillRect(zone.x, zone.y, zone.width, zone.height);
        ctx.strokeStyle = '#cccccc';
        ctx.lineWidth = 2;
        ctx.strokeRect(zone.x, zone.y, zone.width, zone.height);

        // 絵柄表示（露出度に応じて）
        const revealedCount = gameState.zoneMasks[z] ? gameState.zoneMasks[z].filter(m => m).length : 0;
        const revealRate = revealedCount / 16;
        const fontSize = Math.max(40, Math.floor(110 * revealRate));
        ctx.font = `${fontSize}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(1, 1 - revealRate * 0.7)})`;
        if (zone.emoji) {
          ctx.fillText(zone.emoji, zone.x + zone.width / 2, zone.y + zone.height / 2);
        }

        // スクラッチセル描画
        if (gameState.zoneMasks[z]) {
          for (let row = 0; row < 4; row++) {
            for (let col = 0; col < 4; col++) {
              const cellIdx = row * 4 + col;
              if (!gameState.zoneMasks[z][cellIdx]) {
                const cell = zone.cells[cellIdx];
                ctx.fillStyle = '#c0c0c0';
                ctx.fillRect(cell.x, cell.y, cell.width, cell.height);
                ctx.strokeStyle = '#999999';
                ctx.lineWidth = 1;
                ctx.strokeRect(cell.x, cell.y, cell.width, cell.height);
              }
            }
          }
        }
      }

      // WIN画面
      if (gameState.phase === 'win') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 52px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🎉 当選！ 🎉', canvas.width / 2, canvas.height / 2 - 80);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = '28px Arial';
        ctx.fillText('3つ揃った！', canvas.width / 2, canvas.height / 2 - 10);

        ctx.font = '32px Arial';
        ctx.fillText('+500点！', canvas.width / 2, canvas.height / 2 + 50);

        ctx.font = '24px Arial';
        ctx.fillText(`合計スコア: ${gameState.score}点`, canvas.width / 2, canvas.height / 2 + 110);

        ctx.font = '16px Arial';
        ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height / 2 + 160);
      } 
      // GAMEOVER画面
      else if (gameState.phase === 'gameover') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#FF6B6B';
        ctx.font = 'bold 52px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ハズレ...', canvas.width / 2, canvas.height / 2 - 60);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = '24px Arial';
        ctx.fillText(`スコア: ${gameState.score}点`, canvas.width / 2, canvas.height / 2 + 30);

        ctx.font = '16px Arial';
        ctx.fillText('クリックでリスタート', canvas.width / 2, canvas.height / 2 + 100);
      }
    }

    // ゲームループ
    function gameLoop() {
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ゲーム開始（2秒後）
    setTimeout(() => {
      initGame();
      gameLoop();
    }, 2000);

    // リスタート（クリック）
    canvas.addEventListener('click', (e) => {
      if (gameState.phase === 'win' || gameState.phase === 'gameover') {
        initGame();
      }
    });
  </script>
</body>
</html>
