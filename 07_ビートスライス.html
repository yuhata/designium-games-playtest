<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビートスライス</title>
  <style>
    body {
      margin: 0;
      padding: 10px;
      background: #0a0a0a;
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    canvas {
      border: 3px solid #00ffff;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
      display: block;
      margin-bottom: 15px;
      cursor: crosshair;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    }
    #uiContainer {
      color: #00ffff;
      font-size: 16px;
      text-align: center;
      min-height: 80px;
      font-weight: bold;
    }
    #score, #misses, #timer, #instructions {
      display: inline-block;
      margin: 5px 15px;
      padding: 5px 10px;
      border: 1px solid #00ffff;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<!--GAME_SPEC
{
  "win_condition": "slice_count >= 20",
  "fail_condition": "miss_count >= 8 && elapsed_seconds > 30",
  "input_types": ["mousedown", "mousemove", "mouseup", "click"],
  "state_vars": ["slice_count", "miss_count", "bpm_sync", "sync_combo"],
  "core_loop": "BPM周期 → 飛来物スポーン → スワイプ入力 → BPM同期判定 → パーティクル爆発",
  "clear_trigger": "slice_count >= 20",
  "gameover_trigger": "miss_count >= 8 AND elapsed_seconds >= 30"
}
-->

<canvas id="gameCanvas" width="800" height="600"></canvas>
<div id="uiContainer">
  <div><span id="score">スライス: 0</span> <span id="misses">ミス: 0</span> <span id="timer">時間: 0s</span></div>
  <div id="instructions">マウスドラッグでスワイプ | クリックでスタート</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// DOM UI elements
const scoreEl = document.getElementById('score');
const missesEl = document.getElementById('misses');
const timerEl = document.getElementById('timer');
const instructionsEl = document.getElementById('instructions');

// Game state
const state = {
  phase: 'init', // init, playing, win, fail
  slice_count: 0,
  miss_count: 0,
  bpm: 120,
  beatDuration: 500,
  syncWindow: 150,
  startTime: null,
  objects: [],
  particles: [],
  nextSpawnTime: 0,
  sync_combo: 0,
  last_sync_time: 0,
  flash_alpha: 0
};

// Input tracking
const input = {
  isMouseDown: false,
  startX: 0,
  startY: 0,
  currentX: 0,
  currentY: 0,
  startTime: 0
};

function init() {
  state.phase = 'playing';
  state.slice_count = 0;
  state.miss_count = 0;
  state.sync_combo = 0;
  state.startTime = Date.now();
  state.objects = [];
  state.particles = [];
  state.nextSpawnTime = Date.now();
  state.flash_alpha = 0;
}

function getElapsed() {
  if (!state.startTime) return 0;
  return (Date.now() - state.startTime) / 1000;
}

function getCurrentBeatPhase() {
  if (!state.startTime) return 0;
  const elapsed = Date.now() - state.startTime;
  return (elapsed % state.beatDuration) / state.beatDuration;
}

function getTimeToBeat() {
  const phase = getCurrentBeatPhase();
  const distToBeat = phase < 0.5 ? phase : (1 - phase);
  return distToBeat * state.beatDuration;
}

function updateSpawning() {
  if (state.phase !== 'playing') return;
  
  if (Date.now() >= state.nextSpawnTime) {
    const x = 100 + Math.random() * 600;
    state.objects.push({
      x: x,
      y: 50,
      vx: 0,
      vy: (550 - 50) / 2000,
      width: 50,
      height: 50,
      createdTime: Date.now(),
      sliced: false,
      missed: false
    });
    state.nextSpawnTime = Date.now() + state.beatDuration * 4;
  }
}

function updateObjects() {
  const now = Date.now();
  const elapsed = getElapsed();
  
  for (let i = state.objects.length - 1; i >= 0; i--) {
    const obj = state.objects[i];
    const timeLived = now - obj.createdTime;
    const progress = timeLived / 2000;
    
    obj.y = 50 + (550 - 50) * Math.min(progress, 1);
    
    // Miss detection (after 30 seconds)
    if (!obj.sliced && !obj.missed && obj.y > 550 && elapsed > 30) {
      obj.missed = true;
      state.miss_count++;
    }
    
    if (obj.y > 650) {
      state.objects.splice(i, 1);
    }
  }
}

function createParticles(x, y, isSynced) {
  const count = isSynced ? 25 : 15;
  const color = isSynced ? '#00ffff' : '#ffffff';
  
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count;
    const speed = 2 + Math.random() * 3;
    state.particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color: color,
      size: 3 + Math.random() * 5
    });
  }
  
  if (isSynced) {
    state.flash_alpha = 0.8;
  }
}

function updateParticles() {
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.035;
    
    if (p.life <= 0) {
      state.particles.splice(i, 1);
    }
  }
  
  state.flash_alpha *= 0.92;
}

function handleSwipe() {
  if (state.phase !== 'playing') return;
  
  const dx = input.currentX - input.startX;
  const dy = input.currentY - input.startY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const timeDelta = Date.now() - input.startTime;
  
  if (dist < 50 || timeDelta > 500) return;
  
  const centerX = (input.startX + input.currentX) / 2;
  const centerY = (input.startY + input.currentY) / 2;
  const timeToBeat = getTimeToBeat();
  const isSynced = timeToBeat < state.syncWindow;
  
  for (let i = state.objects.length - 1; i >= 0; i--) {
    const obj = state.objects[i];
    if (obj.sliced) continue;
    
    const hitDist = Math.hypot(centerX - (obj.x + obj.width/2), centerY - (obj.y + obj.height/2));
    
    if (hitDist < 60) {
      obj.sliced = true;
      state.slice_count++;
      
      if (isSynced) {
        state.sync_combo++;
        state.last_sync_time = Date.now();
      } else {
        state.sync_combo = 0;
      }
      
      createParticles(obj.x + obj.width/2, obj.y + obj.height/2, isSynced);
      state.objects.splice(i, 1);
      break;
    }
  }
}

function gameLogic() {
  if (state.phase !== 'playing') return;
  
  updateSpawning();
  updateObjects();
  updateParticles();
  
  const elapsed = getElapsed();
  
  if (state.slice_count >= 20) {
    state.phase = 'win';
  } else if (state.miss_count >= 8 && elapsed > 30) {
    state.phase = 'fail';
  }
}

function draw() {
  // Clear with semi-transparent overlay
  ctx.fillStyle = 'rgba(10, 14, 39, 0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Grid background
  ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
  ctx.lineWidth = 1;
  for (let y = 0; y < canvas.height; y += 50) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
  
  if (state.phase === 'init') {
    drawInit();
  } else if (state.phase === 'playing') {
    drawPlaying();
  } else if (state.phase === 'win') {
    drawWin();
  } else if (state.phase === 'fail') {
    drawFail();
  }
  
  // Flash overlay for sync
  if (state.flash_alpha > 0.05) {
    ctx.fillStyle = 'rgba(255, 255, 255, ' + state.flash_alpha + ')';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
}

function drawInit() {
  ctx.fillStyle = '#00ffff';
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('ビートスライス', canvas.width / 2, 100);
  
  ctx.font = '20px Arial';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('BPMに合わせてスワイプでスライス！', canvas.width / 2, 160);
  ctx.fillText('20個スライスでクリア', canvas.width / 2, 210);
  ctx.fillText('BPM同期でGROOVE上昇！', canvas.width / 2, 260);
  
  ctx.fillStyle = '#ffff00';
  ctx.font = 'bold 28px Arial';
  ctx.fillText('クリックでスタート', canvas.width / 2, 380);
}

function drawPlaying() {
  const elapsed = getElapsed();
  
  // Draw slice zone
  ctx.strokeStyle = 'rgba(255, 107, 157, 0.4)';
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 5]);
  ctx.strokeRect(50, 200, canvas.width - 100, 300);
  ctx.setLineDash([]);
  
  // Draw zone label
  ctx.fillStyle = 'rgba(255, 107, 157, 0.6)';
  ctx.font = '14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('SLICE ZONE', canvas.width / 2, 195);
  
  // Draw objects
  for (const obj of state.objects) {
    const inZone = obj.y > 200 && obj.y < 500;
    ctx.fillStyle = inZone ? '#ff6b9d' : '#00aaff';
    ctx.shadowColor = inZone ? 'rgba(255, 107, 157, 0.8)' : 'rgba(0, 170, 255, 0.6)';
    ctx.shadowBlur = 10;
    ctx.fillRect(obj.x - obj.width/2, obj.y - obj.height/2, obj.width, obj.height);
    ctx.shadowBlur = 0;
  }
  
  // Draw particles
  for (const p of state.particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life * 0.8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  
  // Draw combo
  if (state.sync_combo >= 3) {
    const sizeFactor = 1 + Math.sin(Date.now() / 100) * 0.15;
    ctx.fillStyle = '#00ffff';
    ctx.font = 'bold 80px Arial';
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.9;
    ctx.save();
    ctx.translate(canvas.width / 2, 80);
    ctx.scale(sizeFactor, sizeFactor);
    ctx.fillText('SYNC ×' + state.sync_combo, 0, 0);
    ctx.restore();
    ctx.globalAlpha = 1;
  }
  
  // Instructions
  ctx.fillStyle = '#00ffff';
  ctx.font = '16px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('← ドラッグでスワイプ（BPM同期でGROOVE）→', 20, 30);
}

function drawWin() {
  // Gold flash background
  ctx.fillStyle = 'rgba(255, 215, 0, 0.4)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Glow effect
  ctx.shadowColor = 'rgba(255, 215, 0, 0.8)';
  ctx.shadowBlur = 40;
  
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 56px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('GROOVE完成！', canvas.width / 2, 200);
  
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffffff';
  ctx.font = '32px Arial';
  ctx.fillText('スコア: ' + state.slice_count, canvas.width / 2, 280);
  
  ctx.fillStyle = '#ffff00';
  ctx.font = 'bold 24px Arial';
  ctx.fillText('クリックでリスタート', canvas.width / 2, 380);
}

function drawFail() {
  // Red flash background
  ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 56px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', canvas.width / 2, 200);
  
  ctx.fillStyle = '#ffffff';
  ctx.font = '32px Arial';
  ctx.fillText('ミス数: ' + state.miss_count, canvas.width / 2, 280);
  ctx.fillText('スコア: ' + state.slice_count, canvas.width / 2, 320);
  
  ctx.fillStyle = '#ffff00';
  ctx.font = 'bold 24px Arial';
  ctx.fillText('クリックでリスタート', canvas.width / 2, 380);
}

function updateUI() {
  const elapsed = getElapsed();
  scoreEl.textContent = 'スライス: ' + state.slice_count;
  missesEl.textContent = 'ミス: ' + state.miss_count;
  timerEl.textContent = '時間: ' + Math.floor(elapsed) + 's';
  
  if (state.phase === 'init') {
    instructionsEl.textContent = 'クリックでスタート';
  } else if (state.phase === 'playing') {
    instructionsEl.textContent = '飛来物をスワイプでスライス | BPM同期でGROOVE | 20個以上でクリア';
  } else if (state.phase === 'win') {
    instructionsEl.textContent = '成功！クリックでリスタート';
  } else if (state.phase === 'fail') {
    instructionsEl.textContent = 'ゲームオーバー！クリックでリスタート';
  }
}

// Mouse events with P2 coordinate normalization
canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  input.startX = e.clientX - rect.left;
  input.startY = e.clientY - rect.top;
  input.currentX = input.startX;
  input.currentY = input.startY;
  input.startTime = Date.now();
  input.isMouseDown = true;
});

canvas.addEventListener('mousemove', (e) => {
  if (!input.isMouseDown) return;
  const rect = canvas.getBoundingClientRect();
  input.currentX = e.clientX - rect.left;
  input.currentY = e.clientY - rect.top;
});

canvas.addEventListener('mouseup', (e) => {
  if (!input.isMouseDown) return;
  input.isMouseDown = false;
  if (state.phase === 'playing') {
    handleSwipe();
  }
});

canvas.addEventListener('click', (e) => {
  if (state.phase === 'init' || state.phase === 'win' || state.phase === 'fail') {
    init();
  }
});

function gameLoop() {
  gameLogic();
  draw();
  updateUI();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
